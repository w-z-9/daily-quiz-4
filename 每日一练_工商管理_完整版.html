": "数据"}, {"label": "C", "text": "客观事物"}, {"label": "D", "text": "物质商品"}], "answer": "B", "analysis": "本题考查观察法的优缺点。观察法通常只适用于小范围的调查。\n \n26.（　）对接受者的行为产生影响，对接受者的决策具有价值。\nA.信息\nB.数据\nC.客观事物\nD.物质商品"}, {"question": "在企业进行员工招聘时，（　）适用于对专业管理人员.科技人员和熟练工人某一方面实际能力的测评。", "options": [{"label": "A", "text": "成就测评"}, {"label": "B", "text": "智力测评"}, {"label": "C", "text": "倾向测评"}, {"label": "D", "text": "人格测评"}], "answer": "A", "analysis": "信息是加工处理后的数据。它对接受者的行为产生影响，对接受者的决策具有价值。\n \n27.在企业进行员工招聘时，（　）适用于对专业管理人员.科技人员和熟练工人某一方面实际能力的测评。\nA.成就测评\nB.智力测评\nC.倾向测评\nD.人格测评"}, {"question": "不利于前后各个期间的预算衔接，不能适应连续不断的业务活动过程的预算管理方法是（　）。", "options": [{"label": "A", "text": "定期预算法"}, {"label": "B", "text": "滚动预算法"}, {"label": "C", "text": "固定预算法"}, {"label": "D", "text": "弹性预算法"}], "answer": "A", "analysis": "本题考查成就测评。在企业进行员工招聘时，成就测评适用于对专业管理人员.科技人员和熟练工人\n某一方面实际能力的测评。\n \n28.不利于前后各个期间的预算衔接，不能适应连续不断的业务活动过程的预算管理方法是（　）。\nA.定期预算法\nB.滚动预算法\nC.固定预算法\nD.弹性预算法"}, {"question": "直接反映一个组织集权或分权状况的是（　）。", "options": [{"label": "A", "text": "拥有决策权的程度"}, {"label": "B", "text": "决策的幅度"}, {"label": "C", "text": "决策的重要性"}, {"label": "D", "text": "对决策的控制程度"}], "answer": "A", "analysis": "定期预算法的优点是便于依据会计报告的数据与预算的比较来考核和评价预算的执行结果；缺点是\n不利于前后各个期间的预算衔接，不能适应连续不断的业务活动过程的预算管理。\n \n29.直接反映一个组织集权或分权状况的是（　）。\nA.拥有决策权的程度\nB.决策的幅度\nC.决策的重要性\nD.对决策的控制程度"}, {"question": "管理信息系统（MIS）是一个由人和计算机等组成的能进行信息收集.传递.存储.加工.维护和使用的系统", "options": [{"label": "A", "text": "应用软件系统"}, {"label": "B", "text": "硬件系统"}, {"label": "C", "text": "数据库管理系统"}, {"label": "D", "text": "应用员工"}], "answer": "A", "analysis": "本题考查集权与分权。拥有决策权的程度直接反映着一个组织集权或分权的状况。\n \n30.管理信息系统（MIS）是一个由人和计算机等组成的能进行信息收集.传递.存储.加工.维护和使用的系统\n，其核心是管理信息的（　）。\nA.应用软件系统\nB.硬件系统\nC.数据库管理系统\nD.应用员工"}, {"question": "下列企业经营发展类型中，普遍采用集权与分权相结合的组织结构的是（　）。", "options": [{"label": "A", "text": "守业型"}, {"label": "B", "text": "扩张型"}, {"label": "C", "text": "稳定型"}, {"label": "D", "text": "守业与扩张相宜型"}], "answer": "A", "analysis": "管理信息系统核心是管理信息的应用软件系统。\n \n31.下列企业经营发展类型中，普遍采用集权与分权相结合的组织结构的是（　）。\nA.守业型\nB.扩张型\nC.稳定型\nD.守业与扩张相宜型"}, {"question": "下列选项中，基本假设是未来是过去和现在连续发展的结果的是（　）。", "options": [{"label": "A", "text": "回归分析法"}, {"label": "B", "text": "移动平均法"}, {"label": "C", "text": "趋势外推法"}, {"label": "D", "text": "季节指数法"}], "answer": "A", "analysis": "本题考查企业组织结构形式的选择。守业型企业普遍采用集权与分权相结合的组织结构。\n \n32.下列选项中，基本假设是未来是过去和现在连续发展的结果的是（　）。\nA.回归分析法\nB.移动平均法\nC.趋势外推法\nD.季节指数法"}, {"question": "德尔菲法专家人数的多少，可根据预测课题的大小和涉及范围的宽窄而定，一般选择的人数是（　）。", "options": [{"label": "A", "text": "10-15"}, {"label": "B", "text": "10-20"}, {"label": "C", "text": "15-20"}, {"label": "D", "text": "10-30"}], "answer": "C", "analysis": "本题考查趋势外推法。趋势外推法的基本假设是未来是过去和现在连续发展的结果。\n \n33.德尔菲法专家人数的多少，可根据预测课题的大小和涉及范围的宽窄而定，一般选择的人数是（　）。\nA.10-15\nB.10-20\nC.15-20\nD.10-30"}, {"question": "下列厂址选择方法中，对于一些非定量的因素，（　）是一种十分有效的方法。", "options": [{"label": "A", "text": "重心法"}, {"label": "B", "text": "积点法"}, {"label": "C", "text": "线性规划法"}, {"label": "D", "text": "因素评分法"}], "answer": "D", "analysis": "本题考查德尔菲法的程序。专家人数的多少可根据预测课题的大小和涉及范围的宽窄而定，一般选\n择10-30人为宜。\n \n34.下列厂址选择方法中，对于一些非定量的因素，（　）是一种十分有效的方法。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n7\nA.重心法\nB.积点法\nC.线性规划法\nD.因素评分法"}, {"question": "下列企业部门中，依法对企业安全生产工作进行监督的是（　）。", "options": [{"label": "A", "text": "工会"}, {"label": "B", "text": "保卫处"}, {"label": "C", "text": "人事处"}, {"label": "D", "text": "生产部"}], "answer": "D", "analysis": "本题考查因素评分法。对于一些非定量的因素，因素评分法是一种十分有效的方法。\n \n35.下列企业部门中，依法对企业安全生产工作进行监督的是（　）。\nA.工会\nB.保卫处\nC.人事处\nD.生产部"}, {"question": "单一企业的缺点是（　）。", "options": [{"label": "A", "text": "品种单一，适应市场需求变化的能力差"}, {"label": "B", "text": "增加了管理难度，提高产品质量的任务艰巨"}, {"label": "C", "text": "企业资源的利用程度降低，提高经营风险"}, {"label": "D", "text": "劳动生产率低，提高成本"}], "answer": "A", "analysis": "本题考查生产经营单位的安全生产职责。《安全生产法》对生产经营单位的安全生产责任进行了明\n确规定，生产经营单位的主要负责人对本单位的安全生产工作全面负责，其从业人员有依法获得安全生产保\n障的权利，并应当依法履行安全生产方面的义务，工会依法对安全生产工作进行监督。\n \n36.单一企业的缺点是（　）。\nA.品种单一，适应市场需求变化的能力差\nB.增加了管理难度，提高产品质量的任务艰巨\nC.企业资源的利用程度降低，提高经营风险\nD.劳动生产率低，提高成本"}, {"question": "下列各项中属于狭义的生产过程的是（　）。", "options": [{"label": "A", "text": "辅助生产和检验过程"}, {"label": "B", "text": "加工制作过程和自然过程"}, {"label": "C", "text": "运输过程和生产服务"}, {"label": "D", "text": "停歇过程和基本生产"}], "answer": "A", "analysis": "本题考查企业的主要类型。单一企业的缺点：品种单一，适应市场需求变化的能力差。\n \n37.下列各项中属于狭义的生产过程的是（　）。\nA.辅助生产和检验过程\nB.加工制作过程和自然过程\nC.运输过程和生产服务\nD.停歇过程和基本生产"}, {"question": "在技术改造方案优化选择的方法中，在对投资额无约束的情况下进行的是（　）。", "options": [{"label": "A", "text": "效益成本分析法"}, {"label": "B", "text": "盈亏平衡点法"}, {"label": "C", "text": "投资回收期法"}, {"label": "D", "text": "追加投资回收期法"}], "answer": "B", "analysis": "本题考查生产过程的概念。狭义的生产过程是指对原材料进行加工，使之转化为成品的一系列生产\n活动的运行过程。狭义的生产过程一般包含加工制造过程.检验过程.运输过程.自然过程和停歇过程等。\n \n38.在技术改造方案优化选择的方法中，在对投资额无约束的情况下进行的是（　）。\nA.效益成本分析法\nB.盈亏平衡点法\nC.投资回收期法\nD.追加投资回收期法"}, {"question": "下列关于现金股利的表述错误的是（　）。", "options": [{"label": "A", "text": "现金股利是以现金的形式发放的股利，即派现"}, {"label": "B", "text": "可增加企业股票的发行量和流动性，从而提高企业的知名度\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8"}, {"label": "C", "text": "现金短缺时，会增加企业的财务压力，从而导致偿债能力下降"}, {"label": "D", "text": "现金较多时，有利于改善长短期资金结构，有利于股东取得现金收入和增强投资能力"}], "answer": "C", "analysis": "本题考查投资回收期法。投资回收期法是在对投资额无约束的情况下进行的，如有投资约束，则第\n一步应该淘汰超过投资约束的方案。\n \n39.下列关于现金股利的表述错误的是（　）。\nA.现金股利是以现金的形式发放的股利，即派现\nB.可增加企业股票的发行量和流动性，从而提高企业的知名度\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8\nC.现金短缺时，会增加企业的财务压力，从而导致偿债能力下降\nD.现金较多时，有利于改善长短期资金结构，有利于股东取得现金收入和增强投资能力"}, {"question": "根据工作要求安排新员工或最具潜力的管理人员在不同的工作部门工作一段时间，这是员工培训的（", "options": [{"label": "A", "text": "师带徒"}, {"label": "B", "text": "轮岗"}, {"label": "C", "text": "教练"}, {"label": "D", "text": "行动学习"}], "answer": "B", "analysis": "本题考查现金股利。B选项是股票股利优点，发放现金股利不影响股票数量。。现金股利是以现金的\n形式发放的股利，即派现。其优点是现金较多时，有利于改善长短期资金结构，有利于股东取得现金收入和\n增强投资能力。缺点是现金短缺时，会增加企业的财务压力，从而导致偿债能力下降。\n \n40.根据工作要求安排新员工或最具潜力的管理人员在不同的工作部门工作一段时间，这是员工培训的（　\n）方法。\nA.师带徒\nB.轮岗\nC.教练\nD.行动学习"}, {"question": "一般适合于资产规模较小.管理不复杂.不需设立专门的管理机构的生产和经营企业的企业制度是（　）。", "options": [{"label": "A", "text": "民营企业"}, {"label": "B", "text": "合伙制企业"}, {"label": "C", "text": "公司制企业"}, {"label": "D", "text": "单个业主制企业"}], "answer": "B", "analysis": "工作轮换（又称轮岗），是指根据工作要求安排新员工或具有潜力的管理人员在不同的工作部门工\n作一段时间，通常时间为1～2年，以丰富新员工和管理人员的工作经验。\n \n41.一般适合于资产规模较小.管理不复杂.不需设立专门的管理机构的生产和经营企业的企业制度是（　）。\nA.民营企业\nB.合伙制企业\nC.公司制企业\nD.单个业主制企业"}, {"question": "数据的完整性约束不包括（　）。", "options": [{"label": "A", "text": "实体完整性"}, {"label": "B", "text": "参照完整性"}, {"label": "C", "text": "用户定义完整性"}, {"label": "D", "text": "系统定义完整性"}], "answer": "B", "analysis": "本题考查合伙制企业。合伙制企业一般适合于资产规模较小.管理不复杂.不需设立专门的管理机构\n的生产和经营企业。\n \n42.数据的完整性约束不包括（　）。\nA.实体完整性\nB.参照完整性\nC.用户定义完整性\nD.系统定义完整性"}, {"question": "在员工培训计划的制订中，一项关键性的内容是（　）。", "options": [{"label": "A", "text": "员工培训的地点选择"}, {"label": "B", "text": "培训经费的预算和筹措"}, {"label": "C", "text": "员工培训时间的确定"}, {"label": "D", "text": "选择合适的员工培训的内容"}], "answer": "D", "analysis": "数据的完整性约束包括实体完整性.参照完整性和用户定义完整性。\n \n43.在员工培训计划的制订中，一项关键性的内容是（　）。\nA.员工培训的地点选择\nB.培训经费的预算和筹措\nC.员工培训时间的确定\nD.选择合适的员工培训的内容"}, {"question": "某企业将研发部门员工在一段时期内所从事的活动或任务以及所耗费的时间进行记录，由此来了解研发人", "options": [{"label": "A", "text": "工作日志法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n9"}, {"label": "B", "text": "面谈法"}, {"label": "C", "text": "问卷调查法"}, {"label": "D", "text": "观察法"}], "answer": "B", "analysis": "本题考查员工培训计划的制订。关于培训经费的预算和筹措，是计划中的一项关键性内容，计划中\n必须对培训所需的直接费用做出较精确的预算。\n \n44.某企业将研发部门员工在一段时期内所从事的活动或任务以及所耗费的时间进行记录，由此来了解研发人\n员的工作内容.责任.权力等，该企业所采用的工作分析方法是（　）。\nA.工作日志法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n9\nB.面谈法\nC.问卷调查法\nD.观察法"}, {"question": "物料的循环再利用是生产过程流程中常见的做法，其基本特征是（　）。", "options": [{"label": "A", "text": "仅将主体流程中的废物加以收集处理并再利用"}, {"label": "B", "text": "将主体流程以外的废物加以收集处理并再利用"}, {"label": "C", "text": "改变主体流程，并将主体流程中的废物加以收集处理并再利用"}, {"label": "D", "text": "不改变主体流程，主体流程中的废物加以收集处理并不再利用"}], "answer": "A", "analysis": "工作日志法就是由从事某项工作的员工按时间顺序记录其在一段时期内所从事的各项工作活动或任\n务以及所耗费的时间等各种细节，由此来了解员工实际工作的内容.责任.权力.人际关系及工作负荷。\n \n45.物料的循环再利用是生产过程流程中常见的做法，其基本特征是（　）。\nA.仅将主体流程中的废物加以收集处理并再利用\nB.将主体流程以外的废物加以收集处理并再利用\nC.改变主体流程，并将主体流程中的废物加以收集处理并再利用\nD.不改变主体流程，主体流程中的废物加以收集处理并不再利用"}, {"question": "关于市场调查的内容，下列说法错误的是（　）。", "options": [{"label": "A", "text": "市场供给调查主要包括产品生产能力调查.产品实体调查等"}, {"label": "B", "text": "顾客满意度调查不包括对各竞争对手的满意度评价的比较"}, {"label": "C", "text": "市场营销因素调查主要包括产品.价格.渠道和促销的调查"}, {"label": "D", "text": "对市场环境的调查研究是企业有效开展经营活动的基本前提"}], "answer": "A", "analysis": "生产系统内部循环利用是指一个企业生产过程中的物料的循环再利用。一般情况下，物料的循环再\n利用是生产过程流程中常见的做法。其基本特征是不改变主体流程，仅将主体流程中的废物加以收集处理并\n再利用。\n \n46.关于市场调查的内容，下列说法错误的是（　）。\nA.市场供给调查主要包括产品生产能力调查.产品实体调查等\nB.顾客满意度调查不包括对各竞争对手的满意度评价的比较\nC.市场营销因素调查主要包括产品.价格.渠道和促销的调查\nD.对市场环境的调查研究是企业有效开展经营活动的基本前提"}, {"question": "某公司管理部门制定了各岗位及各类人员有关工作质量的标准，这是标准化工作中制定（　）的体现。", "options": [{"label": "A", "text": "技术标准"}, {"label": "B", "text": "管理标准"}, {"label": "C", "text": "工作标准"}, {"label": "D", "text": "方法标准"}], "answer": "B", "analysis": "顾客满意度调查主要包括：调查消费者对产品的整体和分项满意度.满意的原因.不满意产生的原因\n；对改进产品或服务的具体建议；对各竞争对手的满意度评价的比较等。\n \n47.某公司管理部门制定了各岗位及各类人员有关工作质量的标准，这是标准化工作中制定（　）的体现。\nA.技术标准\nB.管理标准\nC.工作标准\nD.方法标准"}, {"question": "从生产过程的角度看，机械制造企业铸造件在空气中冷却的过程属于（　）。", "options": [{"label": "A", "text": "生产技术准备过程"}, {"label": "B", "text": "辅助生产过程"}, {"label": "C", "text": "基本生产过程"}, {"label": "D", "text": "自然过程"}], "answer": "C", "analysis": "工作标准是对企业员工的工作方法.程序及工作要求所作的统一规定，是为各部门.各工作岗位以及\n各类人员制定的有关工作质量的标准。\n \n48.从生产过程的角度看，机械制造企业铸造件在空气中冷却的过程属于（　）。\nA.生产技术准备过程\nB.辅助生产过程\nC.基本生产过程\nD.自然过程"}, {"question": "下列零件在工序间的移动方式中，一个批次零件生产周期长的是（　）。", "options": [{"label": "A", "text": "顺序移动方式\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10"}, {"label": "B", "text": "平行移动方式"}, {"label": "C", "text": "平行顺序移动方式"}, {"label": "D", "text": "随机移动方式"}], "answer": "D", "analysis": "自然过程是劳动对象借助于自然界的力量，使其产生某种性质变化的过程。自然过程包括铸件自然\n时效.涂染的自然干燥.铸锻件自然冷却等。\n \n49.下列零件在工序间的移动方式中，一个批次零件生产周期长的是（　）。\nA.顺序移动方式\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10\nB.平行移动方式\nC.平行顺序移动方式\nD.随机移动方式"}, {"question": "在正常使用.维护和保养的情况下，设备为企业生产经营活动服务的时间是设备的（　）。", "options": [{"label": "A", "text": "使用寿命"}, {"label": "B", "text": "经济寿命"}, {"label": "C", "text": "技术寿命"}, {"label": "D", "text": "最佳更新期"}], "answer": "A", "analysis": "顺序移动方式是指一批零件经多道工序加工时，将这批零件在上道工序全部加工完成后，再统一搬\n运到下道工序去加工的方式。这种方式的特点在于，零件在工序之间是按次序连续地整批运送，生产周期长\n。\n \n50.在正常使用.维护和保养的情况下，设备为企业生产经营活动服务的时间是设备的（　）。\nA.使用寿命\nB.经济寿命\nC.技术寿命\nD.最佳更新期"}, {"question": "在具体实施全面质量管理时，一般遵循“五步法”，这五个步骤分别是（　）。", "options": [{"label": "A", "text": "决策.准备.开始.扩展.综合"}, {"label": "B", "text": "决策.开始.完成.扩展.综合"}, {"label": "C", "text": "筹备.决策.开始.扩展.综合"}, {"label": "D", "text": "决策.开始.扩展.综合.总结"}], "answer": "A", "analysis": "设备寿命分为使用寿命.经济寿命和技术寿命。设备的使用寿命是指在正常使用.维护和保养的情况\n下设备的服务时间。\n \n51.在具体实施全面质量管理时，一般遵循“五步法”，这五个步骤分别是（　）。\nA.决策.准备.开始.扩展.综合\nB.决策.开始.完成.扩展.综合\nC.筹备.决策.开始.扩展.综合\nD.决策.开始.扩展.综合.总结"}, {"question": "某车间在生产过程中，选取每个生产班次加工的第一个工件进行质量检验。这种质量检验方式是（　）。", "options": [{"label": "A", "text": "进货检验"}, {"label": "B", "text": "首件检验"}, {"label": "C", "text": "巡回检验"}, {"label": "D", "text": "末件检验"}], "answer": "A", "analysis": "全面质量管理的实施遵循“五步法”进行，分别是：决策.准备.开始.扩展和综合。\n \n52.某车间在生产过程中，选取每个生产班次加工的第一个工件进行质量检验。这种质量检验方式是（　）。\nA.进货检验\nB.首件检验\nC.巡回检验\nD.末件检验"}], "考前点题（151-198题）": [{"question": "安全生产除了保障人员安全与健康之外，还应避免（　）。", "options": [{"label": "A", "text": "设施大量闲置"}, {"label": "B", "text": "设备无形磨损"}, {"label": "C", "text": "产品积压"}, {"label": "D", "text": "环境破坏"}], "answer": "B", "analysis": "工序检验有时称为过程检验或阶段检验。工序检验的目的是在加工过程中防止出现大批不合格品\n，避免不合格品流入下道工序。首件是指每个生产班次刚开始加工的第一个工件，或加工过程中，因换人.换\n料.换工装.调整设备等改变工序条件后加工的第一个工件。\n \n53.安全生产除了保障人员安全与健康之外，还应避免（　）。\nA.设施大量闲置\nB.设备无形磨损\nC.产品积压\nD.环境破坏"}, {"question": "某企业要调查其产品的销售情况，调查人员根据自己的经验和判断，选定一些具有代表性的中间商作为样", "options": [{"label": "A", "text": "任意抽样"}, {"label": "B", "text": "判断抽样"}, {"label": "C", "text": "配额抽样"}, {"label": "D", "text": "滚雪球抽样"}], "answer": "D", "analysis": "安全生产是指为了使劳动过程在符合安全要求的物质条件和工作秩序下进行，防止伤亡事故.设备事\n故及各种灾害的发生，保障劳动者的安全健康和生产.劳动过程的正常进行而采取的各种措施和从事的一切活\n动。它既包括对劳动者的保护，也包括对生产.财物.环境的保护，使生产活动正常进行。\n \n54.某企业要调查其产品的销售情况，调查人员根据自己的经验和判断，选定一些具有代表性的中间商作为样\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11\n本进行调查，这种抽样方式属于（　）。\nA.任意抽样\nB.判断抽样\nC.配额抽样\nD.滚雪球抽样"}, {"question": "运营资本是指（　）的余额。", "options": [{"label": "A", "text": "流动资产减去负债"}, {"label": "B", "text": "流动资产减去存货"}, {"label": "C", "text": "流动资产减去应收账款"}, {"label": "D", "text": "流动资产减去流动负债"}], "answer": "B", "analysis": "本题考查判断抽样。判断抽样是依据专家或调查人员的主观意愿.经验和知识，从调查总体中选择具\n有代表性的样本作为调查对象的一种非随机抽样方式。例如，某企业要调查其产品的销售情况，调查人员根\n据自己的经验和判断，选定一些具有代表性的中间商作为样本进行调查。\n \n55.运营资本是指（　）的余额。\nA.流动资产减去负债\nB.流动资产减去存货\nC.流动资产减去应收账款\nD.流动资产减去流动负债"}, {"question": "甲公司2021年向银行借款200万元，该项财务活动属于（　）。", "options": [{"label": "A", "text": "分配活动"}, {"label": "B", "text": "投资活动"}, {"label": "C", "text": "筹资活动"}, {"label": "D", "text": "营收活动"}], "answer": "D", "analysis": "运营资本是企业为了维持正常的经营活动所需要的资金即企业在经营活动中可用的流动资产净额。\n \n56.甲公司2021年向银行借款200万元，该项财务活动属于（　）。\nA.分配活动\nB.投资活动\nC.筹资活动\nD.营收活动"}, {"question": "企业专门进行生产加工和操作的专业化是（　）。", "options": [{"label": "A", "text": "部门专业化"}, {"label": "B", "text": "零部件专业化"}, {"label": "C", "text": "产品专业化"}, {"label": "D", "text": "工艺专业化"}], "answer": "C", "analysis": "企业组织商品生产，必须以占有或能够支配一定数额的资金为前提。企业通过政府财政资金.银行信\n贷资金.非银行金融机构资本等筹资渠道筹集资金表现为企业资金的流人。企业偿还借款.支付利息.股利以及\n付出各种筹资费用等，则表现为企业资金的流出。这种因为资金筹集而产生的资金收支，便是由企业筹资而\n引起的财务活动。\n \n57.企业专门进行生产加工和操作的专业化是（　）。\nA.部门专业化\nB.零部件专业化\nC.产品专业化\nD.工艺专业化"}, {"question": "假设A公司2020年实际销售收入为2000万元，2021年预计销售收入为3000万元，2020年资产总计和负债总", "options": [{"label": "A", "text": "750"}, {"label": "B", "text": "1000"}, {"label": "C", "text": "1250"}, {"label": "D", "text": "1500\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n12"}], "answer": "D", "analysis": "专业化是指一个人或一个单位长期从事某种专项性工作。按照分工与专业化发展的顺序，专业化形\n态的第一种是部门专业化；第二种是产品专业化，即以完整的最终产品为对象的专业化；第三种是零部件专\n业化；第四种是工艺专业化，即专门进行产品或零部件加工和操作的专业化；第五种是生产服务专业化。\n \n58.假设A公司2020年实际销售收入为2000万元，2021年预计销售收入为3000万元，2020年资产总计和负债总\n计分别为4000万元和1500万元，若2021年资产.负债销售百分比不变，根据销售收入百分比法测算2021年的筹\n资额为（　）万元。\nA.750\nB.1000\nC.1250\nD.1500\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n12"}, {"question": "下列不属于计量值控制图的是（　）。", "options": [{"label": "A", "text": "单值控制图"}, {"label": "B", "text": "平均值和极差控制图"}, {"label": "C", "text": "中位数和极差控制图"}, {"label": "D", "text": "不合格品率控制图"}], "answer": "C", "analysis": "2021年预计资产总额=3000×（4000÷2000×100％）=6000（万元）；2021年预计负债总额\n=3000×（1500÷2000×100％）=2250（万元）；2021年筹资额=（6000—4000）一（2250—1500）=1250（万\n元）。\n \n59.下列不属于计量值控制图的是（　）。\nA.单值控制图\nB.平均值和极差控制图\nC.中位数和极差控制图\nD.不合格品率控制图"}, {"question": "企业生产过程的核心是（　）。", "options": [{"label": "A", "text": "生产服务"}, {"label": "B", "text": "基本生产过程"}, {"label": "C", "text": "技术设备"}, {"label": "D", "text": "辅助生产过程"}], "answer": "D", "analysis": "计量值控制图包括单值控制图.平均值和极差控制图以及中位数和极差控制图。D为计数值控制图。\n \n60.企业生产过程的核心是（　）。\nA.生产服务\nB.基本生产过程\nC.技术设备\nD.辅助生产过程"}, {"question": "按照管理层次不同，企业信息可以分为（　）。", "options": [{"label": "A", "text": "外部信息"}, {"label": "B", "text": "内部信息"}, {"label": "C", "text": "操作层信息"}, {"label": "D", "text": "管理层信息\nE.决策层信息"}], "answer": "B", "analysis": "基本生产过程是核心，生产技术准备过程是重要的前提，辅助生产过程和生产服务过程为基本生产\n过程服务，并且为更好地实现基本生产过程创造条件。\n \n多项选择题\n61.按照管理层次不同，企业信息可以分为（　）。\nA.外部信息\nB.内部信息\nC.操作层信息\nD.管理层信息\nE.决策层信息"}, {"question": "由于企业占用.消耗的资源具体形式不同，企业的定额表现形式也多种多样，按内容进行分类，企业的定", "options": [{"label": "A", "text": "费用定额"}, {"label": "B", "text": "流动资金定额"}, {"label": "C", "text": "计划定额"}, {"label": "D", "text": "物资定额\nE.劳动定额"}], "answer": "C", "analysis": "按照管理层次不同，企业信息可以分为操作层信息.管理层信息.决策层信息。\n \n62.由于企业占用.消耗的资源具体形式不同，企业的定额表现形式也多种多样，按内容进行分类，企业的定\n额包括（　）。\nA.费用定额\nB.流动资金定额\nC.计划定额\nD.物资定额\nE.劳动定额"}, {"question": "产品执行的标准包括（　）。", "options": [{"label": "A", "text": "国家标准"}, {"label": "B", "text": "行业标准\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n13"}, {"label": "C", "text": "地方标准"}, {"label": "D", "text": "安全标准\nE.经过备案的企业标准"}], "answer": "A", "analysis": "由于企业占用.消耗的资源具体形式不同，企业的定额表现形式也多种多样，按内容不同可分为以下\n几种：劳动定额.设备定额.物资定额.流动资金定额.费用定额.期量标准。\n \n63.产品执行的标准包括（　）。\nA.国家标准\nB.行业标准\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n13\nC.地方标准\nD.安全标准\nE.经过备案的企业标准"}, {"question": "职能制是在“直线制”的基础上发展起来的，它的优点包括（　）。", "options": [{"label": "A", "text": "适应现代企业生产技术比较复杂.管理工作分工较细的特点"}, {"label": "B", "text": "提高了管理的专业化程度"}, {"label": "C", "text": "责权明确，结构稳定"}, {"label": "D", "text": "减轻了各级领导者的工作负担\nE.有利于节省直线人员的时间"}], "answer": "A", "analysis": "产品质量监督抽查应当以产品所执行的标准为判定依据；未制定标准的，以国家有关规定或要求为\n判定依据，即具备产品应当具备的使用性能；既无标注又无规定或要求的，以产品说明书.质量保证书.标签\n标明的质量指标为依据。产品执行的标准包括国家现行的四级标准：国家标准.行业标准.地方标准.经过备案\n的企业标准。\n \n64.职能制是在“直线制”的基础上发展起来的，它的优点包括（　）。\nA.适应现代企业生产技术比较复杂.管理工作分工较细的特点\nB.提高了管理的专业化程度\nC.责权明确，结构稳定\nD.减轻了各级领导者的工作负担\nE.有利于节省直线人员的时间"}, {"question": "在新产品开发战略中，紧随战略的基本特征有（　）。", "options": [{"label": "A", "text": "新产品开发的竞争域—般是产品的中间值"}, {"label": "B", "text": "新产品开发的目标—般是为企业规模有所扩大"}, {"label": "C", "text": "开发出的产品新颖.独特"}, {"label": "D", "text": "新产品创意构思来源于市场营销和生产过程\nE.选择新产品的投放市场时机是敏捷型"}], "answer": "A", "analysis": "职能制组织结构的优点是：将企业管理工作按职能分工，适应了现代企业生产技术比较复杂.管理工\n作分工较细的特点，同时，提高了管理的专业化程度，减轻了各级领导者的工作负担。其缺点是：容易形成\n多头领导，有可能妨碍企业的统一指挥，不利于建立健全责任制，影响整体工作效率的提高。CE两项属于直\n线职能制组织结构的优点。\n \n65.在新产品开发战略中，紧随战略的基本特征有（　）。\nA.新产品开发的竞争域—般是产品的中间值\nB.新产品开发的目标—般是为企业规模有所扩大\nC.开发出的产品新颖.独特\nD.新产品创意构思来源于市场营销和生产过程\nE.选择新产品的投放市场时机是敏捷型"}, {"question": "下列各项中，属于市场调查报告前言部分的有（　）。", "options": [{"label": "A", "text": "目的"}, {"label": "B", "text": "标题"}, {"label": "C", "text": "背景"}, {"label": "D", "text": "目录\nE.摘要"}], "answer": "B", "analysis": "紧随战略是指企业不抢先研制开发新产品，而当市场上一出现新产品，就立即进行仿制或寻找新产\n品的缺点而加以改进创新，以生产出功能.款式.包装等更好的产品。紧随战略的基本特征是：①新产品开发\n的竞争域一般是产品或产品的最终用途；②新产品开发的目标一般确定为企业规模有所扩大；③新产品创意\n构思来源于市场营销和生产过程；④开发出的新产品一般为仿制的改进品；⑤企业对新产品投放市场时机的\n选择反应敏捷；⑥新产品开发方式—般为自行研制或委托开发。\n \n66.下列各项中，属于市场调查报告前言部分的有（　）。\nA.目的\nB.标题\nC.背景\nD.目录\nE.摘要"}, {"question": "企业根据具体情况确定生产过程空间组织的形式，通常包括（　）。", "options": [{"label": "A", "text": "工艺专业化布置"}, {"label": "B", "text": "对象专业化布置"}, {"label": "C", "text": "混合式布置"}, {"label": "D", "text": "固定布置\nE.部门专业化布置"}], "answer": "B", "analysis": "正式的市场调查报告的格式一般包括三个部分：①前言部分，是市场调查报告的开头部分，主要包\n括标题.目录和摘要。②正文部分，是市场调查报告的主要部分，包括市场调查的背景和目的介绍.调查方案\n设计.数据分析.调查结果及其评价.结论及建议。③附录部分，是指正文中未包含或为了使正文简洁易懂，必\n须放置于文后便于查阅的有关技术性文件，是对正文的补充和更为详尽的说明。附录主要包括：①调查问卷\n.数据汇总表；②抽样方案设计.统计分析计算的细节；③对一些技术问题的讨论；④参考文献等。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n14\n \n67.企业根据具体情况确定生产过程空间组织的形式，通常包括（　）。\nA.工艺专业化布置\nB.对象专业化布置\nC.混合式布置\nD.固定布置\nE.部门专业化布置"}, {"question": "采取进取战略时，新产品开发的方式一般为（　）。", "options": [{"label": "A", "text": "自行研制开发"}, {"label": "B", "text": "引进开发"}, {"label": "C", "text": "自行研制与技术引进相结合"}, {"label": "D", "text": "合作开发\nE.委托开发"}], "answer": "A", "analysis": "本题考查生产过程空间组织的形式。企业根据具体情况确定生产过程空间组织的形式，通常包括以\n下几种：工艺专业化布置.对象专业化布置.混合式布置.固定布置。\n \n68.采取进取战略时，新产品开发的方式一般为（　）。\nA.自行研制开发\nB.引进开发\nC.自行研制与技术引进相结合\nD.合作开发\nE.委托开发"}, {"question": "质量认证的类型主要有（　）。", "options": [{"label": "A", "text": "型式试验"}, {"label": "B", "text": "全数检验"}, {"label": "C", "text": "工序检验"}, {"label": "D", "text": "顾客检验\nE.批量检验"}], "answer": "A", "analysis": "本题考查进取战略。采取进取战略时，新产品开发的方式一般为自行研制开发或合作开发。\n \n69.质量认证的类型主要有（　）。\nA.型式试验\nB.全数检验\nC.工序检验\nD.顾客检验\nE.批量检验"}, {"question": "与简单随机抽样相比，等距抽样的特点有（　）。", "options": [{"label": "A", "text": "样本在调查总体中的分布比较均匀"}, {"label": "B", "text": "抽样误差小"}, {"label": "C", "text": "更符合随机原则"}, {"label": "D", "text": "对调查总体资料的完整性要求较高\nE.样本具有较高的代表性"}], "answer": "A", "analysis": "本题考查质量认证的类型。ISO在其提出的认证原则与思路中将质量认证归纳为八种类型：（1）型\n式试验；（2）型式试验加认证后监督―市场抽样检验；（3）型式试验加认证后监督―供方抽样检验\n；（4）型式试验加认证后监督―在市场和供方抽样检验；（5）型式试验加供方质量管理体系评定再加认证\n后监督；（6）供方质量管理体系评定；（7）批量检验；（8）全数检验。\n \n70.与简单随机抽样相比，等距抽样的特点有（　）。\nA.样本在调查总体中的分布比较均匀\nB.抽样误差小\nC.更符合随机原则\nD.对调查总体资料的完整性要求较高\nE.样本具有较高的代表性"}, {"question": "组织流水线生产的条件包括（　）。", "options": [{"label": "A", "text": "产品结构多变"}, {"label": "B", "text": "产品工艺相对稳定"}, {"label": "C", "text": "产品产量足够大"}, {"label": "D", "text": "产品工艺能同期化\nE.生产面积容纳的下"}], "answer": "A", "analysis": "简单随机抽样是指完全排除任何有目的的选择，按照随机性原则，不对调查总体做任何加工整理\n，直接从调查总体中抽取调查样本的抽样调查方式。其缺点是：简单随机抽样需要给调查总体中每个单位编\n号，如果调查总体庞大，这种编号几乎是不可能的，因此它适用于单位数量不多的调查对象；当调查总体的\n标志变异程度较大时，简单随机抽样所产生的样本的代表性会受到影响。等距抽样是指将调查总体各单位按\n照某一标志排序，通过选择一个随机的起点，然后按照某种确定的距离或间隔，从总体中抽取样本单位的随\n机抽样方式。其优点是：简单易行，容易确定样本单位；样本在调查总体中的分布比较均匀，具有较高的代\n表性，花费时间少，成本较低。其缺点是：如果调查总体具有某一种周期性变化，则会影响调查的精度和代\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n15\n表性；对调查总体资料的完整性要求高；抽样误差计算较为复杂。\n \n71.组织流水线生产的条件包括（　）。\nA.产品结构多变\nB.产品工艺相对稳定\nC.产品产量足够大\nD.产品工艺能同期化\nE.生产面积容纳的下"}, {"question": "股份制企业的主要特点是（　）。", "options": [{"label": "A", "text": "企业资产所有权归出资者所有"}, {"label": "B", "text": "企业具有法人资格"}, {"label": "C", "text": "股东以其股份对企业债务承担有限责任"}, {"label": "D", "text": "企业规模相对较小，涉及行业较多\nE.股份制企业可以广泛地从社会上筹集资金"}], "answer": "B", "analysis": "组织流水线生产的条件包括：①产品结构和工艺要相对稳定。②产量要足够大。③产品工艺能同期\n化。④生产面积容纳的下。\n \n72.股份制企业的主要特点是（　）。\nA.企业资产所有权归出资者所有\nB.企业具有法人资格\nC.股东以其股份对企业债务承担有限责任\nD.企业规模相对较小，涉及行业较多\nE.股份制企业可以广泛地从社会上筹集资金"}, {"question": "成本费用控制方法主要包括（　）。", "options": [{"label": "A", "text": "作业成本控制法"}, {"label": "B", "text": "固定成本控制法"}, {"label": "C", "text": "标准成本控制法"}, {"label": "D", "text": "目标成本控制法\nE.责任成本控制法"}], "answer": "A", "analysis": "本题考查股份制企业的特点。股份制企业的主要特点是：①企业资产所有权归出资者所有，股东按\n其持有股份的类别和份额享有权益和承担义务；②企业具有法人资格，依法享有完全独立的经营权，独立核\n算，自主经营，自负盈亏；③股东以其股份对企业债务承担有限责任，企业法人按照其法人财产对企业债务\n承担有限责任；④股份制企业可以广泛地从社会上筹集资金，并最大限度地实现资本收益和降低出资者的投\n资风险。\n \n73.成本费用控制方法主要包括（　）。\nA.作业成本控制法\nB.固定成本控制法\nC.标准成本控制法\nD.目标成本控制法\nE.责任成本控制法"}, {"question": "按布局形式，自动线可分为（　）。", "options": [{"label": "A", "text": "直线式自动线"}, {"label": "B", "text": "折线式自动线"}, {"label": "C", "text": "封闭式自动线"}, {"label": "D", "text": "刚性连接自动线\nE.柔性连接自动线"}], "answer": "A", "analysis": "本题考查成本费用控制方法。成本费用控制方法主要包括标准成本控制法.责任成本控制法.作业成\n本控制法.目标成本控制法。\n \n74.按布局形式，自动线可分为（　）。\nA.直线式自动线\nB.折线式自动线\nC.封闭式自动线\nD.刚性连接自动线\nE.柔性连接自动线"}, {"question": "下列属于单一企业的特点的有（　）。", "options": [{"label": "A", "text": "现金周期长\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16"}, {"label": "B", "text": "经营范围狭窄"}, {"label": "C", "text": "流水线标准低"}, {"label": "D", "text": "专业化程度高\nE.规模小"}], "answer": "A", "analysis": "本题考查自动线的形式。按布局形式，自动线可分为直线式自动线.折线和封闭式自动线。\n \n75.下列属于单一企业的特点的有（　）。\nA.现金周期长\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16\nB.经营范围狭窄\nC.流水线标准低\nD.专业化程度高\nE.规模小"}, {"question": "合伙制企业的优点体现在（　）。", "options": [{"label": "A", "text": "资金来源较广.信用能力较强。"}, {"label": "B", "text": "企业经营灵活"}, {"label": "C", "text": "注册资本要求不是很高"}, {"label": "D", "text": "集合了合伙人的才智和经验，企业的竞争能力得到提高\nE.企业规模扩大和发展的可能性增大"}], "answer": "B", "analysis": "单一企业经营范围和产品线往往比较狭窄，规模小，专业化程度高。优点是可以组织大批量生产\n，劳动生产率高，有利于降低成本。缺点是品种单一，适应市场需求变化的能力差。\n \n76.合伙制企业的优点体现在（　）。\nA.资金来源较广.信用能力较强。\nB.企业经营灵活\nC.注册资本要求不是很高\nD.集合了合伙人的才智和经验，企业的竞争能力得到提高\nE.企业规模扩大和发展的可能性增大"}, {"question": "下列财务数据中，能够在资产负债表中查到的有（　）。", "options": [{"label": "A", "text": "存货"}, {"label": "B", "text": "营业成本"}, {"label": "C", "text": "应收账款"}, {"label": "D", "text": "应付职工薪酬\nE.未分配利润"}], "answer": "A", "analysis": "本题考查合伙制企业的优点。合伙制企业的优点体现在以下几个方面：①资金来源较广.信用能力较\n强。②集合了合伙人的才智和经验，企业的竞争能力得到提高。③由于资金筹措能力和管理能力得到增强\n，企业规模扩大和发展的可能性增大。\n \n77.下列财务数据中，能够在资产负债表中查到的有（　）。\nA.存货\nB.营业成本\nC.应收账款\nD.应付职工薪酬\nE.未分配利润"}, {"question": "下列企业培训需求分析内容中，属于员工层面的有（　）。", "options": [{"label": "A", "text": "员工的知识结构"}, {"label": "B", "text": "工作的难易程度"}, {"label": "C", "text": "员工的年龄结构"}, {"label": "D", "text": "员工的个性\nE.员工的能力分析"}], "answer": "A", "analysis": "能够在资产负债表查到的数据有存货.应收账款.应付职工薪酬.未分配利润等。B为利润表项目。\n \n78.下列企业培训需求分析内容中，属于员工层面的有（　）。\nA.员工的知识结构\nB.工作的难易程度\nC.员工的年龄结构\nD.员工的个性\nE.员工的能力分析"}, {"question": "企业过量持有现金带来的弊端包括（　）。", "options": [{"label": "A", "text": "产生机会成本"}, {"label": "B", "text": "降低付现能力"}, {"label": "C", "text": "降低流动比率"}, {"label": "D", "text": "降低速动比率\nE.降低整体资产的收益率水平"}], "answer": "A", "analysis": "员工层面的培训需求分析主要包括员工的知识结构.员工的专业.员工的年龄结构.员工的个性.员工\n的能力分析。工作的难易程度属于工作层面的培训需求。\n \n79.企业过量持有现金带来的弊端包括（　）。\nA.产生机会成本\nB.降低付现能力\nC.降低流动比率\nD.降低速动比率\nE.降低整体资产的收益率水平"}, {"question": "企业集团的联合是多层次的，由处于（　）的众多企业组成。", "options": [{"label": "A", "text": "核心层"}, {"label": "B", "text": "紧密层"}, {"label": "C", "text": "半紧密层"}, {"label": "D", "text": "协作层\nE.组织层"}], "answer": "A", "analysis": "现金是流动性最好的资产，但过量持有现金会产生机会成本，增加管理成本，降低整体资产的收益\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17\n率水平。\n \n80.企业集团的联合是多层次的，由处于（　）的众多企业组成。\nA.核心层\nB.紧密层\nC.半紧密层\nD.协作层\nE.组织层"}, {"question": "008，-0.008）。某道工序", "options": [{"label": "A", "text": "1.07"}, {"label": "B", "text": "1.00"}, {"label": "C", "text": "1.18"}, {"label": "D", "text": "1.41"}], "answer": "A", "analysis": "企业集团的联合是多层次的，由处于核心层.紧密层.半紧密层.协作层的众多企业组成。\n \n共享题干题\n【题干】机械手表的一个齿轮设计尺寸为4毫米，生产过程中所允许的误差为（+0.008，-0.008）。某道工序\n是保证该齿轮上述设计尺寸的最后加工工序，现在需要对该工序的工序能力进行评估，通过对该齿轮产品的\n随机抽样，经测算，样本平均值和公差在中心重合，样本标准差为s=0.0025。\n \n81.【不定项选择题】该工序的工序能力系数CP（　）。\nA.1.07\nB.1.00\nC.1.18\nD.1.41"}, {"question": "008-3.992）/（6*0.0025）=1.07。", "options": [{"label": "A", "text": "不足"}, {"label": "B", "text": "正常"}, {"label": "C", "text": "充足"}, {"label": "D", "text": "过剩"}], "answer": "A", "analysis": "Cp=T/6σ=（TU-TL）/6s=（4.008-3.992）/（6*0.0025）=1.07。\n \n82.【不定项选择题】根据该工序能力指数，可以断定该工序能力（　）。\nA.不足\nB.正常\nC.充足\nD.过剩"}, {"question": "07，当1.33≥CP＞1.00时，表示工序能力正常。", "options": [{"label": "A", "text": "不足"}, {"label": "B", "text": "正常"}, {"label": "C", "text": "充足"}, {"label": "D", "text": "过剩"}], "answer": "B", "analysis": "由上题可知，该工序能力指数为1.07，当1.33≥CP＞1.00时，表示工序能力正常。\n \n83.【不定项选择题】假设该工序的工序能力指数为0.75，可以断定该工序的工序能力（　）。\nA.不足\nB.正常\nC.充足\nD.过剩"}, {"question": "67时工序能力过剩，1.67≥CP＞1.33工序能力充足", "options": [{"label": "A", "text": "环境"}, {"label": "B", "text": "机器"}, {"label": "C", "text": "原料"}, {"label": "D", "text": "市场需求\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n18"}], "answer": "A", "analysis": "工序能力指数判断标准，CP＞1.67时工序能力过剩，1.67≥CP＞1.33工序能力充足\n，1.33≥CP＞1.00工序能力正常，1.00≥CP＞0.67工序能力不足，CP≤0.67工序能力严重不足。\n \n84.【不定项选择题】在该齿轮的生产过程中，影响工序质量的因素可能是（　）。\nA.环境\nB.机器\nC.原料\nD.市场需求\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n18"}, {"question": "【不定项选择题】本题中样本平均值和公差在中心重合，这种状态被称为（　）。", "options": [{"label": "A", "text": "工序有偏"}, {"label": "B", "text": "工序无偏"}, {"label": "C", "text": "充足状态"}, {"label": "D", "text": "不足状态"}], "answer": "A", "analysis": "环境.机器.原料都是与工序生产直接相关的因素，会影响工序质量，市场需求会影响产品的销售\n，但不会影响工序质量。\n \n85.【不定项选择题】本题中样本平均值和公差在中心重合，这种状态被称为（　）。\nA.工序有偏\nB.工序无偏\nC.充足状态\nD.不足状态"}, {"question": "2。", "options": [{"label": "A", "text": "总投资与总产量"}, {"label": "B", "text": "总产量与经济效益"}, {"label": "C", "text": "总投资与经济效益"}, {"label": "D", "text": "总投资与投资回收期"}], "answer": "B", "analysis": "当样本平均值与公差中心重合，将这种状态称为工序无偏，否则称为过程有偏。\n \n【题干】某钢厂领导班子正在对该铜厂的技术改造问题进行经济可行性分析。经过调查得知，该钢厂目前年\n产钢1500万吨，成本居高不下，对环境的污染日益严重，产品质量有所下降，还存在着一定的安全隐患。为\n了解决存在的问题，需耗资8000万元进行技术改造。技术改造完成后，每吨钢的成本将由原来的2700元降低\n至2600元，环境污染问题.安全隐患问题和产品质量问题均能得到一定程度的解决。假设该行业的标准投资效\n益系数为0.2。\n \n86.【不定项选择题】进行技术改造项目的经济可行性分析，需要对技术改造方案的（　）进行对比分析。\nA.总投资与总产量\nB.总产量与经济效益\nC.总投资与经济效益\nD.总投资与投资回收期"}, {"question": "【不定项选择题】用该技术改造方案实施后的净收益额补偿该方案投资额所需的时间称为（　）。", "options": [{"label": "A", "text": "投资投放期"}, {"label": "B", "text": "投资回收期"}, {"label": "C", "text": "项目建设期"}, {"label": "D", "text": "项目周期"}], "answer": "C", "analysis": "技术改造项目可行性分析中，需要对技术改造方案的总投资和经济效益进行对比分析。\n \n87.【不定项选择题】用该技术改造方案实施后的净收益额补偿该方案投资额所需的时间称为（　）。\nA.投资投放期\nB.投资回收期\nC.项目建设期\nD.项目周期"}, {"question": "【不定项选择题】该技术改造项目完成后，若该厂年钢产量不变，则该厂年经济效益为（　）万元。", "options": [{"label": "A", "text": "179300"}, {"label": "B", "text": "188300"}, {"label": "C", "text": "148400"}, {"label": "D", "text": "200000"}], "answer": "B", "analysis": "投资回收期是指某技术改造方案的投资额用该方案实施后的净收益额来补偿的时间。\n \n88.【不定项选择题】该技术改造项目完成后，若该厂年钢产量不变，则该厂年经济效益为（　）万元。\nA.179300\nB.188300\nC.148400\nD.200000"}, {"question": "2*8000=148400式中：E为技术改造的年度经济效益", "options": [{"label": "A", "text": "权力应该民主分配"}, {"label": "B", "text": "多设管理层级"}, {"label": "C", "text": "权力应该集中"}, {"label": "D", "text": "权力应该交与职业经理"}], "answer": "C", "analysis": "E=Q1（C0-C1）-E0K总=1500*（2700-2600）-0.2*8000=148400式中：E为技术改造的年度经济效益\n；Q1为技术改造后的年产品产量（改造前后年产品产量不变）；C0.C1分别为技术改造前，后的产品单位成本\n；K总为技术改造的总投资；E0为标准投资效益系数。\n \n【题干】2016年，大学毕业的张三选择了自主创业的方式就业，在家里亲属的资金支持下创办了一家小型企\n业。该企业的业务是为汽车厂加工螺丝垫片，10名员工全部由其它企业的下岗人员组成，对于该企业的组织\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n19\n管理，大学生张三必须做出相应的科学的决策。\n \n89.【不定项选择题】对于企业的职权安排，应该突出（　）特征。\nA.权力应该民主分配\nB.多设管理层级\nC.权力应该集中\nD.权力应该交与职业经理"}, {"question": "【不定项选择题】该企业当前最适合的组织结构形式是（　）。", "options": [{"label": "A", "text": "直线制结构"}, {"label": "B", "text": "职能制结构"}, {"label": "C", "text": "事业部制结构"}, {"label": "D", "text": "直线职能制"}], "answer": "C", "analysis": "组织的规模大，决策的数目多，在管理过程中协调.沟通和控制相对不易，对此宜于分权。相反，如\n果组织规模小，决策的数目少，分散程度较低则比较适宜集权。题中，张三创办的是小型公司，员工较少\n，容易沟通和控制，因此对该企业职权的安排，权力应当集中。\n \n90.【不定项选择题】该企业当前最适合的组织结构形式是（　）。\nA.直线制结构\nB.职能制结构\nC.事业部制结构\nD.直线职能制"}, {"question": "【不定项选择题】随着企业规模的发展和产品质量要求的提高，该企业打算实施部门化管理方式，这时", "options": [{"label": "A", "text": "产品部门化"}, {"label": "B", "text": "职俞音部门化"}, {"label": "C", "text": "区域部门化"}, {"label": "D", "text": "购销部门化"}], "answer": "A", "analysis":       if(curQs[curIdx].analysis)h+='<div class="analysis-text">'+esc(curQs[curIdx].analysis)+'</div>';
      h+='</div>';
    }
    h+='</div>';
    h+='<div class="quiz-buttons">';
    h+='<button class="btn" onclick="prevQ()">上一题</button>';
    h+='<button class="btn" onclick="nextQ()">下一题</button>';
    h+='<button class="btn" onclick="toggleFave()">收藏</button>';
    h+='</div></div>';
  }else{
    var data;
    if(curTab==='基础练习'||curTab==='强化训练')data=CH[curTab];
    else if(curTab==='错题本')data=wrongs;
    else if(curTab==='收藏夹')data=faves;
    else data=PP[curTab]||{};
    
    if(!data||Object.keys(data).length===0){
      h+='<p style="text-align:center;color:#7aa8cc;padding:40px">暂无数据</p>';
    }else{
      h+='<div class="chapter-list">';
      Object.keys(data).forEach(name=>{
        var qs=data[name];
        h+='<div class="chapter-item" onclick="startChapter(\''+name.replace(/'/g,"\\'")+'\')">';
        h+='<span class="chapter-name">'+esc(name)+'</span>';
        h+='<span class="chapter-count">'+(qs.length||0)+'题</span></div>';
      });
      h+='</div>';
    }
  }
  ca.innerHTML=h;
  updateProgress();
}

function startChapter(name){
  var data;
  if(curTab==='基础练习'||curTab==='强化训练')data=CH[curTab];
  else if(curTab==='错题本')data=wrongs;
  else if(curTab==='收藏夹')data=faves;
  else data=PP[curTab]||{};
  
  curChapter=name;curQs=(data[name]||[]).slice();curIdx=0;
  curQs.forEach(q=>q.checked=q.checked||false);
  renderContent();
}

function selectOpt(i){
  var q=curQs[curIdx];
  if(q.checked)return;
  q.selected=q.options[i].label;
  q.checked=true;
  if(q.selected!==q.answer){
    wrongs[curTab]=wrongs[curTab]||{};
    wrongs[curTab][curChapter]=wrongs[curTab][curChapter]||[];
    var found=wrongs[curTab][curChapter].find(x=>x.question===q.question);
    if(!found)wrongs[curTab][curChapter].push(q);
    localStorage.setItem(SK+'_wrong',JSON.stringify(wrongs));
  }
  renderContent();
}

function prevQ(){if(curIdx>0){curIdx--;renderContent()}}
function nextQ(){if(curIdx<curQs.length-1){curIdx++;renderContent()}}
function backToList(){curChapter=null;curIdx=0;renderContent()}

function toggleFave(){
  var q=curQs[curIdx],key=q.question.slice(0,50);
  faves[curTab]=faves[curTab]||{};
  faves[curTab][curChapter]=faves[curTab][curChapter]||[];
  var idx=faves[curTab][curChapter].findIndex(x=>x.question.slice(0,50)===key);
  if(idx>=0)faves[curTab][curChapter].splice(idx,1);
  else faves[curTab][curChapter].push(q);
  localStorage.setItem(SK+'_fave',JSON.stringify(faves));
  alert('已'+(idx>=0?'取消':'')+'收藏');
}

function updateProgress(){
  var done=Object.values(wrongs).reduce((a,d)=>a+Object.values(d).reduce((s,qs)=>s+qs.length,0),0);
  done+=Object.values(faves).reduce((a,d)=>a+Object.values(d).reduce((s,qs)=>s+qs.length,0),0);
  document.getElementById('progress-text').textContent=done+'/'+TOTAL;
  document.getElementById('progress-fill').style.width=(done/TOTAL*100)+'%';
}

renderTabs();
renderContent();
</script>
</body>
</html>
