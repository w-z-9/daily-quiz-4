提取法定公积金，公司法定公积金累计额为公司注册资本的50%以上的，可以不再提取。\n \n41.确定设备最佳更新期采用的方法是（　）。\nA.追加投资回收期法\nB.投资回收期法\nC.效益成本分析法\nD.低劣化数值法"}, {"question": "适用于以长度、强度、纯度等计量值为控制对象的控制图法是（　）。", "options": [{"label": "A", "text": "计量值控制图"}, {"label": "B", "text": "直方控制图"}, {"label": "C", "text": "计数值控制图"}, {"label": "D", "text": "排列控制图"}], "answer": "D", "analysis": "确定设备最佳更新期的方法有多种，常用的有低劣化数值法和面值法。\n \n42.适用于以长度、强度、纯度等计量值为控制对象的控制图法是（　）。\nA.计量值控制图\nB.直方控制图\nC.计数值控制图\nD.排列控制图"}, {"question": "反映企业在—定期间的经营成果及其分配情况的报表属于（　）。", "options": [{"label": "A", "text": "资产负债表"}, {"label": "B", "text": "现金流量表"}, {"label": "C", "text": "投资活动表"}, {"label": "D", "text": "损益表"}], "answer": "A", "analysis": "计量值控制图一般适用于以长度、强度、纯度等计量值为控制对象的情况。\n \n43.反映企业在—定期间的经营成果及其分配情况的报表属于（　）。\nA.资产负债表\nB.现金流量表\nC.投资活动表\nD.损益表"}, {"question": "（　）主要表现为企业科学化管理的实施。", "options": [{"label": "A", "text": "内层技术改造"}, {"label": "B", "text": "表层技术改造"}, {"label": "C", "text": "外层技术改造"}, {"label": "D", "text": "深层技术改造"}], "answer": "D", "analysis": "损益表也称利润表，是反映企业在一定期间的经营成果及分配情况的报表。\n \n44.（　）主要表现为企业科学化管理的实施。\nA.内层技术改造\nB.表层技术改造\nC.外层技术改造\nD.深层技术改造"}, {"question": "国家产业政策的变化使得某企业进行组织变革，则驱动该企业变革的因素属于（　）。", "options": [{"label": "A", "text": "技术"}, {"label": "B", "text": "社会"}, {"label": "C", "text": "政治、法律"}, {"label": "D", "text": "经济"}], "answer": "D", "analysis": "深层技术改造主要表现为企业科学化管理的实施。\n \n45.国家产业政策的变化使得某企业进行组织变革，则驱动该企业变革的因素属于（　）。\nA.技术\nB.社会\nC.政治、法律\nD.经济"}, {"question": "下列产品中，适用《中华人民共和国产品质量法》的是（　）。", "options": [{"label": "A", "text": "初级农产品"}, {"label": "B", "text": "初级畜禽产品"}, {"label": "C", "text": "自用的工业产品"}, {"label": "D", "text": "用于销售的工业产品"}], "answer": "C", "analysis": "政治、法律是驱动企业变革的外部驱动因素之一，包括国际国内政治环境的变化，国家宏观经济调\n控手段的改变，国家产业政策的调整与产业结构的优化等。\n \n46.下列产品中，适用《中华人民共和国产品质量法》的是（　）。\nA.初级农产品\nB.初级畜禽产品\nC.自用的工业产品\nD.用于销售的工业产品"}, {"question": "全面质量管理的“五步法”中，第一步是（　）。", "options": [{"label": "A", "text": "准备"}, {"label": "B", "text": "开始"}, {"label": "C", "text": "决策"}, {"label": "D", "text": "扩展"}], "answer": "D", "analysis": "《中华人民共和国产品质量法》适用的产品范围是以销售为目的，通过工业加工、手工制作等生产\n方式所获得的具有特定使用性能的产品，即指用于销售的经过加工制作的工业产品、手工业产品和农产品\n，包括建筑工程中使用的建筑材料、建筑构件和设备。初级农产品(如小麦、水果等)、初级畜禽产品、建筑\n工程等不适用该法规定。未投人流通领域的自用产品、赠予产品等也不适用该法规定。\n \n47.全面质量管理的“五步法”中，第一步是（　）。\nA.准备\nB.开始\nC.决策\nD.扩展"}, {"question": "下列选项中，（　）不属于授权的基本原则。", "options": [{"label": "A", "text": "视能授权"}, {"label": "B", "text": "明确授权范围"}, {"label": "C", "text": "越级授权"}, {"label": "D", "text": "适度授权"}], "answer": "C", "analysis": "在具体实施全面质量管理时，可以遵循“五步法”进行。这五步分别是决策、准备、开始、扩展和\n综合。\n \n48.下列选项中，（　）不属于授权的基本原则。\nA.视能授权\nB.明确授权范围\nC.越级授权\nD.适度授权"}, {"question": "产权比率等于负债总额除以（　）。", "options": [{"label": "A", "text": "资产总额"}, {"label": "B", "text": "股东权益总额"}, {"label": "C", "text": "利润总额"}, {"label": "D", "text": "现金流量总额"}], "answer": "C", "analysis": "授权的基本原则包括视能授权、明确授权范围、不可越级授权、适度授权、适当控制。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10\n \n49.产权比率等于负债总额除以（　）。\nA.资产总额\nB.股东权益总额\nC.利润总额\nD.现金流量总额"}, {"question": "通过计算和比较技术改造项目的各方案在整个寿命周期内收益的现值与成本的比率，从而进行决策的方法", "options": [{"label": "A", "text": "效益成本分析法"}, {"label": "B", "text": "盈亏平衡点法"}, {"label": "C", "text": "投资回收期法"}, {"label": "D", "text": "追加投资回收期法"}], "answer": "B", "analysis": "产权比率是指负债总额与股东权益总额的比率，是企业财务结构稳健与否的重要标志。\n \n50.通过计算和比较技术改造项目的各方案在整个寿命周期内收益的现值与成本的比率，从而进行决策的方法\n是（　）。\nA.效益成本分析法\nB.盈亏平衡点法\nC.投资回收期法\nD.追加投资回收期法"}, {"question": "企业的产生、发展与分工密不可分，按照分工与专业化发展的顺序，第四种专业化形态是（　）。", "options": [{"label": "A", "text": "工艺专业化"}, {"label": "B", "text": "零部件专业化"}, {"label": "C", "text": "产品专业化"}, {"label": "D", "text": "部门专业化"}], "answer": "A", "analysis": "效益成本分析法是通过计算和比较技术改造项目的各方案在整个寿命周期内收益的现值与成本的比\n率，以确定各技术改造方案排列的优先次序和取舍的方法。\n \n51.企业的产生、发展与分工密不可分，按照分工与专业化发展的顺序，第四种专业化形态是（　）。\nA.工艺专业化\nB.零部件专业化\nC.产品专业化\nD.部门专业化"}, {"question": "企业根据生产工艺和产品特点，对车间的机床进行科学、合理的优化布置，这种活动属于生产过程的（", "options": [{"label": "A", "text": "时间组织"}, {"label": "B", "text": "物流组织"}, {"label": "C", "text": "空间组织"}, {"label": "D", "text": "人员配置"}], "answer": "A", "analysis": "按照分工与专业化发展的顺序，专业化形态的第一种是部门专业化；第二种是产品专业化，即以完\n整的最终产品为对象的专业化；第三种是零部件专业化；第四种是工艺专业化，即专门进行产品或零部件加\n工和操作的专业化；第五种是生产服务专业化，即处于直接生产过程之外的，但又为生产过程服务的那些职\n能的专业化。\n \n52.企业根据生产工艺和产品特点，对车间的机床进行科学、合理的优化布置，这种活动属于生产过程的（　\n）。\nA.时间组织\nB.物流组织\nC.空间组织\nD.人员配置"}], "预测卷（151-198题）": [{"question": "工作分析是企业人力资源管理的一项核心基础职能，工作分析又称（　）。", "options": [{"label": "A", "text": "职务分析"}, {"label": "B", "text": "职位分析"}, {"label": "C", "text": "职务描述"}, {"label": "D", "text": "岗位描述"}], "answer": "C", "analysis": "生产过程的空间组织即指厂房、车间和设备的布局，包括企业总平面布置和车间布置。\n \n53.工作分析是企业人力资源管理的一项核心基础职能，工作分析又称（　）。\nA.职务分析\nB.职位分析\nC.职务描述\nD.岗位描述"}, {"question": "下列筹集的资金可永久使用的是（　）。", "options": [{"label": "A", "text": "银行借贷"}, {"label": "B", "text": "发行债券"}, {"label": "C", "text": "商业信用"}, {"label": "D", "text": "发行普通股"}], "answer": "B", "analysis": "工作分析是指管理者了解企业内的职位信息和任职条件信息，并以一种格式把与这种职位有关的信\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11\n息描述出来，从而使其他人能了解这种职位和人员需求的过程。从这个意义上讲，工作分析也可以称为职位\n分析、岗位分析。\n \n54.下列筹集的资金可永久使用的是（　）。\nA.银行借贷\nB.发行债券\nC.商业信用\nD.发行普通股"}, {"question": "企业的技术改造是一个较为复杂的过程，其基本程序的第一个步骤是（　）。", "options": [{"label": "A", "text": "提出技术改造的目标和范围"}, {"label": "B", "text": "提出技术改造的方案和预算"}, {"label": "C", "text": "调查分析各方案的先进性和合理性"}, {"label": "D", "text": "调查本企业生产技术的历史和现状"}], "answer": "D", "analysis": "发行股票是股份制公司筹集股权资本的基本方式。发行股票分为公开发行和非公开发行。公司上市\n后可通过配股和增发的方式进行股权再融资。其优点是筹措的资金可永久使用，没有固定的股利负担，筹资\n风险小。缺点是资本成本高，发行费用高，没有抵税作用，容易分散公司控制权，稀释每股收益。\n \n55.企业的技术改造是一个较为复杂的过程，其基本程序的第一个步骤是（　）。\nA.提出技术改造的目标和范围\nB.提出技术改造的方案和预算\nC.调查分析各方案的先进性和合理性\nD.调查本企业生产技术的历史和现状"}, {"question": "下列战略联盟形式中，具有独立地位且拥有管理机构的是（　）。", "options": [{"label": "A", "text": "股权参与式联盟"}, {"label": "B", "text": "功能协议式联盟"}, {"label": "C", "text": "合资企业式联盟"}, {"label": "D", "text": "框架协议式联盟"}], "answer": "D", "analysis": "企业的技术改造是一个较为复杂的过程，这一过程包括以下几个基本程序：①调查本企业生产技术\n的历史和现状，剖析技术基础的优势和劣势，找出生产技术中的薄弱环节；调查研究国内外的技术现状和发\n展趋势及国内外的科技新成果，掌握技术改造的时机，确定技术改造项目的轻重缓急。②提出改造目标、方\n向、范围及预期达到的目标。③提出改造方案，根据市场环境、内部条件，制定改造的各项目具体配套方案\n。④可行性研究，在事前对预投资期的各种建设方案、技术方案和生产经营方案的实施可能性、技术先进性\n和经济合理性进行调查分析。\n \n56.下列战略联盟形式中，具有独立地位且拥有管理机构的是（　）。\nA.股权参与式联盟\nB.功能协议式联盟\nC.合资企业式联盟\nD.框架协议式联盟"}, {"question": "股份制企业的股东和企业法人承担企业债务的限额分别为（　）。", "options": [{"label": "A", "text": "股份额、企业注册资本"}, {"label": "B", "text": "个人全部财产、企业法人财产"}, {"label": "C", "text": "股份额、企业全部法人财产"}, {"label": "D", "text": "个人全部财产、企业固定资产"}], "answer": "C", "analysis": "合资企业是一个具有独立地位和管理机构的经济实体。合资企业的结构形式是多种多样的，当今合\n资企业的一个典型特征是合资各方在某一产品上或某一地区进行合作，但在其他产品上或其他地区则相互竞\n争。\n \n57.股份制企业的股东和企业法人承担企业债务的限额分别为（　）。\nA.股份额、企业注册资本\nB.个人全部财产、企业法人财产\nC.股份额、企业全部法人财产\nD.个人全部财产、企业固定资产"}, {"question": "容易形成多头领导的企业组织结构形式是（　）。", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "直线职能制"}, {"label": "D", "text": "事业部制"}], "answer": "C", "analysis": "股份制公司股东以其股份对企业债务承担有限责任，企业法人以其法人财产对企业债务承担有限责\n任。\n \n58.容易形成多头领导的企业组织结构形式是（　）。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n12\nA.直线制\nB.职能制\nC.直线职能制\nD.事业部制"}, {"question": "《产品质量法》规定了九种主要的行政处罚形式不包括（　）。", "options": [{"label": "A", "text": "没收产品"}, {"label": "B", "text": "责令公开更正"}, {"label": "C", "text": "罚金"}, {"label": "D", "text": "责令停止生产"}], "answer": "B", "analysis": "职能制企业组织结构的优点如下：将企业管理工作按职能分工，适应了现代企业生产技术比较复杂\n、管理工作分工较细的特点。同时，提高了管理的专业化程度，减轻了各级领导者的工作负担。其缺点如下\n：容易形成多头领导，有可能妨碍企业的统一指挥，不利于建立健全责任制，影响整体工作效率的提高。\n \n59.《产品质量法》规定了九种主要的行政处罚形式不包括（　）。\nA.没收产品\nB.责令公开更正\nC.罚金\nD.责令停止生产"}, {"question": "某企业应用新技术开发新产品发明新工艺，这属于技术改造层次中的（　）。", "options": [{"label": "A", "text": "表层技术改造"}, {"label": "B", "text": "内层技术改造"}, {"label": "C", "text": "深层技术改造"}, {"label": "D", "text": "核心技术改造"}], "answer": "C", "analysis": "《产品质量法》规定了九种主要的行政处罚形式:①责令停止生产;②责令停止销售;③吊销营业执照\n;④没收产品;⑤没收违法所得;⑥罚款;⑦责令公开更正;⑧限期改正;⑨责令改正。\n \n60.某企业应用新技术开发新产品发明新工艺，这属于技术改造层次中的（　）。\nA.表层技术改造\nB.内层技术改造\nC.深层技术改造\nD.核心技术改造"}, {"question": "下列选项中属于企业筹资渠道的有（　）。", "options": [{"label": "A", "text": "政府财政资金"}, {"label": "B", "text": "银行信贷资金"}, {"label": "C", "text": "非银行金融机构资本"}, {"label": "D", "text": "其他法人单位资金\nE.税收收入"}], "answer": "B", "analysis": "内层技术改造主要表现为企业科学技术的运用，如新技术的应用、新产品的开发和新工艺的发明。\n \n多项选择题\n61.下列选项中属于企业筹资渠道的有（　）。\nA.政府财政资金\nB.银行信贷资金\nC.非银行金融机构资本\nD.其他法人单位资金\nE.税收收入"}, {"question": "公司法人财产的特征包括（　）。", "options": [{"label": "A", "text": "独占性"}, {"label": "B", "text": "整体性"}, {"label": "C", "text": "稳定性"}, {"label": "D", "text": "连续性\nE.易变性"}], "answer": "A", "analysis": "企业主要的筹资渠道有政府财政资金、银行信贷资金、非银行金融机构资本、其他法人单位资金、\n民间自然人资金、企业自留资本、国外及我国港澳台资本。\n \n62.公司法人财产的特征包括（　）。\nA.独占性\nB.整体性\nC.稳定性\nD.连续性\nE.易变性"}, {"question": "学习型企业组织的基本特征包括（　）。", "options": [{"label": "A", "text": "组织由多个创造性团体构成"}, {"label": "B", "text": "组织成员具有共同的愿景"}, {"label": "C", "text": "“地方为主”的锥形式结构"}, {"label": "D", "text": "组织成员事业与生活的平衡\nE.组织边界的重新界定"}], "answer": "B", "analysis": "企业法人财产具有整体性、稳定性和连续性的特征。整体性是指股东一旦投资到公司，财产就以公\n司的整体资产出现并进行运用；稳定性是指股东一旦投资到公司，投资就不可抽回；连续性是指股东个人的\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n13\n生命不影响公司，股东的变化不会影响法人财产权利的连续行使。\n \n63.学习型企业组织的基本特征包括（　）。\nA.组织由多个创造性团体构成\nB.组织成员具有共同的愿景\nC.“地方为主”的锥形式结构\nD.组织成员事业与生活的平衡\nE.组织边界的重新界定"}, {"question": "企业组织变革的先兆有（　）。", "options": [{"label": "A", "text": "企业决策效率低下或经常出现决策失误"}, {"label": "B", "text": "企业沟通渠道不畅"}, {"label": "C", "text": "企业组织职能难以正常发挥"}, {"label": "D", "text": "企业财务报表出现重大异常\nE.企业缺乏创新"}], "answer": "A", "analysis": "本题考查学习型企业组织的基本特征。学习型企业组织的基本特征包括以下方面：（1）组织成员具\n有共同的愿景。（2）组织由多个创造性团队构成。（3）“地方为主”的扁平式结构。（4）组织边界的重新\n界定。（5）组织成员事业与生活的平衡。（6）领导者的新角色。\n \n64.企业组织变革的先兆有（　）。\nA.企业决策效率低下或经常出现决策失误\nB.企业沟通渠道不畅\nC.企业组织职能难以正常发挥\nD.企业财务报表出现重大异常\nE.企业缺乏创新"}, {"question": "招聘信息的发布应遵循的原则有（　）。", "options": [{"label": "A", "text": "广泛原则"}, {"label": "B", "text": "及时原则"}, {"label": "C", "text": "层次原则"}, {"label": "D", "text": "全面原则\nE.主观原则"}], "answer": "A", "analysis": "企业组织变革的先兆包括：企业决策效率低下或经常出现决策失误；企业沟通渠道不畅；企业组织\n职能难以正常发挥；企业缺乏创新。\n \n65.招聘信息的发布应遵循的原则有（　）。\nA.广泛原则\nB.及时原则\nC.层次原则\nD.全面原则\nE.主观原则"}, {"question": "以下属于企业管理职能的有（　）。", "options": [{"label": "A", "text": "计划职能"}, {"label": "B", "text": "组织职能"}, {"label": "C", "text": "生产职能"}, {"label": "D", "text": "协调职能\nE.激励职能"}], "answer": "A", "analysis": "本题考查招聘信息发布的原则。招聘信息的发布应遵循以下原则：广泛原则、及时原则、层次原则\n、真实原则、全面原则。\n \n66.以下属于企业管理职能的有（　）。\nA.计划职能\nB.组织职能\nC.生产职能\nD.协调职能\nE.激励职能"}, {"question": "企业经营过程中的发展机制所包括的内容有（　）。", "options": [{"label": "A", "text": "发展资金自我积累"}, {"label": "B", "text": "组织结构垂直管理"}, {"label": "C", "text": "融资渠道自主选择\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n14"}, {"label": "D", "text": "投资项目任意获得\nE.法人财产依法所有"}], "answer": "A", "analysis": "企业管理的职能包括计划职能、组织职能、指挥职能、控制职能、协调职能和激励职能。\n \n67.企业经营过程中的发展机制所包括的内容有（　）。\nA.发展资金自我积累\nB.组织结构垂直管理\nC.融资渠道自主选择\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n14\nD.投资项目任意获得\nE.法人财产依法所有"}, {"question": "工作轮换的优点有（　）。", "options": [{"label": "A", "text": "能丰富培训对象的工作经历"}, {"label": "B", "text": "能较好地识别培训对象的长处和短处"}, {"label": "C", "text": "有利于建立强烈的岗位意识和高度的责任感"}, {"label": "D", "text": "有助于工作效果或效率\nE.能增强培训对象对各部门管理工作的了解并增进各部门之间的合作"}], "answer": "A", "analysis": "企业发展机制包括发展基金的自我积累、融资渠道自主选择、投资项目自主决定、法人财产依法所\n有。\n \n68.工作轮换的优点有（　）。\nA.能丰富培训对象的工作经历\nB.能较好地识别培训对象的长处和短处\nC.有利于建立强烈的岗位意识和高度的责任感\nD.有助于工作效果或效率\nE.能增强培训对象对各部门管理工作的了解并增进各部门之间的合作"}, {"question": "在进行厂址选择时，可以采用的方法主要有（　）。", "options": [{"label": "A", "text": "分级加权法"}, {"label": "B", "text": "重心法"}, {"label": "C", "text": "线性规划法"}, {"label": "D", "text": "费用效益分析法\nE.直接推断法"}], "answer": "A", "analysis": "本题考查工作轮换。工作轮换的优点是：能丰富培训对象的工作经历，也能较好地识别培训对象的\n长处和短处，还能增强培训对象对各部门管理工作的了解并增进各部门之间的合作。工作轮换的不足之处是\n：由于受训员工在每一工作岗位上停留的时间较短，因而容易缺乏强烈的岗位意识和高度的责任感；由于受\n训者的水平不高，容易影响整个部门或小组工作效率或工作效果；由于受训者的表现还会影响其身边的其他\n员工，容易在多个部门造成更坏的影响。\n \n69.在进行厂址选择时，可以采用的方法主要有（　）。\nA.分级加权法\nB.重心法\nC.线性规划法\nD.费用效益分析法\nE.直接推断法"}, {"question": "生产费用包括（　）。", "options": [{"label": "A", "text": "直接材料、燃料和动力费用"}, {"label": "B", "text": "直接人工费用"}, {"label": "C", "text": "制造费用"}, {"label": "D", "text": "销售费用\nE.管理费用"}], "answer": "B", "analysis": "本题考查厂址选择的方法。在进行厂址选择时，可以采用因素评分法、重心法、投资费用比较法、\n积点法、位置度量法、盈亏平衡点法、线性规划法、分支界限法、引力模型法、直接推断法等方法。\n \n70.生产费用包括（　）。\nA.直接材料、燃料和动力费用\nB.直接人工费用\nC.制造费用\nD.销售费用\nE.管理费用"}, {"question": "企业集团结构的优点包括（　）。", "options": [{"label": "A", "text": "有利于展开国内外市场的竞争"}, {"label": "B", "text": "有利于员工福利待遇的提升"}, {"label": "C", "text": "有利于企业资源配置的最优化"}, {"label": "D", "text": "有利于经营风险的防范\nE.有利于企业无形资产的构建"}], "answer": "A", "analysis": "本题考查生产费用。生产费用进一步可划分为以下成本项目：直接材料、燃料及动力费用；直接人\n工费用；制造费用。\n \n71.企业集团结构的优点包括（　）。\nA.有利于展开国内外市场的竞争\nB.有利于员工福利待遇的提升\nC.有利于企业资源配置的最优化\nD.有利于经营风险的防范\nE.有利于企业无形资产的构建"}, {"question": "分工是为了适应生产率提高的要求而产生的，企业内分工有利于（　）。", "options": [{"label": "A", "text": "劳动者劳动技能的提高"}, {"label": "B", "text": "劳动转换时间的减少"}, {"label": "C", "text": "机器的发明和使用"}, {"label": "D", "text": "生产要素的重组\nE.多技能工人的培养"}], "answer": "A", "analysis": "企业集团结构的优点是：组织规模大、实力强，有利于展开国内外市场的竞争：能够在比较大的范\n围内组织经营资源，有利于企业资源配置的最优化；多角度经营方式的实施有利于防范经营风险，实现较大\n范围的资源共享；有利于企业无形资产的构建和发挥作用。其缺点是：集团最高层对下属企业的控制力较弱\n；集团内部组织结构重叠，管理功能重复；由于规模巨大，企业往往对环境的反应不够灵敏。\n \n72.分工是为了适应生产率提高的要求而产生的，企业内分工有利于（　）。\nA.劳动者劳动技能的提高\nB.劳动转换时间的减少\nC.机器的发明和使用\nD.生产要素的重组\nE.多技能工人的培养"}, {"question": "在新产品的市场试销环节中要特别掌握的数据有（　）。", "options": [{"label": "A", "text": "试用率"}, {"label": "B", "text": "再购率"}, {"label": "C", "text": "购买频率"}, {"label": "D", "text": "市场占有率\nE.分销率"}], "answer": "A", "analysis": "分工是为了适应生产率提高的要求而产生的，而分工和专业化所产生的效率来源于各个劳动者有差\n异的劳动生产能力的充分发挥及劳动者合作所产生的协调力。对此可以从企业内部分工协作和社会分互协作\n两个层面分别加以领会。从企业内部分工协作来看：第一，分工可以使劳动者的劳动技巧获得提高；第二\n，分工能减少劳动转换时间；第三，分工促进了先进劳动工具和机器的发明和使用；第四，分工便于生产要\n素进行重组，从而使各要素充分发挥优势，并相互协调，提高生产效率。\n \n73.在新产品的市场试销环节中要特别掌握的数据有（　）。\nA.试用率\nB.再购率\nC.购买频率\nD.市场占有率\nE.分销率"}, {"question": "当工序能力指数Cp<1时，应当采取的措施有（　）。", "options": [{"label": "A", "text": "努力提高设备精度，并使工艺更为合理和有效，进一步提高操作技能与质量意识，改善原材料质量及提高\n加工性能，使工序能力得到适当的提高"}, {"label": "B", "text": "修订标准，若设计上允许，可降低技术要求，即用放宽公差的方法处理"}, {"label": "C", "text": "为了保证出厂产品的质量，在工序能力不足时，一般应通过全检后剔除不合格品，或实行分级筛选来提高\n产品质量"}, {"label": "D", "text": "采取合并或减少工序等方法\nE.更改设计、提高产品的技术要求"}], "answer": "A", "analysis": "本题考查市场试销。在市场试销过程中要掌握试用率、再购率和购买频率三个数据。\n \n74.当工序能力指数Cp<1时，应当采取的措施有（　）。\nA.努力提高设备精度，并使工艺更为合理和有效，进一步提高操作技能与质量意识，改善原材料质量及提高\n加工性能，使工序能力得到适当的提高\nB.修订标准，若设计上允许，可降低技术要求，即用放宽公差的方法处理\nC.为了保证出厂产品的质量，在工序能力不足时，一般应通过全检后剔除不合格品，或实行分级筛选来提高\n产品质量\nD.采取合并或减少工序等方法\nE.更改设计、提高产品的技术要求"}, {"question": "生产过程组织的原则有（　）。", "options": [{"label": "A", "text": "连续性原则"}, {"label": "B", "text": "比例性原则"}, {"label": "C", "text": "节奏性原则\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16"}, {"label": "D", "text": "刚性原则\nE.准时性原则"}], "answer": "A", "analysis": "当工序能力指数Cp≤1时，意味着产品质量水平低，这时要暂停加工，立即追查原因，并采取以下措\n施：①努力提高设备精度，并使工艺更为合理和有效，进一步提高操作技能与质量意识，改善原材料质量及\n提高加工性能，使工序能力得到适当的提高。②修订标准，若设计上允许，可降低技术要求，即用放宽公差\n的方法处理。③为了保证出厂产品的质量，在工序能力不足时，一般应通过全检后剔除不合格品，或实行分\n级筛选来提高产品质量。\n \n75.生产过程组织的原则有（　）。\nA.连续性原则\nB.比例性原则\nC.节奏性原则\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16\nD.刚性原则\nE.准时性原则"}, {"question": "下列各项中，会影响调查资料的精确程度的有（　）。", "options": [{"label": "A", "text": "观测失真"}, {"label": "B", "text": "抽样失真"}, {"label": "C", "text": "计算误差"}, {"label": "D", "text": "时滞误差\nE.数学模型的构建"}], "answer": "A", "analysis": "合理地组织生产过程必须考虑很多客观要求：①连续性原则。②比例性原则。③节奏性原则。④准\n时|生原则。⑤柔性原则。\n \n76.下列各项中，会影响调查资料的精确程度的有（　）。\nA.观测失真\nB.抽样失真\nC.计算误差\nD.时滞误差\nE.数学模型的构建"}, {"question": "对象专业化的生产单位宜采用（　）。", "options": [{"label": "A", "text": "平行移动方式"}, {"label": "B", "text": "平行顺序移动方式"}, {"label": "C", "text": "顺序移动方式"}, {"label": "D", "text": "混序移动方式\nE.平滑移动方式"}], "answer": "A", "analysis": "本题考查市场预测误差产生的原因。观测失真、抽样失真、计算误差、时滞误差等因素均会影响调\n查资料的精确程度。\n \n77.对象专业化的生产单位宜采用（　）。\nA.平行移动方式\nB.平行顺序移动方式\nC.顺序移动方式\nD.混序移动方式\nE.平滑移动方式"}, {"question": "企业进行生产过程时间组织的目标有（　）。", "options": [{"label": "A", "text": "提高生产率"}, {"label": "B", "text": "降低成本"}, {"label": "C", "text": "节约生产面积"}, {"label": "D", "text": "充分利用车间的空间位置\nE.缩短生产周期"}], "answer": "A", "analysis": "对象专业化的生产单位宜采用平行移动方式或平行顺序移动方式，而工艺专业化的生产单位宜采用\n顺序移动方式。\n \n78.企业进行生产过程时间组织的目标有（　）。\nA.提高生产率\nB.降低成本\nC.节约生产面积\nD.充分利用车间的空间位置\nE.缩短生产周期"}, {"question": "随着我国资本市场的发展，金融工具不断创新，也为企业筹资提供了多种方式，新型的筹资方式包括（", "options": [{"label": "A", "text": "银行借款"}, {"label": "B", "text": "可转换债券"}, {"label": "C", "text": "认股权证"}, {"label": "D", "text": "分离交易可转债\nE.上市融资"}], "answer": "A", "analysis": "生产过程的时间组织就是指在时间上对劳动对象在车间之间、工段之间及工作地之间的运动配合与\n衔接进行合理的安排和设计。其重要目的是最大限度地提高生产过程的连续性和节奏性，达到提高生产率、\n降低成本、缩短生产周期的目标。\n \n79.随着我国资本市场的发展，金融工具不断创新，也为企业筹资提供了多种方式，新型的筹资方式包括（　\n）。\nA.银行借款\nB.可转换债券\nC.认股权证\nD.分离交易可转债\nE.上市融资"}, {"question": "我国企业承担社会责任的必要性包括（　）。", "options": [{"label": "A", "text": "是构建和谐社会的必然要求"}, {"label": "B", "text": "是市场经济体制发展的必然要求"}, {"label": "C", "text": "有利于树立良好的企业形象"}, {"label": "D", "text": "有助于改善监管环境\nE.有利于企业创造广阔的生存空间"}], "answer": "B", "analysis": "新型筹资方式主要有：可转换债券、认股权证和分离交易可转债。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17\n \n80.我国企业承担社会责任的必要性包括（　）。\nA.是构建和谐社会的必然要求\nB.是市场经济体制发展的必然要求\nC.有利于树立良好的企业形象\nD.有助于改善监管环境\nE.有利于企业创造广阔的生存空间"}, {"question": "【不定项选择题】企业的财务报表中包含大量的财务信息，利用这些数据可以得出大量有用的财务比率。", "options": [{"label": "A", "text": "偿债能力比率"}, {"label": "B", "text": "盈利能力比率"}, {"label": "C", "text": "发展能力比率"}, {"label": "D", "text": "负债比率"}], "answer": "A", "analysis": "本题考查我国企业承担社会责任的必要性。我国企业承担社会责任的必要性包括：（1）企业承担社\n会责任是构建和谐社会的必然要求。（2）企业承担社会责任是市场经济体制发展的必然要求。（3）企业承\n担社会责任有利于树立良好的企业形象。（4）企业承担社会责任有利于企业创造广阔的生存空间。（5）企\n业承担社会责任有利于企业员工形成共同的企业价值观。（6）企业承担社会责任有利于保证企业正确的经营\n方向。\n \n共享题干题\n【题干】某机械设备股份有限公司2020年主要财务数据见下表。\n \n \n81.【不定项选择题】企业的财务报表中包含大量的财务信息，利用这些数据可以得出大量有用的财务比率。\n其财务比率大致包括（　）等方面。\nA.偿债能力比率\nB.盈利能力比率\nC.发展能力比率\nD.负债比率"}, {"question": "【不定项选择题】企业现金流动负债比率是指（　）。", "options": [{"label": "A", "text": "经营活动产生的现金流量净额÷流动负债"}, {"label": "B", "text": "经营活动产生的现金流量净额÷年末流动负债"}, {"label": "C", "text": "经营活动产生的现金流量净额÷负债合计"}, {"label": "D", "text": "经营活动产生的现金流量净额÷年末流动资产"}], "answer": "A", "analysis": "财务比率大致包括四个方面，即偿债能力比率、营运能力比率、盈利能力比率、发展能力比率。\n \n82.【不定项选择题】企业现金流动负债比率是指（　）。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n18\nA.经营活动产生的现金流量净额÷流动负债\nB.经营活动产生的现金流量净额÷年末流动负债\nC.经营活动产生的现金流量净额÷负债合计\nD.经营活动产生的现金流量净额÷年末流动资产"}, {"question": "009，-0.009)。某", "options": [{"label": "A", "text": "0.64"}, {"label": "B", "text": "1.00"}, {"label": "C", "text": "1.18"}, {"label": "D", "text": "1.41"}], "answer": "A", "analysis": "企业现金流动负债比率=经营活动产生的现金流量净额÷流动负债。\n \n【题干】在生产某零件的过程中，已知设计尺寸为5毫米，生产过程中所允许的误差为(+0.009，-0.009)。某\n道工序是保证该齿轮上述设计尺寸的最后加工工序，现在需要对该工序的工序能力进行评估。通过对该齿轮\n产品的随机抽样，经测算，样本平均值和公差在中心重合，样本标准差s=0.0047。\n \n83.【不定项选择题】该工序的工序能力指数CP为（　）。\nA.0.64\nB.1.00\nC.1.18\nD.1.41"}, {"question": "【不定项选择题】可以断定该工序的工序能力为（　）。", "options": [{"label": "A", "text": "不足"}, {"label": "B", "text": "正常"}, {"label": "C", "text": "充足"}, {"label": "D", "text": "严重不足"}], "answer": "A", "analysis": "式中，TU为公差的上限；TL为公差的下限；S为样本标准差。\n \n84.【不定项选择题】可以断定该工序的工序能力为（　）。\nA.不足\nB.正常\nC.充足\nD.严重不足"}, {"question": "67时，工序能力过剩；当1.67≥Cp>1.33时，工序能力充足", "options": [{"label": "A", "text": "工具"}, {"label": "B", "text": "机修"}, {"label": "C", "text": "动力"}, {"label": "D", "text": "市场需求"}], "answer": "D", "analysis": "工序能力指数判断标准如下：当Cp>1.67时，工序能力过剩；当1.67≥Cp>1.33时，工序能力充足\n；当1.33≥Cp>1时，工序能力正常；当1≥Cp>0.67时，工序能力不足；当Cp≤0.67时，工序能力严重不足。\n \n85.【不定项选择题】在该零件的生产过程中，影响工序质量的因素可能是（　）。\nA.工具\nB.机修\nC.动力\nD.市场需求"}, {"question": "【不定项选择题】影响质量的因素可以分为两大类，分别是（　）。", "options": [{"label": "A", "text": "偶然性因素"}, {"label": "B", "text": "必然性因素"}, {"label": "C", "text": "系统性因素"}, {"label": "D", "text": "系统外因素"}], "answer": "A", "analysis": "工具、机器维修、动力都是与工序生产直接相关的因素，会影响工序质量；市场需求会影响产品的\n销售，但不会影响工序质量。\n \n86.【不定项选择题】影响质量的因素可以分为两大类，分别是（　）。\nA.偶然性因素\nB.必然性因素\nC.系统性因素\nD.系统外因素"}, {"question": "【不定项选择题】质量控制方法除了工序能力分析法外，还有（　）。", "options": [{"label": "A", "text": "德尔菲法"}, {"label": "B", "text": "分层法"}, {"label": "C", "text": "调查表法"}, {"label": "D", "text": "两图两表法"}], "answer": "A", "analysis": "影响质量的因素可以分为偶然性因素和系统性因素。\n \n87.【不定项选择题】质量控制方法除了工序能力分析法外，还有（　）。\nA.德尔菲法\nB.分层法\nC.调查表法\nD.两图两表法"}, {"question": "【不定项选择题】如果采用平行顺序移动方式进行零件生产，将一个批次的该种零件全部生产出来的时间", "options": [{"label": "A", "text": "245"}, {"label": "B", "text": "300"}, {"label": "C", "text": "325"}, {"label": "D", "text": "350"}], "answer": "B", "analysis": "常见的质量控制方法包括分层法、调查表法、散布图、排列图等。\n \n【题干】某企业批量生产一种零件，投产批量为6件，有4道加工工序，按照加工顺序，单件每道工序作业时\n间依次为20分钟、10分钟、25分钟、15分钟，假设零件移动用时为零。\n \n88.【不定项选择题】如果采用平行顺序移动方式进行零件生产，将一个批次的该种零件全部生产出来的时间\n是（　）分钟。\nA.245\nB.300\nC.325\nD.350"}, {"question": "【不定项选择题】将一个批次的该种零件全部生产出来所需要的最短时间为（　）分钟。", "options": [{"label": "A", "text": "120"}, {"label": "B", "text": "135"}, {"label": "C", "text": "145"}, {"label": "D", "text": "195"}], "answer": "A", "analysis": "i道工序的单件工时；m为加工工序的道数；n为批量；t较大为比相邻工序单件工时均大的工序的单件工时\n；t较小为比相邻工序单件工时均小的工序的单件工时。\n \n89.【不定项选择题】将一个批次的该种零件全部生产出来所需要的最短时间为（　）分钟。\nA.120\nB.135\nC.145\nD.195"}, {"question": "【不定项选择题】将一个批次的该种零件全部生产出来，工序间搬运次数最多的零件移动方式是（　）。", "options": [{"label": "A", "text": "顺序移动方式"}, {"label": "B", "text": "平行移动方式"}, {"label": "C", "text": "平行顺序移动方式"}, {"label": "D", "text": "交叉移动方式"}], "answer": "D", "analysis": "平行移动方式的特点就是使得生产周期最短，计算过程为：\n(20+10+25+15)+5×25=195(分钟)。式中，ti为第i道工序的单件工时；t1为单件工时最长的工序的单件工时\n。\n \n90.【不定项选择题】将一个批次的该种零件全部生产出来，工序间搬运次数最多的零件移动方式是（　）。\nA.顺序移动方式\nB.平行移动方式\nC.平行顺序移动方式\nD.交叉移动方式"}, {"question": "【不定项选择题】为了确保设备在一个批次的零件加工过程中不出现停顿，该企业应采用的工序间零件移", "options": [{"label": "A", "text": "顺序移动方式"}, {"label": "B", "text": "平行移动方式"}, {"label": "C", "text": "平行顺序移动方式"}, {"label": "D", "text": "交叉移动方式"}], "answer": "B", "analysis": "平行移动方式的缺点就是运输次数多。\n \n91.【不定项选择题】为了确保设备在一个批次的零件加工过程中不出现停顿，该企业应采用的工序间零件移\n动方式是（　）。\nA.顺序移动方式\nB.平行移动方式\nC.平行顺序移动方式\nD.交叉移动方式"}, {"question": "【不定项选择题】如果该企业采取平行移动方式进行零件移动，则有利于（　）。", "options": [{"label": "A", "text": "提高产品质量"}, {"label": "B", "text": "保护生产设备"}, {"label": "C", "text": "减少工序间搬运次数"}, {"label": "D", "text": "缩短生产周期"}], "answer": "A", "analysis": "顺序移动方式和平行顺序移动方式的优点都在于不发生停顿现象，使设备能连续、正常运转。\n \n92.【不定项选择题】如果该企业采取平行移动方式进行零件移动，则有利于（　）。\nA.提高产品质量\nB.保护生产设备\nC.减少工序间搬运次数\nD.缩短生产周期"}, {"question": "【不定项选择题】表中数据所源自的财务报表是（　）。", "options": [{"label": "A", "text": "资产负债表"}, {"label": "B", "text": "工资表"}, {"label": "C", "text": "生产作业计划表"}, {"label": "D", "text": "利润表"}], "answer": "D", "analysis": "平行移动方式最大的优点在于缩短生产周期。\n \n【题干】某机械设备股份有限公司2020年主要财务数据见下表。\n \n \n93.【不定项选择题】表中数据所源自的财务报表是（　）。\nA.资产负债表\nB.工资表\nC.生产作业计划表\nD.利润表"}, {"question": "【不定项选择题】根据表中数据，该公司2020年的流动比率为（　）。", "options": [{"label": "A", "text": "1.36"}, {"label": "B", "text": "2"}, {"label": "C", "text": "1.46"}, {"label": "D", "text": "1.58"}], "answer": "A", "analysis": "表中前三项源自损益表(利润表)，后六项源自资产负债表。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n21\n \n94.【不定项选择题】根据表中数据，该公司2020年的流动比率为（　）。\nA.1.36\nB.2\nC.1.46\nD.1.58"}, {"question": "8÷2.8≈1.36。", "options": [{"label": "A", "text": "20％"}, {"label": "B", "text": "30％"}, {"label": "C", "text": "35％"}, {"label": "D", "text": "50％"}], "answer": "A", "analysis": "流动比率=流动资产÷流动负债=3.8÷2.8≈1.36。\n \n95.【不定项选择题】根据表中数据，该公司2020年年末的资产负债率为（　）。\nA.20％\nB.30％\nC.35％\nD.50％"}, {"question": "2÷8.4×100％=50％。", "options": [{"label": "A", "text": "0.8"}, {"label": "B", "text": "1.2"}, {"label": "C", "text": "1.5"}, {"label": "D", "text": "4.0"}], "answer": "D", "analysis": "资产负债率=负债合计÷资产合计×100％=4.2÷8.4×100％=50％。\n \n96.【不定项选择题】根据表中数据，该公司2020年的应收账款周转次数为（　）次／年。\nA.0.8\nB.1.2\nC.1.5\nD.4.0"}, {"question": "2÷2.8=1.5(年／次)。", "options": [{"label": "A", "text": "应收账款周转天数减少"}, {"label": "B", "text": "长期股权投资收益提高"}, {"label": "C", "text": "应付账款减少"}, {"label": "D", "text": "营业成本减少"}], "answer": "C", "analysis": "应收账款周转次数=营业收入÷平均应收账款余额=4.2÷2.8=1.5(年／次)。\n \n97.【不定项选择题】如果该公司应收账款周转次数增加，说明公司（　）。\nA.应收账款周转天数减少\nB.长期股权投资收益提高\nC.应付账款减少\nD.营业成本减少"}, {"question": "【不定项选择题】如果该公司本年度的主营业务收入净额为16.25亿元，则该公司应收账款周转次数为", "options": [{"label": "A", "text": "1.12"}, {"label": "B", "text": "1.21\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n22"}, {"label": "C", "text": "1.41"}, {"label": "D", "text": "1.5"}], "answer": "A", "analysis": "从应收账款周转天数\n可知，如果该公司应收账款周转次数增加，则应收账款天数会减少。\n \n【题干】某公司简化的2020年度资产负债表见下表。\n \n \n98.【不定项选择题】如果该公司本年度的主营业务收入净额为16.25亿元，则该公司应收账款周转次数为\n（　）次／年。\nA.1.12\nB.1.21\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n22\nC.1.41\nD.1.5"}, {"question": "25÷11.5≈1.41(次／年)。", "options": [{"label": "A", "text": "3"}, {"label": "B", "text": "1.86"}, {"label": "C", "text": "1.67"}, {"label": "D", "text": "1.42"}], "answer": "C", "analysis": "应收账款周转次数=营业收入÷平均应收账款余额=16.25÷11.5≈1.41(次／年)。\n \n99.【不定项选择题】根据所给材料，该公司期末速动比率为（　）。\nA.3\nB.1.86\nC.1.67\nD.1.42"}, {"question": "67。", "options": [{"label": "A", "text": "现金流量表"}, {"label": "B", "text": "资产负债表"}, {"label": "C", "text": "年度财务计划表"}, {"label": "D", "text": "损益表"}], "answer": "C", "analysis": "速动比率=(流动资产一存货)÷流动负债=(290—90)÷120≈1.67。\n \n100.【不定项选择题】企业的主要财务报表包括（　）。\nA.现金流量表\nB.资产负债表\nC.年度财务计划表\nD.损益表"}]}, "考前点题": {"考前点题（1-50题）": [{"question": "按生产要素密集程度划分，投资大、技术装备程度较高、劳动力比重小的企业属于（　）。", "options": [{"label": "A", "text": "劳动密集型企业"}, {"label": "B", "text": "设备密集型企业"}, {"label": "C", "text": "资金密集型企业"}, {"label": "D", "text": "知识密集型企业"}], "answer": "D", "analysis": "本题考查企业的概念。企业必须拥有一定的资源，这是企业能够独立从事生产经营活动，为社会提\n供商品和服务的基本物质条件。\n \n2.按生产要素密集程度划分，投资大、技术装备程度较高、劳动力比重小的企业属于（　）。\nA.劳动密集型企业\nB.设备密集型企业\nC.资金密集型企业\nD.知识密集型企业"}, {"question": "有限责任公司的股东以其（　）为限对公司承担责任。", "options": [{"label": "A", "text": "全部资产数额"}, {"label": "B", "text": "全部法人资产"}, {"label": "C", "text": "对公司的出资额"}, {"label": "D", "text": "持有公司股票的市值"}], "answer": "C", "analysis": "本题考查企业的类型。按照生产要素密集程度划分，企业可以分为劳动密集型企业、资金密集型企\n业以及知识密集型企业。其中，资金密集型企业是指投资大、技术装备程度较高、劳动力比重小的企业。\n \n3.有限责任公司的股东以其（　）为限对公司承担责任。\nA.全部资产数额\nB.全部法人资产\nC.对公司的出资额\nD.持有公司股票的市值"}, {"question": "关于企业管理的社会属性，下列说法正确的是（　）。", "options": [{"label": "A", "text": "与生产力、社会化大生产相联系"}, {"label": "B", "text": "与生产关系、社会制度相联系"}, {"label": "C", "text": "与自然资源、人口资源相联系"}, {"label": "D", "text": "与经济发展、社会进步相联系"}], "answer": "C", "analysis": "本题考查公司制企业的特征。公司制企业实行有限责任制度。有限责任包含两层含义：一是对股东\n而言，是以股东的出资额为限，对公司的债务承担有限责任；二是对公司法人而言，是以其全部法人财产为\n限，对公司债务承担有限责任。\n \n4.关于企业管理的社会属性，下列说法正确的是（　）。\nA.与生产力、社会化大生产相联系\nB.与生产关系、社会制度相联系\nC.与自然资源、人口资源相联系\nD.与经济发展、社会进步相联系"}, {"question": "领导者检查、监督企业活动的实际进展情况，及时发现偏差，分析原因并纠正，确保企业目标顺利实现", "options": [{"label": "A", "text": "组织职能"}, {"label": "B", "text": "控制职能"}, {"label": "C", "text": "协调职能"}, {"label": "D", "text": "计划职能\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n1"}], "answer": "B", "analysis": "本题考查企业管理的基本性质。企业管理具有二重性。一方面，它具有与生产力、社会化大生产相\n联系的自然属性。另一方面它具有与生产关系、社会制度相联系的社会属性。根据题目信息可知，B选项符合\n题意。\n \n5.领导者检查、监督企业活动的实际进展情况，及时发现偏差，分析原因并纠正，确保企业目标顺利实现\n，这体现了企业管理职能中的（　）。\nA.组织职能\nB.控制职能\nC.协调职能\nD.计划职能\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n1"}, {"question": "在企业管理的标准化工作中，企业标准的主体是（　）。", "options": [{"label": "A", "text": "工作标准"}, {"label": "B", "text": "技术标准"}, {"label": "C", "text": "安全标准"}, {"label": "D", "text": "管理标准"}], "answer": "B", "analysis": "本题考查企业管理职能。控制职能是指领导者检查、监督企业活动的实际进展情况，及时发现偏差\n，分析原因并纠正，确保企业目标顺利实现的过程。\n \n6.在企业管理的标准化工作中，企业标准的主体是（　）。\nA.工作标准\nB.技术标准\nC.安全标准\nD.管理标准"}, {"question": "管理幅度是指一个主管能够直接有效地指挥和监督下属的（　）。", "options": [{"label": "A", "text": "能力"}, {"label": "B", "text": "层级"}, {"label": "C", "text": "数量"}, {"label": "D", "text": "职级"}], "answer": "B", "analysis": "本题考查企业管理的基础工作。按照性质划分，企业的标准主要有技术标准、管理标准、工作标准\n。技术标准是人类从事社会化大生产的共同的技术依据，是企业标准的主体。\n \n7.管理幅度是指一个主管能够直接有效地指挥和监督下属的（　）。\nA.能力\nB.层级\nC.数量\nD.职级"}, {"question": "关于授权，下列说法正确的是（　）。", "options": [{"label": "A", "text": "授权等同于分权"}, {"label": "B", "text": "授权中，被授权者不承担相应的责任"}, {"label": "C", "text": "授权者与被授权者之间不存在着上下级之间的监督与报告关系"}, {"label": "D", "text": "授权完全在组织内上下级之间进行"}], "answer": "C", "analysis": "本题考查管理幅度的定义。管理幅度是指一个主管能够直接有效地指挥和监督下属的数量。\n \n8.关于授权，下列说法正确的是（　）。\nA.授权等同于分权\nB.授权中，被授权者不承担相应的责任\nC.授权者与被授权者之间不存在着上下级之间的监督与报告关系\nD.授权完全在组织内上下级之间进行"}, {"question": "为实现“事事有人负责”和“事事有条件负责”的愿景，企业的组织设计需要遵循的原则是（　）。", "options": [{"label": "A", "text": "统一指挥原则"}, {"label": "B", "text": "权责对等原则"}, {"label": "C", "text": "分工与协作原则"}, {"label": "D", "text": "精简原则"}], "answer": "D", "analysis": "本题考查授权过程中应该注意区分的问题。A选项错误，授权不同于分权。授权主要是权力的授予与\n责任的确立，是上下级之间短期的权责授予关系，而分权是授权的延伸，是在组织中系统性地长期授权。B选\n项错误，在授权中，被授权者承担相应的责任。C选项错误，授权者与被授权者之间存在着上下级之间的监督\n与报告关系。D选项正确，授权不是在平级中间实施的行为，其完全是在组织内上下级之间进行。\n \n9.为实现“事事有人负责”和“事事有条件负责”的愿景，企业的组织设计需要遵循的原则是（　）。\nA.统一指挥原则\nB.权责对等原则\nC.分工与协作原则\nD.精简原则"}, {"question": "既有按垂直管理要求设置的纵向组织结构，又有按规划项目划分的横向组织结构，这种组织结构形式被称", "options": [{"label": "A", "text": "事业部制"}, {"label": "B", "text": "直线职能制\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n2"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "职能制"}], "answer": "B", "analysis": "本题考查组织设计需要遵循的原则。权责对等原则是指企业中每一个职务和部门都有必须完成的任\n务。而要顺利完成这些任务就需要利用一定的人力、财力、物力等资源，这是企业人员责任与权力的统一\n，是企业“事事有人负责”和“事事有条件负责”的基本前提。\n \n10.既有按垂直管理要求设置的纵向组织结构，又有按规划项目划分的横向组织结构，这种组织结构形式被称\n为（　）。\nA.事业部制\nB.直线职能制\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n2\nC.矩阵制\nD.职能制"}, {"question": "两个企业在几个具体领域依据文字协议进行合作，但合作双方没有股权的参与。这种战略联盟是（　）。", "options": [{"label": "A", "text": "功能协议式联盟"}, {"label": "B", "text": "股权参与式联盟"}, {"label": "C", "text": "框架协议式联盟"}, {"label": "D", "text": "合资企业式联盟"}], "answer": "C", "analysis": "本题考查矩阵制的定义。矩阵制又叫目标规划管理制，其特点是既有按垂直管理要求设置的纵向组\n织结构，又有按规划项目划分的横向组织结构。\n \n11.两个企业在几个具体领域依据文字协议进行合作，但合作双方没有股权的参与。这种战略联盟是（　）。\nA.功能协议式联盟\nB.股权参与式联盟\nC.框架协议式联盟\nD.合资企业式联盟"}, {"question": "针对企业员工的价值观、态度、期望、信仰，以及目标和追求等方面所进行的变革，属于企业的（　）。", "options": [{"label": "A", "text": "技术变革"}, {"label": "B", "text": "服务变革"}, {"label": "C", "text": "文化变革"}, {"label": "D", "text": "战略变革"}], "answer": "A", "analysis": "本题考查战略联盟的形式。战略联盟有五种基本形式：①合资企业式联盟。是一个具有独立地位和\n管理机构的经济实体。②功能协议式联盟。两个或两个以上企业在一个或几个具体领域依据文字协议进行合\n作。③股权参与式联盟。购买合伙企业一部分股权是另一种联盟战略。合伙双方通常需要制定一些协议，以\n利用双方在特定领域的互补性优势。④框架协议式联盟。许多战略联盟在开始时只有很宽泛的合作纲要，然\n后再在合作过程中补充具体产品、技术或某一领域的合作合同。⑤同业俱乐部联盟。同业俱乐部联盟是一种\n成员制的企业间多边联盟，任何一个企业都可以自由出入同业俱乐部。\n \n12.针对企业员工的价值观、态度、期望、信仰，以及目标和追求等方面所进行的变革，属于企业的（　）。\nA.技术变革\nB.服务变革\nC.文化变革\nD.战略变革"}, {"question": "零售商利用顾客求廉心理，将某些商品价格定得很低，用以吸引顾客光顾店铺，进而带动顾客购买其他正", "options": [{"label": "A", "text": "声望定价"}, {"label": "B", "text": "尾数定价"}, {"label": "C", "text": "习惯定价"}, {"label": "D", "text": "招徕定价"}], "answer": "C", "analysis": "本题考查企业变革的战略类型。文化变革是指针对企业员工的价值观、态度、期望、信仰，以及目\n标和追求等方面所进行的变革。\n \n13.零售商利用顾客求廉心理，将某些商品价格定得很低，用以吸引顾客光顾店铺，进而带动顾客购买其他正\n常商品的定价策略属于（　）。\nA.声望定价\nB.尾数定价\nC.习惯定价\nD.招徕定价"}, {"question": "企业先将产品供应给零售商，再由零售商销售给最终消费者，该企业采用的渠道属于（　）。", "options": [{"label": "A", "text": "零阶渠道"}, {"label": "B", "text": "一阶渠道"}, {"label": "C", "text": "二阶渠道"}, {"label": "D", "text": "三阶渠道"}], "answer": "D", "analysis": "本题考查定价策略。招徕定价是零售商利用顾客求廉心理，将某些商品价格定得很低，用以吸引顾\n客光顾店铺，进而带动顾客购买其他正常商品的定价策略。例如，一些商店随机推出的特价商品的定价。\n \n14.企业先将产品供应给零售商，再由零售商销售给最终消费者，该企业采用的渠道属于（　）。\nA.零阶渠道\nB.一阶渠道\nC.二阶渠道\nD.三阶渠道"}, {"question": "某饮料企业通过市场调查，对碳酸饮料未来的市场前景进行了研判与推断，根据市场调查的目的进行分类", "options": [{"label": "A", "text": "描述性市场调查"}, {"label": "B", "text": "探索性市场调查"}, {"label": "C", "text": "因果性市场调查"}, {"label": "D", "text": "预测性市场调查"}], "answer": "B", "analysis": "本题考查分销渠道的分类。一阶渠道是指商品从生产者转移到最终消费者手中，需要经过一个中间\n环节。这个中间环节可能是零售商，也可能是代理商。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3\n \n15.某饮料企业通过市场调查，对碳酸饮料未来的市场前景进行了研判与推断，根据市场调查的目的进行分类\n，该企业进行的这种市场调查属于（　）。\nA.描述性市场调查\nB.探索性市场调查\nC.因果性市场调查\nD.预测性市场调查"}, {"question": "某城市共有300家家政服务公司，其中大型公司30家，中型公司50家，小型公司220家。当抽取180家进行", "options": [{"label": "A", "text": "28"}, {"label": "B", "text": "18"}, {"label": "C", "text": "30"}, {"label": "D", "text": "16"}], "answer": "D", "analysis": "本题考查市场调查的分类。根据题目信息“对碳酸饮料未来的市场前景进行了研判与推断”可知符\n合预测性市场调查的概念。\n \n16.某城市共有300家家政服务公司，其中大型公司30家，中型公司50家，小型公司220家。当抽取180家进行\n市场调查时，若采用分层比例抽样法，应抽取大型公司（　）家。\nA.28\nB.18\nC.30\nD.16"}, {"question": "某企业为了解当地6500个家庭的消费品支出情况，采用抽样方法抽取600个家庭进行市场调查。被抽取的", "options": [{"label": "A", "text": "总体"}, {"label": "B", "text": "抽样总体"}, {"label": "C", "text": "抽样框"}, {"label": "D", "text": "总体单位"}], "answer": "B", "analysis": "本题考查分层比例抽样的计算。大型公司应抽取：30÷300×180＝18（家）。\n \n17.某企业为了解当地6500个家庭的消费品支出情况，采用抽样方法抽取600个家庭进行市场调查。被抽取的\n这600个家庭称为（　）。\nA.总体\nB.抽样总体\nC.抽样框\nD.总体单位"}, {"question": "某公司用实验组事前事后对比实验来测试该公司生产的化妆品改用新包装后的效果。使用原包装时，该化", "options": [{"label": "A", "text": "7700"}, {"label": "B", "text": "3850"}, {"label": "C", "text": "700"}, {"label": "D", "text": "350\n29"}], "answer": "B", "analysis": "本题考查抽样总体的概念。抽样总体简称样本，是从总体中抽取的一部分单位（个体）的集合。\n \n18.某公司用实验组事前事后对比实验来测试该公司生产的化妆品改用新包装后的效果。使用原包装时，该化\n妆品一个月销量3500件，换为新包装后，该化妆品一个月销量4200件，则该实验的实验变数效果为（　）件\n。\nA.7700\nB.3850\nC.700\nD.350\n29"}, {"question": "已知某企业2021年销售中央空调750套。调查人员通过对历史数据的研究估算出未来各种影响产品销量因", "options": [{"label": "A", "text": "932.5"}, {"label": "B", "text": "940\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n4"}, {"label": "C", "text": "965"}, {"label": "D", "text": "952.5"}], "answer": "C", "analysis": "本题考查实验组事前事后对比实验。实验变数效果＝4200－3500＝700（件）。\n \n19.已知某企业2021年销售中央空调750套。调查人员通过对历史数据的研究估算出未来各种影响产品销量因\n素的影响程度为：降低价格可使销量增加30%；国家经济政策变动使销量减少10%；产品规格不全使销量减少\n5%；居民收入增加可使销量增加20%；同类产品竞争可使销量减少8%。则利用基数迭加法预测2022年该企业中\n央空调的销售量为（　）套。\nA.932.5\nB.940\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n4\nC.965\nD.952.5"}, {"question": "5（套）。", "options": [{"label": "A", "text": "生产技术准备过程"}, {"label": "B", "text": "基本生产过程"}, {"label": "C", "text": "辅助生产过程"}, {"label": "D", "text": "生产服务过程"}], "answer": "D", "analysis": "本题考查基数迭加法。根据题目信息，利用基数迭加法预测的空调销售量\n＝750×（1＋30%－10%－5%＋20%－8%）＝952.5（套）。\n \n20.机械制造企业设计工艺装备的活动属于（　）。\nA.生产技术准备过程\nB.基本生产过程\nC.辅助生产过程\nD.生产服务过程"}, {"question": "为了保证在生产过程中各个阶段在相同的时间间隔内生产大致相同或递增数量的产品，以避免出现前松后", "options": [{"label": "A", "text": "连续性原则"}, {"label": "B", "text": "节奏性原则"}, {"label": "C", "text": "比例性原则"}, {"label": "D", "text": "柔性原则"}], "answer": "A", "analysis": "本题考查生产技术准备过程。生产技术准备过程是指产品在投入生产前所进行的一系列生产技术准\n备工作，如产品设计、工业设计、工艺装备的设计、标准化工作、定额工作、调整劳动组织和设备布置等。\n \n21.为了保证在生产过程中各个阶段在相同的时间间隔内生产大致相同或递增数量的产品，以避免出现前松后\n紧等现象，企业必须遵循（　）。\nA.连续性原则\nB.节奏性原则\nC.比例性原则\nD.柔性原则"}, {"question": "某公司拟建一个加工厂，该加工厂每年需要由A地运来物资100吨，由B地运来物资180吨，由C地运来物资", "options": [{"label": "A", "text": "（49.8，39.8）"}, {"label": "B", "text": "（50.0，42.8）"}, {"label": "C", "text": "（52.5，30.3）"}, {"label": "D", "text": "（60.0，50.0）"}], "answer": "B", "analysis": "本题考查生产过程组织的合理要求。生产过程的节奏性也可称为均衡性，是指产品在生产过程中各\n个阶段，从投料到最后完工入库，能保证按计划、有节奏、均衡地进行，要求在相同的时间间隔内，生产大\n致相同数量或递增数量的产品，避免前松后紧或者前紧后松等现象。\n \n22.某公司拟建一个加工厂，该加工厂每年需要由A地运来物资100吨，由B地运来物资180吨，由C地运来物资\n800吨，并运出物资240吨到D地，A、B、C、D的坐标分别为（30，50）、（20，20）、（50，40）、\n（80，50），假定各种物资每吨公里的运输费用相同，根据重心法，建厂的地理位置坐标应是（　）。\nA.（49.8，39.8）\nB.（50.0，42.8）\nC.（52.5，30.3）\nD.（60.0，50.0）"}, {"question": "8，39.8）（公里）的地方建厂比较合适。", "options": [{"label": "A", "text": "固定布置\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5"}, {"label": "B", "text": "工艺专业化布置"}, {"label": "C", "text": "对象专业化布置"}, {"label": "D", "text": "混合式布置"}], "answer": "A", "analysis": "本题考查重心法计算。\n根据计算公式得：\n \n \n根据计算，在坐标为（49.8，39.8）（公里）的地方建厂比较合适。\n \n23.汽车生产企业的装配流水线车间所采用的生产过程空间组织形式是（　）。\nA.固定布置\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5\nB.工艺专业化布置\nC.对象专业化布置\nD.混合式布置"}, {"question": "某企业接到一个零件加工订单，要求生产周期越短越好，忽略其他因素，只考虑零件在工序间的移动方式", "options": [{"label": "A", "text": "平行移动方式"}, {"label": "B", "text": "顺序移动方式"}, {"label": "C", "text": "平行顺序移动方式"}, {"label": "D", "text": "交叉移动方式"}], "answer": "C", "analysis": "本题考查生产过程空间组织的形式。流水生产线按对象专业化原则组织，线上的加工对象是固定的\n，工作地的专业化程度较高，因此流水线一般具有较高的生产率。\n \n24.某企业接到一个零件加工订单，要求生产周期越短越好，忽略其他因素，只考虑零件在工序间的移动方式\n，该企业应采用（　）。\nA.平行移动方式\nB.顺序移动方式\nC.平行顺序移动方式\nD.交叉移动方式"}, {"question": "关于流水生产线的说法，错误的是（　）。", "options": [{"label": "A", "text": "流水生产线的加工对象是固定的，工作地的专业化程度较高"}, {"label": "B", "text": "流水生产线上各工序的工作地数量与该工序单件工时成反比"}, {"label": "C", "text": "流水生产线的各工作地按工艺过程的顺序排列"}, {"label": "D", "text": "流水生产线上各道工序具有大体相等的生产率"}], "answer": "A", "analysis": "本题考查三种移动方式的比较。平行移动方式的突出优点是充分利用平行作业的可能，使生产周期\n达到最短。\n \n25.关于流水生产线的说法，错误的是（　）。\nA.流水生产线的加工对象是固定的，工作地的专业化程度较高\nB.流水生产线上各工序的工作地数量与该工序单件工时成反比\nC.流水生产线的各工作地按工艺过程的顺序排列\nD.流水生产线上各道工序具有大体相等的生产率"}, {"question": "企业把需要的人、事、物加以定量和定位，这种活动属于“5S”活动的（　）内容。", "options": [{"label": "A", "text": "整理"}, {"label": "B", "text": "整顿"}, {"label": "C", "text": "清洁"}, {"label": "D", "text": "反省"}], "answer": "B", "analysis": "本题考查流水线的特征。流水生产线的特征之一是：线上的设备和工艺、装备是针对加工对象的工\n艺要求配置的，一般能封闭地完成加工对象的全部生产工艺，线上各工序的工作地数量与该工序单件工时的\n比值保持一致，即各工序的生产能力符合比例性的要求。\n \n26.企业把需要的人、事、物加以定量和定位，这种活动属于“5S”活动的（　）内容。\nA.整理\nB.整顿\nC.清洁\nD.反省"}, {"question": "企业的顾客和其他相关方可能对同一产品的功能提出不同的要求，这体现了产品质量的（　）。", "options": [{"label": "A", "text": "经济性"}, {"label": "B", "text": "相对性"}, {"label": "C", "text": "狭义性"}, {"label": "D", "text": "时效性"}], "answer": "B", "analysis": "本题考查5S管理。整顿就是把需要的人、事、物加以定量、定位。\n \n27.企业的顾客和其他相关方可能对同一产品的功能提出不同的要求，这体现了产品质量的（　）。\nA.经济性\nB.相对性\nC.狭义性\nD.时效性"}, {"question": "实施全面质量管理遵循的“五步法”包含的内容是（　）。", "options": [{"label": "A", "text": "计划、决策、准备、开始、冻结\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n6"}, {"label": "B", "text": "决策、开始、扩展、综合、结束"}, {"label": "C", "text": "决策、准备、开始、扩展、综合"}, {"label": "D", "text": "计划、准备、开始、扩展、总结"}], "answer": "B", "analysis": "本题考查质量的特性。质量的相对性：组织的顾客和其他相关方可能对同一产品的功能提出不同的\n需求，也可能对同一产品的同一功能提出不同的需求。\n \n28.实施全面质量管理遵循的“五步法”包含的内容是（　）。\nA.计划、决策、准备、开始、冻结\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n6\nB.决策、开始、扩展、综合、结束\nC.决策、准备、开始、扩展、综合\nD.计划、准备、开始、扩展、总结"}, {"question": "下列关于质量管理的说法，错误的是（　）。", "options": [{"label": "A", "text": "围绕产品质量形成的全过程实施质量管理是组织各项工作的主线"}, {"label": "B", "text": "质量管理仅涉及组织的生产活动"}, {"label": "C", "text": "质量管理是指从质量方面指挥和控制组织的协调活动"}, {"label": "D", "text": "质量管理的环节包括制定质量方针和质量目标、质量策划、质量控制、质量保证和质量改进"}], "answer": "C", "analysis": "本题考查全面质量管理实施的工作程序。实施全面质量管理遵循的“五步法”包含的内容是决策、\n准备、开始、扩展、综合。\n \n29.下列关于质量管理的说法，错误的是（　）。\nA.围绕产品质量形成的全过程实施质量管理是组织各项工作的主线\nB.质量管理仅涉及组织的生产活动\nC.质量管理是指从质量方面指挥和控制组织的协调活动\nD.质量管理的环节包括制定质量方针和质量目标、质量策划、质量控制、质量保证和质量改进"}, {"question": "将质量检验划分为破坏性检验和非破坏性检验的依据是（　）。", "options": [{"label": "A", "text": "检验实施的位置"}, {"label": "B", "text": "检验的目的"}, {"label": "C", "text": "检验对象检验后的状态"}, {"label": "D", "text": "检验的数量特征"}], "answer": "B", "analysis": "本题考查质量管理的定义。B选项错误，质量管理涉及组织的各个方面，是否有效地实施质量管理关\n系到组织的兴衰。\n \n30.将质量检验划分为破坏性检验和非破坏性检验的依据是（　）。\nA.检验实施的位置\nB.检验的目的\nC.检验对象检验后的状态\nD.检验的数量特征"}, {"question": "下列质量认证类型中，不以产品为检测对象的是（　）。", "options": [{"label": "A", "text": "型式试验"}, {"label": "B", "text": "工厂质量管理体系评定"}, {"label": "C", "text": "批量检验"}, {"label": "D", "text": "全数检验"}], "answer": "C", "analysis": "本题考查质量检验的方式。按检验对象检验后的状态特征，可将质量检验划分为破坏性检验和非破\n坏性检验。\n \n31.下列质量认证类型中，不以产品为检测对象的是（　）。\nA.型式试验\nB.工厂质量管理体系评定\nC.批量检验\nD.全数检验"}, {"question": "实施全面质量管理时，推动PDCA循环的关键阶段是（　）。", "options": [{"label": "A", "text": "P阶段"}, {"label": "B", "text": "D阶段"}, {"label": "C", "text": "C阶段"}, {"label": "D", "text": "A阶段"}], "answer": "B", "analysis": "本题考查质量认证的类型。工厂质量管理体系评定：这种认证制度是对工厂按既定规范或技术标准\n生产产品的质量管理体系进行检查、评定，亦称为质量管理体系认证。这种认证制度的对象不是产品，而是\n企业的质量管理体系。\n \n32.实施全面质量管理时，推动PDCA循环的关键阶段是（　）。\nA.P阶段\nB.D阶段\nC.C阶段\nD.A阶段"}, {"question": "企业运用新的技术成果，对产品的材料、加工制造的方法、技术和过程等进行改进与革新，这属于技术改", "options": [{"label": "A", "text": "设备更新改造\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n7"}, {"label": "B", "text": "工艺改革"}, {"label": "C", "text": "设备改造"}, {"label": "D", "text": "环境治理"}], "answer": "D", "analysis": "本题考查实施全面质量管理的基本方法。推动PDCA循环，关键在A（Action，处理）阶段。\n \n33.企业运用新的技术成果，对产品的材料、加工制造的方法、技术和过程等进行改进与革新，这属于技术改\n造内容中的（　）。\nA.设备更新改造\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n7\nB.工艺改革\nC.设备改造\nD.环境治理"}, {"question": "某企业运用投资回收期法进行技术改造项目决策，该项目有四个选择方案，其投资额和年净收益额如下表", "options": [{"label": "A", "text": "方案1"}, {"label": "B", "text": "方案2"}, {"label": "C", "text": "方案3"}, {"label": "D", "text": "方案4"}], "answer": "B", "analysis": "本题考查技术改造的内容。工艺改革，即运用新的科技成果，对产品的材料、加工制造的方法、技\n术和过程等进行改进与革新。\n \n34.某企业运用投资回收期法进行技术改造项目决策，该项目有四个选择方案，其投资额和年净收益额如下表\n所示（单位：万元）：\n \n \n若该项目的标准投资回收期为7年，则该企业应选择（　）。\nA.方案1\nB.方案2\nC.方案3\nD.方案4"}, {"question": "在对企业技术改造方案进行优化选择时，考虑了资金时间价值的动态评价方法是（　）。", "options": [{"label": "A", "text": "面值法"}, {"label": "B", "text": "效益成本分析法"}, {"label": "C", "text": "低劣化数值法"}, {"label": "D", "text": "投资回收期法"}], "answer": "D", "analysis": "本题考查投资回收期法。\n方案4的投资回收期最短，且小于标准投资回收期7年，故选D。\n \n \n \n35.在对企业技术改造方案进行优化选择时，考虑了资金时间价值的动态评价方法是（　）。\nA.面值法\nB.效益成本分析法\nC.低劣化数值法\nD.投资回收期法"}, {"question": "进行技术改造项目的经济可行性分析，需要对技术改造方案的（　）进行对比分析。", "options": [{"label": "A", "text": "总投资与经济效益"}, {"label": "B", "text": "总产量与经济效益\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8"}, {"label": "C", "text": "总投资和总产量"}, {"label": "D", "text": "总投资和社会效益"}], "answer": "B", "analysis": "本题考查技术改造方案优化选择的方法。效益成本分析法是在考虑资金时间价值下的一种动态评价\n的方法，用益本率指标反映。\n \n36.进行技术改造项目的经济可行性分析，需要对技术改造方案的（　）进行对比分析。\nA.总投资与经济效益\nB.总产量与经济效益\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8\nC.总投资和总产量\nD.总投资和社会效益"}, {"question": "在新产品开发中，选择冒险战略的企业通常将新产品开发的目标确定为（　）。", "options": [{"label": "A", "text": "迅速扩大企业规模和提高市场占有率"}, {"label": "B", "text": "企业规模有所扩大"}, {"label": "C", "text": "企业快速发展和大幅度提高市场占有率"}, {"label": "D", "text": "适当扩大市场占有率"}], "answer": "A", "analysis": "本题考查技术改造项目的经济可行性分析。进行技术改造项目的经济可行性分析，需要对技术改造\n方案的总投资与经济效益进行对比分析。\n \n37.在新产品开发中，选择冒险战略的企业通常将新产品开发的目标确定为（　）。\nA.迅速扩大企业规模和提高市场占有率\nB.企业规模有所扩大\nC.企业快速发展和大幅度提高市场占有率\nD.适当扩大市场占有率"}, {"question": "在新产品开发的各种方式中，既可以使企业较快掌握新产品的制造技术，又可以减少技术风险的开发方式", "options": [{"label": "A", "text": "自行研制开发"}, {"label": "B", "text": "引进开发"}, {"label": "C", "text": "结合开发"}, {"label": "D", "text": "合作开发"}], "answer": "C", "analysis": "本题考查新产品开发战略的类型。选项A属于进取战略的目标；选项B属于紧随战略的目标；选项D属\n于保持地位战略的目标。\n \n38.在新产品开发的各种方式中，既可以使企业较快掌握新产品的制造技术，又可以减少技术风险的开发方式\n是（　）。\nA.自行研制开发\nB.引进开发\nC.结合开发\nD.合作开发"}, {"question": "对产品的基本原理和结构进行试验研究，编制初步设计文件，绘制草图。这些活动是新产品设计中（", "options": [{"label": "A", "text": "初步设计阶段"}, {"label": "B", "text": "技术设计阶段"}, {"label": "C", "text": "工作图设计阶段"}, {"label": "D", "text": "整体设计阶段"}], "answer": "B", "analysis": "本题考查新产品开发的方式。引进开发的优点：\n（1）可较快掌握新产品的制造技术，缩短开发周期，尽快将新产品投入国内外市场；\n（2）可缩短与同类产品的技术差距，减少技术风险。\n \n39.对产品的基本原理和结构进行试验研究，编制初步设计文件，绘制草图。这些活动是新产品设计中（　\n）的主要任务。\nA.初步设计阶段\nB.技术设计阶段\nC.工作图设计阶段\nD.整体设计阶段"}, {"question": "企业工作分析的客体是（　）。", "options": [{"label": "A", "text": "企业内部的职位"}, {"label": "B", "text": "进行工作分析的人员"}, {"label": "C", "text": "工作说明书"}, {"label": "D", "text": "工作分析报告"}], "answer": "A", "analysis": "本题考查新产品的设计。新产品设计一般分为初步设计、技术设计和工作图设计三个阶段。初步设\n计的主要任务是对产品的基本原理和结构进行试验研究，然后编制初步设计文件，绘制草图。\n \n40.企业工作分析的客体是（　）。\nA.企业内部的职位\nB.进行工作分析的人员\nC.工作说明书\nD.工作分析报告"}, {"question": "下列工作分析方法中，通常作为一种辅助方法，与其他方法联合使用的是（　）。", "options": [{"label": "A", "text": "观察法"}, {"label": "B", "text": "面谈法"}, {"label": "C", "text": "问卷法"}, {"label": "D", "text": "实践法"}], "answer": "A", "analysis": "本题考查工作分析的概念。工作分析就是指管理者了解企业内的一种职位信息和任职条件信息，并\n以一种格式把与这种职位有关的信息描述出来，从而使其他人能够了解这种职位和人员需求的过程。工作分\n析的主体是进行工作分析的管理者和有关人员，客体是企业内部的各个职位，内容是与各个职位有关的情况\n信息，结果是工作说明书和工作分析报告。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n9\n \n41.下列工作分析方法中，通常作为一种辅助方法，与其他方法联合使用的是（　）。\nA.观察法\nB.面谈法\nC.问卷法\nD.实践法"}, {"question": "企业在招聘员工时，根据不同的招聘要求选择适当的招聘方式，用尽可能低的成本吸引高素质的员工。这", "options": [{"label": "A", "text": "信息公开"}, {"label": "B", "text": "公平公正"}, {"label": "C", "text": "效率优先"}, {"label": "D", "text": "双向选择"}], "answer": "A", "analysis": "本题考查工作分析的方法。观察法是工作分析人员通过直接观察，把有关工作各部分的内容、特点\n、方法、程度、目的等信息以文字或图表的形式记录下来的方法。该方法不适用于工作循环周期长和以脑力\n劳动为主的工作，也不能得到有关任职资格要求的信息。对于紧急而又偶然的工作行为也不适用。因此，观\n察法往往作为一种辅助方法，与其他方法联合使用。\n \n42.企业在招聘员工时，根据不同的招聘要求选择适当的招聘方式，用尽可能低的成本吸引高素质的员工。这\n体现了员工招聘的（　）原则。\nA.信息公开\nB.公平公正\nC.效率优先\nD.双向选择"}, {"question": "企业要做好员工招聘工作，必须应用科学的招聘程序，其中制订招聘计划是科学地进行招聘工作的重要依", "options": [{"label": "A", "text": "选择招聘渠道"}, {"label": "B", "text": "发布招聘信息"}, {"label": "C", "text": "制定招聘决策"}, {"label": "D", "text": "选择招聘方法"}], "answer": "C", "analysis": "本题考查员工招聘的原则。效率优先原则是企业应根据不同的招聘要求灵活选择适当的招聘形式\n，用尽可能低的招聘成本吸引高素质的求职者。\n \n43.企业要做好员工招聘工作，必须应用科学的招聘程序，其中制订招聘计划是科学地进行招聘工作的重要依\n据，在这项工作的下一步应该（　）。\nA.选择招聘渠道\nB.发布招聘信息\nC.制定招聘决策\nD.选择招聘方法"}, {"question": "在企业招聘员工时，主要用来测评应聘者的思维能力、学习能力和适应环境能力的心理测评是（　）。", "options": [{"label": "A", "text": "人格测评"}, {"label": "B", "text": "智力测评"}, {"label": "C", "text": "倾向测评"}, {"label": "D", "text": "成就测评"}], "answer": "C", "analysis": "本题考查员工招聘的程序。企业员工招聘的一般程序：制订招聘计划、制定招聘决策、选择招聘渠\n道、选择招聘方法、发布招聘信息、收集求职资料、确定录用人员。根据题目信息“企业要做好员工招聘工\n作，必须应用科学的招聘程序，其中制订招聘计划是科学地进行招聘工作的重要依据，在这项工作的下一步\n应该”是制定招聘决策。\n \n44.在企业招聘员工时，主要用来测评应聘者的思维能力、学习能力和适应环境能力的心理测评是（　）。\nA.人格测评\nB.智力测评\nC.倾向测评\nD.成就测评"}, {"question": "某企业进行培训时，由管理人员与专业教练进行一对一的培训，尤其注重态度训练。该企业采用的培训方", "options": [{"label": "A", "text": "教练方法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10"}, {"label": "B", "text": "案例研究法"}, {"label": "C", "text": "情景模拟法"}, {"label": "D", "text": "行为示范法"}], "answer": "B", "analysis": "本题考查员工招聘中常用的人员甄选技术。智力测评是对一个人受智力水平影响而表现出的外在行\n为的测评，主要用来测评一个人的思维能力、学习能力和适应环境能力。\n \n45.某企业进行培训时，由管理人员与专业教练进行一对一的培训，尤其注重态度训练。该企业采用的培训方\n法是（　）。\nA.教练方法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10\nB.案例研究法\nC.情景模拟法\nD.行为示范法"}, {"question": "某公司聘用员工，双方签订劳动合同约定：每日工作时间为6小时，每周工作时间为6天，合同期限为", "options": [{"label": "A", "text": "非全日制劳动合同"}, {"label": "B", "text": "不定期劳动合同"}, {"label": "C", "text": "固定期限劳动合同"}, {"label": "D", "text": "无固定期限劳动合同"}], "answer": "A", "analysis": "本题考查常用的在职培训方法。教练方法是在职培训方法的一种，是指由管理人员与专业教练进行\n的一对一的培训方式，专业教练不只是知识传授者或技巧训练者，更着重于“激发人的潜能”，注重一种态\n度训练。\n \n46.某公司聘用员工，双方签订劳动合同约定：每日工作时间为6小时，每周工作时间为6天，合同期限为\n2019年1月1日至2022年12月31日。该劳动合同属于（　）。\nA.非全日制劳动合同\nB.不定期劳动合同\nC.固定期限劳动合同\nD.无固定期限劳动合同"}, {"question": "2020年6月5日，长虹公司偿还银行借款与利息120万元，从长虹公司的角度看，这属于由（　）活动引起", "options": [{"label": "A", "text": "筹资"}, {"label": "B", "text": "投资"}, {"label": "C", "text": "分红"}, {"label": "D", "text": "分配"}], "answer": "C", "analysis": "本题考查劳动合同的类型。固定期限劳动合同，是指用人单位与劳动者约定合同终止时间的劳动合\n同。根据题目信息“合同期限为2019年1月1日至2022年12月31日”，可知该劳动合同属于固定期限劳动合同\n。\n \n47.2020年6月5日，长虹公司偿还银行借款与利息120万元，从长虹公司的角度看，这属于由（　）活动引起\n的资金流出。\nA.筹资\nB.投资\nC.分红\nD.分配"}, {"question": "假设ABC公司2019年资产总计和负债总计分别为1800万元、950万元，2020年预计资产总计2250万元", "options": [{"label": "A", "text": "380"}, {"label": "B", "text": "750"}, {"label": "C", "text": "296"}, {"label": "D", "text": "295"}], "answer": "A", "analysis": "本题考查财务活动。企业偿还借款、支付利息、支付股利以及支付各种筹资费用等表现为企业资金\n的流出，这种因为资金筹集而产生的资金的支出属于筹资活动。\n \n48.假设ABC公司2019年资产总计和负债总计分别为1800万元、950万元，2020年预计资产总计2250万元\n，2020年预计负债总计1105万元，则2020年的筹资额为（　）万元。\nA.380\nB.750\nC.296\nD.295"}, {"question": "公式", "options": [{"label": "A", "text": "风险\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11"}, {"label": "B", "text": "每年自由现金流量"}, {"label": "C", "text": "每年报酬"}, {"label": "D", "text": "取得报酬的时间"}], "answer": "D", "analysis": "本题考查销售百分比法。\n2020年预计筹资额＝（2020年预计资产总计－2019年资产总计）－（2020年预计负债总计－2019年负债总计\n）＝（2250－1800）－（1105－950）＝295（万元）。\n \n49.公式\n为企业价值最大化的理论模型（式中，FCFt表示第t年的现金流量；i为折现率），模型中的i与企业（　）有\n关。\nA.风险\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11\nB.每年自由现金流量\nC.每年报酬\nD.取得报酬的时间"}, {"question": "某企业对其经销商提前收取部分货款以满足企业筹资需要，这属于企业筹资方式中的（　）。", "options": [{"label": "A", "text": "吸收直接投资"}, {"label": "B", "text": "银行借款"}, {"label": "C", "text": "商业信用"}, {"label": "D", "text": "短期融资"}], "answer": "A", "analysis": "本题考查财务管理的目标。企业价值最大化作为财务管理的目标，企业价值可以用过公式\n计量，其中i为与企业风险相适应的折现率。\n \n50.某企业对其经销商提前收取部分货款以满足企业筹资需要，这属于企业筹资方式中的（　）。\nA.吸收直接投资\nB.银行借款\nC.商业信用\nD.短期融资"}, {"question": "假设某公司给客户开出的信用条件是“4/12，3/20，n/35”，则表示客户若放弃折扣，必须在（　）天内", "options": [{"label": "A", "text": "5"}, {"label": "B", "text": "10"}, {"label": "C", "text": "60"}, {"label": "D", "text": "35"}], "answer": "C", "analysis": "本题考查筹资方式。商业信用是指企业通过赊购或预收货款等商品交易行为获得短期债务资本的筹\n资方式。\n \n51.假设某公司给客户开出的信用条件是“4/12，3/20，n/35”，则表示客户若放弃折扣，必须在（　）天内\n付清款项。\nA.5\nB.10\nC.60\nD.35"}], "考前点题（51-100题）": [{"question": "M公司用甲材料生产A产品，其中甲材料标准价格是30元/千克，用量标准为4千克/件。假定企业本月投产", "options": [{"label": "A", "text": "175000"}, {"label": "B", "text": "170500"}, {"label": "C", "text": "16500"}, {"label": "D", "text": "18000"}], "answer": "D", "analysis": "本题考查应收账款管理。根据题目信息可知信用条件是“4/12，3/20，n/35”，这说明，如果客户\n在开出发票的12天内付款，享受4％的折扣；如果在开出发票的第13天到第20天内付款，享受3％的折扣；如\n果客户放弃现金折扣，全部款项必须在35天内付清。\n \n52.M公司用甲材料生产A产品，其中甲材料标准价格是30元/千克，用量标准为4千克/件。假定企业本月投产\nA产品10000件，领用材料55000千克，其实际价格为25元/千克，其直接材料成本差异为（　）元。\nA.175000\nB.170500\nC.16500\nD.18000"}, {"question": "下列属于成本费用中的混合成本的是（　）。", "options": [{"label": "A", "text": "财产保险费"}, {"label": "B", "text": "整车运输费、检验人员工资"}, {"label": "C", "text": "直接材料和直接人工费用"}, {"label": "D", "text": "科研开发费"}], "answer": "A", "analysis": "本题考查成本差异的计算分析。成本差异是指实际产量下实际总成本与实际产量下标准总成本之间\n的差异。成本差异＝实际产量下实际总成本－实际产量下标准总成本。\n直接材料成本差异＝25×55000－10000×30×4＝175000（元）\n \n53.下列属于成本费用中的混合成本的是（　）。\nA.财产保险费\nB.整车运输费、检验人员工资\nC.直接材料和直接人工费用\nD.科研开发费"}, {"question": "下列财务指标中，能够反映企业营运能力的是（　）。", "options": [{"label": "A", "text": "已获利息倍数"}, {"label": "B", "text": "净资产收益率"}, {"label": "C", "text": "总资产周转率"}, {"label": "D", "text": "资本积累率"}], "answer": "B", "analysis": "本题考查成本费用项目。选项AD属于固定成本。选项B属于混合成本中的阶梯式成本。选项C属于变\n动成本。\n \n54.下列财务指标中，能够反映企业营运能力的是（　）。\nA.已获利息倍数\nB.净资产收益率\nC.总资产周转率\nD.资本积累率"}, {"question": "按照数据来源不同对信息进行分类，以下属于外部信息的是（　）。", "options": [{"label": "A", "text": "科技发展"}, {"label": "B", "text": "顾客需求信息"}, {"label": "C", "text": "行政办公信息"}, {"label": "D", "text": "销售信息"}], "answer": "C", "analysis": "本题考查财务比率分析。财务比率指标大致来说包括四个方面：①偿债能力比率，有流动比率、速\n动比率、现金流动负债比率、资产负债率、产权比率、已获利息倍数等。②营运能力比率，有应收账款周转\n率、存货周转率、流动资产周转率、总资产周转率等。③盈利能力比率，有营业（销售）净利率、营业（销\n售）毛利率、资产净利率、净资产收益率等。④发展能力比率，有营业（销售）增长率、资本积累率、总资\n产增长率等。\n \n55.按照数据来源不同对信息进行分类，以下属于外部信息的是（　）。\nA.科技发展\nB.顾客需求信息\nC.行政办公信息\nD.销售信息"}, {"question": "下列不属于计算机管理方式的是（　）。", "options": [{"label": "A", "text": "人工管理方式"}, {"label": "B", "text": "简单记账式管理"}, {"label": "C", "text": "经营规范式管理"}, {"label": "D", "text": "决策经营式管理"}], "answer": "A", "analysis": "本题考查信息的分类。BD属于按照业务功能不同的信息分类。C属于按照管理范围不同的信息分类。\n \n56.下列不属于计算机管理方式的是（　）。\nA.人工管理方式\nB.简单记账式管理\nC.经营规范式管理\nD.决策经营式管理"}, {"question": "超市调查统计，发现消费者60%购买啤酒的时候都要买尿布，就把啤酒和纸尿裤商品柜放在一起，这个是", "options": [{"label": "A", "text": "分类和预测"}, {"label": "B", "text": "聚类分析"}, {"label": "C", "text": "关联分析"}, {"label": "D", "text": "离群点分析"}], "answer": "A", "analysis": "本题考查计算机管理方式。计算机管理方式包括简单记账式管理、经营规范式管理、决策经营式管\n理三种方式。\n \n57.超市调查统计，发现消费者60%购买啤酒的时候都要买尿布，就把啤酒和纸尿裤商品柜放在一起，这个是\n数据挖掘（　）功能的体现。\nA.分类和预测\nB.聚类分析\nC.关联分析\nD.离群点分析"}, {"question": "管理信息系统开发步骤中，属于系统分析阶段的是（　）。", "options": [{"label": "A", "text": "编写系统设计任务书"}, {"label": "B", "text": "系统的总体设计"}, {"label": "C", "text": "继续纠错"}, {"label": "D", "text": "建立新系统的逻辑模型"}], "answer": "C", "analysis": "本题考查数据挖掘的功能。数据挖掘具有以下主要功能：\n①分类和预测：分类是从大量数据中找出不同类别对象的特征，从而对新加入对象进行自动分类。例如，银\n行会按客户的信用程度分类，通过数据挖掘能找出各类客户的数据特征，以后就能快速判断一个新客户的信\n用类别。\n②聚类分析：聚类是根据数据特征对数据对象进行自动归类。聚类与分类的不同在于分类预先知道应该分成\n哪几类，聚类在操作之前并不知道数据可以分成哪些类别。\n③关联分析：关联分析是在大量数据中找出有关联的数据，或者找出同时发生的事件。例如，在超市的交易\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n13\n数据中发现哪些商品可能会被同时购买，从而寻找哪些商品捆绑销售能够有更多的受众。\n④离群点分析：数据库中可能包含一些数据对象，它们与数据的一般行为或模型不一致，这些数据对象就是\n离群点。例如，检测一个给定账号的付费情况，其购买数额特别大、超出正常付费的数据对象，可以被用来\n发现信用卡欺骗性使用的情况。\n \n58.管理信息系统开发步骤中，属于系统分析阶段的是（　）。\nA.编写系统设计任务书\nB.系统的总体设计\nC.继续纠错\nD.建立新系统的逻辑模型"}, {"question": "下列管理信息系统开发方式中，对分析、设计力量要求最高、编程力量的需求最大的是（　）。", "options": [{"label": "A", "text": "自行开发系统"}, {"label": "B", "text": "委托开发系统"}, {"label": "C", "text": "联合开发系统"}, {"label": "D", "text": "购买现成软件包"}], "answer": "D", "analysis": "本题考查管理信息系统的开发过程。A选项属于系统规划阶段，B选项属于系统设计阶段，C选项属于\n系统运行与维护阶段。系统规划阶段：组建开发组，初步调查，可行性分析，编写系统设计任务书。系统分\n析阶段：详细调查，建立新系统的逻辑模型，编写系统说明书。系统设计阶段：系统的总体设计，详细设计\n，编写系统设计说明书。系统实施阶段：程序设计，系统的软件、硬件及数据的准备工作，培训人员。系统\n运行与维护阶段：系统转换，继续纠错，系统维护，培训人员。\n \n59.下列管理信息系统开发方式中，对分析、设计力量要求最高、编程力量的需求最大的是（　）。\nA.自行开发系统\nB.委托开发系统\nC.联合开发系统\nD.购买现成软件包"}, {"question": "下列企业管理信息系统的开发方法中，应用较多、技术较为成熟的是结构化方法与（　）。", "options": [{"label": "A", "text": "计算机辅助开发"}, {"label": "B", "text": "原型法"}, {"label": "C", "text": "信息工程法"}, {"label": "D", "text": "面向对象法"}], "answer": "A", "analysis": "本题考查管理信息系统开发方式。对分析、设计力量要求最高、编程力量的需求最大的是自行开发\n系统。\n表管理信息系统开发方式比较\n \n \n \n60.下列企业管理信息系统的开发方法中，应用较多、技术较为成熟的是结构化方法与（　）。\nA.计算机辅助开发\nB.原型法\nC.信息工程法\nD.面向对象法"}, {"question": "企业发展和成长必备的基本要求有（　）。", "options": [{"label": "A", "text": "自由地获得各种资源\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n14"}, {"label": "B", "text": "完善而灵活的经营机制"}, {"label": "C", "text": "具有垄断的市场地位"}, {"label": "D", "text": "政府的优惠政策\nE.良好的企业素质"}], "answer": "B", "analysis": "本题考查管理信息系统开发方法。应用较多、技术较为成熟的是结构化方法和原型法。\n \n多项选择题\n61.企业发展和成长必备的基本要求有（　）。\nA.自由地获得各种资源\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n14\nB.完善而灵活的经营机制\nC.具有垄断的市场地位\nD.政府的优惠政策\nE.良好的企业素质"}, {"question": "中国特色的现代企业制度包括（　）。", "options": [{"label": "A", "text": "“三重一大”事项坚持集体决策原则"}, {"label": "B", "text": "健全公司法人治理结构"}, {"label": "C", "text": "改革各项管理制度"}, {"label": "D", "text": "不断提高持续盈利能力\nE.推进自主创新和技术进步"}], "answer": "B", "analysis": "本题考查企业发展的基本要求。企业的发展或成长有两个基本要求：完善而灵活的经营机制、良好\n的企业素质。\n \n62.中国特色的现代企业制度包括（　）。\nA.“三重一大”事项坚持集体决策原则\nB.健全公司法人治理结构\nC.改革各项管理制度\nD.不断提高持续盈利能力\nE.推进自主创新和技术进步"}, {"question": "某互联网公司采用虚拟企业组织形式进行运营，这种企业组织模式的主要优势有（　）。", "options": [{"label": "A", "text": "能够对市场需求做出快速反应"}, {"label": "B", "text": "能够快速招募销售人员"}, {"label": "C", "text": "能够较好的分摊开发投资费用"}, {"label": "D", "text": "能够迅速垄断市场\nE.能够有效规避经营风险"}], "answer": "A", "analysis": "本题考查中国特色的现代企业制度。DE选项错误，其内容属于国有企业社会责任的内容。\n \n63.某互联网公司采用虚拟企业组织形式进行运营，这种企业组织模式的主要优势有（　）。\nA.能够对市场需求做出快速反应\nB.能够快速招募销售人员\nC.能够较好的分摊开发投资费用\nD.能够迅速垄断市场\nE.能够有效规避经营风险"}, {"question": "下列因素中，引起企业变革的外部驱动因素有（　）。", "options": [{"label": "A", "text": "企业某项生产工序的改造"}, {"label": "B", "text": "国内政治环境的变化"}, {"label": "C", "text": "市场状况的变化"}, {"label": "D", "text": "全球人口老龄化\nE.技术的发展"}], "answer": "A", "analysis": "本题考查虚拟企业的主要优势。虚拟企业的主要优势包括：对市场需求的反应快速；具备最优化的\n技术解决方案；能够分摊开发投资费用；能有效规避经营风险。\n \n64.下列因素中，引起企业变革的外部驱动因素有（　）。\nA.企业某项生产工序的改造\nB.国内政治环境的变化\nC.市场状况的变化\nD.全球人口老龄化\nE.技术的发展"}, {"question": "下列市场细分变量中，属于心理变量的有（　）。", "options": [{"label": "A", "text": "个性"}, {"label": "B", "text": "购买动机"}, {"label": "C", "text": "消费频率"}, {"label": "D", "text": "消费者对品牌的忠诚度\nE.价值取向\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n15"}], "answer": "B", "analysis": "本题考查企业变革的外部驱动因素。引起企业变革的外部驱动因素可以归纳为以下几个方面\n：（1）技术。现代科学技术迅速发展对企业变革提出新的要求。（2）政治与法律。政治环境变化、宏观经\n济调控手段改变，法律法规的颁布与修改等。（3）经济。国民经济的发展现状及前景、企业所在的市场状况\n等。（4）社会。社会的发展不断呈现出新的趋势，全球人口老龄化、企业员工的多元化、家庭结构的小型化\n等。\n \n65.下列市场细分变量中，属于心理变量的有（　）。\nA.个性\nB.购买动机\nC.消费频率\nD.消费者对品牌的忠诚度\nE.价值取向\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n15"}, {"question": "目标市场营销战略包含的类型有（　）。", "options": [{"label": "A", "text": "无差异性营销战略"}, {"label": "B", "text": "差异性的营销战略"}, {"label": "C", "text": "差别化的营销战略"}, {"label": "D", "text": "集中性营销战略\nE.撇脂性营销战略"}], "answer": "A", "analysis": "本题考查市场细分。CD选项错误，消费频率与消费者对品牌的忠诚度属于行为变量。\n \n66.目标市场营销战略包含的类型有（　）。\nA.无差异性营销战略\nB.差异性的营销战略\nC.差别化的营销战略\nD.集中性营销战略\nE.撇脂性营销战略"}, {"question": "下列定量市场预测方法中，属于因果关系分析法的有（　）。", "options": [{"label": "A", "text": "移动平均法"}, {"label": "B", "text": "趋势外推法"}, {"label": "C", "text": "季节指数法"}, {"label": "D", "text": "基数迭加法\nE.回归分析法"}], "answer": "A", "analysis": "本题考查目标市场营销战略。目标市场营销战略的类型包括：差异性营销战略、无差异性营销战略\n、集中性营销战略。\n \n67.下列定量市场预测方法中，属于因果关系分析法的有（　）。\nA.移动平均法\nB.趋势外推法\nC.季节指数法\nD.基数迭加法\nE.回归分析法"}, {"question": "决定企业生产类型的因素有（　）。", "options": [{"label": "A", "text": "产品产量"}, {"label": "B", "text": "生产连续程度"}, {"label": "C", "text": "产品品种"}, {"label": "D", "text": "生产效率\nE.生产专业化程度"}], "answer": "D", "analysis": "本题考查定量市场预测方法。ABC选项错误，定量市场预测方法可以分为时间序列分析法和因果关系\n分析法。时间序列分析法包括移动平均法、趋势外推法、季节指数法。\n \n68.决定企业生产类型的因素有（　）。\nA.产品产量\nB.生产连续程度\nC.产品品种\nD.生产效率\nE.生产专业化程度"}, {"question": "按照工艺专业化原则设置生产单位的优点包括（　）。", "options": [{"label": "A", "text": "缩短产品加工路线"}, {"label": "B", "text": "提高对产品品种变化的适应性"}, {"label": "C", "text": "充分利用生产设备与生产面积"}, {"label": "D", "text": "提高工人的技术熟练程度\nE.减少产品的运输时间"}], "answer": "A", "analysis": "本题考查生产类型。在通常情况下，企业生产的产品产量越大，产品的品种就越少，生产专业化程\n度就越高，而生产的稳定性和重复性也越大。所以，产品产量、产品品种和专业化程度决定着生产类型。\n \n69.按照工艺专业化原则设置生产单位的优点包括（　）。\nA.缩短产品加工路线\nB.提高对产品品种变化的适应性\nC.充分利用生产设备与生产面积\nD.提高工人的技术熟练程度\nE.减少产品的运输时间"}, {"question": "下列质量管理办法中，属于质量管理新七种工具的有（　）。", "options": [{"label": "A", "text": "因果分析图法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16"}, {"label": "B", "text": "直方图法"}, {"label": "C", "text": "系统图法"}, {"label": "D", "text": "调查表法\nE.矩阵图法"}], "answer": "B", "analysis": "本题考查工艺专业化布置的优点。工艺专业化布置是按照生产过程各个工艺阶段的工艺特点来设置\n生产单位。优点有：①对产品品种的变化具有较强的适应性。②便于充分利用生产设备与生产面积，提高生\n产设备与生产面积的负荷系数。③便于进行工艺专业化管理，并有利于工人技术熟练程度的提高。\n \n70.下列质量管理办法中，属于质量管理新七种工具的有（　）。\nA.因果分析图法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16\nB.直方图法\nC.系统图法\nD.调查表法\nE.矩阵图法"}, {"question": "关于工序能力指标用途的说法，正确的有（　）。", "options": [{"label": "A", "text": "工序能力指标有助于企业验证工序质量保证能力"}, {"label": "B", "text": "工序能力指标有助于企业确定工序工艺装备"}, {"label": "C", "text": "工序能力指标有助于企业协调工序间的相互关系"}, {"label": "D", "text": "工序能力指标有助于企业确定工艺方法\nE.工序能力指标有助于企业选择最好的工作方法"}], "answer": "C", "analysis": "本题考查质量管理工具。新七种工具包括：关联图法、亲和图法、系统图法、矩阵图法、矩阵数据\n分析法、过程决策程序图法、矢线图法。\n老七种工具具体包括：因果分析图法、排列图法、直方图法、控制图法、散布图法、分层图法、调查表法。\n \n71.关于工序能力指标用途的说法，正确的有（　）。\nA.工序能力指标有助于企业验证工序质量保证能力\nB.工序能力指标有助于企业确定工序工艺装备\nC.工序能力指标有助于企业协调工序间的相互关系\nD.工序能力指标有助于企业确定工艺方法\nE.工序能力指标有助于企业选择最好的工作方法"}, {"question": "一般来说，质量检验的基本任务有（　）。", "options": [{"label": "A", "text": "了解产品质量的等级或缺陷的严重程度"}, {"label": "B", "text": "判断工序质量状态，为工序能力控制提供依据"}, {"label": "C", "text": "反馈质量信息，报告质量状况与趋势，提供质量改进的建议"}, {"label": "D", "text": "改善检测手段，提高检测作业发现质量缺陷的能力和有效性\nE.分析发现工人生产效率低下的原因"}], "answer": "A", "analysis": "本题考查工序能力的概念。工序能力指标有以下用途：（1）选择经济合理的工序方案。这是通过预\n测与质量标准的符合程度来确定工序工艺装备、工艺方法和检测方法。（2）协调工序之间的相互关系。工艺\n设计时，要规定各道工序的加工余量、定位基准等，了解每道工序的能力对工序设计是有益的。（3）验证工\n序质量保证能力。分析工序质量缺陷因素，估计工序不合格率，控制工序实际加工质量。\n \n72.一般来说，质量检验的基本任务有（　）。\nA.了解产品质量的等级或缺陷的严重程度\nB.判断工序质量状态，为工序能力控制提供依据\nC.反馈质量信息，报告质量状况与趋势，提供质量改进的建议\nD.改善检测手段，提高检测作业发现质量缺陷的能力和有效性\nE.分析发现工人生产效率低下的原因"}, {"question": "下列企业技术改造内容中，属于内层技术改造的有（　）。", "options": [{"label": "A", "text": "新设备的添置"}, {"label": "B", "text": "新产品的开发"}, {"label": "C", "text": "新管理方法的实施"}, {"label": "D", "text": "新工艺的发明\nE.新组织形式的采用"}], "answer": "A", "analysis": "本题考查质量检验的基本任务。一般来说，质量检验有五项基本任务：（1）鉴别产品（或零部件、\n外购物料等）的质量水平，确定其符合程度或能否接收。（2）判断工序质量状态，为工序能力控制提供依据\n。（3）了解产品质量的等级或缺陷的严重程度。（4）改善检测手段，提高检测作业发现质量缺陷的能力和\n有效性。（5）反馈质量信息，报告质量状况与趋势，提供质量改进的建议。\n \n73.下列企业技术改造内容中，属于内层技术改造的有（　）。\nA.新设备的添置\nB.新产品的开发\nC.新管理方法的实施\nD.新工艺的发明\nE.新组织形式的采用"}, {"question": "下列关于内部招聘的说法，正确的有（　）。", "options": [{"label": "A", "text": "内部招聘容易导致“近亲繁殖”"}, {"label": "B", "text": "内部招聘可能打击内部应聘员工的积极性\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17"}, {"label": "C", "text": "内部招聘的员工需要较长的调整适应期"}, {"label": "D", "text": "内部招聘容易导致内部员工之间的矛盾\nE.内部招聘能够节省招聘费用"}], "answer": "B", "analysis": "本题考查技术改造的层次。内层技术改造主要表现为企业科学技术的运用。它是企业技术装备有效\n发挥的重要手段，贯穿于企业生产的全过程之中，如新技术的应用、新产品的开发、新工艺的发明等。\n \n74.下列关于内部招聘的说法，正确的有（　）。\nA.内部招聘容易导致“近亲繁殖”\nB.内部招聘可能打击内部应聘员工的积极性\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17\nC.内部招聘的员工需要较长的调整适应期\nD.内部招聘容易导致内部员工之间的矛盾\nE.内部招聘能够节省招聘费用"}, {"question": "在企业员工培训目标类别中，属于提高员工的企业角色意识的有（　）。", "options": [{"label": "A", "text": "增强员工的主人翁精神"}, {"label": "B", "text": "增强员工的团队意识"}, {"label": "C", "text": "提高员工的人际关系技能"}, {"label": "D", "text": "提高员工的专业业务技能\nE.扩充员工的知识"}], "answer": "A", "analysis": "本题考查内部招聘的优缺点。B选项错误，内部招聘给员工提供了晋升的机会和空间，不仅有助于调\n动员工的工作积极性和进取精神，而且有助于员工安心工作，防止和减少企业人才的流失。C选项错误，外部\n招聘的新员工需要较长的调整期，以熟悉工作、人员和企业。\n \n75.在企业员工培训目标类别中，属于提高员工的企业角色意识的有（　）。\nA.增强员工的主人翁精神\nB.增强员工的团队意识\nC.提高员工的人际关系技能\nD.提高员工的专业业务技能\nE.扩充员工的知识"}, {"question": "下列劳动合同条款中，属于约定条款的有（　）。", "options": [{"label": "A", "text": "劳动合同期限"}, {"label": "B", "text": "劳动报酬"}, {"label": "C", "text": "补充保险"}, {"label": "D", "text": "试用期\nE.工作内容和地点"}], "answer": "A", "analysis": "本题考查员工培训目标。企业员工的培训目标划分为两大类别：一是提高员工在企业中的角色意识\n和工作态度与动机的转变，前者如主人翁精神、团队意识，后者如对企业价值观的进一步认同等；二是获取\n知识，提高技能，如基本知识的增加，人际关系技能、专项业务技能、高层次整合技能的增强等。CDE选项错\n误，其内容属于获取知识，提高技能的培训目标。\n \n76.下列劳动合同条款中，属于约定条款的有（　）。\nA.劳动合同期限\nB.劳动报酬\nC.补充保险\nD.试用期\nE.工作内容和地点"}, {"question": "企业过量持有现金带来的弊端包括（　）。", "options": [{"label": "A", "text": "产生机会成本"}, {"label": "B", "text": "降低付现能力"}, {"label": "C", "text": "降低流动比率"}, {"label": "D", "text": "降低速动比率\nE.降低整体资产的收益率水平"}], "answer": "C", "analysis": "本题考查企业劳动合同的条款。ABE选项错误，其内容均属于合同条款中的法定条款。\n \n77.企业过量持有现金带来的弊端包括（　）。\nA.产生机会成本\nB.降低付现能力\nC.降低流动比率\nD.降低速动比率\nE.降低整体资产的收益率水平"}, {"question": "下列费用中，计入管理费用的有（　）。", "options": [{"label": "A", "text": "销售费用"}, {"label": "B", "text": "存货盘亏或盘盈"}, {"label": "C", "text": "工会经费"}, {"label": "D", "text": "广告费\nE.利息费用"}], "answer": "A", "analysis": "本题考查现金管理。现金是流动性最好的资产，但过量持有现金会产生机会成本，增加管理成本\n，降低整体资产的收益率水平。\n \n78.下列费用中，计入管理费用的有（　）。\nA.销售费用\nB.存货盘亏或盘盈\nC.工会经费\nD.广告费\nE.利息费用"}, {"question": "下列属于数据的属性的有（　）。", "options": [{"label": "A", "text": "适用性"}, {"label": "B", "text": "安全性"}, {"label": "C", "text": "数据格式"}, {"label": "D", "text": "记录的频度和精度\nE.可储存性"}], "answer": "B", "analysis": "本题考查成本费用项目。AD选项错误，销售费用与广告费用属于销售费用，E选项错误，利息支出属\n于财务费用。\n \n79.下列属于数据的属性的有（　）。\nA.适用性\nB.安全性\nC.数据格式\nD.记录的频度和精度\nE.可储存性"}, {"question": "下列关于北斗卫星导航系统的表述正确的有（　）。", "options": [{"label": "A", "text": "北斗卫星导航系统的英文缩写是BDS"}, {"label": "B", "text": "空间段采用单轨道卫星组合的混合星座"}, {"label": "C", "text": "提供单一频点的导航信号"}, {"label": "D", "text": "创新融合了导航与通信能力\nE.我国合作发展、独立运行的系统"}], "answer": "A", "analysis": "本题考查数据的属性。数据的属性包括：适用性、安全性、数据格式、记录的频度和精度。E选项错\n误，可存储性属于信息的属性。\n \n80.下列关于北斗卫星导航系统的表述正确的有（　）。\nA.北斗卫星导航系统的英文缩写是BDS\nB.空间段采用单轨道卫星组合的混合星座\nC.提供单一频点的导航信号\nD.创新融合了导航与通信能力\nE.我国合作发展、独立运行的系统"}, {"question": "【不定项选择题】该企业可以选择的非随机抽样方法是（　）。", "options": [{"label": "A", "text": "配额抽样"}, {"label": "B", "text": "整群抽样"}, {"label": "C", "text": "任意抽样"}, {"label": "D", "text": "判断抽样"}], "answer": "A", "analysis": "本题考查北斗卫星导航系统的特色与优势。北斗卫星导航系统的特色与优势有：（1）具有短报文通\n信功能；（2）空间段采用三种轨道卫星组合的混合星座；（3）提供多个频点的导航信号；（4）创新融合了\n导航与通信能力；（5）我国自主发展、独立运行的系统。\n \n共享题干题\n【题干】（一）为了掌握市场信息，有效安排生产运营，某乳品生产企业进行了市场调查和市场预测活动。\n企业市场调查人员首先采用非随机抽样的方法，选取部分顾客进行问卷调查。在充分说明填写要求后，调查\n人员请被调查顾客自行填写调查问卷，一周后回收问卷。同时，市场调查人员深入社区，到消费者家中进行\n访谈，了解消费者需求。并且，企业为了更好的分析消费者的购买行为，收集了内部和外部的历史资料和文\n献信息，该企业2014－2019年乳品销售额见下表。\n \n \n81.【不定项选择题】该企业可以选择的非随机抽样方法是（　）。\nA.配额抽样\nB.整群抽样\nC.任意抽样\nD.判断抽样"}, {"question": "【不定项选择题】该企业采用的市场调查方法是（　）。", "options": [{"label": "A", "text": "入户访问法"}, {"label": "B", "text": "观察法"}, {"label": "C", "text": "留置调查法"}, {"label": "D", "text": "文案调查法"}], "answer": "A", "analysis": "本题考查非随机抽样。非随机抽样又称为非概率抽样，是指调查人员根据自己的方便或主观判断抽\n取样本的方法。常见的非随机抽样方法有以下几种：①任意抽样。②判断抽样。③配额抽样。④滚雪球抽样\n。\n \n82.【不定项选择题】该企业采用的市场调查方法是（　）。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n19\nA.入户访问法\nB.观察法\nC.留置调查法\nD.文案调查法"}, {"question": "【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n＝4），该企业2020年的乳品销售额预测", "options": [{"label": "A", "text": "1180"}, {"label": "B", "text": "1275"}, {"label": "C", "text": "1350"}, {"label": "D", "text": "1400"}], "answer": "A", "analysis": "本题考查市场调查方法。根据题目信息“调查人员请被调查顾客自行填写调查问卷，一周后回收问\n卷”“企业还收集了内部和外部的历史资料和文献信息”可知该企业采用了留置调查法与文案调查法。“到\n消费者家中进行访谈”属于入户访问法。\n \n83.【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n＝4），该企业2020年的乳品销售额预测\n值是（　）万元。\nA.1180\nB.1275\nC.1350\nD.1400"}, {"question": "【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n＝3），则2019年预测的绝对误差是（", "options": [{"label": "A", "text": "125"}, {"label": "B", "text": "150"}, {"label": "C", "text": "100"}, {"label": "D", "text": "73.3"}], "answer": "B", "analysis": "本题考查简单移动平均法。简单移动平均法是对时间序列的数据按一定跨越期进行移动，逐个计算\n其算术移动平均值，取最后一个移动平均值为预测值的方法。\n故本题中，销售额预测值\n＝（1330＋1300＋1250＋1220）÷4＝1275（万元）。\n \n84.【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n＝3），则2019年预测的绝对误差是（　\n）。\nA.125\nB.150\nC.100\nD.73.3"}, {"question": "7（万元）。因此，本题中，2019年预测的绝对误差", "options": [{"label": "A", "text": "200000"}, {"label": "B", "text": "860000"}, {"label": "C", "text": "250061"}, {"label": "D", "text": "600000"}], "answer": "D", "analysis": "本题考查简单移动平均法。将数据代入简单移动平均法的预测模型，销售额预测值\n＝（1220＋1250＋1300）÷3＝1256.7（万元）。因此，本题中，2019年预测的绝对误差\n＝1330－1256.7≈73.3（万元）。\n \n【题干】（二）某电器厂组建新的生产车间生产新产品“常红”牌电视机，准备投入国内市场，电视机生产\n加工工序共有5道，生产时间分别为15分钟、20分钟、25分钟、16分钟、10分钟。电器厂每日工作8小时，A车\n间日产量为80台，时间利用系数为0.91，次品率为1.5％。\n根据以上资料，回答下列问题：\n \n85.【不定项选择题】电器厂若一次生产10000台电视机，则生产周期最短为（　）分钟。\nA.200000\nB.860000\nC.250061\nD.600000"}, {"question": "【不定项选择题】春节即将到来，企业急于生产10000台电视机投入市场，应采取（　）方式。", "options": [{"label": "A", "text": "顺序移动方式"}, {"label": "B", "text": "平行移动方式或顺序移动方式"}, {"label": "C", "text": "平行顺序移动方式或顺序移动方式"}, {"label": "D", "text": "平行移动方式或平行顺序移动方式"}], "answer": "C", "analysis": "本题考查平行移动方式。平行移动方式的突出优点是充分利用平行作业的可能，使生产周期达到最\n短。\n平行移动方式生产周期\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n20\n＝（15＋20＋25＋16＋10）＋（10000－1）×25\n＝86＋249975\n＝250061（分钟）\n \n86.【不定项选择题】春节即将到来，企业急于生产10000台电视机投入市场，应采取（　）方式。\nA.顺序移动方式\nB.平行移动方式或顺序移动方式\nC.平行顺序移动方式或顺序移动方式\nD.平行移动方式或平行顺序移动方式"}, {"question": "【不定项选择题】A车间电视机流水线的节拍是（　）分钟。", "options": [{"label": "A", "text": "5"}, {"label": "B", "text": "5.4"}, {"label": "C", "text": "6"}, {"label": "D", "text": "6.4"}], "answer": "D", "analysis": "本题考查三种移动方式的比较。平行移动方式的突出优点是充分利用平行作业的可能，使生产周期\n达到最短。平行顺序移动方式吸取顺序移动方式和平行移动方式的优点，生产周期较短，每道工序在加工一\n批零件时不发生停顿现象，使设备能连续、正常运转。\n \n87.【不定项选择题】A车间电视机流水线的节拍是（　）分钟。\nA.5\nB.5.4\nC.6\nD.6.4"}, {"question": "91×8×60）÷[80/（1－0.015）]", "options": [{"label": "A", "text": "0.85"}, {"label": "B", "text": "1"}, {"label": "C", "text": "1.15"}, {"label": "D", "text": "1.25"}], "answer": "B", "analysis": "本题考查流水线节拍的计算。计算流水线的平均节拍，公式为：\nr＝（0.91×8×60）÷[80/（1－0.015）]\n＝436.8/81.22＝5.4分钟\n \n88.【不定项选择题】假设流水线的节拍是5分钟，若在第3道工序只提供了4个工作地，则设备负荷系数为\n（　）。\nA.0.85\nB.1\nC.1.15\nD.1.25"}, {"question": "25。", "options": [{"label": "A", "text": "B、C三道工序的工序能力进行评估。对A工序加工后内径尺寸进行测量统计，随机抽取的样本平均值和公差中\n心重合，标准差为0.08毫米。经测算，B工序的工序能力指数为1.5，C工序的工序能力指数为1.7。\n根据以上资料，回答下列问题：\n \n89.【不定项选择题】A工序的工序能力指数为（　）。"}, {"label": "A", "text": "2.1"}, {"label": "B", "text": "1.6"}, {"label": "C", "text": "1.4"}, {"label": "D", "text": "0.6\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n21"}], "answer": "D", "analysis": "本题考查设备负荷系数。\n第三道工序计算工作地数为＝25/5=5\n设备负荷系数为：Ki＝Si/Sei＝第三道工序所需设备的计算数/第三道工序安排的实际设备数＝5/4＝1.25。\n \n【题干】（三）某企业生产某型号钢管的过程中，A工序加工产品的内径，B工序控制产品的强度，C工序控制\n产品的弹性。该产品的内径设计尺寸为50毫米，公差为（＋0.15，－0.15）毫米。现需通过随机抽样对A、\nB、C三道工序的工序能力进行评估。对A工序加工后内径尺寸进行测量统计，随机抽取的样本平均值和公差中\n心重合，标准差为0.08毫米。经测算，B工序的工序能力指数为1.5，C工序的工序能力指数为1.7。\n根据以上资料，回答下列问题：\n \n89.【不定项选择题】A工序的工序能力指数为（　）。\nA.2.1\nB.1.6\nC.1.4\nD.0.6\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n21"}, {"question": "15）-（50-0.15）]÷（6×0.08）＝0.625。", "options": [{"label": "A", "text": "严重不足"}, {"label": "B", "text": "不足"}, {"label": "C", "text": "充足"}, {"label": "D", "text": "过剩"}], "answer": "D", "analysis": "当工序无偏时：\nA工序能力指数＝[（50+0.15）-（50-0.15）]÷（6×0.08）＝0.625。\n \n90.【不定项选择题】B工序的工序能力（　）。\nA.严重不足\nB.不足\nC.充足\nD.过剩"}, {"question": "5，对应工序能力指数判断准则为工序能力等级一级，工序能力判断", "options": [{"label": "A", "text": "改用精度较低但效率高、成本低的设备"}, {"label": "B", "text": "更改设计，提高产品的技术要求"}, {"label": "C", "text": "提高原材料质量"}, {"label": "D", "text": "若设计上允许，降低产品的技术要求"}], "answer": "C", "analysis": "本题考查工序能力的判断与处置。工序能力判断的目的是对工序进行预防性处置，以确保生产过程\n的质量水平。B工序的工序能力指数为1.5，对应工序能力指数判断准则为工序能力等级一级，工序能力判断\n为充足。\n \n91.【不定项选择题】根据C工序的工序能力指数，该企业可以采取的措施是（　）。\nA.改用精度较低但效率高、成本低的设备\nB.更改设计，提高产品的技术要求\nC.提高原材料质量\nD.若设计上允许，降低产品的技术要求"}, {"question": "7，对应工序能力指数判断为过剩。工", "options": [{"label": "A", "text": "生产设备"}, {"label": "B", "text": "生产方法"}, {"label": "C", "text": "市场价格"}, {"label": "D", "text": "作业人员"}], "answer": "A", "analysis": "本题考查工序能力的判断与处置。C工序的工序能力指数为1.7，对应工序能力指数判断为过剩。工\n序能力指数太大，意味着粗活细做，这样必然影响生产效率，增加产品成本。这时，应根据实际情况采取以\n下措施：①降低工序能力，如改用精度较低但效率高、成本低的设备和原材料，合理地将工序能力指数降低\n到适当的水平。②更改设计，提高产品的技术要求。③采取合并或减少工序等方法。\n \n92.【不定项选择题】在该型号钢管的生产过程中，影响工序质量的因素可能是（　）。\nA.生产设备\nB.生产方法\nC.市场价格\nD.作业人员"}, {"question": "3。", "options": [{"label": "A", "text": "确保总投资额最小"}, {"label": "B", "text": "确保经济效益最高"}, {"label": "C", "text": "以最小的投资取得最好的经济效益"}, {"label": "D", "text": "确保改造后能消化推广\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n22"}], "answer": "A", "analysis": "本题考查工序能力的概念。在质量管理过程中，影响工序质量的因素主要包括：人、机器、原料、\n方法、测量和环境，简称5M1E。结合本题即为生产设备、生产方法、作业人员。\n \n【题干】（四）某钢厂领导班子正在对该钢厂的技术改造问题进行经济可行性分析。经过调查得知，该钢厂\n目前年产钢1000万吨，成本居高不下，对环境的污染日益严重，产品质量有所下降，还存在着一定的安全隐\n患。为了解决存在的问题，需耗费9000万元进行技术改造。技术改造完成后，每吨钢的成本将由原来的\n2800元降至2600元。环境污染问题、安全隐患问题和产品质量问题，均能得到一定程度的解决。假设该行业\n的标准投资效益系数为0.3。\n根据以上资料，回答下列问题：\n \n93.【不定项选择题】该钢厂进行技术改造项目的技术选择时，应遵循的原则是（　）。\nA.确保总投资额最小\nB.确保经济效益最高\nC.以最小的投资取得最好的经济效益\nD.确保改造后能消化推广\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n22"}, {"question": "【不定项选择题】用该技术改造方案实施后的净收益额补偿该方案投资额所需的时间称为（　）。", "options": [{"label": "A", "text": "投资投放期"}, {"label": "B", "text": "投资回收期"}, {"label": "C", "text": "项目建设期"}, {"label": "D", "text": "项目周期"}], "answer": "C", "analysis": "本题考查技术改造项目的技术可行性分析。在进行技术等级选择时，企业应遵循的原则包括：\n①以最小的代价取得最好的效果；\n②有利于促进企业的技术进步；\n③确保改造后能够消化推广。\n \n94.【不定项选择题】用该技术改造方案实施后的净收益额补偿该方案投资额所需的时间称为（　）。\nA.投资投放期\nB.投资回收期\nC.项目建设期\nD.项目周期"}, {"question": "【不定项选择题】该技术改造项目完成后，若该厂年钢产量不变，则该厂年经济效益为（　）万元。", "options": [{"label": "A", "text": "179300"}, {"label": "B", "text": "188300"}, {"label": "C", "text": "197300"}, {"label": "D", "text": "200000"}], "answer": "B", "analysis": "本题考查投资回收期的概念。投资回收期是指某技术改造方案的投资额用该方案实施后的净收益额\n来补偿的时间，通常以年为单位。\n \n95.【不定项选择题】该技术改造项目完成后，若该厂年钢产量不变，则该厂年经济效益为（　）万元。\nA.179300\nB.188300\nC.197300\nD.200000"}, {"question": "3×9000", "options": [{"label": "A", "text": "因技术改造需新追加的投资额"}, {"label": "B", "text": "技术改造中拆除的旧设备、旧设施等所造成的损失金额"}, {"label": "C", "text": "技术改造的贷款利息"}, {"label": "D", "text": "拆除的固定资产回收利用的价值"}], "answer": "C", "analysis": "本题考查技术改造项目的经济可行性分析。\nE＝Q1（C0－C1）－E0K总 \n＝1000×（2800－2600）－0.3×9000\n＝197300（万元）\n \n96.【不定项选择题】在计算技术改造方案的总投资时应考虑的因素是（　）。\nA.因技术改造需新追加的投资额\nB.技术改造中拆除的旧设备、旧设施等所造成的损失金额\nC.技术改造的贷款利息\nD.拆除的固定资产回收利用的价值"}, {"question": "8亿元、净利润0.9亿元，经营活动产生", "options": [{"label": "A", "text": "1.56"}, {"label": "B", "text": "1.88"}, {"label": "C", "text": "1.94"}, {"label": "D", "text": "2.01"}], "answer": "A", "analysis": "本题考查技术改造项目的经济可行性分析。K总＝K新＋K损－K利。K新为因技术改造而新追加的投资\n额；K损为技术改造中拆除的旧设备、旧设施等所造成的损失金额；K利为拆除固定资产回收利用的价值。\n \n【题干】（五）某医疗器械股份有限公司，2021年度实现销售收入3.8亿元、净利润0.9亿元，经营活动产生\n的现金流量净额为0.8亿元。该公司2021年简化资产负债表见下表（单位：亿元）。\n \n \n97.【不定项选择题】该公司2021年年末流动比率是（　）。\nA.1.56\nB.1.88\nC.1.94\nD.2.01"}, {"question": "2÷1.7≈1.88。", "options": [{"label": "A", "text": "0.47"}, {"label": "B", "text": "0.56"}, {"label": "C", "text": "0.65"}, {"label": "D", "text": "0.82"}], "answer": "B", "analysis": "本题考查流动比率。流动比率＝流动资产÷流动负债＝3.2÷1.7≈1.88。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n23\n \n98.【不定项选择题】该公司2021年现金流动负债比率为（　）。\nA.0.47\nB.0.56\nC.0.65\nD.0.82"}, {"question": "8÷1.7≈0.47。", "options": [{"label": "A", "text": "短期营运能力"}, {"label": "B", "text": "短期偿债能力"}, {"label": "C", "text": "长期偿债能力"}, {"label": "D", "text": "长期发展能力"}], "answer": "A", "analysis": "本题考查现金流动负债比率。现金流动负债比率＝经营活动产生的现金流量净额÷流动负债。根据\n题目信息可知，现金流动负债比率＝0.8÷1.7≈0.47。\n \n99.【不定项选择题】计算流动比率和现金流动负债比率两个指标可以评价该公司的（　）。\nA.短期营运能力\nB.短期偿债能力\nC.长期偿债能力\nD.长期发展能力"}, {"question": "【不定项选择题】该公司2021年应收账款比年初增加了50％，可能导致公司（　）增加。", "options": [{"label": "A", "text": "机会成本"}, {"label": "B", "text": "资本成本"}, {"label": "C", "text": "坏账损失"}, {"label": "D", "text": "收账费用"}], "answer": "B", "analysis": "本题考查偿债能力比率。流动比率和现金流动负债比率反映短期偿债能力。\n \n100.【不定项选择题】该公司2021年应收账款比年初增加了50％，可能导致公司（　）增加。\nA.机会成本\nB.资本成本\nC.坏账损失\nD.收账费用"}, {"question": "生产过程的均衡性原则又称为（　）。", "options": [{"label": "A", "text": "连续性原则"}, {"label": "B", "text": "节奏性原则"}, {"label": "C", "text": "比例性原则"}, {"label": "D", "text": "准时性原则"}], "answer": "B", "analysis": "生产系统内部循环利用的内容通常包括：①将废物.废热回收作为能量利用；②将流失的原料.产品\n回收，返回主体流程之中使用；③将回收的废物分解处理成原料或原料成分，复用于生产流程中；④组织闭\n路用水循环或一水多用等。B为产品改革替代内容。\n \n2.生产过程的均衡性原则又称为（　）。\nA.连续性原则\nB.节奏性原则\nC.比例性原则\nD.准时性原则"}], "考前点题（101-150题）": [{"question": "自行车生产企业的装配流水线车间所采用的生产过程空间组织形式是（　）。", "options": [{"label": "A", "text": "固定布置"}, {"label": "B", "text": "工艺专业化布置"}, {"label": "C", "text": "混合式布置"}, {"label": "D", "text": "对象专业化布置"}], "answer": "B", "analysis": "生产过程的节奏性也可称为均衡性，是指产品在生产过程中各个阶段，从投料到最后完工入库，都\n能保证按计划.有节奏.均衡地进行，要求在相同的时间间隔内，生产大致相同数量或递增数量的产品，避免\n前松后紧或者前紧后松等现象。\n \n3.自行车生产企业的装配流水线车间所采用的生产过程空间组织形式是（　）。\nA.固定布置\nB.工艺专业化布置\nC.混合式布置\nD.对象专业化布置"}, {"question": "下列关于固定投资的特点，说法错误的是（　）。", "options": [{"label": "A", "text": "投资数额大"}, {"label": "B", "text": "回收时间长"}, {"label": "C", "text": "发生次数多"}, {"label": "D", "text": "变现能力差"}], "answer": "D", "analysis": "对象专业化布置是以产品（或零部件）为对象来设置生产单位的。在这种生产单位中，集中了为生\n产某种产品所需要的各种设备和各工种的工人。基本上能独立完成某几种产品（或零部件）的全部或大部分\n工艺过程。\n \n4.下列关于固定投资的特点，说法错误的是（　）。\nA.投资数额大\nB.回收时间长\nC.发生次数多\nD.变现能力差"}, {"question": "下列关于过程能力分析法的说法错误的是（　）。", "options": [{"label": "A", "text": "过程能力即满足产品质量要求的能力"}, {"label": "B", "text": "过程能力和产品质量的实际波动成正比"}, {"label": "C", "text": "过程能力是指过程处于受控或稳定状态下的实际加工能力"}, {"label": "D", "text": "影响过程质量的因素主要包括人.机器.原料.方法.测量和环境\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n1"}], "answer": "C", "analysis": "固定资产是指使用年限在一年以上，单位价值较高，并且在使用过程中保持原来物质形态的资产。\n特点是：①投资数额大，发生次数少；②回收时间长；③变现能力差。\n \n5.下列关于过程能力分析法的说法错误的是（　）。\nA.过程能力即满足产品质量要求的能力\nB.过程能力和产品质量的实际波动成正比\nC.过程能力是指过程处于受控或稳定状态下的实际加工能力\nD.影响过程质量的因素主要包括人.机器.原料.方法.测量和环境\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n1"}, {"question": "下列关于产品质量认证和质量管理体系认证的说法正确的是（　）。", "options": [{"label": "A", "text": "产品质量认证的认证对象为企业的质量管理体系"}, {"label": "B", "text": "产品质量认证的证书和标记都不能在产品上使用"}, {"label": "C", "text": "质量管理体系认证的证明方式为质量管理体系认证（注册）证书及认证标记"}, {"label": "D", "text": "质量管理体系认证对认证产品实施监督检查，对质量管理体系实施监督检查（审核）"}], "answer": "B", "analysis": "过程能力又称工序能力或工艺能力，它是指过程处于受控或稳定状态下的实际加工能力。通俗地说\n，它是过程能稳定地生产合格产品的能力，即满足产品质量要求的能力。在质量管理过程中，影响过程质量\n的因素主要包括：人（Man）.机器（Machine）.原料（Material）.方法（Method）.测量（Measurement）和\n环境（Environment），简称5M1E。一般情况下，过程能力和产品质量的实际波动成反比，即过程能力越高\n，质量波动越小，产品质量越容易得到保证。因此，常用质量特征值波动的统计学规律来描述过程能力。\n \n6.下列关于产品质量认证和质量管理体系认证的说法正确的是（　）。\nA.产品质量认证的认证对象为企业的质量管理体系\nB.产品质量认证的证书和标记都不能在产品上使用\nC.质量管理体系认证的证明方式为质量管理体系认证（注册）证书及认证标记\nD.质量管理体系认证对认证产品实施监督检查，对质量管理体系实施监督检查（审核）"}, {"question": "关于直线关系与参谋关系，下列说法有误的是（　）。", "options": [{"label": "A", "text": "直线关系是上级指挥下级的关系"}, {"label": "B", "text": "参谋实质上是一种命令关系"}, {"label": "C", "text": "参谋的设置主要是为了方便直线主管的工作，减轻他们的工作负担"}, {"label": "D", "text": "直线主管可能会授予参谋部分职能权力"}], "answer": "C", "analysis": "A产品质量认证的认证对象是特定产品。B.产品证书不能用于产品，标志可用于获准认证的产品上\n.D.质量管理体系认证定期监督供方质量管理体系认证机构，不对产品实物实施监督检查\n \n7.关于直线关系与参谋关系，下列说法有误的是（　）。\nA.直线关系是上级指挥下级的关系\nB.参谋实质上是一种命令关系\nC.参谋的设置主要是为了方便直线主管的工作，减轻他们的工作负担\nD.直线主管可能会授予参谋部分职能权力"}, {"question": "企业之所以出现，是因为___费用低于市场的___费用所致。（　）", "options": [{"label": "A", "text": "组织管理；交易"}, {"label": "B", "text": "交易；组织管理"}, {"label": "C", "text": "交易管理；组织"}, {"label": "D", "text": "组织交易；管理"}], "answer": "B", "analysis": "企业中的管理人员根据工作方式与具体作用不同可以分为直线主管和参谋两种类型。这两类管理人\n员，对于企业生产经营活动的展开和组织目标的实现都是必需的。直线关系是上级指挥下级的关系，其实质\n上是一种命令关系。参谋的设置主要是为了方便直线主管的工作，减轻他们的工作负担。虽然随着企业的发\n展，参谋机构会逐渐规范化，为了方便这些机构的工作，直线主管也会授予它们部分职能权力。\n \n8.企业之所以出现，是因为___费用低于市场的___费用所致。（　）\nA.组织管理；交易\nB.交易；组织管理\nC.交易管理；组织\nD.组织交易；管理"}, {"question": "根据我国《产品质量法》的有关规定，生产者.销售者对有关质量监督部门对其产品抽查检验的结果有异议", "options": [{"label": "A", "text": "7日"}, {"label": "B", "text": "15日"}, {"label": "C", "text": "1个月"}, {"label": "D", "text": "3个月"}], "answer": "A", "analysis": "新制度学派认为，企业作为商品经济发展到一定阶段的产物，是因为企业能作为在某种状态下替代\n市场的一种较低交易费用的资源配置方式。企业在某种状态下可将外部的市场交易行为变成企业内部有组织\n.有计划.有监督.有奖惩的合作和交换行为，使组织管理费用低于市场的交易费用。\n \n9.根据我国《产品质量法》的有关规定，生产者.销售者对有关质量监督部门对其产品抽查检验的结果有异议\n的，其申请复检须在收到检验结果之日起（　）内提出。\nA.7日\nB.15日\nC.1个月\nD.3个月"}, {"question": "常用的在职培训方法是（　）。", "options": [{"label": "A", "text": "师带徒.工作轮换.教练.行动学习"}, {"label": "B", "text": "工作轮换.教练.行动学习.演讲法"}, {"label": "C", "text": "师带徒.教练.情景模拟法.初级董事会"}, {"label": "D", "text": "师带徒.工作轮换.教练.行为示范法"}], "answer": "B", "analysis": "根据《产品质量法》的规定，生产者.销售者对抽查检验的结果有异议的，可以自收到检验结果之日\n起15日内向实施监督抽查的产品质量监督部门或者其上级产品质量监督部门申请复检，由受理复检的产品质\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n2\n量监督部门做出复检结论。\n \n10.常用的在职培训方法是（　）。\nA.师带徒.工作轮换.教练.行动学习\nB.工作轮换.教练.行动学习.演讲法\nC.师带徒.教练.情景模拟法.初级董事会\nD.师带徒.工作轮换.教练.行为示范法"}, {"question": "企业技术改造的核心是（　）。", "options": [{"label": "A", "text": "表层技术改造"}, {"label": "B", "text": "内层技术改造"}, {"label": "C", "text": "中层技术改造"}, {"label": "D", "text": "深层技术改造"}], "answer": "A", "analysis": "在职培训，又称在岗培训.不脱产培训，是指为了使员工具备有效完成工作任务所必需的知识.技能\n和态度，在不离开工作岗位的情况下，对员工进行培训。其方法包括师带徒.工作轮换.教练.行动学习等。\n \n11.企业技术改造的核心是（　）。\nA.表层技术改造\nB.内层技术改造\nC.中层技术改造\nD.深层技术改造"}, {"question": "邮寄调查法的优点不包括（　）。", "options": [{"label": "A", "text": "调查费用高"}, {"label": "B", "text": "调查区域广"}, {"label": "C", "text": "无须对调查人员进行专门的培训和管理"}, {"label": "D", "text": "被调查者有较充分的时间填写问卷，无时间上的压力，回答质量较高"}], "answer": "D", "analysis": "深层技术改造主要表现为企业科学化管理的实施，是企业技术改造的核心，是企业技术改造成功的\n根本保证，是经过深入研究才能感受到的“技术改造”。\n \n12.邮寄调查法的优点不包括（　）。\nA.调查费用高\nB.调查区域广\nC.无须对调查人员进行专门的培训和管理\nD.被调查者有较充分的时间填写问卷，无时间上的压力，回答质量较高"}, {"question": "企业组织变革中的文化变革主要涉及（　）。", "options": [{"label": "A", "text": "企业技术的变化"}, {"label": "B", "text": "企业结构的变化"}, {"label": "C", "text": "员工思维的变化"}, {"label": "D", "text": "企业产品的变化"}], "answer": "A", "analysis": "邮寄调查法的优点包括：①调查区域较广；②调查费用较低，只需花费少量邮资和印刷费用；③被\n调查者有较充分的时间填写问卷，被调查者无时间上的压力，回答质量较高；④通过让被调查者采取匿名方\n式，可对某些敏感和隐私情况进行调查；⑤无须对调查人员进行专门的培训和管理。\n \n13.企业组织变革中的文化变革主要涉及（　）。\nA.企业技术的变化\nB.企业结构的变化\nC.员工思维的变化\nD.企业产品的变化"}, {"question": "在生产运作单位中，集中同类型的设施，进行相类似的生产加工或服务活动的生产布置形式称为（　）", "options": [{"label": "A", "text": "固定布置"}, {"label": "B", "text": "工艺专业化布置"}, {"label": "C", "text": "对象专业化布置"}, {"label": "D", "text": "混合式布置"}], "answer": "C", "analysis": "文化变革是指针对企业员工的价值观.态度.期望.信仰，以及行为和能力等方面所进行的变革。文化\n变革主要涉及员工思维的变化，这种变化完全是精神方面的，而非技术.结构或产品等物质方面的。\n \n14.在生产运作单位中，集中同类型的设施，进行相类似的生产加工或服务活动的生产布置形式称为（　）\nA.固定布置\nB.工艺专业化布置\nC.对象专业化布置\nD.混合式布置"}, {"question": "下列关于网络调查法优缺点的表述，错误的是（　）。", "options": [{"label": "A", "text": "样本对象的局限性"}, {"label": "B", "text": "网络安全性和个人资料保密性有待提高"}, {"label": "C", "text": "网络调查的便捷性好，但成本较高"}, {"label": "D", "text": "数据质量高"}], "answer": "B", "analysis": "工艺专业化布置是按照生产过程各个工艺阶段的工艺特点来设置生产单位。这种设施布置有明显的\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3\n工艺专业化或工作专业化的特征，在某个生产运作单位中，集中同类型的设施，如设备.工具.仪器.人员等\n，进行相类似的生产加工或服务活动。\n \n15.下列关于网络调查法优缺点的表述，错误的是（　）。\nA.样本对象的局限性\nB.网络安全性和个人资料保密性有待提高\nC.网络调查的便捷性好，但成本较高\nD.数据质量高"}, {"question": "某企业采用流水线方式生产汽车，则该流水线—天连续生产两辆相同汽车的间隔时间就是该流水线的（", "options": [{"label": "A", "text": "生产周期"}, {"label": "B", "text": "生产提前期"}, {"label": "C", "text": "生产率"}, {"label": "D", "text": "节拍"}], "answer": "C", "analysis": "网络调查法是一种新兴的调查方法。其优点有：①速度快；②成本低；③数据质量高。其缺点有\n：①样本对象的局限性；②网络安全性和个人资料保密性有待提高；③网络调查方法与技术有待完善。\n \n16.某企业采用流水线方式生产汽车，则该流水线—天连续生产两辆相同汽车的间隔时间就是该流水线的（　\n）。\nA.生产周期\nB.生产提前期\nC.生产率\nD.节拍"}, {"question": "某企业为某零件进行单对象流水线的组织设计，日生产量为80件，每日工作8小时，时间利用系数为", "options": [{"label": "A", "text": "4.6"}, {"label": "B", "text": "5.0"}, {"label": "C", "text": "5.6"}, {"label": "D", "text": "6.0"}], "answer": "D", "analysis": "流水线的节拍是指流水线生产上连续生产两个相同制品的间隔时间。\n \n17.某企业为某零件进行单对象流水线的组织设计，日生产量为80件，每日工作8小时，时间利用系数为\n0.96，废品率为2%，则该流水线的平均节拍是（　）分/件。\nA.4.6\nB.5.0\nC.5.6\nD.6.0"}, {"question": "9~0.96；Q为计划", "options": [{"label": "A", "text": "观察法"}, {"label": "B", "text": "访谈法"}, {"label": "C", "text": "工作日志法"}, {"label": "D", "text": "问卷法"}], "answer": "C", "analysis": "流水线的平均节拍计算式为：r=Te/Q=βT0/Q。式中，r为流水线的平均节拍；Te为计划期流水线的\n有效工作时间；T0为计划期流水线的制度工作时间；β为工作时间有效利用系数，一般为0.9~0.96；Q为计划\n期的产品产量（包括计划产量和预计废品量）。由题可得，计划期流水线的有效工作时间\nTe=0.96×60×8=460.8（分），计划期的产品总产量Q=80/（1-0.02）=81.6（件），则流水线的平均节拍\n=460.8/81.6=5.6（分/件）。\n \n18.可以简单而又迅速地收集到工作分析的信息，可控性强，适用面广的工作分析方法是（　）。\nA.观察法\nB.访谈法\nC.工作日志法\nD.问卷法"}, {"question": "长时间.连续地跟踪和调查固定消费群体行为属于（　）。", "options": [{"label": "A", "text": "专项市场调查"}, {"label": "B", "text": "探测性市场调查\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n4"}, {"label": "C", "text": "定期市场调查"}, {"label": "D", "text": "连续性市场调查"}], "answer": "B", "analysis": "访谈法是工作分析人员通过与工作承担者进行面对面的交谈来获取有关信息资料的方法。访谈法的\n优点是可以简单而又迅速地收集到工作分析的信息，可控性强，适用面广。\n \n19.长时间.连续地跟踪和调查固定消费群体行为属于（　）。\nA.专项市场调查\nB.探测性市场调查\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n4\nC.定期市场调查\nD.连续性市场调查"}, {"question": "下列情况会造成劳动合同无效的是（　）。", "options": [{"label": "A", "text": "劳动者由于自身原因对合同理解不全订立的劳动合同"}, {"label": "B", "text": "违反行业规定的劳动合同"}, {"label": "C", "text": "企业免除自己的法定责任.排除劳动者权利订立的劳动合同"}, {"label": "D", "text": "企业免除自己的道德责任订立的劳动合同"}], "answer": "D", "analysis": "连续性市场调查是指对一个（或几个）固定的市场调查样本进行长时间.不间断的调查，以收集有时\n间序列化的信息资料。样本中的被调查对象（人或单位）一般不随调查时间的变化而变化。如长时间.连续地\n跟踪和调查固定消费群体的购买行为，企业持续性地跟踪调查产品市场价格的变化等都属于连续性调查。\n \n20.下列情况会造成劳动合同无效的是（　）。\nA.劳动者由于自身原因对合同理解不全订立的劳动合同\nB.违反行业规定的劳动合同\nC.企业免除自己的法定责任.排除劳动者权利订立的劳动合同\nD.企业免除自己的道德责任订立的劳动合同"}, {"question": "企业组织各生产单位系统而全面地尽早发现安全隐患，及时处理，使企业的安全生产事故为零，这体现了", "options": [{"label": "A", "text": "周期性"}, {"label": "B", "text": "稳健性"}, {"label": "C", "text": "可持续性"}, {"label": "D", "text": "预防性"}], "answer": "C", "analysis": "根据《劳动合同法》的规定，无效劳动合同主要有三类：①以欺诈.胁迫的手段或者乘人之危，使对\n方在违背真实意思的情况下订立或者变更的劳动合同；②企业免除自己的法定责任.排除劳动者权利订立的劳\n动合同；③违反法律.行政法规强制性规定的劳动合同。\n \n21.企业组织各生产单位系统而全面地尽早发现安全隐患，及时处理，使企业的安全生产事故为零，这体现了\n安全生产的（　）。\nA.周期性\nB.稳健性\nC.可持续性\nD.预防性"}, {"question": "企业组织结构的具体形式应当与行业特点.企业规模.管理水平相适应，目前国外大型企业普遍采用的组织", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "事业部制"}], "answer": "D", "analysis": "安全生产具有预防性.长期性.科学性和群众性的特点。其中，预防性是指要把安全生产工作做在事\n故发生之前，居安思危，尽早发现苗头，及时处理，以减少或消除损失。\n \n22.企业组织结构的具体形式应当与行业特点.企业规模.管理水平相适应，目前国外大型企业普遍采用的组织\n形式是（　）。\nA.直线制\nB.职能制\nC.矩阵制\nD.事业部制"}, {"question": "某公司拟建一个加工厂，分析人员在地图上设计参照坐标，并确定相关地址的坐标（单位：千米）。分析", "options": [{"label": "A", "text": "（4.98，3.98）"}, {"label": "B", "text": "（4.31，3.76）"}, {"label": "C", "text": "（4.46，3.72）\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5"}, {"label": "D", "text": "（4.53，3.21）"}], "answer": "D", "analysis": "现代企业组织结构的形式主要有：直线制.职能制.直线职能制.矩阵制.事业部制和企业集团结构。\n其中，事业部制又称联邦分权制，它是目前国外大型企业普遍采用的一种管理组织形式。其特点是：在总公\n司的统一领导下，按产品或地区.市场的不同，分别建立经营事业部。每一个事业部都是在总公司控制下的利\n润中心，具有利润创造.利润计算和利润管理的职能，同时又是产品责任单位或市场责任单位，有自己的产品\n和独立的市场。\n \n23.某公司拟建一个加工厂，分析人员在地图上设计参照坐标，并确定相关地址的坐标（单位：千米）。分析\n表明：每年需要由A（2，2）地运来物资180吨，从B（3，5）地运来物资100吨，从C（5，4）地运来物资\n800吨。根据重心法，合理建厂的地理位置坐标应是（　）。\nA.（4.98，3.98）\nB.（4.31，3.76）\nC.（4.46，3.72）\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5\nD.（4.53，3.21）"}, {"question": "31（千米", "options": [{"label": "A", "text": "经营机制"}, {"label": "B", "text": "企业素质"}, {"label": "C", "text": "文化素质"}, {"label": "D", "text": "人员素质"}], "answer": "B", "analysis": "本题考查重心法的计算方法。X0＝（180×2＋100×3＋800×5）/（180＋100＋800）＝4.31（千米\n）。Y0＝（180×2＋100×5＋800×4）/（180＋100＋800）＝3.76（千米）。根据计算结果，在坐标为\n（4.31，3.76）（千米）的地方建厂比较合适。\n \n24.构成企业活动能量大小的各种要素及其有机结合所产生的能力称为（　）。\nA.经营机制\nB.企业素质\nC.文化素质\nD.人员素质"}, {"question": "一般只适用于小范围调查的是（　）。", "options": [{"label": "A", "text": "访问法"}, {"label": "B", "text": "观察法"}, {"label": "C", "text": "实验调查法"}, {"label": "D", "text": "网络调查法"}], "answer": "B", "analysis": "本题考查企业素质的概念。企业素质是指企业内在的本质，即构成企业活动能量大小的各种要素及\n其有机结合所产生的能力。\n \n25.一般只适用于小范围调查的是（　）。\nA.访问法\nB.观察法\nC.实验调查法\nD.网络调查法"}, {"question": "（　）对接受者的行为产生影响，对接受者的决策具有价值。", "options": [{"label": "A", "text": "信息"}, {"label": "B", "text
