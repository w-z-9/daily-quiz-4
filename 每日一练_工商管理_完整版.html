生产过程空间组织最常见的形式是（ ）。", "options": [{"label": "A", "text": "工艺专业化布置"}, {"label": "B", "text": "对象专业化布置"}, {"label": "C", "text": "混合式布置"}, {"label": "D", "text": "固定布置"}], "answer": "C", "analysis": "本题考查对象专业化布置的特点，根据题目信息A符合题意。\n6.企业生产过程空间组织最常见的形式是（ ）。\nA.工艺专业化布置\nB.对象专业化布置\nC.混合式布置\nD.固定布置"}, {"question": "关于流水生产线的说法，错误的是（ ）。", "options": [{"label": "A", "text": "流水生产线的加工对象是固定的，工作地的专业化程度较高"}, {"label": "B", "text": "流水生产线上各种工序的工作地数量与该工序单件工时成反比"}, {"label": "C", "text": "流水生产线的各工作地按工艺过程的顺序排列"}, {"label": "D", "text": "流水生产线上各道工序具有大体相等的生产率"}], "answer": "B", "analysis": "本题考查生产过程空间组织的形式。混合式布置实际上是最常见的。\n7.关于流水生产线的说法，错误的是（ ）。\nA.流水生产线的加工对象是固定的，工作地的专业化程度较高\nB.流水生产线上各种工序的工作地数量与该工序单件工时成反比\nC.流水生产线的各工作地按工艺过程的顺序排列\nD.流水生产线上各道工序具有大体相等的生产率"}, {"question": "若采用自动线方式进行生产，则排列自动线生产设备的依据是（ ）。", "options": [{"label": "A", "text": "工艺程序"}, {"label": "B", "text": "生产量"}, {"label": "C", "text": "生产定额"}, {"label": "D", "text": "产品精度"}], "answer": "A", "analysis": "本题考查流水生产线的特征。选项B错误，线上各工序的工作地数量与该工序单件工时的比值保持一\n致。\n8.若采用自动线方式进行生产，则排列自动线生产设备的依据是（ ）。\nA.工艺程序\nB.生产量\nC.生产定额\nD.产品精度"}, {"question": "下列企业部门中，依法对企业安全生产工作进行监督的是（ ）。", "options": [{"label": "A", "text": "工会"}, {"label": "B", "text": "保卫处"}, {"label": "C", "text": "人事处"}, {"label": "D", "text": "生产部"}], "answer": "A", "analysis": "本题考查自动线组织。自动线是将按工艺顺序排列的若干台自动设备，用一套自动控制装配和自动\n传送装置联系起来的自动作业线。\n9.下列企业部门中，依法对企业安全生产工作进行监督的是（ ）。\nA.工会\nB.保卫处\nC.人事处\nD.生产部"}, {"question": "清洁生产的目标是（ ）。", "options": [{"label": "A", "text": "最大限度地减少污染"}, {"label": "B", "text": "提高生产效率"}, {"label": "C", "text": "保持生产工具干净"}, {"label": "D", "text": "提高产品质量"}], "answer": "A", "analysis": "本题考查生产经营单位的安全生产职责。《安全生产法》对生产经营单位的安全生产责任进行了明\n确规定，生产经营单位的主要负责人对本单位的安全生产工作全面负责，其从业人员有依法获得安全生产保\n障的权利，并应当依法履行安全生产方面的义务，工会依法对安全生产工作进行监督。\n10.清洁生产的目标是（ ）。\nA.最大限度地减少污染\nB.提高生产效率\nC.保持生产工具干净\nD.提高产品质量"}, {"question": "企业把需要与不需要的人、事、物分开，再将不需要的人、事、物加以处理，这种活动属于“5S”活动的 （ ）内容。", "options": [{"label": "A", "text": "整理"}, {"label": "B", "text": "整顿"}, {"label": "C", "text": "清洁"}, {"label": "D", "text": "反省"}], "answer": "A", "analysis": "本题考查清洁生产的目标。清洁生产的目标是：促进生产发展，满足人类需求，同时有效利用能源\n和物质，最大限度地减少污染，使经济发展与环境保护相协调，营造人与自然和谐发展的客观局面。\n2\n11.企业把需要与不需要的人、事、物分开，再将不需要的人、事、物加以处理，这种活动属于“5S”活动的\n（ ）内容。\nA.整理\nB.整顿\nC.清洁\nD.反省"}, {"question": "关于自动线的优缺点，下列说法正确的是（ ）。", "options": [{"label": "A", "text": "提高工资成本"}, {"label": "B", "text": "降低流动资金周转"}, {"label": "C", "text": "投资数额小"}, {"label": "D", "text": "回收期长"}], "answer": "D", "analysis": "本题考查“55”管理的内容和具体要求。整理就是把需要与不需要的人、事、物分开，再将不需要\n的人、事、物加以处理。\n12.关于自动线的优缺点，下列说法正确的是（ ）。\nA.提高工资成本\nB.降低流动资金周转\nC.投资数额小\nD.回收期长"}, {"question": "生产过程时间组织的目的是提高生产过程的（ ）。", "options": [{"label": "A", "text": "连续性和比例性"}, {"label": "B", "text": "时效性和比例性"}, {"label": "C", "text": "连续性和节奏性"}, {"label": "D", "text": "时效性和连续性"}], "answer": "C", "analysis": "本题考查自动线组织。自动线具有降低工资成本、加速流动资金周转、缩短生产周期、稳定产品质\n量的优点。缺点是投资数额巨大，回收期长，且自动线任一地方出现小故障，都会造成自动线生产的中断。\n掌握“自动线组织”知识点。\n13.生产过程时间组织的目的是提高生产过程的（ ）。\nA.连续性和比例性\nB.时效性和比例性\nC.连续性和节奏性\nD.时效性和连续性"}, {"question": "设某种零件批量n＝5；加工工序数m＝3；每道工序的单件加工时间：t1＝5分钟，t2＝15分钟，t3＝5分钟 ，如果采用顺序移动方式进行零件生产，将一个批次的该种零件全部生产出来的时间是（ ）分钟。", "options": [{"label": "A", "text": "135"}, {"label": "B", "text": "125"}, {"label": "C", "text": "145"}, {"label": "D", "text": "155"}], "answer": "B", "analysis": "本题考查生产过程的时间组织。生产过程的时间组织就是指在时间上对劳动对象在车间之间、工段\n之间及工作地之间的运动配合与衔接进行合理的安排和设计。其目的是以最大限度地提高生产过程的连续性\n和节奏性，来实现提高生产率、降低成本、缩短生产周期的目标。\n掌握“顺序移动方式、平行移动方式”知识点。\n14.设某种零件批量n＝5；加工工序数m＝3；每道工序的单件加工时间：t1＝5分钟，t2＝15分钟，t3＝5分钟\n，如果采用顺序移动方式进行零件生产，将一个批次的该种零件全部生产出来的时间是（ ）分钟。\nA.135\nB.125\nC.145\nD.155"}, {"question": "产品在生产过程中始终处于运动状态，不是在进行加工、装配、检验就是处于运输或自然过程中，这体现 了生产过程的（ ）。", "options": [{"label": "A", "text": "比例性原则"}, {"label": "B", "text": "节奏型原则"}, {"label": "C", "text": "连续性原则"}, {"label": "D", "text": "准时性原则"}], "answer": "C", "analysis": "本题考查顺序移动方式的计算方法。T＝5×（5＋15＋5）＝125（分钟）。\n掌握“顺序移动方式、平行移动方式”知识点。\n15.产品在生产过程中始终处于运动状态，不是在进行加工、装配、检验就是处于运输或自然过程中，这体现\n了生产过程的（ ）。\nA.比例性原则\nB.节奏型原则\n3\nC.连续性原则\nD.准时性原则"}, {"question": "企业的生产按连续程度可划分为（ ）。", "options": [{"label": "A", "text": "连续型生产和间断型生产"}, {"label": "B", "text": "集中型生产和分散型生产"}, {"label": "C", "text": "离散型生产和连续型生产"}, {"label": "D", "text": "离散型生产和间断型生产"}], "answer": "C", "analysis": "本题考查连续性原则。生产过程连续性是指产品在生产过程各阶段、各工序之间的流动，在时间上\n是紧密衔接、连续不断的。也就是说，产品在生产过程中始终处于运动状态，不是在进行加工、装配、检验\n，就是处于运输或自然过程中，没有或很少有不必要的停顿和等待时间。\n掌握“生产过程组织、生产类型”知识点。\n16.企业的生产按连续程度可划分为（ ）。\nA.连续型生产和间断型生产\nB.集中型生产和分散型生产\nC.离散型生产和连续型生产\nD.离散型生产和间断型生产"}, {"question": "重型机床、机车、锅炉、发电机组等应采用的生产过程空间组织形式是（ ）。", "options": [{"label": "A", "text": "工艺专业化布置"}, {"label": "B", "text": "对象专业化布置"}, {"label": "C", "text": "混合式布置"}, {"label": "D", "text": "固定布置"}], "answer": "D", "analysis": "本题考查生产类型。企业的生产按连续程度可划分为：连续型生产和离散型生产。\n掌握“生产过程组织、生产类型”知识点。\n17.重型机床、机车、锅炉、发电机组等应采用的生产过程空间组织形式是（ ）。\nA.工艺专业化布置\nB.对象专业化布置\nC.混合式布置\nD.固定布置"}, {"question": "单件小批企业多采用的移动方式为（ ）。", "options": [{"label": "A", "text": "顺序移动方式"}, {"label": "B", "text": "平行移动方式"}, {"label": "C", "text": "随机移动方式"}, {"label": "D", "text": "平行顺序移动方式"}], "answer": "A", "analysis": "本题考查固定布置。固定布置主要适用于体积大、重量也很大、难以移动的产品。如重型机床、船\n舶、飞机、机车、锅炉、发电机组等。\n掌握“生产过程空间组织的原则与形式”知识点。\n18.单件小批企业多采用的移动方式为（ ）。\nA.顺序移动方式\nB.平行移动方式\nC.随机移动方式\nD.平行顺序移动方式"}, {"question": "工序劳动量不大，重量较轻的零件，宜采用的移动方式为（ ）。", "options": [{"label": "A", "text": "顺序移动方式"}, {"label": "B", "text": "随机移动方式"}, {"label": "C", "text": "平行移动方式"}, {"label": "D", "text": "平行顺序移动方式"}], "answer": "A", "analysis": "本题考查三种移动方式的比较。单件小批企业多采用顺序移动方式；大量大批生产，特别是组织流\n水线生产时，宜采用平行移动方式或平行顺序移动方式。\n掌握“三种移动方式的比较”知识点。\n19.工序劳动量不大，重量较轻的零件，宜采用的移动方式为（ ）。\nA.顺序移动方式\nB.随机移动方式\nC.平行移动方式\nD.平行顺序移动方式"}, {"question": "物料的循环再利用是生产过程流程中常见的做法，其基本特征是（ ）。", "options": [{"label": "A", "text": "仅将主体流程中的废物加以收集处理并再利用"}, {"label": "B", "text": "将主体流程以外的废物加以收集处理并再利用"}, {"label": "C", "text": "改变主体流程，并将主体流程中的废物加以收集处理并再利用"}, {"label": "D", "text": "不改变主体流程，主体流程中的废物加以收集处理并不再利用"}], "answer": "A", "analysis": "本题考查三种移动方式的比较。工序劳动量不大，重量较轻的零件，宜采用顺序移动方式。\n掌握“三种移动方式的比较”知识点。\n4\n20.物料的循环再利用是生产过程流程中常见的做法，其基本特征是（ ）。\nA.仅将主体流程中的废物加以收集处理并再利用\nB.将主体流程以外的废物加以收集处理并再利用\nC.改变主体流程，并将主体流程中的废物加以收集处理并再利用\nD.不改变主体流程，主体流程中的废物加以收集处理并不再利用"}, {"question": "无汞电池的设计制造、机器设备使用寿命的延长或可拆卸产品的开发等，属于清洁生产基本途径中的（ ）。", "options": [{"label": "A", "text": "原材料的有效使用和替代"}, {"label": "B", "text": "生产系统内部循环利用"}, {"label": "C", "text": "产品改革替代"}, {"label": "D", "text": "改革工艺和设备"}], "answer": "C", "analysis": "本题考查基于生产过程的清洁生产。生产系统内部循环利用是指一个企业生产过程中的物料的循环\n再利用。一般情况下，物料的循环再利用是生产过程流程中常见的做法。其基本特征是不改变主体流程，仅\n将主体流程中的废物加以收集处理并再利用。\n掌握“清洁生产”知识点。\n21.无汞电池的设计制造、机器设备使用寿命的延长或可拆卸产品的开发等，属于清洁生产基本途径中的（\n）。\nA.原材料的有效使用和替代\nB.生产系统内部循环利用\nC.产品改革替代\nD.改革工艺和设备"}, {"question": "某公司拟建一个加工厂，分析人员在地图上设计参照坐标，并确定相关地址的坐标（单位：千米）。分析 表明：每年需要由A（2，2）地运来物资180吨，从B（3，5）地运来物资100吨，从C（5，4）地运来物资 800吨。根据重心法，合理建厂的地理位置坐标应是（ ）。", "options": [{"label": "A", "text": "（4.98，3.98）"}, {"label": "B", "text": "（4.31，3.76）"}, {"label": "C", "text": "（4.46，3.72）"}, {"label": "D", "text": "（4.53，3.21）"}], "answer": "B", "analysis": "本题考查基于生产过程的清洁生产。通过产品改革替代生产清洁产品是清洁生产过程中的一项基本\n内容。它可包括改进产品体系，产品报废的回用、再生，产品替代、再设计等方面。例如无汞电池的设计制\n造、机器设备使用寿命的延长或可拆卸产品的开发等。\n掌握“清洁生产”知识点。\n22.某公司拟建一个加工厂，分析人员在地图上设计参照坐标，并确定相关地址的坐标（单位：千米）。分析\n表明：每年需要由A（2，2）地运来物资180吨，从B（3，5）地运来物资100吨，从C（5，4）地运来物资\n800吨。根据重心法，合理建厂的地理位置坐标应是（ ）。\nA.（4.98，3.98）\nB.（4.31，3.76）\nC.（4.46，3.72）\nD.（4.53，3.21）"}, {"question": "（ ）的基本思想是所选厂址可使主要原材料或货物总运量距离最小。", "options": [{"label": "A", "text": "投资费用比较法"}, {"label": "B", "text": "线性规划法"}, {"label": "C", "text": "分支界限法"}, {"label": "D", "text": "重心法"}], "answer": "D", "analysis": "本题考查重心法的计算方法。X0＝（180×2＋100×3＋800×5）/（180＋100＋800）＝4.31（千米\n）。Y0＝（180×2＋100×5＋800×4）/（180＋100＋800）＝3.76（千米）。根据计算结果，在坐标为\n（4.31，3.76）（千米）的地方建厂比较合适。\n掌握“厂址选择”知识点。\n23.（ ）的基本思想是所选厂址可使主要原材料或货物总运量距离最小。\nA.投资费用比较法\nB.线性规划法\nC.分支界限法\nD.重心法"}, {"question": "某煤矿企业为了赶进度，违反安全生产程序进行超量挖掘，这种行为不符合安全生产的（ ）要求。", "options": [{"label": "A", "text": "效率性"}, {"label": "B", "text": "周期性"}, {"label": "C", "text": "科学性"}, {"label": "D", "text": "群众性"}], "answer": "C", "analysis": "本题考查厂址选择的方法。重心法的基本思想是所选厂址可使主要原材料或货物总运量距离最小。\n掌握“厂址选择”知识点。\n24.某煤矿企业为了赶进度，违反安全生产程序进行超量挖掘，这种行为不符合安全生产的（ ）要求。\n5\nA.效率性\nB.周期性\nC.科学性\nD.群众性"}, {"question": "下列生产活动中，属于劳动过程的是（ ）。", "options": [{"label": "A", "text": "用车床加工零件表面"}, {"label": "B", "text": "将铸件放在普通空气中冷却"}, {"label": "C", "text": "用钻床钻孔"}, {"label": "D", "text": "油漆晾干"}], "answer": "ACE", "analysis": "本题考查安全生产的特点。安全生产是有一定规律的，偶然、突发往往寓于必然之中。要学习安全\n生产科学知识，科学把握安全生产规律，运用科学手段、工具去预防、发现、制止和处理安全生产问题。\n掌握“安全生产管理”知识点。\n多项选择题\n25.下列生产活动中，属于劳动过程的是（ ）。\nA.用车床加工零件表面\nB.将铸件放在普通空气中冷却\nC.用钻床钻孔\nD.油漆晾干\nE.用染料上色"}, {"question": "ACE 【解析】本题考查生产过程的概念。BD属于自然过程。 26.下列产品中，其生产过程属于连续型生产的有（ ）。 E.汽车", "options": [{"label": "A", "text": "化肥"}, {"label": "B", "text": "电视机"}, {"label": "C", "text": "桌子"}, {"label": "D", "text": "啤酒"}], "answer": "AD", "analysis": "本题考查生产过程的概念。BD属于自然过程。\n26.下列产品中，其生产过程属于连续型生产的有（ ）。\nA.化肥\nB.电视机\nC.桌子\nD.啤酒\nE.汽车"}, {"question": "大量生产类型的特点有（ ）。", "options": [{"label": "A", "text": "生产条件稳定，专业化程度较高"}, {"label": "B", "text": "可以采用高效率的专用设备和专用工艺装备"}, {"label": "C", "text": "可以按对象专业化组织生产，采用流水生产及生产线等生产组织形式"}, {"label": "D", "text": "计划的执行情况不易于检查和控制"}], "answer": "ABCE", "analysis": "本题考查生产类型。连续型生产是指连续的产品生产，其工艺流程往往表现为用化学的而不是物理\n的或机械的方法，如化肥、药品等的生产。BCE属于离散型的生产。\n27.大量生产类型的特点有（ ）。\nA.生产条件稳定，专业化程度较高\nB.可以采用高效率的专用设备和专用工艺装备\nC.可以按对象专业化组织生产，采用流水生产及生产线等生产组织形式\nD.计划的执行情况不易于检查和控制\nE.生产计划编制比较细致、精确"}, {"question": "ABCE 【解析】本题考查大量生产类型。大量生产类型的特点是：生产条件稳定，大多数工作地仅固定完成一道或 二道工序，专业化程度较高；可以采用高效率的专用设备和专用工艺装备，生产过程的机械化、自动化水平 比较高，工人操作技术单一，熟练程度高；可以按对象专业化组织生产，采用流水生产及生产线等生产组织 形式；生产计划编制比较细致、精确，计划的执行情况也易于检查和控制。 28.企业进行生产过程时间组织的目标有（ ）。 6 E.缩短生产周期", "options": [{"label": "A", "text": "提高生产率"}, {"label": "B", "text": "降低成本"}, {"label": "C", "text": "节约生产面积"}, {"label": "D", "text": "充分利用车间的空间位置"}], "answer": "ABE", "analysis": "本题考查大量生产类型。大量生产类型的特点是：生产条件稳定，大多数工作地仅固定完成一道或\n二道工序，专业化程度较高；可以采用高效率的专用设备和专用工艺装备，生产过程的机械化、自动化水平\n比较高，工人操作技术单一，熟练程度高；可以按对象专业化组织生产，采用流水生产及生产线等生产组织\n形式；生产计划编制比较细致、精确，计划的执行情况也易于检查和控制。\n28.企业进行生产过程时间组织的目标有（ ）。\nA.提高生产率\nB.降低成本\nC.节约生产面积\nD.充分利用车间的空间位置\n6\nE.缩短生产周期"}, {"question": "ABE 【解析】本题考查生产过程的时间组织。生产过程的时间组织的重要目的是以最大限度地提高生产过程的连 续性和节奏性，来实现提高生产率，降低成本，缩短生产周期的目标。 29.若采用自动线方式进行生产，则（ ）。 E.有利于稳定产品质量", "options": [{"label": "A", "text": "较一般流水线效率更高"}, {"label": "B", "text": "生产过程具有高度的连续性和节奏性"}, {"label": "C", "text": "没有流水线效率高"}, {"label": "D", "text": "能从事人体所不能胜任的特殊工作"}], "answer": "ABDE", "analysis": "本题考查生产过程的时间组织。生产过程的时间组织的重要目的是以最大限度地提高生产过程的连\n续性和节奏性，来实现提高生产率，降低成本，缩短生产周期的目标。\n29.若采用自动线方式进行生产，则（ ）。\nA.较一般流水线效率更高\nB.生产过程具有高度的连续性和节奏性\nC.没有流水线效率高\nD.能从事人体所不能胜任的特殊工作\nE.有利于稳定产品质量"}, {"question": "ABDE 【解析】本题考查自动线的特征。自动线的特征： （1）较一般流水线效率更高。 （2）生产过程具有高度的连续性和节奏性。 （3）有利于稳定产品质量。 （4）能从事人体所不能胜任的特殊工作。 （5）有利于降低产品制造成本。 （6）生产过程是完全自动进行的。 30.企业实施清洁生产的途径有（ ）。 E.向员工免费提供洗涤用品", "options": [{"label": "A", "text": "用无毒、无害原料替代有毒、有害原料"}, {"label": "B", "text": "改革工艺和设备"}, {"label": "C", "text": "改进运行操作管理"}, {"label": "D", "text": "回收废物、废热作为能量利用"}], "answer": "ABCD", "analysis": "本题考查自动线的特征。自动线的特征：\n（1）较一般流水线效率更高。\n（2）生产过程具有高度的连续性和节奏性。\n（3）有利于稳定产品质量。\n（4）能从事人体所不能胜任的特殊工作。\n（5）有利于降低产品制造成本。\n（6）生产过程是完全自动进行的。\n30.企业实施清洁生产的途径有（ ）。\nA.用无毒、无害原料替代有毒、有害原料\nB.改革工艺和设备\nC.改进运行操作管理\nD.回收废物、废热作为能量利用\nE.向员工免费提供洗涤用品"}, {"question": "现在，许多企业在“5S”管理基础上增加了（ ）等内容，构成了“7S”管理。", "options": [{"label": "A", "text": "整理"}, {"label": "B", "text": "整顿"}, {"label": "C", "text": "安全"}, {"label": "D", "text": "素养"}], "answer": "CE", "analysis": "本题考查清洁生产。对于一个生产过程系统，实施清洁生产的基本途径可概括为：\n①原材料（包括能源）的有效使用和替代；\n②改革工艺和设备；\n③改进运行操作管理；\n④产品改革替代；\n⑤生产系统内部循环利用。\n31.现在，许多企业在“5S”管理基础上增加了（ ）等内容，构成了“7S”管理。\nA.整理\nB.整顿\nC.安全\nD.素养\nE.节约"}, {"question": "CE 【解析】本题考查“55”管理的发展。企业在“5S”管理基础上增加了安全和节约两个活动，构成了 “7S”管理。 32.下列属于自然过程的有（ ）。 7 E.将铸件放在普通空气中冷却", "options": [{"label": "A", "text": "高温淬火"}, {"label": "B", "text": "用钻床钻孔"}, {"label": "C", "text": "涂染的自然干燥"}, {"label": "D", "text": "用车床加工零件端面"}], "answer": "CE", "analysis": "本题考查“55”管理的发展。企业在“5S”管理基础上增加了安全和节约两个活动，构成了\n“7S”管理。\n32.下列属于自然过程的有（ ）。\nA.高温淬火\n7\nB.用钻床钻孔\nC.涂染的自然干燥\nD.用车床加工零件端面\nE.将铸件放在普通空气中冷却"}, {"question": "CE 【解析】本题考查生产过程的概念。自然过程是指劳动对象借助于自然界的力量，使其产生某种性质变化的 过程。属于自然过程的有：铸件自然时效；铸锻件自然冷却；涂染的自然干燥等。 掌握“生产组织和生产过程”知识点。 33.某机械制造厂按照产品的工艺特征把同类的设备集中在一起组成车工车间、铣工车间、磨工车间等生产单 位，这种布置的优点有（ ）。 E.有利于工人技术熟练程度的提高", "options": [{"label": "A", "text": "对产品品种的变化具有较强的适应性"}, {"label": "B", "text": "便于充分利用生产设备与生产面积"}, {"label": "C", "text": "有利于工人掌握更多技能"}, {"label": "D", "text": "提高生产设备和生产面积的负荷系数"}], "answer": "ABDE", "analysis": "本题考查生产过程的概念。自然过程是指劳动对象借助于自然界的力量，使其产生某种性质变化的\n过程。属于自然过程的有：铸件自然时效；铸锻件自然冷却；涂染的自然干燥等。\n掌握“生产组织和生产过程”知识点。\n33.某机械制造厂按照产品的工艺特征把同类的设备集中在一起组成车工车间、铣工车间、磨工车间等生产单\n位，这种布置的优点有（ ）。\nA.对产品品种的变化具有较强的适应性\nB.便于充分利用生产设备与生产面积\nC.有利于工人掌握更多技能\nD.提高生产设备和生产面积的负荷系数\nE.有利于工人技术熟练程度的提高"}, {"question": "ABDE 【解析】本题考查工艺专业化布置。在制造业中，工艺专业化布置的典型例子是机械制造厂，它是按照产品 的工艺特征把同类的设备集中在一起组成车工车间、铣工车间、磨工车间等生产单位，或在机械加工车间内 设置车工工段、铣工工段、磨工工段等。按工艺专业化原则设置生产单位的优点是：（1）对产品品种的变化 具有较强的适应性（A选项）；（2）便于充分利用生产设备与生产面积，提高生产设备和生产面积的负荷系 数（BD选项）；（3）便于进行工艺专业化管理，并有利于工人技术熟练程度的提高（E选项）。 掌握“生产过程空间组织的原则与形式”知识点。 34.发生安全生产事故时要坚决做到（ ）。 E.责任人未受到处理不放过", "options": [{"label": "A", "text": "事故原因未查清不放过"}, {"label": "B", "text": "事故责任人和员工未受到教育不放过"}, {"label": "C", "text": "防范措施未建立不放过"}, {"label": "D", "text": "损失未赔偿不放过"}], "answer": "ABCE", "analysis": "本题考查工艺专业化布置。在制造业中，工艺专业化布置的典型例子是机械制造厂，它是按照产品\n的工艺特征把同类的设备集中在一起组成车工车间、铣工车间、磨工车间等生产单位，或在机械加工车间内\n设置车工工段、铣工工段、磨工工段等。按工艺专业化原则设置生产单位的优点是：（1）对产品品种的变化\n具有较强的适应性（A选项）；（2）便于充分利用生产设备与生产面积，提高生产设备和生产面积的负荷系\n数（BD选项）；（3）便于进行工艺专业化管理，并有利于工人技术熟练程度的提高（E选项）。\n掌握“生产过程空间组织的原则与形式”知识点。\n34.发生安全生产事故时要坚决做到（ ）。\nA.事故原因未查清不放过\nB.事故责任人和员工未受到教育不放过\nC.防范措施未建立不放过\nD.损失未赔偿不放过\nE.责任人未受到处理不放过"}, {"question": "ABCE 【解析】本题考查安全生产管理的内容。发生安全生产事故坚决做到四不放过，即事故原因未查清不放过 ，事故责任人和员工未受到教育不放过，防范措施未建立不放过，责任人未受到处理不放过。 掌握“安全生产管理”知识点。 共享题干题 【题干】某零件投产批量为3件，经过5道工序加工，单件作业时间依次为8分钟、8分钟、4分钟、6分钟、8分 钟。根据上述资料，回答下列问题： 35.【不定项选择题】若采用顺序移动方式生产这3件产品，需要（ ）分钟。", "options": [{"label": "A", "text": "34"}, {"label": "B", "text": "50"}, {"label": "C", "text": "102"}, {"label": "D", "text": "170"}], "answer": "C", "analysis": "本题考查安全生产管理的内容。发生安全生产事故坚决做到四不放过，即事故原因未查清不放过\n，事故责任人和员工未受到教育不放过，防范措施未建立不放过，责任人未受到处理不放过。\n掌握“安全生产管理”知识点。\n共享题干题\n【题干】某零件投产批量为3件，经过5道工序加工，单件作业时间依次为8分钟、8分钟、4分钟、6分钟、8分\n钟。根据上述资料，回答下列问题：\n35.【不定项选择题】若采用顺序移动方式生产这3件产品，需要（ ）分钟。\nA.34\nB.50\nC.102\nD.170"}, {"question": "【不定项选择题】若要求生产时间最短，应采取的工序间移动方式为（ ）。", "options": [{"label": "A", "text": "顺序移动方式"}, {"label": "B", "text": "平行移动方式"}, {"label": "C", "text": "平行顺序移动方式"}, {"label": "D", "text": "混合移动方式"}], "answer": "B", "analysis": "本题考查顺序移动方式的计算。\n8\nT＝3×（8＋8＋4＋6＋8）＝102（分钟）。\n36.【不定项选择题】若要求生产时间最短，应采取的工序间移动方式为（ ）。\nA.顺序移动方式\nB.平行移动方式\nC.平行顺序移动方式\nD.混合移动方式"}, {"question": "【不定项选择题】顺序移动方式与其他移动方式相比较，其优点是（ ）。", "options": [{"label": "A", "text": "生产周期短"}, {"label": "B", "text": "生产组织简单"}, {"label": "C", "text": "加工产品时设备不出现停顿"}, {"label": "D", "text": "工序间搬运次数少"}], "answer": "BCD", "analysis": "本题考查三种移动方式的比较。平行移动方式的突出优点是充分利用平行作业的可能，使生产周期\n达到最短。\n37.【不定项选择题】顺序移动方式与其他移动方式相比较，其优点是（ ）。\nA.生产周期短\nB.生产组织简单\nC.加工产品时设备不出现停顿\nD.工序间搬运次数少"}, {"question": "【不定项选择题】生产与业务的时间组织要解决的主要问题是（ ）。", "options": [{"label": "A", "text": "产品和零部件的移动方式"}, {"label": "B", "text": "多种产品和零件的排序问题"}, {"label": "C", "text": "生产单位的空间组织"}, {"label": "D", "text": "生产周期标准的确定"}], "answer": "AB", "analysis": "本题考查三种移动方式的比较。顺序移动方式的优点是组织生产较简单，设备在加工零件时不出现\n停顿，工序间搬运次数少。\n38.【不定项选择题】生产与业务的时间组织要解决的主要问题是（ ）。\nA.产品和零部件的移动方式\nB.多种产品和零件的排序问题\nC.生产单位的空间组织\nD.生产周期标准的确定"}, {"question": "【不定项选择题】该流水线适合（ ）类型的产品。", "options": [{"label": "A", "text": "单件生产"}, {"label": "B", "text": "小批生产"}, {"label": "C", "text": "中批生产"}, {"label": "D", "text": "大量生产"}], "answer": "D", "analysis": "本题考查生产过程时间组织。生产过程的时间组织是指在时间上对劳动对象在车间之间、工段之间\n及工作地之间的运动配合与衔接进行合理的安排和设计。这里主要是研究一批零件在加工过程中，采用何种\n移动方式。\n【题干】某企业生产单一农机产品。该企业在综合分析企业的生产技术现状以及各种其他因素的基础上，决\n定采用单对象流水线的生产组织方式进行产品装配。该流水线采用两班制的生产模式，产品日生产量为100台\n，每班有效工作时间为8小时，废品率为0.5%，在进行工序同期化后，该企业测算了每道工序的加工时间，测\n算表明该流水线的第3道工序所需加工时间为12.5分钟。\n39.【不定项选择题】该流水线适合（ ）类型的产品。\nA.单件生产\nB.小批生产\nC.中批生产\nD.大量生产"}, {"question": "【不定项选择题】该流水线的平均节拍是（ ）分钟。", "options": [{"label": "A", "text": "3.35"}, {"label": "B", "text": "4.65"}, {"label": "C", "text": "4.85"}, {"label": "D", "text": "9.55"}], "answer": "D", "analysis": "本题考查生产过程组织。大量生产类型的特点之一是：可以按对象专业化组织生产，采用流水生产\n及生产线等组织生产形式。\n40.【不定项选择题】该流水线的平均节拍是（ ）分钟。\nA.3.35\n9\nB.4.65\nC.4.85\nD.9.55"}, {"question": "【不定项选择题】假定该流水线的平均节拍是6.25分钟，则第3道工序计算所需设备数为（ ）台。", "options": [{"label": "A", "text": "2"}, {"label": "B", "text": "3"}, {"label": "C", "text": "4"}, {"label": "D", "text": "5"}], "answer": "A", "analysis": "本题考查流水线节拍的计算。节拍＝流水线的有效工作时间/计划期的产品产量，其中产品产量包括\n预计产量和预计废品量，日产量是100台，废品率是0.5%，合格率为99.5%，则计划期的产品产量\n＝100/99.5%＝100.5。\n则节拍＝2×8×60/100.5＝9.55（分钟）。\n41.【不定项选择题】假定该流水线的平均节拍是6.25分钟，则第3道工序计算所需设备数为（ ）台。\nA.2\nB.3\nC.4\nD.5"}, {"question": "【不定项选择题】该流水线的平面布置应遵循（ ）。", "options": [{"label": "A", "text": "工艺专业化原则"}, {"label": "B", "text": "对象专业化原则"}, {"label": "C", "text": "固定布置原则"}, {"label": "D", "text": "混合类型布置原则"}], "answer": "B", "analysis": "本题考查流水生产线组织。第3道工序所需的设备数＝第3道工序的加工时间/平均节拍\n＝12.5/6.25＝2（台）\n42.【不定项选择题】该流水线的平面布置应遵循（ ）。\nA.工艺专业化原则\nB.对象专业化原则\nC.固定布置原则\nD.混合类型布置原则"}, {"question": "【不定项选择题】如果采用顺序移动方式进行零件生产，将一个批次的该种零件全部生产出来的时间是 （ ）分钟。", "options": [{"label": "A", "text": "285"}, {"label": "B", "text": "300"}, {"label": "C", "text": "325"}, {"label": "D", "text": "350"}], "answer": "C", "analysis": "本题考查流水生产线组织。流水生产线按对象专业化原则组织，线上的加工对象是固定的。\n【题干】某企业批量生产一种零件，投产批量为5件，经过4道工序加工，按照加工顺序，单件每道工序作业\n时间依次为20分钟、10分钟、20分钟、15分钟，假设零件移动时间为零。根据以上资料，回答下列问题：\n43.【不定项选择题】如果采用顺序移动方式进行零件生产，将一个批次的该种零件全部生产出来的时间是\n（ ）分钟。\nA.285\nB.300\nC.325\nD.350"}, {"question": "【不定项选择题】将一个批次的该种零件全部生产出来，工序间搬运次数最少的零件移动方式是（ ）。", "options": [{"label": "A", "text": "平行移动方式"}, {"label": "B", "text": "顺序移动方式"}, {"label": "C", "text": "平行顺序移动方式"}, {"label": "D", "text": "交叉移动方式"}], "answer": "B", "analysis": "本题考查顺序移动方式。T＝5×（20＋10＋20＋15）＝325（分钟）。\n掌握“三种移动方式的比较”知识点。\n44.【不定项选择题】将一个批次的该种零件全部生产出来，工序间搬运次数最少的零件移动方式是（ ）。\nA.平行移动方式\nB.顺序移动方式\nC.平行顺序移动方式\nD.交叉移动方式"}, {"question": "【不定项选择题】将一个批次的该种零件全部生产出来所需要的最短时间为（ ）分钟。", "options": [{"label": "A", "text": "120"}, {"label": "B", "text": "135"}, {"label": "C", "text": "145"}, {"label": "D", "text": "175"}], "answer": "C", "analysis": "本题考查三种移动方式的比较。顺序移动方式的优点是组织生产较简单，设备在加工零件时不出现\n10\n停顿，工序间搬运次数少。\n掌握“三种移动方式的比较”知识点。\n45.【不定项选择题】将一个批次的该种零件全部生产出来所需要的最短时间为（ ）分钟。\nA.120\nB.135\nC.145\nD.175"}, {"question": "【不定项选择题】如果该企业内部生产单位采用对象专业化，单从生产单位专业化形式角度考虑，该企业 应该采用的工序间零件移动方式有（ ）。", "options": [{"label": "A", "text": "平行移动方式"}, {"label": "B", "text": "顺序移动方式"}, {"label": "C", "text": "平行顺序移动方式"}, {"label": "D", "text": "交叉移动方式"}], "answer": "AC", "analysis": "本题考查三种移动方式的比较。平行移动方式的突出优点是充分利用平行作业的可能，使生产周期\n达到最短。T＝（20＋10＋20＋15）＋（5－1）×20＝145（分钟）。\n掌握“三种移动方式的比较”知识点。\n46.【不定项选择题】如果该企业内部生产单位采用对象专业化，单从生产单位专业化形式角度考虑，该企业\n应该采用的工序间零件移动方式有（ ）。\nA.平行移动方式\nB.顺序移动方式\nC.平行顺序移动方式\nD.交叉移动方式"}], "第五章 质量管理": [{"question": "第五章 质量管理 单项选择题 1.顾客对质量的要求不断提高，原先被顾客认为质量好的产品不再受到顾客欢迎，因此，企业应不断调整对 质量的要求，这体现了质量的（ ）。", "options": [{"label": "A", "text": "相对性"}, {"label": "B", "text": "狭义性"}, {"label": "C", "text": "经济性"}, {"label": "D", "text": "时效性"}], "answer": "D", "analysis": ""}, {"question": "将产品的质量特性划分为关键质量特性、重要质量特性和次要质量特性的依据是（ ）。", "options": [{"label": "A", "text": "产品设计者的喜好"}, {"label": "B", "text": "国家质量技术监督局的相关规定"}, {"label": "C", "text": "生产过程中各工序工艺的难度"}, {"label": "D", "text": "产品质量特性对顾客满意的影响程度"}], "answer": "D", "analysis": "本题考查质量的概念。质量的时效性：组织的顾客和其他相关方对组织、产品、过程和体系的需求\n和期望是不断变化的。原先被顾客认为质量好的产品会因为顾客要求的提高而不再受到顾客的欢迎，因此\n，组织应不断地调整对质量的要求。\n2.将产品的质量特性划分为关键质量特性、重要质量特性和次要质量特性的依据是（ ）。\nA.产品设计者的喜好\nB.国家质量技术监督局的相关规定\nC.生产过程中各工序工艺的难度\nD.产品质量特性对顾客满意的影响程度"}, {"question": "若超过规定的特性值要求，暂不影响产品功能，但可能会引起产品功能的逐渐丧失，则该质量特性是（ ）。", "options": [{"label": "A", "text": "关键质量特性"}, {"label": "B", "text": "重要质量特性"}, {"label": "C", "text": "次要质量特性"}, {"label": "D", "text": "一般质量特性"}], "answer": "C", "analysis": "根据对顾客满意的影响程度不同，可以将质量特性分为：关键质量特性、重要质量特性和次要质量\n特性。\n3.若超过规定的特性值要求，暂不影响产品功能，但可能会引起产品功能的逐渐丧失，则该质量特性是（\n）。\nA.关键质量特性\nB.重要质量特性\nC.次要质量特性\nD.一般质量特性"}, {"question": "在质量管理中，用来整理质量数据、描述质量特性数据分布状态的质量分析图是（ ）。", "options": [{"label": "A", "text": "关键路线图"}, {"label": "B", "text": "树枝图"}, {"label": "C", "text": "直方图"}, {"label": "D", "text": "因果分析图"}], "answer": "C", "analysis": "次要质量特性，是指若超过规定的特性值要求，暂不影响产品功能，但可能会引起产品功能的逐渐\n丧失。\n4.在质量管理中，用来整理质量数据、描述质量特性数据分布状态的质量分析图是（ ）。\nA.关键路线图\nB.树枝图\nC.直方图\nD.因果分析图"}, {"question": "下列控制图中，属于计数值控制图的是（ ）。", "options": [{"label": "A", "text": "缺陷数控制图"}, {"label": "B", "text": "中位数和极差控制图"}, {"label": "C", "text": "平均值和极差控制图"}, {"label": "D", "text": "单值控制图"}], "answer": "A", "analysis": "直方图又称为质量分析图，由很多直方形连起来的，表示质量数据离散程度的一种图形，用以整理\n质量数据，找出规律，通过对它的观察来分析、判断工序是否处于受控状态，并根据质量特性的分析结果进\n行适当的调整，解决存在的问题。\n5.下列控制图中，属于计数值控制图的是（ ）。\nA.缺陷数控制图\nB.中位数和极差控制图\nC.平均值和极差控制图\n1\nD.单值控制图"}, {"question": "下列质量检验项目中，属于非破坏性检验的是（ ）。", "options": [{"label": "A", "text": "晶体管的使用寿命"}, {"label": "B", "text": "尼龙绳的强度"}, {"label": "C", "text": "螺母的内径"}, {"label": "D", "text": "轮胎的爆破压力"}], "answer": "C", "analysis": "计数值控制图，是以计数值数据的质量特性值为控制对象的，属于这种情况的有不合格品率控制图\n和不合格品数控制图。这两种控制图也叫计件值控制图。还有缺陷数控制图和单位缺陷数控制图，这两类控\n制图也称为计点值控制图。B、C、D都属于计量值控制图。\n6.下列质量检验项目中，属于非破坏性检验的是（ ）。\nA.晶体管的使用寿命\nB.尼龙绳的强度\nC.螺母的内径\nD.轮胎的爆破压力"}, {"question": "按规定的试验方法对产品的样品进行试验，以证明样品符合标准或技术规范的要求属于（ ）。", "options": [{"label": "A", "text": "型式试验"}, {"label": "B", "text": "供方质量管理体系评定"}, {"label": "C", "text": "批量检验"}, {"label": "D", "text": "全数检验"}], "answer": "A", "analysis": "本题考查质量检验的方式。破坏性检验后，受检物的完整性遭到破坏，不再具有原来的使用功能。\n例如，寿命试验、强度试验等往往是破坏性检验。选项ABD属于破坏性检验。\n7.按规定的试验方法对产品的样品进行试验，以证明样品符合标准或技术规范的要求属于（ ）。\nA.型式试验\nB.供方质量管理体系评定\nC.批量检验\nD.全数检验"}, {"question": "在产品设计阶段就应该采用失效模式、效应及后果分析与失效树分析等方法找出产品的薄弱环节，在设计 上加以改进，消除隐患，这体现了全面质量管理实施的（ ）原则。", "options": [{"label": "A", "text": "预防原则"}, {"label": "B", "text": "经济原则"}, {"label": "C", "text": "协作原则"}, {"label": "D", "text": "全员参与"}], "answer": "A", "analysis": "本题考查质量认证的类型。型式试验即按规定的试验方法对产品的样品进行试验，以证明样品符合\n标准或技术规范的要求。\n8.在产品设计阶段就应该采用失效模式、效应及后果分析与失效树分析等方法找出产品的薄弱环节，在设计\n上加以改进，消除隐患，这体现了全面质量管理实施的（ ）原则。\nA.预防原则\nB.经济原则\nC.协作原则\nD.全员参与"}, {"question": "关于PDCA循环的说法，错误的是（ ）。", "options": [{"label": "A", "text": "PDCA循环是连续的循环过程"}, {"label": "B", "text": "PDCA循环将工作过程分为决策、执行、检查、监督四个阶段"}, {"label": "C", "text": "PDCA循环可以使质量水平螺旋上升式地提升"}, {"label": "D", "text": "PDCA循环主要是解决最重要的问题"}], "answer": "B", "analysis": "本题考查全面质量管理实施的原则。认真贯彻预防原则，凡事要防患于未然。\n9.关于PDCA循环的说法，错误的是（ ）。\nA.PDCA循环是连续的循环过程\nB.PDCA循环将工作过程分为决策、执行、检查、监督四个阶段\nC.PDCA循环可以使质量水平螺旋上升式地提升\nD.PDCA循环主要是解决最重要的问题"}, {"question": "在质量管理领域，若要求产品合格率不低于99.99%，则质量控制水平应为（ ）。", "options": [{"label": "A", "text": "1σ"}, {"label": "B", "text": "2σ"}, {"label": "C", "text": "3σ"}, {"label": "D", "text": "6σ"}], "answer": "D", "analysis": "本题考查PDCA循环。PDCA循环把工作过程分为计划、执行、检查和处理阶段。\n10.在质量管理领域，若要求产品合格率不低于99.99%，则质量控制水平应为（ ）。\nA.1σ\nB.2σ\nC.3σ\nD.6σ\n2"}, {"question": "六西格玛的流程，正确的有（ ）。", "options": [{"label": "A", "text": "设计、管理、分析、改进、控制"}, {"label": "B", "text": "界定、测量、分析、改进、控制"}, {"label": "C", "text": "界定、管理、分析、改进、控制"}, {"label": "D", "text": "设计、测量、调整、改进、控制"}], "answer": "B", "analysis": "若控制在6σ水平，表示产品合格率不低于99.99999983%。\n11.六西格玛的流程，正确的有（ ）。\nA.设计、管理、分析、改进、控制\nB.界定、测量、分析、改进、控制\nC.界定、管理、分析、改进、控制\nD.设计、测量、调整、改进、控制"}, {"question": "根据我国产品质量法，政府技术监督部门对可能危及人体健康和人身、财产安全的产品要实施强制性的管 理；对其他产品则通过市场竞争实现优胜劣汰。这体现的产品质量立法原则是（ ）。", "options": [{"label": "A", "text": "有限范围原则"}, {"label": "B", "text": "奖优罚劣原则"}, {"label": "C", "text": "统一立法、区别管理原则"}, {"label": "D", "text": "行政区域统一管理、组织协调的属地化原则"}], "answer": "C", "analysis": "在实践中，六西格玛管理形成了自己独有的科学工作程序DMAIC，一套使每个环节不断改进的流程模\n式：界定、测量、分析、改进、控制。\n12.根据我国产品质量法，政府技术监督部门对可能危及人体健康和人身、财产安全的产品要实施强制性的管\n理；对其他产品则通过市场竞争实现优胜劣汰。这体现的产品质量立法原则是（ ）。\nA.有限范围原则\nB.奖优罚劣原则\nC.统一立法、区别管理原则\nD.行政区域统一管理、组织协调的属地化原则"}, {"question": "关于产品质量监督检查制度的说法，错误的是（ ）。", "options": [{"label": "A", "text": "产品质量监督检查制度既是一项强制性的行政措施，又是一种有效的法制手段"}, {"label": "B", "text": "对依法进行的产品质量监督检查，生产者、销售者无权拒绝"}, {"label": "C", "text": "检验抽取的样品数量不得超过检验的合理需要"}, {"label": "D", "text": "国家监督检查的产品，地方可以另行重复抽查"}], "answer": "D", "analysis": "本题考查产品质量立法的基本原则。统一立法、区别管理的原则：对可能危及人体健康和人身、财\n产安全的产品，政府技术监督部门要实施强制性管理；对其他产品则通过市场竞争实现优胜劣汰。\n13.关于产品质量监督检查制度的说法，错误的是（ ）。\nA.产品质量监督检查制度既是一项强制性的行政措施，又是一种有效的法制手段\nB.对依法进行的产品质量监督检查，生产者、销售者无权拒绝\nC.检验抽取的样品数量不得超过检验的合理需要\nD.国家监督检查的产品，地方可以另行重复抽查"}, {"question": "产品质量监督部门依法对某企业生产的产品进行抽查，发现其产品质量不合格，质量监督部门应对该企业 做出的处理为（ ）。", "options": [{"label": "A", "text": "责令其限期改正"}, {"label": "B", "text": "吊销其税务登记证"}, {"label": "C", "text": "责令其停业，限期整改"}, {"label": "D", "text": "吊销其营业执照"}], "answer": "A", "analysis": "国家监督抽查的产品，地方不得另行重复抽查。\n14.产品质量监督部门依法对某企业生产的产品进行抽查，发现其产品质量不合格，质量监督部门应对该企业\n做出的处理为（ ）。\nA.责令其限期改正\nB.吊销其税务登记证\nC.责令其停业，限期整改\nD.吊销其营业执照"}, {"question": "寿命试验、强度试验属于质量检验中的（ ）。", "options": [{"label": "A", "text": "破坏性检验"}, {"label": "B", "text": "计数检验"}, {"label": "C", "text": "计量检验"}, {"label": "D", "text": "感官检验"}], "answer": "A", "analysis": "依照《产品质量法》进行监督抽查的产品质量不合格的，由实施监督抽查的产品质量监督部门责令\n其生产者、销售者限期改正。\n15.寿命试验、强度试验属于质量检验中的（ ）。\nA.破坏性检验\nB.计数检验\nC.计量检验\nD.感官检验"}, {"question": "各种检验方式的主体是（ ）。", "options": [{"label": "A", "text": "理化检验"}, {"label": "B", "text": "计数检验"}, {"label": "C", "text": "计量检验"}, {"label": "D", "text": "感官检验"}], "answer": "A", "analysis": "本题考查质量检验的方式。破坏性检验后，受检物的完整性遭到破坏，不再具有原来的使用功能。\n例如，寿命试验、强度试验等往往是破坏性检验。破坏性检验只能采用抽样检验方式。\n掌握“质量检验”知识点。\n16.各种检验方式的主体是（ ）。\nA.理化检验\nB.计数检验\nC.计量检验\nD.感官检验"}, {"question": "把收集到的原始质量数据按照一定的目的加以分类整理，再据此进行质量分析的质量控制方法是（ ）。", "options": [{"label": "A", "text": "分层法"}, {"label": "B", "text": "调查表法"}, {"label": "C", "text": "直方图法"}, {"label": "D", "text": "因果分析图法"}], "answer": "A", "analysis": "本题考查质量检验的方式。理化检验是各种检验方式的主体。\n掌握“质量检验”知识点。\n17.把收集到的原始质量数据按照一定的目的加以分类整理，再据此进行质量分析的质量控制方法是（ ）。\nA.分层法\nB.调查表法\nC.直方图法\nD.因果分析图法"}, {"question": "关于质量管理的说法，错误的是（ ）。", "options": [{"label": "A", "text": "质量管理是指从质量方面指挥和控制组织的协调活动"}, {"label": "B", "text": "质量管理的环节包括制定质量方针和质量目标、质量策划、质量控制、质量保证和质量改进"}, {"label": "C", "text": "围绕产品质量形成的全过程实施质量管理是组织各项工作的主线"}, {"label": "D", "text": "质量管理仅涉及组织的生产活动"}], "answer": "D", "analysis": "本题考查分层法。分层法是质量管理中常用的数理统计方法，它把收集到的原始质量数据按照一定\n的目的加以分类整理，再据此进行质量分析。\n掌握“质量管理中的常用技术”知识点。\n18.关于质量管理的说法，错误的是（ ）。\nA.质量管理是指从质量方面指挥和控制组织的协调活动\nB.质量管理的环节包括制定质量方针和质量目标、质量策划、质量控制、质量保证和质量改进\nC.围绕产品质量形成的全过程实施质量管理是组织各项工作的主线\nD.质量管理仅涉及组织的生产活动"}, {"question": "质量的概念从“符合性质量”发展到“适用性质量”的过程，体现了企业对质量的认识逐渐将满足（ ）的需求放在首位。", "options": [{"label": "A", "text": "生产者"}, {"label": "B", "text": "供应商"}, {"label": "C", "text": "服务商"}, {"label": "D", "text": "顾客"}], "answer": "D", "analysis": "本题考查质量管理的定义。选项D错误，质量涉及组织的各个方面，是否有效地实施质量管理关系到\n组织的兴衰。\n掌握“质量管理的基本概念及发展历程”知识点。\n19.质量的概念从“符合性质量”发展到“适用性质量”的过程，体现了企业对质量的认识逐渐将满足（\n）的需求放在首位。\nA.生产者\nB.供应商\nC.服务商\nD.顾客"}, {"question": "质量不仅指产品的质量，也可以指过程和体系质量，这体现了质量的（ ）。", "options": [{"label": "A", "text": "经济性"}, {"label": "B", "text": "相对性"}, {"label": "C", "text": "广义性"}, {"label": "D", "text": "时效性"}], "answer": "C", "analysis": "本题考查质量概念的发展历程。质量从“符合性”发展到“适用性”，体现了人们对质量的认识逐\n渐将顾客的需求放在了首位。\n掌握“质量的基本概念及其发展历程”知识点。\n20.质量不仅指产品的质量，也可以指过程和体系质量，这体现了质量的（ ）。\nA.经济性\n4\nB.相对性\nC.广义性\nD.时效性"}, {"question": "在企业推行全面质量管理时，有“三全一多样”的要求，这指的是（ ）。", "options": [{"label": "A", "text": "全社会的质量管理、全企业的质量管理、全员参加的质量管理、多方法的质量管理"}, {"label": "B", "text": "全社会的质量管理、全过程的质量管理、全员参加的质量管理、多方合作的质量管理"}, {"label": "C", "text": "全社会的质量管理、全企业的质量管理、全过程参加的质量管理、多方合作的质量管理"}, {"label": "D", "text": "全企业的质量管理、全过程的质量管理、全员参加的质量管理、多方法的质量管理"}], "answer": "D", "analysis": "本题考查质量的广义性。质量的广义性：在质量管理体系所涉及的范畴内，组织的相关方对组织的\n产品、过程或体系都可能提出要求，而产品、过程和体系又都具有固有特性，因此，质量不仅指产品的质量\n，也可以指过程和体系的质量。\n掌握“质量的基本概念及其发展历程”知识点。\n21.在企业推行全面质量管理时，有“三全一多样”的要求，这指的是（ ）。\nA.全社会的质量管理、全企业的质量管理、全员参加的质量管理、多方法的质量管理\nB.全社会的质量管理、全过程的质量管理、全员参加的质量管理、多方合作的质量管理\nC.全社会的质量管理、全企业的质量管理、全过程参加的质量管理、多方合作的质量管理\nD.全企业的质量管理、全过程的质量管理、全员参加的质量管理、多方法的质量管理"}, {"question": "六西格玛管理工作程序DMAIC，其中D表示（ ）。", "options": [{"label": "A", "text": "界定"}, {"label": "B", "text": "测量"}, {"label": "C", "text": "分析"}, {"label": "D", "text": "改进"}], "answer": "A", "analysis": "本题考查全面质量管理。根据全面质量管理的含义，在推行全面质量管理时，就有“三全一多样\n”的要求，即全企业的质量管理、全过程的质量管理、全员参加的质量管理，所采用的质量管理方法多种多\n样。\n掌握“全面质量管理”知识点。\n22.六西格玛管理工作程序DMAIC，其中D表示（ ）。\nA.界定\nB.测量\nC.分析\nD.改进"}, {"question": "下列质量认证类型中，（ ）的特点是在批准认证的资格条件中增加了对产品供方质量管理体系的检查和 评定，在批准认证后的监督措施中也增加了对供方质量管理体系的复查。", "options": [{"label": "A", "text": "型式试验"}, {"label": "B", "text": "型式试验加认证后监督——市场抽样检验"}, {"label": "C", "text": "型式试验加认证后监督——在市场和供方抽样检验"}, {"label": "D", "text": "型式试验加供方质量管理体系评定再加认证后监督"}], "answer": "D", "analysis": "本题考查六西格玛管理的流程。在实践中，六西格玛管理形成了自己独有的科学工作程序DMAIC，这\n是一套使每个环节不断改进的流程模式：界定（D）、测量（M）、分析（A）、改进（I）、控制（C）。\n掌握“六西格玛管理”知识点。\n23.下列质量认证类型中，（ ）的特点是在批准认证的资格条件中增加了对产品供方质量管理体系的检查和\n评定，在批准认证后的监督措施中也增加了对供方质量管理体系的复查。\nA.型式试验\nB.型式试验加认证后监督——市场抽样检验\nC.型式试验加认证后监督——在市场和供方抽样检验\nD.型式试验加供方质量管理体系评定再加认证后监督"}, {"question": "英国1903年开始使用的第一个质量标志是（ ）。", "options": [{"label": "A", "text": "合格声明"}, {"label": "B", "text": "第三方独立证实"}, {"label": "C", "text": "合格评定"}, {"label": "D", "text": "风筝标志"}], "answer": "D", "analysis": "本题考查质量认证的类型。型式试验加供方质量管理体系评定再加认证后监督的特点是在批准认证\n的资格条件中增加了对产品供方质量管理体系的检查和评定，在批准认证后的监督措施中也增加了对供方质\n量管理体系的复查。\n掌握“国际标准化组织质量管理体系与质量认证”知识点。\n24.英国1903年开始使用的第一个质量标志是（ ）。\nA.合格声明\nB.第三方独立证实\nC.合格评定\n5\nD.风筝标志"}, {"question": "使用工序能力分析法进行质量控制时，样本平均值与公差中心重合的状态称为（ ）。", "options": [{"label": "A", "text": "工序无偏"}, {"label": "B", "text": "工序有偏"}, {"label": "C", "text": "工序能力过剩"}, {"label": "D", "text": "工序能力不足"}], "answer": "A", "analysis": "本题考查质量认证的产生和发展。风筝标志是英国1903年开始使用的第一个质量标志。\n掌握“国际标准化组织质量管理体系与质量认证”知识点。\n25.使用工序能力分析法进行质量控制时，样本平均值与公差中心重合的状态称为（ ）。\nA.工序无偏\nB.工序有偏\nC.工序能力过剩\nD.工序能力不足"}, {"question": "关于产品质量监督检查制度的说法，错误的是（ ）。", "options": [{"label": "A", "text": "产品质量监督检查制度既是一项强制性的行政措施，又是一种有效的法制手段"}, {"label": "B", "text": "对依法进行的产品质量监督检查，生产者、销售者不得拒绝"}, {"label": "C", "text": "检验抽取的样品数量不得超过检验的合理需要"}, {"label": "D", "text": "国家监督检查的产品，地方可以另行重复抽查"}], "answer": "D", "analysis": "本题考查工序能力指数的计算。若样本平均值与公差中心重合，则这种状态被称为工序无偏，反之\n则称为工序有偏。\n掌握“工序能力分析”知识点。\n26.关于产品质量监督检查制度的说法，错误的是（ ）。\nA.产品质量监督检查制度既是一项强制性的行政措施，又是一种有效的法制手段\nB.对依法进行的产品质量监督检查，生产者、销售者不得拒绝\nC.检验抽取的样品数量不得超过检验的合理需要\nD.国家监督检查的产品，地方可以另行重复抽查"}, {"question": "质量管理是指从质量方面指挥和控制组织的协调活动，下列属于质量管理的环节有（ ）。", "options": [{"label": "A", "text": "质量方针"}, {"label": "B", "text": "质量目标"}, {"label": "C", "text": "质量策划"}, {"label": "D", "text": "质量保证"}], "answer": "ABCD", "analysis": "本题考查产品质量监督检查制度。选项D错误，国家监督抽查的产品，地方不得另行重复抽查。\n掌握“产品质量法”知识点。\n多项选择题\n27.质量管理是指从质量方面指挥和控制组织的协调活动，下列属于质量管理的环 el": "C", "text": "技术创新"}, {"label": "D", "text": "技术改进"}], "answer": "D", "analysis": "效益成本分析法是通过计算和比较技术改造项目的各方案在整个寿命周期内收益的现值与成本的比\n率，以确定各技术改造方案排列的优先次序和取舍的方法。\n4.投资回收期T越小越好，它表示用于（ ）的投资将得到补偿的时间短，投资发挥的效用快。\nA.技术研发\nB.技术引进\nC.技术创新\nD.技术改进"}, {"question": "考虑设备的有形磨损，根据最小使用费用的原则确定的设备寿命是设备的（ ）。", "options": [{"label": "A", "text": "经济寿命"}, {"label": "B", "text": "使用寿命"}, {"label": "C", "text": "工作寿命"}, {"label": "D", "text": "技术寿命"}], "answer": "A", "analysis": "本题考查投资回收期法。投资回收期T越小越好，它表示用于技术改造的投资将得到补偿的时间短\n，投资发挥的效用快。\n5.考虑设备的有形磨损，根据最小使用费用的原则确定的设备寿命是设备的（ ）。\nA.经济寿命\nB.使用寿命\nC.工作寿命\nD.技术寿命"}, {"question": "某设备的原始价值为171500元，每年低劣化增加值为7000元，在不考虑残值的情况下，该设备的最佳更新 年限为（ ）年。", "options": [{"label": "A", "text": "7"}, {"label": "B", "text": "8"}, {"label": "C", "text": "9"}, {"label": "D", "text": "10"}], "answer": "A", "analysis": "本题考查设备的经济寿命的概念。设备的经济寿命是考虑设备的有形磨损，根据最小使用费用（成\n本）的原则确定的设备寿命。\n1\n6.某设备的原始价值为171500元，每年低劣化增加值为7000元，在不考虑残值的情况下，该设备的最佳更新\n年限为（ ）年。\nA.7\nB.8\nC.9\nD.10"}, {"question": "企业在确定设备最佳更新期时，主要依据设备的（ ）。", "options": [{"label": "A", "text": "生产日期"}, {"label": "B", "text": "服役期"}, {"label": "C", "text": "技术寿命"}, {"label": "D", "text": "经济寿命"}], "answer": "D", "analysis": "本题考查低劣化数值法。\n7.企业在确定设备最佳更新期时，主要依据设备的（ ）。\nA.生产日期\nB.服役期\nC.技术寿命\nD.经济寿命"}, {"question": "在新产品开发中，保持地位战略的目标往往确定为（ ）。", "options": [{"label": "A", "text": "迅速扩大企业规模和提高市场占有率"}, {"label": "B", "text": "企业规模有所扩大"}, {"label": "C", "text": "维持或适当扩大市场占有率和利润额"}, {"label": "D", "text": "企业规模迅速扩大"}], "answer": "C", "analysis": "本题考查设备更新。确定设备最佳更新期主要是依据设备的经济寿命。\n8.在新产品开发中，保持地位战略的目标往往确定为（ ）。\nA.迅速扩大企业规模和提高市场占有率\nB.企业规模有所扩大\nC.维持或适当扩大市场占有率和利润额\nD.企业规模迅速扩大"}, {"question": "新产品开发的科学程序在第一步是（ ）。", "options": [{"label": "A", "text": "新产品开发决策"}, {"label": "B", "text": "新产品创意构思"}, {"label": "C", "text": "调查研究与提出新产品开发整体设想"}, {"label": "D", "text": "新产品的鉴定与评价"}], "answer": "C", "analysis": "本题考查新产品开发战略的基本类型。保持地位战略的目标是维持或适当扩大市场占有率和利润额\n。\n9.新产品开发的科学程序在第一步是（ ）。\nA.新产品开发决策\nB.新产品创意构思\nC.调查研究与提出新产品开发整体设想\nD.新产品的鉴定与评价"}, {"question": "企业研发人员根据某种潜在的需求与欲望，运用已经掌握的知识和经验，对产品及其构成进行重新联想、 推理、抽象思维、组合等，以形成新产品整体概念，这些活动是新产品的（ ）。", "options": [{"label": "A", "text": "创意构思"}, {"label": "B", "text": "开发决策"}, {"label": "C", "text": "设计"}, {"label": "D", "text": "试制"}], "answer": "A", "analysis": "本题考查新产品开发的过程，第一步是调查研究与提出新产品开发整体设想。\n10.企业研发人员根据某种潜在的需求与欲望，运用已经掌握的知识和经验，对产品及其构成进行重新联想、\n推理、抽象思维、组合等，以形成新产品整体概念，这些活动是新产品的（ ）。\nA.创意构思\nB.开发决策\nC.设计\nD.试制"}, {"question": "在新产品的市场试销中，消费者在一定时期内，某消费者购买某种新产品的次数（ ）。", "options": [{"label": "A", "text": "购买频率"}, {"label": "B", "text": "再购率"}, {"label": "C", "text": "试用率"}, {"label": "D", "text": "离差率"}], "answer": "A", "analysis": "新产品创意构思是一种创造性的劳动，它是人们根据一种潜在的需求与欲望，运用已掌握的知识和\n经验，对产品及其构成进行重新联想、推理、抽象思维、组合、叠加、复合及综合，形成新产品整体概念的\n过程。\n11.在新产品的市场试销中，消费者在一定时期内，某消费者购买某种新产品的次数（ ）。\nA.购买频率\nB.再购率\nC.试用率\nD.离差率"}, {"question": "企业与大专院校组成联合开发小组，共同开发新产品，这种新产品开发方式属于（ ）。", "options": [{"label": "A", "text": "自行研制开发"}, {"label": "B", "text": "合作开发"}, {"label": "C", "text": "委托开发"}, {"label": "D", "text": "引进开发"}], "answer": "B", "analysis": "本题考查市场试销。购买频率是指在新产品的市场试销中，消费者在一定时期内，某消费者购买某\n种新产品的次数。\n12.企业与大专院校组成联合开发小组，共同开发新产品，这种新产品开发方式属于（ ）。\nA.自行研制开发\nB.合作开发\nC.委托开发\nD.引进开发"}, {"question": "设备原始价值为Ko=18000元，每年低劣化增加值λ=200元，如果考虑残值，假设该设备的残值为8000元 ，则其最佳更换年限为（ ）年。", "options": [{"label": "A", "text": "6"}, {"label": "B", "text": "8"}, {"label": "C", "text": "10"}, {"label": "D", "text": "12"}], "answer": "C", "analysis": "本题考查合作开发。合作开发是指企业内部科技开发力量与外部科技开发力量联合起来共同开发新\n产品。具体合作方式可以是企业与其他企业、科研机构、大专院校，甚至是国外的某些组织组成联合开发小\n组，共同开发新产品。\n掌握“新产品开发的方式”知识点。\n13.设备原始价值为Ko=18000元，每年低劣化增加值λ=200元，如果考虑残值，假设该设备的残值为8000元\n，则其最佳更换年限为（ ）年。\nA.6\nB.8\nC.10\nD.12"}, {"question": "考虑设备的有形磨损，根据最小使用费用（成本）原则确定的设备寿命是设备的（ ）。", "options": [{"label": "A", "text": "使用寿命"}, {"label": "B", "text": "设计寿命"}, {"label": "C", "text": "技术寿命"}, {"label": "D", "text": "经济寿命"}], "answer": "D", "analysis": "本题考查低劣化数值法。\n掌握“设备更新”知识点。\n14.考虑设备的有形磨损，根据最小使用费用（成本）原则确定的设备寿命是设备的（ ）。\nA.使用寿命\nB.设计寿命\nC.技术寿命\nD.经济寿命"}, {"question": "某公司拟实施某项技术改造项目，预计 表现为企业的装备更新。如能源的获得、新投入\n的增加、新设备的添置、新厂房的建造等。\n掌握“技术改造概述”知识点。\n19.某企业进行技术改造项目决策时，有四个互斥方案，如下表所示：\n根据投资回收期法，该企业应选择（ ）。\nA.方案1\n4\nB.方案2\nC.方案3\nD.方案4"}, {"question": "效益成本分析法用（ ）指标反映。", "options": [{"label": "A", "text": "益本率"}, {"label": "B", "text": "预期收益率"}, {"label": "C", "text": "报酬率"}, {"label": "D", "text": "边际收益率"}], "answer": "A", "analysis": "本题考查投资回收期法。投资回收期＝投资额/年净收益额。\n方案1：投资回收期＝投资额/年净收益额＝800/150＝5.3（年）；\n方案2：投资回收期＝投资额/年净收益额＝650/200＝3.25（年）；\n方案3：投资回收期＝投资额/年净收益额＝520/130＝4（年）；\n方案4：投资回收期＝投资额/年净收益额＝450/90＝5（年）。\n掌握“技术改造方案优化选择的方法”知识点。\n20.效益成本分析法用（ ）指标反映。\nA.益本率\nB.预期收益率\nC.报酬率\nD.边际收益率"}, {"question": "企业的技术改造可以分为表层、内层和深层三个层次，内层的技术改造主要表现为（ ）。", "options": [{"label": "A", "text": "新产品的开发"}, {"label": "B", "text": "新技术的应用"}, {"label": "C", "text": "新能源的获得"}, {"label": "D", "text": "新工艺的发明"}], "answer": "ABD", "analysis": "本题考查效益成本分析法。效益成本分析法是在考虑资金时间价值下的一种动态评价的方法，用益\n本率指标反映。\n掌握“技术改造方案优化选择的方法”知识点。\n多项选择题\n21.企业的技术改造可以分为表层、内层和深层三个层次，内层的技术改造主要表现为（ ）。\nA.新产品的开发\nB.新技术的应用\nC.新能源的获得\nD.新工艺的发明\nE.新投入的增加"}, {"question": "企业技术改造规划的具体内容有（ ）。", "options": [{"label": "A", "text": "明确企业技术改造的战略目标和实施步骤"}, {"label": "B", "text": "确定企业生产过程应达到的技术水平"}, {"label": "C", "text": "明确采用新工艺、新材料、新设备的水平及指标"}, {"label": "D", "text": "确定技术改造的重点和进度"}], "answer": "ABCD", "analysis": "CE属于表层技术改造的主要表现。\n22.企业技术改造规划的具体内容有（ ）。\nA.明确企业技术改造的战略目标和实施步骤\nB.确定企业生产过程应达到的技术水平\nC.明确采用新工艺、新材料、新设备的水平及指标\nD.确定技术改造的重点和进度\nE.制定企业所属行业的技术标准和要求"}, {"question": "某钢厂进行技术改造项目技术选择时，应遵循的原则是（ ）。", "options": [{"label": "A", "text": "确保总投资额最小"}, {"label": "B", "text": "确保经济效益最高"}, {"label": "C", "text": "以最小的投资取得最好的经济效益"}, {"label": "D", "text": "确保改造后能消化推广"}], "answer": "CDE", "analysis": "除了选项ABCD，企业技术改造规划的具体内容还包括：通过技术改造确定劳动生产率、产品质量、\n能源和原材料节约、利润、劳动条件和环境保护等方面应达到的水平及措施；实施上述事项所必需的组织和\n技术措施，资金筹措和人员的培训。\n5\n23.某钢厂进行技术改造项目技术选择时，应遵循的原则是（ ）。\nA.确保总投资额最小\nB.确保经济效益最高\nC.以最小的投资取得最好的经济效益\nD.确保改造后能消化推广\nE.有利于企业的技术进步"}, {"question": "CDE 【解析】本题考查技术改造项目的确定及其可行性研究。在进行技术选择时，企业应遵循的原则： （1）以最小的代价取得最好的效果； （2）有利于促进企业的技术进步； （3）确保改造后能够消化推广。 24.新产品开发战略具有的特征包括（ ）。 E.非竞争性", "options": [{"label": "A", "text": "全局性"}, {"label": "B", "text": "系统性"}, {"label": "C", "text": "相对稳定性"}, {"label": "D", "text": "未来性"}], "answer": "ABCD", "analysis": "本题考查技术改造项目的确定及其可行性研究。在进行技术选择时，企业应遵循的原则：\n（1）以最小的代价取得最好的效果；\n（2）有利于促进企业的技术进步；\n（3）确保改造后能够消化推广。\n24.新产品开发战略具有的特征包括（ ）。\nA.全局性\nB.系统性\nC.相对稳定性\nD.未来性\nE.非竞争性"}, {"question": "构思新产品创意时，常用的评价筛选方法有（ ）。", "options": [{"label": "A", "text": "优缺点列举法"}, {"label": "B", "text": "价值工程法"}, {"label": "C", "text": "转导法"}, {"label": "D", "text": "综合评分法"}], "answer": "ABD", "analysis": "本题考查新产品开发战略的特征。新产品开发战略具有以下五个特征：全局性；未来性；系统性\n；竞争性；相对稳定性。\n掌握“新产品开发战略的含义、特征及基本类型”知识点。\n25.构思新产品创意时，常用的评价筛选方法有（ ）。\nA.优缺点列举法\nB.价值工程法\nC.转导法\nD.综合评分法\nE.联测法"}, {"question": "广义的技术改造包括的内容有（ ）。", "options": [{"label": "A", "text": "对企业进行整体性改造"}, {"label": "B", "text": "工艺改革"}, {"label": "C", "text": "产品更新换代"}, {"label": "D", "text": "对企业进行整体性改建"}], "answer": "AD", "analysis": "本题考查评价筛选的方法。使用评价筛选时，常用的评价方法有优缺点列举法、价值工程法、综合\n评分法、经济比较分析法等。\n掌握“新产品开发的过程”知识点。\n26.广义的技术改造包括的内容有（ ）。\nA.对企业进行整体性改造\nB.工艺改革\nC.产品更新换代\nD.对企业进行整体性改建\nE.燃料、原材料综合利用和对粉尘、噪声的治理"}, {"question": "【不定项选择题】确定该设备的最佳更新期，主要应依据该设备的（ ）。", "options": [{"label": "A", "text": "生产日期"}, {"label": "B", "text": "服役期"}, {"label": "C", "text": "使用寿命"}, {"label": "D", "text": "经济寿命"}], "answer": "D", "analysis": "本题考查技术改造的内容。广义的技术改造的内容包括对企业进行整体性的改造和改建。\n掌握“技术改造概述”知识点。\n共享题干题\n6\n【题干】某企业领导班子正在组织研发部经理、财务部经理等部门经理分析研究某设备的更新问题，该设备\n原始价值为80000元，每年低劣化增加值为2500元，更新时的残值为19000元。\n27.【不定项选择题】确定该设备的最佳更新期，主要应依据该设备的（ ）。\nA.生产日期\nB.服役期\nC.使用寿命\nD.经济寿命"}, {"question": "【不定项选择题】如果考虑残值，该设备的最佳更新期为（ ）年。", "options": [{"label": "A", "text": "5"}, {"label": "B", "text": "7"}, {"label": "C", "text": "6"}, {"label": "D", "text": "9"}], "answer": "B", "analysis": "本题考查设备更新。确定设备最佳更新期主要是依据设备的经济寿命。\n28.【不定项选择题】如果考虑残值，该设备的最佳更新期为（ ）年。\nA.5\nB.7\nC.6\nD.9"}, {"question": "本题考查低劣化数值法。T＝[2×（80000－19000）/2500] ≈7（年）。", "options": [{"label": "A", "text": "投资费用随着设备使用年限的延长，其分摊费用将逐年减少"}, {"label": "B", "text": "投资费用随着设备使用年限的延长，其分摊费用将逐年增加"}, {"label": "C", "text": "由于有形磨损造成的设备低劣化，经营费用将逐年减少"}, {"label": "D", "text": "由于有形磨损造成的设备低劣化，经营费用将逐年增加"}], "answer": "AD", "analysis": "本题考查低劣化数值法。T＝[2×（80000－19000）/2500] ≈7（年）。\n29.【不定项选择题】设备费用由投资费用和经营费用两部分组成，该企业对设备费用正确的认识是（ ）。\nA.投资费用随着设备使用年限的延长，其分摊费用将逐年减少\nB.投资费用随着设备使用年限的延长，其分摊费用将逐年增加\nC.由于有形磨损造成的设备低劣化，经营费用将逐年减少\nD.由于有形磨损造成的设备低劣化，经营费用将逐年增加"}, {"question": "【不定项选择题】该精密仪器第1年的年度使用费为（ ）万元。", "options": [{"label": "A", "text": "1.5"}, {"label": "B", "text": "20"}, {"label": "C", "text": "2.6"}, {"label": "D", "text": "5.5"}], "answer": "C", "analysis": "本题考查设备的经济寿命。设备的费用由两部分组成：一部分是购置设备时的投资费用，另一部分\n是维修保养、燃料动力消耗和劳务支出等经营费用。前者随着设备使用年限的延长，其分摊费用变少，后者\n是由于有形磨损造成的设备低劣化，其值将逐年扩大。\n【题干】某企业正在研究其设备的合理使用、更新和改造问题，以实现对设备使用、设备管理以及相关费用\n的合理监控，提高设备使用效益，降低设备损耗和成本率。该企业有一台精密仪器，其原值为12万元，使用\n后第1年的维持费用为6000元，实际残值为10万元。在综合分析该精密仪器使用费用的基础上，企业采用恰当\n的方法确定设备最佳更新期，并对该精密仪器进行科学管理。\n30.【不定项选择题】该精密仪器第1年的年度使用费为（ ）万元。\nA.1.5\nB.20\nC.2.6\nD.5.5"}, {"question": "【不定项选择题】确定该精密仪器最佳更新期，较适用的方法是（ ）。", "options": [{"label": "A", "text": "面值法"}, {"label": "B", "text": "投资回收期法"}, {"label": "C", "text": "效益成本分析法"}, {"label": "D", "text": "趋势外延法"}], "answer": "A", "analysis": "本题考查设备更新。该精密仪器第1年的年度使用费用为12－10＋0.6＝2.6（万元）。\n掌握“设备更新”知识点。\n31.【不定项选择题】确定该精密仪器最佳更新期，较适用的方法是（ ）。\nA.面值法\nB.投资回收期法\n7\nC.效益成本分析法\nD.趋势外延法"}, {"question": "【不定项选择题】该企业对该精密仪器进行科学管理时，正确的认识是（ ）。", "options": [{"label": "A", "text": "该精密仪器必须使用到经济寿命结束时再进行更新，才是合理的"}, {"label": "B", "text": "该精密仪器的投资费用随着其使用年限的延长，分摊费用越来越少"}, {"label": "C", "text": "该精密仪器的经营费用随着其使用年限的延长而逐年减少"}, {"label": "D", "text": "该精密仪器的技术寿命是指该仪器从投入使用到因技术进步而更新所经历的时间"}], "answer": "BD", "analysis": "本题考查面值法。面值法是以同类型设备的统计资料为依据，分析计算其年度使用费用，以确定设\n备最佳更新期的一种方法。它适用于精密仪器等高、精、尖的设备。\n掌握“设备更新”知识点。\n32.【不定项选择题】该企业对该精密仪器进行科学管理时，正确的认识是（ ）。\nA.该精密仪器必须使用到经济寿命结束时再进行更新，才是合理的\nB.该精密仪器的投资费用随着其使用年限的延长，分摊费用越来越少\nC.该精密仪器的经营费用随着其使用年限的延长而逐年减少\nD.该精密仪器的技术寿命是指该仪器从投入使用到因技术进步而更新所经历的时间"}, {"question": "【不定项选择题】如果根据设备的经济寿命来确定该精密仪器的最佳更新时机，最应遵循的原则是（ ）。", "options": [{"label": "A", "text": "购置费用最小"}, {"label": "B", "text": "经营费用最小"}, {"label": "C", "text": "经济寿命最长"}, {"label": "D", "text": "购置费用和经营费用的总和最小"}], "answer": "D", "analysis": "本题考查设备更新。选项A错误，设备经济寿命也称“最佳更新期”，但这决不意味着设备一定要使\n用到经济寿命结束时更新才合理，由于技术进步，在实际工作中大多数的情况是在设备尚未达到其经济寿命\n年限，就应该用技术更先进、经济更合理的新设备，提前予以更新。选项C错误，设备的费用由两部分组成\n：一部分是购置设备时的投资费用，另一部分是维修保养、燃料动力消耗和劳务支出等经营费用。前者随着\n设备使用年限的延长，其分摊费用越少；后者是由于有形磨损造成的设备低劣化，其值将逐年扩大。\n掌握“设备更新”知识点。\n33.【不定项选择题】如果根据设备的经济寿命来确定该精密仪器的最佳更新时机，最应遵循的原则是（\n）。\nA.购置费用最小\nB.经营费用最小\nC.经济寿命最长\nD.购置费用和经营费用的总和最小"}, {"question": "【不定项选择题】在计算技术改造方案时，不仅要以追加投资为代价，而且要以（ ）为代价。", "options": [{"label": "A", "text": "旧的生产能力的消失"}, {"label": "B", "text": "新技术的适应成本"}, {"label": "C", "text": "设备改造费用"}, {"label": "D", "text": "技术改造的时间成本"}], "answer": "A", "analysis": "本题考查设备的寿命。设备的经济寿命是考虑设备的有形磨损，根据最小使用费用（成本）的原则\n确定的设备寿命。设备的费用由两部分组成：一部分是购置设备时的投资费用，另一部分是维修保养、燃料\n动力消耗和劳务支出等经营费用。前者随着设备使用年限的延长，其分摊费用变少；后者是由于有形磨损造\n成的设备低劣化，其值将逐年扩大。这两种具有相反趋势费用的和，必然会有最小值，这个最低的使用费用\n就是该设备的经济寿命费用。\n掌握“设备更新”知识点。\n【题干】某苯胺生产企业对技术改造问题进行经济可行性分析。目前企业投产的两条生产线，每年生产苯胺\n合计25吨，但随着设备的老化和技术的落后，每年的成本逐渐增加，产品品质也有所下滑。为了解决存在的\n问题，需耗资500万元进行技术改造。技术改造时，拆除旧设备将会损失20万元，而这些旧设备的残值为5万\n元。技术改造完成后，每吨苯胺的成本将由原来的450元降低至425元，假设苯胺行业的标准投资效益系数为\n0.3。\n根据以上资料，回答下列问题：\n34.【不定项选择题】在计算技术改造方案时，不仅要以追加投资为代价，而且要以（ ）为代价。\nA.旧的生产能力的消失\nB.新技术的适应成本\nC.设备改造费用\nD.技术改造的时间成本\n8"}, {"question": "【不定项选择题】该技术改造项目的总投资额为（ ）万元。", "options": [{"label": "A", "text": "500"}, {"label": "B", "text": "515"}, {"label": "C", "text": "530"}, {"label": "D", "text": "535"}], "answer": "B", "analysis": "本题考查技术改造项目的经济可行性分析。在计算技术改造方案的总投资时，除了考虑由于进行技\n术改造而追加投资外，还应该把由于技术改造引起的某些旧的生产能力的消失给企业造成的损失计入总投资\n之中。也就是说，技术改造后形成的生产能力，不仅以追加投资为代价，而且还以旧的生产能力的消失为代\n价，这一代价将要靠改造后增加的收益按标准回收期予以收回。\n掌握“技术改造规划和项目的确定及其可行性研究”知识点。\n35.【不定项选择题】该技术改造项目的总投资额为（ ）万元。\nA.500\nB.515\nC.530\nD.535"}, {"question": "【不定项选择题】技术改造的基本程序中，第一步是（ ）。", "options": [{"label": "A", "text": "明确技术改造目标"}, {"label": "B", "text": "确定技术改造项目的轻重缓急"}, {"label": "C", "text": "提出改造方案"}, {"label": "D", "text": "可行性研究"}], "answer": "B", "analysis": "本题考查技术改造项目的经济可行性分析。K总＝K新＋K损－K利＝500＋20－5＝515（万元）。\n掌握“技术改造规划和项目的确定及其可行性研究”知识点。\n36.【不定项选择题】技术改造的基本程序中，第一步是（ ）。\nA.明确技术改造目标\nB.确定技术改造项目的轻重缓急\nC.提出改造方案\nD.可行性研究"}, {"question": "【不定项选择题】一般来说，企业在进行技术改造时需要遵循的原则有（ ）。", "options": [{"label": "A", "text": "以提高经济效益为中心"}, {"label": "B", "text": "以内涵为主扩大再生产"}, {"label": "C", "text": "技术越先进越好"}, {"label": "D", "text": "量力而行，一切从实际出发"}], "answer": "ABD", "analysis": "本题考查技术改造的基本程序。企业的技术改造是一个较为复杂的过程，其基本程序如下：（1）调\n查本企业生产技术的历史和现状，剖析技术基础的优势和劣势，找出生产技术中的薄弱环节，调查研究国内\n外的技术现状和发展趋势及国内外的科技新成果，掌握技术改造的时机，确定技术改造项目的轻重缓急。\n（2）提出改造目标、方向、范围及预期取得的目标。（3）提出改造方案，根据市场环境、内部条件，制定\n改造的各项目具体配套方案。（4）可行性研究，在事前对预投资的各种建设方案、技术方案和生产经营方案\n的实施可能性、技术先进性和经济合理性进行调查分析。\n掌握“技术改造规划和项目的确定及其可行性研究”知识点。\n37.【不定项选择题】一般来说，企业在进行技术改造时需要遵循的原则有（ ）。\nA.以提高经济效益为中心\nB.以内涵为主扩大再生产\nC.技术越先进越好\nD.量力而行，一切从实际出发"}], "第七章 员工招聘与员工培训": [{"question": "第七章 员工招聘与员工培训 单项选择题 1.企业对客户服务岗位进行工作分析时，请所有客服人员按时间顺序记录其在一个月内所从事的各项工作活 动以及所耗费的时间等细节。该企业采用的工作分析方法是（ ）。", "options": [{"label": "A", "text": "观察法"}, {"label": "B", "text": "面谈法"}, {"label": "C", "text": "问卷法"}, {"label": "D", "text": "工作日志法"}], "answer": "D", "analysis": ""}, {"question": "说明和规定任职者完成工作所必须具备的知识、能力和技术的文件称为（ ）。", "options": [{"label": "A", "text": "任职说明书"}, {"label": "B", "text": "职位描述书"}, {"label": "C", "text": "工作日志"}, {"label": "D", "text": "工作概述"}], "answer": "A", "analysis": "工作日志法就是由从事某项工作的员工按时间顺序记录在一段时期内所从事的各项工作活动或任务\n以及所耗费的时间等各种细节，由此来了解员工实际工作的内容、责任、权力、人际关系及工作负荷。\n2.说明和规定任职者完成工作所必须具备的知识、能力和技术的文件称为（ ）。\nA.任职说明书\nB.职位描述书\nC.工作日志\nD.工作概述"}, {"question": "企业应根据不同的招聘要求灵活选择适当的招聘形式，用尽可能低的招聘成本吸引高素质的求职者，这体 现了员工招聘的（ ）原则。", "options": [{"label": "A", "text": "信息公开"}, {"label": "B", "text": "公正平等"}, {"label": "C", "text": "效率优先"}, {"label": "D", "text": "双向选择"}], "answer": "C", "analysis": "任职说明书是关于工作任职者为了圆满完成工作所必须具备的知识、能力和技术的说明与规定。\n3.企业应根据不同的招聘要求灵活选择适当的招聘形式，用尽可能低的招聘成本吸引高素质的求职者，这体\n现了员工招聘的（ ）原则。\nA.信息公开\nB.公正平等\nC.效率优先\nD.双向选择"}, {"question": "某企业决定从采购部经理和仓储部经理中选择一人担任销售部经理，该企业采用的招聘方法是（ ）。", "options": [{"label": "A", "text": "晋升"}, {"label": "B", "text": "职位转换"}, {"label": "C", "text": "工作轮换"}, {"label": "D", "text": "工作扩大"}], "answer": "B", "analysis": "效率优先原则是指企业应根据不同的招聘要求灵活选择适当的招聘形式，用尽可能低的招聘成本吸\n引高素质的求职者。\n4.某企业决定从采购部经理和仓储部经理中选择一人担任销售部经理，该企业采用的招聘方法是（ ）。\nA.晋升\nB.职位转换\nC.工作轮换\nD.工作扩大"}, {"question": "为了测评求职者的记忆广度而对其进行的“顺背数字”和“倒背数字”的心理测评是（ ）。", "options": [{"label": "A", "text": "成就测评"}, {"label": "B", "text": "倾向测评"}, {"label": "C", "text": "人格测评"}, {"label": "D", "text": "能力测评"}], "answer": "D", "analysis": "晋升是指企业中高一级职位出现空缺时，从企业内部挑选较为适宜的人员补充职位空缺，挑选的人\n员一般是从一个较低职位晋升到一个较高的职位。\n5.为了测评求职者的记忆广度而对其进行的“顺背数字”和“倒背数字”的心理测评是（ ）。\nA.成就测评\nB.倾向测评\nC.人格测评\nD.能力测评"}, {"question": "在企业进行员工培训需求分析时，应该把（ ）作为企业培训的目标。", "options": [{"label": "A", "text": "企业层面的培训需求"}, {"label": "B", "text": "工作层面的培训需求"}, {"label": "C", "text": "员工层面的培训需求"}, {"label": "D", "text": "企业、工作和员工层面的三方的共同需求"}], "answer": "D", "analysis": "本题考查能力测评。能力测评是指企业为了测评求职者某方面的能力，而有针对性地设计和实施的\n1\n测验方案。如为了测评求职者的记忆广度而进行的“顺背数字”和“倒背数字”的广度测验；为了考查求职\n者的记忆与动作的协调能力而进行的“数字配符号”测验等。\n6.在企业进行员工培训需求分析时，应该把（ ）作为企业培训的目标。\nA.企业层面的培训需求\nB.工作层面的培训需求\nC.员工层面的培训需求\nD.企业、工作和员工层面的三方的共同需求"}, {"question": "在企业员工培训工作中，实施培训的主体是（ ）。", "options": [{"label": "A", "text": "部门主管"}, {"label": "B", "text": "参与培训的人员"}, {"label": "C", "text": "高层管理人员"}, {"label": "D", "text": "员工培训者"}], "answer": "D", "analysis": "本题考查员工培训的需求分析。企业在进行员工培训需求分析时，应取企业整体、工作及员工个人\n层面三方的共同需求区域，并以此作为企业员工培训的目标。\n7.在企业员工培训工作中，实施培训的主体是（ ）。\nA.部门主管\nB.参与培训的人员\nC.高层管理人员\nD.员工培训者"}, {"question": "某企业在进行客服人员培训时，请受训人员分别扮演客服经理、客服人员以及前来投诉的客户，在处理客 户投诉的过程中发现问题，并且找出解决问题的方法，该企业采用的培训方法是（ ）。", "options": [{"label": "A", "text": "行为示范法"}, {"label": "B", "text": "情景模拟法"}, {"label": "C", "text": "案例研究法"}, {"label": "D", "text": "行动学习法"}], "answer": "B", "analysis": "员工培训者是具体实施培训的主体，他们的选择直接影响着员工培训活动的效果和质量。\n8.某企业在进行客服人员培训时，请受训人员分别扮演客服经理、客服人员以及前来投诉的客户，在处理客\n户投诉的过程中发现问题，并且找出解决问题的方法，该企业采用的培训方法是（ ）。\nA.行为示范法\nB.情景模拟法\nC.案例研究法\nD.行动学习法"}, {"question": "甲公司与李某订立劳动合同，合同约定：李某担任公司的会计，每日工作时间为4小时，每周工作时间不超 过24小时，每小时的劳动报酬为40元，该劳动合同属于（ ）。", "options": [{"label": "A", "text": "固定期限劳动合同"}, {"label": "B", "text": "无固定期限劳动合同"}, {"label": "C", "text": "全日制劳动合同"}, {"label": "D", "text": "非全日制劳动合同"}], "answer": "D", "analysis": "本题考查常用的脱产培训方法。情景模拟法是指通过把培训对象置于模拟的现实工作环境中，让他\n们依据模拟现实中的情景做出及时的反应，分析实际工作中可能出现的各种问题，并解决问题，为进入实际\n工作岗位打下基础的一种培训方法。\n9.甲公司与李某订立劳动合同，合同约定：李某担任公司的会计，每日工作时间为4小时，每周工作时间不超\n过24小时，每小时的劳动报酬为40元，该劳动合同属于（ ）。\nA.固定期限劳动合同\nB.无固定期限劳动合同\nC.全日制劳动合同\nD.非全日制劳动合同"}, {"question": "我国劳动合同法规定，劳动者提前（ ）天以书面形式通知用人单位，可以解除劳动合同。", "options": [{"label": "A", "text": "10"}, {"label": "B", "text": "15"}, {"label": "C", "text": "30"}, {"label": "D", "text": "60"}], "answer": "C", "analysis": "本题考查企业劳动合同的种类。非全日制劳动合同，是以小时计酬为主，劳动者在同一用人单位一\n般平均每日工作时间不超过4小时，每周工作时间累计不超过24小时的用工形式。\n10.我国劳动合同法规定，劳动者提前（ ）天以书面形式通知用人单位，可以解除劳动合同。\nA.10\nB.15\nC.30\nD.60\n2"}, {"question": "根据我国劳动争议调解仲裁法，发生劳动争议，劳动者一般不可以直接采取的措施是（ ）。", "options": [{"label": "A", "text": "请工会或者第三方共同与用人单位协商"}, {"label": "B", "text": "向劳动争议调解机构申请调解"}, {"label": "C", "text": "向劳动争议仲裁委员会申请仲裁"}, {"label": "D", "text": "向人民法院提起诉讼"}], "answer": "D", "analysis": "《劳动合同法》第37条规定，劳动者提前30日以书面形式通知用人单位，可以解除劳动合同。\n11.根据我国劳动争议调解仲裁法，发生劳动争议，劳动者一般不可以直接采取的措施是（ ）。\nA.请工会或者第三方共同与用人单位协商\nB.向劳动争议调解机构申请调解\nC.向劳动争议仲裁委员会申请仲裁\nD.向人民法院提起诉讼"}, {"question": "在企业进行员工招聘时，（ ）适用于对专业管理人员、科技人员和熟练工人某一方面实际能力的测评。", "options": [{"label": "A", "text": "成就测评"}, {"label": "B", "text": "智力测评"}, {"label": "C", "text": "倾向测评"}, {"label": "D", "text": "人格测评"}], "answer": "A", "analysis": "本题考查企业劳动争议处理的方式。发生劳动争议，劳动者可以与用人单位协商，也可以请工会或\n者第三方共同与用人单位协商，达成和解协议。发生劳动争议，当事人不愿协商、协商不成或者达成和解协\n议后不履行的，可以向调解组织申请调解；不愿调解、调解不成或者达成调解协议后不履行的，可以向劳动\n争议仲裁委员会申请仲裁；对仲裁裁决不服的，除法律另有规定的外，可以向人民法院提起诉讼。\n12.在企业进行员工招聘时，（ ）适用于对专业管理人员、科技人员和熟练工人某一方面实际能力的测评。\nA.成就测评\nB.智力测评\nC.倾向测评\nD.人格测评"}, {"question": "下列招聘形式中，（ ）是比较传统的，也是被广泛使用的招聘方式。", "options": [{"label": "A", "text": "媒体广告招聘"}, {"label": "B", "text": "校园招聘"}, {"label": "C", "text": "中介机构招聘"}, {"label": "D", "text": "人才招聘会招聘"}], "answer": "D", "analysis": "本题考查成就测评。在企业进行员工招聘时，成就测评适用于对专业管理人员、 s": [{"label": "A", "text": "固定期限劳动合同"}, {"label": "B", "text": "无固定期限劳动合同"}, {"label": "C", "text": "全日制劳动合同"}, {"label": "D", "text": "非全日制劳动合同"}], "answer": "C", "analysis": "本题考查企业劳动争议仲裁的程序。仲裁委员会决定受理的，应当自做出决定之日起5日内将申诉书\n的副本送达被诉人，并组成仲裁庭，决定不予受理的，应当说明理由。\n掌握“企业劳动争议的仲裁和诉讼”知识点。\n18.某公司与张三订立劳动合同，合同约定：张三担任公司的营销部经理，每日工作时间为4～8小时，每周工\n作时间不超过40小时，每天的劳动报酬为200元，该劳动合同属于（ ）。\nA.固定期限劳动合同\nB.无固定期限劳动合同\nC.全日制劳动合同\nD.非全日制劳动合同"}, {"question": "下列有关无固定期限劳动合同的理解错误的是（ ）。", "options": [{"label": "A", "text": "无固定期限劳动合同是指用人单位与劳动者约定无确定终止时间的劳动合同"}, {"label": "B", "text": "用人单位与劳动者协商一致，可以订立无固定期限劳动合同"}, {"label": "C", "text": "事实劳动关系超过一年不签订劳动合同，法律直接推定为双方存在无固定期限劳动合同"}, {"label": "D", "text": "劳动者在该用人单位连续工作满五年的，用人单位必须与之签订无固定期限劳动合同"}], "answer": "D", "analysis": "本题考查企业劳动合同的种类。全日制劳动合同是从事全时工作的劳动者与用人单位签订的书面劳\n动合同，即以日计酬、在同一用人单位每日工作时间在4小时以上、8小时以下，每周工作时间不超过40小时\n。\n掌握“企业劳动合同的概念和种类”知识点。\n19.下列有关无固定期限劳动合同的理解错误的是（ ）。\nA.无固定期限劳动合同是指用人单位与劳动者约定无确定终止时间的劳动合同\nB.用人单位与劳动者协商一致，可以订立无固定期限劳动合同\nC.事实劳动关系超过一年不签订劳动合同，法律直接推定为双方存在无固定期限劳动合同\nD.劳动者在该用人单位连续工作满五年的，用人单位必须与之签订无固定期限劳动合同\n4"}, {"question": "既作为员工工作指南，又作为企业制定人力资源规划，设计工作能力模型，制定培训开发方案等人力资源 职能管理工作参考依据的人力资源管理文件是（ ）。", "options": [{"label": "A", "text": "岗位职责说明书"}, {"label": "B", "text": "在职规范"}, {"label": "C", "text": "工作分析报告"}, {"label": "D", "text": "工作说明书"}], "answer": "D", "analysis": "本题考查无固定期限劳动合同。选项D错误，劳动者在该用人单位连续工作满十年的，用人单位必须\n与之签订无固定期限劳动合同。\n掌握“企业劳动合同的概念和种类”知识点。\n20.既作为员工工作指南，又作为企业制定人力资源规划，设计工作能力模型，制定培训开发方案等人力资源\n职能管理工作参考依据的人力资源管理文件是（ ）。\nA.岗位职责说明书\nB.在职规范\nC.工作分析报告\nD.工作说明书"}, {"question": "在工作分析的步骤中，工作分析中的关键环节是（ ）。", "options": [{"label": "A", "text": "准备阶段"}, {"label": "B", "text": "应用反馈阶段"}, {"label": "C", "text": "分析阶段"}, {"label": "D", "text": "形成结果阶段"}], "answer": "C", "analysis": "本题考查工作分析的概念。工作说明书既是一般员工工作的指南，也是企业确定企业人力资源规划\n、构建员工能力模型、进行绩效考核和薪酬管理、实施员工培训开发等人力资源职能管理的参考依据。\n掌握“工作分析的概念与作用”知识点。\n21.在工作分析的步骤中，工作分析中的关键环节是（ ）。\nA.准备阶段\nB.应用反馈阶段\nC.分析阶段\nD.形成结果阶段"}, {"question": "某企业根据工作要求安排有潜力的管理人员分别在不同的部门各工作一年，以丰富管理人员的工作经验 ，这种培训方法称为（ ）。", "options": [{"  {"label": "D", "text": "建立有效的沟通体系"}], "answer": "DE", "analysis": "本题考查工作分析的概念。工作分析的主体是进行工作分析的管理者和有关人员（E选项正确），客\n体是企业内部的各个职位（B选项正确），内容是与各个职位有关的情况信息（D选项正确），结果是工作说\n明书（也可以叫作职位说明书或者岗位说明书）和工作分析报告（C选项正确）。选项A错误，工作分析的目\n标是使其他人能了解一种职位和人员需求。\n掌握“工作分析的概念与作用”知识点。\n37.在工作分析的准备阶段，主要进行的工作包括（ ）。\nA.收集背景资料\nB.审查工作信息\nC.收集基本数据与信息\nD.建立有效的沟通体系\nE.确定调查和分析对象的样本"}, {"question": "DE 【解析】本题考查工作分析的步骤。准备阶段主要包括以下工作：（1）确定工作分析目的；（2）制订工作 分析计划；（3）组建工作分析小组；（4）建立有效的沟通体系；（5）确定调查和分析对象的样本。 掌握“工作分析的步骤与方法”知识点。 38.使用访谈法进行工作分析时，工作分析人员需要注意的有（ ）。 E.问题的范围要尽量广泛，避免出现遗漏", "options": [{"label": "A", "text": "明确谈话目的，拟好谈话计划，确定谈话要点"}, {"label": "B", "text": "选好谈话对象，保持友好、诚恳和亲善的态度"}, {"label": "C", "text": "多渠道访谈"}, {"label": "D", "text": "所提问题要尽量简单易懂，避免理解上的偏差"}], "answer": "ABC", "analysis": "本题考查工作分析的步骤。准备阶段主要包括以下工作：（1）确定工作分析目的；（2）制订工作\n分析计划；（3）组建工作分析小组；（4）建立有效的沟通体系；（5）确定调查和分析对象的样本。\n掌握“工作分析的步骤与方法”知识点。\n38.使用访谈法进行工作分析时，工作分析人员需要注意的有（ ）。\nA.明确谈话目的，拟好谈话计划，确定谈话要点\nB.选好谈话对象，保持友好、诚恳和亲善的态度\nC.多渠道访谈\nD.所提问题要尽量简单易懂，避免理解上的偏差\nE.问题的范围要尽量广泛，避免出现遗漏"}], "第八章 财务管理": [{"question": "第八章 财务管理 单项选择题 1.某公司采购原材料耗资500万元，该财务活动是（ ）活动。", "options": [{"label": "A", "text": "资金运营"}, {"label": "B", "text": "投资"}, {"label": "C", "text": "筹资"}, {"label": "D", "text": "分配"}], "answer": "A", "analysis": ""}, {"question": "A企业以直接投资的形式向B企业投资，B企业承担资本保值增值责任，体现的是A企业与B企业之间的（ ）财务关系。", "options": [{"label": "A", "text": "所有权性质的投资与受资的关系"}, {"label": "B", "text": "债权债务关系"}, {"label": "C", "text": "企业内部利益分配关系"}, {"label": "D", "text": "资本收益分配关系"}], "answer": "A", "analysis": "资金运营活动是指企业的日常生产经营活动发生各种各样的资金收支。企业采购材料、支付工资和\n其他营业费用时，发生资金流出。企业以现销方式销售产品或商品时，发生资金流入。企业经营过程中产生\n的资金收支，属于企业经营引起的财务活动。\n2.A企业以直接投资的形式向B企业投资，B企业承担资本保值增值责任，体现的是A企业与B企业之间的（\n）财务关系。\nA.所有权性质的投资与受资的关系\nB.债权债务关系\nC.企业内部利益分配关系\nD.资本收益分配关系"}, {"question": "财务计划执行后，认真分析检查实际与计划之间的差异，采取切实的措施，消除偏差或调整计划，缩小差 异，属于财务控制中的（ ）。", "options": [{"label": "A", "text": "事前控制"}, {"label": "B", "text": "事中控制"}, {"label": "C", "text": "事后控制"}, {"label": "D", "text": "过程控制"}], "answer": "C", "analysis": "本题考查财务关系。企业与受资者的所有权性质的投资与受资的关系是指企业以购买股票或直接投\n资的形式向其他企业（受资者）投资，受资者承担支付股利和资本保值增值责任，故选A。\n3.财务计划执行后，认真分析检查实际与计划之间的差异，采取切实的措施，消除偏差或调整计划，缩小差\n异，属于财务控制中的（ ）。\nA.事前控制\nB.事中控制\nC.事后控制\nD.过程控制"}, {"question": "当前学术界比较认可的企业理财目标是（）。", "options": [{"label": "A", "text": "利润最大化"}, {"label": "B", "text": "每股收益最大化"}, {"label": "C", "text": "净资产效益最大化"}, {"label": "D", "text": "企业价值最大化"}], "answer": "D", "analysis": "财务控制要实施全过程控制，事后控制，是在财务计划执行后，认真分析检查实际与计划之间的差\n异，采取切实的措施，消除偏差或调整计划，缩小差异。\n4.当前学术界比较认可的企业理财目标是（）。\nA.利润最大化\nB.每股收益最大化\nC.净资产效益最大化\nD.企业价值最大化"}, {"question": "发行者在发行债券筹资的基础上，又实现了普通股筹资的筹资方式称为（ ）。", "options": [{"label": "A", "text": "银行借款"}, {"label": "B", "text": "租赁筹资"}, {"label": "C", "text": "商业信用"}, {"label": "D", "text": "分离交易可转债"}], "answer": "D", "analysis": "当前学术界比较认可的企业理财目标是企业价值最大化。\n5.发行者在发行债券筹资的基础上，又实现了普通股筹资的筹资方式称为（ ）。\nA.银行借款\nB.租赁筹资\nC.商业信用\nD.分离交易可转债"}, {"question": "在下列筹资方式中，（ ）适合各类企业，它形成于商品交易过程中，是企业的自然性融资。", "options": [{"label": "A", "text": "银行贷款"}, {"label": "B", "text": "商业信用"}, {"label": "C", "text": "租赁筹资"}, {"label": "D", "text": "认股权证"}], "answer": "B", "analysis": "本题考查筹资方式。分离交易可转债是附有认股权证并与认股权证分离交易的公司债券。如果认股\n权证持有人行权认购发行公司的普通股，则发行者在发行债券筹资的基础上，又实现了普通股筹资。\n6.在下列筹资方式中，（ ）适合各类企业，它形成于商品交易过程中，是企业的自然性融资。\nA.银行贷款\nB.商业信用\nC.租赁筹资\nD.认股权证"}, {"question": "假设某公司给客户开出的信用条件是“3/7，n/15”，说明如果客户放弃现金折扣，全部款项必须在（ ）日内付清则必须付款。", "options": [{"label": "A", "text": "5"}, {"label": "B", "text": "15"}, {"label": "C", "text": "3"}, {"label": "D", "text": "10"}], "answer": "B", "analysis": "本题考查筹资方式。商业信用适合各类企业，它形成于商品交易过程中，是企业的自然性融资。\n7.假设某公司给客户开出的信用条件是“3/7，n/15”，说明如果客户放弃现金折扣，全部款项必须在（\n）日内付清则必须付款。\nA.5\nB.15\nC.3\nD.10"}, {"question": "公司取得利益后，首先向国家上缴（ ）。", "options": [{"label": "A", "text": "剩余公积金"}, {"label": "B", "text": "资本公积金"}, {"label": "C", "text": "法定公积金"}, {"label": "D", "text": "企业所得税"}], "answer": "D", "analysis": "本题考查信用条件。如果一个企业开出的信用条件是“3/7，N/15”，说明如果客户要享受3%的折扣\n，需要在7天内付款。\n8.公司取得利益后，首先向国家上缴（ ）。\nA.剩余公积金\nB.资本公积金\nC.法定公积金\nD.企业所得税"}, {"question": "根据我国公司法，公司分配当年税后利润时，应提取税后利润的（ ）列入法定公积金。", "options": [{"label": "A", "text": "5%"}, {"label": "B", "text": "10%"}, {"label": "C", "text": "15%"}, {"label": "D", "text": "25%"}], "answer": "B", "analysis": "公司取得利润后首先应按规定上交企业所得税，余额为税后利润。\n9.根据我国公司法，公司分配当年税后利润时，应提取税后利润的（ ）列入法定公积金。\nA.5%\nB.10%\nC.15%\nD.25%"}, {"question": "某公司用甲材料生产A产品，甲材料标准价格是50元/千克，用量标准为5千克/件。该公司上月投产A产品 10000件，领用甲材料为48000千克，其实际价格为55元/千克，则上月的甲材料成本差异是（ ）万元。", "options": [{"label": "A", "text": "10.0"}, {"label": "B", "text": "11.5"}, {"label": "C", "text": "12.5"}, {"label": "D", "text": "14.0"}], "answer": "D", "analysis": "本题考查利润分配的顺序。公司分配当年税后利润时，应当按当年税后利润的10%提取法定公积金\n，公司法定公积金累计额为公司注册资本的50%以上的，可以不再提取。\n10.某公司用甲材料生产A产品，甲材料标准价格是50元/千克，用量标准为5千克/件。该公司上月投产A产品\n10000件，领用甲材料为48000千克，其实际价格为55元/千克，则上月的甲材料成本差异是（ ）万元。\nA.10.0\nB.11.5\nC.12.5\nD.14.0"}, {"question": "已获利息倍数是指（ ）与利息费用的比值。", "options": [{"label": "A", "text": "净利润总额"}, {"label": "B", "text": "利润总额"}, {"label": "C", "text": "息税前利润总额"}, {"label": "D", "text": "营业利润总额"}], "answer": "C", "analysis": "本题考查成本差异的计算分析。成本差异＝实际产量下实际总成本－实际产量下标准总成本\n2\n＝48000×55－10000×50×5＝14（万元）。\n11.已获利息倍数是指（ ）与利息费用的比值。\nA.净利润总额\nB.利润总额\nC.息税前利润总额\nD.营业利润总额"}, {"question": "如果一个企业开出的信用条件是“2/10，N/30”，说明如果客户要享受2%的折扣，需要在（ ）天内付款 。", "options": [{"label": "A", "text": "10"}, {"label": "B", "text": "20"}, {"label": "C", "text": "30"}, {"label": "D", "text": "40"}], "answer": "A", "analysis": "已获利息倍数＝息税前利润÷利息费用\n12.如果一个企业开出的信用条件是“2/10，N/30”，说明如果客户要享受2%的折扣，需要在（ ）天内付款\n。\nA.10\nB.20\nC.30\nD.40"}, {"question": "反映企业某一特定日期财务状况的报表是（ ）。", "options": [{"label": "A", "text": "现金流量表"}, {"label": "B", "text": "利润表"}, {"label": "C", "text": "资产负债表"}, {"label": "D", "text": "成本核算表"}], "answer": "C", "analysis": "本题考查信用条件。如果一个企业开出的信用条件是“2/10，n/30”，说明如果客户要享受2%的折\n扣，需要在10天内付款。\n掌握“运营资本管理”知识点。\n13.反映企业某一特定日期财务状况的报表是（ ）。\nA.现金流量表\nB.利润表\nC.资产负债表\nD.成本核算表"}, {"question": "甲公司2021年实现利润1000万元，根据我国公司法，利润分配时顺序排在最后的是（ ）。", "options": [{"label": "A", "text": "提取法定公积金"}, {"label": "B", "text": "提取任意公积金"}, {"label": "C", "text": 有率； 新产品创意构思多来源于市场营销或研究与开发的成果，或二者的结合； 新产品创新的程度能达到首创水平，至少部分首创； 在新产品投放市场时机的选择上，多数确定为率先投入； 新产品开发的方式一般为自行研制开发或合作开发。", "options": [{"label": "A", "text": "进取战略"}, {"label": "B", "text": "冒险战略"}, {"label": "C", "text": "紧随战略"}, {"label": "D", "text": "谨慎战略"}], "answer": "A", "analysis": "【解析】进取战略是指企业以较强的进取精神和雄厚的研究开发实力，推动新产品开发，使新产品尽快投放"}, {"question": "企业的经营机制能够协调市场需求和企业生产，以下不属于经营机制的是（ ）。 制或产销机制、约束机制或平衡约束机制、发展机制或技术进步机制。", "options": [{"label": "A", "text": "约束机制"}, {"label": "B", "text": "动力机制"}, {"label": "C", "text": "治理机制"}, {"label": "D", "text": "产销机制"}], "answer": "C", "analysis": "【解析】企业的经营机制是指能够有效地协调市场需求和企业生产经营的综合体系，包括动力机制、调节机"}, {"question": "国家产业政策的调整使企业进行组织变革，则驱动该企业变革的因素属于（ ）因素。 经济调控手段的改变、国家产业政策的调整与产业结构的优化，以及国家有关法律法规的颁布与修改等，都 要求企业重新考虑自己的产业领域和发展战略。", "options": [{"label": "A", "text": "技术"}, {"label": "B", "text": "社会"}, {"label": "C", "text": "政治与法律"}, {"label": "D", "text": "经济"}], "answer": "C", "analysis": "【解析】政治与法律因素是企业变革的外部驱动因素之一，主要包括国际和国内政治环境的变化、国家宏观"}, {"question": "混合式会议法也称（ ）。 一阶段是非交锋式会议，产生各种思路和预测方案；第二阶段是交锋式会议，对上一阶段提出的各种设想进 行质疑，在质疑的过程中又提出新的预测意见或设想，使结论更加全面、合理，最后取得一致的预测结论。", "options": [{"label": "A", "text": "德尔菲法"}, {"label": "B", "text": "质疑式头脑风暴法"}, {"label": "C", "text": "头脑风暴法"}, {"label": "D", "text": "匿名访谈法"}], "answer": "B", "analysis": "【解析】混合式会议法也称质疑式头脑风暴法，它是头脑风暴法的改进。这种方法将会议分为两个阶段，第"}, {"question": "准确地履行服务承诺的能力，是指服务的（ ）。", "options": [{"label": "A", "text": "保证性"}, {"label": "B", "text": "可靠性"}, {"label": "C", "text": "响应性"}, {"label": "D", "text": "有形性"}], "answer": "B", "analysis": "【解析】服务的可靠性是指及时准确地履行服务承诺的能力。"}, {"question": "企业间对服务质量、交易程序等内容进行协议规范，确立行业标准属于（ ）。 8 专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台 （1）合资企业式联盟。合资企业是一个具有独立地位和管理机构的经济实体。合资企业的结构形式是多种多 样的。合资企业的一个典型特征是合资各方在某一产品上或某一地区进行合作，但在其他产品上或其他地区 则相互竞争。 （2）功能协议式联盟。功能协议式联盟是指两个或两个以上企业在一个或几个具体领域依据文字协议进行合 作，如研究开发、生产、技术许可、分销领域等，但合作各方没有股权的参与。 （3）股权参与式联盟。购买合伙企业一部分股权是另一种联盟战略。股权参与与直接证券投资的不同之处在 于，合伙双方通常需要制定一些协议，以利用双方在特定领域的互补性优势。 （4）框架协议式联盟。许多战略联盟在开始时只有很宽泛的合作纲要，然后再在合作过程中补充具体产品、 技术或某一领域的合作合同。随着业务的纵深发展，合作合同的内容趋于细致。 （5）同业俱乐部式联盟。同业俱乐部式联盟是一种成员制的企业间多边联盟。俱乐部对服务质量、交易程序 、价格等常常以协议的方式加以严格规范，确立多数成员认可的共同标准。任何一个企业都可以自由出入同 业俱乐部。选项B正确。", "options": [{"label": "A", "text": "功能协议式联盟"}, {"label": "B", "text": "同业俱乐部式联盟"}, {"label": "C", "text": "股权参与式联盟"}, {"label": "D", "text": "框架协议式联盟"}], "answer": "B", "analysis": "【解析】相对于其他企业组织模式，战略联盟的基本形式包括以下几种："}, {"question": "工作日志法进行工作分析的缺点是（ ）。 性也很高。 其缺点是主观色彩较浓（选项D），由于是员工自行记录，记录的客观性和准确性受到一定程度的影响。因此 ，工作日志法多应用于工作内容较为多样化或较多变化的工作上，在工作分析中常与其他方法相结合，很少 单独使用。", "options": [{"label": "A", "text": "调查不够深入"}, {"label": "B", "text": "存在夸大难度的问题"}, {"label": "C", "text": "不能避免遗漏"}, {"label": "D", "text": "主观色彩较浓"}], "answer": "D", "analysis": "【解析】工作日志法的优点是逐日或在完成任务后即时记录，可以避免遗漏，所获取的信息非常详尽，可靠"}, {"question": "根据产品整体概念，汽车可能发展为水陆两用交通工具，属于产品的（ ）层次。", "options": [{"label": "A", "text": "期望产品"}, {"label": "B", "text": "核心产品"}, {"label": "C", "text": "延伸产品"}, {"label": "D", "text": "潜在产品"}], "answer": "D", "analysis": "【解析】潜在产品是指现有产品可能的演变趋势和前景。例如，汽车可能发展为水陆两用交通工具。"}, {"question": "采用试验、测量、化验、分析与感观检查等方法测定产品的质量特性属于检验中的（ ）。 （1）度量。采用试验、测量、化验、分析与感观检查等方法测定产品的质量特性。（选项A） （2）比较。对测定结果同质量标准进行比较。 （3）判断。根据比较结果，对检验项目或产品做出合格性的判定。 （4）处理。对单件受检产品，决定合格放行还是不合格返工、返修或报废。对受检批量产品，决定是接收还 是拒收。对拒收的不合格产品，还要进一步做出是否重新进行全检或筛选甚至是报废的结论。 9 专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台", "options": [{"label": "A", "text": "度量"}, {"label": "B", "text": "比较"}, {"label": "C", "text": "判断"}, {"label": "D", "text": "处理"}], "answer": "A", "analysis": "【解析】检验包括四个基本要素。"}, {"question": "企业的技术改造是一个复杂的过程，其基本程序的最后一个步骤是（ ）。 ①调查本企业生产技术的历史和现状，剖析技术基础的优势和劣势，找出生产技术中的薄弱环节；调查研究 国内外的技术现状和发展趋势及国内外的科技新成果，掌握技术改造的时机，确定技术改造项目的轻重缓急 。 ②提出改造目标、方向、范围及预期取得的效果。 ③提出改造方案，根据市场环境、内部条件，制定改造的各项目具体配套方案。 ④可行性研究，在事前对预投资的各种建设方案、技术方案和生产经营方案的实施可能性、技术先进性和经 济合理性进行调查分析。", "options": [{"label": "A", "text": "提出技术改造的目标和范围"}, {"label": "B", "text": "提出技术改造的方案和预算"}, {"label": "C", "text": "进行可行性研究"}, {"label": "D", "text": "调查本企业生产技术的历史和现状"}], "answer": "C", "analysis": "【解析】企业的技术改造是一个较为复杂的过程，其基本程序如下："}, {"question": "下列关于质量的说法中，错误的是（ ）。 成，并且这些固有特性具备满足顾客及其他 ％。"}, {"question": "【不定项选择题】该公司的应收账款周转率为（ ）。", "options": [{"label": "A", "text": "2.72"}, {"label": "B", "text": "2.86"}, {"label": "C", "text": "3.09"}, {"label": "D", "text": "3.11"}], "answer": "B", "analysis": "【解析】根据公式：应收账款周转率=营业收入(销售收入)／平均应收账款余额=30／10.5=2.86。"}, {"question": "【不定项选择题】该公司的应收账款周转率为（ ）。 24 专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台 收账费用和坏账损失，从而相对增加企业流动资产的投资收益。", "options": [{"label": "A", "text": "2.72"}, {"label": "B", "text": "2.86"}, {"label": "C", "text": "3.09"}, {"label": "D", "text": "3.11"}], "answer": "B", "analysis": "【解析】应收账款周转率高表明：①收账迅速，账龄较短；②资产流动性强，短期偿债能力强；③可以减少"}, {"question": "【不定项选择题】若该公司应收账款周转率高，则表明公司（ ）。 25", "options": [{"label": "A", "text": "收现能力低"}, {"label": "B", "text": "账龄短"}, {"label": "C", "text": "收账迅速"}, {"label": "D", "text": "资产流动性强"}], "answer": "A", "analysis": "【解析】营运能力比率包括存货周转率、应收账款周转率、流动资产周转率和总资产周转率等。"}]}, "冲刺卷": {"冲刺卷（1-50题）": [{"question": "某企业在招聘新员工时，要求应聘人员分别扮演顾客.销售员.销售经理等角色，并对应聘人员的表现进行", "options": [{"label": "A", "text": "倾向测验"}, {"label": "B", "text": "知识考试"}, {"label": "C", "text": "情景模拟考试"}, {"label": "D", "text": "人格测验"}], "answer": "C", "analysis": "安全生产是有一定规律的，偶然.突发往往寓于必然之中。要学习安全生产科学知识，科学把握安全\n生产规律，运用科学手段.工具去预防.发现.制止和处理安全生产问题。\n \n2.某企业在招聘新员工时，要求应聘人员分别扮演顾客.销售员.销售经理等角色，并对应聘人员的表现进行\n观察。这种测试方法是（）。\nA.倾向测验\nB.知识考试\nC.情景模拟考试\nD.人格测验"}, {"question": "工作分析是企业人力资源管理的一项核心基础职能，工作分析又称为（）。", "options": [{"label": "A", "text": "职务分析"}, {"label": "B", "text": "职位分析"}, {"label": "C", "text": "职务描述"}, {"label": "D", "text": "岗位描述"}], "answer": "C", "analysis": "情景模拟考试是指根据求职者可能进入的职位，编制一套与该职位实际工作类似的测试项目，将求\n职者安排在模拟的.逼真的工作环境中，要求求职者处理可能出现的各种问题，用多种方法来测评其心理素质\n.潜在能力的一系列方法。\n \n3.工作分析是企业人力资源管理的一项核心基础职能，工作分析又称为（）。\nA.职务分析\nB.职位分析\nC.职务描述\nD.岗位描述"}, {"question": "在企业发展过程中，能称之为企业生产的骨骼系统和肌肉系统的是企业的（）。", "options": [{"label": "A", "text": "人员素质"}, {"label": "B", "text": "技术装备素质"}, {"label": "C", "text": "管理素质"}, {"label": "D", "text": "文化素质"}], "answer": "B", "analysis": "工作分析就是指管理者了解企业内的一种职位信息和任职条件信息，并以一种格式把与这种职位有\n关的信息描述出来，从而使其他人能了解这种职位和人员需求的过程。从这个意义上讲，工作分析也可以称\n为职位分析.岗位分析。\n \n4.在企业发展过程中，能称之为企业生产的骨骼系统和肌肉系统的是企业的（）。\nA.人员素质\nB.技术装备素质\nC.管理素质\nD.文化素质"}, {"question": "某瓶装水生产企业进行市场调查，了解市场上销售的瓶装水的品牌.特征.质量和销售量信息。这种市场调", "options": [{"label": "A", "text": "市场需求"}, {"label": "B", "text": "顾客满意度"}, {"label": "C", "text": "消费者行为"}, {"label": "D", "text": "市场供给\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n1"}], "answer": "B", "analysis": "技术装备使人的双手获得解放，大大提高了劳动生产效率，是企业生产的骨骼系统和肌肉系统。\n \n5.某瓶装水生产企业进行市场调查，了解市场上销售的瓶装水的品牌.特征.质量和销售量信息。这种市场调\n查属于对（）的调查。\nA.市场需求\nB.顾客满意度\nC.消费者行为\nD.市场供给\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n1"}, {"question": "某设备的原始价值为8000元，每年低劣化增加值为600元，更新时残值为3000元，则其最佳更新年限为", "options": [{"label": "A", "text": "2"}, {"label": "B", "text": "3"}, {"label": "C", "text": "4"}, {"label": "D", "text": "5"}], "answer": "D", "analysis": "市场调查是市场营销活动的起点，涵盖市场营销管理活动涉及的方方面面。其中，市场供给调查主\n要包括产品生产能力调查.产品实体调查等。具体为市场能够提供的某一产品的数量.质量.功能.型号.品牌等\n，以及生产供应企业的情况等。\n \n6.某设备的原始价值为8000元，每年低劣化增加值为600元，更新时残值为3000元，则其最佳更新年限为\n（）年。\nA.2\nB.3\nC.4\nD.5"}, {"question": "下列现代企业部门划分的类型中，有利于充分发挥专用设备效益.人员技能和专业知识的是（）组织结构。", "options": [{"label": "A", "text": "职能部门化"}, {"label": "B", "text": "产品部门化"}, {"label": "C", "text": "区域部门化"}, {"label": "D", "text": "过程部门化"}], "answer": "C", "analysis": "7.下列现代企业部门划分的类型中，有利于充分发挥专用设备效益.人员技能和专业知识的是（）组织结构。\nA.职能部门化\nB.产品部门化\nC.区域部门化\nD.过程部门化"}, {"question": "工序劳动量不大.质量较轻的零件，宜采用（）。", "options": [{"label": "A", "text": "顺序移动方式"}, {"label": "B", "text": "平行移动方式"}, {"label": "C", "text": "平行顺序移动方式"}, {"label": "D", "text": "混序移动方式"}], "answer": "B", "analysis": "按产品划分部门有利于发挥专用设备效益，充分发挥人员的技能和专业知识，同时有利于部门内的\n协调，以及产品的增长和发展。其主要缺点是要求更多的人具有全面管理的能力，同时增加了主管部门控制\n.协调的难度。\n \n8.工序劳动量不大.质量较轻的零件，宜采用（）。\nA.顺序移动方式\nB.平行移动方式\nC.平行顺序移动方式\nD.混序移动方式"}, {"question": "某啤酒生产企业在大型超市进行市场调查，了解家庭购买啤酒的品牌.购买量和购买者的信息，该企业市场", "options": [{"label": "A", "text": "市场需求"}, {"label": "B", "text": "市场环境"}, {"label": "C", "text": "市场营销因素"}, {"label": "D", "text": "消费者行为"}], "answer": "A", "analysis": "工序劳动量不大.质量较轻的零件，宜采用顺序移动方式；工序劳动量大，质量很重的零件，宜采用\n平行移动方式或平行顺序移动方式。\n \n9.某啤酒生产企业在大型超市进行市场调查，了解家庭购买啤酒的品牌.购买量和购买者的信息，该企业市场\n调查的内容属于对（）的调查。\nA.市场需求\nB.市场环境\nC.市场营销因素\nD.消费者行为"}, {"question": "（）是企业科学化管理的实施。", "options": [{"label": "A", "text": "内层技术改造"}, {"label": "B", "text": "表层技术改造"}, {"label": "C", "text": "外层技术改造"}, {"label": "D", "text": "深层技术改造"}], "answer": "D", "analysis": "消费者行为调查主要是对消费者的购买行为进行调查和分析。主要调查消费者的消费决策.购买什么\n.购买多少.何时购买.由谁购买.如何购买.信息渠道来自何处等方面。\n \n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n2\n10.（）是企业科学化管理的实施。\nA.内层技术改造\nB.表层技术改造\nC.外层技术改造\nD.深层技术改造"}, {"question": "下列关于集权或分权程度的说法，正确的是（）。", "options": [{"label": "A", "text": "组织中较低管理层次制定决策的频度或数目越大，分权程度越高"}, {"label": "B", "text": "组织中较低管理层次制定决策的频度或数目越大，分权程度越低"}, {"label": "C", "text": "组织中高层管理层次制定决策的频度或数目越大，分权程度越高"}, {"label": "D", "text": "组织中高层管理层次制定决策的频度或数目越大，集权程度越低"}], "answer": "D", "analysis": "深层技术改造主要表现为企业科学化管理的实施。\n \n11.下列关于集权或分权程度的说法，正确的是（）。\nA.组织中较低管理层次制定决策的频度或数目越大，分权程度越高\nB.组织中较低管理层次制定决策的频度或数目越大，分权程度越低\nC.组织中高层管理层次制定决策的频度或数目越大，分权程度越高\nD.组织中高层管理层次制定决策的频度或数目越大，集权程度越低"}, {"question": "根据新制度经济学派的观点，企业作为在某种状态下替代市场的一种资源配置方式，其形成的主要原因是", "options": [{"label": "A", "text": "推动市场竞争"}, {"label": "B", "text": "发挥规模效益"}, {"label": "C", "text": "利于社会监督"}, {"label": "D", "text": "节约交易费用"}], "answer": "A", "analysis": "组织中较低管理层次制定决策的频度或数目越大，分权程度越高；反之，上层决策的数目越多，其\n集权程度越高。\n \n12.根据新制度经济学派的观点，企业作为在某种状态下替代市场的一种资源配置方式，其形成的主要原因是\n（）。\nA.推动市场竞争\nB.发挥规模效益\nC.利于社会监督\nD.节约交易费用"}, {"question": "技术可行性分析的核心是（）。", "options": [{"label": "A", "text": "企业技术改造方式的选择"}, {"label": "B", "text": "企业技术改造成本的估计"}, {"label": "C", "text": "企业技术改造的技术等级的选择问题"}, {"label": "D", "text": "企业技术改造目的的分析"}], "answer": "D", "analysis": "企业作为商品经济发展到一定阶段的产物，是因为企业作为在某种状态下替代市场的一种交易费用\n较低的资源配置方式。因此，企业形成的主要原因是节约交易费用。\n \n13.技术可行性分析的核心是（）。\nA.企业技术改造方式的选择\nB.企业技术改造成本的估计\nC.企业技术改造的技术等级的选择问题\nD.企业技术改造目的的分析"}, {"question": "下列产品的生产中，属于连续型生产的是（）。", "options": [{"label": "A", "text": "汽车"}, {"label": "B", "text": "农药药剂"}, {"label": "C", "text": "计算机"}, {"label": "D", "text": "机床"}], "answer": "C", "analysis": "企业技术可行性分析的核心是企业技术改造的技术等级的选择问题。\n \n14.下列产品的生产中，属于连续型生产的是（）。\nA.汽车\nB.农药药剂\nC.计算机\nD.机床"}, {"question": "某企业生产运营部经理突然辞职，该企业总经理办公会迅速决定将物资管理部经理调任生产运营部经理。", "options": [{"label": "A", "text": "晋升"}, {"label": "B", "text": "职位转换"}, {"label": "C", "text": "兼职"}, {"label": "D", "text": "工作扩大"}], "answer": "B", "analysis": "企业生产类型按连续程度可划分为连续型生产和离散型生产。连续型生产是指连续的产品生产，其\n工艺流程往往表现为用化学的而不是物理的或机械的方法。如化肥.药品等的生产。离散型生产是单个项目的\n生产，输入生产过程的各种要素是间断性投入的。生产设备和运输装置必须适合多种产品加工的需要。工序\n之间要求有一定的在制品储存，如机床.汽车等的生产。\n \n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3\n15.某企业生产运营部经理突然辞职，该企业总经理办公会迅速决定将物资管理部经理调任生产运营部经理。\n该企业采用的招聘形式是（）。\nA.晋升\nB.职位转换\nC.兼职\nD.工作扩大"}, {"question": "生产过程的空间组织中，关于厂址选择的主要因素，下列说法错误的是（）。", "options": [{"label": "A", "text": "国家的有关方针.政策，国民经济发展的整体需要.布局和规划"}, {"label": "B", "text": "接近客户，交通便利，通信方便"}, {"label": "C", "text": "资源的充分获取和利用"}, {"label": "D", "text": "投产后的经济效益"}], "answer": "B", "analysis": "职位转换是指企业中比较重要的职位出现空缺时，从与该职位同级别但相对较次要职位的人员中挑\n选适宜人员填补空缺职位的一种方法。\n \n16.生产过程的空间组织中，关于厂址选择的主要因素，下列说法错误的是（）。\nA.国家的有关方针.政策，国民经济发展的整体需要.布局和规划\nB.接近客户，交通便利，通信方便\nC.资源的充分获取和利用\nD.投产后的经济效益"}, {"question": "企业变革的基本原因在于（）。", "options": [{"label": "A", "text": "科学技术的更新"}, {"label": "B", "text": "经济的发展"}, {"label": "C", "text": "社会的变化"}, {"label": "D", "text": "企业组织本身发展过程中的矛盾冲突"}], "answer": "D", "analysis": "厂址选择就是确定工厂坐落的区域和具体位置，影响厂址选择的因素是多方面的，其主要因素归纳\n为：国家的有关方针.政策，国民经济发展的整体需要.布局和规划；接近客户，交通便利，通信方便；资源\n的充分获取和利用；气候.地质.水文等自然条件和环境保护以及长远发展的余地。\n \n17.企业变革的基本原因在于（）。\nA.科学技术的更新\nB.经济的发展\nC.社会的变化\nD.企业组织本身发展过程中的矛盾冲突"}, {"question": "《中华人民共和国安全生产法》规定，对生产经营单位的安全生产负全面责任的是本单位的（）。", "options": [{"label": "A", "text": "党委"}, {"label": "B", "text": "监事会"}, {"label": "C", "text": "董事会"}, {"label": "D", "text": "主要负责人"}], "answer": "D", "analysis": "企业变革的基本原因在于本身发展过程中的矛盾冲突。企业作为一个系统。既要面对内部的若干子\n系统，又要面对外部环境。企业一方面要集合人的力量形成有机的整体，以便更好地实现组织目标；另一方\n面要适应环境，谋求自身的发展。这种特殊的要求决定了企业不可避免地处在各种矛盾的焦点上。\n \n18.《中华人民共和国安全生产法》规定，对生产经营单位的安全生产负全面责任的是本单位的（）。\nA.党委\nB.监事会\nC.董事会\nD.主要负责人"}, {"question": "用人单位与劳动者约定合同终止时间的劳动合同称为（）。", "options": [{"label": "A", "text": "固定期限劳动合同"}, {"label": "B", "text": "无固定期限劳动合同"}, {"label": "C", "text": "不定期劳动合同"}, {"label": "D", "text": "非全日制劳动合同"}], "answer": "D", "analysis": "《中华人民共和国安全生产法》对生产经营单位的安全生产责任进行了明确规定，生产经营单位的\n主要负责人对本单位的安全生产工作全面负责，其从业人员有依法获得安全生产保障的权利，并应当依法履\n行安全生产方面的义务，工会依法对安全生产工作进行监督。\n \n19.用人单位与劳动者约定合同终止时间的劳动合同称为（）。\nA.固定期限劳动合同\nB.无固定期限劳动合同\nC.不定期劳动合同\nD.非全日制劳动合同"}, {"question": "（）是为取得尽可能大的竞争优势，以其优势产品或品牌为依托，通过信息网络和快速物流系统，将供应", "options": [{"label": "A", "text": "战略联盟"}, {"label": "B", "text": "电子商务"}, {"label": "C", "text": "学习型组织模式"}, {"label": "D", "text": "虚拟企业"}], "answer": "A", "analysis": "《中华人民共和国劳动合同法》第13条规定：固定期限劳动合同，是指用人单位与劳动者约定合同\n终止时间的劳动合同。用人单位与劳动者协商一致，可以订立固定期限劳动合同。\n \n20.（）是为取得尽可能大的竞争优势，以其优势产品或品牌为依托，通过信息网络和快速物流系统，将供应\n商.经销商.顾客以及若干规模不同.拥有各自专长的小型企业或车间连接起来，共同开发.生产.销售多样化产\n品的开放式企业组织模式。\nA.战略联盟\nB.电子商务\nC.学习型组织模式\nD.虚拟企业"}, {"question": "企业组织设计的根本目的是（）。", "options": [{"label": "A", "text": "满足企业客户的需求"}, {"label": "B", "text": "保证企业员工数量的增加"}, {"label": "C", "text": "保证企业总经理目标的实现"}, {"label": "D", "text": "保证企业目标的实现"}], "answer": "D", "analysis": "虚拟企业是指在资源有限的条件下，为适应快速.多变的市场需求。取得尽可能大的竞争优势，以其\n优势产品或品牌为依托，通过信息网络和快速物流系统，将供应商.经销商.顾客以及若干规模不同.拥有各自\n专长的小型企业或车间连接起来，共同开发.生产.销售多样化产品的开放式企业组织模式。\n \n21.企业组织设计的根本目的是（）。\nA.满足企业客户的需求\nB.保证企业员工数量的增加\nC.保证企业总经理目标的实现\nD.保证企业目标的实现"}, {"question": "企业技术改造项目进行技术可行性分析时。按照技术的先进程度一般可以将技术划分为（）个等级。", "options": [{"label": "A", "text": "三"}, {"label": "B", "text": "四"}, {"label": "C", "text": "五"}, {"label": "D", "text": "六"}], "answer": "D", "analysis": "企业组织设计的根本目的是保证企业目标的实现，使企业活动的每一项内容都能落实到具体的岗位\n和部门。\n \n22.企业技术改造项目进行技术可行性分析时。按照技术的先进程度一般可以将技术划分为（）个等级。\nA.三\nB.四\nC.五\nD.六"}, {"question": "在一定生产技术组织条件下，单台设备单位时间的产量标准称为（）。", "options": [{"label": "A", "text": "设备设计定额"}, {"label": "B", "text": "设备利用定额"}, {"label": "C", "text": "设备维修定额"}, {"label": "D", "text": "设备寿命定额"}], "answer": "C", "analysis": "技术可行性分析的核心是企业技术改造的技术等级的选择问题。按照技术的先进程度一般可将技术\n划分为尖端.先进.中间.初级.原始五个等级。\n \n23.在一定生产技术组织条件下，单台设备单位时间的产量标准称为（）。\nA.设备设计定额\nB.设备利用定额\nC.设备维修定额\nD.设备寿命定额"}, {"question": "在企业组织中，管理层次与管理幅度成（）关系。", "options": [{"label": "A", "text": "正比"}, {"label": "B", "text": "反比"}, {"label": "C", "text": "对等\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5"}, {"label": "D", "text": "无"}], "answer": "B", "analysis": "设备定额可分为设备利用定额和设备维修定额。前者是指在一定的生产技术组织条件下，单台设备\n在单位时间的产量标准；后者是指为了编制设备修理计划而制定的有关标准。\n \n24.在企业组织中，管理层次与管理幅度成（）关系。\nA.正比\nB.反比\nC.对等\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5\nD.无"}, {"question": "企业生产的各工序都按照后续工序需要的时间和地点组织生产，这遵循了生产过程组织的（）。", "options": [{"label": "A", "text": "比例性原则"}, {"label": "B", "text": "柔性原则"}, {"label": "C", "text": "垂直性原则"}, {"label": "D", "text": "准时性原则"}], "answer": "B", "analysis": "对于一个特定的组织，其管理幅度越大，则需要设置的管理层次越少；管理幅度越小，则所需要设\n置的管理层次越多，两者成反比关系。\n \n25.企业生产的各工序都按照后续工序需要的时间和地点组织生产，这遵循了生产过程组织的（）。\nA.比例性原则\nB.柔性原则\nC.垂直性原则\nD.准时性原则"}, {"question": "下列关于质量管理的说法，错误的是（）。", "options": [{"label": "A", "text": "质量管理是指从质量方面指挥和控制组织的协调活动"}, {"label": "B", "text": "质量管理的环节包括制定质量方针和质量目标.质量策划.质量控制.质量保证和质量改进"}, {"label": "C", "text": "围绕产品质量形成的全过程实施质量管理是组织各项工作的主线"}, {"label": "D", "text": "质量管理仅涉及组织的生产活动"}], "answer": "D", "analysis": "生产过程的准时性是指生产的各阶段.各工序都按后续阶段和工序的需要生产。即在需要的时间和地\n点，生产所需要数量和质量的零部件；在客户需要的时间和地点，生产所需要数量和质量的产品和服务。\n \n26.下列关于质量管理的说法，错误的是（）。\nA.质量管理是指从质量方面指挥和控制组织的协调活动\nB.质量管理的环节包括制定质量方针和质量目标.质量策划.质量控制.质量保证和质量改进\nC.围绕产品质量形成的全过程实施质量管理是组织各项工作的主线\nD.质量管理仅涉及组织的生产活动"}, {"question": "某城市共有300家家政服务公司，其中大型公司20家，中型公司50家，小型公司230家。当抽取180家进行", "options": [{"label": "A", "text": "30"}, {"label": "B", "text": "50"}, {"label": "C", "text": "70"}, {"label": "D", "text": "12"}], "answer": "D", "analysis": "质量管理涉及组织的各个方面，是否有效地实施质量管理关系到组织的兴衰。\n \n27.某城市共有300家家政服务公司，其中大型公司20家，中型公司50家，小型公司230家。当抽取180家进行\n市场调查时，若采用分层比例抽样法，应抽取大型公司（）家。\nA.30\nB.50\nC.70\nD.12"}, {"question": "企业生产过程空间组织最常见的形式是（）。", "options": [{"label": "A", "text": "工艺专业化布置"}, {"label": "B", "text": "对象专业化布置"}, {"label": "C", "text": "混合式布置"}, {"label": "D", "text": "固定布置"}], "answer": "D", "analysis": "分层抽样是在抽样前先按某一种特征对市场调查总体进行分类或分组。然后按随机的原则从各组中\n抽取样本，最终组成调查总体的样本。题中大型公司应抽取：20÷300×180=12（家）。\n \n28.企业生产过程空间组织最常见的形式是（）。\nA.工艺专业化布置\nB.对象专业化布置\nC.混合式布置\nD.固定布置"}, {"question": "某公司拟实施某项技术改造项目，预计需要新投资5000万元，拆除旧厂房设备将损失300万元，若这些厂", "options": [{"label": "A", "text": "4660"}, {"label": "B", "text": "4760\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n6"}, {"label": "C", "text": "5260"}, {"label": "D", "text": "5340"}], "answer": "C", "analysis": "混合式布置是指综合利用工艺专业化原则和对象专业化原则建立生产单位的原则。这种布置实际上\n是最常见的，它吸取了工艺专业化布置和对象专业化布置的长处，这种布置形成的生产单位，既对产品品种\n变化有一定适应能力，又能缩短物流路程，达到提高效率.降低成本.缩短生产周期的目的。\n \n29.某公司拟实施某项技术改造项目，预计需要新投资5000万元，拆除旧厂房设备将损失300万元，若这些厂\n房设备的残值为40万元，则该项目的总投资为（）万元。\nA.4660\nB.4760\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n6\nC.5260\nD.5340"}, {"question": "流水生产线按照流水线的节奏性来衡量，有强制节拍流水线.自由节拍流水线和（）。", "options": [{"label": "A", "text": "精细节拍流水线"}, {"label": "B", "text": "粗略节拍流水线"}, {"label": "C", "text": "快速节拍流水线"}, {"label": "D", "text": "慢速节拍流水线"}], "answer": "C", "analysis": "30.流水生产线按照流水线的节奏性来衡量，有强制节拍流水线.自由节拍流水线和（）。\nA.精细节拍流水线\nB.粗略节拍流水线\nC.快速节拍流水线\nD.慢速节拍流水线"}, {"question": "企业在招聘员工时，要对所有应聘者一视同仁，为应聘者营造一个平等竞争的择业环境，这体现了员工招", "options": [{"label": "A", "text": "信息公开"}, {"label": "B", "text": "公正平等"}, {"label": "C", "text": "效率优先"}, {"label": "D", "text": "双向选择"}], "answer": "B", "analysis": "按流水线的节奏性来衡量，流水生产线有强制节拍流水线.自由节拍流水线和粗略节拍流水线之分。\n \n31.企业在招聘员工时，要对所有应聘者一视同仁，为应聘者营造一个平等竞争的择业环境，这体现了员工招\n聘的（）原则。\nA.信息公开\nB.公正平等\nC.效率优先\nD.双向选择"}, {"question": "黑带属于六西格玛团队中的（）。", "options": [{"label": "A", "text": "领导层"}, {"label": "B", "text": "骨干层"}, {"label": "C", "text": "执行层"}, {"label": "D", "text": "松散层"}], "answer": "B", "analysis": "企业在进行员工招聘工作时应遵循以下原则：①信息公开原则是指企业在招聘员工时应将招聘的相\n关信息事先向社会公开。②公正平等原则是指企业要对所有应聘者一视同仁，使求职者能公平地参与竞争。\n③效率优先原则是指企业应根据不同的招聘要求灵活选择适当的招聘形式，用尽可能低的招聘成本吸引高素\n质的员工。④双向选择原则是指企业在招聘员工时，要充分尊重求职者的选择权，以与求职者平等的姿态对\n待求职者。\n \n32.黑带属于六西格玛团队中的（）。\nA.领导层\nB.骨干层\nC.执行层\nD.松散层"}, {"question": "（）又叫生产区域管理制。", "options": [{"label": "A", "text": "直线职能制"}, {"label": "B", "text": "矩阵制"}, {"label": "C", "text": "事业部制"}, {"label": "D", "text": "企业集团结构"}], "answer": "B", "analysis": "六西格玛团队由三个层次组成，以执行领导.倡导者为领导层；以黑带大师.黑带为骨干层；以绿带\n.白带为具体执行层。\n \n33.（）又叫生产区域管理制。\nA.直线职能制\nB.矩阵制\nC.事业部制\nD.企业集团结构"}, {"question": "市场试销关注试用率.再购率和（）。", "options": [{"label": "A", "text": "购买频率"}, {"label": "B", "text": "次品率"}, {"label": "C", "text": "合格率"}, {"label": "D", "text": "市场占有率"}], "answer": "A", "analysis": "直线职能制又叫生产区域管理制。\n \n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n7\n34.市场试销关注试用率.再购率和（）。\nA.购买频率\nB.次品率\nC.合格率\nD.市场占有率"}, {"question": "在产品质量管理中，对产品质量的监督管理和执法监督检查采用地域管辖的原则，这体现了产品质量立法", "options": [{"label": "A", "text": "有限范围"}, {"label": "B", "text": "统一立法.区别管理"}, {"label": "C", "text": "实行行政区域统一管理.组织协调的属地化"}, {"label": "D", "text": "奖优罚劣"}], "answer": "A", "analysis": "在市场试销过程中，要掌握试用率.再购率和购买频率3个数据。\n \n35.在产品质量管理中，对产品质量的监督管理和执法监督检查采用地域管辖的原则，这体现了产品质量立法\n的（）原则。\nA.有限范围\nB.统一立法.区别管理\nC.实行行政区域统一管理.组织协调的属地化\nD.奖优罚劣"}, {"question": "许多产品有季节性的市场需求，如服装.空调和冷饮等。对于这类产品市场需求的预测，适宜采用（）。", "options": [{"label": "A", "text": "季节指数法"}, {"label": "B", "text": "回归分析法"}, {"label": "C", "text": "简单移动平均法"}, {"label": "D", "text": "对比类推法"}], "answer": "C", "analysis": "产品质量立法的基本原则包括：①有限范围原则；②统一立法.区别管理原则；③实行行政区域统一\n管理.组织协调的属地化原则；④奖优罚劣原则。其中，实行行政区域统一管理.组织协调的属地化原则是指\n对产品质量的监督管理和执法监督检查，采用地域管辖的原则。\n \n36.许多产品有季节性的市场需求，如服装.空调和冷饮等。对于这类产品市场需求的预测，适宜采用（）。\nA.季节指数法\nB.回归分析法\nC.简单移动平均法\nD.对比类推法"}, {"question": "合作开发新产品的优势主要是（）。", "options": [{"label": "A", "text": "花钱少，见效快"}, {"label": "B", "text": "发挥各自优势，取长补短"}, {"label": "C", "text": "有利于产品更新换代，增强企业竞争能力"}, {"label": "D", "text": "较快掌握新产品制造技术，缩短开发周期"}], "answer": "A", "analysis": "季节指数法是根据预测目标各个日历年度按季（月）编制的时间数列资料，以统计方法测定出反映\n季节变动规律性的季节指数，并利用季节指数进行近期预测的一种预测方法，该方法适用于那些市场需求有\n季节性的产品。\n \n37.合作开发新产品的优势主要是（）。\nA.花钱少，见效快\nB.发挥各自优势，取长补短\nC.有利于产品更新换代，增强企业竞争能力\nD.较快掌握新产品制造技术，缩短开发周期"}, {"question": "在新产品开发中，选择进取战略的企业通常将新产品开发的竞争域限定在（）方面。", "options": [{"label": "A", "text": "产品的市场占有率"}, {"label": "B", "text": "产品的成本"}, {"label": "C", "text": "产品的最终用途和技术"}, {"label": "D", "text": "产品的质量和档次"}], "answer": "B", "analysis": "选项A是结合开发的优势，选项C是自行研制的优势，选项D是引进开发的优势。\n \n38.在新产品开发中，选择进取战略的企业通常将新产品开发的竞争域限定在（）方面。\nA.产品的市场占有率\nB.产品的成本\nC.产品的最终用途和技术\nD.产品的质量和档次"}, {"question": "企业管理的首要职能是（）。", "options": [{"label": "A", "text": "激励职能"}, {"label": "B", "text": "协调职能"}, {"label": "C", "text": "组织职能"}, {"label": "D", "text": "计划职能"}], "answer": "C", "analysis": "进取战略的基本特征包括：①新产品开发的竞争域确定在产品的最终用途和技术两个方面；②新产\n品开发的目标确定为迅速扩大企业规模和提高市场占有率；③新产品创意构思多来源于市场营销或研究与开\n发的成果，或二者的结合；④新产品创新的程度能达到首创水平，至少部分首创；⑤在新产品投放市场时机\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8\n的选择上，多数确定为率先投入；⑥新产品开发的方式一般为自行研制开发或合作开发。\n \n39.企业管理的首要职能是（）。\nA.激励职能\nB.协调职能\nC.组织职能\nD.计划职能"}, {"question": "从公司角度看，公司使用现金支付本公司工人工资158万元，这属于由（）活动引起的资金流出。", "options": [{"label": "A", "text": "筹资"}, {"label": "B", "text": "投资"}, {"label": "C", "text": "运营"}, {"label": "D", "text": "融资"}], "answer": "D", "analysis": "计划正确与否对企业的成败具有决定作用。从这个意义上说，计划是企业管理的首要职能。\n \n40.从公司角度看，公司使用现金支付本公司工人工资158万元，这属于由（）活动引起的资金流出。\nA.筹资\nB.投资\nC.运营\nD.融资"}, {"question": "计量技术是指从计量标准的建立到量值的传递及生产过程中的实际测量，计量工作包括计量技术和（）两", "options": [{"label": "A", "text": "计量工具"}, {"label": "B", "text": "计量水平"}, {"label": "C", "text": "计量目的"}, {"label": "D", "text": "计量管理"}], "answer": "C", "analysis": "资金运营活动是指企业的日常生产经营活动发生的各种各样资金收支，包括企业采购材料.支付工资\n和其他营业费用等。\n \n41.计量技术是指从计量标准的建立到量值的传递及生产过程中的实际测量，计量工作包括计量技术和（）两\n个方面。\nA.计量工具\nB.计量水平\nC.计量目的\nD.计量管理"}, {"question": "管理层次与管理幅度的（）决定了组织的基本形态结构。", "options": [{"label": "A", "text": "正比关系"}, {"label": "B", "text": "反比关系"}, {"label": "C", "text": "非线性关系"}, {"label": "D", "text": "互相决定关系"}], "answer": "D", "analysis": "计量技术是指从计量标准的建立到量值的传递及生产过程中的实际测量，计量工作包括计量技术和\n计量管理两个方面。\n \n42.管理层次与管理幅度的（）决定了组织的基本形态结构。\nA.正比关系\nB.反比关系\nC.非线性关系\nD.互相决定关系"}, {"question": "“5S”管理中清扫的要求是（）。", "options": [{"label": "A", "text": "对现场和设备认真维护，保持完美和最佳状态"}, {"label": "B", "text": "把工作场所打扫干净，设备异常时马上修理，使之恢复正常"}, {"label": "C", "text": "把要与不要的人.事.物分开"}, {"label": "D", "text": "要求员工养成良好的工作习惯，遵守纪律"}], "answer": "B", "analysis": "管理层次与管理幅度成反比，这决定了两种基本的组织结构形态，即扁平结构形态和锥形结构形态\n。\n \n43.“5S”管理中清扫的要求是（）。\nA.对现场和设备认真维护，保持完美和最佳状态\nB.把工作场所打扫干净，设备异常时马上修理，使之恢复正常\nC.把要与不要的人.事.物分开\nD.要求员工养成良好的工作习惯，遵守纪律"}, {"question": "某空调生产企业在大型家电卖场调查产品广告促销活动的效果，该企业进行的市场调查属于（）。", "options": [{"label": "A", "text": "市场需求调查"}, {"label": "B", "text": "市场环境调查"}, {"label": "C", "text": "消费者行为调查"}, {"label": "D", "text": "市场营销因素调查"}], "answer": "B", "analysis": "清扫是把工作场所打扫干净，设备异常时马上修理，使之恢复正常。\n \n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n9\n44.某空调生产企业在大型家电卖场调查产品广告促销活动的效果，该企业进行的市场调查属于（）。\nA.市场需求调查\nB.市场环境调查\nC.消费者行为调查\nD.市场营销因素调查"}, {"question": "下列关于财务预算的说法，错误的是（）。", "options": [{"label": "A", "text": "财务预算是根据财务战略.财务计划和各种预测信息，确定预算期内各种预算指标的过程"}, {"label": "B", "text": "固定预算法又称连续预算法，是在上期预算完成情况的基础上，调整和编制下期预算，并将预算期间逐期\n连续向后推移，使预算期间保持一定的时期跨度"}, {"label": "C", "text": "弹性预算法又称动态预算法，是在成本形态分析的基础上，依据业务量.成本和利润之间的联动关系，按照\n预算期内可能的一系列业务量水平编制的系列预算方法"}, {"label": "D", "text": "按出发点的特征不同，编制预算的方法可分为增量预算法和零基预算法两大类"}], "answer": "D", "analysis": "市场营销因素调查主要包括产品.价格.渠道和促销的调查。产品调查主要包括了解市场上新产品开\n发和设计的情况.产品使用的情况.消费者对产品的评价.产品生命周期阶段.产品的组合情况等。价格调查主\n要包括了解消费者对价格的接受情况.对价格策略的反应等。渠道调查主要包括了解渠道的结构.中间商的情\n况.消费者对中间商的满意情况等。促销活动调查主要包括各种促销活动的效果，如广告实施的效果.人员推\n销的效果.营业推广的效果和对外宣传的市场反应等。\n \n45.下列关于财务预算的说法，错误的是（）。\nA.财务预算是根据财务战略.财务计划和各种预测信息，确定预算期内各种预算指标的过程\nB.固定预算法又称连续预算法，是在上期预算完成情况的基础上，调整和编制下期预算，并将预算期间逐期\n连续向后推移，使预算期间保持一定的时期跨度\nC.弹性预算法又称动态预算法，是在成本形态分析的基础上，依据业务量.成本和利润之间的联动关系，按照\n预算期内可能的一系列业务量水平编制的系列预算方法\nD.按出发点的特征不同，编制预算的方法可分为增量预算法和零基预算法两大类"}, {"question": "下列质量认证类型中，不以产品为检测对象的是（）。", "options": [{"label": "A", "text": "型式试验"}, {"label": "B", "text": "供方质量管理体系评定"}, {"label": "C", "text": "批量检验"}, {"label": "D", "text": "全数检验"}], "answer": "B", "analysis": "固定预算法又称静态预算法，是在编制预算时，只根据预算期内正常.可实现的某一固定的业务量水\n平作为唯一基础来编制预算的方法。选项B错误。\n \n46.下列质量认证类型中，不以产品为检测对象的是（）。\nA.型式试验\nB.供方质量管理体系评定\nC.批量检验\nD.全数检验"}, {"question": "企业为创立者所有。企业主本人行使监督.管理和控制的权力，企业缺乏长远规划，具有上述特点的企业", "options": [{"label": "A", "text": "精细阶段"}, {"label": "B", "text": "创业阶段"}, {"label": "C", "text": "规模化阶段"}, {"label": "D", "text": "集体化阶段"}], "answer": "B", "analysis":
