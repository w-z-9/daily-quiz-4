 "B", "text": "工艺能够同期化"}, {"label": "C", "text": "工艺柔性化"}, {"label": "D", "text": "产品结构变化大"}], "answer": "B", "analysis": "设备负荷系数=工序所需设备的计算数/工序安排的实际设备数=6/5=1.2\n17.【不定项选择题】企业采用流水线生产必须具备的条件是（ ）。\nA.产量足够小\nB.工艺能够同期化\nC.工艺柔性化\nD.产品结构变化大"}, {"question": "第五节 安全生产管理 单项选择题 1.下列安全生产的特点中，叙述错误的是（ ）。", "options": [{"label": "A", "text": "预防性"}, {"label": "B", "text": "短期性"}, {"label": "C", "text": "科学性"}, {"label": "D", "text": "群众性"}], "answer": "B", "analysis": ""}, {"question": "关于生产经营单位的法律责任，下列说法错误的是（ ）。", "options": [{"label": "A", "text": "发生一般事故的，处二十万以上五十万以下的罚款"}, {"label": "B", "text": "发生重大事故的，处一百万以上五百万以下的罚款"}, {"label": "C", "text": "发生较大事故的，处五十万以上一百万以下的罚款"}, {"label": "D", "text": "发生特别重大事故的，处一千万元以上两千万元以下的罚款"}], "answer": "D", "analysis": "安全生产的特点包括以下几点。①预防性。要把安全生产工作做在事故发生之前，居安思危，尽早\n发现苗头，及时处理，可以减少或消除损失。②长期性。只要生产工作进行，就有不安全因素产生，生产不\n停，安全生产工作必须常抓不懈。③科学性。安全生产是有一定规律的，偶然、突发往往寓于必然之中。要\n学习安全生产科学知识，科学把握安全生产规律，运用科学手段、工具去预防、发现、制止和处理安全生产\n问题。④群众性。安全生产涉及广大群众的利益，所以必须发动和依靠群众去做工作。\n2.关于生产经营单位的法律责任，下列说法错误的是（ ）。\nA.发生一般事故的，处二十万以上五十万以下的罚款\nB.发生重大事故的，处一百万以上五百万以下的罚款\nC.发生较大事故的，处五十万以上一百万以下的罚款\nD.发生特别重大事故的，处一千万元以上两千万元以下的罚款"}, {"question": "我国安全生产法规定，（ ）依法组织职工参加本单位安全生产工作的民主管理和民主监督，维护职工在 安全生产方面的合法权益。", "options": [{"label": "A", "text": "党委"}, {"label": "B", "text": "股东大会"}, {"label": "C", "text": "董事会"}, {"label": "D", "text": "工会"}], "answer": "D", "analysis": "本题考查生产经营单位的法律责任。发生生产安全事故，对负有责任的生产经营单位除要求其依法\n承担相应的赔偿等责任外，由安全生产监督管理部门依照下列规定处以罚款：（1）发生一般事故的，处二十\n万以上五十万以下的罚款；（2）发生较大事故的，处五十万以上一百万以下的罚款；（3）发生重大事故的\n，处一百万以上五百万以下的罚款；（4）发生特别重大事故的，处五百万元以上一千万元以下的罚款；情节\n特别严重的，处一千万元以上两千万元以下的罚款。\n3.我国安全生产法规定，（ ）依法组织职工参加本单位安全生产工作的民主管理和民主监督，维护职工在\n安全生产方面的合法权益。\nA.党委\nB.股东大会\nC.董事会\nD.工会"}, {"question": "根据《中华人民共和国安全生产法》，企业安全生产的基本方针不包括（ ）。", "options": [{"label": "A", "text": "安全第一"}, {"label": "B", "text": "预防为主"}, {"label": "C", "text": "综合治理"}, {"label": "D", "text": "以罚代管"}], "answer": "D", "analysis": "本题考查生产经营单位的安全生产职责。工会依法组织职工参加本单位安全生产工作的民主管理和\n民主监督，维护职工在安全生产方面的合法权益；生产经营单位制定或者修改有关安全生产的规章制度，应\n当听取工会的意见。\n4.根据《中华人民共和国安全生产法》，企业安全生产的基本方针不包括（ ）。\nA.安全第一\nB.预防为主\nC.综合治理\nD.以罚代管"}, {"question": "《中华人民共和国安全生产法》规定，对生产经营单位的安全生产负全面责任的是本单位的（ ）。", "options": [{"label": "A", "text": "党委"}, {"label": "B", "text": "监事会"}, {"label": "C", "text": "董事会"}, {"label": "D", "text": "主要负责人"}], "answer": "D", "analysis": "安全生产的基本方针是劳动过程中做好安全生产工作必须遵守的基本原则，《中华人民共和国安全\n生产法》规定，安全生产工作应当以人为本，坚持安全发展。安全生产的基本方针是“安全第一、预防为主\n、综合治理”。\n1\n5.《中华人民共和国安全生产法》规定，对生产经营单位的安全生产负全面责任的是本单位的（ ）。\nA.党委\nB.监事会\nC.董事会\nD.主要负责人"}, {"question": "我国安全生产的基本方针是（ ）。", "options": [{"label": "A", "text": "安全第一、安全生产、综合治理"}, {"label": "B", "text": "群众监督、安全第一、综合治理"}, {"label": "C", "text": "群众监督、安全生产、综合治理"}, {"label": "D", "text": "安全第一、预防为主、综合治理"}], "answer": "D", "analysis": "《中华人民共和国安全生产法》对生产经营单位的安全生产责任进行了明确规定，生产经营单位的\n主要负责人对本单位的安全生产工作全面负责，其从业人员有依法获得安全生产保障的权利，并应当依法履\n行安全生产方面的义务，工会依法对安全生产工作进行监督。\n6.我国安全生产的基本方针是（ ）。\nA.安全第一、安全生产、综合治理\nB.群众监督、安全第一、综合治理\nC.群众监督、安全生产、综合治理\nD.安全第一、预防为主、综合治理"}, {"question": "根据《中华人民共和国安全生产法》，生产经营单位的主要负责人应承担的安全生产职责有（ ）。", "options": [{"label": "A", "text": "建立、健全本单位安全生产责任制"}, {"label": "B", "text": "书写安全生产标语"}, {"label": "C", "text": "组织制定本单位安全生产规章制度和操作规程"}, {"label": "D", "text": "督促、检查本单位的安全生产工作"}], "answer": "ACDE", "analysis": "我国安全生产的基本方针是安全第一、预防为主、综合治理。\n多项选择题\n7.根据《中华人民共和国安全生产法》，生产经营单位的主要负责人应承担的安全生产职责有（ ）。\nA.建立、健全本单位安全生产责任制\nB.书写安全生产标语\nC.组织制定本单位安全生产规章制度和操作规程\nD.督促、检查本单位的安全生产工作\nE.及时、如实报告安全生产事故"}, {"question": "ACDE 【解析】《中华人民共和国安全生产法》对生产经营单位的安全生产责任进行了明确的规定。生产经营单位 的主要负责人对本单位的安全生产工作全面负责。《安全生产法》将其职责规定为下列内容：（1）建立、健 全本单位安全生产责任制。（2）组织制定本单位安全生产规章制度和操作规程。（3）组织制订并实施本单 位安全生产教育和培训计划。（4）保证本单位安全生产投入的有效实施。（5）督促、检查本单位的安全生 产工作，及时消除生产安全事故隐患。（6）组织制定并实施本单位的生产安全事故应急救援预案。（7）及 时、如实报告生产安全事故。 8.根据我国安全生产法的规定，生产经营单位的主要负责人应承担的安全生产职责有（ ）。", "options": [{"label": "A", "text": "建立、健全本单位安全生产责任制"}, {"label": "B", "text": "书写安全生产标语"}, {"label": "C", "text": "组织制定本单位安全生产规章制度和操作规程"}, {"label": "D", "text": "督促、检查本单位的安全生产工作"}], "answer": "ACDE", "analysis": "《中华人民共和国安全生产法》对生产经营单位的安全生产责任进行了明确的规定。生产经营单位\n的主要负责人对本单位的安全生产工作全面负责。《安全生产法》将其职责规定为下列内容：（1）建立、健\n全本单位安全生产责任制。（2）组织制定本单位安全生产规章制度和操作规程。（3）组织制订并实施本单\n位安全生产教育和培训计划。（4）保证本单位安全生产投入的有效实施。（5）督促、检查本单位的安全生\n产工作，及时消除生产安全事故隐患。（6）组织制定并实施本单位的生产安全事故应急救援预案。（7）及\n时、如实报告生产安全事故。\n8.根据我国安全生产法的规定，生产经营单位的主要负责人应承担的安全生产职责有（ ）。\nA.建立、健全本单位安全生产责任制\nB.书写安全生产标语\nC.组织制定本单位安全生产规章制度和操作规程\nD.督促、检查本单位的安全生产工作\nE.及时、如实报告安全生产事故"}, {"question": "第六节 清洁生产与\"5S\"管理 单项选择题 1.“5S”管理中清扫的要求是（ ）。", "options": [{"label": "A", "text": "对现场和设备认真维护，保持完美和最佳状态"}, {"label": "B", "text": "把工作场所打扫干净，设备异常时马上修理，使之恢复正常"}, {"label": "C", "text": "把要与不要的人、事、物分开"}, {"label": "D", "text": "要求员工养成良好的工作习惯.遵守纪律"}], "answer": "B", "analysis": ""}, {"question": "许多企业在“5S”管理基础上增加了（ ）和节约两个活动，构成了“7S”管理。", "options": [{"label": "A", "text": "整理"}, {"label": "B", "text": "整顿"}, {"label": "C", "text": "清洁"}, {"label": "D", "text": "安全"}], "answer": "D", "analysis": "清扫是把工作场所打扫干净，设备异常时马上修理，使之恢复正常。\n2.许多企业在“5S”管理基础上增加了（ ）和节约两个活动，构成了“7S”管理。\nA.整理\nB.整顿\nC.清洁\nD.安全"}, {"question": "对生产现场需要留下的物品进行科学合理的布置和摆放，以便在最快速的情况下取得所要之物，这种活动 属于“5S”活动中（ ）的内容。", "options": [{"label": "A", "text": "整理"}, {"label": "B", "text": "整顿"}, {"label": "C", "text": "清洁"}, {"label": "D", "text": "素养"}], "answer": "B", "analysis": "现在许多企业在“5S”管理基础上增加了安全和节约两个活动，构成了“7S”管理。\n3.对生产现场需要留下的物品进行科学合理的布置和摆放，以便在最快速的情况下取得所要之物，这种活动\n属于“5S”活动中（ ）的内容。\nA.整理\nB.整顿\nC.清洁\nD.素养"}, {"question": "（ ）是开始改善生产现场的第一步。", "options": [{"label": "A", "text": "清洁"}, {"label": "B", "text": "清扫"}, {"label": "C", "text": "整理"}, {"label": "D", "text": "素养"}], "answer": "C", "analysis": "整顿就是把需要的人、事、物加以定量、定位。通过整理后，对生产现场需要留下的物品进行科学\n合理的布置和摆放，以便在最快速的情况下取得所要之物，在有效的规章制度和流程下完成事务。\n4.（ ）是开始改善生产现场的第一步。\nA.清洁\nB.清扫\nC.整理\nD.素养"}, {"question": "“5S”管理中清洁的要求是（ ）。", "options": [{"label": "A", "text": "对现场和设备认真维护，保持完美和最佳状态"}, {"label": "B", "text": "把工作场所打扫干净，设备异常马上修理，使之恢复正常"}, {"label": "C", "text": "把要与不要的人、事、物分开"}, {"label": "D", "text": "要求员工养成良好的工作习惯，遵守纪律"}], "answer": "A", "analysis": "整理是开始改善生产现场的第一步。\n5.“5S”管理中清洁的要求是（ ）。\nA.对现场和设备认真维护，保持完美和最佳状态\nB.把工作场所打扫干净，设备异常马上修理，使之恢复正常\nC.把要与不要的人、事、物分开\nD.要求员工养成良好的工作习惯，遵守纪律"}, {"question": "对现场和设备认真维护，使其保持完美和最佳状态，这种活动属于“5S”活动的（ ）内容。", "options": [{"label": "A", "text": "整理"}, {"label": "B", "text": "整顿"}, {"label": "C", "text": "清洁"}, {"label": "D", "text": "素养"}], "answer": "C", "analysis": "清洁是对现场和设备认真维护，保持完美和最佳状态。\n6.对现场和设备认真维护，使其保持完美和最佳状态，这种活动属于“5S”活动的（ ）内容。\n1\nA.整理\nB.整顿\nC.清洁\nD.素养"}, {"question": "“5S”管理活动内容包括（ ）。", "options": [{"label": "A", "text": "整理"}, {"label": "B", "text": "优化"}, {"label": "C", "text": "清洁"}, {"label": "D", "text": "反省"}], "answer": "ACE", "analysis": "清洁是指对现场和设备认真维护，保持完美和最佳状态。清洁是对前三项活动的坚持与深入，从而\n消除发生安全事故的根源，营造良好的工作环境，使员工能愉快地工作。\n多项选择题\n7.“5S”管理活动内容包括（ ）。\nA.整理\nB.优化\nC.清洁\nD.反省\nE.素养"}, {"question": "ACE 【解析】\"55\"是整理（Seiri）、整顿（Seiton）、清扫（Seiso）、清洁（Seiketsu）和素养 （Shitsuke）这5个词的缩写，因为这5个词在日语中罗马拼音的第一个字母都是\"S\"，所以简称为“5S”。 8.下列属于“5S”现场生产管理内容的有（ ）。", "options": [{"label": "A", "text": "整理"}, {"label": "B", "text": "整顿"}, {"label": "C", "text": "清洁"}, {"label": "D", "text": "反省"}], "answer": "ABCE", "analysis": "\"55\"是整理（Seiri）、整顿（Seiton）、清扫（Seiso）、清洁（Seiketsu）和素养\n（Shitsuke）这5个词的缩写，因为这5个词在日语中罗马拼音的第一个字母都是\"S\"，所以简称为“5S”。\n8.下列属于“5S”现场生产管理内容的有（ ）。\nA.整理\nB.整顿\nC.清洁\nD.反省\nE.素养"}, {"question": "第四节 生产过程组织的具体形式 单项选择题 1.若采用自动线方式进行生产，则依据（ ）将生产设备排列在自动线上。", "options": [{"label": "A", "text": "工艺顺序"}, {"label": "B", "text": "生产量"}, {"label": "C", "text": "生产定额"}, {"label": "D", "text": "产品精度"}], "answer": "A", "analysis": ""}, {"question": "自动线的形成按设备的排列方式可分为顺序排列的自动线、平行排列的自动线和（ ）。", "options": [{"label": "A", "text": "固定排列的自动线"}, {"label": "B", "text": "随机排列的自动线"}, {"label": "C", "text": "顺序平行混合排列的自动线"}, {"label": "D", "text": "悬挂运输的自动线"}], "answer": "C", "analysis": "自动线是将按工艺顺序排列的若干台自动设备，用一套自动控制装配和自动传送装置联系起来的自\n动作业线。\n2.自动线的形成按设备的排列方式可分为顺序排列的自动线、平行排列的自动线和（ ）。\nA.固定排列的自动线\nB.随机排列的自动线\nC.顺序平行混合排列的自动线\nD.悬挂运输的自动线"}, {"question": "狭义的生产线是指按（ ）原则组织起来的多品种生产组织形式。", "options": [{"label": "A", "text": "工艺专业化"}, {"label": "B", "text": "对象专业化"}, {"label": "C", "text": "设备专业化"}, {"label": l": "D", "text": "传统企业的外部环境严格，现代企业外部环境宽松"}], "answer": "B", "analysis": "本题考查新制度学派的观点。新制度学派认为，企业作为商品经济发展到一定阶段的产物，是因为\n企业能作为在某种状态下替代市场的一种交易费用较低的资源配置方式。\n4.关于现代企业与传统企业的关系，下列表述错误的是（ ）。\nA.现代企业是传统企业的继承和发展\nB.传统企业所有权与经营权分离\nC.传统企业是现代企业的基础\nD.传统企业的外部环境严格，现代企业外部环境宽松"}, {"question": "一切直接或间接为企业经济活动所需要并能构成生产经营资源的天然或人造资源称为（ ）。", "options": [{"label": "A", "text": "生产资料"}, {"label": "B", "text": "劳动对象"}, {"label": "C", "text": "企业要素"}, {"label": "D", "text": "劳动手段"}], "answer": "C", "analysis": "传统企业所有权与经营权统一，现代企业所有权与经营权分离，故B错误。\n5.一切直接或间接为企业经济活动所需要并能构成生产经营资源的天然或人造资源称为（ ）。\nA.生产资料\nB.劳动对象\nC.企业要素\nD.劳动手段"}, {"question": "按生产要素密集程度划分，活劳动所占比重较大、资本有机构成低的企业属于（ ）。", "options": [{"label": "A", "text": "资金密集型企业"}, {"label": "B", "text": "设备密集型企业"}, {"label": "C", "text": "劳动密集型企业"}, {"label": "D", "text": "知识密集型企业"}], "answer": "C", "analysis": "本题考查企业要素的概念。企业要素是指一切直接或间接地为企业经济活动所需要并能构成生产经\n营资源的，具有一定开发性、利用性、选择性的天然资源或人造资源。\n1\n6.按生产要素密集程度划分，活劳动所占比重较大、资本有机构成低的企业属于（ ）。\nA.资金密集型企业\nB.设备密集型企业\nC.劳动密集型企业\nD.知识密集型企业"}, {"question": "作为由若干独立企业法人所组成的集合体，企业集团的联结纽带是（ ）。", "options": [{"label": "A", "text": "产品"}, {"label": "B", "text": "资产"}, {"label": "C", "text": "品牌"}, {"label": "D", "text": "政府"}], "answer": "B", "analysis": "本题考查企业的主要类型及其特征。劳动密集型企业是指活劳动量所占比重较大、资本有机构成低\n的企业等。\n7.作为由若干独立企业法人所组成的集合体，企业集团的联结纽带是（ ）。\nA.产品\nB.资产\nC.品牌\nD.政府"}, {"question": "股东一旦将资本投资到公司，就不可抽回，只能转让，公司的财产不会因股东的变化而出现经常性波动。 这体现了法人财产的（ ）特征。", "options": [{"label": "A", "text": "连续性"}, {"label": "B", "text": "灵活性"}, {"label": "C", "text": "整体性"}, {"label": "D", "text": "稳定性"}], "answer": "D", "analysis": "企业集团是以资产为纽带联结起来的若干独立企业法人所组成的集合体。\n8.股东一旦将资本投资到公司，就不可抽回，只能转让，公司的财产不会因股东的变化而出现经常性波动。\n这体现了法人财产的（ ）特征。\nA.连续性\nB.灵活性\nC.整体性\nD.稳定性"}, {"question": "有限责任公司对公司债务所承担的责任以（ ）为限。", "options": [{"label": "A", "text": "出资额"}, {"label": "B", "text": "企业全部固定资产"}, {"label": "C", "text": "全部法人财产"}, {"label": "D", "text": "企业注册资本"}], "answer": "C", "analysis": "本题考查公司制企业的特征。稳定性是指股东一旦将资本投资到公司，就不可抽回，只能转让，公\n司的财产不会因股东的变化而出现经常性波动。\n9.有限责任公司对公司债务所承担的责任以（ ）为限。\nA.出资额\nB.企业全部固定资产\nC.全部法人财产\nD.企业注册资本"}, {"question": "建立科学的组织管理机构、内部管理体制和企业规章制度，形成激励和约束相结合的经营机制，调节所有 者、经营者和员工之间的关系。这说明了现代企业制度的（ ）特征。", "options": [{"label": "A", "text": "产权清晰"}, {"label": "B", "text": "权责明确"}, {"label": "C", "text": "政企分开"}, {"label": "D", "text": "管理科学"}], "answer": "D", "analysis": "有限责任包含两层含义：一是对股东而言，是以股东的出资额为限，对公司的债务承担有限责任\n；二是对公司法人而言，是以其全部法人财产为限，对公司债务承担有限责任。\n10.建立科学的组织管理机构、内部管理体制和企业规章制度，形成激励和约束相结合的经营机制，调节所有\n者、经营者和员工之间的关系。这说明了现代企业制度的（ ）特征。\nA.产权清晰\nB.权责明确\nC.政企分开\nD.管理科学"}, {"question": "企业的经营目标主要是满足社会需要与（ ）。", "options": [{"label": "A", "text": "实现充分就业"}, {"label": "B", "text": "促进自由竞争"}, {"label": "C", "text": "完成政府指令"}, {"label": "D", "text": "获取利润"}], "answer": "D", "analysis": "管理科学即要求企业建立科学的组织管理机构、内部管理体制和企业规章制度，形成激励和约束相\n结合的经营机制，调节所有者、经营者和员工之间的关系。\n2\n11.企业的经营目标主要是满足社会需要与（ ）。\nA.实现充分就业\nB.促进自由竞争\nC.完成政府指令\nD.获取利润"}, {"question": "企业在遵守、维护和改善社会秩序，保护和增加社会福利方面所承担的职责和义务，属于企业的（ ）。", "options": [{"label": "A", "text": "经济责任"}, {"label": "B", "text": "法律责任"}, {"label": "C", "text": "社会责任"}, {"label": "D", "text": "行为规范"}], "answer": "C", "analysis": "企业的双重性目标：满足社会需要并获取利润。\n12.企业在遵守、维护和改善社会秩序，保护和增加社会福利方面所承担的职责和义务，属于企业的（ ）。\nA.经济责任\nB.法律责任\nC.社会责任\nD.行为规范"}, {"question": "承担社会责任是（ ）。", "options": [{"label": "A", "text": "企业的生存之道"}, {"label": "B", "text": "企业的经营目标"}, {"label": "C", "text": "企业协调外部关系的基础"}, {"label": "D", "text": "企业产生的根本原因"}], "answer": "C", "analysis": "企业的社会责任是企业在遵守、维护和改善社会秩序，保护和增加社会福利方面所承担的职责和义\n务。\n13.承担社会责任是（ ）。\nA.企业的生存之道\nB.企业的经营目标\nC.企业协调外部关系的基础\nD.企业产生的根本原因"}, {"question": "将企业生产经营活动的各要素、各部门、各环节、各方面合理地组织起来，形成一个有机的整体，充分发 挥它们应有的作用，这体现了管理的（ ）职能。", "options": [{"label": "A", "text": "组织"}, {"label": "B", "text": "协调"}, {"label": "C", "text": "控制"}, {"label": "D", "text": "指挥"}], "answer": "A", "analysis": "承担社会责任是企业协调外部关系的基础。\n14.将企业生产经营活动的各要素、各部门、各环节、各方面合理地组织起来，形成一个有机的整体，充分发\n挥它们应有的作用，这体现了管理的（ ）职能。\nA.组织\nB.协调\nC.控制\nD.指挥"}, {"question": "在一定生产技术组织条件下，单台设备单位时间的产量标准称为（ ）。", "options": [{"label": "A", "text": "设备设计定额"}, {"label": "B", "text": "设备利用定额"}, {"label": "C", "text": "设备维修定额"}, {"label": "D", "text": "设备寿命定额"}], "answer": "B", "analysis": "组织就是将企业生产经营活动的各要素、各部门、各环节、各方面在空间和时间的联系上，在劳动\n分工与协作上，在上下左右的相互联系上，在对外往来上合理地组织起来，形成一个有机的整体，充分发挥\n它们应有的作用。\n15.在一定生产技术组织条件下，单台设备单位时间的产量标准称为（ ）。\nA.设备设计定额\nB.设备利用定额\nC.设备维修定额\nD.设备寿命定额"}, {"question": "企业计量管理的目的是保证（ ）的统一。", "options": [{"label": "A", "text": "规格"}, {"label": "B", "text": "型号"}, {"label": "C", "text": "量值"}, {"label": "D", "text": "标准"}], "answer": "C", "analysis": "设备利用定额：指在一定的生产技术组织条件下，单台设备在单位时间的产量标准。\n16.企业计量管理的目的是保证（ ）的统一。\n3\nA.规格\nB.型号\nC.量值\nD.标准"}, {"question": "在计量管理中，对尺、衡器、电度表等计量器具的管理称为（ ）。", "options": [{"label": "A", "text": "商业计量管理"}, {"label": "B", "text": "工业计量管理"}, {"label": "C", "text": "行政计量管理"}, {"label": "D", "text": "法制计量管理"}], "answer": "D", "analysis": "计量管理的目的是保证量值的统一。\n17.在计量管理中，对尺、衡器、电度表等计量器具的管理称为（ ）。\nA.商业计量管理\nB.工业计量管理\nC.行政计量管理\nD.法制计量管理"}, {"question": "企业规章制度的核心是（ ）。", "options": [{"label": "A", "text": "制定工作计划"}, {"label": "B", "text": "明确岗位责任"}, {"label": "C", "text": "明确领导关系"}, {"label": "D", "text": "提高员工素质"}], "answer": "B", "analysis": "法制计量管理是对尺、衡器、电度表等关系到国计民生的单位量的管理。\n18.企业规章制度的核心是（ ）。\nA.制定工作计划\nB.明确岗位责任\nC.明确领导关系\nD.提高员工素质"}, {"question": "现代企业制度中，产权清晰是指企业所有者产权和（ ）财产权要清晰。", "options": [{"label": "A", "text": "员工"}, {"label": "B", "text": "债权人"}, {"label": "C", "text": "法人"}, {"label": "D", "text": "管理者"}], "answer": "C", "analysis": "本题考查规章制度。责任制度是企业规章制度的核心。\n19.现代企业制度中，产权清晰是指企业所有者产权和（ ）财产权要清晰。\nA.员工\nB.债权人\nC.法人\nD.管理者"}, {"question": "按照英美法系，公司制企业只有（ ）。", "options": [{"label": "A", "text": "股份公司"}, {"label": "B", "text": "无限公司"}, {"label": "C", "text": "有限公司"}, {"label": "D", "text": "两合公司"}], "answer": "C", "analysis": "本题考查现代企业制度的特征。产权清晰是指所有者产权和法人财产权要清晰，出资者拥有出资所\n有权，企业中的国有资产所有权属于国家，企业拥有包括国家在内的出资者投资形成的全部法人财产权，是\n享有民事权利并承担民事责任的法人实体。\n掌握“现代企业制度”知识点。\n20.按照英美法系，公司制企业只有（ ）。\nA.股份公司\nB.无限公司\nC.有限公司\nD.两合公司"}, {"question": "单个业主制企业的优点不包括（ ）。", "options": [{"label": "A", "text": "所有权与经营权归于一体"}, {"label": "B", "text": "企业经营灵活"}, {"label": "C", "text": "企业产权属于个人，可以自由转让"}, {"label": "D", "text": "资金来源较广、信用能力较强"}], "answer": "D", "analysis": "本题考查公司制企业的种类。按照大陆法系，公司制企业有无限公司、有限公司、两合公司；按照\n英美法系，公司制企业只有有限公司。\n掌握“企业制度的概念、类型及其特征”知识点。\n21.单个业主制企业的优点不包括（ ）。\nA.所有权与经营权归于一体\n4\nB.企业经营灵活\nC.企业产权属于个人，可以自由转让\nD.资金来源较广、信用能力较强"}, {"question": "企业管理的首要职能是（ ）。", "options": [{"label": "A", "text": "计划职能"}, {"label": "B", "text": "指挥职能"}, {"label": "C", "text": "控制职能"}, {"label": "D", "text": "激励职能"}], "answer": "A", "analysis": "本题考查单个业主制企业的优点。单个业主制企业的优点体现在：①所有权与经营权归于一体，企\n业经营灵活，便于灵活决策和精打细算；②注册资本要求不是很高，企业开业和关闭的手续都比较简单\n；③企业产权属于个人，可以自由转让。选项D属于合伙制企业的优点。\n掌握“企业制度的概念、类型及其特征”知识点。\n22.企业管理的首要职能是（ ）。\nA.计划职能\nB.指挥职能\nC.控制职能\nD.激励职能"}, {"question": "企业日常生产的基本环节不包括（ ）。", "options": [{"label": "A", "text": "生产"}, {"label": "B", "text": "销售"}, {"label": "C", "text": "包装"}, {"label": "D", "text": "供应"}], "answer": "C", "analysis": "本题考查企业管理的主要职能。计划正确与否对企业的成败具有决定作用。从这个意义上说，计划\n是企业管理的首要职能。\n掌握“企业管理的概念与职能”知识点。\n23.企业日常生产的基本环节不包括（ ）。\nA.生产\nB.销售\nC.包装\nD.供应"}, {"question": "下列选项中，属于多元企业优点的是（ ）。", "options": [{"label": "A", "text": "提高劳动生产率"}, {"label": "B", "text": "降低经营风险"}, {"label": "C", "text": "降低成本"}, {"label": "D", "text": "减少了管理难度"}], "answer": "B", "analysis": "本题考查企业发展的基本要求。供应、生产和销售是企业日常生产的三个基本环节。\n掌握“企业发展的基本要求和途径、现代企业与传统企业的关系”知识点。\n24.下列选项中，属于多元企业优点的是（ ）。\nA.提高劳动生产率\nB.降低经营风险\nC.降低成本\nD.减少了管理难度"}, {"question": "按生产要素密集程度划分，企业的类型不包括（ ）。", "options": [{"label": "A", "text": "劳动密集型企业"}, {"label": "B", "text": "设备密集型企业"}, {"label": "C", "text": "资金密集型企业"}, {"label": "D", "text": "知识密集型企业"}], "answer": "B", "analysis": "本题考查多元企业的优点。多元企业的优点是：能扩大经营范围或增宽产品线，使企业资源的利用\n程度提高，适应市场变化的能力增强，降低经营风险。\n掌握“企业的主要类型及其特征”知识点。\n25.按生产要素密集程度划分，企业的类型不包括（ ）。\nA.劳动密集型企业\nB.设备密集型企业\nC.资金密集型企业\nD.知识密集型企业"}, {"question": "下列属于资金密集型企业的是（ ）。", "options": [{"label": "A", "text": "食品企业"}, {"label": "B", "text": "机械工业企业"}, {"label": "C", "text": "航空工业企业"}, {"label": "D", "text": "软件开发生产企业"}], "answer": "B", "analysis": "本题考查企业的主要类型。按生产要素密集程度划分，即根据企业拥有资源的性质和所占比重予以\n分类，企业可以分为以下几类：劳动密集型企业；资金密集型企业；知识密集型企业。\n5\n掌握“企业的主要类型及其特征”知识点。\n26.下列属于资金密集型企业的是（ ）。\nA.食品企业\nB.机械工业企业\nC.航空工业企业\nD.软件开发生产企业"}, {"question": "企业经营管理的耳目，生存之本，发展之源是（ ）。", "options": [{"label": "A", "text": "知识"}, {"label": "B", "text": "技术"}, {"label": "C", "text": "市场"}, {"label": "D", "text": "信息"}], "answer": "D", "analysis": "本题考查企业的主要类型。资金密集型企业（或技术密集型企业）是指投资大、技术装备程度较高\n、劳动力比重小的企业，如机械工业企业、化工企业等。\n掌握“企业的主要类型及其特征”知识点。\n27.企业经营管理的耳目，生存之本，发展之源是（ ）。\nA.知识\nB.技术\nC.市场\nD.信息"}, {"question": "作为法人实体和市场竞争主体，企业存在的直接目的是（ ）。", "options": [{"label": "A", "text": "参与市场竞争"}, {"label": "B", "text": "扩大市场范围"}, {"label": "C", "text": "承担社会责任"}, {"label": "D", "text": "合法获得营利"}], "answer": "D", "analysis": "本题考查企业要素的构成。信息：企业经营管理的耳目，生存之本，发展之源。\n掌握“企业的基本构成要素、优势与弱势”知识点。\n28.作为法人实体和市场竞争主体，企业存在的直接目的是（ ）。\nA.参与市场竞争\nB.扩大市场范围\nC.承担社会责任\nD.合法获得营利"}, {"question": "在企业的规章制度中，财务制度应属于（ ）。", "options": [{"label": "A", "text": "责任制度"}, {"label": "B", "text": "基本制度"}, {"label": "C", "text": "工作制度"}, {"label": "D", "text": "组织制度"}], "answer": "C", "analysis": "本题考查企业的概念。企业是以营利为目的，运用各种生产要素（如土地、劳动力、资本、技术等\n），依法从事生产、流通和服务等满足市场需要的经济活动，实行自主经营、自负盈亏、独立核算、自我约\n束的法人实体和市场竞争主体。\n掌握“企业的概念”知识点。\n29.在企业的规章制度中，财务制度应属于（ ）。\nA.责任制度\nB.基本制度\nC.工作制度\nD.组织制度"}, {"question": "主要用于对生产量值监督的计量技术是（ ）。", "options": [{"label": "A", "text": "标准测量技术"}, {"label": "B", "text": "工业测量技术"}, {"label": "C", "text": "计量测量技术"}, {"label": "D", "text": "信息测量技术"}], "answer": "C", "analysis": "本题考查规章制度。工作制度主要是指导企业具体管理方面的制度，如财务制度，计划制订制度\n，生产技术、销售方面的工作制度等。\n掌握“计量工作、信息工作、规章制度、职业培训”知识点。\n30.主要用于对生产量值监督的计量技术是（ ）。\nA.标准测量技术\nB.工业测量技术\nC.计量测量技术\n6\nD.信息测量技术"}, {"question": "企业的工时定额、产量定额、设备看管定额属于（ ）定额。", "options": [{"label": "A", "text": "生产组织"}, {"label": "B", "text": "物资消耗"}, {"label": "C", "text": "劳动"}, {"label": "D", "text": "管理费用"}], "answer": "C", "analysis": "本题考查计量工作。计量测量技术是指法制标准量值传递系统中末端的测量，属于标准过渡的中间\n测量，目的是扩大标准的上下量限，它主要用于对生产量值的监督。\n掌握“计量工作、信息工作、规章制度、职业培训”知识点。\n31.企业的工时定额、产量定额、设备看管定额属于（ ）定额。\nA.生产组织\nB.物资消耗\nC.劳动\nD.管理费用"}, {"question": "下列各项属于企业管理主要职能的有（ ）。", "options": [{"label": "A", "text": "计划职能"}, {"label": "B", "text": "控制职能"}, {"label": "C", "text": "激励职能"}, {"label": "D", "text": "指挥职能"}], "answer": "ABCD", "analysis": "本题考查定额工作。劳动定额又可细分为单位产品的工时定额、单位工酬的产量定额、设备看管定\n额、服务定额等。\n掌握“标准化工作、定额工作”知识点。\n多项选择题\n32.下列各项属于企业管理主要职能的有（ ）。\nA.计划职能\nB.控制职能\nC.激励职能\nD.指挥职能\nE.惩戒职能"}, {"question": "管理标准是指对企业重复出现的管理业务和工作责任，按有效利用时间、提高工作效率的要求，对工作程 序、工作方法、工作职责和制度所做的统一规定，包括（ ）。", "options": [{"label": "A", "text": "基础标准"}, {"label": "B", "text": "生产组织标准"}, {"label": "C", "text": "技术管理标准"}, {"label": "D", "text": "产品指数标准"}], "answer": "BCE", "analysis": "本题考查企业管理的主要职能。企业管理的主要职能：计划、组织、指挥、控制、协调、激励。\n33.管理标准是指对企业重复出现的管理业务和工作责任，按有效利用时间、提高工作效率的要求，对工作程\n序、工作方法、工作职责和制度所做的统一规定，包括（ ）。\nA.基础标准\nB.生产组织标准\nC.技术管理标准\nD.产品指数标准\nE.经济管理标准"}, {"question": "BCE 【解析】管理标准是指对企业重复出现的管理业务和工作责任，按有效利用时间、提高工作效率的要求，对 工作程序、工作方法、工作职责和制度所做的统一规定，包括生产组织标准、技术管理标准、经济管理标准 等。 34.企业的技术标准具体包括（ ）。 E.安全与环境标准", "options": [{"label": "A", "text": "产品标准"}, {"label": "B", "text": "方法标准"}, {"label": "C", "text": "基础标准"}, {"label": "D", "text": "生产组织标准"}], "answer": "ABCE", "analysis": "管理标准是指对企业重复出现的管理业务和工作责任，按有效利用时间、提高工作效率的要求，对\n工作程序、工作方法、工作职责和制度所做的统一规定，包括生产组织标准、技术管理标准、经济管理标准\n等。\n34.企业的技术标准具体包括（ ）。\nA.产品标准\nB.方法标准\nC.基础标准\nD.生产组织标准\nE.安全与环境标准"}, {"question": "ABCE 【解析】技术标准可细分为产品标准、方法标准、基础标准、安全与环境标准。 7 35.工场手工业与家庭手工业的区别在于（ ）。 E.技术水平不同", "options": [{"label": "A", "text": "生产经营的目的不同"}, {"label": "B", "text": "经营者的身份不同"}, {"label": "C", "text": "经营者的性质不同"}, {"label": "D", "text": "生产的形式、经营的规模不同"}], "answer": "ABCD", "analysis": "技术标准可细分为产品标准、方法标准、基础标准、安全与环境标准。\n7\n35.工场手工业与家庭手工业的区别在于（ ）。\nA.生产经营的目的不同\nB.经营者的身份不同\nC.经营者的性质不同\nD.生产的形式、经营的规模不同\nE.技术水平不同"}, {"question": "企业的经营机制包括（ ）。", "options": [{"label": "A", "text": "动力机制"}, {"label": "B", "text": "调节机制或产销机制"}, {"label": "C", "text": "约束机制或平衡约束机制"}, {"label": "D", "text": "发展机制或技术进步机制"}], "answer": "ABCD", "analysis": "本题考查企业发展的主要阶段。工场手工业与家庭手工业相比已经有了很大的进步，两者的区别主\n要有：（1）生产经营的目的不同；（2）经营者的身份不同；（3）经营者的性质不同；（4）经营者的素质\n不同；（5）生产的形式、经营的规模不同。\n掌握“企业发展的主要阶段”知识点。\n36.企业的经营机制包括（ ）。\nA.动力机制\nB.调节机制或产销机制\nC.约束机制或平衡约束机制\nD.发展机制或技术进步机制\nE.转换机制"}, {"question": "企业成立应该具备的条件有（ ）。", "options": [{"label": "A", "text": "正式在政府有关部门注册登记"}, {"label": "B", "text": "具有专门的名称"}, {"label": "C", "text": "具备临时的办公场所"}, {"label": "D", "text": "具有独立的资产，实行独立核算"}], "answer": "ABDE", "analysis": "本题考查企业的经营机制。企业的经营机制包括动力机制、调节机制或产销机制、约束机制或平衡\n约束机制、发展机制或技术进步机制。\n掌握“企业发展的基本要求和途径、现代企业与传统企业的关系”知识点。\n37.企业成立应该具备的条件有（ ）。\nA.正式在政府有关部门注册登记\nB.具有专门的名称\nC.具备临时的办公场所\nD.具有独立的资产，实行独立核算\nE.能独立对外开展经营活动"}], "第二章 工商企业组织结构": [{"question": "第二章 工商企业组织结构 单项选择题 1.企业的产生、发展与分工密不可分，按照分工与专业化发展的顺序，第三种专业化形态是（ ）。", "options": [{"label": "A", "text": "工艺专业化"}, {"label": "B", "text": "零部件专业化"}, {"label": "C", "text": "产品专业化"}, {"label": "D", "text": "部门专业化"}], "answer": "B", "analysis": ""}, {"question": "授权所授予的职权只是上级职权的一部分，而不是全部。对下级来讲，它是完成任务所必需的权力。授权 过度等于放弃权力，必然失去对下级的控制和监督。这体现了授权基本原则中的（ ）。", "options": [{"label": "A", "text": "适度授权"}, {"label": "B", "text": "明确授权范围"}, {"label": "C", "text": "视能授权"}, {"label": "D", "text": "适当控制"}], "answer": "A", "analysis": "按照分工与专业化发展的顺序，第三种专业化形态是零部件专业化。\n2.授权所授予的职权只是上级职权的一部分，而不是全部。对下级来讲，它是完成任务所必需的权力。授权\n过度等于放弃权力，必然失去对下级的控制和监督。这体现了授权基本原则中的（ ）。\nA.适度授权\nB.明确授权范围\nC.视能授权\nD.适当控制"}, {"question": "上级委托给下级一定的权力，使下级在一定的监督之下，具有相当的决策权和行动权。这种领导行为是 （ ）。", "options": [{"label": "A", "text": "任命"}, {"label": "B", "text": "集权"}, {"label": "C", "text": "分工"}, {"label": "D", "text": "授权"}], "answer": "D", "analysis": "本题考查授权的基本原则。适度授权：授权所授予的职权只是上级职权的一部分，而不是全部。对\n下级来讲，它是完成任务所必需的权力。授权过度等于放弃权力，必然失去对下级的控制和监督。\n3.上级委托给下级一定的权力，使下级在一定的监督之下，具有相当的决策权和行动权。这种领导行为是\n（ ）。\nA.任命\nB.集权\nC.分工\nD.授权"}, {"question": "关于集权与分权程度的主要标志，以下说法不正确的是（ ）。 权程度较高", "options": [{"label": "A", "text": "组织中较低管理层次制定决策的频度或数目越大，分权程度越高"}, {"label": "B", "text": "组织中较低管理层次决策的范围越广，涉及的职能越多，说明该组织的集权程度越高"}, {"label": "C", "text": "如果上级对下级的决策没有任何控制，分权程度极高"}, {"label": "D", "text": "如果组织中较低管理层次的决策影响部门的今后发展，从而决策对整个组织的影响程度较大，则组织的分"}], "answer": "B", "analysis": "本题考查授权的含义。授权是指上级委托给下级一定的权力，使下级在一定的监督之下，具有相当\n的决策权和行动权。\n4.关于集权与分权程度的主要标志，以下说法不正确的是（ ）。\nA.组织中较低管理层次制定决策的频度或数目越大，分权程度越高\nB.组织中较低管理层次决策的范围越广，涉及的职能越多，说明该组织的集权程度越高\nC.如果上级对下级的决策没有任何控制，分权程度极高\nD.如果组织中较低管理层次的决策影响部门的今后发展，从而决策对整个组织的影响程度较大，则组织的分\n权程度较高"}, {"question": "大多数企业普遍采用的一种部门划分方法是指（ ）。", "options": [{"label": "A", "text": "职能部门化"}, {"label": "B", "text": "产品部门化"}, {"label": "C", "text": "区域部门化"}, {"label": "D", "text": "过程部门化"}], "answer": "A", "analysis": "组织中较低管理层次决策的范围越广，涉及的职能越多，说明该组织的分权程度越高。\n5.大多数企业普遍采用的一种部门划分方法是指（ ）。\nA.职能部门化\nB.产品部门化\nC.区域部门化\nD.过程部门化"}, {"question": "某电子企业同时设置手机部、电视机部、计算机部，该企业划分部门的方法是（ ）。", "options": [{"label": "A", "text": "职能部门化"}, {"label": "B", "text": "产品部门化"}, {"label": "C", "text": "区域部门化"}, {"label": "D", "text": "过程部门化"}], "answer": "B", "analysis": "按工作职能划分部门是大多数企业普遍采用的一种部门划分方法。\n1\n6.某电子企业同时设置手机部、电视机部、计算机部，该企业划分部门的方法是（ ）。\nA.职能部门化\nB.产品部门化\nC.区域部门化\nD.过程部门化"}, {"question": "在企业组织设计中就要遵循一个下级只能服从一个上级领导的原则体现了企业组织设计的（ ）原则。", "options": [{"label": "A", "text": "统一指挥"}, {"label": "B", "text": "权责对等"}, {"label": "C", "text": "分工与协作"}, {"label": "D", "text": "精简原则"}], "answer": "A", "analysis": "产品部门化：根据产品来设立管理部门，划分管理单位，即把同一产品的生产或销售等工作集中在\n同一部门中进行。\n7.在企业组织设计中就要遵循一个下级只能服从一个上级领导的原则体现了企业组织设计的（ ）原则。\nA.统一指挥\nB.权责对等\nC.分工与协作\nD.精简原则"}, {"question": "在企业组织结构的形式中，矩阵制所表现出的最突出的优点是（ ）。", "options": [{"label": "A", "text": "管理层次清楚"}, {"label": "B", "text": "管理比较深入"}, {"label": "C", "text": "信息反馈及时"}, {"label": "D", "text": "横向联系密切"}], "answer": "D", "analysis": "统一指挥原则：在企业组织设计中就要遵循一个下级只能服从一个上级领导的原则，将各个管理职\n务形成一条连续的管理层级链，同时明确规定链条中职务之间的责任、权力关系。\n8.在企业组织结构的形式中，矩阵制所表现出的最突出的优点是（ ）。\nA.管理层次清楚\nB.管理比较深入\nC.信息反馈及时\nD.横向联系密切"}, {"question": "下列企业组织结构形式中，集权程度最高的组织结构是（ ）。", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "事业部制"}], "answer": "A", "analysis": "矩阵制的优点是打破了传统的人员只受一个部门领导的管理原则，从而加强了管理部门之间的纵向\n和横向联系，有利于各职能部门之间的配合，及时沟通信息，共同决策，提高了工作效率；把不同部门的专\n业人员组织在一起，有助于激发人们的积极性和创造性，培养和发挥专业人员的团队效能，提高技术水平和\n管理水平；把完成某项任务所需的各种专业知识、和经验集中起来，加速完成某一特定项目，有助于提高管\n理组织的机动性和灵活性。\n9.下列企业组织结构形式中，集权程度最高的组织结构是（ ）。\nA.直线制\nB.职能制\nC.矩阵制\nD.事业部制"}, {"question": "把众多企业联合在一起形成企业集团的最重要纽带是（ ）。", "options": [{"label": "A", "text": "协作关系"}, {"label": "B", "text": "业务关系"}, {"label": "C", "text": "产权关系"}, {"label": "D", "text": "契约关系"}], "answer": "C", "analysis": "直线制是一种简单的组织形式，特点是从最高管理层到最低管理层为上下垂直领导，各级领导者执\n行统一指挥和管理职能，不设专门的职能管理机构。\n10.把众多企业联合在一起形成企业集团的最重要纽带是（ ）。\nA.协作关系\nB.业务关系\nC.产权关系\nD.契约关系"}, {"question": "在通常情况下，促使企业组织采用分权管理策略的情形是（ ）。", "options": [{"label": "A", "text": "技术简单"}, {"label": "B", "text": "企业部门少"}, {"label": "C", "text": "技术复杂、工艺整体性要求不高"}, {"label": "D", "text": "工艺整体性要求高"}], "answer": "C", "analysis": "产权关系是把众多的企业联合在一起形成企业集团的最重要的纽带。\n11.在通常情况下，促使企业组织采用分权管理策略的情形是（ ）。\nA.技术简单\nB.企业部门少\nC.技术复杂、工艺整体性要求不高\nD.工艺整体性要求高"}, {"question": "关于虚拟企业的说法错误的是（ ）。", "options": [{"label": "A", "text": "虚拟企业具有高效的信息管理系统"}, {"label": "B", "text": "虚拟企业是封闭的企业组织模式"}, {"label": "C", "text": "虚拟企业产品趋向数字化"}, {"label": "D", "text": "虚拟企业与上下游企业建立战略联盟关系"}], "answer": "B", "analysis": "技术复杂、工艺整体性要求不高的企业，组织应以分权型为主。\n12.关于虚拟企业的说法错误的是（ ）。\nA.虚拟企业具有高效的信息管理系统\nB.虚拟企业是封闭的企业组织模式\nC.虚拟企业产品趋向数字化\nD.虚拟企业与上下游企业建立战略联盟关系"}, {"question": "将分散在世界各地的众多部门、车间通过订单、合同形式“组合”成一个虚拟工厂，使得管理层可以在巨 大的空间范围内协调和控制生产活动是（ ）。", "options": [{"label": "A", "text": "虚拟制造"}, {"label": "B", "text": "虚拟开发"}, {"label": "C", "text": "虚拟销售"}, {"label": "D", "text": "虚拟结算"}], "answer": "A", "analysis": "选项B错误，虚拟企业是将供应商、经销商、顾客，以及若干规模不同、拥有各自专长的小型企业或\n车间连接起来，共同开发、生产、销售多样化产品的开放式企业组织模式。\n13.将分散在世界各地的众多部门、车间通过订单、合同形式“组合”成一个虚拟工厂，使得管理层可以在巨\n大的空间范围内协调和控制生产活动是（ ）。\nA.虚拟制造\nB.虚拟开发\nC.虚拟销售\nD.虚拟结算"}, {"question": "下列战略联盟形式中，具有独立地位且拥有管理机构的是（ ）。", "options": [{"label": "A", "text": "股权参与式联盟"}, {"label": "B", "text": "功能协议式联盟"}, {"label": "C", "text": "合资企业式联盟"}, {"label": "D", "text": "框架协议式联盟"}], "answer": "C", "analysis": "虚拟制造就是将分散在世界各地的众多部门、车间通过订单、合同形式“组合”成一个虚拟工厂\n，使得管理层可以在巨大的空间范围内协调和控制生产活动。\n14.下列战略联盟形式中，具有独立地位且拥有管理机构的是（ ）。\nA.股权参与式联盟\nB.功能协议式联盟\nC.合资企业式联盟\nD.框架协议式联盟"}, {"question": "战略联盟的基础是（ ）", "options": [{"label": "A", "text": "技术优势"}, {"label": "B", "text": "变革优势"}, {"label": "C", "text": "文化优势"}, {"label": "D", "text": "比较优势"}], "answer": "D", "analysis": "合资企业是一个具有独立地位和管理机构的经济实体。\n15.战略联盟的基础是（ ）\nA.技术优势\nB.变革优势\nC.文化优势\nD.比较优势"}, {"question": "根据彼得·圣吉的观点，学习型组织的五项修炼中最基本的修炼方式，也是最重要的修炼方式是（ ）。", "options": [{"label": "A", "text": "自我超越"}, {"label": "B", "text": "改善心智模式"}, {"label": "C", "text": "建立共同愿景"}, {"label": "D", "text": "团队学习"}], "answer": "D", "analysis": "比较优势是战略联盟的基础。为了使战略联盟具有较高的市场竞争力，各成员企业要具有在核心技\n术上的巨大合作潜力和优势互补性，或者具有相关零部件生产的优势，或具有将新产品推广到国内外市场的\n优势等。\n3\n16.根据彼得·圣吉的观点，学习型组织的五项修炼中最基本的修炼方式，也是最重要的修炼方式是（ ）。\nA.自我超越\nB.改善心智模式\nC.建立共同愿景\nD.团队学习"}, {"question": "企业可能不再适应环境变化，或者变得行动迟缓，过于行政化，因而必须经历一个重塑和创新的过程，这 体现企业处于生命周期的（ ）。", "options": [{"label": "A", "text": "创业阶段"}, {"label": "B", "text": "集体化阶段"}, {"label": "C", "text": "规范化阶段"}, {"label": "D", "text": "精细阶段"}], "answer": "D", "analysis": "团队学习是一种最基本的修炼方式，也是最重要的修炼方式。\n17.企业可能不再适应环境变化，或者变得行动迟缓，过于行政化，因而必须经历一个重塑和创新的过程，这\n体现企业处于生命周期的（ ）。\nA.创业阶段\nB.集体化阶段\nC.规范化阶段\nD.精细阶段"}, {"question": "企业变革已经成为企业生存和发展的常态活动，企业变革的基本原因是（ ）。", "options": [{"label": "A", "text": "企业本身发展过程中的矛盾"}, {"label": "B", "text": "企业领导超越自我的需要"}, {"label": "C", "text": "管理信息化的需要"}, {"label": "D", "text": "员工职业生涯发展的需要"}], "answer": "A", "analysis": "处于精细发展阶段的企业，可能不再适应环境变化，或者变得行动迟缓，过于行政化，因而必须经\n历一个重塑和创新的过程。处于这一阶段的企业通常需要更换高层管理者。\n18.企业变革已经成为企业生存和发展的常态活动，企业变革的基本原因是（ ）。\nA.企业本身发展过程中的矛盾\nB.企业领导超越自我的需要\nC.管理信息化的需要\nD.员工职业生涯发展的需要"}, {"question": "指针对企业员工的价值观、态度、期望、信仰，以及目标和追求等方面所进行的变革属于（ ）。", "options": [{"label": "A", "text": "文化变革"}, {"label": "B", "text": "技术变革"}, {"label": "C", "text": "战略与结构变革"}, {"label": "D", "text": "产品与服务变革"}], "answer": "A", "analysis": "企业变革的基本原因在于企业本身发展过程中的矛盾冲突。\n19.指针对企业员工的价值观、态度、期望、信仰，以及目标和追求等方面所进行的变革属于（ ）。\nA.文化变革\nB.技术变革\nC.战略与结构变革\nD.产品与服务变革"}, {"question": "企业演变的基本动因是（ ）。", "options": [{"label": "A", "text": "企业战略"}, {"label": "B", "text": "技术因素"}, {"label": "C", "text": "企业文化"}, {"label": "D", "text": "社会发展"}], "answer": "B", "analysis": "文化变革是针对企业员工的价值观、态度、期望、信仰，以及目标和追求等方面所进行的变革。\n20.企业演变的基本动因是（ ）。\nA.企业战略\nB.技术因素\nC.企业文化\nD.社会发展"}, {"question": "工业经济发展初期所采用的一种简单的组织形式称为（ ）。", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "直线职能制"}, {"label": "D", "text": "矩阵制"}], "answer": "A", "analysis": "本题考查影响企业变革的因素。技术因素是企业演变的基本动因。\n21.工业经济发展初期所采用的一种简单的组织形式称为（ ）。\nA.直线制\nB.职能制\n4\nC.直线职能制\nD.矩阵制"}, {"question": "便于严格遵守各自的职责，比较适应现代企业管理的要求，这种企业组织结构形式是（ ）。", "options": [{"label": "A", "text": "职能制"}, {"label": "B", "text": "矩阵制"}, {"label": "C", "text": "直线职能制"}, {"label": "D", "text": "事业部制"}], "answer": "C", "analysis": "本题考查直线制。直线制又叫单线制，它是工业经济发展初期所采用的一种简单的组织形式。\n掌握“直线制、职能制”知识点。\n22.便于严格遵守各自的职责，比较适应现代企业管理的要求，这种企业组织结构形式是（ ）。\nA.职能制\nB.矩阵制\nC.直线职能制\nD.事业部制"}, {"question": "现代企业部门划分的方法中，（ ）是按照地理范围来划分管理部门。", "options": [{"label": "A", "text": "产品部门化"}, {"label": "B", "text": "区域部门化"}, {"label": "C", "text": "职能部门化"}, {"label": "D", "text": "服务对象部门化"}], "answer": "B", "analysis": "本题考查直线职能制。直线职能制便于严格遵守各自的职责，比较适应现代企业管理的要求，因此\n，它是当前企业较多采用的组织形式。\n掌握“直线职能制、矩阵制”知识点。\n23.现代企业部门划分的方法中，（ ）是按照地理范围来划分管理部门。\nA.产品部门化\nB.区域部门化\nC.职能部门化\nD.服务对象部门化"}, {"question": "产品部门化的优点是（ ）。", "options": [{"label": "A", "text": "培养独当一面的管理人才"}, {"label": "B", "text": "降低了主管部门控制、协调的难度"}, {"label": "C", "text": "充分发挥人员的技能和专业知识"}, {"label": "D", "text": "能充分发挥专业优势"}], "answer": "C", "analysis": "本题考查区域部门化。区域部门化是指按照地理范围来划分管理部门。\n掌握“直线关系与参谋关系、部门化”知识点。\n24.产品部门化的优点是（ ）。\nA.培养独当一面的管理人才\nB.降低了主管部门控制、协调的难度\nC.充分发挥人员的技能和专业知识\nD.能充分发挥专业优势"}, {"question": "电子商务人员的能力要求包括智能和体能两个基本方面，下列不属于智能要素的是（ ）。", "options": [{"label": "A", "text": "智力"}, {"label": "B", "text": "技能"}, {"label": "C", "text": "心理"}, {"label": "D", "text": "知识"}], "answer": "C", "analysis": "本题考查现代企业部门划分的主要方法。按产品划分部门有利于发挥专用设备效能，充分发挥人员\n的技能和专业知识，同时有利于部门内的协调，以及产品的增长和发展。\n掌握“直线关系与参谋关系、部门化”知识点。\n25.电子商务人员的能力要求包括智能和体能两个基本方面，下列不属于智能要素的是（ ）。\nA.智力\nB.技能\nC.心理\nD.知识"}, {"question": "企业之间暂时性的组织形式为（ ）。", "options": [{"label": "A", "text": "虚拟企业组织模式"}, {"label": "B", "text": "战略联盟组织模式"}, {"label": "C", "text": "扁平化组织模式"}, {"label": "D", "text": "学习型组织模式"}], "answer": "B", "analysis": "本题考查电子商务组织的构成要素。电子商务人员的能力要求包括智能和体能两个基本方面，其中\n，智能要素至关重要，它包括三个方面的基本内容：①智力，②知识，③技能。\n掌握“新型企业组织模式”知识点。\n26.企业之间暂时性的组织形式为（ ）。\n5\nA.虚拟企业组织模式\nB.战略联盟组织模式\nC.扁平化组织模式\nD.学习型组织模式"}, {"question": "学习型组织的五项修炼中，（ ）是最基本的修炼方式，也是最重要的修炼方式。", "options": [{"label": "A", "text": "自我超越"}, {"label": "B", "text": "改善心智模式"}, {"label": "C", "text": "建立共同愿景"}, {"label": "D", "text": "团队学习"}], "answer": "D", "analysis": "本题考查战略联盟组织模式的含义。战略联盟组织模式就是不同的企业为了达到某一目的而通过契\n约形式形成的联合体，是企业之间暂时性的组织形式。\n掌握“新型企业组织模式”知识点。\n27.学习型组织的五项修炼中，（ ）是最基本的修炼方式，也是最重要的修炼方式。\nA.自我超越\nB.改善心智模式\nC.建立共同愿景\nD.团队学习"}, {"question": "目前国外大型企业普遍采用的一种管理组织形式为（ ）。", "options": [{"label": "A", "text": "企业集团结构"}, {"label": "B", "text": "事业部制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "职能制"}], "answer": "B", "analysis": "本题考查学习型组织的五项修炼。团队学习是一种最基本的修炼方式，也是最重要的修炼方式。\n掌握“新型企业组织模式”知识点。\n28.目前国外大型企业普遍采用的一种管理组织形式为（ ）。\nA.企业集团结构\nB.事业部制\nC.矩阵制\nD.职能制"}, {"question": "在企业组织设计中一个下级只能服从一个上级领导，遵循了企业组织设计原则中的（ ）。", "options": [{"label": "A", "text": "统一指挥原则"}, {"label": "B", "text": "权责对等原则"}, {"label": "C", "text": "分工与协作原则"}, {"label": "D", "text": "精简原则"}], "answer": "A", "analysis": "本题考查事业部制。事业部制又叫联邦分权制，它是目前国外大型企业普遍采用的一种管理组织形\n式。\n掌握“事业部制、企业集团结构”知识点。\n29.在企业组织设计中一个下级只能服从一个上级领导，遵循了企业组织设计原则中的（ ）。\nA.统一指挥原则\nB.权责对等原则\nC.分工与协作原则\nD.精简原则"}, {"question": "根据企业生命周期理论，当企业经营权与所有权部分分离时，该企业处于（ ）。", "options": [{"label": "A", "text": "创业阶段"}, {"label": "B", "text": "集体化阶段"}, {"label": "C", "text": "规范化阶段"}, {"label": "D", "text": "精细化阶段"}], "answer": "B", "analysis": "本题考查企业组织设计的原则。统一指挥原则：在企业组织设计中就要遵循一个下级只能服从一个\n上级领导的原则，将各个管理职务形成一条连续的管理等级链，同时明确规定链条中职务之间的责任、权力\n关系。\n掌握“企业组织设计的任务、依据和原则”知识点。\n30.根据企业生命周期理论，当企业经营权与所有权部分分离时，该企业处于（ ）。\nA.创业阶段\nB.集体化阶段\nC.规范化阶段\nD.精细化阶段"}, {"question": "由于企业内部推诿卸责现象增多，因而缺乏创新，企业高层的控制力减弱。这体现了企业组织生命周期中 的（ ）。", "options": [{"label": "A", "text": "创业阶段"}, {"label": "B", "text": "集体化阶段"}, {"label": "C", "text": "规范化阶段"}, {"label": "D", "text": "精细阶段"}], "answer": "D", "analysis": "本题考查企业的集体化阶段。处于集体化阶段的企业，其管理逐步规范化，已经形成一定的工作程\n6\n序和规章制度，分工开始明细，企业内机构增加，内部的沟通和协调也随之增加，企业的产品或服务比较集\n中，开始引入职业经理人，出现了经营权和所有权部分分离的现象。\n掌握“企业生命周期、企业变革的动因”知识点。\n31.由于企业内部推诿卸责现象增多，因而缺乏创新，企业高层的控制力减弱。这体现了企业组织生命周期中\n的（ ）。\nA.创业阶段\nB.集体化阶段\nC.规范化阶段\nD.精细阶段"}, {"question": "以完整的最终产品为对象的专业化是（ ）。", "options": [{"label": "A", "text": "部门专业化"}, {"label": "B", "text": "产品专业化"}, {"label": "C", "text": "工艺专业化"}, {"label": "D", "text": "零部件专业化"}], "answer": "B", "analysis": "本题考查企业的精细阶段。处于精细阶段的企业，往往会出现老化问题，企业经营者逐渐丧失灵活\n性，企业内官僚作风兴起，沟通和决策速度减慢。由于企业内部推诿卸责现象增多，因而缺乏创新，企业高\n层的控制力减弱。\n掌握“企业生命周期、企业变革的动因”知识点。\n32.以完整的最终产品为对象的专业化是（ ）。\nA.部门专业化\nB.产品专业化\nC.工艺专业化\nD.零部件专业化"}, {"question": "在组织中，绝对的集权意味着（ ）。", "options": [{"label": "A", "text": "没有参谋"}, {"label": "B", "text": "没有职能部门"}, {"label": "C", "text": "没有下层主管人员"}, {"label": "D", "text": "没有上级主管人员"}], "answer": "C", "analysis": "本题考查产品专业化的概念。产品专业化即以完整的最终产品为对象的专业化。\n掌握“劳动分工与专业化”知识点。\n33.在组织中，绝对的集权意味着（ ）。\nA.没有参谋\nB.没有职能部门\nC.没有下层主管人员\nD.没有上级主管人员"}, {"question": "在组织中，管理层次与管理幅度之间的关系是（ ）。", "options": [{"label": "A", "text": "正比关系"}, {"label": "B", "text": "反比关系"}, {"label": "C", "text": "相等关系"}, {"label": "D", "text": "关系依情况变化而不同"}], "answer": "B", "analysis": "本题考查集权与分权的含义。因为职权的绝对分散意味着没有上级主管人员；而职权的绝对集中则\n意味着没有下层主管人员。\n掌握“集权、分权和授权”知识点。\n34.在组织中，管理层次与管理幅度之间的关系是（ ）。\nA.正比关系\nB.反比关系\nC.相等关系\nD.关系依情况变化而不同"}, {"question": "企业内部分工能提高企业生产效率，其主要表现有（ ）。", "options": [{"label": "A", "text": "分工可以使劳动者的劳动技巧获得提高"}, {"label": "B", "text": "专业化经营的企业可以更好地改进技术、节约原材料和提高生产效率"}, {"label": "C", "text": "分工能促进先进劳动工具、机器的发明和使用"}, {"label": "D", "text": "分工增加了劳动转换时间"}], "answer": "ACE", "analysis": "本题考查管理层次与管理幅度的关系。管理幅度与管理层次具有直接和密切的关系，其中，管理层\n次受到管理幅度的制约和影响。对于一个特定的组织，其管理幅度越大，则需要设置的管理层次就越少；而\n管理幅度越小，则所需设置的管理层次越多，两者成反比关系。\n掌握“管理幅度与管理层次”知识点。\n7\n多项选择题\n35.企业内部分工能提高企业生产效率，其主要表现有（ ）。\nA.分工可以使劳动者的劳动技巧获得提高\nB.专业化经营的企业可以更好地改进技术、节约原材料和提高生产效率\nC.分工能促进先进劳动工具、机器的发明和使用\nD.分工增加了劳动转换时间\nE.分工便于生产要素重组，从而使各要素充分发挥优势，并相互协调"}, {"question": "ACE 【解析】企业内部分工可以减少企业投入和增加产出，从而提高生产效率： （1）分工可以使劳动者的劳动技巧获得提高。 （2）分工能减少劳动转换时间。 （3）分工促进了先进劳动工具和机器的发明和使用。 （4）分工便于对生产要素进行重组，从而使各要素充分发挥优势，并相互协调，提高生产效率。 36.下列关于管理幅度与管理层次的说法正确的有（ ）。 E.管理幅度与管理层次成正比例关系", "options": [{"label": "A", "text": "管理幅度指一个主管能够直接有效地指挥和监督下属的数量"}, {"label": "B", "text": "扁平结构是指在特定规模的组织中，管理幅度较大，管理层次较少的一种组织结构形态"}, {"label": "C", "text": "锥形结构是指管理幅度较小，管理层次较多，呈金字塔状的组织结构形态"}, {"label": "D", "text": "管理幅度与管理层次成反比例关系"}], "answer": "ABCD", "analysis": "企业内部分工可以减少企业投入和增加产出，从而提高生产效率：\n（1）分工可以使劳动者的劳动技巧获得提高。\n（2）分工能减少劳动转换时间。\n（3）分工促进了先进劳动工具和机器的发明和使用。\n（4）分工便于对生产要素进行重组，从而使各要素充分发挥优势，并相互协调，提高生产效率。\n36.下列关于管理幅度与管理层次的说法正确的有（ ）。\nA.管理幅度指一个主管能够直接有效地指挥和监督下属的数量\nB.扁平结构是指在特定规模的组织中，管理幅度较大，管理层次较少的一种组织结构形态\nC.锥形结构是指管理幅度较小，管理层次较多，呈金字塔状的组织结构形态\nD.管理幅度与管理层次成反比例关系\nE.管理幅度与管理层次成正比例关系"}, {"question": "引起公司变革的外部环境有（ ）。", "options": [{"label": "A", "text": "科学技术"}, {"label": "B", "text": "社会环境"}, {"label": "C", "text": "政治法律环境"}, {"label": "D", "text": "经济环境"}], "answer": "ABCD", "analysis": "选项E错误，对于一个特定的组织，其管理幅度越大，则需要设置的管理层次就越少；而管理幅度越\n小，则所需要设置的管理层次越多，两者成反比关系。\n37.引起公司变革的外部环境有（ ）。\nA.科学技术\nB.社会环境\nC.政治法律环境\nD.经济环境\nE.企业规模的扩大"}, {"question": "企业划分部门最常见、最普遍的方法有（ ）。", "options": [{"label": "A", "text": "职能部门化"}, {"label": "B", "text": "产品部门化"}, {"label": "C", "text": "过程部门化"}, {"label": "D", "text": "服务对象部门化"}], "answer": "ABE", "analysis": "企业变革的外部驱动因素有技术、政治与法律、经济、社会等因素。\n38.企业划分部门最常见、最普遍的方法有（ ）。\nA.职能部门化\nB.产品部门化\nC.过程部门化\nD.服务对象部门化\nE.区域部门化"}, {"question": "ABE 【解析】本题考查现代企业部门划分的主要方法。现代企业部门划分的主要方法包括：职能部门化、产品部 门化、区域部门化，这三种类型是企业划分部门最常见、最普遍的方法。除这三种方法之外，企业还可以根 据具体情况采用服务对象部门化、过程部门化、综合部门化等方法，以使企业所建立的组织结构更有利于企 业经营管理目标的实现。 掌握“直线关系与参谋关系、部门化”知识点。 8 39.一般而言，企业电子商务职能部门主要设置的岗位有（ ）。 E.工勤技能岗位", "options": [{"label": "A", "text": "技术岗位"}, {"label": "B", "text": "网络营销岗位"}, {"label": "C", "text": "网站编辑岗位"}, {"label": "D", "text": "行政管理岗位"}], "answer": "ABC", "analysis": "本题考查现代企业部门划分的主要方法。现代企业部门划分的主要方法包括：职能部门化、产品部\n门化、区域部门化，这三种类型是企业划分部门最常见、最普遍的方法。除这三种方法之外，企业还可以根\n据具体情况采用服务对象部门化、过程部门化、综合部门化等方法，以使企业所建立的组织结构更有利于企\n业经营管理目标的实现。\n掌握“直线关系与参谋关系、部门化”知识点。\n8\n39.一般而言，企业电子商务职能部门主要设置的岗位有（ ）。\nA.技术岗位\nB.网络营销岗位\nC.网站编辑岗位\nD.行政管理岗位\nE.工勤技能岗位"}, {"question": "战略联盟的基本形式有（ ）。", "options": [{"label": "A", "text": "合资企业式联盟"}, {"label": "B", "text": "功能协议式联盟"}, {"label": "C", "text": "股权参与式联盟"}, {"label": "D", "text": "框架协议式联盟"}], "answer": "ABCD", "analysis": "本题考查部门型组织结构。一般而言，企业电子商务职能部门主要设置以下三类岗位：①技术岗位\n，②网络营销岗位，③网站编辑岗位。\n掌握“新型企业组织模式”知识点。\n40.战略联盟的基本形式有（ ）。\nA.合资企业式联盟\nB.功能协议式联盟\nC.股权参与式联盟\nD.框架协议式联盟\nE.职能结构式联盟"}, {"question": "按产权关系可以把集团中的企业划分为（ ）。", "options": [{"label": "A", "text": "非控股公司"}, {"label": "B", "text": "全资子公司"}, {"label": "C", "text": "控股子公司"}, {"label": "D", "text": "参股子公司"}], "answer": "BCD", "analysis": "本题考查战略联盟的基本形式。战略联盟的基本形式包括以下几种：合资企业式联盟、功能协议式\n联盟、股权参与式联盟、框架协议式联盟、同业俱乐部联盟。\n掌握“新型企业组织模式”知识点。\n41.按产权关系可以把集团中的企业划分为（ ）。\nA.非控股公司\nB.全资子公司\nC.控股子公司\nD.参股子公司\nE.关联子公司"}, {"question": "企业组织设计的任务有（ ）。", "options": [{"label": "A", "text": "研究与开发"}, {"label": "B", "text": "提供组织结构系统图"}, {"label": "C", "text": "编制职务说明书"}, {"label": "D", "text": "分析财务构成"}], "answer": "BC", "analysis": "本题考查企业集团结构。按产权关系可以把集团中的企业划分为全资子公司、控股子公司和参股子\n公司。\n掌握“事业部制、企业集团结构”知识点。\n42.企业组织设计的任务有（ ）。\nA.研究与开发\nB.提供组织结构系统图\nC.编制职务说明书\nD.分析财务构成\nE.设计组织结构"}, {"question": "按照分工与专业化发展的顺序，专业化形态包括（ ）。 9", "options": [{"label": "A", "text": "部门专业化"}, {"label": "B", "text": "管理专业化"}, {"label": "C", "text": "产品专业化"}, {"label": "D", "text": "工艺专业化"}], "answer": "ACDE", "analysis": "本题考查企业组织设计的任务。企业组织设计的任务主要由两部分构成：一是提供组织结构系统图\n；二是编制职务说明书。\n掌握“企业组织设计的任务、依据和原则”知识点。\n43.按照分工与专业化发展的顺序，专业化形态包括（ ）。\nA.部门专业化\n9\nB.管理专业化\nC.产品专业化\nD.工艺专业化\nE.零部件专业化"}], "第三章 市场营销管理": [{"question": "第三章 市场营销管理 单项选择题 1.受心理因素影响较大，易屈服于权威或大多数人的意见，而忽视少数派意见的市场预测方法是（ ）。", "options": [{"label": "A", "text": "头脑风暴法"}, {"label": "B", "text": "交锋式会议法"}, {"label": "C", "text": "混合式会议法"}, {"label": "D", "text": "德尔菲法"}], "answer": "C", "analysis": ""}, {"question": "按照消费者的生活方式、个性等心理变量来细分消费者市场的过程称为（ ）。", "options": [{"label": "A", "text": "地理细分"}, {"label": "B", "text": "人口细分"}, {"label": "C", "text": "心理细分"}, {"label": "D", "text": "行为细分"}], "answer": "C", "analysis": "本题考查混合式会议法。混合式会议法本身仍有缺点和弊端，即受心理因素影响较大，易屈服于权\n威或大多数人的意见，而忽视少数派的意见。\n掌握“专家会议法”知识点。\n2.按照消费者的生活方式、个性等心理变量来细分消费者市场的过程称为（ ）。\nA.地理细分\nB.人口细分\nC.心理细分\nD.行为细分"}, {"question": "资源有限的中小型企业，或者是初次进入某个市场的大型企业一般实行（ ）。", "options": [{"label": "A", "text": "渗透性营销策略"}, {"label": "B", "text": "差异性营销策略"}, {"label": "C", "text": "无差异营销策略"}, {"label": "D", "text": "集中性营销策略"}], "answer": "D", "analysis": "本题考查市场细分。心理细分，是指企业按照消费者的个性、购买动机、生活方式、追求利益等心\n理变量不同，把市场分割成不同消费者群体的过程。\n掌握“营销战略设计”知识点。\n3.资源有限的中小型企业，或者是初次进入某个市场的大型企业一般实行（ ）。\nA.渗透性营销策略\nB.差异性营销策略\nC.无差异营销策略\nD.集中性营销策略"}, {"question": "某商场某年度1-8月份的产品销售额（单位：万元）分别为：200、213、208、206、213、205、209、207。 若采用简单移动平均法进行预测，当选取跨越期N＝3时，其第8月份的绝对误差为（ ）万元。", "options": [{"label": "A", "text": "1"}, {"label": "B", "text": "2"}, {"label": "C", "text": "3"}, {"label": "D", "text": "4"}], "answer": "B", "analysis": "本题考查目标市场营销战略的选择。实行集中性营销战略的企业一般多为资源有限的中小型企业\n，或者是初次进人某个市场的大型企业。\n掌握“营销战略设计”知识点。\n4.某商场某年度1-8月份的产品销售额（单位：万元）分别为：200、213、208、206、213、205、209、207。\n若采用简单移动平均法进行预测，当选取跨越期N＝3时，其第8月份的绝对误差为（ ）万元。\nA.1\nB.2\nC.3\nD.4"}, {"question": "采用移动平均法对产品的需求量进行预测，依据的基本原理是（ ）。", "options": [{"label": "A", "text": "惯性原理"}, {"label": "B", "text": "因果原理"}, {"label": "C", "text": "类推原理"}, {"label": "D", "text": "概率原理"}], "answer": "A", "analysis": "本题考查简单平均移动法。计算第8月份绝对误差，首先要计算第8月份的预测值\n＝（213＋205＋209）÷3＝209，绝对误差＝209－207＝2（万元）。\n掌握“移动平均法”知识点。\n5.采用移动平均法对产品的需求量进行预测，依据的基本原理是（ ）。\nA.惯性原理\nB.因果原理\n1\nC.类推原理\nD.概率原理"}, {"question": "开展市场预测工作的第一步是（ ）。", "options": [{"label": "A", "text": "选择预测方法"}, {"label": "B", "text": "确定预测目标"}, {"label": "C", "text": "搜集资料"}, {"label": "D", "text": "预测分析"}], "answer": "B", "analysis": "本题考查市场预测原理。任何事物的发展都具有一定惯性，即在一定时间、一定条件下保持原来的\n趋势和状态，这是市场预测的理论基础。惯性原理在移动平均法中得到了很好的运用。\n掌握“市场预测的定义及原理、内容”知识点。\n6.开展市场预测工作的第一步是（ ）。\nA.选择预测方法\nB.确定预测目标\nC.搜集资料\nD.预测分析"}, {"question": "产品生产批量小，制造成本高，广告费用大，销售价格偏高，销售量极为有限，企业通常不能获利，反而 可能亏损。从生命周期看，该产品处于（ ）。", "options": [{"label": "A", "text": "引入阶段"}, {"label": "B", "text": "成长阶段"}, {"label": "C", "text": "成熟阶段"}, {"label": "D", "text": "衰退阶段"}], "answer": "A", "analysis": "本题考查市场预测的步骤。明确目标是开展市场预测工作的第一步。\n掌握“市场预测的步骤及误差”知识点。\n7.产品生产批量小，制造成本高，广告费用大，销售价格偏高，销售量极为有限，企业通常不能获利，反而\n可能亏损。从生命周期看，该产品处于（ ）。\nA.引入阶段\nB.成长阶段\nC.成熟阶段\nD.衰退阶段"}, {"question": "组合的（ ）是指企业产品线中每一产品有多少品种。", "options": [{"label": "A", "text": "关联度"}, {"label": "B", "text": "长度"}, {"label": "C", "text": "宽度"}, {"label": "D", "text": "深度"}], "answer": "D", "analysis": "本题考查产品生命周期及营销策略。产品引入阶段具有销售量少、制造成本高、促销费用高、销售\n利润低的特点。\n掌握“市场营销组合设计”知识点。\n8.组合的（ ）是指企业产品线中每一产品有多少品种。\nA.关联度\nB.长度\nC.宽度\nD.深度"}, {"question": "有能力采取独立行动，且其长期地位不受竞争者行为影响的企业类型属于（ ）。", "options": [{"label": "A", "text": "主宰型"}, {"label": "B", "text": "强壮型"}, {"label": "C", "text": "优势型"}, {"label": "D", "text": "防守型"}], "answer": "B", "analysis": "本题考查产品组合长度的概念。深度，指企业产品线中每一产品有多少品种。\n掌握“市场营销组合设计”知识点。\n9.有能力采取独立行动，且其长期地位不受竞争者行为影响的企业类型属于（ ）。\nA.主宰型\nB.强壮型\nC.优势型\nD.防守型"}, {"question": "用以测量市场特征质的差异的测量尺度是（ ）。", "options": [{"label": "A", "text": "定类尺度"}, {"label": "B", "text": "定序尺度"}, {"label": "C", "text": "定距尺度"}, {"label": "D", "text": "定比尺度"}], "answer": "A", "analysis": "本题考查竞争者实力和市场地位识别。强壮型企业有能力采取独立的行动，且其长期地位不受竞争\n者行为的影响。\n掌握“市场调研分析”知识点。\n2\n10.用以测量市场特征质的差异的测量尺度是（ ）。\nA.定类尺度\nB.定序尺度\nC.定距尺度\nD.定比尺度"}, {"question": "对所研究的市场现象、市场因素做客观全面反映的市场调查是（ ）。", "options": [{"label": "A", "text": "探测性市场调查"}, {"label": "B", "text": "因果性市场调查"}, {"label": "C", "text": "描述性市场调查"}, {"label": "D", "text": "预测性市场调查"}], "answer": "C", "analysis": "本题考查调查问卷的测量尺度。定类尺度是用以测量市场特征质的差异。\n掌握“市场调查方案设计”知识点。\n11.对所研究的市场现象、市场因素做客观全面反映的市场调查是（ ）。\nA.探测性市场调查\nB.因果性市场调查\nC.描述性市场调查\nD.预测性市场调查"}, {"question": "在市场调查实践中，大量的市场调查都属于（ ）。", "options": [{"label": "A", "text": "探测性市场调查"}, {"label": "B", "text": "描述性市场调查"}, {"label": "C", "text": "因果性市场调查"}, {"label": "D", "text": "预测性市场调查"}], "answer": "B", "analysis": "本题考查描述性市场调查的概念。描述性市场调查是对所研究的市场现象、市场因素做客观的全面\n反映的市场调查。\n掌握“市场调查的分类”知识点。\n12.在市场调查实践中，大量的市场调查都属于（ ）。\nA.探测性市场调查\nB.描述性市场调查\nC.因果性市场调查\nD.预测性市场调查"}, {"question": "产品生产能力调查和产品实体调查属于市场调查中的（ ）。", "options": [{"label": "A", "text": "市场需求调查"}, {"label": "B", "text": "市场供给调查"}, {"label": "C", "text": "市场营销因素调查"}, {"label": "D", "text": "消费者行为调查"}], "answer": "B", "analysis": "本题考查市场调查的分类。在市场调查实践中，大量的市场调查都属于描述性市场调查，如产品调\n查、销售渠道调查、竞争对手调查等均属于描述性市场调查。\n掌握“市场调查的分类”知识点。\n13.产品生产能力调查和产品实体调查属于市场调查中的（ ）。\nA.市场需求调查\nB.市场供给调查\nC.市场营销因素调查\nD.消费者行为调查"}, {"question": "某饮品企业为调查饮品更换包装的效果，选取A超市为实验组、B超市为控制组，进行有控制组的事前事后 对比实验，实验时间为一个月，实验前后的月销售量数据见下表： 3 该实验的实验变数效果为（ ）箱", "options": [{"label": "A", "text": "20"}, {"label": "B", "text": "40"}, {"label": "C", "text": "110"}, {"label": "D", "text": "130"}], "answer": "A", "analysis": "本题考查市场调查的内容。市场供给调查主要包括产品生产能力调查、产品实体调查等，具体为市\n场能够提供的某一产品的数量、质量、功能、型号、品牌等，以及生产供应企业的情况等。\n掌握“市场调查的定义和内容”知识点。\n14.某饮品企业为调查饮品更换包装的效果，选取A超市为实验组、B超市为控制组，进行有控制组的事前事后\n对比实验，实验时间为一个月，实验前后的月销售量数据见下表：\n3\n该实验的实验变数效果为（ ）箱\nA.20\nB.40\nC.110\nD.130"}, {"question": "要从10000名职工中抽出200名组成一个样本，则10000名职工的名册就是（ ）。", "options": [{"label": "A", "text": "抽样总体"}, {"label": "B", "text": "总体单位"}, {"label": "C", "text": "目标总体"}, {"label": "D", "text": "抽样框"}], "answer": "D", "analysis": "本题考查有控制组的事前事后对比实验。实验变数效果＝实验组变动结果－控制组变动结果\n＝（x2－x1）－（y2－y1）＝（650－520）－（610－500）＝20（箱）。\n掌握“实验调查法”知识点。\n15.要从10000名职工中抽出200名组成一个样本，则10000名职工的名册就是（ ）。\nA.抽样总体\nB.总体单位\nC.目标总体\nD.抽样框"}, {"question": "对某种商品的库存量进行全面调查，各基层单位根据日常业务记录的库存数字，填报到上级统一制定的普 查表中，这属于全面市场调查组织方式中的（ ）。", "options": [{"label": "A", "text": "普查员直接登记式"}, {"label": "B", "text": "被普查者自填式"}, {"label": "C", "text": "简单随机抽样"}, {"label": "D", "text": "分层抽样"}], "answer": "B", "analysis": "本题考查抽样框。抽样框又称为抽样框架或抽样结构，是指对可以选择作为样本的总体单位列出名\n册排序编号，以确定总体的抽样范围和结构。例如，要从10000名职工中抽出200名组成一个样本，则10000名\n职工的名册就是抽样框。\n掌握“全面市场调查、抽样市场调查的基本概念”知识点。\n16.对某种商品的库存量进行全面调查，各基层单位根据日常业务记录的库存数字，填报到上级统一制定的普\n查表中，这属于全面市场调查组织方式中的（ ）。\nA.普查员直接登记式\nB.被普查者自填式\nC.简单随机抽样\nD.分层抽样"}, {"question": "下列选项中，既是趋势外推法中最基本的方法，也是预测实践中最常用的方法的是（ ）。", "options": [{"label": "A", "text": "直线趋势外推法"}, {"label": "B", "text": "线性外推法"}, {"label": "C", "text": "指数曲线法"}, {"label": "D", "text": "生长曲线法"}], "answer": "A", "analysis": "本题考查全面市场调查。被普查者自填式，即利用调查单位的原始记录和核算资料，由上级制定普\n查表，由下级根据具体情况填报，如对某种商品的库存量进行全面调查，就是各基层单位根据日常业务记录\n的库存数字，填报到上级统一制定的普查表中。\n掌握“全面市场调查、抽样市场调查的基本概念”知识点。\n17.下列选项中，既是趋势外推法中最基本的方法，也是预测实践中最常用的方法的是（ ）。\nA.直线趋势外推法\nB.线性外推法\nC.指数曲线法\nD.生长曲线法"}, {"question": "某企业2018年产品销售额如表所示（单位：亿元），若该企业2019年预计销售额比上年增长10%，一季度 季节指数为49.1%，则用季节指数法预测2019年一季度销售额为（ ）亿元。", "options": [{"label": "A", "text": "1.94"}, {"label": "B", "text": "4.7"}, {"label": "C", "text": "1.87"}, {"label": "D", "text": "3.63"}], "answer": "A", "analysis": "本题考查趋势外推法。直线趋势外推法是趋势外推法中最基本的方法，也是预测实践中最常用的方\n法。\n掌握“趋势外推法”知识点。\n18.某企业2018年产品销售额如表所示（单位：亿元），若该企业2019年预计销售额比上年增长10%，一季度\n季节指数为49.1%，则用季节指数法预测2019年一季度销售额为（ ）亿元。\n4\nA.1.94\nB.4.7\nC.1.87\nD.3.63"}, {"question": "计划严密、操作标准化、可控制的一种观察方法是（ ）。", "options": [{"label": "A", "text": "参与观察法"}, {"label": "B", "text": "非参与观察法"}, {"label": "C", "text": "结构型观察法"}, {"label": "D", "text": "非结构型观察法"}], "answer": "C", "analysis": "本题考查季节指数法。2019年预计季度平均销售额\n：（2.42＋4.14＋5.02＋2.76）×（1＋10%）÷4＝3.9435（亿元）。2019年一季度销售额预测值为\n：3.9435×49.10%＝1.94（亿元）。\n掌握“季节指数法”知识点。\n19.计划严密、操作标准化、可控制的一种观察方法是（ ）。\nA.参与观察法\nB.非参与观察法\nC.结构型观察法\nD.非结构型观察法"}, {"question": "拦截访问法的优点包括（ ）。", "options": [{"label": "A", "text": "调查有深度"}, {"label": "B", "text": "调查区域较广"}, {"label": "C", "text": "易于控制调查质量"}, {"label": "D", "text": "可节省访问费和交通费"}], "answer": "D", "analysis": "本题考查结构型观察法的含义。结构型观察法是一种计划严密、操作标准化、可控制的观察方法。\n掌握“观察法”知识点。\n20.拦截访问法的优点包括（ ）。\nA.调查有深度\nB.调查区域较广\nC.易于控制调查质量\nD.可节省访问费和交通费"}, {"question": "某家电生产厂商采用德尔菲法，选定7名专家对该企业研发的新产品的市场需求量进行预测，最后一轮函 询的数据如下表（单位：万台），若采用中位数法计算，该新产品市场需求量的预测值为（ ）万台。", "options": [{"label": "A", "text": "110"}, {"label": "B", "text": "120"}, {"label": "C", "text": "150"}, {"label": "D", "text": "160"}], "answer": "B", "analysis": "本题考查拦截访问法。拦截访问法的优点：访问地点比较集中（B选项错误），时间短，可节省访问\n费和交通费；对拒访者可以放弃，重新拦截新的受访者，确保样本量不变。拦截访问法的缺点：只能进行简\n单的、大众的问题调查，不适合内容复杂、不能公开的问题的调查（A选项错误）；被调查对象的身份难以判\n别，在调查地点出现具有偶然性，可能影响样本的代表性和调查资料的质量（C选项错误）；拒访率高。\n掌握“访问法”知识点。\n21.某家电生产厂商采用德尔菲法，选定7名专家对该企业研发的新产品的市场需求量进行预测，最后一轮函\n询的数据如下表（单位：万台），若采用中位数法计算，该新产品市场需求量的预测值为（ ）万台。\nA.110\nB.120\nC.150\nD.160"}, {"question": "一般适用于调查总体单位数量较多、总体分布不均匀、各单位之间特征（标志）差异程度比较大的调查总 体的抽样调查是（ ）。", "options": [{"label": "A", "text": "简单随机抽样"}, {"label": "B", "text": "等距抽样"}, {"label": "C", "text": "分层抽样"}, {"label": "D", "text": "整群抽样"}], "answer": "C", "analysis": "本题考查德尔菲法。将各项数据由小到大排列：90、100、110、120、125、150、160。中位数的位\n置是：（n＋1）/2＝（7＋1）/2＝4。所以，该新产品市场需求量的预测值为120（万台）。\n掌握“德尔菲法”知识点。\n5\n22.一般适用于调查总体单位数量较多、总体分布不均匀、各单位之间特征（标志）差异程度比较大的调查总\n体的抽样调查是（ ）。\nA.简单随机抽样\nB.等距抽样\nC.分层抽样\nD.整群抽样"}, {"question": "某洗发水企业通过市场调查，了解最新发布广告的市场反应情况，这种市场调查的内容属于对（ ）的调 查。", "options": [{"label": "A", "text": "市场需求"}, {"label": "B", "text": "市场环境"}, {"label": "C", "text": "市场营销因素"}, {"label": "D", "text": "消费者行为"}], "answer": "C", "analysis": "本题考查分层抽样的适用范围。分层抽样一般适用于调查总体单位数量较多、总体分布不均匀、各\n单位之间特征（标志）差异程度比较大的调查总体。\n掌握“抽样市场调查的类型”知识点。\n23.某洗发水企业通过市场调查，了解最新发布广告的市场反应情况，这种市场调查的内容属于对（ ）的调\n查。\nA.市场需求\nB.市场环境\nC.市场营销因素\nD.消费者行为"}, {"question": "某啤酒生产企业在大型超市进行市场调查，了解家庭购买啤酒的品牌、购买量和购买者的信息，该企业市 场调查的内容属于对（ ）的调查。", "options": [{"label": "A", "text": "市场需求"}, {"label": "B", "text": "市场环境"}, {"label": "C", "text": "市场营销因素"}, {"label": "D", "text": "消费者行为"}], "answer": "D", "analysis": "本题考查市场调查的内容。市场营销因素调查主要包括产品、价格、渠道和促销的调查。促销活动\n调查主要包括各种促销活动的效果，如广告实施的效果、人员推销的效果、营业推广的效果和对外宣传的市\n场反应等。\n24.某啤酒生产企业在大型超市进行市场调查，了解家庭购买啤酒的品牌、购买量和购买者的信息，该企业市\n场调查的内容属于对（ ）的调查。\nA.市场需求\nB.市场环境\nC.市场营销因素\nD.消费者行为"}, {"question": "某化妆品企业在大型超市进行市场调查，了解消费者购买化妆品的品牌、评价标准、购买量，以及购买者 的信息，根据市场调查目的进行分类，该企业进行的这种市场调查属于（ ）。", "options": [{"label": "A", "text": "描述性市场调查"}, {"label": "B", "text": "探测性市场调查"}, {"label": "C", "text": "因果性市场调查"}, {"label": "D", "text": "预测性市场调查"}], "answer": "A", "analysis": "本题考查市场调查的内容。消费者行为调查，主要调查消费者的消费决策、购买什么、购买多少、\n何时购买、信息渠道来自何处、由谁购买、如何购买等方面。\n25.某化妆品企业在大型超市进行市场调查，了解消费者购买化妆品的品牌、评价标准、购买量，以及购买者\n的信息，根据市场调查目的进行分类，该企业进行的这种市场调查属于（ ）。\nA.描述性市场调查\nB.探测性市场调查\nC.因果性市场调查\nD.预测性市场调查"}, {"question": "关于市场调查报告的说法，错误的是（ ）。", "options": [{"label": "A", "text": "市场调查报告通常包括前言、正文和附录三部分"}, {"label": "B", "text": "市场调查报告要满足用户市场调查目的的需要"}, {"label": "C", "text": "市场调查报告需采取定量数据分析，尽量减少定性分析"}, {"label": "D", "text": "撰写市场调查报告应遵循必要的撰写步骤"}], "answer": "C", "analysis": "本题考查市场调查的分类。描述性市场调查是对所研究的市场现象、市场因素做客观的、全面反映\n的市场调查。\n26.关于市场调查报告的说法，错误的是（ ）。\nA.市场调查报告通常包括前言、正文和附录三部分\nB.市场调查报告要满足用户市场调查目的的需要\n6\nC.市场调查报告需采取定量数据分析，尽量减少定性分析\nD.撰写市场调查报告应遵循必要的撰写步骤"}, {"question": "关于全面市场调查的说法，错误的是（ ）。", "options": [{"label": "A", "text": "全面市场调查也称为市场普查"}, {"label": "B", "text": "全面市场调查的调查时点应根据各地调查情况进行差异化选择"}, {"label": "C", "text": "全面市场调查应规定统一的调查项目和指标"}, {"label": "D", "text": "全面市场调查一般比抽样市场调查时间长、费用高"}], "answer": "B", "analysis": "本题考查确定市场调查报告的形式。选项C错误，撰写调查报告应注意定量分析与定性分析相结合。\n27.关于全面市场调查的说法，错误的是（ ）。\nA.全面市场调查也称为市场普查\nB.全面市场调查的调查时点应根据各地调查情况进行差异化选择\nC.全面市场调查应规定统一的调查项目和指标\nD.全面市场调查一般比抽样市场调查时间长、费用高"}, {"question": "实验调查法的优点不包括（ ）。", "options": [{"label": "A", "text": "具有一定的主动性"}, {"label": "B", "text": "具有说服力"}, {"label": "C", "text": "具有客观性"}, {"label": "D", "text": "调查费用低"}], "answer": "D", "analysis": "本题考查全面市场调查。全面市场调查应规定统一的市场调查资料所属的标准时点（也叫调查时点\n）。\n28.实验调查法的优点不包括（ ）。\nA.具有一定的主动性\nB.具有说服力\nC.具有客观性\nD.调查费用低"}, {"question": "服装生产企业的市场调查人员装扮成普通消费者进入商场调查本企业服装的销售环境、销售服务质量和消 费者的购买行为，这种市场调查的方法属于（ ）。", "options": [{"label": "A", "text": "跟踪调查法"}, {"label": "B", "text": "参与性观察法"}, {"label": "C", "text": "痕迹观察法"}, {"label": "D", "text": "遥感观察法"}], "answer": "B", "analysis": "本题考查实验调查法的优缺点。D选项，调查费用高属于实验调查的缺点，所以错误。\n29.服装生产企业的市场调查人员装扮成普通消费者进入商场调查本企业服装的销售环境、销售服务质量和消\n费者的购买行为，这种市场调查的方法属于（ ）。\nA.跟踪调查法\nB.参与性观察法\nC.痕迹观察法\nD.遥感观察法"}, {"question": "某饮品企业为调查饮品更换包装的效果，选取A超市为实验组、B超市为控制组，进行有控制组的事前事后 对比实验，实验时间为一个月，实验前后的月销售量数据见下表： 该实验的实验变数效果为 真实值的比值。一般来说，相对误差越\n小，预测的准确程度越高，相对误差比绝对误差更能反映预测的可信程度。\n34.某电子商务企业邀请有关专家对未来电子商务市场发展趋势进行预测。在专家会议中，专家围绕主题各自\n发表意见，每位专家均可对他人意见进行批评和质疑，最后在充分争论的前提下达成共识，形成比较一致的\n预测结论，该企业所采用的这种方法是（ ）。\nA.头脑风暴法\nB.交锋式会议法\nC.混合式会议法\nD.访问法"}, {"question": "某企业采用德尔菲法进行市场预测，选定10名专家对其研发的新产品的市场需求量进行预测，最后一轮函 询的数据见下表： 若采用中位数法计算，该新产品市场需求量的预测值为（ ）万台。", "options": [{"label": "A", "text": "115.5"}, {"label": "B", "text": "116.0"}, {"label": "C", "text": "118.0"}, {"label": "D", "text": "120.6"}], "answer": "C", "analysis": "本题考查专家会议法。交锋式会议法是与会专家围绕一个主题，各自发表意见，并进行充分争论\n，最后达成共识，取得比较一致的预测结论。\n8\n35.某企业采用德尔菲法进行市场预测，选定10名专家对其研发的新产品的市场需求量进行预测，最后一轮函\n询的数据见下表：\n若采用中位数法计算，该新产品市场需求量的预测值为（ ）万台。\nA.115.5\nB.116.0\nC.118.0\nD.120.6"}, {"question": "某企业采用德尔菲法进行市场预测，选定9名专家对研发的新产品的市场需求量进行预测，最后一轮函数 的数据见下表： 若采用中位数法计算，该新产品市场需求量的预测值为（ ）万台。", "options": [{"label": "A", "text": "110"}, {"label": "B", "text": "114"}, {"label": "C", "text": "115"}, {"label": "D", "text": "118"}], "answer": "B", "analysis": "本题考查德尔菲法。首先将预测值进行依次排序：90、105、110、115、116、120、128、129、\n130、135。然后，确定中位数的位置为：Me＝（n＋1）÷2＝（10＋1）÷2＝5.5，116和120分别排在第五位\n、第六位，求平均数即可。（116＋120）÷2＝118（万台）。\n36.某企业采用德尔菲法进行市场预测，选定9名专家对研发的新产品的市场需求量进行预测，最后一轮函数\n的数据见下表：\n若采用中位数法计算，该新产品市场需求量的预测值为（ ）万台。\nA.110\nB.114\nC.115\nD.118"}, {"question": "某专营商场采用直线趋势法预测明年一季度的销售额为400万元，对应的季节指数平均值为0.8，根据季节 指数法，明年一季度的销售额预计为（ ）万元。", "options": [{"label": "A", "text": "320"}, {"label": "B", "text": "360"}, {"label": "C", "text": "450"}, {"label": "D", "text": "500"}], "answer": "A", "analysis": "本题考查德尔菲法。首先将预测值进行依次排序：87、90、96、105、114、117、120、126、135。\n然后，确定中位数的位置为：Me＝（n＋1）÷2＝（9＋1）÷2＝5。因此，第5位即114为中位数。\n37.某专营商场采用直线趋势法预测明年一季度的销售额为400万元，对应的季节指数平均值为0.8，根据季节\n指数法，明年一季度的销售额预计为（ ）万元。\nA.320\nB.360\nC.450\nD.500"}, {"question": "某一行业中存在非常多的独立卖主，每个卖主只供应市场需求量的很小一部分，他们都以相同的方式向市 场提供同类的、标准化的商品，按照企业所处行业的竞争识别，该行业属于（ ）。", "options": [{"label": "A", "text": "完全垄断行业"}, {"label": "B", "text": "完全竞争行业"}, {"label": "C", "text": "不完全寡头垄断行业"}, {"label": "D", "text": "垄断竞争行业"}], "answer": "B", "analysis": "本题考查季节指数法。400×0.8＝320（万元）。\n38.某一行业中存在非常多的独立卖主，每个卖主只供应市场需求量的很小一部分，他们都以相同的方式向市\n场提供同类的、标准化的商品，按照企业所处行业的竞争识别，该行业属于（ ）。\nA.完全垄断行业\nB.完全竞争行业\nC.不完全寡头垄断行业\nD.垄断竞争行业\n9"}, {"question": "消费者对品牌差异大，功效近似的产品，不愿多花时间进行选择，而随意购买的一种行为属于（ ）。", "options": [{"label": "A", "text": "寻求多样化的购买行为"}, {"label": "B", "text": "复杂的购买行为"}, {"label": "C", "text": "减少失调感的购买行为"}, {"label": "D", "text": "习惯性的购买行为"}], "answer": "A", "analysis": "完全竞争行业指某一行业中存在非常多的独立卖主，每个卖主只供应市场需求量的很小一部分，他\n们都以相同的方式向市场提供同类的、标准化的商品。\n39.消费者对品牌差异大，功效近似的产品，不愿多花时间进行选择，而随意购买的一种行为属于（ ）。\nA.寻求多样化的购买行为\nB.复杂的购买行为\nC.减少失调感的购买行为\nD.习惯性的购买行为"}, {"question": "某企业为了分散企业风险，在顾客中树立良好的形象，选择向同一顾客群提供性能不同的产品，这种选择 目标市场采用的模式属于（ ）。", "options": [{"label": "A", "text": "产品专业化"}, {"label": "B", "text": "市场专业化"}, {"label": "C", "text": "全面进入"}, {"label": "D", "text": "选择性专业化"}], "answer": "B", "analysis": "寻求多样化的购买行为是指消费者对品牌差异大，功效近似的产品，不愿多花时间进行选择，而随\n意购买的一种行为。\n40.某企业为了分散企业风险，在顾客中树立良好的形象，选择向同一顾客群提供性能不同的产品，这种选择\n目标市场采用的模式属于（ ）。\nA.产品专业化\nB.市场专业化\nC.全面进入\nD.选择性专业化"}, {"question": "某乳制品企业在市场细分的基础上，选择婴幼儿奶粉市场作为目标市场，制定营销组合方案，实行专业化 经营，把企业有限的资源集中使用，该市场上拥有较大的市场占有率。这种目标市场策略属于（ ）。", "options": [{"label": "A", "text": "无差异营销策略"}, {"label": "B", "text": "集中性营销策略"}, {"label": "C", "text": "差异性营销策略"}, {"label": "D", "text": "市场组合营销策略"}], "answer": "B", "analysis": "市场专业化：企业集中力量满足某一特定顾客群的各种需要。\n41.某乳制品企业在市场细分的基础上，选择婴幼儿奶粉市场作为目标市场，制定营销组合方案，实行专业化\n经营，把企业有限的资源集中使用，该市场上拥有较大的市场占有率。这种目标市场策略属于（ ）。\nA.无差异营销策略\nB.集中性营销策略\nC.差异性营销策略\nD.市场组合营销策略"}, {"question": "汽车经销商除了销售汽车外，还提供电动窗户控制器和灯光调节器等产品。这属于产品组合定价中的（ ）。", "options": [{"label": "A", "text": "产品线定价"}, {"label": "B", "text": "互补产品定价"}, {"label": "C", "text": "选择品定价"}, {"label": "D", "text": "产品系列定价"}], "answer": "C", "analysis": "集中性营销战略，指企业在将整体市场分割为若干细分市场后，只选择其中某一细分市场作为目标\n市场，为该市场开发一种商品，实行集中营销。\n42.汽车经销商除了销售汽车外，还提供电动窗户控制器和灯光调节器等产品。这属于产品组合定价中的（\n）。\nA.产品线定价\nB.互补产品定价\nC.选择品定价\nD.产品系列定价"}, {"question": "甲企业的产品组合为3种洗衣粉、4种香皂、5种纸巾和6种洗发水，共18种产品。甲企业的产品组合宽度为 （ ）。", "options": [{"label": "A", "text": "3"}, {"label": "B", "text": "4"}, {"label": "C", "text": "5"}, {"label": "D", "text": "18"}], "answer": "B", "analysis": "选择品定价指在提供主要产品的同时，附带一些可供选择的商品和服务。例如，汽车经销商除了销\n售汽车外，还提供电动窗户控制器和灯光调节器等选择品。给这些选择品制定的价格就属于此类。\n43.甲企业的产品组合为3种洗衣粉、4种香皂、5种纸巾和6种洗发水，共18种产品。甲企业的产品组合宽度为\n（ ）。\nA.3\nB.4\n10\nC.5\nD.18"}, {"question": "甲企业推出一种产品并建立了分销渠道，首先通过代理商将产品销售给批发商，再由批发商销售给零售商 ，最后由零售商销售给消费者。甲企业所建立的分销渠道的类型是（ ）。", "options": [{"label": "A", "text": "零阶渠道"}, {"label": "B", "text": "一阶渠道"}, {"label": "C", "text": "二阶渠道"}, {"label": "D", "text": "三阶渠道"}], "answer": "D", "analysis": "宽度（广度），指企业的产品线总数。\n44.甲企业推出一种产品并建立了分销渠道，首先通过代理商将产品销售给批发商，再由批发商销售给零售商\n，最后由零售商销售给消费者。甲企业所建立的分销渠道的类型是（ ）。\nA.零阶渠道\nB.一阶渠道\nC.二阶渠道\nD.三阶渠道"}, {"question": "专家会议法的优点包括（ ）。", "options": [{"label": "A", "text": "节省时间"}, {"label": "B", "text": "节省费用"}, {"label": "C", "text": "应用灵活方便"}, {"label": "D", "text": "代表性充分"}], "answer": "ABCE", "analysis": "根据渠道中间机构层次数目不同划分，可分为直接渠道和间接渠道。间接渠道又进一步被分为一阶\n渠道、二阶渠道、三阶渠道等。三阶渠道是指商品从生产者转移到最终消费者手中，需要经过三一个中间环\n节。生产者→代理商→批发商→零售商→消费者。\n多项选择题\n45.专家会议法的优点包括（ ）。\nA.节省时间\nB.节省费用\nC.应用灵活方便\nD.代表性充分\nE.有利于各种意见得到修改、补充和完善"}, {"question": "ABCE 【解析】本题考查专家会议法的优点。专家会议法的优点：①与会专家能自由发表意见，各种观点能互相启 发、互相借鉴，有利于集思广益，有利于各种意见得到修改、补充和完善；②节省时间，节省费用，应用灵 活方便。专家会议法的缺点是：由于参加会议的人数有限，因此代表性不充分。 掌握“专家会议法”知识点。 46.实施过程涉及执行与控制方面的内容，核心工作包括（ ）。 E.制定规章制度", "options": [{"label": "A", "text": "明确行动方案"}, {"label": "B", "text": "调整组织结构"}, {"label": "C", "text": "完善规章制度"}, {"label": "D", "text": "协调关键工作流程"}], "answer": "ABCD", "analysis": "本题考查专家会议法的优点。专家会议法的优点：①与会专家能自由发表意见，各种观点能互相启\n发、互相借鉴，有利于集思广益，有利于各种意见得到修改、补充和完善；②节省时间，节省费用，应用灵\n活方便。专家会议法的缺点是：由于参加会议的人数有限，因此代表性不充分。\n掌握“专家会议法”知识点。\n46.实施过程涉及执行与控制方面的内容，核心工作包括（ ）。\nA.明确行动方案\nB.调整组织结构\nC.完善规章制度\nD.协调关键工作流程\nE.制定规章制度"}, {"question": "消费者市场购买行为类型主要有（ ）。", "options": [{"label": "A", "text": "复杂的购买行为"}, {"label": "B", "text": "减少失调感的购买行为"}, {"label": "C", "text": "寻求多样化的购买行为"}, {"label": "D", "text": "习惯性的购买行为"}], "answer": "ABCD", "analysis": "本题考查营销计划的实施。实施过程涉及执行与控制方面的内容，核心工作包括：明确行动方案、\n调整组织结构、完善规章制度、协调关键工作流程等。\n掌握“营销计划的制订和实施”知识点。\n47.消费者市场购买行为类型主要有（ ）。\nA.复杂的购买行为\nB.减少失调感的购买行为\nC.寻求多样化的购买行为\nD.习惯性的购买行为\nE.单一化的购买行为\n11"}, {"question": "自填式问卷是由调查者将问卷交到被调查者手中，由被调查者自己填写的问卷，适用于（ ）。", "options": [{"label": "A", "text": "面谈访问法"}, {"label": "B", "text": "邮寄调查法"}, {"label": "C", "text": "网络调查法"}, {"label": "D", "text": "电话访问法"}], "answer": "ABC", "analysis": "本题考查消费者市场购买行为类型。消费者市场购买行为类型包括：（1）复杂的购买行为\n；（2）减少失调感的购买行为；（3）寻求多样化的购买行为；（4）习惯性的购买行为。\n掌握“市场调研分析”知识点。\n48.自填式问卷是由调查者将问卷交到被调查者手中，由被调查者自己填写的问卷，适用于（ ）。\nA.面谈访问法\nB.邮寄调查法\nC.网络调查法\nD.电话访问法\nE.焦点小组访谈法"}, {"question": "主观概率法的实施步骤包括（ ）。", "options": [{"label": "A", "text": "相关资料的准备"}, {"label": "B", "text": "反馈修正"}, {"label": "C", "text": "编制主观概率调查表"}, {"label": "D", "text": "汇总整理预测结果"}], "answer": "ACDE", "analysis": "本题考查问卷的分类。自填式问卷是由调查者将问卷交到被调查者手中，由被调查者自己填写的问\n卷，适用于面谈访问法、邮寄调查法和网络调查法。\n掌握“市场调查方案设计”知识点。\n49.主观概率法的实施步骤包括（ ）。\nA.相关资料的准备\nB.反馈修正\nC.编制主观概率调查表\nD.汇总整理预测结果\nE.给出最终预测判断结果"}, {"question": "ACDE 【解析】本题考查主观概率法的实施步骤。主观概率法的实施步骤一般包括以下四步：①相关资料的准备 ；②编制主观概率调查表；③汇总整理预测结果；④给出最终预测判断结果。 掌握“集合意见法、主观概率法、对比类推法”知识点。 50.电话访问法的缺点有（ ）。 E.对被调查者的要求较高", "options": [{"label": "A", "text": "调查费用较高"}, {"label": "B", "text": "无法使用辅助工具"}, {"label": "C", "text": "调查的内容难以深入"}, {"label": "D", "text": "对于回答问题的真实性很难做出正确的判断"}], "answer": "BCD", "analysis": "本题考查主观概率法的实施步骤。主观概率法的实施步骤一般包括以下四步：①相关资料的准备\n；②编制主观概率调查表；③汇总整理预测结果；④给出最终预测判断结果。\n掌握“集合意见法、主观概率法、对比类推法”知识点。\n50.电话访问法的缺点有（ ）。\nA.调查费用较高\nB.无法使用辅助工具\nC.调查的内容难以深入\nD.对于回答问题的真实性很难做出正确的判断\nE.对被调查者的要求较高"}, {"question": "下列选项中属于设计误差的有（ ）。", "options": [{"label": "A", "text": "总体定义误差"}, {"label": "B", "text": "汇总误差"}, {"label": "C", "text": "抽样框误差"}, {"label": "D", "text": "测量工具误差"}], "answer": "ACDE", "analysis": "本题考查电话访问法的缺点。电话访问法的缺点：访问的成功率相对较低；无法使用辅助工具；访\n问时间不能过长，调查的内容难以深入，调查总体欠完整；被调查者只限于能够进行电话沟通的范围；对于\n回答问题的真实性很难做出正确的判断。\n掌握“访问法”知识点。\n51.下列选项中属于设计误差的有（ ）。\nA.总体定义误差\nB.汇总误差\nC.抽样框误差\nD.测量工具误差\nE.调查方法选择误差"}, {"question": "ACDE 【解析】本题考查设计误差。设计误差包括总体定义误差、抽样框误差、调查方法选择误差、测量工具误差 等。 掌握“抽样误差与非抽样误差”知识点。 52.关于市场调查的说法，正确的有（ ）。 E.市场调查需求借助科学的方法", "options": [{"label": "A", "text": "市场调查是企业认识市场的活动"}, {"label": "B", "text": "市场调查的重点对象是消费者市场"}, {"label": "C", "text": "市场调查以市场预测为前提"}, {"label": "D", "text": "市场调查是企业控制市场的手段"}], "answer": "ABE", "analysis": "本题考查设计误差。设计误差包括总体定义误差、抽样框误差、调查方法选择误差、测量工具误差\n等。\n掌握“抽样误差与非抽样误差”知识点。\n52.关于市场调查的说法，正确的有（ ）。\nA.市场调查是企业认识市场的活动\nB.市场调查的重点对象是消费者市场\nC.市场调查以市场预测为前提\nD.市场调查是企业控制市场的手段\nE.市场调查需求借助科学的方法"}, {"question": "ABE 【解析】本题考查市场调查的定义。市场调查主要具有以下特点： （1）市场调查是一种有目的、有意识的认识市场的活动。 （2）市场调查的具体对象是市场体系，即市场主体、市场客体、市场媒体。其中需要指出的是，市场调查的 重点对象是消费者市场。 （3）市场调查需要借助科学的方法。 （4）市场调查是为企业的市场预测和经营决策服务的。 53.市场调查根据调查组织形式进行分类，分类包括（ ）。 E.专项市场调查", "options": [{"label": "A", "text": "探测性市场调查"}, {"label": "B", "text": "描述性市场调查"}, {"label": "C", "text": "因果性市场调查"}, {"label": "D", "text": "连续性市场调查"}], "answer": "DE", "analysis": "本题考查市场调查的定义。市场调查主要具有以下特点：\n（1）市场调查是一种有目的、有意识的认识市场的活动。\n（2）市场调查的具体对象是市场体系，即市场主体、市场客体、市场媒体。其中需要指出的是，市场调查的\n重点对象是消费者市场。\n（3）市场调查需要借助科学的方法。\n（4）市场调查是为企业的市场预测和经营决策服务的。\n53.市场调查根据调查组织形式进行分类，分类包括（ ）。\nA.探测性市场调查\nB.描述性市场调查\nC.因果性市场调查\nD.连续性市场调查\nE.专项市场调查"}, {"question": "DE 【解析】ABC属于根据市场调查目的的分类。 54.根据不同的赋值规则，调查问卷的测量尺度可以划分为（ ）。 E.定比尺度", "options": [{"label": "A", "text": "定类尺度"}, {"label": "B", "text": "定距尺度"}, {"label": "C", "text": "定序尺度"}, {"label": "D", "text": "定性尺度"}], "answer": "ABCE", "analysis": "ABC属于根据市场调查目的的分类。\n54.根据不同的赋值规则，调查问卷的测量尺度可以划分为（ ）。\nA.定类尺度\nB.定距尺度\nC.定序尺度\nD.定性尺度\nE.定比尺度"}, {"question": "ABCE 【解析】本题考查调查问卷的测量尺度。根据赋值的规则不同，测量尺度可以划分为定类、定序、定距和定 比尺度。 55.下列抽样方法中，属于随机抽样方法的有（ ）。 E.判断抽样", "options": [{"label": "A", "text": "任意抽样"}, {"label": "B", "text": "整群抽样"}, {"label": "C", "text": "等距抽样"}, {"label": "D", "text": "分层抽样"}], "answer": "BCD", "analysis": "本题考查调查问卷的测量尺度。根据赋值的规则不同，测量尺度可以划分为定类、定序、定距和定\n比尺度。\n55.下列抽样方法中，属于随机抽样方法的有（ ）。\nA.任意抽样\nB.整群抽样\nC.等距抽样\nD.分层抽样\nE.判断抽样"}, {"question": "下列产品构成要素中不属于延伸产品的有（ ）。", "options": [{"label": "A", "text": "产品包装"}, {"label": "B", "text": "质量保证"}, {"label": "C", "text": "技术培训"}, {"label": "D", "text": "修理维护"}], "answer": "AE", "
