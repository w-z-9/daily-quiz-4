"ISO组织在其提出的认证原则与思路中将质量认证归纳为八种类型。其中有供方质量管理体系评定。\n这种认证制度是对供方按既定规范或技术标准生产产品的质量管理体系进行检查.评定，亦称为质量管理体系\n认证。这种认证制度的对象不是产品.而是企业的质量管理体系。\n \n47.企业为创立者所有。企业主本人行使监督.管理和控制的权力，企业缺乏长远规划，具有上述特点的企业\n所处的发展阶段是（）。\nA.精细阶段\nB.创业阶段\nC.规模化阶段\nD.集体化阶段"}, {"question": "机械制造企业进行产品设计的活动属于（）。", "options": [{"label": "A", "text": "生产技术准备过程\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10"}, {"label": "B", "text": "基本生产过程"}, {"label": "C", "text": "辅助生产过程"}, {"label": "D", "text": "生产服务过程"}], "answer": "B", "analysis": "一般来说，处于创业阶段的企业，其创立者也是企业的所有者。企业的管理是非规范的，非常灵活\n的，组织中层次较少，分工也不明确，主要由企业主本人行使监督.管理和控制的权力。这一时期，企业尚缺\n乏长远的规划。\n \n48.机械制造企业进行产品设计的活动属于（）。\nA.生产技术准备过程\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10\nB.基本生产过程\nC.辅助生产过程\nD.生产服务过程"}, {"question": "下列属于多元企业优点的是（）。", "options": [{"label": "A", "text": "扩大经营范围或增宽生产线"}, {"label": "B", "text": "彼此联合，独立核算"}, {"label": "C", "text": "共担风险，共负盈亏"}, {"label": "D", "text": "劳动生产率高，有利于节约成本"}], "answer": "A", "analysis": "生产技术准备过程是指产品在投入生产前所进行的一系列生产技术准备工作，如产品设计.工艺设计\n.工艺装备的设计.标准化工作.定额工作.调整劳动组织和设备布置等。\n \n49.下列属于多元企业优点的是（）。\nA.扩大经营范围或增宽生产线\nB.彼此联合，独立核算\nC.共担风险，共负盈亏\nD.劳动生产率高，有利于节约成本"}, {"question": "企业流动资产为1000万元，其中，存货为550万元，流动负债为300万元，则该企业的速动比率为（）。", "options": [{"label": "A", "text": "1.83"}, {"label": "B", "text": "1.50"}, {"label": "C", "text": "0.67"}, {"label": "D", "text": "0.33"}], "answer": "A", "analysis": "多元企业的优点是能扩大经营范围或增宽产品线，使企业资源的利用程度提高，适应市场变化的能\n力增强，降低经营风险。\n \n50.企业流动资产为1000万元，其中，存货为550万元，流动负债为300万元，则该企业的速动比率为（）。\nA.1.83\nB.1.50\nC.0.67\nD.0.33"}, {"question": "50。", "options": [{"label": "A", "text": "直接材料.燃料和动力费用"}, {"label": "B", "text": "直接人工费用"}, {"label": "C", "text": "制造费用"}, {"label": "D", "text": "管理费用"}], "answer": "B", "analysis": "根据公式：速动比率=(流动资产-存货)/流动负债=（1000-550）/300=1.50。\n \n51.下列属于成本费用中期间费用的是（）。\nA.直接材料.燃料和动力费用\nB.直接人工费用\nC.制造费用\nD.管理费用"}], "冲刺卷（51-100题）": [{"question": "自动线的形成按设备的排列方式可分为顺序排列的自动线.平行排列的自动线和（）。", "options": [{"label": "A", "text": "固定排列的自动线"}, {"label": "B", "text": "随机排列的自动线"}, {"label": "C", "text": "顺序平行混合排列的自动线"}, {"label": "D", "text": "悬挂运输的自动线"}], "answer": "D", "analysis": "期间费用分为销售费用.管理费用和财务费用。选项A.B.C属于成本费用中的生产费用。\n \n52.自动线的形成按设备的排列方式可分为顺序排列的自动线.平行排列的自动线和（）。\nA.固定排列的自动线\nB.随机排列的自动线\nC.顺序平行混合排列的自动线\nD.悬挂运输的自动线"}, {"question": "在质量管理领域，若要求产品合格率不低于0.002ppm（百万分率），则质量控制水平应为（）。", "options": [{"label": "A", "text": "1σ水平"}, {"label": "B", "text": "2σ水平"}, {"label": "C", "text": "3σ水平"}, {"label": "D", "text": "6σ水平\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11"}], "answer": "C", "analysis": "自动线的形式按设备的排列方式可分为顺序排列的自动线.平行排列的自动线和顺序平行混合排列的\n自动线。\n \n53.在质量管理领域，若要求产品合格率不低于0.002ppm（百万分率），则质量控制水平应为（）。\nA.1σ水平\nB.2σ水平\nC.3σ水平\nD.6σ水平\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11"}, {"question": "002ppm（百万分率）或者产品合格率不低于", "options": [{"label": "A", "text": "流通费用"}, {"label": "B", "text": "成本费用"}, {"label": "C", "text": "交易费用"}, {"label": "D", "text": "生产费用"}], "answer": "D", "analysis": "在质量管理领域，若要求产品不合格率不超过0.002ppm（百万分率）或者产品合格率不低于\n99.99999983％。则质量控制水平应为6σ水平。\n \n54.新制度学派认为，企业作为商品经济发展到一定阶段的产物，是因为企业能作为在某种状态下替代市场的\n一种（）较低的资源配置方式。\nA.流通费用\nB.成本费用\nC.交易费用\nD.生产费用"}, {"question": "虚拟企业建立了覆盖供应商.制造商.分销商及顾客的信息网络，这一网络的触角几乎延伸到经济社会的每", "options": [{"label": "A", "text": "与上下游企业建立战略联盟关系"}, {"label": "B", "text": "具有高效的信息管理系统"}, {"label": "C", "text": "注重研究开发能力的构建"}, {"label": "D", "text": "产品趋向数字化"}], "answer": "C", "analysis": "新制度学派认为，企业作为商品经济发展到一定阶段的产物，是因为企业能作为在某种状态下替代\n市场的一种交易费用较低的资源配置方式。企业之所以能够有效地降低交易费用，是因为用企业内部管理的\n方式来使生产要素进行优化组合，可以减去许多与外部单位不必要的往来和手续，从而能够节省人力和物力\n。\n \n55.虚拟企业建立了覆盖供应商.制造商.分销商及顾客的信息网络，这一网络的触角几乎延伸到经济社会的每\n个角落，随时采集市场数据，跟踪市场需求，以最快的速度将需求信息与设计.生产系统相结合，同时将问题\n与建议反馈给客户。这体现了虚拟企业（）的特征。\nA.与上下游企业建立战略联盟关系\nB.具有高效的信息管理系统\nC.注重研究开发能力的构建\nD.产品趋向数字化"}, {"question": "各层具有明显差异，各层内部具有较好的一致性，各层在调查总体中所占比例不过分悬殊的市场调查可采", "options": [{"label": "A", "text": "随机抽样"}, {"label": "B", "text": "等距抽样"}, {"label": "C", "text": "整群抽样"}, {"label": "D", "text": "分层抽样"}], "answer": "B", "analysis": "题干所述内容体现了虚拟企业具有高效的信息管理系统的特征。\n \n56.各层具有明显差异，各层内部具有较好的一致性，各层在调查总体中所占比例不过分悬殊的市场调查可采\n用（）市场调查方法。\nA.随机抽样\nB.等距抽样\nC.整群抽样\nD.分层抽样"}, {"question": "产量少.品种多.专业化程度低的产品生产适用（）。", "options": [{"label": "A", "text": "成批生产类型"}, {"label": "B", "text": "单件生产类型"}, {"label": "C", "text": "大量生产类型"}, {"label": "D", "text": "生产线生产"}], "answer": "D", "analysis": "分层抽样适用于各层具有明显差异，各层内部具有较好一致性，各层在调查总体中所占比例不过分\n悬殊的市场调查，它比简单随机抽样和等距抽样更为精确，能够通过对较少的抽样单位的调查，得到比较准\n确的推断结果。\n \n57.产量少.品种多.专业化程度低的产品生产适用（）。\nA.成批生产类型\nB.单件生产类型\nC.大量生产类型\nD.生产线生产"}, {"question": "某设备的原始价值为80000元，每年低劣化增加值为2500元。在不考虑残值的情况下，根据低劣化数值法", "options": [{"label": "A", "text": "6"}, {"label": "B", "text": "3"}, {"label": "C", "text": "8"}, {"label": "D", "text": "9"}], "answer": "A", "analysis": "成批生产类型是指产品产量较少，品种较多，专业化程度较低的一种生产类型。\n \n58.某设备的原始价值为80000元，每年低劣化增加值为2500元。在不考虑残值的情况下，根据低劣化数值法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n12\n，该设备的最佳更新年限为（）年。\nA.6\nB.3\nC.8\nD.9"}, {"question": "下列生产过程空间组织形式中，最有利于充分利用生产设备.提高生产设备负荷系数的是（）。", "options": [{"label": "A", "text": "对象专业化布置"}, {"label": "B", "text": "工艺专业化布置"}, {"label": "C", "text": "固定布置"}, {"label": "D", "text": "部门专业化布置"}], "answer": "C", "analysis": "采用低劣化数值法，且不考虑残值的情况下，\n依据题中数据代入可得答案为8年。\n \n59.下列生产过程空间组织形式中，最有利于充分利用生产设备.提高生产设备负荷系数的是（）。\nA.对象专业化布置\nB.工艺专业化布置\nC.固定布置\nD.部门专业化布置"}, {"question": "一系列企业资金收支活动的总称为（）。", "options": [{"label": "A", "text": "财务分析"}, {"label": "B", "text": "财务管理"}, {"label": "C", "text": "财务活动"}, {"label": "D", "text": "财务关系"}], "answer": "B", "analysis": "工艺专业化布置的优点包括：①对产品品种的变化具有较强的适应性；②便于充分利用生产设备与\n生产面积，提高生产设备和生产面积的负荷系数；③便于进行工艺专业化管理，并有利于工人技术熟练程度\n的提高。\n \n60.一系列企业资金收支活动的总称为（）。\nA.财务分析\nB.财务管理\nC.财务活动\nD.财务关系"}, {"question": "根据《中华人民共和国劳动合同法》，劳动合同终止的情形有（）。", "options": [{"label": "A", "text": "劳动合同期满的"}, {"label": "B", "text": "女职工在孕期.产期.哺乳期的"}, {"label": "C", "text": "劳动者死亡的"}, {"label": "D", "text": "企业申请破产的\nE.企业被吊销营业执照的"}], "answer": "C", "analysis": "企业财务活动是指资金的筹集.投放.使用.收回及分配等一系列企业资金收支活动的总称，贯穿于企\n业经营过程的始终。\n \n多项选择题\n61.根据《中华人民共和国劳动合同法》，劳动合同终止的情形有（）。\nA.劳动合同期满的\nB.女职工在孕期.产期.哺乳期的\nC.劳动者死亡的\nD.企业申请破产的\nE.企业被吊销营业执照的"}, {"question": "下列关于对影响集权与分权程度的说法，错误的有（）。", "options": [{"label": "A", "text": "决策的代价越高越不适合集权"}, {"label": "B", "text": "决策的影响面越广越不适合集权\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n13"}, {"label": "C", "text": "组织的规模越大越不适合集权"}, {"label": "D", "text": "主管人员的素质与集权分权无关\nE.环境的变化程度越快.越大，越不适合集权"}], "answer": "A", "analysis": "《中华人民共和国劳动合同法》第44条规定，有下列情形之一的，劳动合同终止：①劳动合同期满\n的。②劳动者开始依法享受基本养老保险待遇的。③劳动者死亡，或者被人民法院宣告死亡或者宣告失踪的\n。④用人单位被依法宣告破产的。⑤用人单位被吊销营业执照.责令关闭.撤销或者用人单位决定提前解散的\n。⑥法律.行政法规规定的其他情形。\n \n62.下列关于对影响集权与分权程度的说法，错误的有（）。\nA.决策的代价越高越不适合集权\nB.决策的影响面越广越不适合集权\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n13\nC.组织的规模越大越不适合集权\nD.主管人员的素质与集权分权无关\nE.环境的变化程度越快.越大，越不适合集权"}, {"question": "订立劳动合同应遵循的原则有（）。", "options": [{"label": "A", "text": "平等自愿"}, {"label": "B", "text": "公平原则"}, {"label": "C", "text": "合法原则"}, {"label": "D", "text": "协商一致\nE.双赢原则"}], "answer": "A", "analysis": "决策的代价越高越应该集权。选项A错误。决策的影响面越广越应该集权。选项B错误。主管人员的\n素质越高越适合分权，反之适合集权。选项D错误。环境变化越快.变化程度越大越适合集权。选项E错误。\n \n63.订立劳动合同应遵循的原则有（）。\nA.平等自愿\nB.公平原则\nC.合法原则\nD.协商一致\nE.双赢原则"}, {"question": "新产品开发战略的核心内容是确定企业新产品开发的领域.新产品开发的目标.达成目标的途径和方法。这", "options": [{"label": "A", "text": "进取战略"}, {"label": "B", "text": "紧随战略"}, {"label": "C", "text": "保持地位战略"}, {"label": "D", "text": "冒险战略\nE.自行开发战略"}], "answer": "A", "analysis": "订立劳动合同应当遵循合法.公平.平等自愿.协商一致.诚实信用的原则。\n \n64.新产品开发战略的核心内容是确定企业新产品开发的领域.新产品开发的目标.达成目标的途径和方法。这\n些内容的不同组合方式，便形成了不同的新产品开发战略。一般来说，比较典型的新产品开发战略有（）。\nA.进取战略\nB.紧随战略\nC.保持地位战略\nD.冒险战略\nE.自行开发战略"}, {"question": "下列指标中，能够反映企业发展能力的有（）。", "options": [{"label": "A", "text": "销售增长率"}, {"label": "B", "text": "资本积累率"}, {"label": "C", "text": "流动比率"}, {"label": "D", "text": "总资产增长率\nE.总资产周转率"}], "answer": "A", "analysis": "企业可以根据自己的具体情况加以选择，即可构造出适合本企业的新产品开发战略。一般来说，根\n据对资源的要求和承担风险程度的不同，比较典型的新产品开发战略有四种，即进取战略.紧随战略.保持地\n位战略.冒险战略。\n \n65.下列指标中，能够反映企业发展能力的有（）。\nA.销售增长率\nB.资本积累率\nC.流动比率\nD.总资产增长率\nE.总资产周转率"}, {"question": "适用固定布置的生产过程空间组织形式的是（）。", "options": [{"label": "A", "text": "重型机床"}, {"label": "B", "text": "远洋货轮"}, {"label": "C", "text": "电视机"}, {"label": "D", "text": "电冰箱\nE.钻井机"}], "answer": "A", "analysis": "企业发展能力的指标主要包括销售（营业）增长率.资本积累率.总资产增长率等。\n \n66.适用固定布置的生产过程空间组织形式的是（）。\nA.重型机床\nB.远洋货轮\nC.电视机\nD.电冰箱\nE.钻井机"}, {"question": "在企业培训需求分析系统中，属于工作层面培训需求分析的内容有（）。", "options": [{"label": "A", "text": "企业目标"}, {"label": "B", "text": "企业资源"}, {"label": "C", "text": "企业工作的饱和程度"}, {"label": "D", "text": "企业工作的复杂程度\nE.企业所处的环境"}], "answer": "A", "analysis": "固定布置是指将加工的对象如产品.零部件的位置固定不变，而人员.设备.工具向其移动，并在该处\n进行加工制造的一种设施布置方式。主要适用于体积大.重量也很大.难以移动的产品。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n14\n \n67.在企业培训需求分析系统中，属于工作层面培训需求分析的内容有（）。\nA.企业目标\nB.企业资源\nC.企业工作的饱和程度\nD.企业工作的复杂程度\nE.企业所处的环境"}, {"question": "下列抽样方法中，属于随机抽样的方法有（）。", "options": [{"label": "A", "text": "任意抽样"}, {"label": "B", "text": "整群抽样"}, {"label": "C", "text": "等距抽样"}, {"label": "D", "text": "分层抽样\nE.判断抽样"}], "answer": "C", "analysis": "工作层面的培训需求分析是通过查阅工作说明书或具体分析完成某一工作需要的知识和技能，了解\n员工有效完成其本职工作所需具备的条件，找出现实状况与标准的差距，以确定培训需求的相关工作。其主\n要内容包括：①工作的复杂程度。②工作的饱和程度。③工作的难易程度。④工作内容和形式的变化。\n \n68.下列抽样方法中，属于随机抽样的方法有（）。\nA.任意抽样\nB.整群抽样\nC.等距抽样\nD.分层抽样\nE.判断抽样"}, {"question": "下列属于影响企业选择厂址的因素的有（）。", "options": [{"label": "A", "text": "国家的有关方针与政策"}, {"label": "B", "text": "资源的获取状况"}, {"label": "C", "text": "企业组织结构的形式"}, {"label": "D", "text": "气候和地质等自然条件\nE.交通状况"}], "answer": "B", "analysis": "随机抽样就是在抽样过程中按照随机性原则抽取样本，总体的每个单位都有同等被抽中的可能，即\n样本的抽取完全排除了人为主观因素的影响，使每一个单位都有同等的可能性被抽到。以概率论与数理统计\n为基础的随机抽样，既可保证调查总体内每个单位被抽取的机会均等，排除了人为抽样的主观随意性，使抽\n取样本更具客观代表性：又可使抽查结果比较准确.可信，抽查误差可以计算.检验.修正与调控。随机抽样方\n法多种多样，其中最主要的有简单随机抽样.等距抽样.分层抽样.整群抽样等。\n \n69.下列属于影响企业选择厂址的因素的有（）。\nA.国家的有关方针与政策\nB.资源的获取状况\nC.企业组织结构的形式\nD.气候和地质等自然条件\nE.交通状况"}, {"question": "下列属于常用的在职培训方法的有（）。", "options": [{"label": "A", "text": "教练"}, {"label": "B", "text": "师带徒"}, {"label": "C", "text": "关键事件法"}, {"label": "D", "text": "行动学习\nE.再就业培训"}], "answer": "A", "analysis": "影响厂址选择的主要因素包括：①国家的有关方针.政策，国民经济发展的整体需要.布局和规划\n，各地方的规划.发展及有关法规；②接近客户，交通便利，通讯方便；③资源的充分获取和利用，以获得最\n佳经济效益；④气候.地质.水文等自然条件及环境保护；⑤长远发展的余地。\n \n70.下列属于常用的在职培训方法的有（）。\nA.教练\nB.师带徒\nC.关键事件法\nD.行动学习\nE.再就业培训"}, {"question": "根据《最高人民法院关于审理劳动争议案件适用法律若干问题的解释》，下列纠纷中，当事人不服劳动争", "options": [{"label": "A", "text": "劳动者与企业在履行劳动合同过程中发生的纠纷"}, {"label": "B", "text": "劳动者请求社会保险经办机构发放社会保险金的纠纷"}, {"label": "C", "text": "劳动者与企业之间没有订立书面劳动合同，但已形成劳动关系后发生的纠纷"}, {"label": "D", "text": "劳动者与企业因住房制度改革产生的公有住房转让纠纷\nE.劳动者退休后，与尚未参加社会保险统筹的原企业因追索养老金.医疗费而发生的纠纷"}], "answer": "A", "analysis": "常用的在职培训方法主要有师带徒.工作轮换.教练.行动学习。\n \n71.根据《最高人民法院关于审理劳动争议案件适用法律若干问题的解释》，下列纠纷中，当事人不服劳动争\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n15\n议仲裁委员会作出的裁决，依法向人民法院起诉的，人民法院应当受理的有（）。\nA.劳动者与企业在履行劳动合同过程中发生的纠纷\nB.劳动者请求社会保险经办机构发放社会保险金的纠纷\nC.劳动者与企业之间没有订立书面劳动合同，但已形成劳动关系后发生的纠纷\nD.劳动者与企业因住房制度改革产生的公有住房转让纠纷\nE.劳动者退休后，与尚未参加社会保险统筹的原企业因追索养老金.医疗费而发生的纠纷"}, {"question": "决定企业生产类型的因素有（）。", "options": [{"label": "A", "text": "产品产量"}, {"label": "B", "text": "生产连续程度"}, {"label": "C", "text": "产品品种"}, {"label": "D", "text": "生产效率\nE.生产专业化程度"}], "answer": "A", "analysis": "关于劳动争议案件的受理范围，《最高人民法院关于审理劳动争议案件适用法律若干问题的解释》\n规定，劳动者与企业之间发生的劳动纠纷，当事人不服劳动争议仲裁委员会作出的裁决，依法向人民法院起\n诉的，人民法院应当受理。具体包括：①劳动者与企业在履行劳动合同过程中发生的纠纷。②劳动者与企业\n之间没有订立书面劳动合同，但已形成劳动关系后发生的纠纷。③劳动者退休后，与尚未参加社会保险统筹\n的原企业因追索养老金.医疗费.工伤保险待遇和其他社会保险费而发生的纠纷。④企业和劳动者因劳动关系\n是否已经解除或者终止，以及应否支付解除或终止劳动关系经济补偿金产生的争议，经劳动争议仲裁委员会\n仲裁后，当事人依法起诉的，人民法院应予受理。⑤劳动者与企业解除或者终止劳动关系后，请求企业返还\n其收取的劳动合同定金.保证金.抵押金.抵押物产生的争议，或者办理劳动者的人事档案.社会保险关系等移\n转手续产生的争议.经劳动争议仲裁委员会仲裁后，当事人依法起诉的，人民法院应予受理。⑥劳动者因为工\n伤.职业病，请求企业依法承担给予工伤保险待遇的争议，经劳动争议仲裁委员会仲裁后，当事人依法起诉的\n，人民法院应予受理。\n \n72.决定企业生产类型的因素有（）。\nA.产品产量\nB.生产连续程度\nC.产品品种\nD.生产效率\nE.生产专业化程度"}, {"question": "下列属于长期股权投资分类的有（）。", "options": [{"label": "A", "text": "控制"}, {"label": "B", "text": "少量持股"}, {"label": "C", "text": "重大影响"}, {"label": "D", "text": "无重大影响\nE.合营"}], "answer": "A", "analysis": "企业生产类型分为连续型生产和离散型生产，按照产品品种和产品产量不同，离散型生产进一步可\n分为大量生产.成批生产和单件生产。在通常情况下，企业生产的产品产量越大，产品的品种就越少，生产专\n业化程度就越高，生产的稳定性和重复性也越大。所以，产品产量.产品品种和专业化程度决定着企业生产类\n型。\n \n73.下列属于长期股权投资分类的有（）。\nA.控制\nB.少量持股\nC.重大影响\nD.无重大影响\nE.合营"}, {"question": "下列属于按照技术先进程度划分的技术等级的有（）。", "options": [{"label": "A", "text": "先进技术"}, {"label": "B", "text": "中间技术"}, {"label": "C", "text": "原始技术"}, {"label": "D", "text": "初级技术\nE.高级技术\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16"}], "answer": "A", "analysis": "长期股权投资分为控制.重大影响和合营。\n \n74.下列属于按照技术先进程度划分的技术等级的有（）。\nA.先进技术\nB.中间技术\nC.原始技术\nD.初级技术\nE.高级技术\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16"}, {"question": "企业选择组织结构形式时，应考虑的因素有（）。", "options": [{"label": "A", "text": "企业的生产技术和工艺"}, {"label": "B", "text": "企业规模"}, {"label": "C", "text": "企业文化"}, {"label": "D", "text": "企业经营发展战略\nE.企业内部交通状况"}], "answer": "A", "analysis": "按照技术的先进程度一般可以将技术划分为尖端技术.先进技术.中间技术.初级技术.原始技术五个\n等级。\n \n75.企业选择组织结构形式时，应考虑的因素有（）。\nA.企业的生产技术和工艺\nB.企业规模\nC.企业文化\nD.企业经营发展战略\nE.企业内部交通状况"}, {"question": "为了解决流水线上某道工序设备超负荷问题，企业可以采取的措施有（）。", "options": [{"label": "A", "text": "延长节拍时间"}, {"label": "B", "text": "缩短节拍时间"}, {"label": "C", "text": "优化并提升该道工序设备的效率"}, {"label": "D", "text": "提升该道工序之前工序设备的效率\nE.提升该道工序之后工序设备的效率"}], "answer": "A", "analysis": "企业组织结构形式的选择应考虑与企业生产经营直接相关的若干要素：①企业的生产技术和工艺。\n②企业规模。③企业经营发展战略。④企业所处的环境。⑤企业文化。\n \n76.为了解决流水线上某道工序设备超负荷问题，企业可以采取的措施有（）。\nA.延长节拍时间\nB.缩短节拍时间\nC.优化并提升该道工序设备的效率\nD.提升该道工序之前工序设备的效率\nE.提升该道工序之后工序设备的效率"}, {"question": "下列属于安全生产特点的有（）。", "options": [{"label": "A", "text": "C。\n \n77.下列属于安全生产特点的有（）。"}, {"label": "A", "text": "群众性"}, {"label": "B", "text": "个体性"}, {"label": "C", "text": "科学性"}, {"label": "D", "text": "长期性\nE.预防性"}], "answer": "A", "analysis": "Si（第i道工序计算所需设备的计算数）=ti（第i道工序所需加工时间）÷r（流水线的平均节拍\n）；Ki（设备负荷系数）=Si（第i道工序计算所需设备的计算数）÷Sei（第i道工序安排的实际设备数\n），根据公式选择选项A.C。\n \n77.下列属于安全生产特点的有（）。\nA.群众性\nB.个体性\nC.科学性\nD.长期性\nE.预防性"}, {"question": "在进行厂址选择时，简单易用的方法有（）。", "options": [{"label": "A", "text": "投资费用比较法"}, {"label": "B", "text": "因素评分法"}, {"label": "C", "text": "积点法"}, {"label": "D", "text": "位置度量法\nE.重心法"}], "answer": "A", "analysis": "安全生产的特点包括预防性.长期性.科学性和群众性。\n \n78.在进行厂址选择时，简单易用的方法有（）。\nA.投资费用比较法\nB.因素评分法\nC.积点法\nD.位置度量法\nE.重心法"}, {"question": "下列属于每股收益（权益资本净利率）最大化目标的缺点的有（）。", "options": [{"label": "A", "text": "没有考虑利润取得的时间，忽视了资金的时间价值"}, {"label": "B", "text": "没有考虑取得利润所承担的风险问题\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17"}, {"label": "C", "text": "没有考虑投入产出的关系"}, {"label": "D", "text": "片面追求利润最大化，导致短期行为\nE.股票价格受多方因素影响，并非企业能控制"}], "answer": "B", "analysis": "本题考查厂址选择的方法。在进行厂址选择时，因素评分法.重心法简单易用。\n \n79.下列属于每股收益（权益资本净利率）最大化目标的缺点的有（）。\nA.没有考虑利润取得的时间，忽视了资金的时间价值\nB.没有考虑取得利润所承担的风险问题\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17\nC.没有考虑投入产出的关系\nD.片面追求利润最大化，导致短期行为\nE.股票价格受多方因素影响，并非企业能控制"}, {"question": "按照性质划分，企业的标准应包括的内容有（）。", "options": [{"label": "A", "text": "生产标准"}, {"label": "B", "text": "产品标准"}, {"label": "C", "text": "工作标准"}, {"label": "D", "text": "技术标准\nE.管理标准"}], "answer": "A", "analysis": "每股收益（权益资本净利率）最大化目标的缺点是没有考虑时间价值和风险。\n \n80.按照性质划分，企业的标准应包括的内容有（）。\nA.生产标准\nB.产品标准\nC.工作标准\nD.技术标准\nE.管理标准"}, {"question": "3亿元，该公司2017年简化资产负", "options": [{"label": "A", "text": "2.00"}, {"label": "B", "text": "2.14"}, {"label": "C", "text": "3.00"}, {"label": "D", "text": "3.11"}], "answer": "C", "analysis": "按照性质划分，企业的标准主要有技术标准.管理标准.工作标准。\n \n共享题干题\n【题干】某电器股份有限公司，2017年实现销售收入3亿元，实现净利润0.3亿元，该公司2017年简化资产负\n债表如下。(单位：亿元)\n \n81.【单项选择题】该公司的应收账款周转率为（）次/年。\nA.2.00\nB.2.14\nC.3.00\nD.3.11"}, {"question": "5+1.3）/2]=2.14（次/年）。", "options": [{"label": "A", "text": "存货周转率"}, {"label": "B", "text": "流动比率"}, {"label": "C", "text": "总资产周转率"}, {"label": "D", "text": "流动资产周转率"}], "answer": "B", "analysis": "根据公式：应收账款周转率=销售收入/平均应收账款余额=3/[（1.5+1.3）/2]=2.14（次/年）。\n \n \n82.【多项选择题】如果评价该公司的营运能力，根据现有资料还可以计算（）。\nA.存货周转率\nB.流动比率\nC.总资产周转率\nD.流动资产周转率"}, {"question": "2％；流动资产周转率=销售收入/平均", "options": [{"label": "A", "text": "坏账损失"}, {"label": "B", "text": "机会成本"}, {"label": "C", "text": "销售费用"}, {"label": "D", "text": "收账费用"}], "answer": "C", "analysis": "总资产周转率=销售收入/平均资产总额=3/[（6+7）/2]≈46.2％；流动资产周转率=销售收入/平均\n流动资产总额=3/[（2.8+3.3）/2]≈98.4％。\n \n \n83.【多项选择题】该公司2017年应收账款减少，有利于公司减少（）。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n18\nA.坏账损失\nB.机会成本\nC.销售费用\nD.收账费用"}, {"question": "【多项选择题】短期偿债能力比率包括（）。", "options": [{"label": "A", "text": "流动比率"}, {"label": "B", "text": "速动比率"}, {"label": "C", "text": "现金流动负债比率"}, {"label": "D", "text": "总资产周转率"}], "answer": "A", "analysis": "应收账款会产生坏账损失.机会成本和收账费用。\n \n \n84.【多项选择题】短期偿债能力比率包括（）。\nA.流动比率\nB.速动比率\nC.现金流动负债比率\nD.总资产周转率"}, {"question": "【单项选择题】该企业在2016年末流动比率是（）。", "options": [{"label": "A", "text": "1.11"}, {"label": "B", "text": "2.42"}, {"label": "C", "text": "1.32"}, {"label": "D", "text": "1.42"}], "answer": "A", "analysis": "总资产周转率属于营运能力比率。\n \n【题干】某企业经过化简的2017年度的资产负债表如下。(单位：百万元)\n \n \n \n85.【单项选择题】该企业在2016年末流动比率是（）。\nA.1.11\nB.2.42\nC.1.32\nD.1.42"}, {"question": "42。", "options": [{"label": "A", "text": "1.67"}, {"label": "B", "text": "1.57"}, {"label": "C", "text": "1.83"}, {"label": "D", "text": "1.66"}], "answer": "B", "analysis": "2016年年末流动比率=2017年年初流动资产/2017年年初流动负债=290/120≈2.42。\n \n86.【单项选择题】该企业在2016年年末速动比率是（）。\nA.1.67\nB.1.57\nC.1.83\nD.1.66"}, {"question": "67。", "options": [{"label": "A", "text": "56.82％\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n19"}, {"label": "B", "text": "44.52％"}, {"label": "C", "text": "46.33％"}, {"label": "D", "text": "49.11％"}], "answer": "A", "analysis": "2016年年末速动比率=（2017年年初流动资产-2017年年初存货）/2017年年初流动负债\n=200/120≈1.67。\n \n87.【单项选择题】该企业在2016年年末资产负债率是（）。\nA.56.82％\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n19\nB.44.52％\nC.46.33％\nD.49.11％"}, {"question": "82％。", "options": [{"label": "A", "text": "0.66"}, {"label": "B", "text": "0.96"}, {"label": "C", "text": "0.81"}, {"label": "D", "text": "0.73"}], "answer": "A", "analysis": "2016年年末资产负债率=2017年年初负债合计/2017年年初资产总计\n×100％=250/440×100％≈56.82％。\n \n88.【单项选择题】该企业在2016年年末产权比率是（）。\nA.0.66\nB.0.96\nC.0.81\nD.0.73"}, {"question": "96。", "options": [{"label": "A", "text": "过剩"}, {"label": "B", "text": "充足"}, {"label": "C", "text": "正常"}, {"label": "D", "text": "不足"}], "answer": "B", "analysis": "2016年年末产权比率=2017年年初负债合计/2017年年初股东权益合计=250/260≈0.96。\n \n【题干】某电池生产企业对其生产的A.B.C三种电池的工序能力进行评估。经随机抽样并计算，得出如下数据\n：A电池的工序能力指数为1.8，B电池的工序能力指数为0.7，C电池的设计寿命要求不低于8500小时，随机抽\n取的该电池样本的平均寿命为8860小时，样本标准偏差为120小时。\n \n89.【单项选择题】对A电池的工序能力指数进行判断，其工序能力（）。\nA.过剩\nB.充足\nC.正常\nD.不足"}, {"question": "67时，生产能力过剩。", "options": [{"label": "A", "text": "若设计上允许，降低产品的技术要求"}, {"label": "B", "text": "努力提高设备精度，并使工艺更为合理和有效"}, {"label": "C", "text": "采取合并或减少工序等方法"}, {"label": "D", "text": "降低原材料质量及加工性能"}], "answer": "A", "analysis": "工序能力指数CP大于1.67时，生产能力过剩。\n \n \n90.【多项选择题】根据B电池的工序能力指数，该企业可以采取的措施是（）。\nA.若设计上允许，降低产品的技术要求\nB.努力提高设备精度，并使工艺更为合理和有效\nC.采取合并或减少工序等方法\nD.降低原材料质量及加工性能"}, {"question": "7≤1，工序能力指数过小，意味着产品质量水平低。要暂停加工，立即追查", "options": [{"label": "A", "text": "0.83"}, {"label": "B", "text": "1.00"}, {"label": "C", "text": "1.20"}, {"label": "D", "text": "1.34"}], "answer": "A", "analysis": "B电池的工序能力指数0.7≤1，工序能力指数过小，意味着产品质量水平低。要暂停加工，立即追查\n原因，并采取以下措施：①努力提高设备精度，并使工艺更为合理和有效，进一步提高操作技能与质量意识\n，改善原材料质量及提高加工性能，使工序能力得到适当的提高；②修订标准，若设计上允许，可降低技术\n要求，即用放宽公差的方法处理；③为了保证出厂产品的质量，在工序能力不足时，一般应通过全检后剔除\n不合格品，或实行分级筛选来提高产品质量。\n \n91.【单项选择题】C电池的工序能力指数为（）。\nA.0.83\nB.1.00\nC.1.20\nD.1.34"}, {"question": "【多项选择题】工序能力指标的用途包括（）。", "options": [{"label": "A", "text": "反映实际加工能力"}, {"label": "B", "text": "协调工序间的相互关系"}, {"label": "C", "text": "选择经济合理的工序方案"}, {"label": "D", "text": "验证工序质量保证能力"}], "answer": "B", "analysis": "92.【多项选择题】工序能力指标的用途包括（）。\nA.反映实际加工能力\nB.协调工序间的相互关系\nC.选择经济合理的工序方案\nD.验证工序质量保证能力"}, {"question": "【多项选择题】典型的有合伙制企业包括（）。", "options": [{"label": "A", "text": "律师事务所"}, {"label": "B", "text": "有限责任公司"}, {"label": "C", "text": "股份有限公司"}, {"label": "D", "text": "会计师事务所"}], "answer": "B", "analysis": "工序能力指标的用途包括：①选择经济合理的工序方案；②协调工序之间的相互关系；③验证工序\n质量保证能力。\n \n【题干】李某和张某共同出资创办一个合伙企业，其中，李某出资25万元，张某以其专利作价15万元出资\n，由于企业经营不善，出现较为严重的亏损，累计负债20万元。\n \n \n93.【多项选择题】典型的有合伙制企业包括（）。\nA.律师事务所\nB.有限责任公司\nC.股份有限公司\nD.会计师事务所"}, {"question": "【单项选择题】张某和李某对合伙企业的债务（）。", "options": [{"label": "A", "text": "不负责任"}, {"label": "B", "text": "负连带责任"}, {"label": "C", "text": "以出资额为限负有限责任"}, {"label": "D", "text": "李某负责，张某不负责"}], "answer": "A", "analysis": "合伙制企业一般适合于资产规模较小.管理不复杂.不需设立专门的管理机构的生产和经营企业，典\n型的有合伙制律师事务所.合伙制会计师事务所等。\n \n94.【单项选择题】张某和李某对合伙企业的债务（）。\nA.不负责任\nB.负连带责任\nC.以出资额为限负有限责任\nD.李某负责，张某不负责"}, {"question": "【多项选择题】合伙制企业的优点表现在（）。", "options": [{"label": "A", "text": "企业寿命长"}, {"label": "B", "text": "产权转让容易"}, {"label": "C", "text": "信用能力较大"}, {"label": "D", "text": "资金来源较大"}], "answer": "B", "analysis": "合伙制企业的合伙人对合伙企业的债务负无限连带责任，即有清偿债务能力的合伙人对没有清偿债\n务能力的合伙人要负债务的连带责任。\n \n \n95.【多项选择题】合伙制企业的优点表现在（）。\nA.企业寿命长\nB.产权转让容易\nC.信用能力较大\nD.资金来源较大"}, {"question": "【多项选择题】按企业产权的组织形式划分，除合伙制企业外，还有（）形式。", "options": [{"label": "A", "text": "单个业主制企业"}, {"label": "B", "text": "商业企业"}, {"label": "C", "text": "公司制企业"}, {"label": "D", "text": "工业企业"}], "answer": "C", "analysis": "合伙制企业的优点包括：①资金来源和信用能力较大；②集合了合伙人的才智和经验，企业的竞争\n能力得到提高；③由于资金筹措能力和管理能力得到增强，企业规模扩大和发展的可能性增大。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n21\n \n \n96.【多项选择题】按企业产权的组织形式划分，除合伙制企业外，还有（）形式。\nA.单个业主制企业\nB.商业企业\nC.公司制企业\nD.工业企业"}, {"question": "95，废品率为0。经测算，流水线的第i道工序需要某精密设备6台，实际只有5台该设备进行生", "options": [{"label": "A", "text": "固定布置"}, {"label": "B", "text": "工艺专业化布置"}, {"label": "C", "text": "对象专业化布置"}, {"label": "D", "text": "混合式布置"}], "answer": "A", "analysis": "按企业产权的组织形式划分，可分为单个业主制企业.合伙制企业和公司制企业。\n \n【题干】某企业采用单对象流水线进行生产组织。该流水线日产品产量为101件，每日工作8小时，时间有效\n利用系数为0.95，废品率为0。经测算，流水线的第i道工序需要某精密设备6台，实际只有5台该设备进行生\n产。\n \n97.【单项选择题】该企业所应用的生产过程空间组织形式是（）。\nA.固定布置\nB.工艺专业化布置\nC.对象专业化布置\nD.混合式布置"}, {"question": "【单项选择题】该流水线的平均节拍是（）分钟/件。", "options": [{"label": "A", "text": "3.5"}, {"label": "B", "text": "4.0"}, {"label": "C", "text": "4.5"}, {"label": "D", "text": "5.5"}], "answer": "C", "analysis": "对象专业化布置就是以产品（或零部件）为对象来设置生产单位。在对象专业化的生产单位中，集\n中了为生产某种产品所需要的各种设备和各工种的工人，对同类产品进行不同的工艺加工。在这里，加工对\n象是一定的，而加工工艺方法则是多样的。在对象专业化的生产单位里，基本上能独立完成某几种产品（或\n零部件）的全部或大部分工艺过程，所以，这种车间也可以称为封闭式车间（或封闭式工段）。这种按照某\n种产品的加工路线或加工顺序来布置设施称为生产线。\n \n98.【单项选择题】该流水线的平均节拍是（）分钟/件。\nA.3.5\nB.4.0\nC.4.5\nD.5.5"}, {"question": "9～0.96；T0为计划期流水线的制度工作时间。故本题", "options": [{"label": "A", "text": "0.90"}, {"label": "B", "text": "1.05"}, {"label": "C", "text": "1.10"}, {"label": "D", "text": "1.20"}], "answer": "C", "analysis": "流水线的平均节拍可按下式计算：\n式中，r为流水线的平均节拍；Te为计划期流水线的有效工作时间；Q为计划期的产品产量（包括计划产量和\n预计废品量）；β为工作时间有效利用系数，一般为0.9～0.96；T0为计划期流水线的制度工作时间。故本题\n中，r=8×0.95×60÷101≈4.5（分钟）。\n \n99.【单项选择题】该流水线第i道工序的设备负荷系数是（）。\nA.0.90\nB.1.05\nC.1.10\nD.1.20"}, {"question": "2。", "options": [{"label": "A", "text": "产量足够小"}, {"label": "B", "text": "工艺能够同期化"}, {"label": "C", "text": "工艺柔性化"}, {"label": "D", "text": "产品结构变化大"}], "answer": "D", "analysis": "一般来说，计算的设备数都不是整数，而所取的设备数只能是整台数，这样设备负荷系数\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n22\nKi=Si÷Sei。式中，Ki为设备负荷系数；Si为第i道工序所需设备的计算数；Sei为第i道工序安排的实际设备\n数。故本题中，Ki=6÷5=1.2。\n \n100.【单项选择题】企业采用流水线生产必须具备的条件是（）。\nA.产量足够小\nB.工艺能够同期化\nC.工艺柔性化\nD.产品结构变化大"}, {"question": "设备更新的前提是最佳更新期，根据经济寿命来确定设备最佳更新期的原则是使设备各种费用的总和（", "options": [{"label": "A", "text": "最小"}, {"label": "B", "text": "最大"}, {"label": "C", "text": "不变"}, {"label": "D", "text": "为零"}], "answer": "A", "analysis": "观察法是工作分析人员通过直接观察，把有关工作各部分的内容、特点、方法、程度、目的等信息\n以文字或图表的形式记录下来的方法。选项A正确。\n该方法的优点是有关人员可以较全面、较深入地了解工作内容、工作条件、工作环境、不同工作间的关系等\n信息，取得的信息较为客观和准确，但它不适用于工作循环周期长和以脑力劳动为主的工作，也不能得到有\n关任职资格要求的信息，对于紧急而又偶然的工作行为也不适用。\n因此，观察法往往作为一种辅助方法，与其他方法联合使用。\n \n2.设备更新的前提是最佳更新期，根据经济寿命来确定设备最佳更新期的原则是使设备各种费用的总和（　\n）。\nA.最小\nB.最大\nC.不变\nD.为零"}], "冲刺卷（101-150题）": [{"question": "安全生产除了保障人员安全与健康之外，还应避免（　）。", "options": [{"label": "A", "text": "设施大量闲置"}, {"label": "B", "text": "设备无形磨损"}, {"label": "C", "text": "产品积压"}, {"label": "D", "text": "环境破坏"}], "answer": "A", "analysis": "设备更新的前提是确定设备的最佳更新期。确定设备最佳更新期的主要依据是设备的经济寿命。根\n据经济寿命来确定设备最佳更新期的原则是使设备各种费用的总和最小。\n \n3.安全生产除了保障人员安全与健康之外，还应避免（　）。\nA.设施大量闲置\nB.设备无形磨损\nC.产品积压\nD.环境破坏"}, {"question": "根据工作要求安排新员工或最具潜力的管理人员在不同的工作部门工作一段时间，这是员工培训的（", "options": [{"label": "A", "text": "师带徒"}, {"label": "B", "text": "轮岗"}, {"label": "C", "text": "教练"}, {"label": "D", "text": "行动学习"}], "answer": "D", "analysis": "安全生产是指为了使劳动过程在符合安全要求的物质条件和工作秩序下进行，防止伤亡事故、设备\n事故及各种灾害的发生，保障劳动者的安全健康和生产、劳动过程的正常进行而采取的各种措施和从事的一\n切活动。它既包括对劳动者的保护，也包括对生产、财物、环境的保护，使生产活动正常进行。\n \n4.根据工作要求安排新员工或最具潜力的管理人员在不同的工作部门工作一段时间，这是员工培训的（　\n）方法。\nA.师带徒\nB.轮岗\nC.教练\nD.行动学习"}, {"question": "运营资本是指（　）的余额。", "options": [{"label": "A", "text": "流动资产减去负债"}, {"label": "B", "text": "流动资产减去存货"}, {"label": "C", "text": "流动资产减去应收账款"}, {"label": "D", "text": "流动资产减去流动负债"}], "answer": "B", "analysis": "工作轮换(又称轮岗)，是指根据工作要求安排新员工或具有潜力的管理人员在不同的工作部门工作\n一段时间，通常时间为1～2年，以丰富新员工和管理人员的工作经验。\n \n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n1\n5.运营资本是指（　）的余额。\nA.流动资产减去负债\nB.流动资产减去存货\nC.流动资产减去应收账款\nD.流动资产减去流动负债"}, {"question": "产量少、品种多、专业化程度低的产品生产适用（　）。", "options": [{"label": "A", "text": "成批生产类型"}, {"label": "B", "text": "单件生产类型"}, {"label": "C", "text": "大量生产类型"}, {"label": "D", "text": "生产线生产"}], "answer": "D", "analysis": "运营资本是企业为了维持正常的经营活动所需要的资金即企业在经营活动中可用的流动资产净额。\n \n6.产量少、品种多、专业化程度低的产品生产适用（　）。\nA.成批生产类型\nB.单件生产类型\nC.大量生产类型\nD.生产线生产"}, {"question": "下列企业中，更适合选择集权型组织结构形式的是（　）。", "options": [{"label": "A", "text": "技术简单、工艺整体性要求不高的企业"}, {"label": "B", "text": "技术简单、工艺整体性要求高的企业"}, {"label": "C", "text": "技术复杂、工艺整体性要求高的企业"}, {"label": "D", "text": "技术复杂、工艺整体性要求不高的企业"}], "answer": "A", "analysis": "成批生产类型是指产品产量较少，品种较多，专业化程度较低的一种生产类型。\n \n7.下列企业中，更适合选择集权型组织结构形式的是（　）。\nA.技术简单、工艺整体性要求不高的企业\nB.技术简单、工艺整体性要求高的企业\nC.技术复杂、工艺整体性要求高的企业\nD.技术复杂、工艺整体性要求不高的企业"}, {"question": "对象专业化布置就是以产品(或零部件)为对象来设置生产单位，下列不属于其优点的是（　）。", "options": [{"label": "A", "text": "可以缩短产品加工路线"}, {"label": "B", "text": "减少产品的运输时间和停放时间"}, {"label": "C", "text": "简化了生产核算工作"}, {"label": "D", "text": "对产品变化的适应性强"}], "answer": "B", "analysis": "技术简单、工艺整体性要求高的企业，组织应该以集权型为主。\n \n8.对象专业化布置就是以产品(或零部件)为对象来设置生产单位，下列不属于其优点的是（　）。\nA.可以缩短产品加工路线\nB.减少产品的运输时间和停放时间\nC.简化了生产核算工作\nD.对产品变化的适应性强"}, {"question": "技术的先进程度一般可将技术划分为尖端、先进、中间、初级、原始五个等级。在进行技术等级选择时", "options": [{"label": "A", "text": "以最小的代价取得最好的效果"}, {"label": "B", "text": "有利于促进企业的技术进步"}, {"label": "C", "text": "必须进行国民经济评价"}, {"label": "D", "text": "确保改造后能够消化推广\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n2"}], "answer": "D", "analysis": "按对象专业化原则设置生产单位的优点是：\n①可以缩短产品加工路线，节约运输工具和人力，减少仓库等辅助面积的占用。（选项A）\n②减少产品的运输时间和停放时间，缩短生产周期，减少生产中在制品占用量和流动资金占用量。（选项B）\n③减少车间之间的生产联系，从而简化并改进了计划管理与生产核算工作，有利于建立生产责任制，有利于\n在制品管理、质量管理。（选项C）\n④有利于按期、按质、按量、成套地完成生产任务，提高劳动生产率和降低成本。\n⑤有利于采用先进的生产组织形式。\n缺点是：①不利于充分利用设备和生产面积。②不利于对工艺进行专业化管理。③对产品变化的适应性差\n（选项D）。\n \n9.技术的先进程度一般可将技术划分为尖端、先进、中间、初级、原始五个等级。在进行技术等级选择时\n，企业应遵循三个原则，不包括（　）个等级。\nA.以最小的代价取得最好的效果\nB.有利于促进企业的技术进步\nC.必须进行国民经济评价\nD.确保改造后能够消化推广\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n2"}, {"question": "企业在进行管理信息系统开发时，其功能不可能十全十美，应遵循的开发原则不包括（　）。", "options": [{"label": "A", "text": "系统性原则"}, {"label": "B", "text": "经济性原则"}, {"label": "C", "text": "逐步完善原则"}, {"label": "D", "text": "面向用户原则"}], "answer": "C", "analysis": "技术可行性分析的核心是企业技术改造的技术等级的选择问题。按照技术的先进程度一般可将技术\n划分为尖端、先进、中间、初级、原始五个等级。在进行技术等级选择时，企业应遵循如下三个原则:①以最\n小的代价取得最好的效果;②有利于促进企业的技术进步;③确保改造后能够消化推广。选项C错误。\n \n10.企业在进行管理信息系统开发时，其功能不可能十全十美，应遵循的开发原则不包括（　）。\nA.系统性原则\nB.经济性原则\nC.逐步完善原则\nD.面向用户原则"}, {"question": "企业的生产按连续程度可划分为连续型生产和离散型生产。下列产品的生产中，属于连续型生产的是（", "options": [{"label": "A", "text": "轮船"}, {"label": "B", "text": "汽车"}, {"label": "C", "text": "肥皂"}, {"label": "D", "text": "机床"}], "answer": "B", "analysis": "管理信息系统的功能不可能十全十美，企业在开发过程中应当遵循以下原则，使开发工作顺利进行\n，包括：系统性原则、标准化原则、实用性与先进性兼顾原则、逐步完善原则和面向用户原则。\n \n11.企业的生产按连续程度可划分为连续型生产和离散型生产。下列产品的生产中，属于连续型生产的是（　\n）。\nA.轮船\nB.汽车\nC.肥皂\nD.机床"}, {"question": "下列控制图中，属于计数值控制图的是（　）。", "options": [{"label": "A", "text": "缺陷数控制图"}, {"label": "B", "text": "中位数和极差控制图"}, {"label": "C", "text": "平均值和极差控制图"}, {"label": "D", "text": "单值控制图"}], "answer": "C", "analysis": "连续型生产是指物料均匀、连续地按一定工艺顺序运动，在运动中不断改变形态和性能，最后形成\n产品的生产，如药品、肥皂、炼油、造纸等的生产。\n \n12.下列控制图中，属于计数值控制图的是（　）。\nA.缺陷数控制图\nB.中位数和极差控制图\nC.平均值和极差控制图\nD.单值控制图"}, {"question": "某公司2021年12月31日的资产总计、负债总计分别为5亿元、3.8亿元。公司预计2022年12月31日的资产总", "options": [{"label": "A", "text": "0.5"}, {"label": "B", "text": "1.2"}, {"label": "C", "text": "0.8"}, {"label": "D", "text": "1.3"}], "answer": "A", "analysis": "控制图基本可以分为两大类，即计量值控制图和计数值控制图。计数值控制图是以计数值数据的质\n量特性值为控制对象的，属于这种情况的有不合格品率控制图和不合格品数控制图，还有缺陷数控制图和单\n位缺陷数控制图，这两类控制图也称为计点值控制图。\n \n13.某公司2021年12月31日的资产总计、负债总计分别为5亿元、3.8亿元。公司预计2022年12月31日的资产总\n计、负债总计分别为7.2亿元、5.5亿元，那么该公司2022年预计筹资额为（　）亿元。\nA.0.5\nB.1.2\nC.0.8\nD.1.3"}, {"question": "5。", "options": [{"label": "A", "text": "产品安全\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3"}, {"label": "B", "text": "市场营销"}, {"label": "C", "text": "友善对待供应商"}, {"label": "D", "text": "环境保护"}], "answer": "A", "analysis": "企业预计筹资额=(企业预计资产总计-企业上一年度资产总计)-(企业预计负债总计-企业上一年度负\n债总计)，依据题中数据可得答案为0.5。\n \n14.下列企业责任中，不属于对非合同利益相关者的社会责任的是（　）。\nA.产品安全\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3\nB.市场营销\nC.友善对待供应商\nD.环境保护"}, {"question": "分离交易可转债是指（　）。", "options": [{"label": "A", "text": "只能实现债券筹资"}, {"label": "B", "text": "只能实现普通股筹资"}, {"label": "C", "text": "只能实现认股权证筹资"}, {"label": "D", "text": "附有认股权证并与认股权证分离交易的公司债券"}], "answer": "C", "analysis": "企业对非合同利益相关者的社会责任主要有：环境保护、产品安全、市场营销、对社区活动的态度\n等。友善对待供应商不属于企业对合同利益相关者的社会责任。\n \n15.分离交易可转债是指（　）。\nA.只能实现债券筹资\nB.只能实现普通股筹资\nC.只能实现认股权证筹资\nD.附有认股权证并与认股权证分离交易的公司债券"}, {"question": "财务预测和计划的主要方法是销售百分比法，是假定资产、负债与（　）存在稳定的百分比关系，根据预", "options": [{"label": "A", "text": "销售成本"}, {"label": "B", "text": "营业收入"}, {"label": "C", "text": "销售收入"}, {"label": "D", "text": "营业成本"}], "answer": "D", "analysis": "分离交易可转债是附有认股权证并与认股权证分离交易的公司债券。如果认股权证持有人行权认购\n发行公司的普通股，则发行者在发行债券筹资的基础上实现了普通股筹资。\n \n16.财务预测和计划的主要方法是销售百分比法，是假定资产、负债与（　）存在稳定的百分比关系，根据预\n计销售收入和相应的百分比测算各类资产及总资产、各类负债及总负债，然后确定筹资计划的一种财务预测\n和计划方法。\nA.销售成本\nB.营业收入\nC.销售收入\nD.营业成本"}, {"question": "企业变革的基本原因在于企业发展中的矛盾冲突，企业一方面要实现组织目标，另一方面要（　）。", "options": [{"label": "A", "text": "适应环境"}, {"label": "B", "text": "创造利润"}, {"label": "C", "text": "技术创新"}, {"label": "D", "text": "满足社会需求"}], "answer": "C", "analysis": "财务计划的基础是财务预测。狭义的财务预测仅指估计企业未来的筹资需求：广义的财务预测包括\n编制全部的预计财务报表。\n财务预测和计划的主要方法是销售百分比法。\n销售百分比法是假定资产、负债与销售收入存在稳定的百分比关系，根据预计销售收入和相应的百分比测算\n各类资产及总资产、各类负债及总负债，然后确定筹资计划的一种财务预测和计划方法。选项C正确。\n \n17.企业变革的基本原因在于企业发展中的矛盾冲突，企业一方面要实现组织目标，另一方面要（　）。\nA.适应环境\nB.创造利润\nC.技术创新\nD.满足社会需求"}, {"question": "质量的特性是指产品、过程或体系与要求有关的固有特性。下列不属于服务质量特性的是（　）。", "options": [{"label": "A", "text": "可靠性"}, {"label": "B", "text": "响应性"}, {"label": "C", "text": "创新性"}, {"label": "D", "text": "移情性"}], "answer": "A", "analysis": "企业变革的基本原因在于企业发展中的矛盾冲突，企业一方面要实现组织目标，另一方面要适应环\n境。这决定了企业不可避免地处于各种矛盾的焦点上，矛盾冲突要求企业变革。\n \n18.质量的特性是指产品、过程或体系与要求有关的固有特性。下列不属于服务质量特性的是（　）。\nA.可靠性\nB.响应性\nC.创新性\nD.移情性"}, {"question": "如果厂址选择主要是考虑生产中的运输成本，可以采用（　）来选择厂址位置。", "options": [{"label": "A", "text": "重心法"}, {"label": "B", "text": "位置度量法"}, {"label": "C", "text": "线性规划法"}, {"label": "D", "text": "直接推断法"}], "answer": "C", "analysis": "一般来说，服务质量特性可以分为五种类型：\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n4\n①可靠性，即准确地履行服务承诺的能力;\n②响应性，即帮助顾客并迅速提供服务的能力;\n③保证性，即员工具有的知识、礼节以及表达出自信与可信的能力;\n④移情性，即设身处地地为顾客着想和对顾客给予特别的关注;\n⑤有形性，即有形的设备、设施、人员。\n \n19.如果厂址选择主要是考虑生产中的运输成本，可以采用（　）来选择厂址位置。\nA.重心法\nB.位置度量法\nC.线性规划法\nD.直接推断法"}, {"question": "一般适合于资产规模较小、管理不复杂、不需设立专门的管理机构的生产和经营企业的企业制度是（", "options": [{"label": "A", "text": "民营企业"}, {"label": "B", "text": "合伙制企业"}, {"label": "C", "text": "公司制企业"}, {"label": "D", "text": "单个业主制企业"}], "answer": "A", "analysis": "本题考查重心法。如果厂址选择主要是考虑生产中的运输成本，可以采用重心法来选择厂址位置。\n \n20.一般适合于资产规模较小、管理不复杂、不需设立专门的管理机构的生产和经营企业的企业制度是（　\n）。\nA.民营企业\nB.合伙制企业\nC.公司制企业\nD.单个业主制企业"}, {"question": "为企业的装备更新，如能源的获得、技人的增加、新设备的添置、新厂房的建造等属于企业技术改造的", "options": [{"label": "A", "text": "表层技术改造"}, {"label": "B", "text": "内层技术改造"}, {"label": "C", "text": "深层技术改造"}, {"label": "D", "text": "核心技术改造"}], "answer": "B", "analysis": "本题考查合伙制企业。合伙制企业一般适合于资产规模较小、管理不复杂、不需设立专门的管理机\n构的生产和经营企业。\n \n21.为企业的装备更新，如能源的获得、技人的增加、新设备的添置、新厂房的建造等属于企业技术改造的\n（　）。\nA.表层技术改造\nB.内层技术改造\nC.深层技术改造\nD.核心技术改造"}, {"question": "在信息系统中，对（　）的定义是加工处理后的数据，它对接受者的行为产生影响，对接受者的决策具有", "options": [{"label": "A", "text": "客观事物"}, {"label": "B", "text": "计算机"}, {"label": "C", "text": "信息"}, {"label": "D", "text": "商品"}], "answer": "A", "analysis": "本题考查技术改造的层次。表层技术改造主要表现为企业的装备更新，如能源的获得、技人的增加\n、新设备的添置、新厂房的建造等。\n \n22.在信息系统中，对（　）的定义是加工处理后的数据，它对接受者的行为产生影响，对接受者的决策具有\n价值。\nA.客观事物\nB.计算机\nC.信息\nD.商品"}, {"question": "管理者所管辖的下属人员或部门数量多的状况可称之为（　）。", "options": [{"label": "A", "text": "管理层次多"}, {"label": "B", "text": "管理空间广\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5"}, {"label": "C", "text": "管理幅度宽"}, {"label": "D", "text": "组织规模大"}], "answer": "C", "analysis": "信息是加工处理后的数据。它对接受者的行为产生影响，对接受者的决策具有价值。\n \n23.管理者所管辖的下属人员或部门数量多的状况可称之为（　）。\nA.管理层次多\nB.管理空间广\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5\nC.管理幅度宽\nD.组织规模大"}, {"question": "某企业为某零件进行单对象流水线的组织设计，日生产量为80件，每日工作8小时，时间利用系数为", "options": [{"label": "A", "text": "4.6"}, {"label": "B", "text": "5.0"}, {"label": "C", "text": "5.6"}, {"label": "D", "text": "6.0"}], "answer": "C", "analysis": "管理幅度是指一个主管能够直接有效地指挥和监督下属的数量。管理层次是指组织中从最高主管到\n一般工作人员之间的不同管理层级。管理者所管辖的下属人员或部门数量多的状况则称为管理幅度宽。\n \n24.某企业为某零件进行单对象流水线的组织设计，日生产量为80件，每日工作8小时，时间利用系数为\n0.96，废品率为2%，则该流水线的平均节拍是（　）分/件。\nA.4.6\nB.5.0\nC.5.6\nD.6.0"}, {"question": "9～0.96;Q为计划期的", "options": [{"label": "A", "text": "引力模型法"}, {"label": "B", "text": "因素评分法"}, {"label": "C", "text": "直接推断法"}, {"label": "D", "text": "线性规划法"}], "answer": "C", "analysis": "流水线的平均节拍计算式为:r=Te/Q=βT0/Q。式中，r为流水线的平均节拍;Te为计划期流水线的有\n效工作时间;T0为计划期流水线的制度工作时间;β为工作时间有效利用系数，一般为0.9～0.96;Q为计划期的\n产品产量（包括计划产量和预计废品量)。由题可得，计划期流水线的有效工作时间Te\n=0.96×60×8=460.8(分)，计划期的产品总产量Q=80/(1-0.02)=81.6(件)，则流水线的平均节拍\n=460.8/81.6=5.6(分/件)。\n \n25.（　）是对多个候选厂址进行分析评价的一种常用方法，但是由于决定因素的权数和评分都有一定主观性\n，因此在最终确定厂址时，还要和其他方法的分析结果综合起来评定。\nA.引力模型法\nB.因素评分法\nC.直接推断法\nD.线性规划法"}, {"question": "现代企业制度是适应现代化大生产和市场经济发展要求的，下列各项不属于其特点的是（　）。", "options": [{"label": "A", "text": "产权清晰"}, {"label": "B", "text": "企业法人的责任和权利明确"}, {"label": "C", "text": "出资者的无限责任和权利明确"}, {"label": "D", "text": "政企分开"}], "answer": "B", "analysis": "有多个候选厂址时，采用因素评分法进行分析评价。因素评分法对于一些包含非定量的因素的情况\n十分有效。但是由于决定因素的权数和评分都有一定主观性，因此在最终确定厂址时，还要和其他方法的分\n析结果综合起来评定。\n \n26.现代企业制度是适应现代化大生产和市场经济发展要求的，下列各项不属于其特点的是（　）。\nA.产权清晰\nB.企业法人的责任和权利明确\nC.出资者的无限责任和权利明确\nD.政企分开"}, {"question": "关于有控制组的事前事后对比实验，下列说法正确的是（　）。", "options": [{"label": "A", "text": "事前对实验组正常情况进行测量，实验后再测量，将两次测量结果进行比较"}, {"label": "B", "text": "事前对控制组正常情况进行测量，实验后再测量，将两次测量结果进行比较"}, {"label": "C", "text": "在同—时间内，将控制组与实验组进行对比"}, {"label": "D", "text": "对实验组和控制组分别进行事前事后测量，然后进行对比分析"}], "answer": "C", "analysis": "现代企业制度的基本特征包括:①产权清晰;②权责明确，包括企业法人的责任和权利明确与出资者\n的有限权利和有限责任明确;③政企分开;④管理科学。\n \n27.关于有控制组的事前事后对比实验，下列说法正确的是（　）。\nA.事前对实验组正常情况进行测量，实验后再测量，将两次测量结果进行比较\nB.事前对控制组正常情况进行测量，实验后再测量，将两次测量结果进行比较\nC.在同—时间内，将控制组与实验组进行对比\nD.对实验组和控制组分别进行事前事后测量，然后进行对比分析"}, {"question": "将组织的注意力同时集中在顾客和组织的是（　）.", "options": [{"label": "A", "text": "员工绩效"}, {"label": "B", "text": "六西格玛管理"}, {"label": "C", "text": "德尔菲法"}, {"label": "D", "text": "PDCA循环"}], "answer": "D", "analysis": "有控制组的事前事后对比实验是指在实验中，分别设立控制组和实验组两个样本组，要求对实验组\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n6\n和控制组分别进行实验前测量和实验后测量，然后进行事前、事后对比。\n \n28.将组织的注意力同时集中在顾客和组织的是（　）.\nA.员工绩效\nB.六西格玛管理\nC.德尔菲法\nD.PDCA循环"}, {"question": "强大的经济动力是形成经营机制的决定性因素，下列各项不属于动力机制的内容的是（　）。", "options": [{"label": "A", "text": "所有者权益"}, {"label": "B", "text": "经营者权利"}, {"label": "C", "text": "消费者需求"}, {"label": "D", "text": "劳动者积极性"}], "answer": "B", "analysis": "六西格玛管理将组织的注意力同时集中在顾客和组织两个方面，无疑会给组织带来诸如顾客满意度\n提高、市场占有率增加、缺陷率降低、成本降低、生产周期缩短、投资回报率提高等绩效。\n \n29.强大的经济动力是形成经营机制的决定性因素，下列各项不属于动力机制的内容的是（　）。\nA.所有者权益\nB.经营者权利\nC.消费者需求\nD.劳动者积极性"}, {"question": "关于抽样检验，下列说法正确的是（　）。", "options": [{"label": "A", "text": "从一批产品中随机抽取的一部分进行试验，通常检验少量的该产品来对产品的质量进行评估的方法，决定\n质量是否合格的结论"}, {"label": "B", "text": "从一批产品中随机抽取的一部分进行试验，通常检验大量的该产品来对产品的质量进行评估的方法，决定\n质量是否合格的结论"}, {"label": "C", "text": "从一批产品中有目的抽取的—部分进行试验，通常检验少量的该产品来对产品的质量进行评估的方法，决\n定质量是否合格的结论"}, {"label": "D", "text": "从一批产品中随机抽取的一部分进行试验，通常检验少量的该产品来对产品的质量进行预测的方法"}], "answer": "C", "analysis": "企业经营机制是指能够有效地协调市场需求和企业生产经营的综合体系，包括动力机制、调节机制\n、约束机制、发展机制。\n强大的经济动力是形成经营机制的决定性因素，动力机制主要包括所有者权益、经营者权利和劳动者积极性\n。\n \n30.关于抽样检验，下列说法正确的是（　）。\nA.从一批产品中随机抽取的一部分进行试验，通常检验少量的该产品来对产品的质量进行评估的方法，决定\n质量是否合格的结论\nB.从一批产品中随机抽取的一部分进行试验，通常检验大量的该产品来对产品的质量进行评估的方法，决定\n质量是否合格的结论\nC.从一批产品中有目的抽取的—部分进行试验，通常检验少量的该产品来对产品的质量进行评估的方法，决\n定质量是否合格的结论\nD.从一批产品中随机抽取的一部分进行试验，通常检验少量的该产品来对产品的质量进行预测的方法"}, {"question": "员工培训目标应遵循的原则，下列各项中，不属于确定员工培训目标原则的是（　）。", "options": [{"label": "A", "text": "服务于企业目标"}, {"label": "B", "text": "既有足够的难度和富于挑战性，又切合实际"}, {"label": "C", "text": "简明扼要，具体明确，便于操作"}, {"label": "D", "text": "具有较明显的经济效益"}], "answer": "A", "analysis": "抽样检验是从一批产品中随机抽取一部分进行检验，通过检验少量的该种产品来对这批产品的质量\n进行评估，并对这批产品做出是否合格、能否接收的结论。选项A正确。\n它是根据数理统计原理，在对供货方和收货方的利益、要求以及双方承担的风险都做考虑之后，规定产品的\n质量水平，并据此对批量、样本大小、判断标准等都做出适当规定的一种检验方式。\n \n31.员工培训目标应遵循的原则，下列各项中，不属于确定员工培训目标原则的是（　）。\nA.服务于企业目标\nB.既有足够的难度和富于挑战性，又切合实际\nC.简明扼要，具体明确，便于操作\nD.具有较明显的经济效益"}, {"question": "强制节拍流水生产线上，为保证严格的出产速度，采用的运输工具是（　）。", "options": [{"label": "A", "text": "机械化的传送带"}, {"label": "B", "text": "连续式运输带"}, {"label": "C", "text": "滚道"}, {"label": "D", "text": "叉车"}], "answer": "D", "analysis": "确定员工培训目标应遵循的原则有：\n①服从、服务于企业目标，与企业的长远目标相吻合;选项A。\n②既有足够的难度和富于挑战性，又切合实际，不宜过多过高;选项B。\n③简明扼要，具体明确，便于操作;选项C。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n7\n④具有较完备的体系结构，即在完成员工培训的期望目标下，应有与之相配套的足够的子目标。\n \n32.强制节拍流水生产线上，为保证严格的出产速度，采用的运输工具是（　）。\nA.机械化的传送带\nB.连续式运输带\nC.滚道\nD.叉车"}, {"question": "在学习型组织的五项修炼中，（　）是一种最基本的修炼方式，也是最重要的修炼方式，其重要作用在于", "options": [{"label": "A", "text": "自我超越"}, {"label": "B", "text": "建立共同愿景"}, {"label": "C", "text": "团队学习"}, {"label": "D", "text": "改善心智模式"}], "answer": "A", "analysis": "在强制节拍流水生产线上，为保证严格的出产速度，一般采用机械化的传送带作为运输工具；选项\nA正确。\n在自由节拍流水生产线上，由于工序同期化水平和连续性较低，一般采用连续式运输带、滚道或其他运输工\n具。\n \n33.在学习型组织的五项修炼中，（　）是一种最基本的修炼方式，也是最重要的修炼方式，其重要作用在于\n使得组织成员之间达成\"完善的协调和一体的感觉\"。\nA.自我超越\nB.建立共同愿景\nC.团队学习\nD.改善心智模式"}, {"question": "某公司拟实施某项技术改造项目，预计需要新投资4500万元，改造完成后年产量保持150万吨不变，每吨", "options": [{"label": "A", "text": "2100"}, {"label": "B", "text": "3000"}, {"label": "C", "text": "1500"}, {"label": "D", "text": "3850"}], "answer": "C", "analysis": "团队学习主要表现为一种学习的组织方式，其重要作用在于使得组织成员之间达成“完善的协调和\n—体的感觉”，它可以强化组织的各种能力，包括组织的思考和行动的能力，也包括组织的学习能力和应变\n能力。团队学习是一种最基本的修炼方式，也是最重要的修炼方式。\n \n34.某公司拟实施某项技术改造项目，预计需要新投资4500万元，改造完成后年产量保持150万吨不变，每吨\n主营产品的成本下降20元，标准投资效益系数为0.2，则该项目的年度经济效益为（　）万元。\nA.2100\nB.3000\nC.1500\nD.3850"}, {"question": "2*4500=2100（万元）。", "options": [{"label": "A", "text": "财务分析"}, {"label": "B", "text": "新产品开发决策"}, {"label": "C", "text": "工程图设计"}, {"label": "D", "text": "新产品试制"}], "answer": "A", "analysis": "根据公式可得，年度经济效益E=Q1(C0-C1)-E0K总=150*20-0.2*4500=2100（万元）。\n \n35.新产品开发中，对新产品设计进行工艺性审查属于（　）阶段的工作。\nA.财务分析\nB.新产品开发决策\nC.工程图设计\nD.新产品试制"}, {"question": "如果企业开出的信用条件是“5/20，2/50，n/90”，则客户最晚需要在开出发票的（　）内付款。", "options": [{"label": "A", "text": "30天"}, {"label": "B", "text": "25天"}, {"label": "C", "text": "52天\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8"}, {"label": "D", "text": "90天"}], "answer": "D", "analysis": "新产品的试制是指新产品设计完成后，需要进行新产品试制的工艺准备工作，这主要包括对新产品\n设计进行工艺性审查和分析、编制工艺方案、编制工艺规程和设计制造专用工艺装备等。\n \n36.如果企业开出的信用条件是“5/20，2/50，n/90”，则客户最晚需要在开出发票的（　）内付款。\nA.30天\nB.25天\nC.52天\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8\nD.90天"}, {"question": "下列选项中，按照工艺专业化进行布置的缺点不包括（　）。", "options": [{"label": "A", "text": "资金占用增加"}, {"label": "B", "text": "产品加工路线长"}, {"label": "C", "text": "适应性强"}, {"label": "D", "text": "管理工作复杂化"}], "answer": "D", "analysis": "信用条件“5/20，2/50，n/90”的含义是：如果客户在开出发票的20天内付款，享受5%的折扣；如\n果在开出发票的第21天到第50天内付款，享受2%的折扣；如果客户放弃现金折扣，全部款项必须在90天内付\n清。信用期限长，现金折扣率高，说明企业信用政策松，促销力度大。\n \n37.下列选项中，按照工艺专业化进行布置的缺点不包括（　）。\nA.资金占用增加\nB.产品加工路线长\nC.适应性强\nD.管理工作复杂化"}, {"question": "企业管理信息系统开发过程中，为了保证各部门的协调一致，标准统一，应当遵守（　）。", "options": [{"label": "A", "text": "标准化原则"}, {"label": "B", "text": "系统性原则"}, {"label": "C", "text": "实用性原则"}, {"label": "D", "text": "面向用户原则"}], "answer": "C", "analysis": "工艺专业化布置就是按照生产过程各个工艺阶段的工艺特点来设置生产单位。\n按工艺专业化原则设置生产单位的优点是：\n①对产品品种的变化具有较强的适应性。\n②便于充分利用生产设备与生产面积，提高生产设备和生产面积的负荷系数。\n③便于进行工艺专业化管理，并有利于工人技术熟练程度的提高。\n缺点是：①产品加工路线长，运输工具、运输工人和中间仓库增多，使厂内运输费用增加。②生产周期延长\n，资金占用增加。③管理工作复杂化。\n \n38.企业管理信息系统开发过程中，为了保证各部门的协调一致，标准统一，应当遵守（　）。\nA.标准化原则\nB.系统性原则\nC.实用性原则\nD.面向用户原则"}, {"question": "根据企业拥有资源的性质和所占比重予以分类，石油化工企业是（　）企业。", "options": [{"label": "A", "text": "劳动密集型"}, {"label": "B", "text": "知识密集型"}, {"label": "C", "text": "资金密集型"}, {"label": "D", "text": "工业企业"}], "answer": "A", "analysis": "开发过程中应遵守的开发原则：\n（1）系统性原则。整个系统是一个整体，要遵守系统工程的思想进行开发，做到整体的有机结合，以达到最\n佳状态。\n（2）标准化原则。在开发过程中，要遵守标准化原则，以保证各部门间协调一致，使开发的各个阶段如期完\n成。选项A正确。\n（3）实用性与先进性兼顾原则。在开发过程中，既要针对企业的常规管理要求，也要考虑企业业务扩展的要\n求，用先进性思想指导开发工作，要尽可能采用先进的技术手段和设备，但也要考虑开发的投资成本，兼顾\n先进性与实用性。\n（4）逐步完善原则。信息系统的建立不可能一开始就很完善，而要经历一个逐步完善、逐步发展的过程。\n（5）面向用户原则。系统开发的使用者是用户，这一观念要贯穿在系统开发的整个过程中，无论是设计风格\n还是客户需求的实现等都要体现这一原则。\n \n39.根据企业拥有资源的性质和所占比重予以分类，石油化工企业是（　）企业。\nA.劳动密集型\nB.知识密集型\nC.资金密集型\nD.工业企业"}, {"question": "某汽修企业为了解整个地区60000个家庭拥有私家车的情况，采用抽样方法抽取600个家庭进行市场调查", "options": [{"label": "A", "text": "总体"}, {"label": "B", "text": "抽样框"}, {"label": "C", "text": "抽样总体"}, {"label": "D", "text": "母体"}], "answer": "C", "analysis": "按生产要素密集程度划分，即根据企业拥有资源的性质和所占比重予以分类，企业可以分为以下几\n类：\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n9\n（1）劳动密集型企业。劳动密集型企业是指活劳动量所占比重较大、资本有机构成低的企业，如一些生产科\n技含量较低的纺织企业、食品企业等。\n（2）资金密集型企业。资金密集型企业（或技术密集型企业）是指投资大、技术装备程度较高、劳动力比重\n小的企业，如机械工业企业、化工企业等。选项C。\n（3）知识密集型企业。知识密集型企业是指能够综合运用先进科学技术成果，中、高级技术和科研人员在员\n工中所占比重较大，所投入的科研时间和产品开发费用较高，能生产高、精、尖产品的企业，如航空工业企\n业、软件开发生产企业等。\n \n40.某汽修企业为了解整个地区60000个家庭拥有私家车的情况，采用抽样方法抽取600个家庭进行市场调查\n，被抽取的这600个家庭称为（　）。\nA.总体\nB.抽样框\nC.抽样总体\nD.母体"}, {"question": "下列筹资方式中，筹集的资金可永久使用、但容易分散公司控制权的是（　）。", "options": [{"label": "A", "text": "银行借款"}, {"label": "B", "text": "发行债券"}, {"label": "C", "text": "商业信用"}, {"label": "D", "text": "发行普通股"}], "answer": "C", "analysis": "全及总体简称总体或母体，是指所要调查单位的全体。由于总体是抽样调查推断的对象或目标，因\n此又称其为目标总体。构成总体的每一个单位或个体称为总体单位，总体单位的数量称为总体单位数。\n抽样总体简称样本，是从总体中抽取的一部分单位（个体）的集合。此题中，60000个家庭为总体，从中抽取\n的600个家庭为样本。\n \n41.下列筹资方式中，筹集的资金可永久使用、但容易分散公司控制权的是（　）。\nA.银行借款\nB.发行债券\nC.商业信用\nD.发行普通股"}, {"question": "企业组织结构、战略管理、报酬系统等方面的改进属于（　）。", "options": [{"label": "A", "text": "技术变革"}, {"label": "B", "text": "产品变革"}, {"label": "C", "text": "战略与结构变革"}, {"label": "D", "text": "服务变革"}], "answer": "D", "analysis": "发行普通股是股份制公司筹集股权资本的基本方式。公司上市后可通过配股和增发的方式进行股权\n再融资。其优点是筹措的资金可永久使用，没有固定的股利负担，筹资风险小。缺点是资金成本高，发行费\n用高，没有抵税作用，容易分散公司控制权，稀释每股收益。\n \n42.企业组织结构、战略管理、报酬系统等方面的改进属于（　）。\nA.技术变革\nB.产品变革\nC.战略与结构变革\nD.服务变革"}, {"question": "工序能力指数不高于（　）时，可以认为工序能力严重不足。", "options": [{"label": "A", "text": "1.33\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10"}, {"label": "B", "text": "1"}, {"label": "C", "text": "0.67"}, {"label": "D", "text": "0.5"}], "answer": "C", "analysis": "战略与结构变革所涉及的完全是企业行政管理问题。这些问题主要关系到企业的监督与管理。\n现代企业战略与结构变革包括组织结构、战略管理、政策、报酬系统、劳资关系、协调策略、管理信息和控\n制系统以及会计和预算系统等方面的改进。每个企业在其生命周期中都需要不断地在其战略和结构方面进行\n变革。\n当环境相对稳定时，多数企业往往只关注一些小的渐进式变革，以解决临时性的问题或利用新机会。但在新\n的形势下，全世界的企业均面临这样一种需要，即在战略、结构和管理流程方面进行剧烈式变革，以适应新\n的竞争要求。\n \n43.工序能力指数不高于（　）时，可以认为工序能力严重不足。\nA.1.33\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10\nB.1\nC.0.67\nD.0.5"}, {"question": "用于在贸易伙伴的计算机系统之间进行数据交换和自动处理，被俗称为“无纸交易”的技术是（　）。", "options": [{"label": "A", "text": "电子数据交换"}, {"label": "B", "text": "物流控制"}, {"label": "C", "text": "全球定位"}, {"label": "D", "text": "射频识别"}], "answer": "C", "analysis": "44.用于在贸易伙伴的计算机系统之间进行数据交换和自动处理，被俗称为“无纸交易”的技术是（　）。\nA.电子数据交换\nB.物流控制\nC.全球定位\nD.射频识别"}, {"question": "主要从事以下业务的企业，在市场经济中虽然不可缺少但由于其规模较小，主要起补充作用的是（　）。", "options": [{"label": "A", "text": "石油开采"}, {"label": "B", "text": "银行"}, {"label": "C", "text": "律师事务所"}, {"label": "D", "text": "家庭农场"}], "answer": "A", "analysis": "电子数据交换（electronicdatainterchange，EDI）是指按照统一规定的一套通用标准格式，将标\n准的经济信息通过通信网络传输，在贸易伙伴的电子计算机系统之间进行数据交换和自动处理。由于使用\nEDI能有效减少直到最终消除贸易过程中的纸面单证，因而EDI也被俗称为“无纸交易”。\n \n45.主要从事以下业务的企业，在市场经济中虽然不可缺少但由于其规模较小，主要起补充作用的是（　）。\nA.石油开采\nB.银行\nC.律师事务所\nD.家庭农场"}, {"question": "下列关于网络调查法的特点的说法，错误的是（　）。", "options": [{"label": "A", "text": "不受时空限制"}, {"label": "B", "text": "样本没有局限性"}, {"label": "C", "text": "组织简单、成本低"}, {"label": "D", "text": "信息安全不易得到保证"}], "answer": "D", "analysis": "单个业主制企业一般适用于零售商业、服务业、手工业、家庭农场等。单个业主制企业诞生于市场\n经济早期，是最早的企业形式。这种企业形式数量庞大，占企业总数的比重较大，在市场经济中虽然不可缺\n少但由于其规模较小，主要起补充作用。\n \n46.下列关于网络调查法的特点的说法，错误的是（　）。\nA.不受时空限制\nB.样本没有局限性\nC.组织简单、成本低\nD.信息安全不易得到保证"}, {"question": "某小学为了调查五年级学生的平均身高，在五年级抽取两个班的全体学生作为样本，属于（　）。", "options": [{"label": "A", "text": "判断抽样\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11"}, {"label": "B", "text": "配额抽样"}, {"label": "C", "text": "滚雪球抽样"}, {"label": "D", "text": "整群抽样"}], "answer": "B", "analysis": "网络调查法具有速度快、成本低、组织简单、不受时空限制等特点。其缺点主要表现在样本对象的\n局限性、信息安全性等方面。\n \n47.某小学为了调查五年级学生的平均身高，在五年级抽取两个班的全体学生作为样本，属于（　）。\nA.判断抽样\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11\nB.配额抽样\nC.滚雪球抽样\nD.整群抽样"}, {"question": "对现场和设备认真维护，使其保持最佳状态，消除发生安全事故的根源，营造良好的工作环境，使员工能", "options": [{"label": "A", "text": "清洁"}, {"label": "B", "text": "整顿"}, {"label": "C", "text": "清扫"}, {"label": "D", "text": "素养"}], "answer": "D", "analysis": "将调查总体中各单位归并成若干个互不交叉、互不重复的集合称为群。整群抽样是指以群为抽样单\n位抽取样本的一种抽样方式。例如，调查大学生的消费情况，组成调查总体的基本单位是每个学生，将学生\n班级作为群，从中抽取几个班级进行抽样调查，选中班级中的全部学生均作为调查样本进行调查。应用整群\n抽样时，要求所抽取的群体样本有较好的代表性，即群内各单位的差异要大，群间差异要小。\n \n48.对现场和设备认真维护，使其保持最佳状态，消除发生安全事故的根源，营造良好的工作环境，使员工能\n愉快地工作。这种活动属于“5S”活动中（　）的内容。\nA.清洁\nB.整顿\nC.清扫\nD.素养"}, {"question": "工作说明书的编写一般由现职人员（　）。", "options": [{"label": "A", "text": "发表意见"}, {"label": "B", "text": "参与修改"}, {"label": "C", "text": "自我描述"}, {"label": "D", "text": "最终审批"}], "answer": "A", "analysis": "\"5S\"管理是指对生产现场各生产要素，主要是物的要素所处状态不断地进行整理、整顿、清扫、清\n洁和提高素养的活动。\n清洁是指对现场和设备认真维护，使其保持最佳状态。清洁是对前三项活动的坚持与深入，从而消除发生安\n全事故的根源，营造良好的工作环境，使员工能愉快地工作\n \n49.工作说明书的编写一般由现职人员（　）。\nA.发表意见\nB.参与修改\nC.自我描述\nD.最终审批"}, {"question": "企业组织设计的根本目的是（　），使企业的每一项内容都能落实到具体的岗位和部门，这就意味着在组", "options": [{"label": "A", "text": "保证领导的权力需要"}, {"label": "B", "text": "保证企业销售毛利"}, {"label": "C", "text": "保证企业目标的实现"}, {"label": "D", "text": "保证企业员工的稳定"}], "answer": "C", "analysis": "工作说明书的编写一般由现职人员自我描述，主管领导审批，专家撰写主要职责，人力资源部及其\n他部门工作人员协助完成其他工作描述。\n \n50.企业组织设计的根本目的是（　），使企业的每一项内容都能落实到具体的岗位和部门，这就意味着在组\n织设计中首先要考虑工作的特点和要求，努力做到因事设职、因职用人。\nA.保证领导的权力需要\nB.保证企业销售毛利\nC.保证企业目标的实现\nD.保证企业员工的稳定"}, {"question": "分工可以分为企业内部分工协作和社会分工协作两个层面，其中企业内部分工可以（　），从而提高生产", "options": [{"label": "A", "text": "降低损耗"}, {"label": "B", "text": "提高收入"}, {"label": "C", "text": "减少投入和增加产出"}, {"label": "D", "text": "增加员工积极性\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n12"}], "answer": "C", "analysis": "企业组织设计的根本目的是为了保证企业目标的实现，使企业的每一项内容都能落实到具体的岗位\n和部门，这就意味着在组织设计中首先要考虑工作的特点和要求，努力做到因事设职、因职用人。\n \n51.分工可以分为企业内部分工协作和社会分工协作两个层面，其中企业内部分工可以（　），从而提高生产\n效率。\nA.降低损耗\nB.提高收入\nC.减少投入和增加产出\nD.增加员工积极性\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n12"}, {"question": "企业中的管理人员根据工作方式与具体作用的不同，可以分为直线关系的主管人员和参谋关系的参谋人员", "options": [{"label": "A", "text": "协调关系"}, {"label": "B", "text": "互补关系"}, {"label": "C", "text": "命令关系"}, {"label": "D", "text": "互惠关系"}], "answer": "C", "analysis": "企业内部分工可以减少企业投入和增加产出，从而提高生产效率。\n \n52.企业中的管理人员根据工作方式与具体作用的不同，可以分为直线关系的主管人员和参谋关系的参谋人员\n两种形式。企业组织结构中直线关系的本质是（　）。\nA.协调关系\nB.互补关系\nC.命令关系\nD.互惠关系"}], "冲刺卷（151-200题）": [{"question": "企业生产类型是影响生产过程组织的主要因素，也是设计企业生产系统首先应确定的重要问题，下列不属", "options": [{"label": "A", "text": "稳定性"}, {"label": "B", "text": "重复性"}, {"label": "C", "text": "定期轮番生产"}, {"label": "D", "text": "工人操作技术单一"}], "answer": "C", "analysis": "直线关系是上级指挥下级的关系，其实质上是一种命令关系。\n \n53.企业生产类型是影响生产过程组织的主要因素，也是设计企业生产系统首先应确定的重要问题，下列不属\n于成批生产类型的特征的是（　）。\nA.稳定性\nB.重复性\nC.定期轮番生产\nD.工人操作技术单一"}, {"question": "下列关于质量管理的说法，错误的是（　）。", "options": [{"label": "A", "text": "质量管理是指从质量方面指挥和控制组织的协调活动"}, {"label": "B", "text": "质量管理的环节包括制定质量方针、质量目标、质量策划、质量控制、质量保证和质量改进"}, {"label": "C", "text": "围绕产品质量形成的全过程实施质量管理是组织各项工作的主线"}, {"label": "D", "text": "质量管理仅涉及组织的生产活动"}], "answer": "D", "analysis": "成批生产具有一定的生产稳定性和生产重复性，具有定期重复轮番生产的特点。ABC属于。\n选项D属于大量生产类型的特点。\n \n54.下列关于质量管理的说法，错误的是（　）。\nA.质量管理是指从质量方面指挥和控制组织的协调活动\nB.质量管理的环节包括制定质量方针、质量目标、质量策划、质量控制、质量保证和质量改进\nC.围绕产品质量形成的全过程实施质量管理是组织各项工作的主线\nD.质量管理仅涉及组织的生产活动"}, {"question": "企业的规章制度是全体员工行动的准则，其核心是（　）。", "options": [{"label": "A", "text": "责任制度"}, {"label": "B", "text": "制定工作计划"}, {"label": "C", "text": "工作制度"}, {"label": "D", "text": "基本制度"}], "answer": "D", "analysis": "质量涉及组织的各个方面，是否有效地实施质量管理关系到组织的兴衰。选项D错误。\n \n55.企业的规章制度是全体员工行动的准则，其核心是（　）。\nA.责任制度\nB.制定工作计划\nC.工作制度\nD.基本制度"}, {"question": "流水生产线是指加工对象连续不断地像流水似的按既定的工艺顺序，以规定的节拍通过各道工序的加工。", "options": [{"label": "A", "text": "流水生产线上各道工序的工作地数量与该工序单件工时成反比"}, {"label": "B", "text": "流水生产线的加工对象是固定的，工作地的专业化程度较高"}, {"label": "C", "text": "流水生产线的各工作地按工艺过程的顺序排列"}, {"label": "D", "text": "流水生产线具有较高的生产率"}], "answer": "A", "analysis": "责任制度是企业规章制度的核心，是企业内部各岗位所规定的任务、权力和责任的总称。通过责任\n制度确定各个岗位上的人员所承担的职责和义务以及所享有的权益。\n \n56.流水生产线是指加工对象连续不断地像流水似的按既定的工艺顺序，以规定的节拍通过各道工序的加工。\n下列关于流水生产线的说法，错误的是（　）。\nA.流水生产线上各道工序的工作地数量与该工序单件工时成反比\nB.流水生产线的加工对象是固定的，工作地的专业化程度较高\nC.流水生产线的各工作地按工艺过程的顺序排列\nD.流水生产线具有较高的生产率"}, {"question": "企业管理具有自然属性和社会属性，下列关于企业管理的社会属性的说法，正确的是（　）。", "options": [{"label": "A", "text": "与生产力、社会化大生产相联系"}, {"label": "B", "text": "与自然资源、社会制度相联系"}, {"label": "C", "text": "与生产关系、社会制度相联系"}, {"label": "D", "text": "与生产力、社会进步相联系"}], "answer": "A", "analysis": "线上的设备和工艺、装备是针对加工对象的工艺要求配置的，一般能封闭地完成加工对象的全部生\n产工艺，线上各工序的工作地数量与该工序单件工时的比值保持一致，即各工序的生产能力符合比例性的要\n求。选项A错误。\n \n57.企业管理具有自然属性和社会属性，下列关于企业管理的社会属性的说法，正确的是（　）。\nA.与生产力、社会化大生产相联系\nB.与自然资源、社会制度相联系\nC.与生产关系、社会制度相联系\nD.与生产力、社会进步相联系"}, {"question": "工作对思维的要求，是抽象性的，还是形象性的或者兼而有之;是需要更多的创造性思维，还是要按照有", "options": [{"label": "A", "text": "复杂程度"}, {"label": "B", "text": "饱和程度"}, {"label": "C", "text": "难易程度"}, {"label": "D", "text": "内容和形式"}], "answer": "C", "analysis": "企业管理具有二重性：一方面，它具有与生产力、社会化大生产相联系的自然属性；另一方面，又\n具有与生产关系、社会制度相联系的社会属性。\n \n58.工作对思维的要求，是抽象性的，还是形象性的或者兼而有之;是需要更多的创造性思维，还是要按照有\n关的标准严格执行等是工作的（　）。\nA.复杂程度\nB.饱和程度\nC.难易程度\nD.内容和形式"}, {"question": "某企业年末损益表中销售收入为30000万元，销售成本为18000万元，年末应收账款为800万元，年初应收", "options": [{"label": "A", "text": "2.5"}, {"label": "B", "text": "18.0"}, {"label": "C", "text": "30.0"}, {"label": "D", "text": "37.5"}], "answer": "A", "analysis": "工作层面的培训需求分析包括：①工作的复杂程度；②工作的饱和程度；③工作的难易程度；④工\n作内容和形式的变化。\n工作的复杂程度。这主要是指工作对思维的要求，是抽象性的，还是形象性的或者兼而有之;是需要更多的创\n造性思维，还是要按照有关的标准严格执行等。\n \n59.某企业年末损益表中销售收入为30000万元，销售成本为18000万元，年末应收账款为800万元，年初应收\n账款为1200万元，则应收账款周转率为（　）。\nA.2.5\nB.18.0\nC.30.0\nD.37.5"}, {"question": "0。", "options": [{"label": "A", "text": "倡导者"}, {"label": "B", "text": "黑带大师"}, {"label": "C", "text": "黑带"}, {"label": "D", "text": "绿带"}], "answer": "C", "analysis": "应收账款周转率(次数)=营业收人(销售收入)平均应收账款余额；平均应收账款余额=(应收账款年初\n数+应收账款年末数)/2，该企业应收账款周转率=30000/[(1200+800)/2]=30.0。\n \n60.在六西格玛组织结构中，大多是为兼职，推进六西格玛管理在企业的全面实行，决定\"该做什么”的是\n（　）。\nA.倡导者\nB.黑带大师\nC.黑带\nD.绿带"}, {"question": "国家对现金管理有明确规定，具体包括（　）。", "options": [{"label": "A", "text": "现金的适用范围"}, {"label": "B", "text": "库存现金一般以一周的零星开支为限"}, {"label": "C", "text": "不得出借银行账户"}, {"label": "D", "text": "可以坐支现金\nE.不能把公款以个人名义存入银行"}], "answer": "A", "analysis": "倡导者一般由企业高级管理层组成，如行政总裁、总经理、副总经理(包括首席信息官或首席财务官\n)，大多数为兼职，推进六西格玛管理在企业的全面实行，决定\"该做什么”。\n \n多项选择题\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n14\n61.国家对现金管理有明确规定，具体包括（　）。\nA.现金的适用范围\nB.库存现金一般以一周的零星开支为限\nC.不得出借银行账户\nD.可以坐支现金\nE.不能把公款以个人名义存入银行"}, {"question": "分工是为了适应生产率提高的要求而产生的，企业内部分工能提高企业生产效率，其主要表现有（　）。", "options": [{"label": "A", "text": "分工不能提高劳动者的劳动技巧"}, {"label": "B", "text": "分工能减少劳动转换时间"}, {"label": "C", "text": "分工促进了先进劳动工具发明和使用"}, {"label": "D", "text": "分工节约了社会资源\nE.分工便于对生产要素进行重组"}], "answer": "A", "analysis": "国家对现金管理有明确规定，包括以下六个方面：\n①现金的使用范围。这里的现金是狭义概念上的现金，即指企业的现钞交易，只能在一定的范围内使用，例\n如，支付工资、津贴;支付个人的报酬、劳保费用等规定的其他对个人的支出;差旅费;中国人民银行规定的其\n他支出。选项A。\n②库存的现金一般以3-5天的零星开支为限。选项B错误。\n③不得坐支现金，即企业不能用其收到的现金直接支付现金开支。选项D错误。\n④不得出租出借银行账户。选项C。\n⑤不能套用银行信用。\n⑥不得保存账外公款，不能把公款以个人的名义存入银行。选项E.\n \n62.分工是为了适应生产率提高的要求而产生的，企业内部分工能提高企业生产效率，其主要表现有（　）。\nA.分工不能提高劳动者的劳动技巧\nB.分工能减少劳动转换时间\nC.分工促进了先进劳动工具发明和使用\nD.分工节约了社会资源\nE.分工便于对生产要素进行重组"}, {"question": "生产过程时间组织的目标不包括（　）。", "options": [{"label": "A", "text": "降低空间浪费"}, {"label": "B", "text": "提高生产率"}, {"label": "C", "text": "降低成本"}, {"label": "D", "text": "减少运输空间\nE.缩短生产周期"}], "answer": "B", "analysis": "分工是为了适应生产率提高的要求而产生的，而分工和专业化所产生的效率来源于各个劳动者有差\n异的劳动能力的充分发挥以及劳动者合作所产生的协调力。企业内部分工可以减少企业投入和增加产出，从\n而提高生产效率。\n①分工可以使劳动者的劳动技巧获得提高。选项A错误。\n②分工能减少劳动转换时间。选项B。\n③分工促进了先进劳动工具和机器的发明和使用。选项C。\n④分工便于对生产要素进行重组，从而使各要素充分发挥优势，并相互协调。选项E。\n \n63.生产过程时间组织的目标不包括（　）。\nA.降低空间浪费\nB.提高生产率\nC.降低成本\nD.减少运输空间\nE.缩短生产周期"}, {"question": "采取进取战略时，新产品开发的方式一般为（　）。", "options": [{"label": "A", "text": "自行研制开发"}, {"label": "B", "text": "引进开发\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n15"}, {"label": "C", "text": "自行研制与技术引进相结合"}, {"label": "D", "text": "合作开发\nE.委托开发"}], "answer": "A", "analysis": "生产过程的时间组织是指在时间上对劳动对象在车间之间、工段之间及工作地之间的运动配合与衔\n接进行合理的安排和设计。其重要目的是以最大限度地提高生产过程的连续性和节奏性来提高生产率、降低\n成本、缩短生产周期。\n \n64.采取进取战略时，新产品开发的方式一般为（　）。\nA.自行研制开发\nB.引进开发\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n15\nC.自行研制与技术引进相结合\nD.合作开发\nE.委托开发"}, {"question": "产品缺陷损害赔偿责任的责任条件包括（　）。", "options": [{"label": "A", "text": "产品存在缺陷"}, {"label": "B", "text": "产品不符合明示的质量状况"}, {"label": "C", "text": "发生了因产品缺陷造成的损害"}, {"label": "D", "text": "产品缺陷与损害事实存在因果关系\nE.产品不具备应当具备的使用性能，且事先未声明"}], "answer": "A", "analysis": "本题考查进取战略。采取进取战略时，新产品开发的方式一般为自行研制开发或合作开发。\n \n65.产品缺陷损害赔偿责任的责任条件包括（　）。\nA.产品存在缺陷\nB.产品不符合明示的质量状况\nC.发生了因产品缺陷造成的损害\nD.产品缺陷与损害事实存在因果关系\nE.产品不具备应当具备的使用性能，且事先未声明"}, {"question": "常用的脱产培训方法包括（　）。", "options": [{"label": "A", "text": "授课法"}, {"label": "B", "text": "案例研究法"}, {"label": "C", "text": "情景模拟法"}, {"label": "D", "text": "网络培训法\nE.师带徒"}], "answer": "A", "analysis": "本题考查《产品质量法》的民事责任。产品缺陷损害赔偿责任的责任条件：（1）产品存在缺陷（选\n项A）；（2）发生了因产品缺陷造成的损害（选项C）；（3）产品缺陷与损害事实存在因果关系（选项D）。\n \n66.常用的脱产培训方法包括（　）。\nA.授课法\nB.案例研究法\nC.情景模拟法\nD.网络培训法\nE.师带徒"}, {"question": "技术改造项目的可行性研究一般分为四个阶段，包括（　）。", "options": [{"label": "A", "text": "B、C、D项都是常用的脱产培训方法，E项属在岗培训方法。\n \n67.技术改造项目的可行性研究一般分为四个阶段，包括（　）。"}, {"label": "A", "text": "确定投资方向阶段"}, {"label": "B", "text": "项目的初步选择阶段"}, {"label": "C", "text": "项目的拟订阶段"}, {"label": "D", "text": "项目的评价和决策阶段\nE.项目实施阶段"}], "answer": "A", "analysis": "A、B、C、D项都是常用的脱产培训方法，E项属在岗培训方法。\n \n67.技术改造项目的可行性研究一般分为四个阶段，包括（　）。\nA.确定投资方向阶段\nB.项目的初步选择阶段\nC.项目的拟订阶段\nD.项目的评价和决策阶段\nE.项目实施阶段"}, {"question": "确定投资方向阶段;2.项目的初步选择阶段;3.项", "options": [{"label": "A", "text": "目的"}, {"label": "B", "text": "标题"}, {"label": "C", "text": "背景"}, {"label": "D", "text": "目录\nE.摘要"}], "answer": "A", "analysis": "技术改造项目的可行性研究一般分为四个阶段：1.确定投资方向阶段;2.项目的初步选择阶段;3.项\n目的拟订阶段;4.项目的评价和决策阶段。\n由于企业技术改造较为复杂，涉及的问题多，政策性强，因而进行可行性研究和经济评价难度较高。\n \n68.下列各项中，属于市场调查报告前言部分的有（　）。\nA.目的\nB.标题\nC.背景\nD.目录\nE.摘要"}, {"question": "下列属于引进开发新产品的形式的是（　）。", "options": [{"label": "A", "text": "合作开发"}, {"label": "B", "text": "集成创新"}, {"label": "C", "text": "购买技术专利"}, {"label": "D", "text": "自主研发\nE.技术转移"}], "answer": "B", "analysis": "正式的市场调查报告的格式一般包括三个部分：\n①前言部分，是市场调查报告的开头部分，主要包括标题、目录和摘要。选项BDE正确。\n②正文部分，是市场调查报告的主要部分，包括市场调查的背景和目的介绍、调查方案设计、数据分析、调\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16\n查结果及其评价、结论及建议。\n③附录部分，是指正文中未包含或为了使正文简洁易懂，必须放置于文后便于查阅的有关技术性文件，是对\n正文的补充和更为详尽的说明。\n附录主要包括：①调查问卷、数据汇总表。②抽样方案设计、统计分析计算的细节。③对一些技术问题的讨\n论。④参考文献等。\n \n69.下列属于引进开发新产品的形式的是（　）。\nA.合作开发\nB.集成创新\nC.购买技术专利\nD.自主研发\nE.技术转移"}, {"question": "现代企业制度的特征有（　）。", "options": [{"label": "A", "text": "政企分开"}, {"label": "B", "text": "投资主体多元化"}, {"label": "C", "text": "产权清晰"}, {"label": "D", "text": "企业存续期长\nE.权责明确"}], "answer": "C", "analysis": "引进开发是指企业通过技术合作、技术转移、购买技术专利等引进国内外先进成熟的应用技术和制\n造技术，并以此来实现新产品开发的技术开发方式。采用这种方式开发新产品可较快掌握新产品的制造技术\n，缩短开发周期，尽快将新产品投入国内外市场；可缩短与同类产品的技术差距，减少技术风险。但开发后\n的新产品将面临较激烈的市场竞争，因此，适用于产品有广阔市场的企业。\n \n70.现代企业制度的特征有（　）。\nA.政企分开\nB.投资主体多元化\nC.产权清晰\nD.企业存续期长\nE.权责明确"}, {"question": "厂址选择的主要步骤包括（　）。", "options": [{"label": "A", "text": "确定选址目标"}, {"label": "B", "text": "收集数据，分析因素，拟订初步候选方案"}, {"label": "C", "text": "评价候选方案"}, {"label": "D", "text": "选定最终厂址方案\nE.实地考察厂址"}], "answer": "A", "analysis": "现代企业制度是适应社会化大生产和市场经济发展要求的，以产权制度为核心，以有限责任制度为\n保证，以现代公司制企业为主要形式的，产权清晰、权责明确、政企分开、管理科学的新型企业制度。\n \n71.厂址选择的主要步骤包括（　）。\nA.确定选址目标\nB.收集数据，分析因素，拟订初步候选方案\nC.评价候选方案\nD.选定最终厂址方案\nE.实地考察厂址"}, {"question": "在产品生命周期的引入阶段，企业需要利用（　）等基本要素组成不同的营销策略。", "options": [{"label": "A", "text": "产品"}, {"label": "B", "text": "价格"}, {"label": "C", "text": "技术"}, {"label": "D", "text": "分销\nE.促销"}], "answer": "A", "analysis": "厂址选择的步骤包括：确定选址目标；收集数据，分析因素，拟订初步候选方案；评价候选方案\n；选定最终厂址方案。\n \n72.在产品生命周期的引入阶段，企业需要利用（　）等基本要素组成不同的营销策略。\nA.产品\nB.价格\nC.技术\nD.分销\nE.促销"}, {"question": "六西格玛管理的工作程序是DMAIC，其中不包括（　）。", "options": [{"label": "A", "text": "界定"}, {"label": "B", "text": "调查"}, {"label": "C", "text": "改进"}, {"label": "D", "text": "总结\nE.反馈"}], "answer": "A", "analysis": "产品引入阶段具有销售量少、制造成本高、促销费用高、销售利润低的特点。根据这些特点，企业\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17\n通常利用产品、分销、价格、促销四个基本要素组合成不同的营销策略帮助产品顺利渡过引入阶段。\n \n73.六西格玛管理的工作程序是DMAIC，其中不包括（　）。\nA.界定\nB.调查\nC.改进\nD.总结\nE.反馈"}, {"question": "企业领导职能的作用包括（　）。", "options": [{"label": "A", "text": "协调作用"}, {"label": "B", "text": "计划作用"}, {"label": "C", "text": "激励作用"}, {"label": "D", "text": "指挥作用\nE.控制作用"}], "answer": "B", "analysis": "DMAIC流程包括：①界定；②测量；③分析；④改进；⑤控制。\n \n74.企业领导职能的作用包括（　）。\nA.协调作用\nB.计划作用\nC.激励作用\nD.指挥作用\nE.控制作用"}, {"question": "根据工作方式与具体作用的不同，企业的管理人员主要分为（　）。", "options": [{"label": "A", "text": "主管人员"}, {"label": "B", "text": "执行人员"}, {"label": "C", "text": "协调人员"}, {"label": "D", "text": "参谋人员\nE.监督人员"}], "answer": "A", "analysis": "领导职能是指管理者利用企业所赋予的职权和自身拥有的影响力对被管理者施加影响，使其愿意接\n受管理者所赋予的目标或任务，并积极去实现或完成的过程。领导职能的作用体现在以下五个方面。（1）指\n挥作用。（2）激励作用。（3）协调作用。（4）沟通作用。（5）变革作用。\n \n75.根据工作方式与具体作用的不同，企业的管理人员主要分为（　）。\nA.主管人员\nB.执行人员\nC.协调人员\nD.参谋人员\nE.监督人员"}, {"question": "在工作分析调查阶段主要进行的工作包括（　）。", "options": [{"label": "A", "text": "制定工作分析计划"}, {"label": "B", "text": "组建工作分析小组"}, {"label": "C", "text": "收集背景资料"}, {"label": "D", "text": "收集基本数据与信息\nE.审查工作信息"}], "answer": "A", "analysis": "企业中的管理人员根据工作方式与具体作用的不同，可以分为主管人员和参谋人员两种类型。这两\n类管理人员对企业生产经营活动的展开和组织目标的实现都是必需的。\n \n76.在工作分析调查阶段主要进行的工作包括（　）。\nA.制定工作分析计划\nB.组建工作分析小组\nC.收集背景资料\nD.收集基本数据与信息\nE.审查工作信息"}, {"question": "在市场调查的方法中，观察法的优点有（　）。", "options": [{"label": "A", "text": "真实性高"}, {"label": "B", "text": "独立取舍，不受调查对象的影响"}, {"label": "C", "text": "直观可靠\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n18"}, {"label": "D", "text": "对调查者的素质要求高\nE.占用被调查者的时间较多"}], "answer": "C", "analysis": "工作分析的调查阶段的具体工作包括：①收集背景资料；②收集基本数据与信息；③收集工作任职\n者的意见和建议。\n \n77.在市场调查的方法中，观察法的优点有（　）。\nA.真实性高\nB.独立取舍，不受调查对象的影响\nC.直观可靠\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n18\nD.对调查者的素质要求高\nE.占用被调查者的时间较多"}, {"question": "财务控制的重点内容是成本控制和风险控制，财务控制要实施全过程控制应包括（　）。", "options": [{"label": "A", "text": "事前控制"}, {"label": "B", "text": "事中控制"}, {"label": "C", "text": "不定期控制"}, {"label": "D", "text": "跟踪控制\nE.事后控制"}], "answer": "A", "analysis": "观察法的优点包括：①直观可靠；②真实性高；③不受语言交流的影响；④独立取舍，不受调查对\n象的影响。\n观察法的缺点包括：①难以观察到被调查者的心理动机等内在因素；②受时间空间限制；③调查费用高\n；④对调查人员素质要求高，观察员素质不同，观察的结果也不同；⑤易产生观察误差等。\n \n78.财务控制的重点内容是成本控制和风险控制，财务控制要实施全过程控制应包括（　）。\nA.事前控制\nB.事中控制\nC.不定期控制\nD.跟踪控制\nE.事后控制"}, {"question": "用人单位和劳动者双方当事人在必备条款之外，根据具体情况，经协商可以约定以下主要条款，下列属于", "options": [{"label": "A", "text": "竞业限制条款"}, {"label": "B", "text": "劳动报酬"}, {"label": "C", "text": "社会保险"}, {"label": "D", "text": "试用期\nE.福利待遇"}], "answer": "A", "analysis": "财务控制的重点内容是成本控制和风险控制。财务控制要实施全过程控制包括事前控制、事中控制\n、事后控制。\n \n79.用人单位和劳动者双方当事人在必备条款之外，根据具体情况，经协商可以约定以下主要条款，下列属于\n约定条款的有（　）。\nA.竞业限制条款\nB.劳动报酬\nC.社会保险\nD.试用期\nE.福利待遇"}, {"question": "企业管理信息系统的基本组成包括以下三个部分（　）。", "options": [{"label": "B", "text": "C属于法定条款的内容。\n \n80.企业管理信息系统的基本组成包括以下三个部分（　）。"}, {"label": "A", "text": "人"}, {"label": "B", "text": "硬件系统"}, {"label": "C", "text": "动态系统"}, {"label": "D", "text": "软件系统\nE.公司章程"}], "answer": "A", "analysis": "约定条款主要包括试用期、培训、保守商业秘密和竞业限制条款、补充保险和福利待遇以及其他事\n项。选项B、C属于法定条款的内容。\n \n80.企业管理信息系统的基本组成包括以下三个部分（　）。\nA.人\nB.硬件系统\nC.动态系统\nD.软件系统\nE.公司章程"}, {"question": "8亿元，该公司2021年简化资产负债表", "options": [{"label": "A", "text": "2.97"}, {"label": "B", "text": "2.58"}, {"label": "C", "text": "3.57"}, {"label": "D", "text": "3.15"}], "answer": "A", "analysis": "企业管理信息系统的基本组成包括以下三个部分：人、硬件系统、软件系统。\n \n共享题干题\n【题干】某电器销售公司，2021年实现销售收入5亿元，实现净利润0.8亿元，该公司2021年简化资产负债表\n如下。(单位：亿元)\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n19\n \n \n81.【不定项选择题】该公司的应收账款周转率为（　）次／年。\nA.2.97\nB.2.58\nC.3.57\nD.3.15"}, {"question": "5+1.3）／2]=3.57（次／年", "options": [{"label": "A", "text": "总资产周转率"}, {"label": "B", "text": "流动比率"}, {"label": "C", "text": "存货周转率"}, {"label": "D", "text": "流动资产周转率"}], "answer": "C", "analysis": "根据公式：应收账款周转率=销售收入／平均应收账款余额=5／[（1.5+1.3）／2]=3.57（次／年\n）。\n \n82.【不定项选择题】如果评价该公司的营运能力，根据现有资料还可以计算（　）。\nA.总资产周转率\nB.流动比率\nC.存货周转率\nD.流动资产周转率"}, {"question": "7％；流动资产周转率=销售收入", "options": [{"label": "A", "text": "坏账损失"}, {"label": "B", "text": "机会成本"}, {"label": "C", "text": "收账费用"}, {"label": "D", "text": "销售费用"}], "answer": "A", "analysis": "总资产周转率=销售收入／平均资产总额=5／[（7+8）／2]≈66.7％；流动资产周转率=销售收入\n／平均流动资产总额=5／[（3.8+4.3）／2]≈61.7％。\n \n83.【不定项选择题】若该公司2021年应收账款减少，有利于公司减少（　）。\nA.坏账损失\nB.机会成本\nC.收账费用\nD.销售费用"}, {"question": "【不定项选择题】短期偿债能力比率包括（　）。", "options": [{"label": "A", "text": "流动比率"}, {"label": "B", "text": "速动比率"}, {"label": "C", "text": "现金流动负债比率"}, {"label": "D", "text": "总资产周转率"}], "answer": "A", "analysis": "应收账款会产生坏账损失、机会成本和收账费用。\n \n84.【不定项选择题】短期偿债能力比率包括（　）。\nA.流动比率\nB.速动比率\nC.现金流动负债比率\nD.总资产周转率"}, {"question": "【不定项选择题】总体的每个单位都有同等被抽中的可能，属于哪种抽样调查（　）。", "options": [{"label": "A", "text": "任意抽样"}, {"label": "B", "text": "判断抽样"}, {"label": "C", "text": "随机抽样"}, {"label": "D", "text": "配额抽样"}], "answer": "A", "analysis": "总资产周转率属于营运能力比率。\n \n【题干】为了掌握市场信息，有效安排生产运营，某乳品生产企业进行了市场调查和市场预测活动。企业市\n场调查人员采用非随机抽样的方法，选取部分顾客进行问卷调查。在充分说明填写要求后，调查人员请被调\n查顾客自行填写调查问卷，一周后回收问卷。同时，企业还收集了内部和外部的历史资料和文献信息，对消\n费者的购买行为进行分析。该企业2016-2021年乳品销售额见下表。\n \n \n85.【不定项选择题】总体的每个单位都有同等被抽中的可能，属于哪种抽样调查（　）。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n20\nA.任意抽样\nB.判断抽样\nC.随机抽样\nD.配额抽样"}, {"question": "【不定项选择题】该乳品生产企业采用的市场调查方法是（　）。", "options": [{"label": "A", "text": "留置调查法"}, {"label": "B", "text": "邮寄调查法"}, {"label": "C", "text": "文案调查法"}, {"label": "D", "text": "实验法"}], "answer": "C", "analysis": "随机抽样是在抽样过程中按随机性原则抽取样本，总体的每个单位都有同等被抽中的可能，即样本\n的抽取完全排除了人为主观因素的影响，使每一个单位都有同等的可能性被抽到。非随机抽样又称为非概率\n抽样，是指调查人员根据自己的方便或主观判断抽取样本的方法。常见的非随机抽样的方法有以下几种\n：①任意抽样。②判断抽样。③配额抽样。④滚雪球抽样。\n \n86.【不定项选择题】该乳品生产企业采用的市场调查方法是（　）。\nA.留置调查法\nB.邮寄调查法\nC.文案调查法\nD.实验法"}, {"question": "【不定项选择题】若采用简单移动平均法预测(选择移动跨越期n=5)，该企业2022年的乳品销售额预测值", "options": [{"label": "A", "text": "2180"}, {"label": "B", "text": "2220"}, {"label": "C", "text": "2350"}, {"label": "D", "text": "2400"}], "answer": "A", "analysis": "留置调查法是指将事先设计好的调查问卷当面交给被调查者，说明填写要求并留下调查问卷，请被\n调查者自行填写，再由调查人员定期回收的一种获取市场信息资料的调查方法。\n文案调查法又称为资料分析法，是利用企业内部和外部现有的各种信息、资料和情报，对调查内容进行分析\n研究的一种市场调查方法。\n \n87.【不定项选择题】若采用简单移动平均法预测(选择移动跨越期n=5)，该企业2022年的乳品销售额预测值\n是（　）万元。\nA.2180\nB.2220\nC.2350\nD.2400"}, {"question": "【不定项选择题】若采用简单移动平均法预测(选择移动跨越期n=3)，则2020年预测的相对误差是（", "options": [{"label": "A", "text": "6.82％"}, {"label": "B", "text": "6.52％"}, {"label": "C", "text": "-150"}, {"label": "D", "text": "150"}], "answer": "B", "analysis": "简单移动平均法是对时间序列的数据按一定跨越期进行移动，逐个计算其算术移动平均值，取最后\n一个移动平均值为预测值的方法。简单移动平均法的预测模型为：\n \n故本题中，销售额预测值=(2350+2300+2300+1900+2250)÷5=2220(万元)。\n \n88.【不定项选择题】若采用简单移动平均法预测(选择移动跨越期n=3)，则2020年预测的相对误差是（　\n）。\nA.6.82％\nB.6.52％\nC.-150\nD.150"}, {"question": "52％。", "options": [{"label": "A", "text": "2.1"}, {"label": "B", "text": "1.6"}, {"label": "C", "text": "1.4"}, {"label": "D", "text": "0.6"}], "answer": "B", "analysis": "将数据代入简单移动平均法的预测模型，销售额预测值=(2300+1900+2250)÷3=2150(万元)。因此\n，本题中，2020年预测的相对误差=(2300-2150)÷2300×100％≈6.52％。\n \n【题干】某企业生产某型号无缝钢管的过程中，A工序加工产品的内径，B工序控制产品的强度，C工序控制产\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n21\n品的弹性。该产品的内径设计尺寸为50毫米，公差为(+0.15，-0.15)毫米。现需通过随机抽样对A、B、C三道\n工序的工序能力进行评估。对A工序加工后内径尺寸进行测量统计，随机抽取的样本平均值和公差中心重合\n，标准差为0.08毫米。经测算，B工序的工序能力指数为1.5，C工序的工序能力指数为1.7。\n \n89.【不定项选择题】A工序的工序能力指数为（　）。\nA.2.1\nB.1.6\nC.1.4\nD.0.6"}, {"question": "15+0.15)÷(6*0.08)=0.625。", "options": [{"label": "A", "text": "严重不足"}, {"label": "B", "text": "不足"}, {"label": "C", "text": "充足"}, {"label": "D", "text": "过剩"}], "answer": "D", "analysis": "工序能力指数是工序质量标准的范围和工序能力的比值，用符号C<sub>p</sub>表示。如工序质量标\n准的范围用公差T表示，工序能力是6σ，则工序能力指数的计算公式为：\n故本题中，A工序的工序能力指数=(0.15+0.15)÷(6*0.08)=0.625。\n \n \n90.【不定项选择题】B工序的工序能力（　）。\nA.严重不足\nB.不足\nC.充足\nD.过剩"}, {"question": "5，对应工序能力指数判断准则为工序能力等级一级，工序能力判断为充足。", "options": [{"label": "A", "text": "改用精度较低但效率高、成本低的设备"}, {"label": "B", "text": "更改设计，提高产品的技术要求"}, {"label": "C", "text": "提高原材料质量"}, {"label": "D", "text": "若设计上允许，降低产品的技术要求"}], "answer": "C", "analysis": "工序能力判断的目的是对工序进行预防性处置，以确保生产过程的质量水平。B工序的工序能力指数\n为1.5，对应工序能力指数判断准则为工序能力等级一级，工序能力判断为充足。\n \n91.【不定项选择题】为提高C工序的工序能力，该企业可采取的措施是（　）。\nA.改用精度较低但效率高、成本低的设备\nB.更改设计，提高产品的技术要求\nC.提高原材料质量\nD.若设计上允许，降低产品的技术要求"}, {"question": "7，对应工序能力指数判断为过剩。工序能力指数过剩意味着粗活细做，这", "options": [{"label": "A", "text": "生产设备"}, {"label": "B", "text": "生产方法"}, {"label": "C", "text": "市场价格"}, {"label": "D", "text": "作业人员"}], "answer": "A", "analysis": "工序的工序能力指数为1.7，对应工序能力指数判断为过剩。工序能力指数过剩意味着粗活细做，这\n样必然影响生产效率，增加产品成本。这时，应根据实际情况采取以下措施：①降低工序能力，如改用精度\n较低但效率高、成本低的设备和原材料，合理地将工序能力指数降低到适当的水平。②更改设计，提高产品\n的技术要求。③采取合并或减少工序等方法。\n \n92.【不定项选择题】在该型号无缝钢管的生产过程中，影响工序质量的因素可能是（　）。\nA.生产设备\nB.生产方法\nC.市场价格\nD.作业人员"}, {"question": "9，假定废品率为0。在进行工序同期化后，该企业测算该流水线的", "options": [{"label": "A", "text": "单件生产；专业化程度低"}, {"label": "B", "text": "大量生产；生产条件稳定"}, {"label": "C", "text": "中批生产；专业化程度高"}, {"label": "D", "text": "小批生产；生产条件稳定"}], "answer": "A", "analysis": "影响工序质量的因素除了系统性因素以外，还可能是由人、机器、原料、方法、测量和环境等原因\n引起的偶然性质量波动。结合本题即为生产设备、生产方法、作业人员。\n \n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n22\n【题干】某企业生产单一农机产品。该企业在综合分析企业的生产技术现状以及其他因素的基础上，决定采\n用流水线的生产组织方式进行产品装配。该流水线采用两班制的生产模式，产品日生产量为100台，每班工作\n时间为8小时，工作时间有效利用系数为0.9，假定废品率为0。在进行工序同期化后，该企业测算该流水线的\n第3道工序所需设备数为1.94，最终确定第3道工序实际设备数为2。\n \n93.【不定项选择题】该企业属于那种生产类型（　），其特点是（　）。\nA.单件生产；专业化程度低\nB.大量生产；生产条件稳定\nC.中批生产；专业化程度高\nD.小批生产；生产条件稳定"}, {"question": "【不定项选择题】该流水线的平均节拍是（　）分钟。", "options": [{"label": "A", "text": "3.3"}, {"label": "B", "text": "4.6"}, {"label": "C", "text": "7.8"}, {"label": "D", "text": "8.6"}], "answer": "B", "analysis": "企业生产类型是影响生产过程组织的主要因素，也是设计企业生产系统首先应确定的重要问题。大\n量生产类型是指生产的产品产量大而品种少，经常重复生产一种或少数几种类似的产品的一种生产类型。\n其特点是：生产条件稳定，大多数工作地仅固定完成一或二道工序，专业化程度较高。\n \n94.【不定项选择题】该流水线的平均节拍是（　）分钟。\nA.3.3\nB.4.6\nC.7.8\nD.8.6"}, {"question": "9×8×60×2÷100≈8.6（分钟）。", "options": [{"label": "A", "text": "0.79"}, {"label": "B", "text": "0.90"}, {"label": "C", "text": "0.97"}, {"label": "D", "text": "1.05"}], "answer": "D", "analysis": "节拍是指流水线生产上连续生产两个相同制品的间隔时间。计算公式如下：r=\n式中，r为流水线的平均节拍；Te为计划期流水线的有效工作时间；Q为计划期的产品产量；β为工作时间有\n效利用系数；T0为计划期流水线的制度工作时间。故本题中，r=0.9×8×60×2÷100≈8.6（分钟）。\n \n95.【不定项选择题】该流水线第3道工序的设备负荷系数为（　）。\nA.0.79\nB.0.90\nC.0.97\nD.1.05"}, {"question": "94÷2=0.97。", "options": [{"label": "A", "text": "工艺专业化布置"}, {"label": "B", "text": "对象专业化布置"}, {"label": "C", "text": "固定布置"}, {"label": "D", "text": "混合类型布置"}], "answer": "C", "analysis": "一般来说，计算的设备数都不是整数，所取的设备数只能是整台数，这样设备负荷\n式中，Si为第i道工序所需设备的计算数；Sei为第i道工序安排的实际设备数。故本题中，Ki\n=1.94÷2=0.97。\n \n96.【不定项选择题】该流水线的空间组织形式是（　）。\nA.工艺专业化布置\nB.对象专业化布置\nC.固定布置\nD.混合类型布置"}, {"question": "2。", "options": [{"label": "A", "text": "总投资与总产量"}, {"label": "B", "text": "总产量与经济效益"}, {"label": "C", "text": "总投资与经济效益"}, {"label": "D", "text": "总投资与投资回收期"}], "answer": "B", "analysis": "企业根据具体情况确定生产过程空问组织的形式，通常包括以下几种：①工艺专业化布置。②对象\n专业化布置。对象专业化布置就是以产品（或零件、部件）为对象来设置生产单位。在对象专业化的生产单\n位中，集中了为生产某种产品所需要的各种设备和各工种工人，对同类产品进行不同的工艺加工。③混合式\n布置。④固定布置。\n \n【题干】山东某钢厂负责人组织对该钢厂的技术改造问题进行经济可行性分析。经过调查得知，该钢厂\n2021年产钢1500万吨，成本居高不下，对环境的污染日益严重，产品质量有所下降，还存在着一定的安全隐\n患。为了解决存在的问题，需耗资8000万元进行技术改造。技术改造完成后，每吨钢的成本将由原来的\n2700元降低至2600元，环境污染问题、安全隐患问题和产品质量问题均能得到一定程度的解决。假设该行业\n的标准投资效益系数为0.2。\n \n97.【不定项选择题】进行技术改造项目的经济可行性分析，需要对技术改造方案的（　）进行对比分析。\nA.总投资与总产量\nB.总产量与经济效益\nC.总投资与经济效益\nD.总投资与投资回收期"}, {"question": "【不定项选择题】如果该技术改造项目有两种以上方案时，采用某一方案比采用其他方案多投资的部分", "options": [{"label": "A", "text": "追加投资回收期法"}, {"label": "B", "text": "投资回收期法"}, {"label": "C", "text": "效益成本分析法"}, {"label": "D", "text": "项目周期"}], "answer": "C", "analysis": "技术改造项目可行性分析中，需要对技术改造方案的总投资和经济效益进行对比分析。\n \n98.【不定项选择题】如果该技术改造项目有两种以上方案时，采用某一方案比采用其他方案多投资的部分\n，由采用这一方案比采用其他方案节约的经营费用来补偿所需要的时间。该方法称为（　）。\nA.追加投资回收期法\nB.投资回收期法\nC.效益成本分析法\nD.项目周期"}, {"question": "【不定项选择题】该技术改造项目完成后，若该厂年钢产量不变，则该厂年经济效益为（　）万元。", "options": [{"label": "A", "text": "179300"}, {"label": "B", "text": "188300"}, {"label": "C", "text": "148400"}, {"label": "D", "text": "200000"}], "answer": "A", "analysis": "追加投资回收期是指某技术改造项目有两种以上方案时，采用某一方案比采用其他方案多投资的部\n分，由采用这一方案比采用其他方案节约的经营费用来补偿所需要的时间。\n \n99.【不定项选择题】该技术改造项目完成后，若该厂年钢产量不变，则该厂年经济效益为（　）万元。\nA.179300\nB.188300\nC.148400\nD.200000"}, {"question": "2*8000=148400", "options": [{"label": "A", "text": "设备更新改造"}, {"label": "B", "text": "工艺改革"}, {"label": "C", "text": "产品更新换代"}, {"label": "D", "text": "对企业进行整体性改造"}], "answer": "C", "analysis": "E=Q1(C0-C1)-E0K总=1500*（2700-2600）-0.2*8000=148400\n式中:E为技术改造的年度经济效益;Q1为技术改造后的年产品产量(改造前后年产品产量不变);C0、C1分别为\n技术改造前，后的产品单位成本;K总为技术改造的总投资;E0为标准投资效益系数。\n \n100.【不定项选择题】下列不属于狭义的技术改造的是（　）。\nA.设备更新改造\nB.工艺改革\nC.产品更新换代\nD.对企业进行整体性改造"}, {"question": "单一企业的缺点是（　）。", "options": [{"label": "A", "text": "品种单一，适应市场需求变化的能力差"}, {"label": "B", "text": "增加了管理难度，提高产品质量的任务艰巨"}, {"label": "C", "text": "企业资源的利用程度降低，提高经营风险"}, {"label": "D", "text": "劳动生产率低，提高成本"}], "answer": "D", "analysis": "本题考查管理标准。管理标准是指对企业重复出现的管理业务和工作责任，按有效利用时间、提高\n工作效率的要求，对工作程序、工作方法、工作职责和制度所做的统一规定，包括生产组织标准、技术管理\n标准、经济管理标准等。掌握“标准化工作、定额工作”知识点。\n \n2.单一企业的缺点是（　）。\nA.品种单一，适应市场需求变化的能力差\nB.增加了管理难度，提高产品质量的任务艰巨\nC.企业资源的利用程度降低，提高经营风险\nD.劳动生产率低，提高成本"}, {"question": "最早的企业形式是（　）。", "options": [{"label": "A", "text": "单个业主制企业"}, {"label": "B", "text": "合伙制企业"}, {"label": "C", "text": "集体所有制企业"}, {"label": "D", "text": "公司制企业"}], "answer": "A", "analysis": "本题考查企业的主要类型。单一企业的缺点：品种单一，适应市场需求变化的能力差。掌握“企业\n的主要类型及其特征”知识点。\n \n3.最早的企业形式是（　）。\nA.单个业主制企业\nB.合伙制企业\nC.集体所有制企业\nD.公司制企业"}], "冲刺卷（201-250题）": [{"question": "主要用于对生产量值监管的计量技术是（　）。", "options": [{"label": "A", "text": "标准测量技术"}, {"label": "B", "text": "工业测量技术"}, {"label": "C", "text": "计量测量技术"}, {"label": "D", "text": "信息测量技术"}], "answer": "A", "analysis": "本题考查单个业主制企业。单个业主制企业诞生于市场经济早期，是最早的企业形式。掌握“企业\n制度的概念、类型及其特征”知识点。\n \n4.主要用于对生产量值监管的计量技术是（　）。\nA.标准测量技术\nB.工业测量技术\nC.计量测量技术\nD.信息测量技术"}, {"question": "企业在遵守、维护和改善社会秩序，保护和增加社会福利方面所承担的职责和义务，属于企业的（　）。", "options": [{"label": "A", "text": "经营目标"}, {"label": "B", "text": "法定义务"}, {"label": "C", "text": "社会责任"}, {"label": "D", "text": "行为规范"}], "answer": "C", "analysis": "本题考查计量工作。计量测量技术是指法制标准量值传递系统中末端的测量，属于标准过渡的中间\n测量，目的是扩大标准的上下量限，它主要用于对生产量值的监督。掌握“计量工作、信息工作、规章制度\n、职业培训”知识点。\n \n5.企业在遵守、维护和改善社会秩序，保护和增加社会福利方面所承担的职责和义务，属于企业的（　）。\nA.经营目标\nB.法定义务\nC.社会责任\nD.行为规范"}, {"question": "现代企业制度的保证是（　）。", "options": [{"label": "A", "text": "企业产权制度"}, {"label": "B", "text": "有限责任制度"}, {"label": "C", "text": "现代公司制度"}, {"label": "D", "text": "科学管理制度"}], "answer": "C", "analysis": "本题考查企业的社会责任。企业的社会责任是指企业在遵守、维护和改善社会秩序，保护和增加社\n会福利方面所承担的职责和义务。掌握“企业的职能与社会责任”知识点。\n \n6.现代企业制度的保证是（　）。\nA.企业产权制度\nB.有限责任制度\nC.现代公司制度\nD.科学管理制度"}, {"question": "管理幅度是指一个主管能够直接有效地指挥和监督下属的（　）。", "options": [{"label": "A", "text": "能力"}, {"label": "B", "text": "层级"}, {"label": "C", "text": "数量"}, {"label": "D", "text": "职级"}], "answer": "B", "analysis": "本题考查现代企业制度的概念。现代企业制度是适应社会化大生产和市场经济发展要求的，以产权\n制度为核心，以有限责任制度为保证，以现代公司制企业为主要形式的，产权清晰、权责明确、政企分开、\n管理科学的新型企业制度。掌握“现代企业制度”知识点。\n \n7.管理幅度是指一个主管能够直接有效地指挥和监督下属的（　）。\nA.能力\nB.层级\nC.数量\nD.职级"}, {"question": "以加工和操作为对象的专业化属于（　）。", "options": [{"label": "A", "text": "部门专业化"}, {"label": "B", "text": "产品专业化"}, {"label": "C", "text": "零部件专业化"}, {"label": "D", "text": "工艺专业化"}], "answer": "C", "analysis": "本题考查管理幅度的含义。管理幅度是指一个主管能够直接有效地指挥和监督下属的数量。掌握\n“管理幅度与管理层次”知识点。\n \n8.以加工和操作为对象的专业化属于（　）。\nA.部门专业化\nB.产品专业化\nC.零部件专业化\nD.工艺专业化"}, {"question": "企业变革的基本原因在于（　）。", "options": [{"label": "A", "text": "科学技术的更新"}, {"label": "B", "text": "经济的发展"}, {"label": "C", "text": "社会的变化"}, {"label": "D", "text": "企业本身发展过程中的矛盾冲突"}], "answer": "D", "analysis": "本题考查工艺专业化的概念。工艺专业化，即专门进行产品或零部件加工和操作的专业化。掌握\n“劳动分工与专业化”知识点。\n \n9.企业变革的基本原因在于（　）。\nA.科学技术的更新\nB.经济的发展\nC.社会的变化\nD.企业本身发展过程中的矛盾冲突"}, {"question": "通常情况下，学习型组织的精神基础是（　）。", "options": [{"label": "A", "text": "自我超越"}, {"label": "B", "text": "系统思考"}, {"label": "C", "text": "建立共同愿景"}, {"label": "D", "text": "团队学习"}], "answer": "D", "analysis": "本题考查企业变革的基本原因。企业变革的基本原因在于企业本身发展过程中的矛盾冲突。掌握\n“企业生命周期、企业变革的动因”知识点。\n \n10.通常情况下，学习型组织的精神基础是（　）。\nA.自我超越\nB.系统思考\nC.建立共同愿景\nD.团队学习"}, {"question": "技术简单、工艺整体性要求高的企业，最适宜采用的组织结构形式为（　）。", "options": [{"label": "A", "text": "集权型"}, {"label": "B", "text": "分权型"}, {"label": "C", "text": "集权型和分权型并存"}, {"label": "D", "text": "无特定要求"}], "answer": "A", "analysis": "本题考查学习型组织的五项修炼。自我超越被认为是“学习组织的精神基础”。掌握“新型企业组\n织模式”知识点。\n \n11.技术简单、工艺整体性要求高的企业，最适宜采用的组织结构形式为（　）。\nA.集权型\nB.分权型\nC.集权型和分权型并存\nD.无特定要求"}, {"question": "某企业是一个以产权关系为纽带的多个企业联合体，则该企业的组织结构形式是（　）。", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "企业集团"}], "answer": "A", "analysis": "本题考查企业组织结构形式的选择。技术简单、工艺整体性要求高的企业，组织应以集权型为主。\n掌握“企业组织结构形式的选择”知识点。\n \n12.某企业是一个以产权关系为纽带的多个企业联合体，则该企业的组织结构形式是（　）。\nA.直线制\nB.职能制\nC.矩阵制\nD.企业集团"}, {"question": "下列企业组织结构形式中，集权程度最高的组织结构是（　）。", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "事业部制"}], "answer": "D", "analysis": "本题考查企业集团结构。企业集团是以资产为纽带的多个企业的联合体，在组织形式上不同于单一\n企业。产权关系是把众多的企业联合在一起形成企业集团的最重要的纽带。掌握“事业部制、企业集团结构\n”知识点。\n \n13.下列企业组织结构形式中，集权程度最高的组织结构是（　）。\nA.直线制\nB.职能制\nC.矩阵制\nD.事业部制"}, {"question": "目前，对我国城乡居民收支的调查采用的是（　）。", "options": [{"label": "A", "text": "等距抽样"}, {"label": "B", "text": "分层抽样"}, {"label": "C", "text": "整群抽样"}, {"label": "D", "text": "简单随机抽样"}], "answer": "A", "analysis": "本题考查直线制的特点。直线制的特点是从最高管理层到最低管理层为上下垂直领导，各级领导者\n执行统一指挥和管理职能，不设专门的职能管理机构。所以，直线制是集权程度最高的组织机构。掌握“直\n线制、职能制”知识点。\n \n14.目前，对我国城乡居民收支的调查采用的是（　）。\nA.等距抽样\nB.分层抽样\nC.整群抽样\nD.简单随机抽样"}, {"question": "某牙膏企业拟定了详尽的市场调查观察提纲和记录标准，对消费者挑选和购买牙膏时的语言和行为、购买", "options": [{"label": "A", "text": "参与型观察法"}, {"label": "B", "text": "时间取样型观察法"}, {"label": "C", "text": "结构型观察法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3"}, {"label": "D", "text": "事件取样型观察法"}], "answer": "A", "analysis": "本题考查等距抽样。目前，我国城乡居民收支等调查采用的是等距抽样。掌握“抽样市场调查的类\n型”知识点。\n \n15.某牙膏企业拟定了详尽的市场调查观察提纲和记录标准，对消费者挑选和购买牙膏时的语言和行为、购买\n时间和购买数量进行了调查，该企业采取的市场调查方式是（　）。\nA.参与型观察法\nB.时间取样型观察法\nC.结构型观察法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3\nD.事件取样型观察法"}, {"question": "在设计市场调查问卷时，正确的说法是（　）。", "options": [{"label": "A", "text": "问卷应力求简化，最大限度地减轻被调查者的负担"}, {"label": "B", "text": "设计过程中无需考虑被调查者的心理因素"}, {"label": "C", "text": "问项设计应具有一定诱导性，引导被调查者作答"}, {"label": "D", "text": "设计完成后，问卷应立即用于大范围的实际调查"}], "answer": "C", "analysis": "本题考查结构型观察法。结构型观察法是一种计划严密、操作标准化、可控制的观察方法。在实施\n观察前规定观察对象和记录标准，制定有一定分类体系的观察提纲，在实施观察时记录预先设置的分类行为\n。结构型观察法是比较程式化的观察活动。掌握“观察法”知识点。\n \n16.在设计市场调查问卷时，正确的说法是（　）。\nA.问卷应力求简化，最大限度地减轻被调查者的负担\nB.设计过程中无需考虑被调查者的心理因素\nC.问项设计应具有一定诱导性，引导被调查者作答\nD.设计完成后，问卷应立即用于大范围的实际调查"}, {"question": "在趋势外推法中得到很好运用的市场预测原理是（　）。", "options": [{"label": "A", "text": "惯性原理"}, {"label": "B", "text": "因果原理"}, {"label": "C", "text": "类推原理"}, {"label": "D", "text": "概论原理"}], "answer": "A", "analysis": "本题考查设计调查问卷。选项B错误，在问卷设计时要考虑被调查者心理因素；选项C错误，调查问\n句要保持客观性，避免引导性提问；选项D错误，初步设计出来的问卷通常存在一些问题，因而，必须首先在\n小范围内试用。掌握“市场调查方案设计”知识点。\n \n17.在趋势外推法中得到很好运用的市场预测原理是（　）。\nA.惯性原理\nB.因果原理\nC.类推原理\nD.概论原理"}, {"question": "抽样框误差属于非抽样误差中的（　）。", "options": [{"label": "A", "text": "分析误差"}, {"label": "B", "text": "调查误差"}, {"label": "C", "text": "设计误差"}, {"label": "D", "text": "汇总误差"}], "answer": "C", "analysis": "本题考查类推原理。类推原理在趋势外推法中得到了很好的运用。掌握“市场预测的定义及原理、\n内容”知识点。\n \n18.抽样框误差属于非抽样误差中的（　）。\nA.分析误差\nB.调查误差\nC.设计误差\nD.汇总误差"}, {"question": "拦截访问法的优点是（　）。", "options": [{"label": "A", "text": "调查有深度"}, {"label": "B", "text": "调查区域较广"}, {"label": "C", "text": "易于控制调查质量"}, {"label": "D", "text": "可节省访问费和交通费"}], "answer": "C", "analysis": "本题考查设计误差的内容。设计误差包括总体定义误差、抽样框误差、调查方法选择误差、测量工\n具误差等。掌握“抽样误差与非抽样误差”知识点。\n \n19.拦截访问法的优点是（　）。\nA.调查有深度\nB.调查区域较广\nC.易于控制调查质量\nD.可节省访问费和交通费"}, {"question": "“5S”管理的核心是（　）。", "options": [{"label": "A", "text": "整理"}, {"label": "B", "text": "整顿\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n4"}, {"label": "C", "text": "清洁"}, {"label": "D", "text": "素养"}], "answer": "D", "analysis": "本题考查拦截访问法。拦截访问法的优点：访问地点比较集中，时间短，可节省访问费和交通费\n；对拒访者可以放弃，重新拦截新的受访者，确保样本量不变。掌握“访问法”知识点。\n \n20.“5S”管理的核心是（　）。\nA.整理\nB.整顿\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n4\nC.清洁\nD.素养"}, {"question": "某企业采用平行顺序移动方式对一种零件进行加工，该零件投产批量6件，有4道加工工序；按照加工顺序", "options": [{"label": "A", "text": "120"}, {"label": "B", "text": "200"}, {"label": "C", "text": "245"}, {"label": "D", "text": "300"}], "answer": "D", "analysis": "本题考查素养的含义。素养即要求员工养成良好的工作习惯，遵守纪律。努力提高人员的素质，养\n成严格遵守规章制度的习惯和作风，这是“5S”管理的核心。掌握““5S”管理”知识点。\n \n21.某企业采用平行顺序移动方式对一种零件进行加工，该零件投产批量6件，有4道加工工序；按照加工顺序\n，单件每道工序作业时间依次为20分钟、10分钟、25分钟、15分钟，假设零件移动用时为零。将一个批次的\n该零件全部生产出来所需要的时间为（　）分钟。\nA.120\nB.200\nC.245\nD.300"}, {"question": "生产过程空间组织形式采用工艺专业化的生产单位宜采用的零件转移方式为（　）。", "options": [{"label": "A", "text": "平行移动方式"}, {"label": "B", "text": "顺序移动方式"}, {"label": "C", "text": "平行顺序移动方式"}, {"label": "D", "text": "随机移动方式"}], "answer": "C", "analysis": "本题考查平行顺序移动方式。平行顺序移动方式下，一批零件全部生产完成的生产周期的计算公式\n如下：\n＝6×（20＋10＋25＋15）－5×（10＋10＋15）＝245（分钟）。掌握“平行顺序移动方式”知识点。\n \n22.生产过程空间组织形式采用工艺专业化的生产单位宜采用的零件转移方式为（　）。\nA.平行移动方式\nB.顺序移动方式\nC.平行顺序移动方式\nD.随机移动方式"}, {"question": "产品在生产过程各阶段，各工序之间始终处于运动状态，没有或很少有不必要的停顿和等待时间，这遵循", "options": [{"label": "A", "text": "连续性原则"}, {"label": "B", "text": "准时性原则"}, {"label": "C", "text": "比例性原则"}, {"label": "D", "text": "柔性原则"}], "answer": "B", "analysis": "本题考查三种移动方式的比较。对象专业化的生产单位宜采用平行或平行顺序移动方式；而工艺专\n业化的生产单位，宜采用顺序移动方式。掌握“三种移动方式的比较”知识点。\n \n23.产品在生产过程各阶段，各工序之间始终处于运动状态，没有或很少有不必要的停顿和等待时间，这遵循\n了生产过程组织的（　）。\nA.连续性原则\nB.准时性原则\nC.比例性原则\nD.柔性原则"}, {"question": "下列生产活动中，属于自然过程的是（　）。", "options": [{"label": "A", "text": "用车床加工零件端面"}, {"label": "B", "text": "将铸件放在普通空气中冷却"}, {"label": "C", "text": "用钻床钻孔\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5"}, {"label": "D", "text": "高温淬火"}], "answer": "A", "analysis": "本题考查生产过程组织的合理要求。生产过程连续性是指产品在生产过程各阶段、各工序之间的流\n动，在时间上是紧密衔接、连续不断的。也就是说，产品在生产过程中始终处于运动状态，不是在进行加工\n、装配、检验，就是处于运输或自然过程中，没有或很少有不必要的停顿和等待时间。掌握“生产过程组织\n、生产类型”知识点。\n \n24.下列生产活动中，属于自然过程的是（　）。\nA.用车床加工零件端面\nB.将铸件放在普通空气中冷却\nC.用钻床钻孔\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5\nD.高温淬火"}, {"question": "企业组织各生产单位系统而全面的尽早发现安全隐患、及时处理，使企业的安全生产事故为零，这体现了", "options": [{"label": "A", "text": "周期性"}, {"label": "B", "text": "稳健性"}, {"label": "C", "text": "可持续性"}, {"label": "D", "text": "预防性"}], "answer": "B", "analysis": "本题考查生产过程的概念。生产过程是指劳动对象借助于自然界的力量，使其产生某种性质变化的\n过程。属于自然过程的有：铸件自然时效；铸锻件自然冷却；涂染的自然干燥等。掌握“生产组织和生产过\n程”知识点。\n \n25.企业组织各生产单位系统而全面的尽早发现安全隐患、及时处理，使企业的安全生产事故为零，这体现了\n安全生产的（　）。\nA.周期性\nB.稳健性\nC.可持续性\nD.预防性"}, {"question": "自行车生产企业的装配流水线车间所采用的生产过程空间组织形式是（　）。", "options": [{"label": "A", "text": "固定布置"}, {"label": "B", "text": "工艺专业化布置"}, {"label": "C", "text": "对象专业化布置"}, {"label": "D", "text": "混合式布置"}], "answer": "D", "analysis": "本题考查安全生产的特点。预防性：要把安全生产工作做在事故发生之前，居安思危，尽早发现苗\n头，及时处理，可以减少或消除损失。掌握“安全生产管理”知识点。\n \n26.自行车生产企业的装配流水线车间所采用的生产过程空间组织形式是（　）。\nA.固定布置\nB.工艺专业化布置\nC.对象专业化布置\nD.混合式布置"}, {"question": "关于PDCA循环的说法，错误的是（　）。", "options": [{"label": "A", "text": "PDCA循环是连续的循环过程"}, {"label": "B", "text": "PDCA循环将工作过程分为决策、执行、检查、监督四个阶段"}, {"label": "C", "text": "PDCA循环可以使质量水平螺旋上升式地提升"}, {"label": "D", "text": "PDCA循环主要是解决最重要的问题"}], "answer": "C", "analysis": "本题考查对象专业化布置。对象专业化布置就是以产品（或零件、部件）为对象来设置生产单位。\n在对象专业化的生产单位里，基本上能独立完成某几种产品（或零部件）的全部或大部分工艺过程，所以\n，这种车间也可以叫做封闭式车间。这种按照某种产品的加工路线或加工顺序来布置设施，常常称为生产线\n。掌握“生产过程空间组织的原则与形式”知识点。\n \n27.关于PDCA循环的说法，错误的是（　）。\nA.PDCA循环是连续的循环过程\nB.PDCA循环将工作过程分为决策、执行、检查、监督四个阶段\nC.PDCA循环可以使质量水平螺旋上升式地提升\nD.PDCA循环主要是解决最重要的问题"}, {"question": "（　）的思想是以全面质量为中心，全员参与为基础。", "options": [{"label": "A", "text": "科学管理"}, {"label": "B", "text": "全面质量管理"}, {"label": "C", "text": "统计质量管理"}, {"label": "D", "text": "质量检验"}], "answer": "B", "analysis": "本题考查PDCA循环。选项B错误，PDCA循环将工作过程分为计划、执行、检查、处理。掌握“全面质\n量管理”知识点。\n \n28.（　）的思想是以全面质量为中心，全员参与为基础。\nA.科学管理\nB.全面质量管理\nC.统计质量管理\nD.质量检验"}, {"question": "按检验的质量特性值的特征，可将质量检验划分为（　）。", "options": [{"label": "A", "text": "全数检验和抽样检验"}, {"label": "B", "text": "理化检验和感官检验"}, {"label": "C", "text": "验收检验和过程检验"}, {"label": "D", "text": "计数检验和计量检验"}], "answer": "B", "analysis": "本题考查全面质量管理阶段。全面质量管理的思想是以全面质量为中心，全员参与为基础。掌握\n“质量管理的基本概念及发展历程”知识点。\n \n29.按检验的质量特性值的特征，可将质量检验划分为（　）。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n6\nA.全数检验和抽样检验\nB.理化检验和感官检验\nC.验收检验和过程检验\nD.计数检验和计量检验"}, {"question": "关于产品质量监督检查制度的说法，错误的是（　）。", "options": [{"label": "A", "text": "产品质量监督检查制度既是一项强制性的行政措施，又是一种有效的法制手段"}, {"label": "B", "text": "对依法进行的产品质量监督检查，生产者、销售者不得拒绝"}, {"label": "C", "text": "检验抽取的样品数量不得超过检验的合理需要"}, {"label": "D", "text": "国家监督检查的产品，地方可以另行重复抽查"}], "answer": "D", "analysis": "本题考查质量检验的方式。按检验的质量特性值的特征，可将质量检验划分为计数检验和计量检验\n两种方式。掌握“质量检验”知识点。\n \n30.关于产品质量监督检查制度的说法，错误的是（　）。\nA.产品质量监督检查制度既是一项强制性的行政措施，又是一种有效的法制手段\nB.对依法进行的产品质量监督检查，生产者、销售者不得拒绝\nC.检验抽取的样品数量不得超过检验的合理需要\nD.国家监督检查的产品，地方可以另行重复抽查"}, {"question": "在质量管理领域，如果质量控制水平为（　），表示产品不合格率不超过0.002ppm（百万分率）。", "options": [{"label": "A", "text": "3σ"}, {"label": "B", "text": "4σ"}, {"label": "C", "t
