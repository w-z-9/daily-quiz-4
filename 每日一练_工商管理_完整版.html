<script>
var CH={"基础练习": {"第一节 企业": [{"question": "第一节 企业 单项选择题 1.所有者权益、经营者权利、劳动者积极性属于（ ）。", "options": [{"label": "A", "text": "动力机制"}, {"label": "B", "text": "调节机制"}, {"label": "C", "text": "约束机制"}, {"label": "D", "text": "发展机制"}], "answer": "A", "analysis": ""}, {"question": "企业发展大致经历了三个时期，分别是手工生产时期、（ ）、企业生产时期。", "options": [{"label": "A", "text": "工场生产时期"}, {"label": "B", "text": "工厂生产时期"}, {"label": "C", "text": "机器生产时期"}, {"label": "D", "text": "科技生产时期"}], "answer": "B", "analysis": "强大的经济动力是形成经营机制的决定因素。资产和利益是企业经营机制的动力源泉。动力机制包\n括所有者权益、经营者权利和劳动者积极性。\n2.企业发展大致经历了三个时期，分别是手工生产时期、（ ）、企业生产时期。\nA.工场生产时期\nB.工厂生产时期\nC.机器生产时期\nD.科技生产时期"}, {"question": "一切直接或间接为企业经济活动所需要并能构成生产经营的天然资源或人造资源称为（ ）。", "options": [{"label": "A", "text": "生产资料"}, {"label": "B", "text": "劳动对象"}, {"label": "C", "text": "企业要素"}, {"label": "D", "text": "劳动手段"}], "answer": "C", "analysis": "纵观企业的发展历史，大致经历了以下三个时期：①手工生产时期。②工厂生产时期。③企业生产\n时期。\n3.一切直接或间接为企业经济活动所需要并能构成生产经营的天然资源或人造资源称为（ ）。\nA.生产资料\nB.劳动对象\nC.企业要素\nD.劳动手段"}, {"question": "企业的发展历史经历的时期不包括（ ）。", "options": [{"label": "A", "text": "手工生产时期"}, {"label": "B", "text": "工场生产时期"}, {"label": "C", "text": "工厂生产时期"}, {"label": "D", "text": "企业生产时期"}], "answer": "B", "analysis": "本题考查企业要素的概念。企业要素是指一切直接或间接为企业经济活动所需要并能构成生产经营\n资源的，具有一定开发性、利用性、选择性的天然资源或人造资源。\n4.企业的发展历史经历的时期不包括（ ）。\nA.手工生产时期\nB.工场生产时期\nC.工厂生产时期\nD.企业生产时期"}, {"question": "（ ）是人类经济活动发展到一定历史阶段，社会生产力发展到一定水平的产物，是现实世界上普遍存在 的、最具活力的一种特殊的社会经济组织。", "options": [{"label": "A", "text": "企业"}, {"label": "B", "text": "工厂"}, {"label": "C", "text": "作坊"}, {"label": "D", "text": "私营经济"}], "answer": "A", "analysis": "本题考查企业发展的阶段。纵观企业的发展历史，大致经历了三个时期：手工生产时期、工厂生产\n时期、企业生产时期。\n5.（ ）是人类经济活动发展到一定历史阶段，社会生产力发展到一定水平的产物，是现实世界上普遍存在\n的、最具活力的一种特殊的社会经济组织。\nA.企业\nB.工厂\nC.作坊\nD.私营经济"}, {"question": "作为法人实体和市场竞争主体，企业存在的直接目的是（ ）。", "options": [{"label": "A", "text": "参与市场竞争"}, {"label": "B", "text": "扩大市场范围"}, {"label": "C", "text": "满足社会需要"}, {"label": "D", "text": "合法获得营利"}], "answer": "D", "analysis": "本题考查企业的相关内容。企业是人类经济活动发展到一定历史阶段，社会生产力发展到一定水平\n1\n的产物，是现实世界上普遍存在的、最具活力的一种特殊的社会经济组织，是社会经济的基本单位。\n6.作为法人实体和市场竞争主体，企业存在的直接目的是（ ）。\nA.参与市场竞争\nB.扩大市场范围\nC.满足社会需要\nD.合法获得营利"}, {"question": "企业是（ ）的替代物。", "options": [{"label": "A", "text": "政府机构"}, {"label": "B", "text": "事业单位"}, {"label": "C", "text": "市场"}, {"label": "D", "text": "相关管理机构"}], "answer": "C", "analysis": "本题考查企业的概念。企业是以营利为目的，运用各种生产要素（如土地、劳动力、资本、技术等\n），依法从事生产、流通和贸易等经济活动，实行自主经营、自负盈亏、独立核算、自我约束的法人实体和\n市场竞争主体。因此，企业存在的直接目的是合法获得营利。\n7.企业是（ ）的替代物。\nA.政府机构\nB.事业单位\nC.市场\nD.相关管理机构"}, {"question": "提出交易费用概念的经济学家是（ ）。", "options": [{"label": "A", "text": "诺斯"}, {"label": "B", "text": "科斯"}, {"label": "C", "text": "马克思"}, {"label": "D", "text": "凯恩斯"}], "answer": "B", "analysis": "本题考查企业的形式。企业之所以产生，是因为以企业方式来进行资源配置，要比单纯依靠市场方\n式来进行资源配置更有效率，企业是市场的替代物。\n8.提出交易费用概念的经济学家是（ ）。\nA.诺斯\nB.科斯\nC.马克思\nD.凯恩斯"}, {"question": "市场实现资源配置和组织生产所通过的方式是（ ）。", "options": [{"label": "A", "text": "内部管理"}, {"label": "B", "text": "行政干预"}, {"label": "C", "text": "协议买卖"}, {"label": "D", "text": "中介服务"}], "answer": "C", "analysis": "本题考查新制度学派的观点。交易费用这一概念，是美国经济学家科斯1937年在《企业的性质》一\n书中分析企业的起源和规模时首次提出的。\n9.市场实现资源配置和组织生产所通过的方式是（ ）。\nA.内部管理\nB.行政干预\nC.协议买卖\nD.中介服务"}, {"question": "（ ）已经成了现代企业的一种重要发展趋势。", "options": [{"label": "A", "text": "技术进步"}, {"label": "B", "text": "多样化经营"}, {"label": "C", "text": "制度创新"}, {"label": "D", "text": "人才培养"}], "answer": "B", "analysis": "本题考查新制度学派的观点。从交易费用的角度观察，市场和企业是两种不同的资源配置和生产组\n织方式，市场是通过协议买卖的方式来实现资源配置和组织生产，企业是通过内部管理的方式来实现资源配\n置和组织生产。\n10.（ ）已经成了现代企业的一种重要发展趋势。\nA.技术进步\nB.多样化经营\nC.制度创新\nD.人才培养"}, {"question": "下列各项中，不属于约束机制的是（ ）。", "options": [{"label": "A", "text": "管理平衡约束机制"}, {"label": "B", "text": "权力平衡约束机制"}, {"label": "C", "text": "财务平衡约束机制"}, {"label": "D", "text": "多重利益约束机制"}], "answer": "A", "analysis": "本题考查企业发展的途径。多样化经营已经成了现代企业的一种重要发展趋势。\n11.下列各项中，不属于约束机制的是（ ）。\nA.管理平衡约束机制\nB.权力平衡约束机制\nC.财务平衡约束机制\nD.多重利益约束机制"}, {"question": "遵守政府的政策、法规和社会公德，使投资、消费等方面符合市场需求和自身发展需要体现的是（ ）。", "options": [{"label": "A", "text": "动力机制"}, {"label": "B", "text": "发展机制或技术进步机制"}, {"label": "C", "text": "调节机制或产销机制"}, {"label": "D", "text": "约束机制或平衡约束机制"}], "answer": "D", "analysis": "本题考查企业的经营机制。约束机制包括多重利益约束机制、财务平衡约束机制、权力平衡约束机\n制。\n12.遵守政府的政策、法规和社会公德，使投资、消费等方面符合市场需求和自身发展需要体现的是（ ）。\nA.动力机制\nB.发展机制或技术进步机制\nC.调节机制或产销机制\nD.约束机制或平衡约束机制"}, {"question": "现代企业与传统企业的联系不包括（ ）。", "options": [{"label": "A", "text": "传统企业是现代企业的基础"}, {"label": "B", "text": "传统企业和现代企业都具有独立性"}, {"label": "C", "text": "现代企业是传统企业的继承和发展"}, {"label": "D", "text": "现代企业和传统企业都是经济组织，是商品或服务的提供者"}], "answer": "B", "analysis": "本题考查经营机制。约束机制或平衡约束机制：遵守政府的政策、法规和社会公德，使投资、消费\n等方面符合市场需求和自身发展的需要。\n13.现代企业与传统企业的联系不包括（ ）。\nA.传统企业是现代企业的基础\nB.传统企业和现代企业都具有独立性\nC.现代企业是传统企业的继承和发展\nD.现代企业和传统企业都是经济组织，是商品或服务的提供者"}, {"question": "新制度学派认为，企业产生的根本原因是（ ）。", "options": [{"label": "A", "text": "企业为商品交换提供了高效率的交易方式"}, {"label": "B", "text": "企业是社会阶级矛盾调和的必然结果"}, {"label": "C", "text": "企业能为其所有者带来更多剩余价值"}, {"label": "D", "text": "企业能作为较低交易费用的资源配置方式"}], "answer": "D", "analysis": "本题考查现代企业与传统企业的关系。现代企业与传统企业的联系。①传统企业是现代企业的基础\n。②现代企业是传统企业的继承和发展。③现代企业和传统企业都是经济组织，是商品或服务的提供者。选\n项B错误，传统企业实行垂直式直接管理；现代企业实行扁平式间接管理，企业具有独立性。\n14.新制度学派认为，企业产生的根本原因是（ ）。\nA.企业为商品交换提供了高效率的交易方式\nB.企业是社会阶级矛盾调和的必然结果\nC.企业能为其所有者带来更多剩余价值\nD.企业能作为较低交易费用的资源配置方式"}, {"question": "按照新制度学派的观点，企业是通过（ ）的方式来实现资源配置和组织生产的。", "options": [{"label": "A", "text": "政府干预"}, {"label": "B", "text": "内部管理"}, {"label": "C", "text": "协议买卖"}, {"label": "D", "text": "行业规范"}], "answer": "B", "analysis": "新制度学派认为，企业作为商品经济发展到一定阶段的产物，是因为企业能作为在某种状态下替代\n市场的一种交易费用较低的资源配置方式。\n15.按照新制度学派的观点，企业是通过（ ）的方式来实现资源配置和组织生产的。\nA.政府干预\nB.内部管理\nC.协议买卖\nD.行业规范"}, {"question": "按照马克思主义的观点，企业的出现是（ ）的必然结果。", "options": [{"label": "A", "text": "劳动力成为商品"}, {"label": "B", "text": "生产资料私有化"}, {"label": "C", "text": "生产资料公有化"}, {"label": "D", "text": "社会分工发展"}], "answer": "D", "analysis": "市场是通过协议买卖的方式来实现资源配置和组织生产，企业是通过内部管理的方式来实现资源配\n3\n置和组织生产。\n16.按照马克思主义的观点，企业的出现是（ ）的必然结果。\nA.劳动力成为商品\nB.生产资料私有化\nC.生产资料公有化\nD.社会分工发展"}, {"question": "现代企业发展所经历的阶段有（ ）。", "options": [{"label": "A", "text": "原始社会的手工业作坊"}, {"label": "B", "text": "原始社会的家庭作坊"}, {"label": "C", "text": "手工生产时期"}, {"label": "D", "text": "工厂生产时期"}], "answer": "CDE", "analysis": "马克思主义的观点是从历史的角度通过考察社会分工的发展和生产技术的进步来探讨企业的产生。\n企业作为协作劳动的一种组织方式，并不是从人类社会一开始就有的，它的出现是社会分工发展的必然结果\n，必须具有一定的社会经济条件。\n多项选择题\n17.现代企业发展所经历的阶段有（ ）。\nA.原始社会的手工业作坊\nB.原始社会的家庭作坊\nC.手工生产时期\nD.工厂生产时期\nE.企业生产时期"}, {"question": "CDE 【解析】纵观企业的发展历史，大致经历了三个时期，分别是手工生产时期、工厂生产时期、企业生产时期 。所以答案为C、D、E。 18.下列不属于企业弱势的有（ ）。", "options": [{"label": "A", "text": "官僚内耗现象产生"}, {"label": "B", "text": "维护成本增加"}, {"label": "C", "text": "减少机会主义行为"}, {"label": "D", "text": "激励机制效力减弱"}], "answer": "BC", "analysis": "纵观企业的发展历史，大致经历了三个时期，分别是手工生产时期、工厂生产时期、企业生产时期\n。所以答案为C、D、E。\n18.下列不属于企业弱势的有（ ）。\nA.官僚内耗现象产生\nB.维护成本增加\nC.减少机会主义行为\nD.激励机制效力减弱\nE.信息传递易缺失"}, {"question": "企业是以营利为目的，依法从事生产、流通和服务等满足社会需要的经济活动，实行（ ）的法人实体和 市场竞争主体。", "options": [{"label": "A", "text": "自主经营"}, {"label": "B", "text": "自负盈亏"}, {"label": "C", "text": "自我发展"}, {"label": "D", "text": "自我管理"}], "answer": "ABCE", "analysis": "企业的弱势包括：①信息传递易缺失；②监督成本增加；③激励机制效力减弱；④官僚内耗现象产\n生。\n19.企业是以营利为目的，依法从事生产、流通和服务等满足社会需要的经济活动，实行（ ）的法人实体和\n市场竞争主体。\nA.自主经营\nB.自负盈亏\nC.自我发展\nD.自我管理\nE.自我约束"}, {"question": "ABCE 【解析】本题考查企业的概念。企业是以盈利为目的，依法从事生产、流通和服务等满足社会需要的经济活 动，实行自主经营、自负盈亏、自我发展、自我约束的法人实体和市场竞争主体。 20.早期的企业拥有的资源主要是（ ）。 4", "options": [{"label": "A", "text": "土地"}, {"label": "B", "text": "资本"}, {"label": "C", "text": "技术"}, {"label": "D", "text": "信息"}], "answer": "ABE", "analysis": "本题考查企业的概念。企业是以盈利为目的，依法从事生产、流通和服务等满足社会需要的经济活\n动，实行自主经营、自负盈亏、自我发展、自我约束的法人实体和市场竞争主体。\n20.早期的企业拥有的资源主要是（ ）。\nA.土地\n4\nB.资本\nC.技术\nD.信息\nE.劳动力"}, {"question": "ABE 【解析】本题考查企业的概念。早期的企业拥有的资源主要是资本、土地和劳动力，随着现代科学技术的发 展，技术和信息也已成为企业生存和发展的重要资源。 21.从交易费用的角度考察市场和企业，下列说法正确的有（ ）。", "options": [{"label": "A", "text": "市场发生的是组织管理费用"}, {"label": "B", "text": "企业发生的是交易费用"}, {"label": "C", "text": "市场和企业是两种不同的资源配置和生产组织方式"}, {"label": "D", "text": "市场是通过协议买卖的方式来实现资源配置和组织生产"}], "answer": "CDE", "analysis": "本题考查企业的概念。早期的企业拥有的资源主要是资本、土地和劳动力，随着现代科学技术的发\n展，技术和信息也已成为企业生存和发展的重要资源。\n21.从交易费用的角度考察市场和企业，下列说法正确的有（ ）。\nA.市场发生的是组织管理费用\nB.企业发生的是交易费用\nC.市场和企业是两种不同的资源配置和生产组织方式\nD.市场是通过协议买卖的方式来实现资源配置和组织生产\nE.企业是通过内部管理的方式来实现资源配置和组织生产"}, {"question": "CDE 【解析】本题考查新制度学派的观点。从交易费用的角度考察，市场和企业是两种不同的资源配置和生产组 织方式，市场是通过协议买卖的方式来实现资源配置和组织生产，企业是通过内部管理的方式来实现资源配 置和组织生产。市场发生的是交易费用，企业发生的是组织管理费用。 22.关于现代企业与传统企业的区别，下列说法正确的有（ ）。", "options": [{"label": "A", "text": "现代企业的所有权与经营权分离"}, {"label": "B", "text": "传统企业所有权与经营权统一"}, {"label": "C", "text": "现代企业实行扁平式间接管理"}, {"label": "D", "text": "传统企业实行垂直式直接管理，企业具有独立性"}], "answer": "ABCE", "analysis": "本题考查新制度学派的观点。从交易费用的角度考察，市场和企业是两种不同的资源配置和生产组\n织方式，市场是通过协议买卖的方式来实现资源配置和组织生产，企业是通过内部管理的方式来实现资源配\n置和组织生产。市场发生的是交易费用，企业发生的是组织管理费用。\n22.关于现代企业与传统企业的区别，下列说法正确的有（ ）。\nA.现代企业的所有权与经营权分离\nB.传统企业所有权与经营权统一\nC.现代企业实行扁平式间接管理\nD.传统企业实行垂直式直接管理，企业具有独立性\nE.现代企业面临的外部环境较松，企业根据市场需要行事"}, {"question": "ABCE 【解析】本题考查现代企业与传统企业的关系。现代企业与传统企业的区别。①面临的外部环境。传统企业 的外部环境严格，企业要按规章制度行事；现代企业外部环境宽松，企业根据市场需要行事。②所有者和经 营者的关系不同。传统企业所有权与经营权统一；现代企业的所有权与经营权分离。③企业管理方式。传统 企业实行垂直式直接管理；现代企业实行扁平式间接管理，企业具有独立性。 23.下列属于企业发展机制的内容的有（ ）。", "options": [{"label": "A", "text": "发展资金自我积累"}, {"label": "B", "text": "组织结构垂直管理"}, {"label": "C", "text": "融资渠道自主选择"}, {"label": "D", "text": "投资项目任意获得"}], "answer": "ACE", "analysis": "本题考查现代企业与传统企业的关系。现代企业与传统企业的区别。①面临的外部环境。传统企业\n的外部环境严格，企业要按规章制度行事；现代企业外部环境宽松，企业根据市场需要行事。②所有者和经\n营者的关系不同。传统企业所有权与经营权统一；现代企业的所有权与经营权分离。③企业管理方式。传统\n企业实行垂直式直接管理；现代企业实行扁平式间接管理，企业具有独立性。\n23.下列属于企业发展机制的内容的有（ ）。\nA.发展资金自我积累\nB.组织结构垂直管理\nC.融资渠道自主选择\nD.投资项目任意获得\nE.法人财产依法所有"}, {"question": "第三节 企业的职能与社会责任 单项选择题 1.企业的双重目标是获取利润和（ ）。", "options": [{"label": "A", "text": "满足人们需要"}, {"label": "B", "text": "满足社会需求"}, {"label": "C", "text": "促进精神文明建设"}, {"label": "D", "text": "促进科技进步"}], "answer": "B", "analysis": ""}, {"question": "某企业在加强生产的同时，经常组织对员工的职业道德教育、科学文化教育和技术业务培训，这是企业 （ ）职能的体现。", "options": [{"label": "A", "text": "优化资源配置"}, {"label": "B", "text": "加强精神文明建设"}, {"label": "C", "text": "承担社会责任"}, {"label": "D", "text": "劳动手段"}], "answer": "B", "analysis": "企业最重要的两个特性是经济性和社会性，这两个特性决定了企业目标的双重性，即满足社会需要\n并获取利润。\n2.某企业在加强生产的同时，经常组织对员工的职业道德教育、科学文化教育和技术业务培训，这是企业\n（ ）职能的体现。\nA.优化资源配置\nB.加强精神文明建设\nC.承担社会责任\nD.劳动手段"}, {"question": "企业经营的双重目标是（ ）。", "options": [{"label": "A", "text": "经济利益和政治利益"}, {"label": "B", "text": "获得利润和满足社会需求"}, {"label": "C", "text": "企业规模扩张和内部结构优化"}, {"label": "D", "text": "企业利益最大化和员工工资增长"}], "answer": "B", "analysis": "企业在创造物质财富的同时，应注重精神文明建设，加强员工思想政治教育、法制教育、爱国主义\n教育、科学文化教育、职业道德教育和技术业务培训，不断提升员工队伍素质，以适应企业发展和社会主义\n现代化建设的需要。\n3.企业经营的双重目标是（ ）。\nA.经济利益和政治利益\nB.获得利润和满足社会需求\nC.企业规模扩张和内部结构优化\nD.企业利益最大化和员工工资增长"}, {"question": "我国企业的基本职能主要体现在（ ）。", "options": [{"label": "A", "text": "承担必要的社会责任"}, {"label": "B", "text": "满足社会需要并获得利润"}, {"label": "C", "text": "确保国家财政收入，逐步增加员工收入"}, {"label": "D", "text": "确保产品质量，增强产品在国内外市场的竞争力"}], "answer": "ACDE", "analysis": "企业具有经济性、社会性、独立性、营利性四个特征，其中最重要的是企业的经济性和社会性。这\n两个重要特征决定了企业目标的双重性，企业的双重性目标是指满足社会需要并获得利润。\n多项选择题\n4.我国企业的基本职能主要体现在（ ）。\nA.承担必要的社会责任\nB.满足社会需要并获得利润\nC.确保国家财政收入，逐步增加员工收入\nD.确保产品质量，增强产品在国内外市场的竞争力\nE.注重职业健康安全和环境保护工作"}, {"question": "第二节 企业制度 单项选择题 1.有限责任公司，法人对公司债务承担责任的界限是（ ）。", "options": [{"label": "A", "text": "全体股东出资额"}, {"label": "B", "text": "公司全部固定资产"}, {"label": "C", "text": "全部法人财产"}, {"label": "D", "text": "公司注册资本"}], "answer": "C", "analysis": ""}, {"question": "下列关于公司制企业的说法，不正确的是（ ）。", "options": [{"label": "A", "text": "由自然人或法人依法出资组成"}, {"label": "B", "text": "独立对自己经营的财产享有民事权利，承担民事责任"}, {"label": "C", "text": "有自己的名称和活动的场所"}, {"label": "D", "text": "公司的法人代表对公司债务承担全部责任"}], "answer": "D", "analysis": "按照大陆法系，公司制企业有无限公司、有限公司、两合公司。有限责任公司制度的出现是企业财\n产组织形式的一个重大进步，是企业发展史上的一次飞跃，也是现代企业制度的重要标志。企业以法人财产\n为限承担有限责任。\n2.下列关于公司制企业的说法，不正确的是（ ）。\nA.由自然人或法人依法出资组成\nB.独立对自己经营的财产享有民事权利，承担民事责任\nC.有自己的名称和活动的场所\nD.公司的法人代表对公司债务承担全部责任"}, {"question": "现代企业制度的核心是（ ）。", "options": [{"label": "A", "text": "企业产权制度"}, {"label": "B", "text": "有限责任制度"}, {"label": "C", "text": "现代公司制度"}, {"label": "D", "text": "科学管理制度"}], "answer": "A", "analysis": "公司制企业是由自然人或法人依法出资组成的、能够独立对自己经营的财产享有民事权利和承担民\n事责任的经济组织。公司制企业实行有限责任制度。有限责任包含两层含义：一是对股东而言，是以股东的\n出资额为限，对公司的债务承担有限责任；二是对公司法人而言，是以其全部法人财产为限，对公司债务承\n担有限责任。\n3.现代企业制度的核心是（ ）。\nA.企业产权制度\nB.有限责任制度\nC.现代公司制度\nD.科学管理制度"}, {"question": "关于公司制企业，下列说法错误的是（ ）。", "options": [{"label": "A", "text": "由自然人或法人依法出资组成"}, {"label": "B", "text": "独立对自己经营的财产享有民事权利，承担民事责任"}, {"label": "C", "text": "有自己的名称和活动的场所"}, {"label": "D", "text": "公司的法人代表对公司债务承担全部责任"}], "answer": "D", "analysis": "企业制度是指以产权制度为基础和核心的企业组织和管理制度。\n4.关于公司制企业，下列说法错误的是（ ）。\nA.由自然人或法人依法出资组成\nB.独立对自己经营的财产享有民事权利，承担民事责任\nC.有自己的名称和活动的场所\nD.公司的法人代表对公司债务承担全部责任"}, {"question": "现代企业制度以（ ）为核心。", "options": [{"label": "A", "text": "有限责任"}, {"label": "B", "text": "产权制度"}, {"label": "C", "text": "现代公司制度"}, {"label": "D", "text": "分配制度"}], "answer": "B", "analysis": "公司法人是以其全部法人财产为限，对公司债务承担有限责任。\n5.现代企业制度以（ ）为核心。\nA.有限责任\nB.产权制度\nC.现代公司制度\nD.分配制度"}, {"question": "按企业对产权的拥有状况所形成的组织形式划分，企业的类型不包括（ ）。", "options": [{"label": "A", "text": "单个业主制企业"}, {"label": "B", "text": "合伙制企业"}, {"label": "C", "text": "股份制企业"}, {"label": "D", "text": "公司制企业"}], "answer": "C", "analysis": "现代企业制度是适应社会化大生产和市场经济发展要求的，以产权制度为核心，以有限责任制度为\n1\n保证，以现代公司制企业为主要形式的，产权清晰、权责明确、政企分开、管理科学的新型企业制度。\n6.按企业对产权的拥有状况所形成的组织形式划分，企业的类型不包括（ ）。\nA.单个业主制企业\nB.合伙制企业\nC.股份制企业\nD.公司制企业"}, {"question": "当代世界各国普遍采用的一种企业组织形式是（ ）。", "options": [{"label": "A", "text": "国有企业"}, {"label": "B", "text": "集体所有制企业"}, {"label": "C", "text": "股份制企业"}, {"label": "D", "text": "民营企业"}], "answer": "C", "analysis": "本题考查企业的类型。按企业对产权的拥有状况所形成的组织形式划分，实际上是按资产组织形式\n和所承担的法律责任予以分类，此种分类方法可把企业分为单个业主制企业、合伙制企业和公司制企业。\n7.当代世界各国普遍采用的一种企业组织形式是（ ）。\nA.国有企业\nB.集体所有制企业\nC.股份制企业\nD.民营企业"}, {"question": "民营企业的主要组织形式不包括（ ）。", "options": [{"label": "A", "text": "单个业主制企业"}, {"label": "B", "text": "合伙制企业"}, {"label": "C", "text": "有限责任公司"}, {"label": "D", "text": "股份有限公司"}], "answer": "D", "analysis": "本题考查股份制企业的相关内容。股份制企业是当代世界各国普遍采用的一种企业组织形式。\n8.民营企业的主要组织形式不包括（ ）。\nA.单个业主制企业\nB.合伙制企业\nC.有限责任公司\nD.股份有限公司"}, {"question": "关于股份制企业表述错误的是（ ）。", "options": [{"label": "A", "text 人员素质"}, {"label": "C", "text": "政企分开"}, {"label": "D", "text": "权责明确"}], "answer": "ACDE", "analysis": "市场经济在其数百年的发展过程中，在国际上逐步形成了三种基本的企业制度，即单个业主制企业\n、合伙制企业、公司制企业。\n17.现代企业制度的基本特征包括（ ）。\nA.产权清晰\nB.人员素质\nC.政企分开\nD.权责明确\nE.管理科学"}, {"question": "第五节 企业管理的基础工作 单项选择题 1.为了编制设备修理计划而制定的有关标准称为（ ）。", "options": [{"label": "A", "text": "设备设计定额"}, {"label": "B", "text": "设备利用定额"}, {"label": "C", "text": "设备维修定额"}, {"label": "D", "text": "设备寿命定额"}], "answer": "C", "analysis": ""}, {"question": "在企业管理所制定的标准中，生产组织标准属于（ ）。", "options": [{"label": "A", "text": "技术标准"}, {"label": "B", "text": "产品标准"}, {"label": "C", "text": "安全标准"}, {"label": "D", "text": "管理标准"}], "answer": "D", "analysis": "设备定额可分为设备利用定额和设备维修定额。前者是指在一定的生产技术组织条件下，单台设备\n在单位时间的产量标准。后者是指为了编制设备维修计划而制定的有关标准。\n2.在企业管理所制定的标准中，生产组织标准属于（ ）。\nA.技术标准\nB.产品标准\nC.安全标准\nD.管理标准"}, {"question": "企业的设备看管定额属于（ ）。", "options": [{"label": "A", "text": "物资定额"}, {"label": "B", "text": "生产组织定额"}, {"label": "C", "text": "劳动定额"}, {"label": "D", "text": "设备定额"}], "answer": "C", "analysis": "管理标准是指对企业重复出现的管理业务和工作责任，按有效利用时间、提高工作效率的要求，对\n工作程序、工作方法、工作职责和制度所做的统一规定，包括生产组织标准、技术管理标准、经济管理标准\n等。\n3.企业的设备看管定额属于（ ）。\nA.物资定额\nB.生产组织定额\nC.劳动定额\nD.设备定额"}, {"question": "在一定的生产技术组织条件下，单位产品占用和消耗的物资标准，称为（ ）。", "options": [{"label": "A", "text": "设备定额"}, {"label": "B", "text": "劳动定额"}, {"label": "C", "text": "物资定额"}, {"label": "D", "text": "费用定额"}], "answer": "C", "analysis": "劳动定额即劳动消耗定额，也称劳动定员定额，是指在一定的生产技术组织条件下，采用科学合理\n的方法，为生产单位产品或完成某项工作任务所预先规定的劳动消耗量的标准。劳动定额又可细分为单位产\n品的工时定额、单位工酬的产量定额、设备看管定额、服务定额等。\n4.在一定的生产技术组织条件下，单位产品占用和消耗的物资标准，称为（ ）。\nA.设备定额\nB.劳动定额\nC.物资定额\nD.费用定额"}, {"question": "衡量产品质量的主要依据是（ ）。", "options": [{"label": "A", "text": "产品标准"}, {"label": "B", "text": "方法标准"}, {"label": "C", "text": "基础标准"}, {"label": "D", "text": "安全与环境标准"}], "answer": "A", "analysis": "物资定额又分为物资消耗定额和物资储备定额，是指在一定的生产技术组织条件下，单位产品占用\n或消耗的物资标准，如各种原材料消耗定额、能源消耗定额、工具消耗定额、劳保用品消耗定额以及有关物\n资的储备定额等。\n5.衡量产品质量的主要依据是（ ）。\nA.产品标准\nB.方法标准\nC.基础标准\nD.安全与环境标准\n1"}, {"question": "企业管理中一项涉及技术、经济、管理等方面的综合性基础工作是（ ）。", "options": [{"label": "A", "text": "标准化工作"}, {"label": "B", "text": "计量工作"}, {"label": "C", "text": "定额工作"}, {"label": "D", "text": "信息工作"}], "answer": "A", "analysis": "本题考查技术标准的相关内容。产品标准是对产品的规格、参数、质量要求、检查方法、包装运输\n以及售后服务等所做的统一规定，是衡量产品质量的主要依据。\n6.企业管理中一项涉及技术、经济、管理等方面的综合性基础工作是（ ）。\nA.标准化工作\nB.计量工作\nC.定额工作\nD.信息工作"}, {"question": "计量管理不包括（ ）。", "options": [{"label": "A", "text": "工业计量管理"}, {"label": "B", "text": "商业计量管理"}, {"label": "C", "text": "产品计量管理"}, {"label": "D", "text": "法制计量管理"}], "answer": "C", "analysis": "本题考查标准化工作的相关内容。企业的标准化工作是指企业各种标准的制定、执行和管理，包括\n建立和健全标准体系、贯彻执行标准等，是企业管理中一项涉及技术、经济、管理等方面的综合性基础工作\n。\n7.计量管理不包括（ ）。\nA.工业计量管理\nB.商业计量管理\nC.产品计量管理\nD.法制计量管理"}, {"question": "在企业规章制度中，法人管理制度属于（ ）。", "options": [{"label": "A", "text": "基本制度"}, {"label": "B", "text": "工作制度"}, {"label": "C", "text": "财务制度"}, {"label": "D", "text": "责任制度"}], "answer": "A", "analysis": "本题考查计量管理的相关内容。计量管理主要包括三个方面：①工业计量管理；②商业计量管理\n；③法制计量管理。\n8.在企业规章制度中，法人管理制度属于（ ）。\nA.基本制度\nB.工作制度\nC.财务制度\nD.责任制度"}, {"question": "在企业的技术标准中，工艺规程属于（ ）。", "options": [{"label": "A", "text": "环境标准"}, {"label": "B", "text": "产品标准"}, {"label": "C", "text": "方法标准"}, {"label": "D", "text": "安全标准"}], "answer": "C", "analysis": "本题考查基本制度。基本制度主要是指企业的领导体系，如“经理、厂长负责制”法人管理制度\n”等。\n9.在企业的技术标准中，工艺规程属于（ ）。\nA.环境标准\nB.产品标准\nC.方法标准\nD.安全标准"}, {"question": "期量标准是指在一定的生产技术组织条件下，对产品的生产过程所制定的有关（ ）方面的标准。", "options": [{"label": "A", "text": "时间和数量"}, {"label": "B", "text": "质量和数量"}, {"label": "C", "text": "时间和质量"}, {"label": "D", "text": "安全与质量"}], "answer": "A", "analysis": "方法标准是对生产过程中具有通用性的重要程序、规则、方法所做的统一规定，包括设计规程、工\n艺规程、材料装备、操作方法、检验方法等。\n10.期量标准是指在一定的生产技术组织条件下，对产品的生产过程所制定的有关（ ）方面的标准。\nA.时间和数量\nB.质量和数量\nC.时间和质量\nD.安全与质量\n2"}, {"question": "在企业所制定的技术标准中，最基本的具有指导意义的是（ ）。", "options": [{"label": "A", "text": "基础标准"}, {"label": "B", "text": "方法标准"}, {"label": "C", "text": "安全标准"}, {"label": "D", "text": "产品标准"}], "answer": "A", "analysis": "期量标准是指在一定的生产技术组织条件下，对产品的生产过程所制定的有关时间和数量方面的标\n准。\n11.在企业所制定的技术标准中，最基本的具有指导意义的是（ ）。\nA.基础标准\nB.方法标准\nC.安全标准\nD.产品标准"}, {"question": "企业的计量工作包括计量技术和（ ）两个部分。", "options": [{"label": "A", "text": "计量工具"}, {"label": "B", "text": "计量水平"}, {"label": "C", "text": "计量目的"}, {"label": "D", "text": "计量管理"}], "answer": "D", "analysis": "基础标准是针对生产技术活动中的一般共性问题，根据最普遍的规律制定的基础规则，是生产技术\n活动中最基本的具有指导意义的标准。\n12.企业的计量工作包括计量技术和（ ）两个部分。\nA.计量工具\nB.计量水平\nC.计量目的\nD.计量管理"}, {"question": "（ ）是指企业生产经营活动所需资料、数据的收集、处理、储存和利用等一系列工作。", "options": [{"label": "A", "text": "信息工作"}, {"label": "B", "text": "计量工作"}, {"label": "C", "text": "标准化工作"}, {"label": "D", "text": "规章制度"}], "answer": "A", "analysis": "企业的计量工作就是运用科学的方法与手段，对生产经营活动中的量和质的数值加以掌握和管理\n，包括计量技术和计量管理两个部分的内容。\n13.（ ）是指企业生产经营活动所需资料、数据的收集、处理、储存和利用等一系列工作。\nA.信息工作\nB.计量工作\nC.标准化工作\nD.规章制度"}, {"question": "企业管理基础工作就生产企业而言，主要内容的有（ ）。", "options": [{"label": "A", "text": "标准化工作"}, {"label": "B", "text": "定额工作"}, {"label": "C", "text": "战略制定"}, {"label": "D", "text": "计量工作"}], "answer": "ABDE", "analysis": "信息工作是指企业生产经营活动所需资料、数据的收集、处理、储存和利用等一系列工作。\n多项选择题\n14.企业管理基础工作就生产企业而言，主要内容的有（ ）。\nA.标准化工作\nB.定额工作\nC.战略制定\nD.计量工作\nE.职业培训"}, {"question": "ABDE 【解析】企业管理基础工作就生产企业而言，主要包括标准化工作、定额工作、计量工作、信息工作、规章 制度、职业培训。 15.下列属于企业管理基础工作内容的有（ ）。 3", "options": [{"label": "A", "text": "标准化工作"}, {"label": "B", "text": "定额工作"}, {"label": "C", "text": "战略制定"}, {"label": "D", "text": "计量工作"}], "answer": "ABDE", "analysis": "企业管理基础工作就生产企业而言，主要包括标准化工作、定额工作、计量工作、信息工作、规章\n制度、职业培训。\n15.下列属于企业管理基础工作内容的有（ ）。\nA.标准化工作\nB.定额工作\nC.战略制定\nD.计量工作\n3\nE.职业培训"}, {"question": "ABDE 【解析】企业管理基础工作就生产企业而言，主要包括标准化工作、定额工作、计量工作、信息工作、规章 制度、职业培训六个方面。 16.按照性质划分，企业标准化工作的内容包括（ ）。", "options": [{"label": "A", "text": "技术标准"}, {"label": "B", "text": "管理标准"}, {"label": "C", "text": "工作标准"}, {"label": "D", "text": "考核标准"}], "answer": "ABC", "analysis": "企业管理基础工作就生产企业而言，主要包括标准化工作、定额工作、计量工作、信息工作、规章\n制度、职业培训六个方面。\n16.按照性质划分，企业标准化工作的内容包括（ ）。\nA.技术标准\nB.管理标准\nC.工作标准\nD.考核标准\nE.产品标准"}, {"question": "企业管理对信息工作的基本要求是（ ）。", "options": [{"label": "A", "text": "公开"}, {"label": "B", "text": "准确"}, {"label": "C", "text": "及时"}, {"label": "D", "text": "全面"}], "answer": "BCDE", "analysis": "按照性质划分，企业的标准主要有技术标准、管理标准、工作标准。\n17.企业管理对信息工作的基本要求是（ ）。\nA.公开\nB.准确\nC.及时\nD.全面\nE.连续"}, {"question": "BCDE 【解析】对信息工作的要求是准确、及时、全面、连续。准确是信息的生命，准确的信息是科学决策的前提 条件，也是决策走向成功的保证。信息工作绝不能弄虚作假。及时是指所收集的信息能及时反映环境的变化 和企业实际。信息有时效性，过时的信息是无意义的信息，甚至会对公众产生误导。全面是指所收集的信息 必须反映客观事物的整体情况，不能断章取义，更不能报喜不报忧。 18.企业的技术标准包括（ ）。", "options": [{"label": "A", "text": "产品标准"}, {"label": "B", "text": "方法标准"}, {"label": "C", "text": "基础标准"}, {"label": "D", "text": "市场标准"}], "answer": "ABCE", "analysis": "对信息工作的要求是准确、及时、全面、连续。准确是信息的生命，准确的信息是科学决策的前提\n条件，也是决策走向成功的保证。信息工作绝不能弄虚作假。及时是指所收集的信息能及时反映环境的变化\n和企业实际。信息有时效性，过时的信息是无意义的信息，甚至会对公众产生误导。全面是指所收集的信息\n必须反映客观事物的整体情况，不能断章取义，更不能报喜不报忧。\n18.企业的技术标准包括（ ）。\nA.产品标准\nB.方法标准\nC.基础标准\nD.市场标准\nE.安全与环境标准"}, {"question": "第四节 企业管理职能 单项选择题 1.企业管理的二重性是由（ ）决定的。", "options": [{"label": "A", "text": "社会制度的二重性"}, {"label": "B", "text": "生产过程的二重性"}, {"label": "C", "text": "生产目的的二重性"}, {"label": "D", "text": "企业属性的二重性"}], "answer": "B", "analysis": ""}, {"question": "企业管理的首要职能是（ ）。", "options": [{"label": "A", "text": "计划"}, {"label": "B", "text": "预测"}, {"label": "C", "text": "组织"}, {"label": "D", "text": "协调"}], "answer": "A", "analysis": "企业管理的二重性是由生产过程的二重性决定的。企业的生产过程是生产力和生产关系的统一体\n，它一方面是物质资料的再生产过程，另一方面又是生产关系的再生产过程。\n2.企业管理的首要职能是（ ）。\nA.计划\nB.预测\nC.组织\nD.协调"}, {"question": "企业管理的主要职能不包括（ ）。", "options": [{"label": "A", "text": "计划职能"}, {"label": "B", "text": "组织职能"}, {"label": "C", "text": "社会职能"}, {"label": "D", "text": "协调职能"}], "answer": "C", "analysis": "计划就是通过调查研究，预测企业未来的发展，确定生产经营活动的目标和方针，制定和选择方案\n，综合平衡，做出决策。计划正确与否对企业的成败具有决定作用。从这个意义上说，计划是企业管理的首\n要职能。\n3.企业管理的主要职能不包括（ ）。\nA.计划职能\nB.组织职能\nC.社会职能\nD.协调职能"}, {"question": "企业管理的各项职能中，（ ）职能是完成一切管理任务的基础和动力。", "options": [{"label": "A", "text": "组织"}, {"label": "B", "text": "控制"}, {"label": "C", "text": "协调"}, {"label": "D", "text": "激励"}], "answer": "D", "analysis": "本题考查企业管理的主要职能。在企业管理的实施过程中，一般有以下几项具体职能：（1）计划职\n能。（2）组织职能。（ \nA.通过员工招聘，可以为空缺职位找到合适的人选\nB.通过员工招聘，可以改善企业的员工结构\nC.通过员工招聘，可以树立良好的企业形象\nD.通过员工招聘，可以改善企业的氛围\nE.通过员工招聘，可以节省企业的开发培训费用"}, {"question": "ABCE 【解析】本题考查员工招聘的作用。员工招聘的作用主要表现在以下几个方面：（1）通过员工招聘，可以为 空缺职位找到合适的人选。（2）通过员工招聘，可以改善企业的员工结构。（3）通过员工招聘，可以树立 良好的企业形象。（4）通过员工招聘，可以节省企业的开发培训费用。 18.关于招聘信息的发布，下列说法正确的有（ ）。", "options": [{"label": "A", "text": "尽可能地使更多的人知道企业即将开始员工招聘工作"}, {"label": "B", "text": "尽可能早地向有关人员公布招聘信息"}, {"label": "C", "text": "尽可能向各个层次的人员发布招聘信息"}, {"label": "D", "text": "向外发布的招聘信息必须客观真实"}], "answer": "ABDE", "analysis": "本题考查员工招聘的作用。员工招聘的作用主要表现在以下几个方面：（1）通过员工招聘，可以为\n空缺职位找到合适的人选。（2）通过员工招聘，可以改善企业的员工结构。（3）通过员工招聘，可以树立\n良好的企业形象。（4）通过员工招聘，可以节省企业的开发培训费用。\n18.关于招聘信息的发布，下列说法正确的有（ ）。\nA.尽可能地使更多的人知道企业即将开始员工招聘工作\nB.尽可能早地向有关人员公布招聘信息\nC.尽可能向各个层次的人员发布招聘信息\nD.向外发布的招聘信息必须客观真实\nE.尽可能地向应聘者提供有利于其较全面地了解企业和招聘职位的相关信息"}, {"question": "ABDE 【解析】由于潜在的求职人员都是处在社会的某一层次，因此要根据空缺职位的特点，向特定层次的人员发 4 布招聘信息，以提高招聘的有效性。 19.企业的员工招聘工作具有很强的（ ）。", "options": [{"label": "A", "text": "社会性"}, {"label": "B", "text": "系统性"}, {"label": "C", "text": "政策性"}, {"label": "D", "text": "多样性"}], "answer": "ACE", "analysis": "由于潜在的求职人员都是处在社会的某一层次，因此要根据空缺职位的特点，向特定层次的人员发\n4\n布招聘信息，以提高招聘的有效性。\n19.企业的员工招聘工作具有很强的（ ）。\nA.社会性\nB.系统性\nC.政策性\nD.多样性\nE.法律性"}, {"question": "ACE 【解析】本题考查员工招聘的原则。企业的员工招聘工作不仅是企业的一项经济活动，而且具有很强的社会 性、政策性和法律性。 20.内部招聘的优点是（ ）。", "options": [{"label": "A", "text": "给员工提供了晋升的机会和空间"}, {"label": "B", "text": "企业对员工才能和品质有较准确和深入的了解，能降低误用或错用率"}, {"label": "C", "text": "可以提高员工对企业的忠诚度"}, {"label": "D", "text": "能够为企业带来新鲜空气"}], "answer": "ABC", "analysis": "本题考查员工招聘的原则。企业的员工招聘工作不仅是企业的一项经济活动，而且具有很强的社会\n性、政策性和法律性。\n20.内部招聘的优点是（ ）。\nA.给员工提供了晋升的机会和空间\nB.企业对员工才能和品质有较准确和深入的了解，能降低误用或错用率\nC.可以提高员工对企业的忠诚度\nD.能够为企业带来新鲜空气\nE.可以招聘到更优秀的人才"}, {"question": "心理测评的内容主要有（ ）。", "options": [{"label": "A", "text": "成就测评"}, {"label": "B", "text": "倾向测评"}, {"label": "C", "text": "智力测评"}, {"label": "D", "text": "人格测评"}], "answer": "ABCD", "analysis": "本题考查内部招聘的优点。内部招聘具有以下优点：①给员工提供了晋升的机会和空间，不仅有助\n于调动员工的工作积极性和进取精神，而且有助于员工安心工作，防止和减少企业人才的流失。②由于被聘\n任员工在企业中有着较长时间的工作经历，企业对其才能和品质有较准确和深入的了解，能降低误用或错用\n率。③不仅能减少招聘工作的宣传费用和差旅费用，而且内部员工对企业文化和企业相关制度有着深刻的理\n解，能更好地理解职位的要求，减少了企业的培训费用。④可以提高员工对企业的忠诚度，减少因人才流失\n导致的各种风险，有助于企业更好地开展研发、营销等各项工作。⑤有助于企业挑选和培养各层次的管理人\n员和未来的接班人。\n21.心理测评的内容主要有（ ）。\nA.成就测评\nB.倾向测评\nC.智力测评\nD.人格测评\nE.情商测评"}, {"question": "下列说法正确的是（ ）。", "options": [{"label": "A", "text": "企业的员工招聘工作不仅是企业的一项经济活动，而且具有很强的社会性、政策性和法律性"}, {"label": "B", "text": "企业和求职者处于平等的法律地位上，双方均有选择权"}, {"label": "C", "text": "如果企业选择外部招聘渠道，那么可采用的招聘方法有工作公告法和档案记录法"}, {"label": "D", "text": "如果企业选择内部招聘渠道，则可使用广告招聘、外出招聘、借助职业中介机构招聘等"}], "answer": "ABE", "analysis": "本题考查心理测评的主要内容。在员工招聘工作中，心理测评的内容主要有以下几个方面：成就测\n评、倾向测评、智力测评、人格测评、能力测评。\n22.下列说法正确的是（ ）。\nA.企业的员工招聘工作不仅是企业的一项经济活动，而且具有很强的社会性、政策性和法律性\nB.企业和求职者处于平等的法律地位上，双方均有选择权\nC.如果企业选择外部招聘渠道，那么可采用的招聘方法有工作公告法和档案记录法\nD.如果企业选择内部招聘渠道，则可使用广告招聘、外出招聘、借助职业中介机构招聘等\nE.招聘渠道一般包括内部招聘和外部招聘，两种招聘渠道各有其优缺点和适用条件"}, {"question": "第四节 企业劳动合同管理与劳动争议处理 单项选择题 1.关于劳动合同，下列说法错误的是（ ）。 度 会保险等合法权利", "options": [{"label": "A", "text": "企业劳动合同是确立劳动关系的凭证，是建立劳动关系的法律形式，是维护双方合法权益的法律保障"}, {"label": "B", "text": "根据劳动合同，劳动者加入企业，应担任一定职务或从事某种工作，并遵守所在企业的内部劳动规则和制"}, {"label": "C", "text": "企业方按照劳动者劳动的数量和质量支付劳动报酬，依法提供劳动条件，保障劳动者法享有劳动保护、社"}, {"label": "D", "text": "用人单位与劳动者在用工前订立劳动合同的，劳动关系自订立合同之日起建立"}], "answer": "D", "analysis": ""}, {"question": "企业劳动合同的条款中，法定条款的内容不包括（ ）。", "options": [{"label": "A", "text": "劳动者的姓名、住址和居民身份证或者其他有效身份证件号码"}, {"label": "B", "text": "保守商业秘密和竞业限制条款"}, {"label": "C", "text": "用人单位的名称、住所和法定代表人或者主要负责人"}, {"label": "D", "text": "劳动保护、劳动条件和职业危害防护"}], "answer": "B", "analysis": "《中华人民共和国劳动合同法》第10条规定“用人单位与劳动者在用工前订立劳动合同的，劳动关\n系自用工之日起建立\"，其他选项正确，因此选D。\n2.企业劳动合同的条款中，法定条款的内容不包括（ ）。\nA.劳动者的姓名、住址和居民身份证或者其他有效身份证件号码\nB.保守商业秘密和竞业限制条款\nC.用人单位的名称、住所和法定代表人或者主要负责人\nD.劳动保护、劳动条件和职业危害防护"}, {"question": "甲公司与李某订立劳动合同，合同约定：每日工作时间为8小时，每周工作时间为5天，合同期限为2016年 5月31日至2019年5月30日。该劳动合同属于（ ）。", "options": [{"label": "A", "text": "固定期限劳动合同"}, {"label": "B", "text": "无固定期限劳动合同"}, {"label": "C", "text": "不定期劳动合同"}, {"label": "D", "text": "非全日制劳动合同"}], "answer": "A", "analysis": "本题考查企业劳动合同的条款。选项B属于约定条款的内容。\n3.甲公司与李某订立劳动合同，合同约定：每日工作时间为8小时，每周工作时间为5天，合同期限为2016年\n5月31日至2019年5月30日。该劳动合同属于（ ）。\nA.固定期限劳动合同\nB.无固定期限劳动合同\nC.不定期劳动合同\nD.非全日制劳动合同"}, {"question": "根据《中华人民共和国劳动合同法》，劳动者在试用期内与企业解除劳动合同，需提前（ ）日通知用人 单位。", "options": [{"label": "A", "text": "60"}, {"label": "B", "text": "30"}, {"label": "C", "text": "15"}, {"label": "D", "text": "3"}], "answer": "D", "analysis": "本题考查企业劳动合同的种类。固定期限劳动合同，是指用人单位与劳动者约定合同终止时间的劳\n动合同。\n4.根据《中华人民共和国劳动合同法》，劳动者在试用期内与企业解除劳动合同，需提前（ ）日通知用人\n单位。\nA.60\nB.30\nC.15\nD.3"}, {"question": "建立劳动关系，应当订立书面劳动合同。已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日 起（ ）日内订立书面劳动合同。", "options": [{"label": "A", "text": "15"}, {"label": "B", "text": "30"}, {"label": "C", "text": "45"}, {"label": "D", "text": "60"}], "answer": "B", "analysis": "一般情形下，提前30日通知解除合同。试用期内提前3日通知解除合同。企业违法，劳动者可以解除\n合同。非常情况下，劳动者解除合同无须提前通知。\n5.建立劳动关系，应当订立书面劳动合同。已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日\n起（ ）日内订立书面劳动合同。\nA.15\nB.30\nC.45\n1\nD.60"}, {"question": "非全日制用工，用人单位劳动报酬支付周期最长不得超过（ ）日。", "options": [{"label": "A", "text": "5"}, {"label": "B", "text": "10"}, {"label": "C", "text": "15"}, {"label": "D", "text": "20"}], "answer": "C", "analysis": "《中华人民共和国劳动合同法》第10条规定，建立劳动关系，应当订立书面劳动合同。已建立劳动\n关系，未同时订立书面劳动合同的，应当自用工之日起一个月内订立书面劳动合同。\n6.非全日制用工，用人单位劳动报酬支付周期最长不得超过（ ）日。\nA.5\nB.10\nC.15\nD.20"}, {"question": "下列各项劳动合同中，适用于铁路交通和水利工程行业的是（ ）。", "options": [{"label": "A", "text": "全日制劳动合同"}, {"label": "B", "text": "非全日制劳动合同"}, {"label": "C", "text": "无固定期限劳动合同"}, {"label": "D", "text": "以完成一定工作任务为期限的劳动合同"}], "answer": "D", "analysis": "本题考查企业劳动合同的种类。非全日制用工，用人单位支付给劳动者的小时工资标准不得低于当\n地人民政府规定的最低小时工资标准，劳动报酬支付周期最长不得超过15日。\n7.下列各项劳动合同中，适用于铁路交通和水利工程行业的是（ ）。\nA.全日制劳动合同\nB.非全日制劳动合同\nC.无固定期限劳动合同\nD.以完成一定工作任务为期限的劳动合同"}, {"question": "《劳动合同法》规定，终止劳动合同后，企业应当在（ ）日内为劳动者办理档案和社会保险关系转移手 续。", "options": [{"label": "A", "text": "5"}, {"label": "B", "text": "15"}, {"label": "C", "text": "30"}, {"label": "D", "text": "60"}], "answer": "B", "analysis": "本题考查企业劳动合同的种类。以完成一定工作任务为期限的劳动合同多适用于建筑、铁路交通和\n水利工程等行业。\n8.《劳动合同法》规定，终止劳动合同后，企业应当在（ ）日内为劳动者办理档案和社会保险关系转移手\n续。\nA.5\nB.15\nC.30\nD.60"}, {"question": "根据企业劳动争议仲裁的时效规定，当事人应当从知道或者应当知道其权利被侵害之日起（ ）年内，以 书面形式向仲裁委员会申请仲裁。", "options": [{"label": "A", "text": "一"}, {"label": "B", "text": "二"}, {"label": "C", "text": "三"}, {"label": "D", "text": "四"}], "answer": "A", "analysis": "本题考查企业劳动合同终止的程序。《劳动合同法》第50条规定，用人单位应当在终止劳动合同时\n出具终止劳动合同的证明，并在15日内为劳动者办理档案和社会保险关系转移手续。\n9.根据企业劳动争议仲裁的时效规定，当事人应当从知道或者应当知道其权利被侵害之日起（ ）年内，以\n书面形式向仲裁委员会申请仲裁。\nA.一\nB.二\nC.三\nD.四"}, {"question": "对于劳动争议的仲裁，仲裁委员会应当自收到申诉书之日起（ ）日内做出受理或者不予受理的决定。", "options": [{"label": "A", "text": "5"}, {"label": "B", "text": "10"}, {"label": "C", "text": "15"}, {"label": "D", "text": "30"}], "answer": "A", "analysis": "本题考查企业劳动争议仲裁的时效规定。当事人应当从知道或者应当知道其权利被侵害之日起一年\n内，以书面形式向仲裁委员会申请仲裁。\n10.对于劳动争议的仲裁，仲裁委员会应当自收到申诉书之日起（ ）日内做出受理或者不予受理的决定。\nA.5\nB.10\n2\nC.15\nD.30"}, {"question": "劳动争议仲裁案件中，被诉人应当自收到申诉书副本之日起（ ）日内提交答辩书和有关证据。", "options": [{"label": "A", "text": "5"}, {"label": "B", "text": "10"}, {"label": "C", "text": "15"}, {"label": "D", "text": "20"}], "answer": "B", "analysis": "本题考查企业劳动争议仲裁的程序。仲裁委员会应当自收到申诉书之日起5日内做出受理或者不予受\n理的决定。\n11.劳动争议仲裁案件中，被诉人应当自收到申诉书副本之日起（ ）日内提交答辩书和有关证据。\nA.5\nB.10\nC.15\nD.20"}, {"question": "我国劳动争议仲裁的机构是（ ）。", "options": [{"label": "A", "text": "劳动争议仲裁委员会"}, {"label": "B", "text": "法院"}, {"label": "C", "text": "检查院"}, {"label": "D", "text": "公安机关"}], "answer": "A", "analysis": "本题考查企业劳动争议仲裁的程序。被诉人应当自收到申诉书副本之日起10日内提交答辩书和有关\n证据。\n12.我国劳动争议仲裁的机构是（ ）。\nA.劳动争议仲裁委员会\nB.法院\nC.检查院\nD.公安机关"}, {"question": "下列不属于劳动合同分类的是（ ）。", "options": [{"label": "A", "text": "固定期限劳动合同"}, {"label": "B", "text": "一定期限劳动合同"}, {"label": "C", "text": "无固定期限劳动合同"}, {"label": "D", "text": "以完成一定工作任务为期限的劳动合同"}], "answer": "B", "analysis": "不愿调解、调解不成或者达成调解协议后不履行的，可以向劳动争议仲裁委员会申请仲裁。\n13.下列不属于劳动合同分类的是（ ）。\nA.固定期限劳动合同\nB.一定期限劳动合同\nC.无固定期限劳动合同\nD.以完成一定工作任务为期限的劳动合同"}, {"question": "根据《劳动合同法》的规定，已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日起（ ）日 内订立书面劳动合同。", "options": [{"label": "A", "text": "15"}, {"label": "B", "text": "30"}, {"label": "C", "text": "45"}, {"label": "D", "text": "60"}], "answer": "B", "analysis": "《劳动合同法》第12条规定，劳动合同分为固定期限劳动合同、无固定期限劳动合同和以完成一定\n工作任务为期限的劳动合同。\n14.根据《劳动合同法》的规定，已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日起（ ）日\n内订立书面劳动合同。\nA.15\nB.30\nC.45\nD.60"}, {"question": "下列关于企业劳动争议处理方式的说法，错误的是（ ）。 3 请仲裁", "options": [{"label": "A", "text": "发生劳动争议，劳动者只可以请工会或者第三方共同与用人单位协商，达成和解协议"}, {"label": "B", "text": "发生劳动争议，当事人不愿协商、协商不成或者达成和解协议后不履行的，可以向调解组织申请调解"}, {"label": "C", "text": "发生劳动争议，当事人不愿调解、调解不成或者达成调解协议后不履行的，可以向劳动争议仲裁委员会申"}, {"label": "D", "text": "发生劳动争议，当事人对仲裁裁决不服的，法律另有规定的除外，可以向人民法院提起诉讼"}], "answer": "A", "analysis": "建立劳动关系，应当订立书面劳动合同。已建立劳动关系，未同时订立书面劳动合同的，应当自用\n工之日起一个月内订立书面劳动合同，用人单位与劳动者在用工前订立劳动合同的，劳动关系自用工之日起\n建立。\n15.下列关于企业劳动争议处理方式的说法，错误的是（ ）。\nA.发生劳动争议，劳动者只可以请工会或者第三方共同与用人单位协商，达成和解协议\nB.发生劳动争议，当事人不愿协商、协商不成或者达成和解协议后不履行的，可以向调解组织申请调解\n3\nC.发生劳动争议，当事人不愿调解、调解不成或者达成调解协议后不履行的，可以向劳动争议仲裁委员会申\n请仲裁\nD.发生劳动争议，当事人对仲裁裁决不服的，法律另有规定的除外，可以向人民法院提起诉讼"}, {"question": "根据我国《劳动法》的规定，因劳动者（ ），用人单位可随时解除劳动合同。", "options": [{"label": "A", "text": "非因公负伤"}, {"label": "B", "text": "劳动者不能胜任工作"}, {"label": "C", "text": "劳动合同订立时依据的客观情况发生重大改变"}, {"label": "D", "text": "严重违反用人单位规章制度"}], "answer": "D", "analysis": "发生劳动争议，一方当事人可以通过与另一方当事人约见、面谈等方式协商解决。劳动者可以要求\n所在企业工会参与或者协助其与企业进行协商；工会也可以主动参与劳动争议的协商处理，维护劳动者合法\n权益。选项A错误。\n16.根据我国《劳动法》的规定，因劳动者（ ），用人单位可随时解除劳动合同。\nA.非因公负伤\nB.劳动者不能胜任工作\nC.劳动合同订立时依据的客观情况发生重大改变\nD.严重违反用人单位规章制度"}, {"question": "订立企业劳动合同的原则包括（ ）。", "options": [{"label": "A", "text": "合法"}, {"label": "B", "text": "公平"}, {"label": "C", "text": "平等自愿"}, {"label": "D", "text": "协商一致"}], "answer": "ABCD", "analysis": "劳动者有下列情形之一的，用人单位可以解除劳动合同：①在试用期间被证明不符合录用条件的\n；②严重违反用人单位的规章制度的；③严重失职，营私舞弊，给用人单位造成重大损害的；④劳动者同时\n与其他用人单位建立劳动关系，对完成本单位的工作任务造成严重影响，或者经用人单位提出，拒不改正的\n；⑤采用欺诈、胁迫的手段或者乘人之危，使用人单位在违背真实意思的情况下订立或者变更劳动合同，致\n使劳动合同无效的；⑥被依法追究刑事责任的。企业在上述情形下解除合同，不受提前通知期的限制，不受\n企业不得解除劳动合同的法律限制，而且解除合同不需要支付经济补偿金。\n多项选择题\n17.订立企业劳动合同的原则包括（ ）。\nA.合法\nB.公平\nC.平等自愿\nD.协商一致\nE.符合企业招聘规定"}, {"question": "企业劳动争议处理的基本原则包括（ ）。", "options": [{"label": "A", "text": "平等自愿原则"}, {"label": "B", "text": "着重调解、及时处理原则"}, {"label": "C", "text": "在查清事实的基础上依法处理原则"}, {"label": "D", "text": "当事人适用法律面前一律平等原则"}], "answer": "BCD", "analysis": "《劳动合同法》第3条规定：订立劳动合同，应当遵循合法、公平、平等自愿、协商一致、诚实信用\n的原则。所以选ABCD\n18.企业劳动争议处理的基本原则包括（ ）。\nA.平等自愿原则\nB.着重调解、及时处理原则\nC.在查清事实的基础上依法处理原则\nD.当事人适用法律面前一律平等原则\nE.自行协商原则"}, {"question": "劳动者的主要义务包括（ ）。 4", "options": [{"label": "A", "text": "照料的义务"}, {"label": "B", "text": "附随的义务"}, {"label": "C", "text": "忠诚的义务"}, {"label": "D", "text": "劳动给付的义务"}], "answer": "BCD", "analysis": "处理企业劳动争议，必须遵循以下原则：①着重调解、及时处理原则；②在查清事实的基础上依法\n处理原则；③当事人在适用法律面前一律平等原则。\n19.劳动者的主要义务包括（ ）。\nA.照料的义务\nB.附随的义务\nC.忠诚的义务\n4\nD.劳动给付的义务\nE.劳动报酬给付的义务"}, {"question": "企业劳动争议处理的基本原则是（ ）。", "options": [{"label": "A", "text": "着重调解、及时处理原则"}, {"label": "B", "text": "在查清事实的基础上依法处理原则"}, {"label": "C", "text": "简单迅速原则"}, {"label": "D", "text": "当事人在适用法律面前一律平等原则"}], "answer": "ABD", "analysis": "本题考查劳动者的主要义务。劳动者的主要义务包括：①劳动给付的义务：包括劳动给付的范围、\n时间和地点。②忠诚的义务。③附随的义务。\n20.企业劳动争议处理的基本原则是（ ）。\nA.着重调解、及时处理原则\nB.在查清事实的基础上依法处理原则\nC.简单迅速原则\nD.当事人在适用法律面前一律平等原则\nE.重事实、轻程序原则"}], "第三节 市场营销管理一般过程": [{"question": "第一节 市场营销管理一般过程 单项选择题 1.（ ）指在一定地理范围内，某行业只有一个卖主或只有一个买主的情况。", "options": [{"label": "A", "text": "完全垄断行业"}, {"label": "B", "text": "完全寡头垄断行业"}, {"label": "C", "text": "垄断竞争行业"}, {"label": "D", "text": "完全竞争行业"}], "answer": "A", "analysis": ""}, {"question": "根据阿瑟.D.利特尔咨询公司的观点，企业在市场中的实力和竞争地位可分为（ ）类。", "options": [{"label": "A", "text": "4"}, {"label": "B", "text": "5"}, {"label": "C", "text": "6"}, {"label": "D", "text": "7"}], "answer": "C", "analysis": "完全垄断行业，指在一定地理范围内，某行业只有一个卖主或只有一个买主的情况。\n2.根据阿瑟.D.利特尔咨询公司的观点，企业在市场中的实力和竞争地位可分为（ ）类。\nA.4\nB.5\nC.6\nD.7"}, {"question": "（ ）定位方式是一种避开强有力竞争对手，将自己的品牌和商品定位于市场的\"空白点\"的定位思路。", "options": [{"label": "A", "text": "回避"}, {"label": "B", "text": "对峙"}, {"label": "C", "text": "重新"}, {"label": "D", "text": "调整"}], "answer": "A", "analysis": "根据阿瑟.D.利特尔咨询公司的观点，企业在市场中的实力和竞争地位可分为6类。\n3.（ ）定位方式是一种避开强有力竞争对手，将自己的品牌和商品定位于市场的\"空白点\"的定位思路。\nA.回避\nB.对峙\nC.重新\nD.调整"}, {"question": "目标市场是指企业决定进入的、具有共同需要或特征的购买者集合。目标市场选择模式包括（ ）。", "options": [{"label": "A", "text": "市场集中化"}, {"label": "B", "text": "选择专业化"}, {"label": "C", "text": "市场专业化"}, {"label": "D", "text": "产品专业化"}], "answer": "ABCDE", "analysis": "回避定位是一种避开强有力竞争对手，将自己的品牌和商品定位于市场的\"空白点\"的定位思路。\n多项选择题\n4.目标市场是指企业决定进入的、具有共同需要或特征的购买者集合。目标市场选择模式包括（ ）。\nA.市场集中化\nB.选择专业化\nC.市场专业化\nD.产品专业化\nE.市场全面化"}, {"question": "ABCDE 【解析】ABCDE都是目标市场选择模式 5.按照企业定价时侧重考虑因素的不同，可将定价方法分成（ ）。", "options": [{"label": "A", "text": "成本导向定价法"}, {"label": "B", "text": "企业导向定价法"}, {"label": "C", "text": "需求导向定价法"}, {"label": "D", "text": "目标导向定价法"}], "answer": "ACE", "analysis": "ABCDE都是目标市场选择模式\n5.按照企业定价时侧重考虑因素的不同，可将定价方法分成（ ）。\nA.成本导向定价法\nB.企业导向定价法\nC.需求导向定价法\nD.目标导向定价法\nE.竞争导向定价法"}, {"question": "第三节 市场预测 单项选择题 1.注重对事物发展在性质方面的预测，具有较大的灵活性，易于充分发挥预测者的主观能动性，且简单、省 事、省费用的市场预测方法是（ ）。", "options": [{"label": "A", "text": "定性市场预测方法"}, {"label": "B", "text": "定量市场预测方法"}, {"label": "C", "text": "对比类推法"}, {"label": "D", "text": "主观概率法"}], "answer": "A", "analysis": ""}, {"question": "简单移动平均法一般适用于时间序列数据是（ ）的预测。", "options": [{"label": "A", "text": "水平型变动趋势"}, {"label": "B", "text": "长期变动趋势"}, {"label": "C", "text": "循环型变动趋势"}, {"label": "D", "text": "短期变动趋势"}], "answer": "A", "analysis": "定性市场预测方法是预测者根据掌握的资料、结合自身的经验和专业水平，对预测对象的未来发展\n做出性质、方向和程度上的估计与推测的一种预测方法。定性市场预测方法注重对事物发展在性质方面的预\n测，具有较大的灵活性，易于充分发挥预测者的主观能动性，且简单、迅速、省事、省费用。\n2.简单移动平均法一般适用于时间序列数据是（ ）的预测。\nA.水平型变动趋势\nB.长期变动趋势\nC.循环型变动趋势\nD.短期变动趋势"}, {"question": "与德尔菲法相比，交锋式会议法的特点是（ ）。", "options": [{"label": "A", "text": "花费时间长"}, {"label": "B", "text": "匿名预测"}, {"label": "C", "text": "受权威专家的影响较大"}, {"label": "D", "text": "没有预测误差"}], "answer": "C", "analysis": "本题考查移动平均法。简单移动平均法一般适用于时间序列数据是水平型变动的预测，不适用于明\n显的长期变动趋势和循环型变动趋势的时间序列预测。\n3.与德尔菲法相比，交锋式会议法的特点是（ ）。\nA.花费时间长\nB.匿名预测\nC.受权威专家的影响较大\nD.没有预测误差"}, {"question": "德尔菲法选择专家的人数一般为（ ）人。", "options": [{"label": "A", "text": "12～15"}, {"label": "B", "text": "15～22"}, {"label": "C", "text": "10～30"}, {"label": "D", "text": "15～26"}], "answer": "C", "analysis": "交锋式会议法是与会专家围绕一个主题，各自发表意见.并进行充分争论，最后达成共识，取得比较\n一致的预测结论。它的局限性是容易出现“权威者”或“口才好”的人左右与会者的意见等情况。德尔菲法\n以匿名方式通过几轮函询征求专家的意见，预测组织小组对每一轮的意见进行汇总整理后作为参考再发送给\n各位专家，供他们分析判断，以提出新的论证，其缺点是预测过程比较复杂，花费时间较长。\n4.德尔菲法选择专家的人数一般为（ ）人。\nA.12～15\nB.15～22\nC.10～30\nD.15～26"}, {"question": "德尔菲法的主要环节是（ ）。", "options": [{"label": "A", "text": "组成专家小组"}, {"label": "B", "text": "准备资料"}, {"label": "C", "text": "确定预测值"}, {"label": "D", "text": "逐轮收集意见并为专家反馈信息"}], "answer": "D", "analysis": "专家人数的多少可根据预测课题的大小和涉及范围的宽窄而定，一般选择10～30人为宜。\n5.德尔菲法的主要环节是（ ）。\nA.组成专家小组\nB.准备资料\nC.确定预测值\nD.逐轮收集意见并为专家反馈信息\n1"}, {"question": "某种定性市场预测方法的特点是简便易行，可靠实用，注重发挥集体智慧，在一定程度上克服了个人直观 判断的局限性和片面性，有利于提高市场预测的质量。这种方法是（ ）。", "options": [{"label": "A", "text": "德尔菲法"}, {"label": "B", "text": "专家会议法"}, {"label": "C", "text": "集合意见法"}, {"label": "D", "text": "主观概率法"}], "answer": "C", "analysis": "本题考查德尔菲法的特点。逐轮收集意见并向专家反馈信息是德尔菲法的主要环节。\n6.某种定性市场预测方法的特点是简便易行，可靠实用，注重发挥集体智慧，在一定程度上克服了个人直观\n判断的局限性和片面性，有利于提高市场预测的质量。这种方法是（ ）。\nA.德尔菲法\nB.专家会议法\nC.集合意见法\nD.主观概率法"}, {"question": "利用壁挂式空调的发展特性来类推立柜式空调的发展特性，这种对比类推方法是（ ）。", "options": [{"label": "A", "text": "更新换代类推法"}, {"label": "B", "text": "产品类推法"}, {"label": "C", "text": "国际类推法"}, {"label": "D", "text": "行业类推法"}], "answer": "B", "analysis": "本题考查集合意见法的特点。集合意见法简便易行，可靠实用，注重发挥集体智慧，在一定程度上\n克服了个人直观判断的局限性和片面性，有利于提高市场预测的质量。\n7.利用壁挂式空调的发展特性来类推立柜式空调的发展特性，这种对比类推方法是（ ）。\nA.更新换代类推法\nB.产品类推法\nC.国际类推法\nD.行业类推法"}, {"question": "某企业2015年产品销售额如表所示，若该企业2016年预计销售额比上年增长10%，一季度季节指数为 49.1%，则用季节指数法预测2016年一季度销售量为（ ）。 某企业2015年产品销售额（单位：亿元）", "options": [{"label": "A", "text": "1.94"}, {"label": "B", "text": "4.7"}, {"label": "C", "text": "1.87"}, {"label": "D", "text": "3.63"}], "answer": "A", "analysis": "本题考查产品类推法。产品类推法是以国内市场上的同类产品或类似产品在发展中所表现的特征来\n类推某产品的发展变化规律。例如，可以利用黑白电视机的发展规律来类推彩电的发展规律；利用壁挂式空\n调的发展特性来类推立柜式空调的发展特性。\n8.某企业2015年产品销售额如表所示，若该企业2016年预计销售额比上年增长10%，一季度季节指数为\n49.1%，则用季节指数法预测2016年一季度销售量为（ ）。\n某企业2015年产品销售额（单位：亿元）\nA.1.94\nB.4.7\nC.1.87\ tions": [{"label": "A", "text": "定性预测方法具有较大的灵活性，易于充分发挥预测者的主观能动性"}, {"label": "B", "text": "在掌握数据不多、不够准确或主要影响因素无法用数字描述进行定量分析时，定性预测是一种非常有效的"}, {"label": "C", "text": "定性预测方法不易受主观因素的影响"}, {"label": "D", "text": "定性预测方法并不缺乏对事物发展作数量上的准确描述"}], "answer": "CD", "analysis": "主观概率法的实施步骤一般包括以下四步：①相关资料的准备；②编制主观概率调查表；③汇总整\n理预测结果；④给出最终预测判断结果。\n18.下列关于定性市场预测的说法，错误的有（ ）。\nA.定性预测方法具有较大的灵活性，易于充分发挥预测者的主观能动性\nB.在掌握数据不多、不够准确或主要影响因素无法用数字描述进行定量分析时，定性预测是一种非常有效的\n预测方法\nC.定性预测方法不易受主观因素的影响\nD.定性预测方法并不缺乏对事物发展作数量上的准确描述\nE.定性预测方法包括专家会议法、德尔菲法等"}, {"question": "对比类推法依据类比的目标不同可分为（ ）。", "options": [{"label": "A", "text": "产品类推法"}, {"label": "B", "text": "行业类推法"}, {"label": "C", "text": "国际类推法"}, {"label": "D", "text": "消费群体类推法"}], "answer": "ABCE", "analysis": "定性市场预测容易受主观因素的影响，比较注重预测者的经验和主观判断能力，从而易受预测者的\n知识、经验和能力的束缚与限制，尤其是难以客观地对事物发展进行数量上的准确描述。选项C、D错误。\n4\n19.对比类推法依据类比的目标不同可分为（ ）。\nA.产品类推法\nB.行业类推法\nC.国际类推法\nD.消费群体类推法\nE.更新换代类推法"}, {"question": "ABCE 【解析】本题考查对比类推法。对比类推法依据类比的目标不同可分为产品类推法、地区类推法、国际类推 法、行业类推法、更新换代类推法。 共享题干题 【题干】为了掌握市场信息，有效安排生产运营，某乳品生产企业进行了市场调查和市场预测活动。企业市 场调查人员采用非随机抽样的方法，选取部分顾客进行问卷调查。在充分说明填写要求后，调查人员请被调 查顾客自行填写调查问卷，一周后回收问卷。同时，企业还收集了内部和外部的历史资料和文献信息，对消 费者的购买行为进行分析。该企业2013--2018年乳品销售额见下表。 20.【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n=5），该企业2019年的乳品销售额预测 值是（ ）万元。", "options": [{"label": "A", "text": "2180"}, {"label": "B", "text": "2220"}, {"label": "C", "text": "2350"}, {"label": "D", "text": "2400"}], "answer": "B", "analysis": "本题考查对比类推法。对比类推法依据类比的目标不同可分为产品类推法、地区类推法、国际类推\n法、行业类推法、更新换代类推法。\n共享题干题\n【题干】为了掌握市场信息，有效安排生产运营，某乳品生产企业进行了市场调查和市场预测活动。企业市\n场调查人员采用非随机抽样的方法，选取部分顾客进行问卷调查。在充分说明填写要求后，调查人员请被调\n查顾客自行填写调查问卷，一周后回收问卷。同时，企业还收集了内部和外部的历史资料和文献信息，对消\n费者的购买行为进行分析。该企业2013--2018年乳品销售额见下表。\n20.【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n=5），该企业2019年的乳品销售额预测\n值是（ ）万元。\nA.2180\nB.2220\nC.2350\nD.2400"}, {"question": "【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n=3），则2017年预测的相对误差是（ ）。", "options": [{"label": "A", "text": "6.52％"}, {"label": "B", "text": "7.97％"}, {"label": "C", "text": "-150"}, {"label": "D", "text": "150"}], "answer": "A", "analysis": "简单移动平均法是对时间序列的数据按一定跨越期进行移动，逐个计算其算术移动平均值，取最后\n一个移动平均值为预测值的方法。简单移动平均法的预测模型\n21.【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n=3），则2017年预测的相对误差是（\n）。\nA.6.52％\nB.7.97％\nC.-150\nD.150"}, {"question": "【不定项选择题】该企业对2015年冷饮产品的市场需求量进行预测时，可选择的定性市场预测方法是（ ）。", "options": [{"label": "A", "text": "集合意见法"}, {"label": "B", "text": "趋势外推法"}, {"label": "C", "text": "德尔菲法"}, {"label": "D", "text": "主观概率法"}], "answer": "ACD", "analysis": "将数据代入简单移动平均法的预测模型，销售额预测值=(2300+1900+2250)÷3=2150（万元）。因此\n本题中，2017年预测的相对误差=（2300-2150）÷2300×100％≈6.52％。\n5\n【题干】为了掌握市场信息，有效安排生产运营，某冷饮生产安全企业进行了市场调查和市场预测活动。该\n企业市场调查同时采用两种方式，一是市场调查人员深入社区，到消费者家中进行访谈，理解消费者需求\n；二是市场调查人员在大型超市门口随机选择消费者，征得其同意后，进行访谈和问卷填写，从而了解消费\n者的口味和购买偏好，该企业冷饮产品2012年～2014年销售额如下表所示（单位：万元）\n22.【不定项选择题】该企业对2015年冷饮产品的市场需求量进行预测时，可选择的定性市场预测方法是（\n）。\nA.集合意见法\nB.趋势外推法\nC.德尔菲法\nD.主观概率法"}, {"question": "【不定项选择题】该企业2015年冷饮产品的预计销售额为6000万元，若采用季节指数法进行预测，该企业 2015年第三季度冷饮产品的销售额预测值是（ ）。", "options": [{"label": "A", "text": "2340"}, {"label": "B", "text": "2565"}, {"label": "C", "text": "2630"}, {"label": "D", "text": "2797"}], "answer": "D", "analysis": "本题考查市场预测方法。定性市场预测方法包括：专家会议法、德尔菲法、集合意见法、主观概率\n法、对比类推法。\n23.【不定项选择题】该企业2015年冷饮产品的预计销售额为6000万元，若采用季节指数法进行预测，该企业\n2015年第三季度冷饮产品的销售额预测值是（ ）。\nA.2340\nB.2565\nC.2630\nD.2797"}, {"question": "【不定项选择题】若用简单移动平均法进行预测，当选取跨越期n=3时，其第8期的绝对误差为（ ）万台 6 。", "options": [{"label": "A", "text": "207"}, {"label": "B", "text": "208"}, {"label": "C", "text": "209"}, {"label": "D", "text": "210"}, {"label": "A", "text": "1"}, {"label": "B", "text": "2"}, {"label": "C", "text": "3"}, {"label": "D", "text": "4"}], "answer": "B", "analysis": "本题考查简单移动平均法。由于n＝3，所以第9期销售量的预测值\n＝（205＋209＋207）÷3＝207（万台）。\n24.【不定项选择题】若用简单移动平均法进行预测，当选取跨越期n=3时，其第8期的绝对误差为（ ）万台\n6\n。\nA.1\nB.2\nC.3\nD.4"}, {"question": "【不定项选择题】该厂电视机前8期销售量数据属于（ ）数据。", "options": [{"label": "A", "text": "垂直型"}, {"label": "B", "text": "水平型"}, {"label": "C", "text": "直线下降型"}, {"label": "D", "text": "直线上升型"}], "answer": "B", "analysis": "本题考查简单移动平均法。当n＝3时，y8＝（213＋205＋209）÷3＝209（万台）。第8期的实际销\n售量为207万台。第8期的绝对误差为2万台。\n25.【不定项选择题】该厂电视机前8期销售量数据属于（ ）数据。\nA.垂直型\nB.水平型\nC.直线下降型\nD.直线上升型"}, {"question": "第二节 市场调查 单项选择题 1.下列说法正确的是（ ）。", "options": [{"label": "A", "text": "电话访问法不易于控制调查质量"}, {"label": "B", "text": "电话访问法不但了解问题深入而且可以使用调查的辅助工具"}, {"label": "C", "text": "邮寄调查法问卷回收率高，但是花费时间较长，影响调查资料的时效性"}, {"label": "D", "text": "留置调查法回收率高，被调查者有充分的调查时间来回答问题且不受调查人员影响"}], "answer": "D", "analysis": ""}, {"question": "关于全面市场调查的说法，错误的是（ ）。", "options": [{"label": "A", "text": "全面市场调查也称为市场普查"}, {"label": "B", "text": "全面市场调查的调查时点应统一进行规定"}, {"label": "C", "text": "全面市场调查应规定统一的调查项目和指标"}, {"label": "D", "text": "全面市场调查一般比抽样市场调查工作量小、省费用、省时间、准确性高"}], "answer": "D", "analysis": "电话访问法的优点：信息收集速度快、费用低；调查花费的时间短；收集市场调查资料覆盖面广\n；被调查者不受调查人员在场的心理压力影响，可以比较自由地回答问题；适宜访问不易接触到的被调查者\n；易于控制调查质量。电话访问法的缺点：访问的成功率相对较低；无法使用辅助工具；访问时间不能过长\n，调查的内容难以深入，调查总体欠完整；被调查者只限于能够进行电话沟通的范围；对于回答问题的真实\n性很难做出正确的判断。\n2.关于全面市场调查的说法，错误的是（ ）。\nA.全面市场调查也称为市场普查\nB.全面市场调查的调查时点应统一进行规定\nC.全面市场调查应规定统一的调查项目和指标\nD.全面市场调查一般比抽样市场调查工作量小、省费用、省时间、准确性高"}, {"question": "将调查总体各单位按某一标志排序，通过选择一个随机的起点，然后按照某种确定的距离或间隔从总体中 抽取样本单位的随机抽样方式是（ ）。", "options": [{"label": "A", "text": "等距抽样"}, {"label": "B", "text": "简单随机抽样"}, {"label": "C", "text": "整群抽样"}, {"label": "D", "text": "多阶段抽样"}], "answer": "A", "analysis": "进行全面市场调查要消耗大量的人力、物力、财力和时间。因此，全面市场调查一般调查时间长\n，费用高。\n3.将调查总体各单位按某一标志排序，通过选择一个随机的起点，然后按照某种确定的距离或间隔从总体中\n抽取样本单位的随机抽样方式是（ ）。\nA.等距抽样\nB.简单随机抽样\nC.整群抽样\nD.多阶段抽样"}, {"question": "纯粹以便利为基础的一种抽样方式是（ ）。", "options": [{"label": "A", "text": "判断抽样"}, {"label": "B", "text": "任意抽样"}, {"label": "C", "text": "配额抽样"}, {"label": "D", "text": "滚雪球抽样"}], "answer": "B", "analysis": "等距抽样是指将调查总体各单位按某一标志排序，通过选择一个随机的起点，然后按照某种确定的\n距离或间隔从总体中抽取样本单位的随机抽样方式。\n4.纯粹以便利为基础的一种抽样方式是（ ）。\nA.判断抽样\nB.任意抽样\nC.配额抽样\nD.滚雪球抽样"}, {"question": "市场调查资料收集的最基本、最常用的调查方法是（ ）。", "options": [{"label": "A", "text": "访问法"}, {"label": "B", "text": "观察法"}, {"label": "C", "text": "实验调查法"}, {"label": "D", "text": "文案调查法"}], "answer": "A", "analysis": "本题考查任意抽样的相关内容。任意抽样是纯粹以便利为基础的一种抽样方式。\n5.市场调查资料收集的最基本、最常用的调查方法是（ ）。\nA.访问法\nB.观察法\nC.实验调查法\nD.文案调查法\n1"}, {"question": "有关焦点小组访谈法的优点说法错误的是（ ）。", "options": [{"label": "A", "text": "资料的后期整理和分析难度小"}, {"label": "B", "text": "资料收集快、效率高"}, {"label": "C", "text": "能将调查与讨论相结合"}, {"label": "D", "text": "结构灵活"}], "answer": "A", "analysis": "本题考查访问法的相关内容。访问法是市场调查资料收集的最基本、最常用的调查方法。\n6.有关焦点小组访谈法的优点说法错误的是（ ）。\nA.资料的后期整理和分析难度小\nB.资料收集快、效率高\nC.能将调查与讨论相结合\nD.结构灵活"}, {"question": "某企业为了解当地50000个家庭的食品支出情况，采用抽样市场调查的形式抽取500个家庭进行调查。抽取 的这500个家庭称为（ ）。", "options": [{"label": "A", "text": "总体"}, {"label": "B", "text": "抽样总体"}, {"label": "C", "text": "抽样框"}, {"label": "D", "text": "总体单位"}], "answer": "B", "analysis": "本题考查焦点小组访谈法的优点。焦点小组访谈法的优点：资料收集快、效率高；取得的资料较为\n广泛和深入；能将调查与讨论相结合，能探讨出现问题的原因和解决问题的途径；结构灵活，在覆盖主题及\n其深度方面都比较灵活。\n7.某企业为了解当地50000个家庭的食品支出情况，采用抽样市场调查的形式抽取500个家庭进行调查。抽取\n的这500个家庭称为（ ）。\nA.总体\nB.抽样总体\nC.抽样框\nD.总体单位"}, {"question": "某糖果企业为了调查糖果更换包装的效果，选取A超市为实验组，B超市为控制组，进行控制组实验组对比 实验，实验时间为1个月，实验前后的月销售量数据见下表： 该实验的实验变数效果为（ ）箱。", "options": [{"label": "A", "text": "200"}, {"label": "B", "text": "400"}, {"label": "C", "text": "500"}, {"label": "D", "text": "700"}], "answer": "C", "analysis": "全及总体简称总体或母体，是指所要调查单位的全体。由于总体是抽样调查推断的对象或目标，因\n此又称其为目标总体。构成总体的每一个单位或个体称为总体单位，总体单位的数量称为总体单位数。抽样\n总体简称样本，是从总体中抽取的一部分单位（个体）的集合。\n8.某糖果企业为了调查糖果更换包装的效果，选取A超市为实验组，B超市为控制组，进行控制组实验组对比\n实验，实验时间为1个月，实验前后的月销售量数据见下表：\n该实验的实验变数效果为（ ）箱。\nA.200\nB.400\nC.500\nD.700"}, {"question": "反映抽样误差的重要指标是（ ）。", "options": [{"label": "A", "text": "抽样标准差"}, {"label": "B", "text": "总体标准差"}, {"label": "C", "text": "抽样平均误差"}, {"label": "D", "text": "抽样方差"}], "answer": "C", "analysis": "根据公式：实验变数效果=实验组变动结果-控制组变动结果=（1700-1000）-（1200-\n1000）=500（箱）。\n9.反映抽样误差的重要指标是（ ）。\nA.抽样标准差\nB.总体标准差\nC.抽样平均误差\nD.抽样方差\n2"}, {"question": "为了搜集全面、精确的资料，对调查对象（总体）的全部样本所进行的逐一的、无遗漏的专门调查称为 （ ）。", "options": [{"label": "A", "text": "全面市场调查"}, {"label": "B", "text": "抽样市场调查"}, {"label": "C", "text": "随机市场调查"}, {"label": "D", "text": "整体市场调查"}], "answer": "A", "analysis": "本题考查抽样误差。抽样平均误差是反映抽样误差的重要指标。\n10.为了搜集全面、精确的资料，对调查对象（总体）的全部样本所进行的逐一的、无遗漏的专门调查称为\n（ ）。\nA.全面市场调查\nB.抽样市场调查\nC.随机市场调查\nD.整体市场调查"}, {"question": "（ ）最突出的特点在于它的实践性，也是它的本质特点。", "options": [{"label": "A", "text": "观察法"}, {"label": "B", "text": "访问法"}, {"label": "C", "text": "实验调查法"}, {"label": "D", "text": "文案调查法"}], "answer": "C", "analysis": "本题考查全面市场调查的概念。全面市场调查也称为市场普查，是指为了搜集全面、精确的资料\n，对调查对象（总体）的全部样本所进行的逐一的、无遗漏的专门调查。\n11.（ ）最突出的特点在于它的实践性，也是它的本质特点。\nA.观察法\nB.访问法\nC.实验调查法\nD.文案调查法"}, {"question": "下列各项中，关于文案调查法的内容表述错误的是（ ）。", "options": [{"label": "A", "text": "文案调查法又称为资料分析法"}, {"label": "B", "text": "文案调查是对原始资料的收集"}, {"label": "C", "text": "文案调查以收集文献性信息为主"}, {"label": "D", "text": "文案调查收集的资料包括动态和静态两个方面"}], "answer": "B", "analysis": "本题考查实验调查法的含义。实验调查法最突出的特点在于它的实践性，也是实验调查法的本质特\n点。\n12.下列各项中，关于文案调查法的内容表述错误的是（ ）。\nA.文案调查法又称为资料分析法\nB.文案调查是对原始资料的收集\nC.文案调查以收集文献性信息为主\nD.文案调查收集的资料包括动态和静态两个方面"}, {"question": "下列关于全面市场调查的说法，错误的是（ ）。", "options": [{"label": "A", "text": "全面市场调查也称市场普查"}, {"label": "B", "text": "全面市场调查的调查时点应根据各地调查情况进行差异化选择"}, {"label": "C", "text": "全面市场调查应规定统一的调查项目和指标"}, {"label": "D", "text": "全面市场调查一般调查时间长、费用高"}], "answer": "B", "analysis": "本题考查文案调查法的相关内容。选项B错误，文案调查是收集已经加工过的次级资料，而不是对原\n始资料的收集。\n13.下列关于全面市场调查的说法，错误的是（ ）。\nA.全面市场调查也称市场普查\nB.全面市场调查的调查时点应根据各地调查情况进行差异化选择\nC.全面市场调查应规定统一的调查项目和指标\nD.全面市场调查一般调查时间长、费用高"}, {"question": "服装生产企业的市场调查人员装扮成普通消费者进入商场，调查本企业服装的销售环境、销售服务质量和 消费者的购买行为。这种市场调查方法属于（ ）。", "options": [{"label": "A", "text": "跟踪观察法"}, {"label": "B", "text": "参与观察法"}, {"label": "C", "text": "痕迹观察法"}, {"label": "D", "text": "遥感观察法"}], "answer": "B", "analysis": "全面市场调查应规定统一的市场调查资料所属的标准时点（调查时点）以避免因为自然变动或者机\n械变动而产生调查资料的重复和遗漏。使全面市场调查获得的资料具有一致性和可比性。\n14.服装生产企业的市场调查人员装扮成普通消费者进入商场，调查本企业服装的销售环境、销售服务质量和\n消费者的购买行为。这种市场调查方法属于（ ）。\nA.跟踪观察法\nB.参与观察法\nC.痕迹观察法\nD.遥感观察法\n3"}, {"question": "下列关于入户访问法优缺点的说法，错误的是（ ）。", "options": [{"label": "A", "text": "访问的灵活性强"}, {"label": "B", "text": "受调查员主观影响大，准确率低"}, {"label": "C", "text": "对调查员的要求高"}, {"label": "D", "text": "调查质量容易受多种因素影响"}], "answer": "B", "analysis": "参与观察法也称亲身经历法，是指调查人员亲自参与某种活动来收集相关信息资料的方法。主要方\n式为伪装购物法或神秘购物法，即让接受过专门训练的“神秘顾客”作为普通消费者进入特定的调查环境\n（如商场、超市）进行直接观察。\n15.下列关于入户访问法优缺点的说法，错误的是（ ）。\nA.访问的灵活性强\nB.受调查员主观影响大，准确率低\nC.对调查员的要求高\nD.调查质量容易受多种因素影响"}, {"question": "（ ）结构松散，无严密的观察计划，不必制定观察提纲，观察的实施比较灵活，可以发挥主动性、创造 性，但是获取的资料不够系统完整。多用于探索性研究，用于对观察对象不甚了解的情况。", "options": [{"label": "A", "text": "非结构型观察法"}, {"label": "B", "text": "结构型观察法"}, {"label": "C", "text": "非参与观察法"}, {"label": "D", "text": "参与观察法"}], "answer": "A", "analysis": "入户访问法的优点包括：①直接性强；②灵活性强；③准确性强；④调查有深度。缺点包括：①费\n用高，时间长；②对调查人员的要求高；③调查质量容易受多种因素的影响。\n16.（ ）结构松散，无严密的观察计划，不必制定观察提纲，观察的实施比较灵活，可以发挥主动性、创造\n性，但是获取的资料不够系统完整。多用于探索性研究，用于对观察对象不甚了解的情况。\nA.非结构型观察法\nB.结构型观察法\nC.非参与观察法\nD.参与观察法"}, {"question": "拦截访问法的缺点有（ ）。", "options": [{"label": "A", "text": "访问地点比较分散、时间长、费用高"}, {"label": "B", "text": "不适合内容较复杂、不能公开的问题的调查"}, {"label": "C", "text": "调查对象的身份难以判别，且在调查地点出现具有偶然性"}, {"label": "D", "text": "拒访率高"}], "answer": "BCD", "analysis": "非结构型观察法结构松散，观察前没有严格的观察计划，不必制定观察提纲，观察的实施比较灵活\n，多用于探索性研究，用于对观察对象不太了解的情况下进行市场调查。\n多项选择题\n17.拦截访问法的缺点有（ ）。\nA.访问地点比较分散、时间长、费用高\nB.不适合内容较复杂、不能公开的问题的调查\nC.调查对象的身份难以判别，且在调查地点出现具有偶然性\nD.拒访率高\nE.很难对访问员进行监控"}, {"question": "误差控制途径主要有（ ）。", "options": [{"label": "A", "text": "提高样本的代表性"}, {"label": "B", "text": "注重样本量的控制"}, {"label": "C", "text": "提高抽样设计的有效性"}, {"label": "D", "text": "注重调查误差的事前控制"}], "answer": "ABCE", "analysis": "拦截访问法的优点：访问地点比较集中，时间短，可节省访问费和交通费；对拒访者可以放弃，重\n新拦截新的受访者，确保样本量不变。拦截访问法的缺点：只能进行简单的、大众的问题调查，不适合内容\n复杂、不能公开的问题的调查；被调查对象的身份难以判别，在调查地点出现具有偶然性，可能影响样本的\n代表性和调查资料的质量；拒访率高。所以选BCD\n18.误差控制途径主要有（ ）。\nA.提高样本的代表性\nB.注重样本量的控制\nC.提高抽样设计的有效性\nD.注重调查误差的事前控制\nE.精心设计问卷，对被调查者进行有效指导"}, {"question": "ABCE 【解析】本题考查非抽样误差。市场调查人员不仅要意识到随机抽样误差和非抽样误差的存在，更应采取事 前控制、事中控制和事后控制的手段尽可能将误差控制在一定范围内。主要控制途径有：①提高样本的代表 4 性；②注重样本量的控制；③提高抽样设计的有效性；④重视抽样方案的审核；⑤严格训练调查人员，避免 调查人员的主观错误；⑥精心设计问卷，对被调查者进行有效指导；⑦加强对调查工作各个阶段工作的管理 ；⑧注重调查误差的事后控制。 19.抽样框的基本形式主要包括（ ）。", "options": [{"label": "A", "text": "具体的抽样框"}, {"label": "B", "text": "总体的抽样框"}, {"label": "C", "text": "抽象的抽样框"}, {"label": "D", "text": "整群的抽样框"}], "answer": "ACE", "analysis": "本题考查非抽样误差。市场调查人员不仅要意识到随机抽样误差和非抽样误差的存在，更应采取事\n前控制、事中控制和事后控制的手段尽可能将误差控制在一定范围内。主要控制途径有：①提高样本的代表\n4\n性；②注重样本量的控制；③提高抽样设计的有效性；④重视抽样方案的审核；⑤严格训练调查人员，避免\n调查人员的主观错误；⑥精心设计问卷，对被调查者进行有效指导；⑦加强对调查工作各个阶段工作的管理\n；⑧注重调查误差的事后控制。\n19.抽样框的基本形式主要包括（ ）。\nA.具体的抽样框\nB.总体的抽样框\nC.抽象的抽样框\nD.整群的抽样框\nE.阶段式的抽样框"}, {"question": "ACE 【解析】本题考查抽样框的基本形式。抽样框有三种基本形式：具体的抽样框、抽象的抽样框、阶段式的抽 样框。 20.关于邮寄调查法和留置调查法，下列说法错误的有（ ）。", "options": [{"label": "A", "text": "邮寄调查法的被调查者回答问题时间不充分"}, {"label": "B", "text": "邮寄调查法问卷回收率低"}, {"label": "C", "text": "留置调查法回收率低"}, {"label": "D", "text": "留置调查易受调查人员倾向性意见的影响"}], "answer": "ACDE", "analysis": "本题考查抽样框的基本形式。抽样框有三种基本形式：具体的抽样框、抽象的抽样框、阶段式的抽\n样框。\n20.关于邮寄调查法和留置调查法，下列说法错误的有（ ）。\nA.邮寄调查法的被调查者回答问题时间不充分\nB.邮寄调查法问卷回收率低\nC.留置调查法回收率低\nD.留置调查易受调查人员倾向性意见的影响\nE.邮寄调查法调查费用高"}, {"question": "ACDE 【解析】留置调查法的优点：问卷回收率高；被调查者有充分的时间来回答问题且不受调查人员影响。 21.下列市场调查方法中，属于访问法的有（ ）。", "options": [{"label": "A", "text": "文案调查法"}, {"label": "B", "text": "邮寄调查法"}, {"label": "C", "text": "非参与观察法"}, {"label": "D", "text": "留置调查法"}], "answer": "BD", "analysis": "留置调查法的优点：问卷回收率高；被调查者有充分的时间来回答问题且不受调查人员影响。\n21.下列市场调查方法中，属于访问法的有（ ）。\nA.文案调查法\nB.邮寄调查法\nC.非参与观察法\nD.留置调查法\nE.实验调查法"}, {"question": "文案调查法的优点包括（ ）。", "options": [{"label": "A", "text": "收集资料多"}, {"label": "B", "text": "收集过程方便、容易、迅速"}, {"label": "C", "text": "时间短、费用低"}, {"label": "D", "text": "收集的资料具有很强的时效性"}], "answer": "ABCE", "analysis": "本题考查访问法。访问法有如下几种类型：（1）面谈访问法，包括入户访问法、拦截访问法、计算\n机辅助面访调查；（2）电话访问法，包括传统电话访问和计算机辅助电话访问；（3）邮寄调查法；（4）留\n置调查法。\n22.文案调查法的优点包括（ ）。\nA.收集资料多\nB.收集过程方便、容易、迅速\nC.时间短、费用低\nD.收集的资料具有很强的时效性\nE.不受时空限制，可用于经常性的调查"}, {"question": "ABCE 【解析】本题考查文案调查法的优点。文案调查法的优点：收集资料多；收集过程方便、容易、迅速；时间 短、费用低；不受时空限制，可用于经常性的调查。 23.下列抽样方法中，属于随机抽样的方法有（ ）。 5", "options": [{"label": "A", "text": "任意抽样"}, {"label": "B", "text": "整群抽样"}, {"label": "C", "text": "等距抽样"}, {"label": "D", "text": "分层抽样"}], "answer": "BCD", "analysis": "本题考查文案调查法的优点。文案调查法的优点：收集资料多；收集过程方便、容易、迅速；时间\n短、费用低；不受时空限制，可用于经常性的调查。\n23.下列抽样方法中，属于随机抽样的方法有（ ）。\nA.任意抽样\n5\nB.整群抽样\nC.等距抽样\nD.分层抽样\nE.判断抽样"}, {"question": "在市场调查的方法中，观察法的特点有（ ）。", "options": [{"label": "A", "text": "调查范围广"}, {"label": "B", "text": "调查费用低"}, {"label": "C", "text": "直观可靠"}, {"label": "D", "text": "对调查者的素质要求高"}], "answer": "CD", "analysis": "随机抽样就是在抽样过程中按随机性原则抽取样本，总体的每个单位都有同等被抽中的可能，即样\n本的抽取完全排除了人为主观因素的影响，使每一个单位都有同等的可能性被抽到。以概率论与数理统计为\n基础的随机抽样，既可保证调查总体内每个单位被抽取的机会均等，排除了人为抽样的主观随意性，使抽取\n样本更具客观代表性；又可使抽查结果比较准确、可信，抽查误差可以计算、检验、修正与调控。随机抽样\n方法多种多样，其中最主要的有简单随机抽样、等距抽样、分层抽样、整群抽样等。\n24.在市场调查的方法中，观察法的特点有（ ）。\nA.调查范围广\nB.调查费用低\nC.直观可靠\nD.对调查者的素质要求高\nE.占用被调查者的时间较多"}, {"question": "【不定项选择题】该企业可以选择的非随机抽样方法是（ ）。", "options": [{"label": "A", "text": "任意抽样"}, {"label": "B", "text": "判断抽样"}, {"label": "C", "text": "等距抽样"}, {"label": "D", "text": "分层抽样"}], "answer": "AB", "analysis": "观察法的优点包括：①直观可靠；②真实性较高；③不受语言交流的影响；④独立取舍，不受调查\n对象的影响。观察法的缺点包括：①难以观察到被调查者的心理动机等内在因素；②受时间和空间限制\n；③调查费用高；④对调查人员素质要求高，观察员素质不同，观察的结果也不同。\n共享题干题\n【题干】为了掌握市场信息，有效安排生产运营，某乳品生产企业进行了市场调查和市场预测活动。企业市\n场调查人员采用非随机抽样的方法，选取部分顾客进行问卷调查。在充分说明填写要求后，调查人员请被调\n查顾客自行填写调查问卷，一周后回收问卷。同时，企业还收集了内部和外部的历史资料和文献信息，对消\n费者的购买行为进行分析。该企业2013--2018年乳品销售额见下表。\n25.【不定项选择题】该企业可以选择的非随机抽样方法是（ ）。\nA.任意抽样\nB.判断抽样\nC.等距抽样\nD.分层抽样"}, {"question": "【不定项选择题】该企业采用的市场调查方法是（ ）。", "options": [{"label": "A", "text": "留置调查法"}, {"label": "B", "text": "文案调查法"}, {"label": "C", "text": "观察法"}, {"label": "D", "text": "拦截访问法"}], "answer": "AB", "analysis": "非随机抽样又称为非概率抽样，是指调查人员根据自己的方便或主观判断抽取样本的方法。常见的\n非随机抽样的方法有以下几种：①任意抽样。②判断抽样。③配额抽样。④滚雪球抽样。\n26.【不定项选择题】该企业采用的市场调查方法是（ ）。\nA.留置调查法\nB.文案调查法\nC.观察法\n6\nD.拦截访问法"}, {"question": "【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n=5），该企业2019年的乳品销售额预测 值是（ ）万元。", "options": [{"label": "A", "text": "2180"}, {"label": "B", "text": "2220"}, {"label": "C", "text": "2350"}, {"label": "D", "text": "2400"}], "answer": "B", "analysis": "留置调查法是指将事先设计好的调查问卷当面交给被调查者，说明填写要求并留下调查问卷，请被\n调查者自行填写，再由调查人员定期回收的一种获取市场信息资料的调查方法。文案调查法又称为资料分析\n法，是利用企业内部和外部现有的各种信息、资料和情报，对调查内容进行分析研究的一种市场调查方法。\n27.【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n=5），该企业2019年的乳品销售额预测\n值是（ ）万元。\nA.2180\nB.2220\nC.2350\nD.2400"}, {"question": "【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n=3），则2017年预测的相对误差是（ ）。", "options": [{"label": "A", "text": "6.52％"}, {"label": "B", "text": "7.97％"}, {"label": "C", "text": "-150"}, {"label": "D", "text": "150"}], "answer": "A", "analysis": "简单移动平均法是对时间序列的数据按一定跨越期进行移动，逐个计算其算术移动平均值，取最后\n一个移动平均值为预测值的方法。简单移动平均法的预测模型\n28.【不定项选择题】若采用简单移动平均法预测（选择移动跨越期n=3），则2017年预测的相对误差是（\n）。\nA.6.52％\nB.7.97％\nC.-150\nD.150"}, {"question": "【不定项选择题】该企业采用的市场调查方法是（ ）。", "options": [{"label": "A", "text": "入户访问法"}, {"label": "B", "text": "拦截访问法"}, {"label": "C", "text": "留置调查法"}, {"label": "D", "text": "文案调查法"}], "answer": "AB", "analysis": "将数据代入简单移动平均法的预测模型，销售额预测值=(2300+1900+2250)÷3=2150（万元）。因此\n本题中，2017年预测的相对误差=（2300-2150）÷2300×100％≈6.52％。\n【题干】为了掌握市场信息，有效安排生产运营，某冷饮生产安全企业进行了市场调查和市场预测活动。该\n企业市场调查同时采用两种方式，一是市场调查人员深入社区，到消费者家中进行访谈，理解消费者需求\n；二是市场调查人员在大型超市门口随机选择消费者，征得其同意后，进行访谈和问卷填写，从而了解消费\n者的口味和购买偏好，该企业冷饮产品2012年～2014年销售额如下表所示（单位：万元）\n29.【不定项选择题】该企业采用的市场调查方法是（ ）。\nA.入户访问法\n7\nB.拦截访问法\nC.留置调查法\nD.文案调查法"}, {"question": "【不定项选择题】该企业对2015年冷饮产品的市场需求量进行预测时，可选择的定性市场预测方法是（ ）。", "options": [{"label": "A", "text": "集合意见法"}, {"label": "B", "text": "趋势外推法"}, {"label": "C", "text": "德尔菲法"}, {"label": "D", "text": "主观概率法"}], "answer": "ACD", "analysis": "本题考查市场调查方法。到消费者家中进行访谈属于入户访问法；市场调查人员在大型超市门口随\n机选择消费者进行访谈和问卷属于拦截访问法。\n30.【不定项选择题】该企业对2015年冷饮产品的市场需求量进行预测时，可选择的定性市场预测方法是（\n）。\nA.集合意见法\nB.趋势外推法\nC.德尔菲法\nD.主观概率法"}, {"question": "【不定项选择题】该企业2015年冷饮产品的预计销售额为6000万元，若采用季节指数法进行预测，该企业 2015年第三季度冷饮产品的销售额预测值是（ ）。", "options": [{"label": "A", "text": "2340"}, {"label": "B", "text": "2565"}, {"label": "C", "text": "2630"}, {"label": "D", "text": "2797"}], "answer": "D", "analysis": "本题考查市场预测方法。定性市场预测方法包括：专家会议法、德尔菲法、集合意见法、主观概率\n法、对比类推法。\n31.【不定项选择题】该企业2015年冷饮产品的预计销售额为6000万元，若采用季节指数法进行预测，该企业\n2015年第三季度冷饮产品的销售额预测值是（ ）。\nA.2340\nB.2565\nC.2630\nD.2797"}, {"question": "【不定项选择题】若该企业2014年冷饮产品销售额的预测值为5000万元，则2014年预测的相对误差是（ ）。", "options": [{"label": "A", "text": "－7.70%"},
