对象模型数据库"}], "answer": "B", "analysis": "EAS系统是一种设置在需要控制物品出入的门口的RFID技术。这种技术的典型应用场合是商店、图书\n馆、数据中心等地方，当未被授权的人从这些地方非法取走物品时，EAS系统就会发出警告。\n2.目前，应用最多的数据库是（ ），这类数据库管理系统产品占据了市场和应用的主导地位。\nA.层次模型数据库\nB.关系模型数据库\nC.网状模型数据库\nD.面向对象模型数据库"}, {"question": "数据的动态特性主要包括对数据的操作和（ ）。", "options": [{"label": "A", "text": "操作规则"}, {"label": "B", "text": "数据结构"}, {"label": "C", "text": "数据关系"}, {"label": "D", "text": "数据约束"}], "answer": "A", "analysis": "目前，应用最多的数据库是关系模型数据库，这类数据库管理系统产品占据了市场和应用的主导地\n位。\n3.数据的动态特性主要包括对数据的操作和（ ）。\nA.操作规则\nB.数据结构\nC.数据关系\nD.数据约束"}, {"question": "全球定位系统的特点包括（ ）。", "options": [{"label": "A", "text": "全球全天候定位"}, {"label": "B", "text": "定位精度高"}, {"label": "C", "text": "观测时间短"}, {"label": "D", "text": "仪器操作简便"}], "answer": "ABCD", "analysis": "数据的动态特性主要包括对数据的操作和操作规则。\n多项选择题\n4.全球定位系统的特点包括（ ）。\nA.全球全天候定位\nB.定位精度高\nC.观测时间短\nD.仪器操作简便\nE.观测时间长"}, {"question": "数据库系统由（ ）构成。", "options": [{"label": "A", "text": "数据库"}, {"label": "B", "text": "数据库管理系统"}, {"label": "C", "text": "应用软件系统"}, {"label": "D", "text": "数据库管理员"}], "answer": "ABCDE", "analysis": "全球定位系统的特点包括全球全天候定位、定位精度高、观测时间短、仪器操作简便。\n5.数据库系统由（ ）构成。\nA.数据库\nB.数据库管理系统\nC.应用软件系统\nD.数据库管理员\nE.用户"}, {"question": "ABCDE 【解析】数据库系统由数据库、数据库管理系统、应用软件系统、数据库管理员和用户构成。 6.数据的静态特性包括（ ）。", "options": [{"label": "A", "text": "对数据的操作"}, {"label": "B", "text": "数据结构"}, {"label": "C", "text": "数据关系"}, {"label": "D", "text": "数据约束"}], "answer": "BCD", "analysis": "数据库系统由数据库、数据库管理系统、应用软件系统、数据库管理员和用户构成。\n6.数据的静态特性包括（ ）。\nA.对数据的操作\nB.数据结构\nC.数据关系\nD.数据约束\nE.操作规则"}], "第五节 企业组织设计": [{"question": "第一节 企业组织设计 单项选择题 1.为了实现“事事有人负责”和“事事有条件负责”，企业的组织设计需要遵循的原则是（ ）。", "options": [{"label": "A", "text": "统一指挥原则"}, {"label": "B", "text": "权责对等原则"}, {"label": "C", "text": "分工与协作原则"}, {"label": "D", "text": "精简原则"}], "answer": "B", "analysis": ""}, {"question": "现代企业部门划分方法中，（ ）是指把同一产品的生产或销售等工作集中在同一部门中进行。", "options": [{"label": "A", "text": "产品部门化"}, {"label": "B", "text": "职能部门化"}, {"label": "C", "text": "服务对象部门化"}, {"label": "D", "text": "区域部门化"}], "answer": "A", "analysis": "企业组织设计的根本目的是保证企业目标的实现。其中，权责对等原则，企业中每一个职务和部门\n都有必须完成的任务，而要顺利完成这些任务就需要利用一定的人力、财力、物力等资源，这是企业人员责\n任与权力的统一，是企业“事事有人负责”和“事事有条件负责”的基本前提。\n2.现代企业部门划分方法中，（ ）是指把同一产品的生产或销售等工作集中在同一部门中进行。\nA.产品部门化\nB.职能部门化\nC.服务对象部门化\nD.区域部门化"}, {"question": "在组织中，管理层次与管理幅度的关系表现为（ ）。", "options": [{"label": "A", "text": "正比例关系"}, {"label": "B", "text": "反比例关系"}, {"label": "C", "text": "对等关系"}, {"label": "D", "text": "对立关系"}], "answer": "B", "analysis": "产品部门化是指在主要产品形成足够大的数量，或者不同产品的用户或潜在用户足够多的情况下\n，可以根据产品来设立管理部门，划分管理单位，即把同一产品的生产或销售等工作集中在同一部门中进行\n。\n3.在组织中，管理层次与管理幅度的关系表现为（ ）。\nA.正比例关系\nB.反比例关系\nC.对等关系\nD.对立关系"}, {"question": "在企业管理体系中，直线关系实际上是（ ）。", "options": [{"label": "A", "text": "托管关系"}, {"label": "B", "text": "协助关系"}, {"label": "C", "text": "命令关系"}, {"label": "D", "text": "平等关系"}], "answer": "C", "analysis": "对于一个特定的组织，其管理幅度越大，则需要设置的管理层次越少；而管理幅度越小，则所需设\n置的管理层次越多，两者成反比关系。\n4.在企业管理体系中，直线关系实际上是（ ）。\nA.托管关系\nB.协助关系\nC.命令关系\nD.平等关系"}, {"question": "授权是一个过程，这一过程发生在（ ）。", "options": [{"label": "A", "text": "平级之间"}, {"label": "B", "text": "上下级之间"}, {"label": "C", "text": "直线与参谋之间"}, {"label": "D", "text": "直线与代理之间"}], "answer": "B", "analysis": "直线关系是上级指挥下级的关系，其实质上是一种命令关系。\n5.授权是一个过程，这一过程发生在（ ）。\nA.平级之间\nB.上下级之间\nC.直线与参谋之间\nD.直线与代理之间"}, {"question": "一个主管能够直接有效地指挥和监督下属的数量称为（ ）。", "options": [{"label": "A", "text": "管理幅度"}, {"label": "B", "text": "管理层次"}, {"label": "C", "text": "管理部门"}, {"label": "D", "text": "管理规模"}], "answer": "A", "analysis": "授权是指上级委托给下级一定的权力，使下级在一定的监督之下，具有相当的决策权和行动权。\n1\n6.一个主管能够直接有效地指挥和监督下属的数量称为（ ）。\nA.管理幅度\nB.管理层次\nC.管理部门\nD.管理规模"}, {"question": "（ ）直接反映着一个组织集权或分权的状况。", "options": [{"label": "A", "text": "拥有决策权的程度"}, {"label": "B", "text": "决策的幅度"}, {"label": "C", "text": "决策的重要性"}, {"label": "D", "text": "对决策的控制程度"}], "answer": "A", "analysis": "本题考查管理幅度的概念。管理幅度是指一个主管能够直接有效地指挥和监督下属的数量。\n7.（ ）直接反映着一个组织集权或分权的状况。\nA.拥有决策权的程度\nB.决策的幅度\nC.决策的重要性\nD.对决策的控制程度"}, {"question": "关于影响集权与分权程度的主要因素，下列说法正确的是（ ）。 地实施集权", "options": [{"label": "A", "text": "组织的规模大，决策的数目多，在管理过程中协调、沟通和控制相对不易，对此宜集权"}, {"label": "B", "text": "主管人员数量充足、经验丰富、训练有素、管理能力较强，则可以较多地集权"}, {"label": "C", "text": "如果组织拥有比较完善的控制技术及手段，能够及时地发现并纠正下属决策中的问题和错误，则可以较多"}, {"label": "D", "text": "环境越不稳定，各层主管人员的管理幅度越受到限制，在这种情况下，组织决策的权力应当相对集中一些"}], "answer": "D", "analysis": "本题考查集权与分权的相关内容。拥有决策权的程度直接反映着一个组织集权或分权的状况。\n8.关于影响集权与分权程度的主要因素，下列说法正确的是（ ）。\nA.组织的规模大，决策的数目多，在管理过程中协调、沟通和控制相对不易，对此宜集权\nB.主管人员数量充足、经验丰富、训练有素、管理能力较强，则可以较多地集权\nC.如果组织拥有比较完善的控制技术及手段，能够及时地发现并纠正下属决策中的问题和错误，则可以较多\n地实施集权\nD.环境越不稳定，各层主管人员的管理幅度越受到限制，在这种情况下，组织决策的权力应当相对集中一些"}, {"question": "按照分工和专业化发展的顺序，第一种专业化形态是（ ）。", "options": [{"label": "A", "text": "产品专业化"}, {"label": "B", "text": "零部件专业化"}, {"label": "C", "text": "工艺专业化"}, {"label": "D", "text": "部门专业化"}], "answer": "D", "analysis": "本题考查集权与分权的相关内容。选项A错误，组织的规模大，决策的数目多，在管理过程中协调、\n沟通和控制相对不易，对此宜分权；选项B错误，主管人员数量充足、经验丰富、训练有素、管理能力较强\n，则可以较多地分权；选项C错误，如果组织拥有比较完善的控制技术及手段，能够及时地发现并纠正下属决\n策中的问题和错误，则可以较多地实施分权。\n9.按照分工和专业化发展的顺序，第一种专业化形态是（ ）。\nA.产品专业化\nB.零部件专业化\nC.工艺专业化\nD.部门专业化"}, {"question": "企业组织设计的主要依据不包括（ ）。", "options": [{"label": "A", "text": "企业战略"}, {"label": "B", "text": "企业环境"}, {"label": "C", "text": "企业技术"}, {"label": "D", "text": "企业文化"}], "answer": "D", "analysis": "本题考查分工、专业化与协作。按照分工与专业化发展的顺序，专业化形态的第一种是部门专业化\n。\n10.企业组织设计的主要依据不包括（ ）。\nA.企业战略\nB.企业环境\nC.企业技术\nD.企业文化"}, {"question": "企业环境主要指企业的（ ）。", "options": [{"label": "A", "text": "外部环境"}, {"label": "B", "text": "内部环境"}, {"label": "C", "text": "市场环境"}, {"label": "D", "text": "经济环境"}], "answer": "A", "analysis": "本题考查企业组织设计的主要依据。企业组织设计的主要依据有企业战略、企业环境、企业技术、\n企业发展阶段。\n2\n11.企业环境主要指企业的（ ）。\nA.外部环境\nB.内部环境\nC.市场环境\nD.经济环境"}, {"question": "大多数企业普遍采用的现代企业部门划分方法是（ ）。", "options": [{"label": "A", "text": "职能部门化"}, {"label": "B", "text": "产品部门化"}, {"label": "C", "text": "区域部门化"}, {"label": "D", "text": "市场部门化"}], "answer": "A", "analysis": "本题考查企业组织设计的主要依据。企业环境主要指企业的外部环境。\n12.大多数企业普遍采用的现代企业部门划分方法是（ ）。\nA.职能部门化\nB.产品部门化\nC.区域部门化\nD.市场部门化"}, {"question": "由于主管弥补专业知识的需要而产生的服务和协助的关系是（ ）。", "options": [{"label": "A", "text": "分工关系"}, {"label": "B", "text": "指导关系"}, {"label": "C", "text": "参谋关系"}, {"label": "D", "text": "直线关系"}], "answer": "C", "analysis": "本题考查部门划分的主要方法。按工作职能划分部门是大多数企业普遍采用的一种部门划分方法。\n13.由于主管弥补专业知识的需要而产生的服务和协助的关系是（ ）。\nA.分工关系\nB.指导关系\nC.参谋关系\nD.直线关系"}, {"question": "参谋关系是为了弥补直线主管专业知识的需要而产生的（ ）的关系。", "options": [{"label": "A", "text": "指挥和协调"}, {"label": "B", "text": "命令与决策"}, {"label": "C", "text": "辅助和建议"}, {"label": "D", "text": "服务和协助"}], "answer": "D", "analysis": "本题考查参谋关系的含义。由于主管人员弥补专业知识的需要而产生的服务和协助的关系是参谋关\n系。\n14.参谋关系是为了弥补直线主管专业知识的需要而产生的（ ）的关系。\nA.指挥和协调\nB.命令与决策\nC.辅助和建议\nD.服务和协助"}, {"question": "现代企业部门划分方法中，（ ）是指按照地理范围来划分管理部门。", "options": [{"label": "A", "text": "产品部门化"}, {"label": "B", "text": "职能部门化"}, {"label": "C", "text": "服务对象部门化"}, {"label": "D", "text": "区域部门化"}], "answer": "D", "analysis": "本题考查参谋关系的含义。由于主管人员弥补专业知识的需要而产生的服务和协助的关系是参谋关\n系。\n15.现代企业部门划分方法中，（ ）是指按照地理范围来划分管理部门。\nA.产品部门化\nB.职能部门化\nC.服务对象部门化\nD.区域部门化"}, {"question": "企业中每一个职务和部门都有必须完成的任务，而要顺利完成这些任务就需要利用一定的人力、财力、物 3 力等资源。这反映了企业组织设计的（ ）原则。", "options": [{"label": "A", "text": "统一指挥"}, {"label": "B", "text": "权责对等"}, {"label": "C", "text": "分工与协作"}, {"label": "D", "text": "精简"}], "answer": "B", "analysis": "现代企业部门的划分方法主要有三种，即职能部门化、产品部门化和区域部门化。①职能部门化遵\n循了专业化的原则，以企业工作或任务的性质作为部门划分的基础。②产品部门化是指把生产工艺不同和用\n户特点不同的产品都集中在同一生产或销售部门管理。③区域部门化是指按照地理范围来划分管理部门。\n16.企业中每一个职务和部门都有必须完成的任务，而要顺利完成这些任务就需要利用一定的人力、财力、物\n3\n力等资源。这反映了企业组织设计的（ ）原则。\nA.统一指挥\nB.权责对等\nC.分工与协作\nD.精简"}, {"question": "分工与专业化是同一事物的两个方面，分工是生产过程的（ ），而专业化是生产“片断”的（ ）。", "options": [{"label": "A", "text": "相对分散，相对集中"}, {"label": "B", "text": "相对集中，相对分散"}, {"label": "C", "text": "专项工作，劳动分工"}, {"label": "D", "text": "劳动分工，专项工作"}], "answer": "A", "analysis": "权责对等原则体现了企业人员责任与权力的统一，是企业“事事有人负责”和“事事有条件负责\n”的基本前提。\n17.分工与专业化是同一事物的两个方面，分工是生产过程的（ ），而专业化是生产“片断”的（ ）。\nA.相对分散，相对集中\nB.相对集中，相对分散\nC.专项工作，劳动分工\nD.劳动分工，专项工作"}, {"question": "上级委托给下级一定的权力，使下级在一定的监督之下具有相当的决策权和行动权。这种领导行为是（ ）。", "options": [{"label": "A", "text": "任命"}, {"label": "B", "text": "集权"}, {"label": "C", "text": "分权"}, {"label": "D", "text": "授权"}], "answer": "D", "analysis": "在社会生产过程中，分工与专业化实际上是同一事物的两个方面。其中，分工被视为生产过程（既\n包括单一产品的生产过程，也包括整个社会再生产过程）的相对分散，而专业化则被视为某种生产要素在这\n些分散的生产“片断”上的相对集中。\n18.上级委托给下级一定的权力，使下级在一定的监督之下具有相当的决策权和行动权。这种领导行为是（\n）。\nA.任命\nB.集权\nC.分权\nD.授权"}, {"question": "在以零部件和工艺专业化为主要内容的产业内，国际分工的主要形式是（ ）。", "options": [{"label": "A", "text": "横向分工"}, {"label": "B", "text": "纵向分工"}, {"label": "C", "text": "地域分工"}, {"label": "D", "text": "行业分工"}], "answer": "A", "analysis": "授权是指上级委托给下级一定的权力，使下级在一定的监督之下具有相当的决策权和行动权。\n19.在以零部件和工艺专业化为主要内容的产业内，国际分工的主要形式是（ ）。\nA.横向分工\nB.纵向分工\nC.地域分工\nD.行业分工"}, {"question": "下面对影响集权和分权程度的因素认识，不正确的有（ ）。", "options": [{"label": "A", "text": "决策的代价越高越不适合集权"}, {"label": "B", "text": "决策的影响面越广越不适合集权"}, {"label": "C", "text": "组织的规模越大越不适合集权"}, {"label": "D", "text": "主管人员的素质与集权分权无关"}], "answer": "ABDE", "analysis": "20世纪80年代以来，分工和专业化扩展到国际范围，在以零部件和工艺专业化为主要内容的产业内\n，横向分工成为国际分工的主要形式。\n多项选择题\n20.下面对影响集权和分权程度的因素认识，不正确的有（ ）。\nA.决策的代价越高越不适合集权\nB.决策的影响面越广越不适合集权\nC.组织的规模越大越不适合集权\nD.主管人员的素质与集权分权无关\nE.环境的变化越快、变化程度越高，越不适合集权"}, {"question": "ABDE 【解析】决策的代价越高越应该集权；决策的影响面越广越应该集权；主管人员的素质越高越适合分权，反 4 之适合集权；环境变化越快、变化程度越大越适合集权。 21.在现代企业中，授权的基本原则是（ ）。", "options": [{"label": "A", "text": "视能授权"}, {"label": "B", "text": "明确授权范围"}, {"label": "C", "text": "可越级授权"}, {"label": "D", "text": "适度授权"}], "answer": "ABDE", "analysis": "决策的代价越高越应该集权；决策的影响面越广越应该集权；主管人员的素质越高越适合分权，反\n4\n之适合集权；环境变化越快、变化程度越大越适合集权。\n21.在现代企业中，授权的基本原则是（ ）。\nA.视能授权\nB.明确授权范围\nC.可越级授权\nD.适度授权\nE.适当控制"}, {"question": "ABDE 【解析】授权的基本原则有：（1）视能授权。授权之前，应当分析工作任务的难易程度，以及承担该项工作 所需的基本条件，以求将职权授予最适当的人选。当发现被授权的下属不能胜任该项工作时，应该及时地收 回职权。（2）明确授权范围。授权时，授权者必须向被授权者明确所授事项的任务目标及责权范围，这样不 但有利于下属完成任务，更可以避免下级推卸责任。（3）不可越级授权。授权只能对自己的直接下属进行 ，而不能越级授权。越级授权不仅会导致中间层管理人员的被动，而且可能造成部门之间的矛盾。（4）适度 授权。授权所授予的职权只是上级职权的一部分，而不是全部。对下级来讲，它是完成任务所必需的权力。 授权过度等于放弃权力，必然失去对下级的控制和监督。（5）适当控制。在授权过程中需要必要的控制。主 管人员在实施授权以前，应当建立一套工作标准和报告制度，以及在异常情况下迅速采取补救措施。所以选 择ABDE 22.企业组织设计的主要依据有（ ）。", "options": [{"label": "A", "text": "企业库存"}, {"label": "B", "text": "企业战略"}, {"label": "C", "text": "企业环境"}, {"label": "D", "text": "企业技术"}], "answer": "BCDE", "analysis": "授权的基本原则有：（1）视能授权。授权之前，应当分析工作任务的难易程度，以及承担该项工作\n所需的基本条件，以求将职权授予最适当的人选。当发现被授权的下属不能胜任该项工作时，应该及时地收\n回职权。（2）明确授权范围。授权时，授权者必须向被授权者明确所授事项的任务目标及责权范围，这样不\n但有利于下属完成任务，更可以避免下级推卸责任。（3）不可越级授权。授权只能对自己的直接下属进行\n，而不能越级授权。越级授权不仅会导致中间层管理人员的被动，而且可能造成部门之间的矛盾。（4）适度\n授权。授权所授予的职权只是上级职权的一部分，而不是全部。对下级来讲，它是完成任务所必需的权力。\n授权过度等于放弃权力，必然失去对下级的控制和监督。（5）适当控制。在授权过程中需要必要的控制。主\n管人员在实施授权以前，应当建立一套工作标准和报告制度，以及在异常情况下迅速采取补救措施。所以选\n择ABDE\n22.企业组织设计的主要依据有（ ）。\nA.企业库存\nB.企业战略\nC.企业环境\nD.企业技术\nE.企业发展阶段"}, {"question": "BCDE 【解析】企业组织设计的主要依据包括：①企业战略。②企业环境。③企业技术。④企业发展阶段。 23.企业部门化是将整个管理系统分解成若干相互依存的管理单位，划分的方法包括（ ）。", "options": [{"label": "A", "text": "生产部门化"}, {"label": "B", "text": "过程部门化"}, {"label": "C", "text": "产品部门化"}, {"label": "D", "text": "职能部门化"}], "answer": "BCDE", "analysis": "企业组织设计的主要依据包括：①企业战略。②企业环境。③企业技术。④企业发展阶段。\n23.企业部门化是将整个管理系统分解成若干相互依存的管理单位，划分的方法包括（ ）。\nA.生产部门化\nB.过程部门化\nC.产品部门化\nD.职能部门化\nE.区域部门化"}, {"question": "BCDE 【解析】现代企业部门划分的主要方法包括职能部门化、产品部门化、区域部门化、服务对象部门化、过程 部门化、综合部门化等。 24.扁平结构形态的特点为（ ）。", "options": [{"label": "A", "text": "管理幅度大"}, {"label": "B", "text": "管理幅度小"}, {"label": "C", "text": "管理层次多"}, {"label": "D", "text": "管理层次少"}], "answer": "AD", "analysis": "现代企业部门划分的主要方法包括职能部门化、产品部门化、区域部门化、服务对象部门化、过程\n部门化、综合部门化等。\n24.扁平结构形态的特点为（ ）。\nA.管理幅度大\nB.管理幅度小\nC.管理层次多\nD.管理层次少\nE.呈金字塔形态"}, {"question": "企业内部分工可以提高生产效率的原因有（ ）。", "options": [{"label": "A", "text": "可以提高劳动者的劳动技巧"}, {"label": "B", "text": "能够减少单个劳动者的劳动转换时间"}, {"label": "C", "text": "便于对生产要素进行优化重组"}, {"label": "D", "text": "可以提高劳动者的满意度"}], "answer": "ABC", "analysis": "本题考查管理幅度和管理层次的关系。扁平结构是指在特定规模的组织中，管理幅度较大，管理层\n5\n次较少，呈扁平状的组织结构形态。\n25.企业内部分工可以提高生产效率的原因有（ ）。\nA.可以提高劳动者的劳动技巧\nB.能够减少单个劳动者的劳动转换时间\nC.便于对生产要素进行优化重组\nD.可以提高劳动者的满意度\nE.可以提高劳动者的复合技能"}, {"question": "下列属于企业设定管理幅度时应当考虑的主要因素的有（ ）。", "options": [{"label": "A", "text": "行业特点"}, {"label": "B", "text": "人员素质"}, {"label": "C", "text": "工作性质"}, {"label": "D", "text": "环境特征"}], "answer": "ABCD", "analysis": "本题考查分工协作与生产效率。企业内部分工可以减少企业投入和增加产出，从而提高生产效率。\n第一，分工可以使劳动者的劳动技巧获得提高。第二，分工能减少劳动转换时间。第三，分工促进了先进劳\n动工具和机器的发明和使用。第四，分工便于对生产要素进行重组，从而使各要素充分发挥优势，并相互协\n调，提高生产效率。\n26.下列属于企业设定管理幅度时应当考虑的主要因素的有（ ）。\nA.行业特点\nB.人员素质\nC.工作性质\nD.环境特征\nE.资本结构"}, {"question": "第三节 新型企业组织模式 单项选择题 1.与传统企业相比较，虚拟企业中劳动密集型和知识含量不高的生产在企业所占的比重变化趋势是（ ）。", "options": [{"label": "A", "text": "逐渐上升"}, {"label": "B", "text": "逐渐下降"}, {"label": "C", "text": "保持不变"}, {"label": "D", "text": "不确定"}], "answer": "B", "analysis": ""}, {"question": "虚拟企业的经营方式不包括（ ）。", "options": [{"label": "A", "text": "虚拟制造"}, {"label": "B", "text": "虚拟开发"}, {"label": "C", "text": "虚拟销售"}, {"label": "D", "text": "虚拟培训"}], "answer": "D", "analysis": "通过战略联盟关系，虚拟企业将非核心的部件、工艺分包出去，使劳动密集型和知识含量不高的生\n产在企业中所占的比重逐渐下降。\n2.虚拟企业的经营方式不包括（ ）。\nA.虚拟制造\nB.虚拟开发\nC.虚拟销售\nD.虚拟培训"}, {"question": "企业之间暂时性的组织形式为（ ）。", "options": [{"label": "A", "text": "学习型"}, {"label": "B", "text": "战略联盟"}, {"label": "C", "text": "直线职能"}, {"label": "D", "text": "虚拟企业"}], "answer": "B", "analysis": "本题考查虚拟企业的经营方式。虚拟企业的经营方式包括虚拟制造、虚拟销售、虚拟开发、虚拟结\n算、虚拟管理、虚拟服务。\n3.企业之间暂时性的组织形式为（ ）。\nA.学习型\nB.战略联盟\nC.直线职能\nD.虚拟企业"}, {"question": "根据彼得·圣吉的观点，学习型组织的五项修炼是指（ ）。", "options": [{"label": "A", "text": "自我超越、改善心智模式、建立共同世界观、团队学习、系统思考"}, {"label": "B", "text": "自我反省、改善心智模式、建立共同愿景、团队学习、系统思考"}, {"label": "C", "text": "自我超越、改善心智模式、建立共同愿景、团队学习、线性思考"}, {"label": "D", "text": "自我超越、改善心智模式、建立共同愿景、团队学习、系统思考"}], "answer": "D", "analysis": "本题考查战略联盟组织模式的含义。战略联盟组织模式就是不同的企业为了达到某一目的而通过契\n约形式形成的联合体，是企业之间暂时性的组织形式。\n4.根据彼得·圣吉的观点，学习型组织的五项修炼是指（ ）。\nA.自我超越、改善心智模式、建立共同世界观、团队学习、系统思考\nB.自我反省、改善心智模式、建立共同愿景、团队学习、系统思考\nC.自我超越、改善心智模式、建立共同愿景、团队学习、线性思考\nD.自我超越、改善心智模式、建立共同愿景、团队学习、系统思考"}, {"question": "虚拟企业建立了覆盖供应商、制造商、分销商及顾客的信息网络，这一网络的触角几乎延伸到经济社会的 每个角落，随时采集市场数据，跟踪市场需求，以最快的速度将需求信息与设计、生产系统相结合，同时将 问题与建议反馈给企业。这体现了虚拟企业（ ）的特征。", "options": [{"label": "A", "text": "与上下游企业建立战略联盟关系"}, {"label": "B", "text": "具有高效的信息管理系统"}, {"label": "C", "text": "注重研究开发能力的构建"}, {"label": "D", "text": "产品趋向数字化"}], "answer": "B", "analysis": "学习型组织的形成需要企业进行艰苦的转型。为此，传统企业必须刻苦修炼。1990年，彼得·圣吉\n在其著作《第五项修炼——学习型组织的艺术与实务》中明确提出了传统企业进行修炼的五个关键方面。包\n括自我超越、改善心智模式、建立共同愿景、团队学习和系统思考。\n5.虚拟企业建立了覆盖供应商、制造商、分销商及顾客的信息网络，这一网络的触角几乎延伸到经济社会的\n每个角落，随时采集市场数据，跟踪市场需求，以最快的速度将需求信息与设计、生产系统相结合，同时将\n问题与建议反馈给企业。这体现了虚拟企业（ ）的特征。\nA.与上下游企业建立战略联盟关系\nB.具有高效的信息管理系统\nC.注重研究开发能力的构建\nD.产品趋向数字化\n1"}, {"question": "“学习组织的精神基础”指的是（ ）。", "options": [{"label": "A", "text": "改善心智模式"}, {"label": "B", "text": "建立共同愿景"}, {"label": "C", "text": "系统思考"}, {"label": "D", "text": "自我超越"}], "answer": "D", "analysis": "题干所述内容体现了虚拟企业具有高效的信息管理系统的特征。\n6.“学习组织的精神基础”指的是（ ）。\nA.改善心智模式\nB.建立共同愿景\nC.系统思考\nD.自我超越"}, {"question": "虚拟管理比较常见的内容有（ ）等。", "options": [{"label": "A", "text": "财务管理外包"}, {"label": "B", "text": "人力资源管理外包"}, {"label": "C", "text": "技术管理外包"}, {"label": "D", "text": "设备管理外包"}], "answer": "AB", "analysis": "五项修炼包括：①自我超越；②改善心智模式；③建立共同愿景；④团队学习；⑤系统思考。其中\n，自我超越被认为是“学习组织的精神基础”。\n多项选择题\n7.虚拟管理比较常见的内容有（ ）等。\nA.财务管理外包\nB.人力资源管理外包\nC.技术管理外包\nD.设备管理外包\nE.生产管理外包"}, {"question": "在学习型组织中，领导者的定位是（ ）。", "options": [{"label": "A", "text": "设计师"}, {"label": "B", "text": "仆人"}, {"label": "C", "text": "教师"}, {"label": "D", "text": "权威"}], "answer": "ABC", "analysis": "虚拟管理即企业将一部分管理职能委托给外部专业公司来完成，比较常见的内容有财务管理外包、\n人力资源管理外包等。其他选项不属于虚拟管理。\n8.在学习型组织中，领导者的定位是（ ）。\nA.设计师\nB.仆人\nC.教师\nD.权威\nE.主人"}, {"question": "某互联网公司采用虚拟企业组织模式进行运营。这种企业组织模式的主要优势有（ ）。", "options": [{"label": "A", "text": "能够对市场需求做出快速反应"}, {"label": "B", "text": "能够快速招募销售人员"}, {"label": "C", "text": "能够较好地分摊开发投资费用"}, {"label": "D", "text": "能够迅速垄断市场"}], "answer": "ACE", "analysis": "在学习型组织中，领导者是\"设计师\"、\"仆人\"和“教师”，领导者主导组织发展理念的设计，同时\n协助下属提高对组织系统的理解能力，促进每一个人的学习和创新。所以选择ABC。\n9.某互联网公司采用虚拟企业组织模式进行运营。这种企业组织模式的主要优势有（ ）。\nA.能够对市场需求做出快速反应\nB.能够快速招募销售人员\nC.能够较好地分摊开发投资费用\nD.能够迅速垄断市场\nE.能够有效规避经营风险"}, {"question": "第二节 企业组织结构形式及其选择 单项选择题 1.企业经营发展一般有守业型、扩张型、（ ）。", "options": [{"label": "A", "text": "跳跃型"}, {"label": "B", "text": "守业与扩张相宜型"}, {"label": "C", "text": "稳定型"}, {"label": "D", "text": "集约型"}], "answer": "B", "analysis": ""}, {"question": "在企业组织结构的形式中，矩阵制所表现出的最突出的优点是（ ）。", "options": [{"label": "A", "text": "管理层次清楚"}, {"label": "B", "text": "管理比较深入"}, {"label": "C", "text": "横向联系密切"}, {"label": "D", "text": "信息反馈及时"}], "answer": "C", "analysis": "企业经营发展一般有三种类型，即守业型、扩张型、守业与扩张相宜型。\n2.在企业组织结构的形式中，矩阵制所表现出的最突出的优点是（ ）。\nA.管理层次清楚\nB.管理比较深入\nC.横向联系密切\nD.信息反馈及时"}, {"question": "国内某中等规模的以承揽咨询项目为主的咨询公司，为了提升公司适应多变竞争环境的机动性和灵活性 ，宜采取的组织结构形式是（ ）。", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "直线职能制"}], "answer": "C", "analysis": "矩阵制的优点：打破了传统的人员只受一个部门领导的管理原则，从而加强了管理部门之间的纵向\n和横向联系，有利于各职能部门之间的配合，及时沟通信息，共同决策，提高了工作效率；把不同部门的专\n业人员组织在一起，有助于激发人们的积极性和创造性，培养和发挥专业人员的团队效能，提高技术水平和\n管理水平；把完成某项任务所需的各种专业知识和经验集中起来，加速完成某一特定项目，有助于提高管理\n组织的机动性和灵活性。\n3.国内某中等规模的以承揽咨询项目为主的咨询公司，为了提升公司适应多变竞争环境的机动性和灵活性\n，宜采取的组织结构形式是（ ）。\nA.直线制\nB.职能制\nC.矩阵制\nD.直线职能制"}, {"question": "技术复杂、工艺整体性要求高的企业，组织应以（ ）。", "options": [{"label": "A", "text": "集权型结构为主"}, {"label": "B", "text": "分权型结构为主"}, {"label": "C", "text": "集权型和分权型并存结构为宜"}, {"label": "D", "text": "组织结构无特定要求"}], "answer": "C", "analysis": "矩阵制打破了传统的人员只受一个部门领导的管理原则，从而加强了管理部门之间的纵向和横向联\n系，有利于各职能部门之间的配合。这种组织形式适用于生产经营复杂多变的企业，特别适用于创新性和开\n发性的工作项目。\n4.技术复杂、工艺整体性要求高的企业，组织应以（ ）。\nA.集权型结构为主\nB.分权型结构为主\nC.集权型和分权型并存结构为宜\nD.组织结构无特定要求"}, {"question": "小型企业组织简单，通常以（ ）为主。", "options": [{"label": "A", "text": "集权型组织"}, {"label": "B", "text": "分权型组织"}, {"label": "C", "text": "集权型和分权型并存组织"}, {"label": "D", "text": "无特定要求"}], "answer": "A", "analysis": "本题考查企业组织结构形式的选择。技术复杂、工艺整体性要求高的企业，组织应以集权型和分权\n型并存为宜。\n5.小型企业组织简单，通常以（ ）为主。\nA.集权型组织\nB.分权型组织\nC.集权型和分权型并存组织\n1\nD.无特定要求"}, {"question": "中型企业适宜（ ）。", "options": [{"label": "A", "text": "集权型组织"}, {"label": "B", "text": "分权型组织"}, {"label": "C", "text": "集权和分权相结合型的组织"}, {"label": "D", "text": "无特定要求的组织"}], "answer": "C", "analysis": "本题考查企业组织结构形式的选择。小型和微型企业组织简单，通常实行直线式管理，集权程度较\n高。虽然少数小型和微型企业因技术复杂也有分权型，但企业毕竟整体规模小，集权运作更方便。\n6.中型企业适宜（ ）。\nA.集权型组织\nB.分权型组织\nC.集权和分权相结合型的组织\nD.无特定要求的组织"}, {"question": "下列组织结构形式中，一般适用于规模较大、产品种类较多、各种产品之间工作差别较大、生产技术比较 复杂和市场广阔多变的大型企业的是（ ）。", "options": [{"label": "A", "text": "职能制"}, {"label": "B", "text": "矩阵制"}, {"label": "C", "text": "事业部制"}, {"label": "D", "text": "企业集团结构"}], "answer": "C", "analysis": "本题考查企业组织结构形式的选择。中型企业适宜集权和分权相结合，以分权为主，这样管理成本\n低，组织效率高。\n7.下列组织结构形式中，一般适用于规模较大、产品种类较多、各种产品之间工作差别较大、生产技术比较\n复杂和市场广阔多变的大型企业的是（ ）。\nA.职能制\nB.矩阵制\nC.事业部制\nD.企业集团结构"}, {"question": "把众多的企业联合在一起形成企业集团的最重要的纽带是（ ）。", "options": [{"label": "A", "text": "利益关系"}, {"label": "B", "text": "契约关系"}, {"label": "C", "text": "产权关系"}, {"label": "D", "text": "业务关系"}], "answer": "C", "analysis": "本题考查事业部制的适用范围。事业部制一般适用于规模较大、产品种类较多、各种产品之间工作\n差别较大、生产技术比较复杂和市场广阔多变的大型企业。\n8.把众多的企业联合在一起形成企业集团的最重要的纽带是（ ）。\nA.利益关系\nB.契约关系\nC.产权关系\nD.业务关系"}, {"question": "在现代企业组织结构的主要形式中，既有按垂直管理要求设置的纵向组织系统，又有按规划项目划分的横 向组织结构是（ ）。", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "事业部制"}], "answer": "C", "analysis": "本题考查企业集团结构的特点。产权关系是把众多的企业联合在一起形成企业集团的最重要的纽带\n。\n9.在现代企业组织结构的主要形式中，既有按垂直管理要求设置的纵向组织系统，又有按规划项目划分的横\n向组织结构是（ ）。\nA.直线制\nB.职能制\nC.矩阵制\nD.事业部制"}, {"question": "在企业组织结构形式中，直线职能制又称为（ ）。", "options": [{"label": "A", "text": "目标规划管理制"}, {"label": "B", "text": "联邦分权制"}, {"label": "C", "text": "生产区域管理制"}, {"label": "D", "text": "单线制"}], "answer": "C", "analysis": "本题考查矩阵制的特点。矩阵制的特点是：既有按垂直管理要求设置的纵向组织系统，又有按规划\n项目（产品、工程项目）划分的横向组织结构，两者结合，形成一个矩阵。\n10.在企业组织结构形式中，直线职能制又称为（ ）。\nA.目标规划管理制\nB.联邦分权制\n2\nC.生产区域管理制\nD.单线制"}, {"question": "容易形成多头领导的企业组织结构形式是（ ）。", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "直线职能制"}, {"label": "D", "text": "事业部制"}], "answer": "B", "analysis": "本题考查直线职能制。直线职能制又叫生产区域管理制。\n11.容易形成多头领导的企业组织结构形式是（ ）。\nA.直线制\nB.职能制\nC.直线职能制\nD.事业部制"}, {"question": "大型和特大型企业要获得规模效益，普遍要求建立（ ）组织系统。", "options": [{"label": "A", "text": "集权型"}, {"label": "B", "text": "分权型"}, {"label": "C", "text": "网络型"}, {"label": "D", "text": "直线型"}], "answer": "B", "analysis": "职能制的优点是将企业管理工作按职能分工，适应了现代企业生产技术比较复杂、管理工作分工较\n细的特点。同时，提高了管理的专业化程度，减轻了各级领导者的工作负担。其缺点是：容易形成多头领导\n，有可能妨碍企业的统一指挥，不利于建立健全责任制，影响整体工作效率的提高。\n12.大型和特大型企业要获得规模效益，普遍要求建立（ ）组织系统。\nA.集权型\nB.分权型\nC.网络型\nD.直线型"}, {"question": "适用于小微企业的组织结构形式是（ ）。", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "事业部制"}], "answer": "A", "analysis": "如果不实行分权式领导，企业很难具有活力，企业规模越大，客观上要求分权的呼声越高。\n13.适用于小微企业的组织结构形式是（ ）。\nA.直线制\nB.职能制\nC.矩阵制\nD.事业部制"}, {"question": "当前企业采用较多的组织形式是（ ）。", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "直线职能制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "事业部制"}], "answer": "B", "analysis": "直线制的缺点是没有专业的职能机构和人员做领导的助手，要求企业领导者通晓各种业务，成为全\n才。因此，一旦生产规模扩大，产品结构复杂化，企业领导者势必顾此失彼，难以应付。这种组织形式适用\n于那些产品单一、供销渠道稳定、工艺过程简单、规模较小的企业。\n14.当前企业采用较多的组织形式是（ ）。\nA.直线制\nB.直线职能制\nC.矩阵制\nD.事业部制"}, {"question": "适用于规模较大、产品种类较多、各种产品之间工作差别较大、技术比较复杂和市场广阔多变的大型企业 的组织结构形式是（ ）。", "options": [{"label": "A", "text": "事业部制"}, {"label": "B", "text": "直线职能制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "职能制"}], "answer": "A", "analysis": "直线职能制是以直线制为基础，在各级行政领导者之下设置相应的职能部门，分别从事专业管理\n，作为该级领导人的参谋部门，是企业管理机构的基本组织形式，是当前企业较多采用的组织形式。\n15.适用于规模较大、产品种类较多、各种产品之间工作差别较大、技术比较复杂和市场广阔多变的大型企业\n的组织结构形式是（ ）。\nA.事业部制\nB.直线职能制\n3\nC.矩阵制\nD.职能制"}, {"question": "企业在选择组织结构形式时，需要考虑的因素有（ ）。", "options": [{"label": "A", "text": "企业经营发展战略"}, {"label": "B", "text": "企业文化"}, {"label": "C", "text": "企业的生产技术和工艺"}, {"label": "D", "text": "企业领导者的年龄结构"}], "answer": "ABCE", "analysis": "事业部制又叫联邦分权制，是目前国外大型企业普遍采用的一种组织管理形式。事业部制一般适用\n于规模较大、产品种类较多、各种产品之间工作差别较大、生产技术比较复杂和市场广阔多变的大型企业。\n多项选择题\n16.企业在选择组织结构形式时，需要考虑的因素有（ ）。\nA.企业经营发展战略\nB.企业文化\nC.企业的生产技术和工艺\nD.企业领导者的年龄结构\nE.企业所处的环境"}, {"question": "ABCE 【解析】企业组织结构形式的选择应该考虑与企业生产经营直接相关的要素，包括：①企业的生产技术和工 艺；②企业规模；③企业经营发展战略；④企业所处的环境；⑤企业文化。 17.事业部制是国外大型企业普遍采用的一种管理组织形式，其优点包括（ ）。", "options": [{"label": "A", "text": "有利于强化企业内部的横向联系"}, {"label": "B", "text": "有利于最高领导层摆脱日常事务"}, {"label": "C", "text": "有利于减少管理人员和管理费用"}, {"label": "D", "text": "有利于经营管理人才的培养"}], "answer": "BDE", "analysis": "企业组织结构形式的选择应该考虑与企业生产经营直接相关的要素，包括：①企业的生产技术和工\n艺；②企业规模；③企业经营发展战略；④企业所处的环境；⑤企业文化。\n17.事业部制是国外大型企业普遍采用的一种管理组织形式，其优点包括（ ）。\nA.有利于强化企业内部的横向联系\nB.有利于最高领导层摆脱日常事务\nC.有利于减少管理人员和管理费用\nD.有利于经营管理人才的培养\nE.可以增强企业的活力"}, {"question": "BDE 【解析】本题考查事业部制。事业部制的优点：（1）事业部成为半独立经营单位，企业最高领导层可以摆脱 日常事务，集中精力搞好战略决策、长远规划和人才开发；（2）事业部相对独立、自负盈亏，有利于事业部 之间的竞赛，增强企业的活力；（3）有利于经营管理人才的培养；（4）可以充分发挥各事业部主管的能动 性，增强经营管理的能力，提高工作效率。 18.企业组织结构形式的选择应考虑的因素包括（ ）。", "options": [{"label": "A", "text": "企业的生产技术和工艺"}, {"label": "B", "text": "企业规模"}, {"label": "C", "text": "企业经营发展战略"}, {"label": "D", "text": "企业所处的环境"}], "answer": "ABCD", "analysis": "本题考查事业部制。事业部制的优点：（1）事业部成为半独立经营单位，企业最高领导层可以摆脱\n日常事务，集中精力搞好战略决策、长远规划和人才开发；（2）事业部相对独立、自负盈亏，有利于事业部\n之间的竞赛，增强企业的活力；（3）有利于经营管理人才的培养；（4）可以充分发挥各事业部主管的能动\n性，增强经营管理的能力，提高工作效率。\n18.企业组织结构形式的选择应考虑的因素包括（ ）。\nA.企业的生产技术和工艺\nB.企业规模\nC.企业经营发展战略\nD.企业所处的环境\nE.企业的产权结构"}, {"question": "第四节 企业变革 单项选择题 1.下列不属于企业变革先兆的是（ ）。", "options": [{"label": "A", "text": "企业决策效率低下或经常出现决策失误"}, {"label": "B", "text": "企业沟通渠道不畅"}, {"label": "C", "text": "企业组织职能难以正常发挥"}, {"label": "D", "text": "企业财务报表出现重大异常"}], "answer": "D", "analysis": ""}, {"question": "处于企业生命周期中（ ）的企业可能不再适应环境，或者变得行动迟缓，过于行政化，因而必须经历一 个重塑和创新的过程。", "options": [{"label": "A", "text": "精细阶段"}, {"label": "B", "text": "规范化阶段"}, {"label": "C", "text": "集体化阶段"}, {"label": "D", "text": "创业阶段"}], "answer": "A", "analysis": "企业变革的先兆包括：企业决策效率低下或经常出现决策失误，企业沟通渠道不畅，企业组织职能\n难以正常发挥，企业缺乏创新。\n2.处于企业生命周期中（ ）的企业可能不再适应环境，或者变得行动迟缓，过于行政化，因而必须经历一\n个重塑和创新的过程。\nA.精细阶段\nB.规范化阶段\nC.集体化阶段\nD.创业阶段"}, {"question": "企业变革的内部驱动因素是（ ）。", "options": [{"label": "A", "text": "企业所在地区政治环境改变"}, {"label": "B", "text": "企业目标的选择与修正"}, {"label": "C", "text": "企业所在地区经济环境改变"}, {"label": "D", "text": "科学技术的发展变化"}], "answer": "B", "analysis": "企业精细阶段的主要危机表现为需要再创活力。企业发展成熟以后，可能会步入暂时衰退的时期\n，需要对其进行一次再造，使之获得新的活力。处于这一发展阶段的企业，可能不再适应环境，或者变得行\n动迟缓，过于行政化，因而必须经历一个重塑和创新的过程。\n3.企业变革的内部驱动因素是（ ）。\nA.企业所在地区政治环境改变\nB.企业目标的选择与修正\nC.企业所在地区经济环境改变\nD.科学技术的发展变化"}, {"question": "针对企业员工的价值观、态度、期望、信仰，以及目标和追求等方面所进行的变革，属于企业的（ ）。", "options": [{"label": "A", "text": "技术变革"}, {"label": "B", "text": "服务变革"}, {"label": "C", "text": "文化变革"}, {"label": "D", "text": "战略变革"}], "answer": "C", "analysis": "引起企业变革的内部驱动因素包括：①企业目标的选择与修正；②组织职能的转变；③企业成员内\n在动机与需求的变化。\n4.针对企业员工的价值观、态度、期望、信仰，以及目标和追求等方面所进行的变革，属于企业的（ ）。\nA.技术变革\nB.服务变革\nC.文化变革\nD.战略变革"}, {"question": "（ ）是企业管理的中心环节，是每一个企业管理者最为重要的工作。", "options": [{"label": "A", "text": "实施"}, {"label": "B", "text": "控制"}, {"label": "C", "text": "决策"}, {"label": "D", "text": "领导"}], "answer": "C", "analysis": "文化变革是指针对企业员工的价值观、态度、期望、信仰以及目标和追求等方面所进行的变革。\n5.（ ）是企业管理的中心环节，是每一个企业管理者最为重要的工作。\nA.实施\nB.控制\nC.决策\nD.领导"}, {"question": "引起企业变革的内部驱动因素不包括（ ）。", "options": [{"label": "A", "text": "企业目标的选择与修正"}, {"label": "B", "text": "组织职能的转变"}, {"label": "C", "text": "企业领导者的转变"}, {"label": "D", "text": "企业成员内在动机与需求的变化"}], "answer": "C", "analysis": "本题考查企业变革的先兆。决策是企业管理的中心环节，是每一个企业管理者最为重要的工作。\n1\n6.引起企业变革的内部驱动因素不包括（ ）。\nA.企业目标的选择与修正\nB.组织职能的转变\nC.企业领导者的转变\nD.企业成员内在动机与需求的变化"}, {"question": "在企业生命周期中，处于（ ）的企业，内部机构制度化、程序化、科学化开始形成，分工精细，有较为 成熟的产品或服务线，能够提供多样化服务，内部环境稳定。", "options": [{"label": "A", "text": "创业阶段"}, {"label": "B", "text": "集体化阶段"}, {"label": "C", "text": "规范化阶段"}, {"label": "D", "text": "精细阶段"}], "answer": "C", "analysis": "本题考查引起企业变革的内部驱动因素。引起企业变革的内部驱动因素可以归纳为以下几个方面\n：（1）企业目标的选择与修正。（2）组织职能的转变。（3）企业成员内在动机与需求的变化。\n7.在企业生命周期中，处于（ ）的企业，内部机构制度化、程序化、科学化开始形成，分工精细，有较为\n成熟的产品或服务线，能够提供多样化服务，内部环境稳定。\nA.创业阶段\nB.集体化阶段\nC.规范化阶段\nD.精细阶段"}, {"question": "企业对工作方式、装备、工艺流程等所进行的变革活动.属于（ ）。", "options": [{"label": "A", "text": "产品与服务变革"}, {"label": "B", "text": "战略与结构变革"}, {"label": "C", "text": "技术变革"}, {"label": "D", "text": "文化变革"}], "answer": "C", "analysis": "本题考查企业的规范化阶段。处于规范化阶段的企业，内部机构制度化、程序化、科学化开始形成\n，分工精细，有较为成熟的产品或服务线，能够提供多样化服务，内部环境稳定。\n8.企业对工作方式、装备、工艺流程等所进行的变革活动.属于（ ）。\nA.产品与服务变革\nB.战略与结构变革\nC.技术变革\nD.文化变革"}, {"question": "根据企业组织生命周期理论，当企业经营权与所有权部分分离时，该企业处于（ ）阶段。", "options": [{"label": "A", "text": "创业"}, {"label": "B", "text": "集体化"}, {"label": "C", "text": "规范化"}, {"label": "D", "text": "精细"}], "answer": "B", "analysis": "技术变革主要指生产流程方面的变革，包括有关知识和技能的更新和应用。技术方面的变革涉及产\n品或服务的生产技术，包括工作方式、装备、工艺流程等。\n9.根据企业组织生命周期理论，当企业经营权与所有权部分分离时，该企业处于（ ）阶段。\nA.创业\nB.集体化\nC.规范化\nD.精细"}, {"question": "下列属于引起企业变革的外部驱动因素的是（ ）。", "options": [{"label": "A", "text": "企业目标的选择与修正"}, {"label": "B", "text": "科学技术的发展变化"}, {"label": "C", "text": "组织职能的转变"}, {"label": "D", "text": "企业成员内在动机与需求的变化"}], "answer": "B", "analysis": "处于集体化阶段的企业，其管理逐步规范化，已经形成一定的工作程序和规章制度，分工开始明细\n，企业内机构增加，内部的沟通和协调也随之增加，企业的产品或服务比较集中，开始引入职业经理人，出\n现了经营权和所有权部分分离的现象。\n10.下列属于引起企业变革的外部驱动因素的是（ ）。\nA.企业目标的选择与修正\nB.科学技术的发展变化\nC.组织职能的转变\nD.企业成员内在动机与需求的变化"}, {"question": "按照企业生命周期理论，企业在其发展过程中都会经过（ ）。", "options": [{"label": "A", "text": "创业阶段"}, {"label": "B", "text": "集体化阶段"}, {"label": "C", "text": "规范化阶段"}, {"label": "D", "text": "精细阶段"}], "answer": "ABCD", "analysis": "引起企业变革的外部驱动因素包括：①技术；②政治与法律；③经济；④社会。\n2\n多项选择题\n11.按照企业生命周期理论，企业在其发展过程中都会经过（ ）。\nA.创业阶段\nB.集体化阶段\nC.规范化阶段\nD.精细阶段\nE.衰退阶段"}, {"question": "企业变革的战略类型包括（ ）。", "options": [{"label": "A", "text": "技术变革"}, {"label": "B", "text": "产品与服务变革"}, {"label": "C", "text": "战略与结构变革"}, {"label": "D", "text": "文化变革"}], "answer": "ABCD", "analysis": "关于企业生命周期的研究表明，企业在其发展中会表现出四个阶段性的不同特征，这些阶段包括创\n业阶段、集体化阶段、规范化阶段和精细阶段。\n12.企业变革的战略类型包括（ ）。\nA.技术变革\nB.产品与服务变革\nC.战略与结构变革\nD.文化变革\nE.组织形式变革"}, {"question": "在企业变革过程中，要考虑各方面的因素，（ ）因素更应当引起人们的重视。", "options": [{"label": "A", "text": "企业战略"}, {"label": "B", "text": "企业规模"}, {"label": "C", "text": "社会发展"}, {"label": "D", "text": "技术创新"}], "answer": "ACDE", "analysis": "企业变革的战略类型有技术变革、产品与服务变革、战略与结构变革、文化变革。\n13.在企业变革过程中，要考虑各方面的因素，（ ）因素更应当引起人们的重视。\nA.企业战略\nB.企业规模\nC.社会发展\nD.技术创新\nE.企业文化"}, {"question": "ACDE 【解析】影响企业变革的五项关键因素是企业战略、企业成长、社会发展、技术创新、企业文化。 14.企业成长过程一般要经历的变革阶段包括（ ）。", "options": [{"label": "A", "text": "管理变革"}, {"label": "B", "text": "授权变 值要求，将造成产品部分功能丧失，则该质量特性是（ ）。", "options": [{"label": "A", "text": "关键质量特性"}, {"label": "B", "text": "重要质量特性"}, {"label": "C", "text": "次要质量特性"}, {"label": "D", "text": "一般质量特性"}], "answer": "B", "analysis": "质量管理的发展大致经历了三个阶段。第一个阶段是质量检验阶段。20世纪初，人们对质量管理的\n理解还只限于对质量的检验。\n3.若超过规定的特性值要求，将造成产品部分功能丧失，则该质量特性是（ ）。\nA.关键质量特性\nB.重要质量特性\nC.次要质量特性\nD.一般质量特性"}, {"question": "设身处地地为顾客着想和对顾客给予特别的关注，这体现了服务质量的（ ）。", "options": [{"label": "A", "text": "有形性"}, {"label": "B", "text": "可靠性"}, {"label": "C", "text": "响应性"}, {"label": "D", "text": "移情性"}], "answer": "D", "analysis": "关键质量特性是指若超过规定的特性值要求，会直接影响产品安全性或使产品整体功能丧失的质量\n特性；重要质量特性是指若超过规定的特性值要求，将造成产品部分功能丧失的质量特性；次要质量特性是\n指若超过规定的特性值要求，暂不影响产品功能，但可能会引起产品功能的逐渐丧失。\n4.设身处地地为顾客着想和对顾客给予特别的关注，这体现了服务质量的（ ）。\nA.有形性\nB.可靠性\nC.响应性\nD.移情性"}, {"question": "不同的顾客对同一功能的产品提出不同的质量要求，体现了质量的（ ）。", "options": [{"label": "A", "text": "经济性"}, {"label": "B", "text": "相对性"}, {"label": "C", "text": "狭义性"}, {"label": "D", "text": "时效性"}], "answer": "B", "analysis": "本题考查服务质量的移情性。移情性：设身处地地为顾客着想和对顾客给予特别的关注。\n5.不同的顾客对同一功能的产品提出不同的质量要求，体现了质量的（ ）。\nA.经济性\nB.相对性\nC.狭义性\nD.时效性"}, {"question": "（ ）是指由组织的最高管理者正式发布的该组织总的质量宗旨和质量方向。", "options": [{"label": "A", "text": "质量方针"}, {"label": "B", "text": "质量策划"}, {"label": "C", "text": "质量控制"}, {"label": "D", "text": "质量保证"}], "answer": "A", "analysis": "本题考查质量的特性。质量的相对性。组织的顾客和其他相关方可能对同一产品的功能提出不同的\n需求，也可能对同一产品的同一功能提出不同的需求。\n1\n6.（ ）是指由组织的最高管理者正式发布的该组织总的质量宗旨和质量方向。\nA.质量方针\nB.质量策划\nC.质量控制\nD.质量保证"}, {"question": "通常将产品的质量特性划分为关键质量特性、重要质量特性和次要质量特性，其划分标准是（ ）。", "options": [{"label": "A", "text": "生产过程中各工序工艺的难度"}, {"label": "B", "text": "产品质量特性对顾客满意的影响程度"}, {"label": "C", "text": "产品设计者的喜好"}, {"label": "D", "text": "国家质量监督机构相关规定"}], "answer": "B", "analysis": "本题考查质量方针。质量方针是指由组织的最高管理者正式发布的该组织总的质量宗旨和质量方向\n。\n7.通常将产品的质量特性划分为关键质量特性、重要质量特性和次要质量特性，其划分标准是（ ）。\nA.生产过程中各工序工艺的难度\nB.产品质量特性对顾客满意的影响程度\nC.产品设计者的喜好\nD.国家质量监督机构相关规定"}, {"question": "（ ）的概念最初仅用于产品，以后逐渐扩展到服务、过程、体系和组织，以及以上几项的组合。", "options": [{"label": "A", "text": "质量"}, {"label": "B", "text": "服务"}, {"label": "C", "text": "过程"}, {"label": "D", "text": "体系"}], "answer": "A", "analysis": "根据对顾客满意的影响程度不同，应对质量特性进行分类管理。常用的质量特性分类方法是将质量\n特性划分为关键、重要和次要三类。\n8.（ ）的概念最初仅用于产品，以后逐渐扩展到服务、过程、体系和组织，以及以上几项的组合。\nA.质量\nB.服务\nC.过程\nD.体系"}, {"question": "本题考查质量的基本概念及其发展历程。质量的概念最初仅用于产品，以后逐渐扩展到服务、过程", "options": [{"label": "A", "text": "休哈特"}, {"label": "B", "text": "泰罗"}, {"label": "C", "text": "帕雷特"}, {"label": "D", "text": "费根堡姆"}], "answer": "D", "analysis": "本题考查质量的基本概念及其发展历程。质量的概念最初仅用于产品，以后逐渐扩展到服务、过程\n、体系和组织，以及以上几项的组合。\n9.1961年，（ ）提出了全面质量管理的概念。\nA.休哈特\nB.泰罗\nC.帕雷特\nD.费根堡姆"}, {"question": "若产品的某项质量特性超出规定的特性值要求，会使产品整体功能丧失，则该质量特性是（ ）。", "options": [{"label": "A", "text": "关键质量特性"}, {"label": "B", "text": "重要质量特性"}, {"label": "C", "text": "次要质量特性"}, {"label": "D", "text": "一般质量特性"}], "answer": "A", "analysis": "本题考查质量管理的发展历程。1961年，费根堡姆提出了全面质量管理的概念。\n10.若产品的某项质量特性超出规定的特性值要求，会使产品整体功能丧失，则该质量特性是（ ）。\nA.关键质量特性\nB.重要质量特性\nC.次要质量特性\nD.一般质量特性"}, {"question": "对达到预期质量要求的能力提供足够的信任，称为（ ）。", "options": [{"label": "A", "text": "质量保证"}, {"label": "B", "text": "质量控制"}, {"label": "C", "text": "质量策划"}, {"label": "D", "text": "质量管理"}], "answer": "A", "analysis": "关键质量特性是指若超过规定的特性值要求，会直接影响产品安全性或使产品整体功能丧失的质量\n特性。\n11.对达到预期质量要求的能力提供足够的信任，称为（ ）。\n2\nA.质量保证\nB.质量控制\nC.质量策划\nD.质量管理"}, {"question": "质量的概念从“符合性质量”发展到“适用性质量”的过程，体现了企业对质量的认识逐步深化的过程 ，企业逐渐将满足（ ）的需求放在了首位。", "options": [{"label": "A", "text": "顾客"}, {"label": "B", "text": "供应商"}, {"label": "C", "text": "服务商"}, {"label": "D", "text": "生产商"}], "answer": "A", "analysis": "质量保证是指对达到预期质量要求的能力提供足够的信任。\n12.质量的概念从“符合性质量”发展到“适用性质量”的过程，体现了企业对质量的认识逐步深化的过程\n，企业逐渐将满足（ ）的需求放在了首位。\nA.顾客\nB.供应商\nC.服务商\nD.生产商"}, {"question": "外观、形状、色泽、气味、包装等特性，属于硬件质量特性的（ ）特性。", "options": [{"label": "A", "text": "外在"}, {"label": "B", "text": "内在"}, {"label": "C", "text": "经济"}, {"label": "D", "text": "其他"}], "answer": "A", "analysis": "质量从“符合性”发展到“适用性”，体现了人们对质量的认识逐渐将顾客的需求放在了首位。\n13.外观、形状、色泽、气味、包装等特性，属于硬件质量特性的（ ）特性。\nA.外在\nB.内在\nC.经济\nD.其他"}, {"question": "质量检验所使用的手段是各种检测设备和仪表，方式是严格把关，进行（ ）的检验。", "options": [{"label": "A", "text": "90％"}, {"label": "B", "text": "95％"}, {"label": "C", "text": "99％"}, {"label": "D", "text": "100％"}], "answer": "D", "analysis": "硬件质量特性包括：①内在特性，如结构、性能、精度、化学成分等；②外在特性，如外观、形状\n、色泽、气味、包装等；③经济特性，如使用成本、维修时间和费用等；④其他方面的质量管理特性，如安\n全、环保、美观等。\n14.质量检验所使用的手段是各种检测设备和仪表，方式是严格把关，进行（ ）的检验。\nA.90％\nB.95％\nC.99％\nD.100％"}, {"question": "下列硬件质量特性中，属于外在特性的有（ ）。", "options": [{"label": "A", "text": "包装"}, {"label": "B", "text": "形状"}, {"label": "C", "text": "色泽"}, {"label": "D", "text": "气味"}], "answer": "ABCD", "analysis": "质量检验所使用的手段是各种检测设备和仪表，方式是严格把关，进行百分之百的检验。\n多项选择题\n15.下列硬件质量特性中，属于外在特性的有（ ）。\nA.包装\nB.形状\nC.色泽\nD.气味\nE.结构"}, {"question": "质量管理是指从质量方面指挥和控制组织的协调活动，通常包括制定质量方针和（ ）。", "options": [{"label": "A", "text": "质量目标"}, {"label": "B", "text": "质量策划"}, {"label": "C", "text": "质量控制"}, {"label": "D", "text": "质量保证"}], "answer": "ABCD", "analysis": "本题考查质量特性。硬件质量特性有内在特性，如结构、性能、精度、化学成分等；有外在特性\n，如外观、形状、色泽、气味、包装等；有经济特性，如使用成本、维修时间和费用等；还有其他方面的质\n量管理特性，如安全、环保、美观等。\n3\n16.质量管理是指从质量方面指挥和控制组织的协调活动，通常包括制定质量方针和（ ）。\nA.质量目标\nB.质量策划\nC.质量控制\nD.质量保证\nE.质量反馈"}, {"question": "第三节 国际标准化组织质量管理体系与质量认证 单项选择题 1.2008版ISO9000族核心标准中起着奠定理论基础、统一术语概念和明确指导思想作用的是（ ）。", "options": [{"label": "A", "text": "GB/T19001—2008idtISO9001：2008《质量管理体系要求》"}, {"label": "B", "text": "GB/T19004—2009idtISO9004：2009《质量管理体系业绩改进指南》"}, {"label": "C", "text": "GB/T19000—2008idtISO9000：2005《质量管理体系基础和术语》"}, {"label": "D", "text": "GB/T19011—2003idtISO9011：2002《质量和(或)环境管理体系审核指南》"}], "answer": "C", "analysis": ""}, {"question": "下列关于质量认证制度的说法，错误的是（ ）。 的利害关系 立证实和合格评定三个阶段", "options": [{"label": "A", "text": "质量认证是指经权威机构确认，并通过合格证书或合格标志，证明某一产品符合相应标准或规范的活动"}, {"label": "B", "text": "质量认证的对象是产品或过程"}, {"label": "C", "text": "在质量认证活动中，第三方是一个公正的机构，它与第一方、第二方都没任何行政上的隶属关系和经济上"}, {"label": "D", "text": "质量认证是随着工业的发展作为一种外部质量保证的手段逐渐发展起来的，它经历了合格声明、第三方独"}], "answer": "D", "analysis": "在ISO9000族核心标准中，GB/T19000—2008idtISO9000：2005《质量管理体系基础和术语》起着奠\n定理论基础、统一术语概念和明确指导思想的作用，具有很重要的地位。\n2.下列关于质量认证制度的说法，错误的是（ ）。\nA.质量认证是指经权威机构确认，并通过合格证书或合格标志，证明某一产品符合相应标准或规范的活动\nB.质量认证的对象是产品或过程\nC.在质量认证活动中，第三方是一个公正的机构，它与第一方、第二方都没任何行政上的隶属关系和经济上\n的利害关系\nD.质量认证是随着工业的发展作为一种外部质量保证的手段逐渐发展起来的，它经历了合格声明、第三方独\n立证实和合格评定三个阶段"}, {"question": "ISO9000族标准是由ISO发布的，ISO的中文全称是（ ）。", "options": [{"label": "A", "text": "国际标准化组织"}, {"label": "B", "text": "国家标准化组织"}, {"label": "C", "text": "国际质量安全组织"}, {"label": "D", "text": "国家质量安全组织"}], "answer": "A", "analysis": "质量认证是随着工业的发展作为一种外部质量保证的手段逐渐发展起来的，它经历了合格声明、第\n二方合格评定、第三方独立证实、风筝标志和合格评定五个阶段。选项D错误。\n3.ISO9000族标准是由ISO发布的，ISO的中文全称是（ ）。\nA.国际标准化组织\nB.国家标准化组织\nC.国际质量安全组织\nD.国家质量安全组织"}, {"question": "（ ）是英国1903年开始使用的第一个质量标志。", "options": [{"label": "A", "text": "《质量管理体系要求》"}, {"label": "B", "text": "《质量大纲要求》"}, {"label": "C", "text": "ISO9000标准"}, {"label": "D", "text": "风筝标志"}], "answer": "D", "analysis": "国际标准化组织（英文简称ISO）于1979年在ISO全体会议上通过决议，成立质量保证技术委员会\n，1987年更名为质量管理和质量保证技术委员会，负责制定有关质量管理和质量保证方面的国际标准。\n4.（ ）是英国1903年开始使用的第一个质量标志。\nA.《质量管理体系要求》\nB.《质量大纲要求》\nC.ISO9000标准\nD.风筝标志"}, {"question": "下列质量认证类型中，（ ）认证的对象不是产品，而是企业的质量管理体系。", "options": [{"label": "A", "text": "型式试验"}, {"label": "B", "text": "供方质量管理体系评定"}, {"label": "C", "text": "型式试验加认证后监督——供方抽样检验"}, {"label": "D", "text": "型式试验加供方质量管理体系评定再加认证后监督"}], "answer": "B", "analysis": "本题考查质量认证的产生和发展。风筝标志是英国1903年开始使用的第一个质量标志。\n5.下列质量认证类型中，（ ）认证的对象不是产品，而是企业的质量管理体系。\nA.型式试验\nB.供方质量管理体系评定\nC.型式试验加认证后监督——供方抽样检验\nD.型式试验加供方质量管理体系评定再加认证后监督"}, {"question": "下列关于产品质量认证和质量管理体系认证的说法，错误的是（ ）。", "options": [{"label": "A", "text": "企业进行产品质量认证的目的是证明特定的产品符合规定标准的要求"}, {"label": "B", "text": "产品质量认证是第三方依据程序对符合规定要求的产品、过程给予书面保证"}, {"label": "C", "text": "质量认证包括产品质量认证和质量管理体系认证"}, {"label": "D", "text": "质量认证的对象是企业"}], "answer": "D", "analysis": "本题考查质量认证的类型。供方质量管理体系评定这种认证制度的对象不是产品，而是企业的质量\n1\n管理体系，其监督措施也只是定期对质量管理体系进行复查，它发展成了当今的质量管理体系认证。\n6.下列关于产品质量认证和质量管理体系认证的说法，错误的是（ ）。\nA.企业进行产品质量认证的目的是证明特定的产品符合规定标准的要求\nB.产品质量认证是第三方依据程序对符合规定要求的产品、过程给予书面保证\nC.质量认证包括产品质量认证和质量管理体系认证\nD.质量认证的对象是企业"}, {"question": "按规定的试验方法对产品的样品进行试验，以证明样品符合标准或技术规范要求的活动是（ ）。", "options": [{"label": "A", "text": "批量检验"}, {"label": "B", "text": "型式试验"}, {"label": "C", "text": "市场抽样检验"}, {"label": "D", "text": "供方抽样检验"}], "answer": "B", "analysis": "质量管理体系认证又称为质量管理体系评价与注册，是指由权威的、公正的、具有独立第三方法人\n资格的认证机构派出的合格审核员组成的检查组，对申请方质量管理体系的质量保证能力，依据质量管理体\n系要求标准进行检查和评价，对符合标准要求者授予合格证书并予以注册的全部活动。质量认证的对象是产\n品或过程。\n7.按规定的试验方法对产品的样品进行试验，以证明样品符合标准或技术规范要求的活动是（ ）。\nA.批量检验\nB.型式试验\nC.市场抽样检验\nD.供方抽样检验"}, {"question": "关于质量认证的作用，下列说法正确的是（ ）。", "options": [{"label": "A", "text": "有利于企业在激烈的市场竞争中取胜"}, {"label": "B", "text": "有利于企业增强国际市场的竞争能力"}, {"label": "C", "text": "能够促进企业完善质量管理体系"}, {"label": "D", "text": "会增加社会检验费用"}], "answer": "ABCE", "analysis": "型式试验是指按规定的试验方法对产品的样品进行试验，以证明样品符合标准或技术规范的要求。\n多项选择题\n8.关于质量认证的作用，下列说法正确的是（ ）。\nA.有利于企业在激烈的市场竞争中取胜\nB.有利于企业增强国际市场的竞争能力\nC.能够促进企业完善质量管理体系\nD.会增加社会检验费用\nE.有利于保护消费者利益"}, {"question": "ABCE 【解析】（1）企业一旦通过公证机构对其产品或质量管理体系的认证，获取合格证书和标志，并通过注册加 以公布，无疑会相对于未被认证或未注册的企业获得更高的质量信誉优势，从而在激烈的市场竞争中取胜。 （2）有利于企业增强国际市场的竞争能力。（3）促进企业完善质量管理体系。（4）节约大量社会检验费用 。（5）有利于保护消费者利益。所以选择ABCE。 9.下列关于产品质量认证的说法，正确的有（ ）。", "options": [{"label": "A", "text": "产品质量认证可以节约大量社会检查费用"}, {"label": "B", "text": "产品质量认证有利于保护消费者利益"}, {"label": "C", "text": "产品质量认证有利于企业完善质量管理体系"}, {"label": "D", "text": "型式试验是产品质量认证的主要类型之一"}], "answer": "ABCD", "analysis": "（1）企业一旦通过公证机构对其产品或质量管理体系的认证，获取合格证书和标志，并通过注册加\n以公布，无疑会相对于未被认证或未注册的企业获得更高的质量信誉优势，从而在激烈的市场竞争中取胜。\n（2）有利于企业增强国际市场的竞争能力。（3）促进企业完善质量管理体系。（4）节约大量社会检验费用\n。（5）有利于保护消费者利益。所以选择ABCE。\n9.下列关于产品质量认证的说法，正确的有（ ）。\nA.产品质量认证可以节约大量社会检查费用\nB.产品质量认证有利于保护消费者利益\nC.产品质量认证有利于企业完善质量管理体系\nD.型式试验是产品质量认证的主要类型之一\nE.质量认证经历合格声明、第二方合格评定、第三方独立证实、合格评定四个阶段"}, {"question": "第二节 质量管理中的常用技术与质量检测 单项选择题 1.（ ）用以整理质量数据，找出规律，通过对它的观察来分析、判断工序是否处于受控状态，并根据质量 特性的分析结果进行适当地调整，解决其存在的问题。", "options": [{"label": "A", "text": "分层法"}, {"label": "B", "text": "直方图"}, {"label": "C", "text": "排列图"}, {"label": "D", "text": "散布图"}], "answer": "B", "analysis": ""}, {"question": "（ ）适用于质量特性值为计点值和计件值的场合。", "options": [{"label": "A", "text": "理化检验"}, {"label": "B", "text": "抽样检验"}, {"label": "C", "text": "计数检验"}, {"label": "D", "text": "计量检验"}], "answer": "C", "analysis": "本题考查直方图的相关内容。直方图用以整理质量数据，找出规律，通过对它的观察来分析、判断\n工序是否处于受控状态，并根据质量特性的分析结果进行适当的调整，解决存在的问题。\n2.（ ）适用于质量特性值为计点值和计件值的场合。\nA.理化检验\nB.抽样检验\nC.计数检验\nD.计量检验"}, {"question": "按检验对象检验后的状态特征，可将质量检验划分为（ ）。", "options": [{"label": "A", "text": "全数检验和抽样检验"}, {"label": "B", "text": "理化检验和感官检验"}, {"label": "C", "text": "破坏性检验和非破坏性检验"}, {"label": "D", "text": "计数检验和计量检验"}], "answer": "C", "analysis": "本题考查计数检验的适用范围。计数检验适用于质量特性值为计点值和计件值的场合。计量检验适\n用于质量特性值为计量值的场合。\n3.按检验对象检验后的状态特征，可将质量检验划分为（ ）。\nA.全数检验和抽样检验\nB.理化检验和感官检验\nC.破坏性检验和非破坏性检验\nD.计数检验和计量检验"}, {"question": "企业在生产过程中，将产品的两个可能相关的变量数据用点标示在坐标图上，通过观察分析来判断两个变 量之间的关系，以达到质量控制的目的。这种质量控制方法是（ ）。", "options": [{"label": "A", "text": "排列图"}, {"label": "B", "text": "散布图"}, {"label": "C", "text": "因果分析图"}, {"label": "D", "text": "直方图"}], "answer": "B", "analysis": "本题考查质量检验的方式。按检验对象检验后的状态特征，可将质量检验划分为破坏性检验和非破\n坏性检验。\n4.企业在生产过程中，将产品的两个可能相关的变量数据用点标示在坐标图上，通过观察分析来判断两个变\n量之间的关系，以达到质量控制的目的。这种质量控制方法是（ ）。\nA.排列图\nB.散布图\nC.因果分析图\nD.直方图"}, {"question": "在质量管理中，用来整理数据、描述质量特性数据分布状态的质量分析图是（ ）。", "options": [{"label": "A", "text": "关键路线图"}, {"label": "B", "text": "树枝图"}, {"label": "C", "text": "直方图"}, {"label": "D", "text": "因果分析图"}], "answer": "C", "analysis": "散布图又称相关图，是将两个可能相关的变量数据用点画在坐标图上，通过观察分析来判断两个变\n量之间的相关关系。这种情况在实际生产中是常见的。如热处理时淬火温度与工件硬度之间的关系、某种元\n素在材料中的含量与材料强度的关系等。这种关系虽然存在，但难以用精确的公式或函数关系表示，在这种\n情况下用相关图来分析就很方便。\n5.在质量管理中，用来整理数据、描述质量特性数据分布状态的质量分析图是（ ）。\nA.关键路线图\nB.树枝图\nC.直方图\n1\nD.因果分析图"}, {"question": "某部件加工时，设计尺寸为150mm，误差为(+0.28，-0.22)，现通过随机抽样对该工序的工序能力进行评估 ，经过计算，样本平均值和公差中心重合，s=0.083，该工序能力指数是（ ）。", "options": [{"label": "A", "text": "1.2"}, {"label": "B", "text": "1.0"}, {"label": "C", "text": "0.9"}, {"label": "D", "text": "0.7"}], "answer": "B", "analysis": "直方图又称为质量分析图，是由很多直方形连起来的，表示质量数据离散程度的一种图形。直方图\n是用以整理质量数据，找出规律，通过对它的观察来分析、判断工序是否处于受控状态，并根据质量特性的\n分析结果进行适当的调整，解决其存在问题的一种常用的质量管理方法。\n6.某部件加工时，设计尺寸为150mm，误差为(+0.28，-0.22)，现通过随机抽样对该工序的工序能力进行评估\n，经过计算，样本平均值和公差中心重合，s=0.083，该工序能力指数是（ ）。\nA.1.2\nB.1.0\nC.0.9\nD.0.7"}, {"question": "一般情况下，工序能力和产品质量的实际波动成（ ）。", "options": [{"label": "A", "text": "正比"}, {"label": "B", "text": "反比"}, {"label": "C", "text": "不一定"}, {"label": "D", "text": "不相关"}], "answer": "B", "analysis": "7.一般情况下，工序能力和产品质量的实际波动成（ ）。\nA.正比\nB.反比\nC.不一定\nD.不相关"}, {"question": "散布图又叫（ ），是将两个可能相关的变量数据用点画在坐标图上，通过观察分析来判断两个变量之间 的相关关系。", "options": [{"label": "A", "text": "直方图"}, {"label": "B", "text": "因果分析图"}, {"label": "C", "text": "相关图"}, {"label": "D", "text": "排列图"}], "answer": "C", "analysis": "本题考查工序能力的基本概念。一般情况下，工序能力和产品质量的实际波动成反比。\n8.散布图又叫（ ），是将两个可能相关的变量数据用点画在坐标图上，通过观察分析来判断两个变量之间\n的相关关系。\nA.直方图\nB.因果分析图\nC.相关图\nD.排列图"}, {"question": "控制图被用来反映生产过程中工序质量随时间的动态变化，关于控制图法下列说法错误的是（ ）。", "options": [{"label": "A", "text": "控制图又称管理图"}, {"label": "B", "text": "控制图基本可以分为两大类，即计量值控制图和计数值控制图"}, {"label": "C", "text": "单值控制图属于计数值控制图"}, {"label": "D", "text": "控制图用法简单、效果良好且便于掌握"}], "answer": "C", "analysis": "本题考查散布图的概念。散布图又叫相关图，是将两个可能相关的变量数据用点画在坐标图上，通\n过观察分析来判断两个变量之间的相关关系。\n9.控制图被用来反映生产过程中工序质量随时间的动态变化，关于控制图法下列说法错误的是（ ）。\nA.控制图又称管理图\nB.控制图基本可以分为两大类，即计量值控制图和计数值控制图\nC.单值控制图属于计数值控制图\nD.控制图用法简单、效果良好且便于掌握"}, {"question": "下列质量检验活动中，受检物检验后不会被破坏的是（ ）。", "options": [{"label": "A", "text": "检验灯泡的使用寿命"}, {"label": "B", "text": "检验钢材的强度"}, {"label": "C", "text": "检验钢管壁的厚度"}, {"label": "D", "text": "检验轮胎的耐磨性能"}], "answer": "C", "analysis": "本题考查控制图法。选项C错误，计量值控制图一般适用于以长度、强度、纯度等计量值为控制对象\n的情况，属于这种情况的有单值控制图、平均值和极差控制图以及中位数和极差控制图等。\n10.下列质量检验活动中，受检物检验后不会被破坏的是（ ）。\n2\nA.检验灯泡的使用寿命\nB.检验钢材的强度\nC.检验钢管壁的厚度\nD.检验轮胎的耐磨性能"}, {"question": "下列不属于质量检验基本要素的是（ ）。", "options": [{"label": "A", "text": "度量"}, {"label": "B", "text": "鉴别"}, {"label": "C", "text": "判断"}, {"label": "D", "text": "比较"}], "answer": "B", "analysis": "本题考查质量检验的方式。破坏性检验后，受检物的完整性遭到破坏，不再具有原来的使用功能。\n11.下列不属于质量检验基本要素的是（ ）。\nA.度量\nB.鉴别\nC.判断\nD.比较"}, {"question": "按检验方法的特征，可将质量检验划分为（ ）。", "options": [{"label": "A", "text": "计数检验"}, {"label": "B", "text": "理化检验"}, {"label": "C", "tex .市场价格\nD.作业人员"}, {"question": "【不定项选择题】该工序的工序能力指数为（ ）。", "options": [{"label": "A", "text": "0.68"}, {"label": "B", "text": "1.14"}, {"label": "C", "text": "1.48"}, {"label": "D", "text": "1.86"}], "answer": "C", "analysis": "影响工序质量的因素除了系统性因素以外还可能是由人、机器、原料、方法、测量和环境等原因引\n起的偶然性质量波动。结合本题即为生产设备、生产方法、作业人员。\n【题干】某种食品每千克中所含的某食品添加剂不得高于0.01mg，现根据随机抽取的样本进行检测，测得\n：标准差为0.0051mg，s＝0.0011mg。\n根据以上资料，回答下列问题：\n22.【不定项选择题】该工序的工序能力指数为（ ）。\nA.0.68\nB.1.14\nC.1.48\nD.1.86"}, {"question": "【不定项选择题】若需在某道工序中控制该食品的杂质含量，则要求控制该工序的（ ）。", "options": [{"label": "A", "text": "双侧公差"}, {"label": "B", "text": "公差中心"}, {"label": "C", "text": "上限公差"}, {"label": "D", "text": "下限公差"}], "answer": "C", "analysis": "本题考查工序能力指数。Cp＝（0.01－0.0051）÷（3×0.0011）＝1.48。\n23.【不定项选择题】若需在某道工序中控制该食品的杂质含量，则要求控制该工序的（ ）。\nA.双侧公差\nB.公差中心\nC.上限公差\nD.下限公差"}, {"question": "【不定项选择题】该工序的工序能力指数为（ ）。", "options": [{"label": "A", "text": "2.052"}, {"label": "B", "text": "1.635"}, {"label": "C", "text": "1.414"}, {"label": "D", "text": "0.625"}], "answer": "D", "analysis": "本题考查工序能力指数。某些项目只要求控制单向公差，如清洁度、噪声、杂质含量等，仅需控制\n公差上限，其下限为零。而材料的强度、零件的寿命等则要求控制公差下限，上限可认为是无穷大。\n【题干】某型号零件的内径设计尺寸为20mm，公差为（+0.15，-0.15）mm。某道工序承担该零件内径的最后\n加工，现需要通过随机抽样对该工序的工序能力进行评估，共抽取200个样本，经测算，该样本平均值和公差\n中心重合，标准差为0.08mm。\n24.【不定项选择题】该工序的工序能力指数为（ ）。\nA.2.052\nB.1.635\nC.1.414\nD.0.625"}, {"question": "【不定项选择题】若该工序的工序能力指数为1.5，可以判断该工序的工序能力（ ）。", "options": [{"label": "A", "text": "充足"}, {"label": "B", "text": "正常"}, {"label": "C", "text": "不足"}, {"label": "D", "text": "严重不足"}], "answer": "A", "analysis": "25.【不定项选择题】若该工序的工序能力指数为1.5，可以判断该工序的工序能力（ ）。\nA.充足\nB.正常\nC.不足\nD.严重不足"}, {"question": "【不定项选择题】在该型号零件的生产过程中，影响工序质量的因素可能有（ ）。", "options": [{"label": "A", "text": "人"}, {"label": "B", "text": "方法"}, {"label": "C", "text": "价格"}, {"label": "D", "text": "机器"}], "answer": "ABD", "analysis": "根据工序能力指数判断标准，工序能力指数1.67≥CP>1.33为工序能力充足。本题中，工序能力指数\n为1.5，属于一级工序能力，即工序能力充足。\n26.【不定项选择题】在该型号零件的生产过程中，影响工序质量的因素可能有（ ）。\nA.人\nB.方法\nC.价格\nD.机器"}, {"question": "【不定项选择题】若该工序的工序能力指数为0.7，可以采取的措施有（ ）。", "options": [{"label": "A", "text": "提高设备精度"}, {"label": "B", "text": "放宽公差"}, {"label": "C", "text": "提升加工速度"}, {"label": "D", "text": "实行分级筛选"}], "answer": "ABD", "analysis": "影响工序质量的因素主要包括人、机器、原料、方法、测量和环境。\n27.【不定项选择题】若该工序的工序能力指数为0.7，可以采取的措施有（ ）。\nA.提高设备精度\nB.放宽公差\n6\nC.提升加工速度\nD.实行分级筛选"}, {"question": "第五节 安全生产管理 单项选择题 1.《安全生产法》第九十五条规定，生产经营单位的主要负责人未履行《安全生产法》规定的安全生产管理 职责，导致发生 生产安全事故的，由应急管理部门依照下列规定处以罚款。发生一般事故的，处上一年年收入（ ）的罚款 。", "options": [{"label": "A", "text": "20%"}, {"label": "B", "text": "30%"}, {"label": "C", "text": "40%"}, {"label": "D", "text": "60%"}], "answer": "C", "analysis": ""}, {"question": "安全生产的特点的有哪些？", "options": [{"label": "A", "text": "预防性"}, {"label": "B", "text": "长期性"}, {"label": "C", "text": "科学性"}, {"label": "D", "text": "群众性"}], "answer": "ABCD", "analysis": "《安全生产法》第九十五条规定，生产经营单位的主要负责人未履行《安全生产法》规定的安全生\n产管理职责，导致发生\n生产安全事故的，由应急管理部门依照下列规定处以罚款。\n（1）发生一般事故的，处上一年年收入40%的罚款。\n（2）发生较大事故的，处上一年年收人60%的罚款。\n（3）发生重大事故的，处上一年年收入80%的罚款。\n（4）发生特别重大事故的，处上一年年收人100%的罚款。\n多项选择题\n2.安全生产的特点的有哪些？\nA.预防性\nB.长期性\nC.科学性\nD.群众性\nE.综合性"}, {"question": "生产经营单位及其主要负责人、安全生产管理人员如有违法行为，导致发生生产安全事故的，按照《安全 生产法》的规 定，将会承担法律责任。关于生产经营单位的法律责任，下列说法正确的有（ ） E.发生生产安全事故，情节特别严重、影响特别恶劣的，应急管理部门可以按照上述罚款数额的二倍以上四 倍以下对负有责 任的生产经营单位处以罚款。", "options": [{"label": "A", "text": "发生一般事故的，处三十万元以上一百万元以下的罚款。"}, {"label": "B", "text": "发生较大事故的，处一百万元以上二百万元以下的罚款。"}, {"label": "C", "text": "发生重大事故的，处二百万元以上一千万元以下的罚款。"}, {"label": "D", "text": "发生特别重大事故的，处一千万元以上二千万元以下的罚款。"}], "answer": "ABCD", "analysis": "安全生产的特点：\n①预防性。要把安全生产工作做在事故发生之前，发现苗头及时处理，以减小甚至消除损失。\n②长期性。安全意识必须常抓不懈。\n③科学性。安全生产是有一定规律的，偶然往往寓于必然之中。\n④群众性。安全生产涉及广大群众的切身利益，必须发动和依靠群众去做工作。\n3.生产经营单位及其主要负责人、安全生产管理人员如有违法行为，导致发生生产安全事故的，按照《安全\n生产法》的规\n定，将会承担法律责任。关于生产经营单位的法律责任，下列说法正确的有（ ）\nA.发生一般事故的，处三十万元以上一百万元以下的罚款。\nB.发生较大事故的，处一百万元以上二百万元以下的罚款。\nC.发生重大事故的，处二百万元以上一千万元以下的罚款。\nD.发生特别重大事故的，处一千万元以上二千万元以下的罚款。\nE.发生生产安全事故，情节特别严重、影响特别恶劣的，应急管理部门可以按照上述罚款数额的二倍以上四\n倍以下对负有责\n任的生产经营单位处以罚款。"}, {"question": "第四节 产品质量法 单项选择题 1.关于产品质量监督检查制度，下列说法错误的是（ ）。 制度 经过备案的企业标准", "options": [{"label": "A", "text": "为了加强政府对产品质量的宏观管理，掌握重要产品的质量状况，我国于1985年建立了产品质量监督抽查"}, {"label": "B", "text": "国家监督抽查的产品，地方可以另行重复抽查；上级监督抽查的产品，下级可以另行重复抽查"}, {"label": "C", "text": "实施产品质量监督抽查，产品执行的标准包括国家现行的四级标准，即国家标准、行业标准、地方标准、"}, {"label": "D", "text": "《中华人民共和国产品质量法》规定，国家对产品质量实行以抽查为主要方式的监督检查制度"}], "answer": "B", "analysis": ""}, {"question": "重点解决产品质量责任问题，完善我国产品责任的民事赔偿制度，这属于产品质量立法基本原则中的（ ）。", "options": [{"label": "A", "text": "有限范围原则"}, {"label": "B", "text": "奖优罚劣原则"}, {"label": "C", "text": "统一立法、区别管理原则"}, {"label": "D", "text": "实行行政区域统一管理、组织协调的属地化原则"}], "answer": "A", "analysis": "国家监督抽查的产品，地方不得另行重复抽查；上级监督抽查的产品，下级不得另行重复抽查。\n2.重点解决产品质量责任问题，完善我国产品责任的民事赔偿制度，这属于产品质量立法基本原则中的（\n）。\nA.有限范围原则\nB.奖优罚劣原则\nC.统一立法、区别管理原则\nD.实行行政区域统一管理、组织协调的属地化原则"}, {"question": "产品缺陷损害赔偿责任的诉讼时效为（ ）。", "options": [{"label": "A", "text": "1年"}, {"label": "B", "text": "2年"}, {"label": "C", "text": "3年"}, {"label": "D", "text": "4年"}], "answer": "B", "analysis": "本题考查产品质量立法的基本原则。有限范围原则即《产品质量法》主要调整产品在生产、销售以\n及对产品质量实施监督管理活动中发生的权利、义务、责任关系。重点解决产品质量责任问题，完善我国产\n品责任的民事赔偿制度。\n3.产品缺陷损害赔偿责任的诉讼时效为（ ）。\nA.1年\nB.2年\nC.3年\nD.4年"}, {"question": "下列关于产品质量监督检查制度的说法，错误的是（ ）。", "options": [{"label": "A", "text": "检验部门可向被检查人收取适当的检验费用"}, {"label": "B", "text": "抽查工作可以由国务院市场监督管理部门规划和组织"}, {"label": "C", "text": "检验抽取样本数量不得超过检验的合理需要"}, {"label": "D", "text": "国家监督抽查的产品，地方不得另行重复抽查"}], "answer": "A", "analysis": "本题考查《产品质量法》的民事责任。产品缺陷损害赔偿责任的诉讼时效为2年。\n4.下列关于产品质量监督检查制度的说法，错误的是（ ）。\nA.检验部门可向被检查人收取适当的检验费用\nB.抽查工作可以由国务院市场监督管理部门规划和组织\nC.检验抽取样本数量不得超过检验的合理需要\nD.国家监督抽查的产品，地方不得另行重复抽查"}, {"question": "《中华人民共和国产品质量法》在（ ）年经第七届全国人民代表大会常务委员会第三十次会议审议通过 ，并于（ ）年起施行。", "options": [{"label": "A", "text": "1993，1993"}, {"label": "B", "text": "1993，1994"}, {"label": "C", "text": "1992，1993"}, {"label": "D", "text": "1994，1994"}], "answer": "A", "analysis": "检验抽取样品的数量不得超过检验的合理需要，并不得向被检查人收取检验费用。选项A错误。\n5.《中华人民共和国产品质量法》在（ ）年经第七届全国人民代表大会常务委员会第三十次会议审议通过\n，并于（ ）年起施行。\nA.1993，1993\nB.1993，1994\nC.1992，1993\nD.1994，1994"}, {"question": "《产品质量法》的基本内容是（ ）。", "options": [{"label": "A", "text": "产品质量监督管理和产品质量责任"}, {"label": "B", "text": "产品质量监督管理和产品质量义务"}, {"label": "C", "text": "产品质量责任和产品质量义务"}, {"label": "D", "text": "产品分子量立法的基本原则和产品质量责任"}], "answer": "A", "analysis": "本题考查产品质量法概述。《中华人民共和国产品质量法》在1993年2月22日经第七届全国人民代表\n大会常务委员会第三十次会议审议通过，并于1993年9月1日起施行。\n6.《产品质量法》的基本内容是（ ）。\nA.产品质量监督管理和产品质量责任\nB.产品质量监督管理和产品质量义务\nC.产品质量责任和产品质量义务\nD.产品分子量立法的基本原则和产品质量责任"}, {"question": "《产品质量法》适用的产品范围是以（ ）为目的，通过工业加工、手工制作等生产方式所获得的具有特 定使用性能的产品。", "options": [{"label": "A", "text": "盈利"}, {"label": "B", "text": "检验"}, {"label": "C", "text": "质量"}, {"label": "D", "text": "销售"}], "answer": "D", "analysis": "本题考查《产品质量法》的内容体系。产品质量监督管理和产品质量责任是《产品质量法》的基本\n内容。\n7.《产品质量法》适用的产品范围是以（ ）为目的，通过工业加工、手工制作等生产方式所获得的具有特\n定使用性能的产品。\nA.盈利\nB.检验\nC.质量\nD.销售"}, {"question": "《产品质量法》规定的产品质量责任是一种综合责任，包括应当依法承担的（ ）。", "options": [{"label": "A", "text": "民事责任"}, {"label": "B", "text": "行政责任"}, {"label": "C", "text": "刑事责任"}, {"label": "D", "text": "担保责任"}], "answer": "ABC", "analysis": "《产品质量法》适用的产品范围是以销售为目的，通过工业加工、手工制作等生产方式所获得的具\n有特定使用性能的产品，即指用于销售的经过加工制作的工业产品、手工业产品和农产品，包括建设工程中\n使用的建筑材料、建筑构配件和设备。\n多项选择题\n8.《产品质量法》规定的产品质量责任是一种综合责任，包括应当依法承担的（ ）。\nA.民事责任\nB.行政责任\nC.刑事责任\nD.担保责任\nE.损害赔偿责任"}, {"question": "产品缺陷损害赔偿责任中，承担责任的条件有（ ）。", "options": [{"label": "A", "text": "产品存在缺陷"}, {"label": "B", "text": "发生了因产品缺陷造成的损害"}, {"label": "C", "text": "产品缺陷与损害事实存在因果关系"}, {"label": "D", "text": "产品不具备应当具备的使用性能，且事先未声明"}], "answer": "ABC", "analysis": "本题考查产品质量责任。《产品质量法》规定的产品质量责任是一种综合责任，包括应当依法承担\n的民事责任、行政责任和刑事责任。\n9.产品缺陷损害赔偿责任中，承担责任的条件有（ ）。\nA.产品存在缺陷\nB.发生了因产品缺陷造成的损害\nC.产品缺陷与损害事实存在因果关系\nD.产品不具备应当具备的使用性能，且事先未声明\nE.产品不符合明示的质量状况"}], "第七节 财务管理概述": [{"question": "第一节 财务管理概述 单项选择题 1.甲公司联合其他两家公司共同出资1000万元发起设立有限责任公司乙公司，三家股东实缴的出资额形成乙 公司的（ ）。", "options": [{"label": "A", "text": "实收资本"}, {"label": "B", "text": "短期负债"}, {"label": "C", "text": "营业收入"}, {"label": "D", "text": "长期负债"}], "answer": "A", "analysis": ""}, {"question": "没有考虑到投入产出关系是企业财务管理（ ）目标的缺点。", "options": [{"label": "A", "text": "每股收益最大化"}, {"label": "B", "text": "利润最大化"}, {"label": "C", "text": "股东财富最大化"}, {"label": "D", "text": "企业价值最大化"}], "answer": "B", "analysis": "企业与股东之间的财务关系是资本收益分配关系。股东依法向企业投入资金，形成企业股本或实收\n资本，企业则向股东支付股利和承担资本保值增值责任。\n2.没有考虑到投入产出关系是企业财务管理（ ）目标的缺点。\nA.每股收益最大化\nB.利润最大化\nC.股东财富最大化\nD.企业价值最大化"}, {"question": "在各种财务预算的方法中，（ ）是在成本性态分析的基础上，依据业务量、成本和利润之间的联动关系 ，按照预算内可能的一系列业务量水平编制的系列预算方法。", "options": [{"label": "A", "text": "零基预算法"}, {"label": "B", "text": "滚动预算法"}, {"label": "C", "text": "定期预算法"}, {"label": "D", "text": "弹性预算法"}], "answer": "D", "analysis": "利润最大化的目标没有考虑到投入与产出的关系。不同的投资额可能产生相同或不同的利润。资金\n的使用是有成本的，仅以利润最大化为目标不能将投入和产出联系起来综合比较，不符合成本效益原则。\n3.在各种财务预算的方法中，（ ）是在成本性态分析的基础上，依据业务量、成本和利润之间的联动关系\n，按照预算内可能的一系列业务量水平编制的系列预算方法。\nA.零基预算法\nB.滚动预算法\nC.定期预算法\nD.弹性预算法"}, {"question": "（ ）是指投资者为了实现其预期的投资目标，运用一定的科学理论、方法和手段.通过一定的程序对投资 的必要性、投资目标、投资规模、投资结构、投资成本与收益等投资问题所进行的分析、判断和方案选择。", "options": [{"label": "A", "text": "筹资决策"}, {"label": "B", "text": "经营决策"}, {"label": "C", "text": "利润分配决策"}, {"label": "D", "text": "投资决策"}], "answer": "D", "analysis": "弹性预算法又称动态预算法，是在成本性态分析的基础上，依据业务量、成本和利润之间的联动关系，按照\n预算期内可能的一系列业务量水平编制的系列预算方法；零基预算法是\"以零为基础编制预算\"的方法；定期\n预算法是以固定不变的会计期间作为预算期间编制预算的方法；滚动预算法又称连续预算法，是在上期预算\n完成情况的基础上，调整和编制下期预算，并将预算期间逐期连续向后推移，使预算期间保持一定的时期跨\n度的一种方法。因此选D\n4.（ ）是指投资者为了实现其预期的投资目标，运用一定的科学理论、方法和手段.通过一定的程序对投资\n的必要性、投资目标、投资规模、投资结构、投资成本与收益等投资问题所进行的分析、判断和方案选择。\nA.筹资决策\nB.经营决策\nC.利润分配决策\nD.投资决策"}, {"question": "按我国现行公司法规定，税后利润按（ ）比例提取法定公积金。", "options": [{"label": "A", "text": "5%"}, {"label": "B", "text": "15%"}, {"label": "C", "text": "10%"}, {"label": "D", "text": "12%"}], "answer": "C", "analysis": "投资决策是指投资者为了实现其预期的投资目标，运用一定的科学理论、方法和手段，通过一定的\n程序对投资的必要性、投资目标、投资规模、投资结构、投资成本与收益等经济活动中的重大问题所进行的\n分析、判断和方案选择。筹资决策是指为满足企业融资的需要，对筹资渠道、筹资方式、筹资数量、筹资风\n险等进行评价和选择，基本思想是平衡资本成本和筹资风险后安排资金来源的最佳结构。股利分配决策，是\n1\n企业对有关股利分配事项的决策。\n5.按我国现行公司法规定，税后利润按（ ）比例提取法定公积金。\nA.5%\nB.15%\nC.10%\nD.12%"}, {"question": "既考虑到资金的时间价值，又能够兼顾企业各相关利益的理财目标是（ ）。", "options": [{"label": "A", "text": "股东财富最大化"}, {"label": "B", "text": "企业价值最大化"}, {"label": "C", "text": "利润最大化"}, {"label": "D", "text": "权益资本净利率最大化"}], "answer": "B", "analysis": "本题考查财务活动的相关内容。按我国现行公司法规定，税后利润的分配顺序依次为按10%比例提取\n法定公积金、提取任意公积金、向股东（投资者）支付股利（分配利润）。\n6.既考虑到资金的时间价值，又能够兼顾企业各相关利益的理财目标是（ ）。\nA.股东财富最大化\nB.企业价值最大化\nC.利润最大化\nD.权益资本净利率最大化"}, {"question": "根据采购合同，A公司财务部门支付给B公司原材料采购款50万元，该财务活动是（ ）活动。", "options": [{"label": "A", "text": "资金运营"}, {"label": "B", "text": "投资"}, {"label": "C", "text": "筹资"}, {"label": "D", "text": "分配"}], "answer": "A", "analysis": "股东财富最大化忽略了其他利益相关者的利益，利润最大化忽视了资金的时间价值，而权益资本净\n利率最大化没有考虑时间价值和风险。\n7.根据采购合同，A公司财务部门支付给B公司原材料采购款50万元，该财务活动是（ ）活动。\nA.资金运营\nB.投资\nC.筹资\nD.分配"}, {"question": "如果以股东财富最大化为理财目标，则应以（ ）作为财务管理工作的出发点和归宿。", "options": [{"label": "A", "text": "利润最大化"}, {"label": "B", "text": "每股收益最大化"}, {"label": "C", "text": "股票市值最大化"}, {"label": "D", "text": "企业价值最大化"}], "answer": "C", "analysis": "资金运营活动是指企业的日常生产经营活动发生各种各样的资金收支。企业经营过程中产生的资金\n收支，属于企业经营引起的财务活动。\n8.如果以股东财富最大化为理财目标，则应以（ ）作为财务管理工作的出发点和归宿。\nA.利润最大化\nB.每股收益最大化\nC.股票市值最大化\nD.企业价值最大化"}, {"question": "以（ ）为目标的优点是有利于资源的合理配置，有利于经济效益的提高。", "options": [{"label": "A", "text": "利润最大化"}, {"label": "B", "text": "每股收益最大化"}, {"label": "C", "text": "企业价值最大化"}, {"label": "D", "text": "股东财富最大化"}], "answer": "A", "analysis": "股东财富最大化认为股东是企业的所有者，也是企业经营风险的最终承担者，因此，股东财富最大\n化是财务管理的最终目标。在股份公司中，股东财富由其所拥有的股票数量和市场价格两方面决定。在股票\n数量一定时，当股票价格达到最高时，则股东财富也达到最大。因此，股东财富最大化也可以理解为股票价\n格或股票市值最大化。\n9.以（ ）为目标的优点是有利于资源的合理配置，有利于经济效益的提高。\nA.利润最大化\nB.每股收益最大化\nC.企业价值最大化\nD.股东财富最大化"}, {"question": "协调各方利益，将各利益相关者的目标都折中为企业的长期稳定发展和企业总体价值的不断增长，这是把 （ ）作为企业财务管理目标。", "options": [{"label": "A", "text": "利润最大化"}, {"label": "B", "text": "每股收益最大化"}, {"label": "C", "text": "净资产收益最大化"}, {"label": "D", "text": "企业价值最大化"}], "answer": "D", "analysis": "本题考查利润最大化的优点。以利润最大化为目标的优点是：企业追求利润最大化有利于资源的合\n理配置，有利于经济效益的提高。\n10.协调各方利益，将各利益相关者的目标都折中为企业的长期稳定发展和企业总体价值的不断增长，这是把\n（ ）作为企业财务管理目标。\nA.利润最大化\nB.每股收益最大化\nC.净资产收益最大化\nD.企业价值最大化"}, {"question": "企业与（ ）之间的财务关系是强制性分配关系。", "options": [{"label": "A", "text": "股东"}, {"label": "B", "text": "债务人"}, {"label": "C", "text": "政府"}, {"label": "D", "text": "员工"}], "answer": "C", "analysis": "本题考查企业价值最大化。企业价值最大化：只有协调各方利益，将各利益相关者的目标都折中为\n企业的长期稳定发展和企业总体价值的不断增长，才能使各方获利。\n11.企业与（ ）之间的财务关系是强制性分配关系。\nA.股东\nB.债务人\nC.政府\nD.员工"}, {"question": "甲公司2016年实现税后利润2000万元，依次按10%的比例提取法定盈余公积金、提取任意盈余公积金、向 股东支付股利，该项财务活动属于（ ）。", "options": [{"label": "A", "text": "筹资活动"}, {"label": "B", "text": "投资活动"}, {"label": "C", "text": "资金营运活动"}, {"label": "D", "text": "利润分配活动"}], "answer": "D", "analysis": "本题考查财务关系。企业与政府之间的财务关系是强制性分配关系。\n12.甲公司2016年实现税后利润2000万元，依次按10%的比例提取法定盈余公积金、提取任意盈余公积金、向\n股东支付股利，该项财务活动属于（ ）。\nA.筹资活动\nB.投资活动\nC.资金营运活动\nD.利润分配活动"}, {"question": "（ ）又称调整预算法，是以基期水平为基础，分析预算期业务量水平及有关影响因素的变动情况，通过 调整基期项目及数额，编制相关预算的方法。", "options": [{"label": "A", "text": "固定预算法"}, {"label": "B", "text": "滚动预算法"}, {"label": "C", "text": "增量预算法"}, {"label": "D", "text": "弹性预算法"}], "answer": "C", "analysis": "本题考查财务活动。利润分配活动：企业取得的收入，首先要弥补生产经营耗费及损失，缴纳流转\n税及附加费，余下部分加上投资收益为企业营业利润，营业利润加上营业外收支净额构成企业的利润总额。\n利润总额首先要按国家规定缴纳企业所得税，税后余额称为净利润或税后利润。按我国现行公司法规定，税\n后利润的分配顺序依次为按10%比例提取法定公积金、提取任意公积金、向股东（投资者）支付股利（分配利\n润）。\n13.（ ）又称调整预算法，是以基期水平为基础，分析预算期业务量水平及有关影响因素的变动情况，通过\n调整基期项目及数额，编制相关预算的方法。\nA.固定预算法\nB.滚动预算法\nC.增量预算法\nD.弹性预算法"}, {"question": "采用（ ）在编制费用预算时，不考虑以往期间的费用项目和费用数额，主要根据预算期的需要和可能情 况分析费用项目和费用数额的合理性，综合平衡编制费用预算。", "options": [{"label": "A", "text": "固定预算法"}, {"label": "B", "text": "零基预算法"}, {"label": "C", "text": "定期预算法"}, {"label": "D", "text": "滚动预算法"}], "answer": "B", "analysis": "本题考查增量预算法的概念。增量预算法又称调整预算法，是以基期水平为基础，分析预算期业务\n量水平及有关影响因素的变动情况，通过调整基期项目及数额，编制相关预算的方法。\n14.采用（ ）在编制费用预算时，不考虑以往期间的费用项目和费用数额，主要根据预算期的需要和可能情\n况分析费用项目和费用数额的合理性，综合平衡编制费用预算。\n3\nA.固定预算法\nB.零基预算法\nC.定期预算法\nD.滚动预算法"}, {"question": "财务预算的方法中，（ ）存在适用性差和可比性差的缺点。", "options": [{"label": "A", "text": "滚动预算法"}, {"label": "B", "text": "弹性预算法"}, {"label": "C", "text": "固定预算法"}, {"label": "D", "text": "定期预算法"}], "answer": "C", "analysis": "本题考查零基预算法的内容。采用零基预算法在编制费用预算时，不考虑以往期间的费用项目和费\n用数额，主要根据预算期的需要和可能情况分析费用项目和费用数额的合理性，综合平衡编制费用预算。\n15.财务预算的方法中，（ ）存在适用性差和可比性差的缺点。\nA.滚动预算法\nB.弹性预算法\nC.固定预算法\nD.定期预算法"}, {"question": "在上期预算完成情况的基础上，调整和编制下期预算，并将预算期间逐期连续向后推移，使预算期间保持 一定的时期跨度的财务预算方法是（ ）。", "options": [{"label": "A", "text": "定期预算法"}, {"label": "B", "text": "增量预算法"}, {"label": "C", "text": "滚动预算法"}, {"label": "D", "text": "弹性预算法"}], "answer": "C", "analysis": "本题考查固定预算法的缺点。固定预算法存在适用性差和可比性差的缺点。\n16.在上期预算完成情况的基础上，调整和编制下期预算，并将预算期间逐期连续向后推移，使预算期间保持\n一定的时期跨度的财务预算方法是（ ）。\nA.定期预算法\nB.增量预算法\nC.滚动预算法\nD.弹性预算法"}, {"question": "用销售百分比法进行财务预测的假设条件是（ ）与销售收入存在稳定的百分比关系。", "options": [{"label": "A", "text": "销售成本"}, {"label": "B", "text": "资产、负债"}, {"label": "C", "text": "股东权益"}, {"label": "D", "text": "营业成本"}], "answer": "B", "analysis": "本题考查滚动预算法的概念。滚动预算法又称连续预算法，是在上期预算完成情况的基础上，调整\n和编制下期预算，并将预算期间逐期连续向后推移，使预算期间保持一定的时期跨度。\n17.用销售百分比法进行财务预测的假设条件是（ ）与销售收入存在稳定的百分比关系。\nA.销售成本\nB.资产、负债\nC.股东权益\nD.营业成本"}, {"question": "企业财务活动是指资金的筹集、投放、使用、收回及分配等一系列（ ）活动的总称。", "options": [{"label": "A", "text": "企业价值管理"}, {"label": "B", "text": "企业资金收支"}, {"label": "C", "text": "企业生产经营"}, {"label": "D", "text": "企业财务会计"}], "answer": "B", "analysis": "财务计划的基础是财务预测。狭义的财务预测仅指估计企业未来的筹资需求；广义的财务预测包括\n编制全部的预计财务报表。财务预测的主要方法是销售百分比法。销售百分比法是假定资产、负债与销售收\n入存在稳定的百分比关系，根据预计销售收入和相应的百分比测算各类资产及总资产、各类负债及总负债\n，然后确定筹资计划的一种财务预测和计划方法。\n18.企业财务活动是指资金的筹集、投放、使用、收回及分配等一系列（ ）活动的总称。\nA.企业价值管理\nB.企业资金收支\nC.企业生产经营\nD.企业财务会计"}, {"question": "财务管理环节是企业财务管理的工作步骤与一般工作程序，企业财务管理主要包括（ ）。", "options": [{"label": "A", "text": "财务计划与决策环节"}, {"label": "B", "text": "财务预算与控制环节"}, {"label": "C", "text": "财务分析与考核环节"}, {"label": "D", "text": "财务风险分析与管理环节"}], "answer": "ABC", "analysis": "企业财务活动是指资金的筹集、投放、使用、收回和分配等一系列企业资金收支活动的总称。\n多项选择题\n4\n19.财务管理环节是企业财务管理的工作步骤与一般工作程序，企业财务管理主要包括（ ）。\nA.财务计划与决策环节\nB.财务预算与控制环节\nC.财务分析与考核环节\nD.财务风险分析与管理环节\nE.财务筹资管理与预算环节"}, {"question": "下列企业财务活动中，属于筹资活动的有（ ）。", "options": [{"label": "A", "text": "缴纳所得税"}, {"label": "B", "text": "支付股利"}, {"label": "C", "text": "支付利息"}, {"label": "D", "text": "支付工资"}], "answer": "BC", "analysis": "财务管理环节是企业财 "}, {"question": "下列关于作业成本法的说法，错误的是（ ）。 析作业、改进作业，为企业增加价值的新型战略成本管理方法 ，而作业动因反映产品产量与作业成本之间的因果关系", "options": [{"label": "A", "text": "作业成本法是以作业为中心，通过对作业及作业成本的确认、计量、分析和管理，最终计算产品成本，分"}, {"label": "B", "text": "在作业成本法下，成本动因可以分为资源动因和作业动因。资源动因反映作业量与耗费之间的因果关系"}, {"label": "C", "text": "作业成本法的一个突出特点是强调以直接追溯或动因追溯的方式计入产品成本，而尽量避免分摊方式"}, {"label": "D", "text": "在作业成本法下，成本的计算分为三个阶段"}], "answer": "D", "analysis": "本题考查半变动成本的含义。半变动成本是指在初始的基础上随产量正比例增长的成本。\n9.下列关于作业成本法的说法，错误的是（ ）。\nA.作业成本法是以作业为中心，通过对作业及作业成本的确认、计量、分析和管理，最终计算产品成本，分\n析作业、改进作业，为企业增加价值的新型战略成本管理方法\nB.在作业成本法下，成本动因可以分为资源动因和作业动因。资源动因反映作业量与耗费之间的因果关系\n，而作业动因反映产品产量与作业成本之间的因果关系\nC.作业成本法的一个突出特点是强调以直接追溯或动因追溯的方式计入产品成本，而尽量避免分摊方式\nD.在作业成本法下，成本的计算分为三个阶段"}, {"question": "下列不属于管理费用的是（ ）。", "options": [{"label": "A", "text": "工会经费"}, {"label": "B", "text": "咨询费"}, {"label": "C", "text": "业务招待费"}, {"label": "D", "text": "运输费"}], "answer": "D", "analysis": "在作业成本法下，成本计算分为两个阶段。第一阶段是将作业执行中耗费的资源追溯到作业，计算\n作业的成本并根据作业动因计算作业成本分配率；第二阶段是根据第一阶段计算的作业成本分配率和产品所\n耗费作业的数量，将作业成本追溯到各有关产品。\n10.下列不属于管理费用的是（ ）。\nA.工会经费\nB.咨询费\nC.业务招待费\nD.运输费\n2"}, {"question": "成本费用按成本性态可分为（ ）。", "options": [{"label": "A", "text": "制造成本"}, {"label": "B", "text": "变动成本"}, {"label": "C", "text": "混合成本"}, {"label": "D", "text": "固定成本"}], "answer": "BCD", "analysis": "管理费用是指企业行政部门为组织和管理企业生产经营所发生的各项费用，包括企业的董事会和行\n政管理部门在企业的经营管理中发生的，或者应由企业统一负担的公司经费、工会经费、咨询费、诉讼费、\n业务招待费等。运输费属于销售费用。\n多项选择题\n11.成本费用按成本性态可分为（ ）。\nA.制造成本\nB.变动成本\nC.混合成本\nD.固定成本\nE.管理费用"}, {"question": "作业成本控制法认为，将成本分配到成本对象的形式有（ ）。", "options": [{"label": "A", "text": "直接追溯法"}, {"label": "B", "text": "配比法"}, {"label": "C", "text": "综合法"}, {"label": "D", "text": "分摊法"}], "answer": "ADE", "analysis": "成本费用按成本性态可分为固定成本、变动成本和混合成本，所以为BCD\n12.作业成本控制法认为，将成本分配到成本对象的形式有（ ）。\nA.直接追溯法\nB.配比法\nC.综合法\nD.分摊法\nE.动因追溯法"}, {"question": "ADE 【解析】本题考查作业成本控制法。作业成本控制法认为，将成本分配到成本对象有三种不同的形式：直接 追溯、动因追溯和分摊。 13.销售费用包括（ ）。", "options": [{"label": "A", "text": "装卸费"}, {"label": "B", "text": "工会经费"}, {"label": "C", "text": "包装费"}, {"label": "D", "text": "保险费"}], "answer": "ACD", "analysis": "本题考查作业成本控制法。作业成本控制法认为，将成本分配到成本对象有三种不同的形式：直接\n追溯、动因追溯和分摊。\n13.销售费用包括（ ）。\nA.装卸费\nB.工会经费\nC.包装费\nD.保险费\nE.咨询费"}, {"question": "【不定项选择题】根据已知数据，M公司可采用（ ）对成本费用进行定量控制。", "options": [{"label": "A", "text": "标准成本控制法"}, {"label": "B", "text": "责任成本控制法"}, {"label": "C", "text": "作业成本控制法"}, {"label": "D", "text": "目标成本控制法"}], "answer": "A", "analysis": "本题考查销售费用的内容。销售费用是指企业在销售产品、自制半成品、材料和提供劳务等过程中\n发生的费用。主要包括运输费、装卸费、包装费、委托代销手续费、保险费、办公费、折旧费、展览费和广\n告费，以及为销售本企业商品而专设的销售机构的职工薪酬费和业务费等。\n共享题干题\n【题干】M公司用甲材料生产A产品，甲材料标准价格是100元/千克，用量标准为5千克/件。M公司所生产的\nA产品标准工资率为20元/小时，工时标准为1小时/件。假定本月投产A产品10000件，耗用甲材料60000千克\n，其实际价格为110元/千克，实际支付直接工人工资14万元。同时，M公司按经济用途对生产费用和期间费用\n进行了严格的区分和管理，从而有效提升了公司的盈利水平。\n14.【不定项选择题】根据已知数据，M公司可采用（ ）对成本费用进行定量控制。\nA.标准成本控制法\nB.责任成本控制法\nC.作业成本控制法\n3\nD.目标成本控制法"}, {"question": "【不定项选择题】M公司生产A产品所耗用甲材料的直接材料成本差异是（ ）万元。", "options": [{"label": "A", "text": "100"}, {"label": "B", "text": "120"}, {"label": "C", "text": "150"}, {"label": "D", "text": "160"}], "answer": "D", "analysis": "标准成本控制是以预先制定的标准成本为基础，将实际成本与标准成本进行对比，核算和分析成本\n差异，进而采取措施，对成本进行有效控制的管理方法。\n15.【不定项选择题】M公司生产A产品所耗用甲材料的直接材料成本差异是（ ）万元。\nA.100\nB.120\nC.150\nD.160"}, {"question": "【不定项选择题】如果M公司采用作业成本控制法进行成本费用控制，将成本分配到成本对象的形式是 （ ）。", "options": [{"label": "A", "text": "间接追溯"}, {"label": "B", "text": "直接追溯"}, {"label": "C", "text": "动因追溯"}, {"label": "D", "text": "责任追溯"}], "answer": "BC", "analysis": "成本差异是指实际产量下实际总成本与实际产量下标准总成本之间的差异。公式为：成本差异=实际\n产量下实际总成本-实际产量下标准总成本。故本题中，成本差异=60000÷10000×110-\n10000×100×5÷10000=160（万元）。\n16.【不定项选择题】如果M公司采用作业成本控制法进行成本费用控制，将成本分配到成本对象的形式是\n（ ）。\nA.间接追溯\nB.直接追溯\nC.动因追溯\nD.责任追溯"}, {"question": "【不定项选择题】下列M公司的成本费用中，属于期间费用的是（ ）。", "options": [{"label": "A", "text": "直接材料费用"}, {"label": "B", "text": "销售费用"}, {"label": "C", "text": "直接人工费用"}, {"label": "D", "text": "财务费用"}], "answer": "BD", "analysis": "作业成本控制法认为，将成本分配到成本对象有三种不同形式，即直接追溯、动因追溯和分摊。作\n业成本法的一个突出特点，就是强调以直接追溯或动因追溯的方式计入产品成本，而尽量避免分摊方式，即\n作业成本法的成本分配主要使用直接追溯和动因追溯。\n17.【不定项选择题】下列M公司的成本费用中，属于期间费用的是（ ）。\nA.直接材料费用\nB.销售费用\nC.直接人工费用\nD.财务费用"}, {"question": "第二节 财务管理的内容 单项选择题 1.下列筹资工具中，发行企业可能在债券筹资基础上同时实现普通股筹资的是（ ）。", "options": [{"label": "A", "text": "可转换债券"}, {"label": "B", "text": "认股权证"}, {"label": "C", "text": "分离交易可转债"}, {"label": "D", "text": "长期债券"}], "answer": "C", "analysis": ""}, {"question": "（ ）是指企业依照债券发行协议通过发售债券直接筹资，形成企业债务资本的筹资方式。", "options": [{"label": "A", "text": "银行借款"}, {"label": "B", "text": "发行短期融资券"}, {"label": "C", "text": "发行债券"}, {"label": "D", "text": "吸收直接投资"}], "answer": "C", "analysis": "分离交易可转债是附有认股权证并与认股权证分离交易的公司债券。如果认股权证持有人行权认购\n发行公司的普通股，则发行者在发行债券筹资的基础上，又实现了普通股筹资。\n2.（ ）是指企业依照债券发行协议通过发售债券直接筹资，形成企业债务资本的筹资方式。\nA.银行借款\nB.发行短期融资券\nC.发行债券\nD.吸收直接投资"}, {"question": "公司法定公积金累计额为公司注册资本的（ ）以上的，可以不再提取法定公积金。", "options": [{"label": "A", "text": "20%"}, {"label": "B", "text": "30%"}, {"label": "C", "text": "50%"}, {"label": "D", "text": "60%"}], "answer": "C", "analysis": "本题考查发行债券的概念。发行债券是指企业依照债券发行协议通过发售债券直接筹资，形成企业\n债务资本的筹资方式。\n3.公司法定公积金累计额为公司注册资本的（ ）以上的，可以不再提取法定公积金。\nA.20%\nB.30%\nC.50%\nD.60%"}, {"question": "公司取得利润后，首先向国家上交（ ）。", "options": [{"label": "A", "text": "剩余公积金"}, {"label": "B", "text": "资本公积金"}, {"label": "C", "text": "法定公积金"}, {"label": "D", "text": "企业所得税"}], "answer": "D", "analysis": "本题考查利润分配的顺序。公司分配当年税后利润时，应当按当年税后利润（假设年初不存在累计\n亏损）的10％提取法定公积金，公司法定公积金累计额为公司注册资本的50％以上的，可以不再提取。\n4.公司取得利润后，首先向国家上交（ ）。\nA.剩余公积金\nB.资本公积金\nC.法定公积金\nD.企业所得税"}, {"question": "根据我国现金管理规定，企业的库存的现金一般以（ ）天的零星开支为限。", "options": [{"label": "A", "text": "1-3"}, {"label": "B", "text": "3-5"}, {"label": "C", "text": "5-7"}, {"label": "D", "text": "7-9"}], "answer": "B", "analysis": "本题考查利润分配的顺序。公司取得利润后首先应按规定上交企业所得税，余额为税后利润。\n5.根据我国现金管理规定，企业的库存的现金一般以（ ）天的零星开支为限。\nA.1-3\nB.3-5\nC.5-7\nD.7-9"}, {"question": "假设某公司给客户开出的信用条件是“5/10，n/60”，则表示客户若享受折扣，必须在（ ）天内付清款 项。", "options": [{"label": "A", "text": "5"}, {"label": "B", "text": "10"}, {"label": "C", "text": "60"}, {"label": "D", "text": "65"}], "answer": "B", "analysis": "本题考查国家对现金管理的明确规定。库存的现金一般以3-5天的零星开支为限。\n1\n6.假设某公司给客户开出的信用条件是“5/10，n/60”，则表示客户若享受折扣，必须在（ ）天内付清款\n项。\nA.5\nB.10\nC.60\nD.65"}, {"question": "国有企业的主要资金来源是（ ）。", "options": [{"label": "A", "text": "政府财政资金"}, {"label": "B", "text": "银行信贷资金"}, {"label": "C", "text": "非银行金融机构资本"}, {"label": "D", "text": "企业自留资本"}], "answer": "A", "analysis": "信用条件的表示方式是“5/10，n/60”，其含义是：如果客户在开出发票的10天付款，享受5％的折\n扣；如果客户放弃现金折扣，全部款项必须在60天内付清。因此，如果客户想要享受折扣，需要在10天内付\n清账款。\n7.国有企业的主要资金来源是（ ）。\nA.政府财政资金\nB.银行信贷资金\nC.非银行金融机构资本\nD.企业自留资本"}, {"question": "企业通过赊购或预收货款等商品交易行为获得短期债务资本的筹资方式是（ ）。", "options": [{"label": "A", "text": "租赁筹资"}, {"label": "B", "text": "银行借款"}, {"label": "C", "text": "发行短期融资券"}, {"label": "D", "text": "商业信用"}], "answer": "D", "analysis": "本题考查筹资渠道。政府财政资金是国有企业的主要资金来源。\n8.企业通过赊购或预收货款等商品交易行为获得短期债务资本的筹资方式是（ ）。\nA.租赁筹资\nB.银行借款\nC.发行短期融资券\nD.商业信用"}, {"question": "下列各项中流动性最好的资产是（ ）。", "options": [{"label": "A", "text": "存货"}, {"label": "B", "text": "现金"}, {"label": "C", "text": "应收账款"}, {"label": "D", "text": "可交易金融资产"}], "answer": "B", "analysis": "本题考查商业信用的概念。商业信用是指企业通过赊购或预收货款等商品交易行为获得短期债务资\n本的筹资方式。\n9.下列各项中流动性最好的资产是（ ）。\nA.存货\nB.现金\nC.应收账款\nD.可交易金融资产"}, {"question": "假设某公司给客户开出的信用条件是“5/10，n/30”，说明客户若欲享受5％的折扣，则必须在（ ）日 内付款。", "options": [{"label": "A", "text": "5"}, {"label": "B", "text": "10"}, {"label": "C", "text": "30"}, {"label": "D", "text": "40"}], "answer": "B", "analysis": "本题考查营运资本管理。现金是流动性最好的资产，但过量持有现金会发生机会成本，增加管理成\n本，降低整体资产的收益率水平。\n10.假设某公司给客户开出的信用条件是“5/10，n/30”，说明客户若欲享受5％的折扣，则必须在（ ）日\n内付款。\nA.5\nB.10\nC.30\nD.40"}, {"question": "下列筹资方式中，融得的是实物而不是资金的是（ ）。", "options": [{"label": "A", "text": "发行股票"}, {"label": "B", "text": "利用商业信用"}, {"label": "C", "text": "租赁筹资"}, {"label": "D", "text": "利用留存收益"}], "answer": "C", "analysis": "5/10表示在10天内付款可以享受5％的折扣。\n2\n11.下列筹资方式中，融得的是实物而不是资金的是（ ）。\nA.发行股票\nB.利用商业信用\nC.租赁筹资\nD.利用留存收益"}, {"question": "固定资产投资决策的首要步骤是（ ）。", "options": [{"label": "A", "text": "投资项目评价"}, {"label": "B", "text": "确定投资决策目标"}, {"label": "C", "text": "投资项目决策"}, {"label": "D", "text": "投资项目实施与控制"}], "answer": "B", "analysis": "企业筹资方式一般有以下几种：①吸收直接投资。②发行普通股。③发行债券。④银行借款。⑤商\n业信用。⑥租赁筹资。⑦利用留存收益。⑧发行短期融资券。⑨其他金融工具。租赁筹资是企业按照租赁合\n同租入资产的特殊筹资方式，其直接涉及的是物而不是资金。\n12.固定资产投资决策的首要步骤是（ ）。\nA.投资项目评价\nB.确定投资决策目标\nC.投资项目决策\nD.投资项目实施与控制"}, {"question": "下列不属于有效的存货管理模式的是（ ）模式。", "options": [{"label": "A", "text": "适时制"}, {"label": "B", "text": "物料需求计划"}, {"label": "C", "text": "经济订货批量"}, {"label": "D", "text": "准时制"}], "answer": "A", "analysis": "固定资产投资决策程序的步骤包括：①确定投资决策目标；②投资项目评价；③投资项目决策\n；④投资项目实施与控制。\n13.下列不属于有效的存货管理模式的是（ ）模式。\nA.适时制\nB.物料需求计划\nC.经济订货批量\nD.准时制"}, {"question": "容易导致公司控制权分散的融资方式是（ ）。", "options": [{"label": "A", "text": "发行股票"}, {"label": "B", "text": "银行借款"}, {"label": "C", "text": "发行债券"}, {"label": "D", "text": "商业信用"}], "answer": "A", "analysis": "有效的存货管理模式包括经济订货批量模式、物料需求计划模式、准时制模式、供应商管理存货模\n式等。\n14.容易导致公司控制权分散的融资方式是（ ）。\nA.发行股票\nB.银行借款\nC.发行债券\nD.商业信用"}, {"question": "客户资信程度的高低通常取决于五个方面，简称“5C”系统，以下属于该系统的是（ ）。", "options": [{"label": "A", "text": "信用品质"}, {"label": "B", "text": "资本"}, {"label": "C", "text": "信用评级"}, {"label": "D", "text": "债权债务"}], "answer": "ABE", "analysis": "发行普通股是股份制公司筹集股权资本的基本方式。优点包括：①筹措的资金可永久使用；②没有\n固定的股利负担；③筹资风险小。缺点包括：①资本成本高；②发行费用高；③没有抵税作用；④容易分散\n公司控制权，稀释每股收益。\n多项选择题\n15.客户资信程度的高低通常取决于五个方面，简称“5C”系统，以下属于该系统的是（ ）。\nA.信用品质\nB.资本\nC.信用评级\nD.债权债务\nE.偿付能力"}, {"question": "ABE 【解析】客户资信程度的高低通常决定于五个方面，即客户的信用品质（Character）、偿付能力 （Capacity）、资本（Capital）、抵押品（Collateral）、经济状况（Conditions），简称\"5C\"系统。 16.如果某公司开出的信用条件是“3/10，2/20，n/45”，其含义是（ ）。", "options": [{"label": "A", "text": "如客户在开出发票的10天内付款，享受3％的折扣"}, {"label": "B", "text": "如客户在开出发票的第11天到20天内付款，享受2％的折扣"}, {"label": "C", "text": "如客户在开出发票的30天内付款，享受2％的折扣"}, {"label": "D", "text": "如客户在开出发票的第30天付款，不享受折扣"}], "answer": "ABDE", "analysis": "客户资信程度的高低通常决定于五个方面，即客户的信用品质（Character）、偿付能力\n（Capacity）、资本（Capital）、抵押品（Collateral）、经济状况（Conditions），简称\"5C\"系统。\n16.如果某公司开出的信用条件是“3/10，2/20，n/45”，其含义是（ ）。\nA.如客户在开出发票的10天内付款，享受3％的折扣\nB.如客户在开出发票的第11天到20天内付款，享受2％的折扣\nC.如客户在开出发票的30天内付款，享受2％的折扣\nD.如客户在开出发票的第30天付款，不享受折扣\nE.如客户放弃现金折扣，全部款项必须在45天内付清"}, {"question": "ABDE 【解析】信用条件的表示方式如\"3/10，2/20，n/45\"，其含义是：如果客户在开出发票的10天内付款，享受 3%的折扣；如果在开出发票的第11天到第20天内付款，享受2%的折扣；如果客户放弃现金折扣，全部款项必 须在45天内付清。所以选ABDE 17.现金是指在生产经营过程中以货币形式存在的资金，包括（ ）。", "options": [{"label": "A", "text": "库存现金"}, {"label": "B", "text": "银行存款"}, {"label": "C", "text": "应收账款"}, {"label": "D", "text": "预收账款"}], "answer": "ABE", "analysis": "信用条件的表示方式如\"3/10，2/20，n/45\"，其含义是：如果客户在开出发票的10天内付款，享受\n3%的折扣；如果在开出发票的第11天到第20天内付款，享受2%的折扣；如果客户放弃现金折扣，全部款项必\n须在45天内付清。所以选ABDE\n17.现金是指在生产经营过程中以货币形式存在的资金，包括（ ）。\nA.库存现金\nB.银行存款\nC.应收账款\nD.预收账款\nE.其他货币资金"}, {"question": "ABE 【解析】本题考查现金的相关内容。广义现金是指在生产经营过程中以货币形式存在的资金，包括库存现金 、银行存款和其他货币资金。 18.企业过量持有现金的负面效应包括（ ）。", "options": [{"label": "A", "text": "产生机会成本"}, {"label": "B", "text": "降低偿债能力"}, {"label": "C", "text": "增加管理成本"}, {"label": "D", "text": "增加信用风险"}], "answer": "ACE", "analysis": "本题考查现金的相关内容。广义现金是指在生产经营过程中以货币形式存在的资金，包括库存现金\n、银行存款和其他货币资金。\n18.企业过量持有现金的负面效应包括（ ）。\nA.产生机会成本\nB.降低偿债能力\nC.增加管理成本\nD.增加信用风险\nE.降低整体资产收益率"}, {"question": "ACE 【解析】现金是流动性最好的资产，但过量持有现金会发生机会成本，增加管理成本，降低整体资产的收益 率水平。 19.应收账款带给企业的成本费用有（ ）。", "options": [{"label": "A", "text": "机会成本"}, {"label": "B", "text": "资本成本"}, {"label": "C", "text": "营运成本"}, {"label": "D", "text": "坏账损失"}], "answer": "ADE", "analysis": "现金是流动性最好的资产，但过量持有现金会发生机会成本，增加管理成本，降低整体资产的收益\n率水平。\n19.应收账款带给企业的成本费用有（ ）。\nA.机会成本\nB.资本成本\nC.营运成本\nD.坏账损失\nE.收账费用"}, {"question": "第四节 财务分析 单项选择题 1.企业的流动资产为120万元，其中存货为80万元，流动负债为25万元，则该企业的速动比率为（ ）。", "options": [{"label": "A", "text": "1.6"}, {"label": "B", "text": "0.5"}, {"label": "C", "text": "0.3125"}, {"label": "D", "text": "2"}], "answer": "A", "analysis": ""}, {"question": "企业的流动资产为100万元，其中存货为55万元，流动负债为30万元，则该企业的速动比率为（ ）。", "options": [{"label": "A", "text": "1.83"}, {"label": "B", "text": "1.50"}, {"label": "C", "text": "0.57"}, {"label": "D", "text": "0.33"}], "answer": "B", "analysis": "本题考查速动比率的计算。速动比率=速动资产÷流动负债（120-80）÷25=1.6，所以本题选A。\n2.企业的流动资产为100万元，其中存货为55万元，流动负债为30万元，则该企业的速动比率为（ ）。\nA.1.83\nB.1.50\nC.0.57\nD.0.33"}, {"question": "速动资产是流动资产扣除变现能力较差且不稳定的待摊费用、一年内到期的非流动资产、其他流动资产及 （ ）等后的余额。", "options": [{"label": "A", "text": "存货"}, {"label": "B", "text": "无形资产"}, {"label": "C", "text": "速延资产"}, {"label": "D", "text": "固定资产"}], "answer": "A", "analysis": "速动比率=速动资产÷流动负债，其中速动资产=流动资产-存货，因此该题应为（100-55）/30=1.50\n3.速动资产是流动资产扣除变现能力较差且不稳定的待摊费用、一年内到期的非流动资产、其他流动资产及\n（ ）等后的余额。\nA.存货\nB.无形资产\nC.速延资产\nD.固定资产"}, {"question": "A公司2016年末负债总计3亿元，股东权益合计2亿元，该公司2016年末的产权比率是（ ）。", "options": [{"label": "A", "text": "0.40"}, {"label": "B", "text": "0.60"}, {"label": "C", "text": "0.67"}, {"label": "D", "text": "1.50"}], "answer": "D", "analysis": "本题考查速动资产的概念。速动资产是指流动资产减去变现能力较差且不稳定的存货、待摊费用、\n一年内到期的非流动资产及其他流动资产等后的余额。\n4.A公司2016年末负债总计3亿元，股东权益合计2亿元，该公司2016年末的产权比率是（ ）。\nA.0.40\nB.0.60\nC.0.67\nD.1.50"}, {"question": "已获利息倍数是指（ ）与利息费用的比率。", "options": [{"label": "A", "text": "净利润总额"}, {"label": "B", "text": "利润总额"}, {"label": "C", "text": "息税前利润"}, {"label": "D", "text": "营业利润总额"}], "answer": "C", "analysis": "本题考查产权比率。产权比率＝负债合计÷股东权益合计＝3÷2＝1.5。\n5.已获利息倍数是指（ ）与利息费用的比率。\nA.净利润总额\nB.利润总额\nC.息税前利润\nD.营业利润总额"}, {"question": "流动资产减去变现能力较差且不稳定的存货、待摊费用、一年内到期的非流动资产及其他流动资产等后的 1 余额为（ ）。", "options": [{"label": "A", "text": "递延资产"}, {"label": "B", "text": "速动资产"}, {"label": "C", "text": "营运资产"}, {"label": "D", "text": "固定资产"}], "answer": "B", "analysis": "已获利息倍数是指企业息税前利润与利息费用的比率。\n6.流动资产减去变现能力较差且不稳定的存货、待摊费用、一年内到期的非流动资产及其他流动资产等后的\n1\n余额为（ ）。\nA.递延资产\nB.速动资产\nC.营运资产\nD.固定资产"}, {"question": "资产净利率的公式是（ ）。", "options": [{"label": "A", "text": "(净利润÷平均资产总额)×100%"}, {"label": "B", "text": "[(营业收入－营业成本)÷营业收入]×100%"}, {"label": "C", "text": "[净利润÷销售收入(营业收入)]×100%"}, {"label": "D", "text": "(净利润÷平均净资产额)×100%"}], "answer": "A", "analysis": "本题考查速动资产的含义。速动资产是指流动资产减去变现能力较差且不稳定的存货、待摊费用、\n一年内到期的非流动资产及其他流动资产等后的余额。\n7.资产净利率的公式是（ ）。\nA.(净利润÷平均资产总额)×100%\nB.[(营业收入－营业成本)÷营业收入]×100%\nC.[净利润÷销售收入(营业收入)]×100%\nD.(净利润÷平均净资产额)×100%"}, {"question": "用来衡量企业在资产管理方面效率的财务比率是（ ）。", "options": [{"label": "A", "text": "速动比率"}, {"label": "B", "text": "流动比率"} text": "8"}, {"label": "C", "text": "10"}, {"label": "D", "text": "12"}], "answer": "C", "analysis": "本题考查设备的技术寿命。设备的经济寿命也称“最佳更新期”。\n4.设备原始价值为K0=18000元，每年低劣化增加值λ=200元，如果考虑残值，假设该设备的残值为8000元\n，则其最佳更换年限为（ ）。\nA.6\nB.8\nC.10\nD.12"}, {"question": "用技术性能更完善、经济效益更显著的新型设备来替换原有在技术上不能继续使用或经济效益上不宜继续 使用的设备的工作是（ ）。", "options": [{"label": "A", "text": "设备更新"}, {"label": "B", "text": "设备改造"}, {"label": "C", "text": "设备修理"}, {"label": "D", "text": "设备置换"}], "answer": "A", "analysis": "本题考查低劣化数值法的计算方式。\n5.用技术性能更完善、经济效益更显著的新型设备来替换原有在技术上不能继续使用或经济效益上不宜继续\n使用的设备的工作是（ ）。\nA.设备更新\nB.设备改造\nC.设备修理\n1\nD.设备置换"}, {"question": "【不定项选择题】该精密仪器的最佳更新期为（ ）年。", "options": [{"label": "A", "text": "3"}, {"label": "B", "text": "4"}, {"label": "C", "text": "5"}, {"label": "D", "text": "6"}], "answer": "B", "analysis": "设备更新指用技术性能更完善、经济效益更显著的新型设备来替换原有在技术上不能继续使用或经\n济效益上不宜继续使用的设备。设备更新的前提是确定设备的最佳更新期。确定设备最佳更新期主要是依据\n设备的经济寿命。\n共享题干题\n【题干】某企业有一台精密仪器原值为5000元，根据分析和预测，其逐年维持费用Yt和逐年实际残值\nLn（n=1、2、3、4、5、6、7）见下表（单位：元）。\n6.【不定项选择题】该精密仪器的最佳更新期为（ ）年。\nA.3\nB.4\nC.5\nD.6"}, {"question": "【不定项选择题】该精密仪器最少的年度使用费为（ ）元。", "options": [{"label": "A", "text": "2025"}, {"label": "B", "text": "2176"}, {"label": "C", "text": "2083"}, {"label": "D", "text": "2075"}], "answer": "D", "analysis": "根据最佳更新期计算方法，第一年为2500元，第二年为2300元，第三年为2167元，第四年为2074元\n，第五年为2080元，第六年为2083元，第七年为2114元，可知第四年的年度使用费是最小的，答案为B。\n7.【不定项选择题】该精密仪器最少的年度使用费为（ ）元。\nA.2025\nB.2176\nC.2083\nD.2075"}, {"question": "【不定项选择题】确定该设备最佳更新期主要是根据该设备的（ ）。", "options": [{"label": "A", "text": "使用寿命"}, {"label": "B", "text": "经济寿命"}, {"label": "C", "text": "技术寿命"}, {"label": "D", "text": "有形磨损"}], "answer": "B", "analysis": "根据最佳更新期计算方法，可知第四年的年度使用费最小，为（5000-\n1300+1000+1100+1200+1300）/4=2075元，因此选D。\n8.【不定项选择题】确定该设备最佳更新期主要是根据该设备的（ ）。\nA.使用寿命\nB.经济寿命\nC.技术寿命\nD.有形磨损"}, {"question": "【不定项选择题】该精密仪器第1年的年度使用费用为（ ）万元。", "options": [{"label": "A", "text": "1.5"}, {"label": "B", "text": "2.0"}, {"label": "C", "text": "2.6"}, {"label": "D", "text": "5.5"}], "answer": "C", "analysis": "确定设备最佳更新期主要是依据设备的经济寿命，根据经济寿命来确定设备最佳更新时机的原则是\n使设备各种费用的总和为最小。\n【题干】某企业正在研究其设备的合理使用、更新和改造问题，以实现对设备使用、设备管理以及相关费用\n的合理监控，提高设备使用效益，降低设备损耗和成本率。该企业有一台精密仪器，其原值为12万元。使用\n后第1年的维持费用为6000元，实际残值为10万元。在综合分析该精密仪器使用费用的基础上，企业采用恰当\n的方法确定设备最佳更新期，并对该精密仪器进行科学管理。\n2\n9.【不定项选择题】该精密仪器第1年的年度使用费用为（ ）万元。\nA.1.5\nB.2.0\nC.2.6\nD.5.5"}, {"question": "【不定项选择题】确定该精密仪器最佳更新期，较适用的方法是（ ）。", "options": [{"label": "A", "text": "面值法"}, {"label": "B", "text": "投资回收期法"}, {"label": "C", "text": "效益成本分析法"}, {"label": "D", "text": "趋势外延法"}], "answer": "A", "analysis": "第一年度的使用费用=原值-第一年的实际残值+第一年的维持费用。故本题中，年度使用费用=12-\n10+0.6=2.6（万元）。\n10.【不定项选择题】确定该精密仪器最佳更新期，较适用的方法是（ ）。\nA.面值法\nB.投资回收期法\nC.效益成本分析法\nD.趋势外延法"}, {"question": "【不定项选择题】该企业对该精密仪器进行科学管理时，正确的认识是（ ）。", "options": [{"label": "A", "text": "该精密仪器必须使用到经济寿命结束时再进行更新，才是合理的"}, {"label": "B", "text": "该精密仪器的投资费用随着其使用年限的延长，分摊费用越来越少"}, {"label": "C", "text": "该精密仪器的经营费用随着其使用年限的延长而逐年减少"}, {"label": "D", "text": "该精密仪器的技术寿命是指该仪器从投入使用到因技术进步而更新所经历的时间"}], "answer": "BD", "analysis": "设备更新的前提是确定设备的最佳更新期。确定设备最佳更新期主要是依据设备的经济寿命。确定\n设备最佳更新期的方法有很多种，常用的有低劣化数值法和面值法。面值法是以同类型设备的统计资料为依\n据，分析计算其年度使用费用，以确定设备最佳更新期的一种方法。它适用于精密仪器等高、精、尖的设备\n。\n11.【不定项选择题】该企业对该精密仪器进行科学管理时，正确的认识是（ ）。\nA.该精密仪器必须使用到经济寿命结束时再进行更新，才是合理的\nB.该精密仪器的投资费用随着其使用年限的延长，分摊费用越来越少\nC.该精密仪器的经营费用随着其使用年限的延长而逐年减少\nD.该精密仪器的技术寿命是指该仪器从投入使用到因技术进步而更新所经历的时间"}, {"question": "【不定项选择题】如果根据设备的经济寿命来确定该精密仪器的最佳更新时机，最应遵循的原则是（ ）。", "options": [{"label": "A", "text": "购置费用最小"}, {"label": "B", "text": "经营费用最小"}, {"label": "C", "text": "经济寿命最长"}, {"label": "D", "text": "购置费用和经营费用的总和最小"}], "answer": "D", "analysis": "设备的经济寿命是考虑设备的有形磨损，根据最小使用费用的原则确定的设备寿命。设备的费用由\n两部分组成：一部分是购置设备时的投资费用。另一部分是维修保养、燃料动力消耗和劳务支出等经营费用\n。前者随着设备使用年限的延长，其分摊费用变少；后者是由于有形磨损造成的设备低劣化，其值将逐年扩\n大。由于技术进步，在实际工作中大多数的情况是在设备尚未达到其经济寿命年限时，就应该使用技术更先\n进、经济更合理的新设备，提前予以更新。这种从设备投入使用到因技术进步而更新所经历的时间称为设备\n技术寿命。\n12.【不定项选择题】如果根据设备的经济寿命来确定该精密仪器的最佳更新时机，最应遵循的原则是（\n）。\nA.购置费用最小\nB.经营费用最小\nC.经济寿命最长\nD.购置费用和经营费用的总和最小"}, {"question": "【不定项选择题】确定该设备的最佳更新期应主要依据该设备的（ ）。", "options": [{"label": "A", "text": "生产日期"}, {"label": "B", "text": "技术寿命"}, {"label": "C", "text": "使用寿命"}, {"label": "D", "text": "经济寿命"}], "answer": "D", "analysis": "设备的费用由两部分组成：一部分是购置设备时的投资费用，另一部分是维修保养、燃料动力消耗\n和劳务支出等经营费用。前者随着设备使用年限的延长，其分摊费用变少；后者是由于有形磨损造成的设备\n低劣化，其值将逐渐扩大。这两种具有相反趋势费用的和，必然会有最小值，这个最低的使用费用就是该设\n备的经济寿命费用。\n3\n【题干】某企业领导班子正在组织研发部经理、财务部经理等部门经理分析研究某设备的更新与改造问题\n，该设备的原始价值为80000元，每年低劣增加值为2500元，更新时的残值为19000元。\n13.【不定项选择题】确定该设备的最佳更新期应主要依据该设备的（ ）。\nA.生产日期\nB.技术寿命\nC.使用寿命\nD.经济寿命"}, {"question": "【不定项选择题】如果考虑残值，该设备的最佳更新期为（ ）年。", "options": [{"label": "A", "text": "6"}, {"label": "B", "text": "7"}, {"label": "C", "text": "8"}, {"label": "D", "text": "9"}], "answer": "B", "analysis": "确定设备最佳更新期主要依据的是设备的经济寿命。\n14.【不定项选择题】如果考虑残值，该设备的最佳更新期为（ ）年。\nA.6\nB.7\nC.8\nD.9"}, {"question": "【不定项选择题】下列属于低劣化数值法用途的是（ ）。", "options": [{"label": "A", "text": "求最佳更新年限"}, {"label": "B", "text": "求设备更新时的残值"}, {"label": "C", "text": "求设备使用年限"}, {"label": "D", "text": "求设备的投资费用"}], "answer": "A", "analysis": "15.【不定项选择题】下列属于低劣化数值法用途的是（ ）。\nA.求最佳更新年限\nB.求设备更新时的残值\nC.求设备使用年限\nD.求设备的投资费用"}, {"question": "【不定项选择题】下列关于该企业设备费用的说法，正确的是（ ）。", "options": [{"label": "A", "text": "该设备的投资费用随着设备使用年限的延长，其分摊费用将逐年减少"}, {"label": "B", "text": "该设备必须使用到经济寿命结束时再进行更新才合理"}, {"label": "C", "text": "在正常使用、维护和保养的条件下，该设备为企业生产经营服务的时间是该设备的技术寿命"}, {"label": "D", "text": "由于有形磨损造成的设备低劣化，该设备的经营费用将逐年增加"}], "answer": "AD", "analysis": "低劣化数值法主要用于求设备的最佳更新年限。\n16.【不定项选择题】下列关于该企业设备费用的说法，正确的是（ ）。\nA.该设备的投资费用随着设备使用年限的延长，其分摊费用将逐年减少\nB.该设备必须使用到经济寿命结束时再进行更新才合理\nC.在正常使用、维护和保养的条件下，该设备为企业生产经营服务的时间是该设备的技术寿命\nD.由于有形磨损造成的设备低劣化，该设备的经营费用将逐年增加"}, {"question": "第二节 技术改造方案的选择 单项选择题 1.某技术改造项目有四个互斥方案，其投资额和年净收益额见下表。 由上表可知，最佳方案为（ ）。", "options": [{"label": "A", "text": "方案1"}, {"label": "B", "text": "方案2"}, {"label": "C", "text": "方案3"}, {"label": "D", "text": "方案4"}], "answer": "D", "analysis": ""}, {"question": "效益成本分析法是在考虑资金时间价值下的动态评价的一种方法，用（ ）指标反映。", "options": [{"label": "A", "text": "益本率"}, {"label": "B", "text": "投资回收期"}, {"label": "C", "text": "设备最佳更新期"}, {"label": "D", "text": "投资效益系数"}], "answer": "A", "analysis": "投资回收期是指某技术改造方案的技资额用该方案实施后的净收益额来补偿的时间，通常以年为单\n位，投资回收期T越小越好，它表明用于技术改造的投资得到补偿的时间短，投资发挥的效用快。因此选择\nD。\n2.效益成本分析法是在考虑资金时间价值下的动态评价的一种方法，用（ ）指标反映。\nA.益本率\nB.投资回收期\nC.设备最佳更新期\nD.投资效益系数"}, {"question": "在用效益成本分析法进行技术改造方案优化选择时，当益本率（ ）时，方案可以考虑接受。", "options": [{"label": "A", "text": "大于1"}, {"label": "B", "text": "等于1"}, {"label": "C", "text": "小于1"}, {"label": "D", "text": "大于等于1"}], "answer": "A", "analysis": "效益成本分析法是通过计算和比较技术改造项目的各方案在整个寿命期间内收益的现值与成本比率\n，以确定各技术改造方案排列的优先次序和取舍的方法。这种方法是在考虑资金时间价值下的一种动态评价\n的方法，用益本率指标反映。因此选A。\n3.在用效益成本分析法进行技术改造方案优化选择时，当益本率（ ）时，方案可以考虑接受。\nA.大于1\nB.等于1\nC.小于1\nD.大于等于1"}, {"question": "某企业运用投资回收期法进行技术改造项目决策，该项目有四个互斥方案，其投资额和年净收益额如下表 所示： 1 设该项目的标准投资回收期为7年，则该企业应选择（ ）。", "options": [{"label": "A", "text": "方案1"}, {"label": "B", "text": "方案2"}, {"label": "C", "text": "方案3"}, {"label": "D", "text": "方案4"}], "answer": "D", "analysis": "当益本率大于1时，方案可以考虑接受；当益本率小于1时，方案应予拒绝；而当益本率等于1时，得\n等于失，此时应视资金的充足与否而决定方案的取舍。所以A选项正确\n4.某企业运用投资回收期法进行技术改造项目决策，该项目有四个互斥方案，其投资额和年净收益额如下表\n所示：\n1\n设该项目的标准投资回收期为7年，则该企业应选择（ ）。\nA.方案1\nB.方案2\nC.方案3\nD.方案4"}, {"question": "某企业进行技术改造项目决策，该项目有四个互斥方案，其投资额和年净收益额见下表。 根据投资回收期法（该项目的标准投资回收期为7年），该企业应选择（ ）。", "options": [{"label": "A", "text": "方案1"}, {"label": "B", "text": "方案2"}, {"label": "C", "text": "方案3"}, {"label": "D", "text": "方案4"}], "answer": "B", "analysis": "本题考查投资回收期法。\n因为标准投资回收期为7年，在方案1、方案2、方案3、方案4中，方案4投资回收期最短，所以应该选择方案\n4。\n5.某企业进行技术改造项目决策，该项目有四个互斥方案，其投资额和年净收益额见下表。\n根据投资回收期法（该项目的标准投资回收期为7年），该企业应选择（ ）。\nA.方案1\nB.方案2\nC.方案3\nD.方案4"}, {"question": "通过计算和比较技术改造项目的各方案在整个寿命期间内收益的现值与成本比率，以确定各技术改造方案 排列的优先次序和取舍的方法是（ ）。", "options": [{"label": "A", "text": "利润分析法"}, {"label": "B", "text": "效益成本分析法"}, {"label": "C", "text": "投资回收期法"}, {"label": "D", "text": "追加投资回收期法"}], "answer": "B", "analysis": "投资回收期是指某技术改造方案的投资额用该方案实施后的净收益额来补偿\n5.45(年)；方案2=450÷100=4.5(年)；方案3=420÷90=4.67(年)；方案4=400÷80=5(年)。方案2的投资回收\n期最短。\n6.通过计算和比较技术改造项目的各方案在整个寿命期间内收益的现值与成本比率，以确定各技术改造方案\n排列的优先次序和取舍的方法是（ ）。\nA.利润分析法\nB.效益成本分
