ext": "5σ"}, {"label": "D", "text": "6σ"}], "answer": "D", "analysis": "本题考查产品质量监督检查制度。选项D错误，国家监督抽查的产品，地方不得另行重复抽查。掌握\n“产品质量法”知识点。\n \n31.在质量管理领域，如果质量控制水平为（　），表示产品不合格率不超过0.002ppm（百万分率）。\nA.3σ\nB.4σ\nC.5σ\nD.6σ"}, {"question": "73%；若控制在6σ水平", "options": [{"label": "A", "text": "生产者"}, {"label": "B", "text": "供应商"}, {"label": "C", "text": "服务商"}, {"label": "D", "text": "顾客"}], "answer": "D", "analysis": "本题考查六西格玛的含义。若控制在3σ水平，表示产品合格率不低于99.73%；若控制在6σ水平\n，表示产品合格率不低于99.99999983%，或者不合格率不超过0.002ppm（百万分率）。掌握“六西格玛管理\n”知识点。\n \n32.质量的概念从“符合性质量”发展到“适用性质量”的过程，体现了企业对质量的认识逐渐将满足（　\n）的需求放在首位。\nA.生产者\nB.供应商\nC.服务商\nD.顾客"}, {"question": "某企业运用投资回收期法进行技术改造项目决策，该项目有四个互斥方案，其投资额和年净收益额如下表", "options": [{"label": "A", "text": "方案1"}, {"label": "B", "text": "方案2"}, {"label": "C", "text": "方案3"}, {"label": "D", "text": "方案4"}], "answer": "D", "analysis": "本题考查质量概念的发展历程。质量从“符合性”发展到“适用性”，体现了人们对质量的认识逐\n渐将顾客的需求放在了首位。掌握“质量的基本概念及其发展历程”知识点。\n \n33.某企业运用投资回收期法进行技术改造项目决策，该项目有四个互斥方案，其投资额和年净收益额如下表\n所示：\n \n \n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n7\n设该项目的标准投资回收期为7年，则该企业应选择（　）。\nA.方案1\nB.方案2\nC.方案3\nD.方案4"}, {"question": "2（年）。方案3的投资回收期＝500/100＝5（年）。方案4的投资回收期＝400/90＝4.4（年", "options": [{"label": "A", "text": "投资规模"}, {"label": "B", "text": "实施方式"}, {"label": "C", "text": "技术选择"}, {"label": "D", "text": "完成期限"}], "answer": "D", "analysis": "本题考查投资回收期法。方案1的投资回收期＝600/120＝5（年）。方案2的投资回收期\n＝550/105＝5.2（年）。方案3的投资回收期＝500/100＝5（年）。方案4的投资回收期＝400/90＝4.4（年\n）。方案4的投资回收期最短，所以应该选择方案4。掌握“技术改造方案优化选择的方法”知识点。\n \n34.企业对技术改造项目进行技术可行性分析时，分析的核心是技术改造项目的（　）问题。\nA.投资规模\nB.实施方式\nC.技术选择\nD.完成期限"}, {"question": "下列新产品开发方式中，既有利于企业产品更新换代，增强企业竞争能力，又有利于企业保留技术秘密、", "options": [{"label": "A", "text": "自行研制开发"}, {"label": "B", "text": "引进开发"}, {"label": "C", "text": "委托开发"}, {"label": "D", "text": "合作开发"}], "answer": "C", "analysis": "本题考查技术改造项目的确定及其可行性研究。技术可行性分析的核心是企业技术改造的技术等级\n的选择问题。掌握“技术改造规划和项目的确定及其可行性研究”知识点。\n \n35.下列新产品开发方式中，既有利于企业产品更新换代，增强企业竞争能力，又有利于企业保留技术秘密、\n形成企业技术优势的方式是（　）。\nA.自行研制开发\nB.引进开发\nC.委托开发\nD.合作开发"}, {"question": "在新产品开发中，紧随战略通常将新产品开发的竞争域确定为（　）。", "options": [{"label": "A", "text": "产品的最终用途"}, {"label": "B", "text": "市场上推广的新产品"}, {"label": "C", "text": "产品的最终用途和技术"}, {"label": "D", "text": "产品和技术的结合"}], "answer": "A", "analysis": "本题考查新产品开发的方式。采用自行研制开发新产品不仅有利于产品更新换代、增强企业竞争能\n力，而且有利于企业保留技术秘密，形成企业技术优势。掌握“新产品开发的方式”知识点。\n \n36.在新产品开发中，紧随战略通常将新产品开发的竞争域确定为（　）。\nA.产品的最终用途\nB.市场上推广的新产品\nC.产品的最终用途和技术\nD.产品和技术的结合"}, {"question": "企业在坚持科学技术进步的前提下，在现有的基础上用先进技术代替落后技术，用先进的工艺和装备代替", "options": [{"label": "A", "text": "设备更新"}, {"label": "B", "text": "设备改造"}, {"label": "C", "text": "技术创新"}, {"label": "D", "text": "技术改造"}], "answer": "A", "analysis": "本题考查紧随战略。紧随战略：新产品开发的竞争域仅确定在产品的最终用途这一个方面。掌握\n“新产品开发战略的含义、特征及基本类型”知识点。\n \n37.企业在坚持科学技术进步的前提下，在现有的基础上用先进技术代替落后技术，用先进的工艺和装备代替\n落后的工艺和装备，以改变企业落后的技术面貌。这一过程称为（　）。\nA.设备更新\nB.设备改造\nC.技术创新\nD.技术改造"}, {"question": "企业技术性能更完善、经济效益更显著的新型设备来替换原有设备的工作是（　）。", "options": [{"label": "A", "text": "设备更新"}, {"label": "B", "text": "设备改造"}, {"label": "C", "text": "设备修理"}, {"label": "D", "text": "设备置换"}], "answer": "D", "analysis": "本题考查技术改造的含义。技术改造是在坚持科学技术进步的前提下，在企业现有的基础上，用先\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8\n进技术代替落后技术，用先进的工艺和装备代替落后的工艺和装备，以改变企业落后的技术面貌，实现以内\n涵为主的扩大再生产，达到提高产品质量、促进产品更新换代、节约能源、降低消耗、扩大生产规模、全面\n提高企业和社会经济效益的目的。掌握“技术改造概述”知识点。\n \n38.企业技术性能更完善、经济效益更显著的新型设备来替换原有设备的工作是（　）。\nA.设备更新\nB.设备改造\nC.设备修理\nD.设备置换"}, {"question": "（　）是产品的定型阶段，它要确定零部件的结构、尺寸、配合关系、技术条件，编写出各种计算数据和", "options": [{"label": "A", "text": "初步设计"}, {"label": "B", "text": "技术设计"}, {"label": "C", "text": "工作图设计"}, {"label": "D", "text": "产品设计"}], "answer": "A", "analysis": "本题考查设备更新。设备更新是指用技术性能更完善、经济效益更显著的新型设备来替换原有在技\n术上不能继续使用或经济效益上不宜继续使用的设备。掌握“设备更新”知识点。\n \n39.（　）是产品的定型阶段，它要确定零部件的结构、尺寸、配合关系、技术条件，编写出各种计算数据和\n技术经济资料。\nA.初步设计\nB.技术设计\nC.工作图设计\nD.产品设计"}, {"question": "能够较全面、深入地了解工作内容、工作条件、工作环境、不同工作间的关系取得的信息较为客观、准确", "options": [{"label": "A", "text": "观察法"}, {"label": "B", "text": "访谈法"}, {"label": "C", "text": "问卷法"}, {"label": "D", "text": "工作日志法"}], "answer": "B", "analysis": "本题考查新产品的设计与试制。技术设计是产品的定型阶段，它要确定零部件的结构、尺寸、配合\n关系、技术条件，编写出各种计算数据和技术经济资料。掌握“新产品开发的过程”知识点。\n \n40.能够较全面、深入地了解工作内容、工作条件、工作环境、不同工作间的关系取得的信息较为客观、准确\n，这是工作分析方法中（　）的优点。\nA.观察法\nB.访谈法\nC.问卷法\nD.工作日志法"}, {"question": "企业招聘员工时，主要用来测量求职者的思维能力、学习能力和适应环境能力的心理测评是（　）。", "options": [{"label": "A", "text": "倾向测评"}, {"label": "B", "text": "成就测评"}, {"label": "C", "text": "智力测评"}, {"label": "D", "text": "人格测评"}], "answer": "A", "analysis": "本题考查工作分析的方法。观察法的优点是有关人员可以较全面、较深入地了解工作内容、工作条\n件、工作环境、不同工作间的关系等信息，取得的信息较为客观和准确，但它不适用于工作循环周期长和以\n脑力劳动为主的工作，也不能得到有关任职资格要求的信息，对紧急而又偶然的工作行为也不适用。掌握\n“工作分析的步骤与方法”知识点。\n \n41.企业招聘员工时，主要用来测量求职者的思维能力、学习能力和适应环境能力的心理测评是（　）。\nA.倾向测评\nB.成就测评\nC.智力测评\nD.人格测评"}, {"question": "某种培训方法的主要不足在于培训仅对培训对象进行某一特定技能的培训，培训范围过窄。这种培训方法", "options": [{"label": "A", "text": "师带徒"}, {"label": "B", "text": "行动学习"}, {"label": "C", "text": "工作轮换"}, {"label": "D", "text": "教练"}], "answer": "C", "analysis": "本题考查智力测评。智力测评是对一个人受智力水平影响而表现出的外在行为的测评。智力测评主\n要用来测验一个人的思维能力、学习能力和适应环境能力。掌握“员工招聘中常用的人员甄选技术”知识点\n。\n \n42.某种培训方法的主要不足在于培训仅对培训对象进行某一特定技能的培训，培训范围过窄。这种培训方法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n9\n是（　）。\nA.师带徒\nB.行动学习\nC.工作轮换\nD.教练"}, {"question": "既作为员工工作指南，又作为企业制定人力资源规划，设计工作能力模型，制定培训开发方案等人力资源", "options": [{"label": "A", "text": "岗位职责说明书"}, {"label": "B", "text": "在职规范"}, {"label": "C", "text": "工作分析报告"}, {"label": "D", "text": "工作说明书"}], "answer": "A", "analysis": "本题考查师带徒培训。师带徒的主要不足在于培训仅对培训对象进行某一特定技能的培训，培训范\n围过窄。掌握“常用的在职培训方法”知识点。\n \n43.既作为员工工作指南，又作为企业制定人力资源规划，设计工作能力模型，制定培训开发方案等人力资源\n职能管理工作参考依据的人力资源管理文件是（　）。\nA.岗位职责说明书\nB.在职规范\nC.工作分析报告\nD.工作说明书"}, {"question": "企业通过发布招聘简章等方式提出招聘员工的要求，称为（　）。", "options": [{"label": "A", "text": "承诺"}, {"label": "B", "text": "提议"}, {"label": "C", "text": "协商"}, {"label": "D", "text": "签约"}], "answer": "D", "analysis": "本题考查工作分析的概念。工作说明书既是一般员工工作的指南，也是企业确定企业人力资源规划\n、构建员工能力模型、进行绩效考核和薪酬管理、实施员工培训开发等人力资源职能管理的参考依据。掌握\n“工作分析的概念与作用”知识点。\n \n44.企业通过发布招聘简章等方式提出招聘员工的要求，称为（　）。\nA.承诺\nB.提议\nC.协商\nD.签约"}, {"question": "劳动者在试用期内提前（　）天通知企业，可以解除劳动合同。", "options": [{"label": "A", "text": "3"}, {"label": "B", "text": "7"}, {"label": "C", "text": "10"}, {"label": "D", "text": "30"}], "answer": "B", "analysis": "本题考查订立企业劳动合同的程序。提议是在签订劳动合同前，企业或劳动者提出签订劳动合同的\n建议，如企业通过发布招聘简章等方式提出招聘员工的要求，劳动者通过提交求职信等方式申请成为企业的\n员工。掌握“企业劳动合同的订立、内容和条款”知识点。\n \n45.劳动者在试用期内提前（　）天通知企业，可以解除劳动合同。\nA.3\nB.7\nC.10\nD.30"}, {"question": "某企业从销售员中选择一人担任销售部经理，该企业采用的招聘方法是（　）。", "options": [{"label": "A", "text": "晋升"}, {"label": "B", "text": "职位转换"}, {"label": "C", "text": "职位轮换"}, {"label": "D", "text": "工作扩大"}], "answer": "A", "analysis": "本题考查企业劳动合同的解除。《劳动合同法》对试用期内劳动者解除劳动合同作了明确规定，劳\n动者在试用期内提前3日通知企业，可以解除劳动合同。掌握“企业劳动合同的形式、确认与处理、履行变更\n、解除、终止和续订”知识点。\n \n46.某企业从销售员中选择一人担任销售部经理，该企业采用的招聘方法是（　）。\nA.晋升\nB.职位转换\nC.职位轮换\nD.工作扩大"}, {"question": "在财务报表中，反映企业经营活动、投资活动和筹资活动动态情况的是（　）。", "options": [{"label": "A", "text": "损益表"}, {"label": "B", "text": "利润分配表"}, {"label": "C", "text": "资产负债表"}, {"label": "D", "text": "现金流量表"}], "answer": "A", "analysis": "本题考查晋升的概念。晋升是指企业中高一级职位出现空缺时，从企业内部挑选较为适宜的人员补\n充职位空缺，挑选的人员一般是从一个较低职位晋升到一个较高的职位。掌握“员工招聘的渠道”知识点。\n \n47.在财务报表中，反映企业经营活动、投资活动和筹资活动动态情况的是（　）。\nA.损益表\nB.利润分配表\nC.资产负债表\nD.现金流量表"}, {"question": "甲公司联合其他两家公司共同出资1000万元发起设立有限责任公司乙公司，三家股东实缴的出资额形成乙", "options": [{"label": "A", "text": "实收资本"}, {"label": "B", "text": "短期负债"}, {"label": "C", "text": "营业收入"}, {"label": "D", "text": "长期负债"}], "answer": "D", "analysis": "本题考查现金流量表。企业编制现金流量表是为会计报表使用者提供企业一定会计期间内现金和现\n金等价物流入和流出的信息，反映企业经营活动、投资活动和筹资活动的动态情况，以便于报表使用者了解\n和评价企业获取现金和现金等价物的能力，并据以预测企业未来的现金流量。掌握“财务分析概述和主要财\n务报表”知识点。\n \n48.甲公司联合其他两家公司共同出资1000万元发起设立有限责任公司乙公司，三家股东实缴的出资额形成乙\n公司的（　）。\nA.实收资本\nB.短期负债\nC.营业收入\nD.长期负债"}, {"question": "主要根据预算期的需要和可能情况分析费用项目和费用数额的合理性，综合平衡编制费用预算的财务预算", "options": [{"label": "A", "text": "固定预算法"}, {"label": "B", "text": "零基预算法"}, {"label": "C", "text": "定期预算法"}, {"label": "D", "text": "滚动预算法"}], "answer": "A", "analysis": "本题考查企业与股东的财务关系。企业与股东之间的财务关系是资本收益分配关系。股东依法向企\n业投入资金，形成企业股本或实收资本，企业则向股东支付股利和承担资本保值增值责任。掌握“财务管理\n的概念”知识点。\n \n49.主要根据预算期的需要和可能情况分析费用项目和费用数额的合理性，综合平衡编制费用预算的财务预算\n方法是（　）。\nA.固定预算法\nB.零基预算法\nC.定期预算法\nD.滚动预算法"}, {"question": "公司上市后可以通过（　）方式进行股权再融资。", "options": [{"label": "A", "text": "送股"}, {"label": "B", "text": "配股和增发"}, {"label": "C", "text": "盈余公积金转增股本"}, {"label": "D", "text": "资本公积金转增股本"}], "answer": "B", "analysis": "本题考查零基预算法。采用零基预算法在编制费用预算时，不考虑以往期间的费用项目和费用数额\n，主要根据预算期的需要和可能情况分析费用项目和费用数额的合理性，综合平衡编制费用预算。掌握“财\n务预算与控制、财务分析与考核”知识点。\n \n50.公司上市后可以通过（　）方式进行股权再融资。\nA.送股\nB.配股和增发\nC.盈余公积金转增股本\nD.资本公积金转增股本"}, {"question": "协调各方利益，将各利益集团的目标都折中为企业的长期稳定发展和企业总体价值的不断增长，这是把", "options": [{"label": "A", "text": "利润最大化"}, {"label": "B", "text": "每股收益最大化"}, {"label": "C", "text": "净资产收益最大化"}, {"label": "D", "text": "企业价值最大化"}], "answer": "B", "analysis": "本题考查筹资方式。公司上市后可通过配股和增发的方式进行股权再融资。掌握“筹资管理”知识\n点。\n \n51.协调各方利益，将各利益集团的目标都折中为企业的长期稳定发展和企业总体价值的不断增长，这是把\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11\n（　）作为企业财务管理目标。\nA.利润最大化\nB.每股收益最大化\nC.净资产收益最大化\nD.企业价值最大化"}, {"question": "企业进行筹资决策时，主要是通过平衡资本成本和（　）来选择资金来源的最佳结构。", "options": [{"label": "A", "text": "筹资渠道"}, {"label": "B", "text": "筹资方式"}, {"label": "C", "text": "筹资数量"}, {"label": "D", "text": "筹资风险"}], "answer": "D", "analysis": "本题考查企业价值最大化。现代企业理论认为，企业是多边契约关系的总和，除了股东，政府、债\n权人、职工等利益相关者也承担了相应的风险，也应该分享利益。只有协调各方利益，将各方利益相关者的\n目标都折中为企业的长期稳定发展和企业总体价值的不断增长，才能使各方获利。当前学术界比较认可的企\n业理财目标是企业价值最大化。企业价值最大化的观点体现了对经济效益的深层次认识，更能体现企业主体\n的特征和利益相关者的利益，较股东财富最大化更为合理。掌握“财务管理的目标与社会责任”知识点。\n \n52.企业进行筹资决策时，主要是通过平衡资本成本和（　）来选择资金来源的最佳结构。\nA.筹资渠道\nB.筹资方式\nC.筹资数量\nD.筹资风险"}, {"question": "在企业所有资产中，流动性最好的资产是（　）。", "options": [{"label": "A", "text": "存货"}, {"label": "B", "text": "应收账款"}, {"label": "C", "text": "速动资产"}, {"label": "D", "text": "现金"}], "answer": "D", "analysis": "本题考查财务决策。筹资决策是指为满足企业融资的需要，对筹资渠道、筹资方式、筹资数量、筹\n资风险等进行评价和选择，基本思想是平衡资本成本和筹资风险后安排资金来源的最佳结构。掌握“财务计\n划与决策”知识点。\n \n53.在企业所有资产中，流动性最好的资产是（　）。\nA.存货\nB.应收账款\nC.速动资产\nD.现金"}], "冲刺卷（251-297题）": [{"question": "下列选项中属于完全垄断行业的特征的有（　）。", "options": [{"label": "A", "text": "整个行业内有很多的生产者和消费者"}, {"label": "B", "text": "企业生产的产品具有差别性"}, {"label": "C", "text": "少数几个企业控制一个行业的供给"}, {"label": "D", "text": "整个行业只有一个生产者"}], "answer": "D", "analysis": "本题考查运营资本管理。现金是流动性最好的资产，但过量持有现金会发生机会成本，增加管理成\n本，降低整体资产的收益率水平。掌握“运营资本管理”知识点。\n \n54.下列选项中属于完全垄断行业的特征的有（　）。\nA.整个行业内有很多的生产者和消费者\nB.企业生产的产品具有差别性\nC.少数几个企业控制一个行业的供给\nD.整个行业只有一个生产者"}, {"question": "记录信息的载体是（　）。", "options": [{"label": "A", "text": "数据"}, {"label": "B", "text": "技术"}, {"label": "C", "text": "行为"}, {"label": "D", "text": "事件\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n12"}], "answer": "D", "analysis": "本题考查完全垄断行业。完全垄断行业是指在一定地理范围内，某行业只有一个卖主或只有一个买\n主的情况。在这类行业中，一种商品只有一个销售者或者生产者，没有或者基本没有别的替代者。如电力、\n自来水等一些公共事业行业。掌握“市场调研分析”知识点。\n \n55.记录信息的载体是（　）。\nA.数据\nB.技术\nC.行为\nD.事件\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n12"}, {"question": "信息在时间上的传递称为（　）。", "options": [{"label": "A", "text": "信息存储、"}, {"label": "B", "text": "信息转换"}, {"label": "C", "text": "信息传递"}, {"label": "D", "text": "信息共享"}], "answer": "A", "analysis": "本题考查信息与数据的概念。数据是记录信息的载体。掌握“信息的概念”知识点。\n \n56.信息在时间上的传递称为（　）。\nA.信息存储、\nB.信息转换\nC.信息传递\nD.信息共享"}, {"question": "下列企业信息的分类下列选项说法错误的是（　）。", "options": [{"label": "A", "text": "操作层信息也称控制层信息"}, {"label": "B", "text": "企业中各职能部门对下层信息进行采集，采集后的信息成为管理层数据"}, {"label": "C", "text": "决策层信息的主要流向是受控体，即企业本身，包括操作层、管理层和决策层"}, {"label": "D", "text": "基层数据的加工处理方法简单，加工后的数据代表更高一级的信息"}], "answer": "A", "analysis": "本题考查信息的属性。信息在时间上的传递称为信息存储。掌握“信息与数据的属性”知识点。\n \n57.下列企业信息的分类下列选项说法错误的是（　）。\nA.操作层信息也称控制层信息\nB.企业中各职能部门对下层信息进行采集，采集后的信息成为管理层数据\nC.决策层信息的主要流向是受控体，即企业本身，包括操作层、管理层和决策层\nD.基层数据的加工处理方法简单，加工后的数据代表更高一级的信息"}, {"question": "下列选项中关于信息管理的方式的说法错误的是（　）。", "options": [{"label": "A", "text": "人工管理方式只适用于规模微小型的个体企业。"}, {"label": "B", "text": "简单记账式管理一般适用于独立经营的小型企业"}, {"label": "C", "text": "经营规范式管理一般适用于中型或连锁经营的企业"}, {"label": "D", "text": "决策经营式管理一般适用于连锁经营的企业"}], "answer": "A", "analysis": "本题考查信息的分类。操作层信息也称作业层信息。掌握“信息的分类”知识点。\n \n58.下列选项中关于信息管理的方式的说法错误的是（　）。\nA.人工管理方式只适用于规模微小型的个体企业。\nB.简单记账式管理一般适用于独立经营的小型企业\nC.经营规范式管理一般适用于中型或连锁经营的企业\nD.决策经营式管理一般适用于连锁经营的企业"}, {"question": "在关系数据库中，一种实体的集合称为一个（　）。", "options": [{"label": "A", "text": "关系、"}, {"label": "B", "text": "数据"}, {"label": "C", "text": "字段值"}, {"label": "D", "text": "记录"}], "answer": "D", "analysis": "本题考查信息管理的方式。决策经营式管理：有一套功能较为完善的管理信息系统，除具有以上经\n营管理功能外，还具有开放型的信息接受能力、数学建模能力、经济预测分析能力、决策专家支持系统等\n，适用于大型企业。掌握“企业信息管理”知识点。\n \n59.在关系数据库中，一种实体的集合称为一个（　）。\nA.关系、\nB.数据\nC.字段值\nD.记录"}, {"question": "将采集到的各种数据转换成适合计算机输入或处理的形式或格式指的是（　）。", "options": [{"label": "A", "text": "数据采集"}, {"label": "B", "text": "数据准备"}, {"label": "C", "text": "数据输入"}, {"label": "D", "text": "数据输出"}], "answer": "A", "analysis": "本题考查数据的组织。在关系数据库中，一种实体的集合称为一个关系，用一个二维表存储。掌握\n“数据库系统”知识点。\n \n60.将采集到的各种数据转换成适合计算机输入或处理的形式或格式指的是（　）。\nA.数据采集\nB.数据准备\nC.数据输入\nD.数据输出"}, {"question": "从交易费用的角度考察市场和企业，下列说法正确的有（　）。", "options": [{"label": "A", "text": "市场发生的是组织管理费用"}, {"label": "B", "text": "企业发生的是交易费用"}, {"label": "C", "text": "市场和企业是两种不同的资源配置和生产组织方式"}, {"label": "D", "text": "市场是通过协议买卖的方式来实现资源配置和组织生产\nE.企业是通过内部管理的方式来实现资源配置和组织生产"}], "answer": "B", "analysis": "本题考查数据处理的功能。数据准备是指将采集到的各种数据转换成适合计算机输入或处理的形式\n或格式，也包括不同数据处理环节之间的数据准备。掌握“管理信息系统的功能”知识点。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n13\n \n多项选择题\n61.从交易费用的角度考察市场和企业，下列说法正确的有（　）。\nA.市场发生的是组织管理费用\nB.企业发生的是交易费用\nC.市场和企业是两种不同的资源配置和生产组织方式\nD.市场是通过协议买卖的方式来实现资源配置和组织生产\nE.企业是通过内部管理的方式来实现资源配置和组织生产"}, {"question": "现代企业是一个多层次、多目标的系统，这个系统的流程包括（　）。", "options": [{"label": "A", "text": "产品流程"}, {"label": "B", "text": "政策流程"}, {"label": "C", "text": "价值流程"}, {"label": "D", "text": "人事流程\nE.信息流程"}], "answer": "C", "analysis": "本题考查新制度学派的观点。从交易费用的角度考察，市场和企业是两种不同的资源配置和生产组\n织方式，市场是通过协议买卖的方式来实现资源配置和组织生产，企业是通过内部管理的方式来实现资源配\n置和组织生产。市场发生的是交易费用，企业发生的是组织管理费用。掌握“企业的形成”知识点。\n \n62.现代企业是一个多层次、多目标的系统，这个系统的流程包括（　）。\nA.产品流程\nB.政策流程\nC.价值流程\nD.人事流程\nE.信息流程"}, {"question": "企业内部分工可以提高生产效率的原因有（　）。", "options": [{"label": "A", "text": "可以提高劳动者的劳动技巧"}, {"label": "B", "text": "能够减少单个劳动者的劳动转换时间"}, {"label": "C", "text": "便于对生产要素进行优化重组"}, {"label": "D", "text": "可以提高劳动者的满意度\nE.可以提高劳动者的复合技能"}], "answer": "A", "analysis": "本题考查企业要素的构成。现代企业既是一个封闭系统，又是一个动态开放系统，既是人机系统\n，又是多层次、多目标的系统。这个系统流程包括产品流程、价值流程、人事流程和信息流程四个部分。掌\n握“企业的基本构成要素、优势与弱势”知识点。\n \n63.企业内部分工可以提高生产效率的原因有（　）。\nA.可以提高劳动者的劳动技巧\nB.能够减少单个劳动者的劳动转换时间\nC.便于对生产要素进行优化重组\nD.可以提高劳动者的满意度\nE.可以提高劳动者的复合技能"}, {"question": "企业选择组织结构形式时，应考虑的因素有（　）。", "options": [{"label": "A", "text": "企业的生产技术和工艺"}, {"label": "B", "text": "企业规模"}, {"label": "C", "text": "企业文化"}, {"label": "D", "text": "企业经营发展战略\nE.企业内部交通状况"}], "answer": "A", "analysis": "本题考查分工协作与生产效率。企业内部分工可以减少企业投入和增加产出，从而提高生产效率\n：（1）分工可以使劳动者的劳动技巧获得提高；（2）分工能减少劳动转换时间；（3）分工促进了先进劳动\n工具和机器的发明和使用；（4）分工便于对生产要素进行重组，从而使各要素充分发挥优势，并相互协调\n，提高生产效率。掌握“劳动分工与专业化”知识点。\n \n64.企业选择组织结构形式时，应考虑的因素有（　）。\nA.企业的生产技术和工艺\nB.企业规模\nC.企业文化\nD.企业经营发展战略\nE.企业内部交通状况"}, {"question": "等距抽样的优点有（　）。", "options": [{"label": "A", "text": "在抽样中完全排除了主观因素的干扰"}, {"label": "B", "text": "样本在调查总体中的分布比较均匀"}, {"label": "C", "text": "花费时间少"}, {"label": "D", "text": "容易确定样本单位\nE.便于管理与实施控制"}], "answer": "A", "analysis": "本题考查企业组织结构形式的选择。企业组织结构形式的选择应考虑与企业生产经营直接相关的若\n干要素：企业的生产技术和工艺、企业规模、企业经营发展战略、企业所处的环境、企业文化。掌握“企业\n组织结构形式的选择”知识点。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n14\n \n65.等距抽样的优点有（　）。\nA.在抽样中完全排除了主观因素的干扰\nB.样本在调查总体中的分布比较均匀\nC.花费时间少\nD.容易确定样本单位\nE.便于管理与实施控制"}, {"question": "误差控制途径主要有（　）。", "options": [{"label": "A", "text": "提高样本的代表性"}, {"label": "B", "text": "注重样本量的控制"}, {"label": "C", "text": "提高抽样设计的有效性"}, {"label": "D", "text": "注重调查误差的事前控制\nE.精心设计问卷，对被调查者进行有效指导"}], "answer": "B", "analysis": "本题考查等距抽样的优点。等距抽样的优点：简单易行，容易确定样本单位；样本在调查总体中的\n分布比较均匀，具有较高的代表性，花费时间少，成本较低。掌握“抽样市场调查的类型”知识点。\n \n66.误差控制途径主要有（　）。\nA.提高样本的代表性\nB.注重样本量的控制\nC.提高抽样设计的有效性\nD.注重调查误差的事前控制\nE.精心设计问卷，对被调查者进行有效指导"}, {"question": "下列产品中，其生产类型属于连续型生产的有（　）。", "options": [{"label": "A", "text": "化肥"}, {"label": "B", "text": "电视机"}, {"label": "C", "text": "桌子"}, {"label": "D", "text": "啤酒\nE.汽车"}], "answer": "A", "analysis": "本题考查非抽样误差。市场调查人员不仅要意识到随机抽样误差和非抽样误差的存在，更应采取事\n前控制、事中控制和事后控制的手段尽可能将误差控制在一定范围内。主要控制途径有：①提高样本的代表\n性；②注重样本量的控制；③提高抽样设计的有效性；④重视抽样方案的审核；⑤严格训练调查人员，避免\n调查人员的主观错误；⑥精心设计问卷，对被调查者进行有效指导；⑦加强对调查工作各个阶段工作的管理\n；⑧注重调查误差的事后控制。掌握“抽样误差与非抽样误差”知识点。\n \n67.下列产品中，其生产类型属于连续型生产的有（　）。\nA.化肥\nB.电视机\nC.桌子\nD.啤酒\nE.汽车"}, {"question": "与其他生产过程组织形式相比，流水生产线的特征包括（　）。", "options": [{"label": "A", "text": "连续性"}, {"label": "B", "text": "节奏性"}, {"label": "C", "text": "通用性"}, {"label": "D", "text": "随机性\nE.比例性"}], "answer": "A", "analysis": "本题考查连续型生产。连续型生产是指连续的产品生产，其工艺流程往往表现为用化学的而不是物\n理的或机械的方法，如化肥、药品等的生产。掌握“生产过程组织、生产类型”知识点。\n \n68.与其他生产过程组织形式相比，流水生产线的特征包括（　）。\nA.连续性\nB.节奏性\nC.通用性\nD.随机性\nE.比例性"}, {"question": "假设某企业某型号灯管的工序能力指数为1.72，那么该企业可以采取的措施有（　）。", "options": [{"label": "A", "text": "降低工序能力\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n15"}, {"label": "B", "text": "更改设计，提高产品的技术要求"}, {"label": "C", "text": "努力提高设备精度"}, {"label": "D", "text": "修订标准\nE.采取合并或减少工序"}], "answer": "A", "analysis": "本题考查流水生产线的特征。流水生产线具有良好的连续性、比例性、平等性、节奏性，能取得良\n好的经济效益。掌握“生产线组织、流水生产线的特征、分类、生产条件”知识点。\n \n69.假设某企业某型号灯管的工序能力指数为1.72，那么该企业可以采取的措施有（　）。\nA.降低工序能力\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n15\nB.更改设计，提高产品的技术要求\nC.努力提高设备精度\nD.修订标准\nE.采取合并或减少工序"}, {"question": "67时，可以认为工序能力过剩。工序能力指数太大", "options": [{"label": "A", "text": "因果图法"}, {"label": "B", "text": "直方图法"}, {"label": "C", "text": "系统图法"}, {"label": "D", "text": "调查表法\nE.矩阵图法"}], "answer": "A", "analysis": "本题考查工序能力指数的判断与处置。当CP1.67时，可以认为工序能力过剩。工序能力指数太大\n，意味着粗活细做，这样必然影响生产效率，提高产品成本。这时，应根据实际情况采取以下措施降低\nCP：①降低工序能力。如改用精度较低但效率高、成本低的设备和原材料，合理地将工序能力指数降低到适\n当的水平；②更改设计，提高产品的技术要求；③采取合并或减少工序等方法。掌握“工序能力分析”知识\n点。\n \n70.下列质量管理方法中，经常使用的老七种工具有（　）。\nA.因果图法\nB.直方图法\nC.系统图法\nD.调查表法\nE.矩阵图法"}, {"question": "在企业的新产品开发战略中，冒险战略的基本特征是（　）。", "options": [{"label": "A", "text": "新产品开发的竞争域是产品的最终用途和技术的结合"}, {"label": "B", "text": "新产品开发的目标是企业快速发展和大幅度提高市场占有率"}, {"label": "C", "text": "开发出的产品多为模仿品"}, {"label": "D", "text": "新产品创意构思来源于市场营销和生产过程\nE.新产品开发的方式是自行研制开发、引进开发或合作开发"}], "answer": "A", "analysis": "本题考查全面质量管理的方法。目前，全面质量管理中广泛运用各种方法，有老七种工具，具体包\n括因果图、排列图、直方图、控制图、散布图、分层图、调查表；还有新七种工具，是指关联图法、亲和图\n法、系统图法、矩阵图法、矩阵数据分析法、过程决策程序图法、矢线图法。掌握“全面质量管理”知识点\n。\n \n71.在企业的新产品开发战略中，冒险战略的基本特征是（　）。\nA.新产品开发的竞争域是产品的最终用途和技术的结合\nB.新产品开发的目标是企业快速发展和大幅度提高市场占有率\nC.开发出的产品多为模仿品\nD.新产品创意构思来源于市场营销和生产过程\nE.新产品开发的方式是自行研制开发、引进开发或合作开发"}, {"question": "新产品鉴定一般分为样品鉴定和小批试制鉴定，样品鉴定的内容主要有（　）。", "options": [{"label": "A", "text": "工艺文件和工艺装备是否齐全"}, {"label": "B", "text": "零件加工装配质量是否符合质量标准"}, {"label": "C", "text": "新产品的设计资料是否完整"}, {"label": "D", "text": "样品外观质量是否符合技术要求\nE.零部件、备件是否完整"}], "answer": "A", "analysis": "本题考查冒险战略。这种新产品开发战略的基本特征是：新产品开发的竞争域确定为产品的最终用\n途和技术的结合方面，企业将力求在技术上有较大的改进，甚至出现技术革命；新产品开发的目标是企业快\n速发展和大幅度提高市场占有率；新产品创意构思的来源一般是企业研究与开发的成果或许可证贸易；新产\n品的创新度期望是首创；甚至是首创中的艺术性突破；所选择的新产品投放市场的时机多为率先投入；新产\n品开发的方式一般是自行研制开发、引进开发或合作开发。掌握“新产品开发战略的含义、特征及基本类型\n”知识点。\n \n72.新产品鉴定一般分为样品鉴定和小批试制鉴定，样品鉴定的内容主要有（　）。\nA.工艺文件和工艺装备是否齐全\nB.零件加工装配质量是否符合质量标准\nC.新产品的设计资料是否完整\nD.样品外观质量是否符合技术要求\nE.零部件、备件是否完整"}, {"question": "工作轮换的优点有（　）。", "options": [{"label": "A", "text": "能丰富培训对象的工作经历"}, {"label": "B", "text": "能较好地识别培训对象的长处和短处"}, {"label": "C", "text": "有利于建立强烈的岗位意识和高度的责任感"}, {"label": "D", "text": "有助于工作效果或效率\nE.能增强培训对象对各部门管理工作的了解并增进各部门之间的合作"}], "answer": "C", "analysis": "本题考查新产品的鉴定。样品鉴定主要包括以下内容：①新产品的设计资料是否完整，样品是否符\n合技术任务书、国家标准和其他技术文件的规定。如果是系列产品，还应检查是否符合技术任务书中规定的\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16\n参数标准。②检查样品的精度和外观质量是否符合技术要求，并进行空运转试验和负荷运转试验，然后再检\n查样品的精度。③检查零部件、备件的完整性。④对样品的结构、性能、工艺性和经济性做出总评价，对样\n品的优缺点做出结论，并提出改进建议，编写出样品试制鉴定书，提出是否可以转入小批试制的意见。掌握\n“新产品开发的过程”知识点。\n \n73.工作轮换的优点有（　）。\nA.能丰富培训对象的工作经历\nB.能较好地识别培训对象的长处和短处\nC.有利于建立强烈的岗位意识和高度的责任感\nD.有助于工作效果或效率\nE.能增强培训对象对各部门管理工作的了解并增进各部门之间的合作"}, {"question": "在企业培训需求分析系统中，属于工作层面培训需求分析的内容有（　）。", "options": [{"label": "A", "text": "企业目标"}, {"label": "B", "text": "企业资源"}, {"label": "C", "text": "企业工作的饱和程度"}, {"label": "D", "text": "企业工作的复杂程度\nE.企业所处的环境"}], "answer": "A", "analysis": "本题考查工作轮换。工作轮换的优点是：能丰富培训对象的工作经历，也能较好地识别培训对象的\n长处和短处，还能增强培训对象对各部门管理工作的了解并增进各部门之间的合作。工作轮换的不足之处是\n：由于受训员工在每一工作岗位上停留的时间较短，因而容易缺乏强烈的岗位意识和高度的责任感；由于受\n训者的水平不高，容易影响整个部门或小组工作效率或工作效果；由于受训者的表现还会影响其身边的其他\n员工，容易在多个部门造成更坏的影响。掌握“常用的在职培训方法”知识点。\n \n74.在企业培训需求分析系统中，属于工作层面培训需求分析的内容有（　）。\nA.企业目标\nB.企业资源\nC.企业工作的饱和程度\nD.企业工作的复杂程度\nE.企业所处的环境"}, {"question": "下列责任中，属于企业对非合同利益相关者的社会责任有（　）。", "options": [{"label": "A", "text": "设计人性化的工作方式"}, {"label": "B", "text": "环境保护"}, {"label": "C", "text": "增加员工福利"}, {"label": "D", "text": "支持公益活动\nE.参与灾害救助"}], "answer": "C", "analysis": "本题考查工作层面的培训需求分析。工作层面的培训需求分析主要包括：①工作的复杂程度；②工\n作的饱和程度；③工作的难易程度；④工作内容和形式的变化。掌握“员工培训的需求分析”知识点。\n \n75.下列责任中，属于企业对非合同利益相关者的社会责任有（　）。\nA.设计人性化的工作方式\nB.环境保护\nC.增加员工福利\nD.支持公益活动\nE.参与灾害救助"}, {"question": "下列指标中，反映企业偿债能力的指标有（　）。", "options": [{"label": "A", "text": "速动比率"}, {"label": "B", "text": "资产负债率"}, {"label": "C", "text": "流动比率"}, {"label": "D", "text": "流动资产周转率\nE.营业毛利率\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17"}], "answer": "B", "analysis": "本题考查财务管理的社会责任。企业对待非合同利益相关者的社会责任主要有：环境保护，例如\n，使排污标准降低至法定标准之下、节约能源等；产品安全，例如，即使消费者使用不当也不会构成危险等\n；市场营销，例如，广告具有高尚情趣、不在某些市场销售自己的产品等；对社区活动的态度，例如，赞助\n当地活动、支持公益活动、参与灾害救助等。掌握“财务管理的目标与社会责任”知识点。\n \n76.下列指标中，反映企业偿债能力的指标有（　）。\nA.速动比率\nB.资产负债率\nC.流动比率\nD.流动资产周转率\nE.营业毛利率\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17"}, {"question": "实施过程涉及执行与控制方面的内容，核心工作包括（　）。", "options": [{"label": "A", "text": "明确行动方案"}, {"label": "B", "text": "调整组织结构"}, {"label": "C", "text": "完善规章制度"}, {"label": "D", "text": "协调关键工作流程\nE.制定规章制度"}], "answer": "A", "analysis": "本题考查偿债能力比率。短期偿债能力比率：流动比率、速动比率、现金流动负债比率。长期偿债\n能力比率：资产负债率、产权比率、已获利息倍数。掌握“偿债能力比率”知识点。\n \n77.实施过程涉及执行与控制方面的内容，核心工作包括（　）。\nA.明确行动方案\nB.调整组织结构\nC.完善规章制度\nD.协调关键工作流程\nE.制定规章制度"}, {"question": "在管理信息系统中，系统的维护主要体现在（　）。", "options": [{"label": "A", "text": "编制维护条例和手册"}, {"label": "B", "text": "按照条例和手册进行维护"}, {"label": "C", "text": "维护记录完整"}, {"label": "D", "text": "代码维护\nE.硬件维护"}], "answer": "A", "analysis": "本题考查营销计划的实施。实施过程涉及执行与控制方面的内容，核心工作包括：明确行动方案、\n调整组织结构、完善规章制度、协调关键工作流程等。掌握“营销计划的制订和实施”知识点。\n \n78.在管理信息系统中，系统的维护主要体现在（　）。\nA.编制维护条例和手册\nB.按照条例和手册进行维护\nC.维护记录完整\nD.代码维护\nE.硬件维护"}, {"question": "采用德尔菲法进行市场预测的步骤包括（　）。", "options": [{"label": "A", "text": "组成专家小组"}, {"label": "B", "text": "准备资料"}, {"label": "C", "text": "初步预测"}, {"label": "D", "text": "反馈修正\nE.专家讨论"}], "answer": "A", "analysis": "本题考查系统的维护。系统的维护：（1）编制维护条例和手册；（2）按照条例和手册进行维护\n；（3）维护记录完整；（4）代码维护；（5）对重大维护事件要有报告文件。掌握“管理信息系统的应用\n”知识点。\n \n79.采用德尔菲法进行市场预测的步骤包括（　）。\nA.组成专家小组\nB.准备资料\nC.初步预测\nD.反馈修正\nE.专家讨论"}, {"question": "全球定位系统的主要功能包括（　）。", "options": [{"label": "A", "text": "野外勘探"}, {"label": "B", "text": "现代交通"}, {"label": "C", "text": "旅游"}, {"label": "D", "text": "科学研究\nE.教学"}], "answer": "A", "analysis": "本题考查德尔菲法的程序。德尔菲法的程序：（1）组成专家小组；（2）准备资料；（3）初步预测\n；（4）反馈修正；（5）确定预测值。掌握“德尔菲法”知识点。\n \n80.全球定位系统的主要功能包括（　）。\nA.野外勘探\nB.现代交通\nC.旅游\nD.科学研究\nE.教学"}, {"question": "【不定项选择题】如果采用算术平均数法进行预测，该新产品的市场需求量的预测值为（　）。", "options": [{"label": "A", "text": "30"}, {"label": "B", "text": "40"}, {"label": "C", "text": "50"}, {"label": "D", "text": "60"}], "answer": "A", "analysis": "全球定位系统的主要功能包括野外勘探、现代交通、旅游、科学研究以及军事。故E错误。掌握“全\n球定位系统”知识点。\n \n共享题干题\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n18\n【题干】某家电生产厂商采用德尔菲法，选定5名专家对该企业研发的新产品的市场需求量进行预测，最后一\n轮函询的数据见表。\n表　德尔菲法最后一轮函询数据统计表　　　　　　　　单位：万台\n \n根据以上资料，回答下列问题：\n \n \n81.【不定项选择题】如果采用算术平均数法进行预测，该新产品的市场需求量的预测值为（　）。\nA.30\nB.40\nC.50\nD.60"}, {"question": "【不定项选择题】如果采用加权平均数法进行预测，该新产品的市场需求量的预测值为（　）。", "options": [{"label": "A", "text": "38.25"}, {"label": "B", "text": "49.75"}, {"label": "C", "text": "51.32"}, {"label": "D", "text": "65.78"}], "answer": "C", "analysis": "本题考查德尔菲法。Y＝（40＋60＋50＋55＋45）÷5＝50（万台）掌握“德尔菲法”知识点。\n \n82.【不定项选择题】如果采用加权平均数法进行预测，该新产品的市场需求量的预测值为（　）。\nA.38.25\nB.49.75\nC.51.32\nD.65.78"}, {"question": "2＋60×0.1＋50×0.25＋55×0.3＋45×0.15＝49.75（万台）掌握“德尔菲法”知识点。", "options": [{"label": "A", "text": "40"}, {"label": "B", "text": "42"}, {"label": "C", "text": "50"}, {"label": "D", "text": "55"}], "answer": "B", "analysis": "本题考查德尔菲法的数据统计分析。若采用加权平均数法进行预测\n：Y＝40×0.2＋60×0.1＋50×0.25＋55×0.3＋45×0.15＝49.75（万台）掌握“德尔菲法”知识点。\n \n83.【不定项选择题】如果采用中位数法进行预测，该新产品的市场需求量的预测值为（　）。\nA.40\nB.42\nC.50\nD.55"}, {"question": "45、50、55、60；排序序", "options": [{"label": "A", "text": "量化性"}, {"label": "B", "text": "反馈性"}, {"label": "C", "text": "匿名性"}, {"label": "D", "text": "客观性"}], "an 机物料消耗.低值易耗品摊销.办公费和差旅费等）.工会经费.劳动保险费.董事会费.聘请中介机构\n费.咨询费.诉讼费.业务招待费.车船税.技术转让费.矿产资源补偿费.无形资产摊销.职工教育经费.研究与开\n发费.排污费.存货盘亏或盘盈（不包括应计入营业外支出的存货损失）等。\n \n2.根据《中华人民共和国劳动合同法》，劳动者在试用期内与企业解除劳动合同，需提前（）日通知用人单\n位。\nA.60\nB.30\nC.15\nD.3"}, {"question": "某企业为了解当地50000个家庭的食品支出情况，采用抽样方法抽取500个家庭进行市场调查。被抽取的这", "options": [{"label": "A", "text": "总体"}, {"label": "B", "text": "抽样总体"}, {"label": "C", "text": "抽样框"}, {"label": "D", "text": "总体单位"}], "answer": "D", "analysis": "一般情形下，劳动者应提前30日通知用人单位解除合同。试用期内需提前3日通知用人单位解除合同\n。用人单位违法，劳动者可以解除合同。非常情况下，劳动者解除合同无须提前通知用人单位。\n \n3.某企业为了解当地50000个家庭的食品支出情况，采用抽样方法抽取500个家庭进行市场调查。被抽取的这\n500个家庭称为（）。\nA.总体\nB.抽样总体\nC.抽样框\nD.总体单位"}, {"question": "以下哪种不属于企业变革的战略类型（）。", "options": [{"label": "A", "text": "技术变革"}, {"label": "B", "text": "产品与服务变革"}, {"label": "C", "text": "战略与结构变革"}, {"label": "D", "text": "生产变革"}], "answer": "B", "analysis": "全及总体简称总体或母体，是指所要调查单位的全体。由于总体是抽样调查推断的对象或目标，因\n此又称其为目标总体。构成总体的每一个单位或个体称为总体单位，总体单位的数量称为总体单位数。抽样\n总体简称样本，是从总体中抽取的一部分单位（个体）的集合。\n \n4.以下哪种不属于企业变革的战略类型（）。\nA.技术变革\nB.产品与服务变革\nC.战略与结构变革\nD.生产变革"}, {"question": "下列筹资方式中，融得的是物而不是资金的是（）。", "options": [{"label": "A", "text": "发行股票"}, {"label": "B", "text": "利用商业信用\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n1"}, {"label": "C", "text": "租赁筹资"}, {"label": "D", "text": "利用留存收益"}], "answer": "D", "analysis": "企业变革的战略类型包括：技术变革.产品与服务变革.战略与结构变革.文化变革。\n \n5.下列筹资方式中，融得的是物而不是资金的是（）。\nA.发行股票\nB.利用商业信用\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n1\nC.租赁筹资\nD.利用留存收益"}, {"question": "某共享单车运营企业通过市场调查，了解消费者使用共享单车的频率.骑行距离.使用共享单车过程中遇到", "options": [{"label": "A", "text": "描述性市场调查"}, {"label": "B", "text": "预测性市场调查"}, {"label": "C", "text": "因果性市场调查"}, {"label": "D", "text": "探测性市场调查"}], "answer": "C", "analysis": "企业筹资方式一般有以下几种：①吸收直接投资。②发行普通股。③发行债券。④银行借款。⑤商\n业信用。⑥租赁筹资。⑦利用留存收益。⑧发行短期融资券。⑨其他金融工具。租赁筹资是企业按照租赁合\n同租入资产的特殊筹资方式。其直接涉及的是物而不是资金。\n \n6.某共享单车运营企业通过市场调查，了解消费者使用共享单车的频率.骑行距离.使用共享单车过程中遇到\n过的问题等信息。根据市场调查的目的划分，该企业采用的市场调查属于（）。\nA.描述性市场调查\nB.预测性市场调查\nC.因果性市场调查\nD.探测性市场调查"}, {"question": "下列筹资方式中，筹集的资金可永久使用的是（）。", "options": [{"label": "A", "text": "银行借款"}, {"label": "B", "text": "发行债券"}, {"label": "C", "text": "商业信用"}, {"label": "D", "text": "发行股票"}], "answer": "A", "analysis": "描述性市场调查是对所研究的市场对象.市场因素作客观的.全面反映的市场调查，侧重回答“是什\n么”。题中该企业通过市场调查主要是获取消费者使用共享单车的相关信息，故属于描述性市场调查。\n \n7.下列筹资方式中，筹集的资金可永久使用的是（）。\nA.银行借款\nB.发行债券\nC.商业信用\nD.发行股票"}, {"question": "某企业的市场调查人员在对部分符合要求的受调查者进行调查的基础上，根据他们提供的信息，进一步对", "options": [{"label": "A", "text": "任意抽样"}, {"label": "B", "text": "判断抽样"}, {"label": "C", "text": "配额抽样"}, {"label": "D", "text": "滚雪球抽样"}], "answer": "D", "analysis": "筹资方式是指企业筹集资金所采取的具体形式和利用的具体工具。筹资方式一般有：①吸收直接投\n资。②发行普通股。发行普通股是股份制公司筹集股权资本的基本方式。优点是筹措的资金可永久使用，没\n有固定的股利负担，筹资风险小。③发行债券。发行债券是指企业依照债券发行协议通过发售债券直接筹资\n。④银行借款。银行借款是企业按照借款合同从银行等金融机构筹集短期或长期的债务资本的筹资方式。\n⑤商业信用。商业信用是指企业通过赊购或预收货款等商品交易行为获得短期债务资本的筹资方式。⑥租赁\n筹资。⑦利用留存收益。⑧发行短期融资券。⑨其他金融工具。\n \n8.某企业的市场调查人员在对部分符合要求的受调查者进行调查的基础上，根据他们提供的信息，进一步对\n其他相关人员进行调查，直到满足原本的样本要求量。该企业采取的抽样方式是（）。\nA.任意抽样\nB.判断抽样\nC.配额抽样\nD.滚雪球抽样"}, {"question": "下列产品的生产中，属于连续型生产的是（）。", "options": [{"label": "A", "text": "农药药剂"}, {"label": "B", "text": "汽车"}, {"label": "C", "text": "轮船"}, {"label": "D", "text": "机床\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n2"}], "answer": "D", "analysis": "非随机抽样包括：任意抽样.判断抽样.配额抽样.滚雪球抽样。其中，滚雪球抽样是指在对个别符合\n要求的受调查者进行调查的基础上，根据他们提供的信息，进一步对其他相关人员进行调查，直到满足样本\n要求量为止。\n \n9.下列产品的生产中，属于连续型生产的是（）。\nA.农药药剂\nB.汽车\nC.轮船\nD.机床\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n2"}, {"question": "下列新产品开发方式中，要求企业产品有广阔市场的是（）。", "options": [{"label": "A", "text": "自行研制开发"}, {"label": "B", "text": "引进开发"}, {"label": "C", "text": "委托开发"}, {"label": "D", "text": "合作开发"}], "answer": "A", "analysis": "连续型生产的工艺流程往往表现为用化学的而不是物理的或机械的方法，如化肥.药品等的生产。\n \n10.下列新产品开发方式中，要求企业产品有广阔市场的是（）。\nA.自行研制开发\nB.引进开发\nC.委托开发\nD.合作开发"}, {"question": "在企业招聘员工时，主要用来测量应聘者的思维能力.学习能力和适应环境能力的心理测评是（）。", "options": [{"label": "A", "text": "成就测评"}, {"label": "B", "text": "倾向测评"}, {"label": "C", "text": "智力测评"}, {"label": "D", "text": "人格测评"}], "answer": "B", "analysis": "引进开发是指企业通过技术合作.技术转移.购买技术专利等引进国内外先进成熟的应用技术和制造\n技术，并以此来实现新产品开发的技术开发方式。但开发后的新产品将面临较为激烈的市场竞争，因此，适\n用于产品有广阔市场的企业。\n \n11.在企业招聘员工时，主要用来测量应聘者的思维能力.学习能力和适应环境能力的心理测评是（）。\nA.成就测评\nB.倾向测评\nC.智力测评\nD.人格测评"}, {"question": "以下哪项不是工作说明书的编写原则（）。", "options": [{"label": "A", "text": "逻辑性原则"}, {"label": "B", "text": "准确性原则"}, {"label": "C", "text": "实用性原则"}, {"label": "D", "text": "简要性原则"}], "answer": "C", "analysis": "心理测评是对应聘者的心理素质和能力的测试，在员工招聘工作中，心理测评主要有成就测评.倾向\n测评.智力测评.人格测评及能力测评等。智力测评是对一个人受智力水平影响而表现出的外在行为的测评\n，主要用来测评一个人的思维能力.学习能力和适应环境能力。\n \n12.以下哪项不是工作说明书的编写原则（）。\nA.逻辑性原则\nB.准确性原则\nC.实用性原则\nD.简要性原则"}, {"question": "根据我国有关现金管理的规定，企业的库存现金一般以（）天的零星开支为限。", "options": [{"label": "A", "text": "1～3"}, {"label": "B", "text": "3～5"}, {"label": "C", "text": "5～7"}, {"label": "D", "text": "10～15"}], "answer": "D", "analysis": "工作说明书的编写原则包括：逻辑性原则.准确性原则.实用性原则.完整性原则和统一性原则。\n \n13.根据我国有关现金管理的规定，企业的库存现金一般以（）天的零星开支为限。\nA.1～3\nB.3～5\nC.5～7\nD.10～15"}, {"question": "产品质量监督部门依法对某企业生产的产品进行抽查，发现其产品质量不合格，责令其生产者.销售者限", "options": [{"label": "A", "text": "予以公告"}, {"label": "B", "text": "吊销其税务登记证"}, {"label": "C", "text": "责令其停业，限期整改\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3"}, {"label": "D", "text": "吊销其营业执照"}], "answer": "B", "analysis": "广义现金是指在生产经营过程中以货币形式存在的资金，包括库存现金.银行存款和其他货币资金。\n国家对现金管理有明确规定。包括：①现金的使用范围。②库存的现金一般以3～5天的零星开支为限。③不\n得坐支现金。④不得出租出借银行账户。⑤不得套用银行信用。⑥不得保存账外公款。\n \n14.产品质量监督部门依法对某企业生产的产品进行抽查，发现其产品质量不合格，责令其生产者.销售者限\n期改正。逾期不改正的，质量监督部门应对该企业作出的处理为（）。\nA.予以公告\nB.吊销其税务登记证\nC.责令其停业，限期整改\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3\nD.吊销其营业执照"}, {"question": "从设备投入使用到因技术进步而更新所经历的时间是该设备的（）。", "options": [{"label": "A", "text": "使用寿命"}, {"label": "B", "text": "经济寿命"}, {"label": "C", "text": "技术寿命"}, {"label": "D", "text": "设计寿命"}], "answer": "A", "analysis": "产品质量监督部门依法对某企业生产的产品进行抽查，发现其产品质量不合格，责令其生产者.销售\n者限期改正。逾期不改正的，由省级以上人民政府市场监督管理部门予以公告。\n \n15.从设备投入使用到因技术进步而更新所经历的时间是该设备的（）。\nA.使用寿命\nB.经济寿命\nC.技术寿命\nD.设计寿命"}, {"question": "某企业进行员工培训时，让管理人员.专业教练对员工进行一对一的培训，尤其注重员工的态度训练。该", "options": [{"label": "A", "text": "教练方法"}, {"label": "B", "text": "案例研究法"}, {"label": "C", "text": "情景模拟法"}, {"label": "D", "text": "行为示范法"}], "answer": "C", "analysis": "由于技术进步，在实际工作中大多数的情况是在设备尚未达到其经济寿命年限时，就应该使用技术\n更先进.经济更合理的新设备。这种从设备投入使用到因技术进步而更新所经历的时间称为设备技术寿命。\n \n16.某企业进行员工培训时，让管理人员.专业教练对员工进行一对一的培训，尤其注重员工的态度训练。该\n企业采用的培训方法是（）。\nA.教练方法\nB.案例研究法\nC.情景模拟法\nD.行为示范法"}, {"question": "确定零部件的结构.尺寸.配合关系.技术条件，编写出各种计算数据和技术经济资料。这是新产品设计中", "options": [{"label": "A", "text": "初步设计"}, {"label": "B", "text": "技术设计"}, {"label": "C", "text": "工作图设计"}, {"label": "D", "text": "整体设计"}], "answer": "A", "analysis": "教练方法是在职培训方法的一种，是指由管理人员与专业教练进行的一对一的培训方式，专业教练\n不只是知识或技巧的训练者，更着重于“激发人的潜能”，注重一种态度训练。\n \n17.确定零部件的结构.尺寸.配合关系.技术条件，编写出各种计算数据和技术经济资料。这是新产品设计中\n（）阶段的主要任务。\nA.初步设计\nB.技术设计\nC.工作图设计\nD.整体设计"}, {"question": "在企业所有资产中，流动性最好的资产是（）。", "options": [{"label": "A", "text": "存货"}, {"label": "B", "text": "应收账款"}, {"label": "C", "text": "速动资产"}, {"label": "D", "text": "现金"}], "answer": "B", "analysis": "新产品设计一般分为初步设计.技术设计.工作图设计。其中技术设计是指确定零部件的结构.尺寸\n.配合关系.技术条件，编写出各种计算数据和技术经济资料。\n \n18.在企业所有资产中，流动性最好的资产是（）。\nA.存货\nB.应收账款\nC.速动资产\nD.现金"}, {"question": "关于《中华人民共和国产品质量法》，下列说法错误的是（）。", "options": [{"label": "A", "text": "《中华人民共和国产品质量法》所称的“产品”是指经过加工和制作，用于销售的产品.建设工程.初级产\n品等"}, {"label": "B", "text": "《中华人民共和国产品质量法》规定了生产者和销售者的产品质量责任和义务\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n4"}, {"label": "C", "text": "根据《中华人民共和国产品质量法》，军工产品的质量管理由中央军委及有关部门另行制定办法"}, {"label": "D", "text": "《中华人民共和国产品质量法》规定了生产者.销售者因产品质量的违法行为而应承担的行政责任.刑事责\n任"}], "answer": "D", "analysis": "现金是流动性最好的资产。\n \n19.关于《中华人民共和国产品质量法》，下列说法错误的是（）。\nA.《中华人民共和国产品质量法》所称的“产品”是指经过加工和制作，用于销售的产品.建设工程.初级产\n品等\nB.《中华人民共和国产品质量法》规定了生产者和销售者的产品质量责任和义务\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n4\nC.根据《中华人民共和国产品质量法》，军工产品的质量管理由中央军委及有关部门另行制定办法\nD.《中华人民共和国产品质量法》规定了生产者.销售者因产品质量的违法行为而应承担的行政责任.刑事责\n任"}, {"question": "A公司拟实施某项技术改造项目，预计需要新投资700万元，拆除旧厂房设备将损失300万元，而这些厂房", "options": [{"label": "A", "text": "900"}, {"label": "B", "text": "910"}, {"label": "C", "text": "920"}, {"label": "D", "text": "930"}], "answer": "A", "analysis": "《中华人民共和国产品质量法》适用的产品范围是以销售为目的，通过工业加工.手工制作等生产方\n式所获得的具有特定使用性能的产品。初级农产品（如小麦.水果等）.初级畜禽产品.建筑工程等不适用该法\n规定。第三章，叙述了生产者.销售者的产品质量责任和义务。第五章，罚则，主要规定了生产者.销售者因\n产品质量的违法行为而应承担的行政责任.刑事责任。第六章，附则，规定了军工产品的质量管理由国务院\n.中央军事委员会另行制定办法。\n \n20.A公司拟实施某项技术改造项目，预计需要新投资700万元，拆除旧厂房设备将损失300万元，而这些厂房\n设备的残值为80万元，则该项目的总投资为（）万元。\nA.900\nB.910\nC.920\nD.930"}, {"question": "为实现“事事有人负责”和“事事有条件负责”的愿景，企业的组织设计需要遵循的原则是（）。", "options": [{"label": "A", "text": "统一指挥原则"}, {"label": "B", "text": "权责对等原则"}, {"label": "C", "text": "分工与协作原则"}, {"label": "D", "text": "精简原则"}], "answer": "C", "analysis": "总投资=因技术改造而新追加的投资额+技术改造中拆除的旧设备.旧设施等所造成的损失金额一拆除\n固定资产回收利用的价值。依据题中数据可得700+300-80=920（万元）。\n \n21.为实现“事事有人负责”和“事事有条件负责”的愿景，企业的组织设计需要遵循的原则是（）。\nA.统一指挥原则\nB.权责对等原则\nC.分工与协作原则\nD.精简原则"}, {"question": "企业进行筹资决策时，主要是通过平衡资本成本和（）来选择资金来源的最佳结构。", "options": [{"label": "A", "text": "筹资渠道"}, {"label": "B", "text": "筹资方式"}, {"label": "C", "text": "筹资数量"}, {"label": "D", "text": "筹资风险"}], "answer": "B", "analysis": "企业组织设计的根本目的是保证企业目标的实现。权责对等原则是指企业中每一个职务和部门都有\n必须完成的任务，而要顺利完成这些任务就需要利用一定的人力.财力.物力等资源，这是企业人员责任与权\n力的统一，是企业“事事有人负责”和“事事有条件负责”的基本前提。\n \n22.企业进行筹资决策时，主要是通过平衡资本成本和（）来选择资金来源的最佳结构。\nA.筹资渠道\nB.筹资方式\nC.筹资数量\nD.筹资风险"}, {"question": "在企业所制定的标准中，生产组织标准属于（）。", "options": [{"label": "A", "text": "技术标准"}, {"label": "B", "text": "产品标准"}, {"label": "C", "text": "安全标准"}, {"label": "D", "text": "管理标准"}], "answer": "D", "analysis": "筹资决策是指为满足企业融资的需要，对筹资渠道.筹资方式.筹资数量.筹资风险等进行评价和选择\n，基本思想是平衡资本成本和筹资风险后安排资金来源的最佳结构。\n \n23.在企业所制定的标准中，生产组织标准属于（）。\nA.技术标准\nB.产品标准\nC.安全标准\nD.管理标准"}, {"question": "通过计算和比较技术改造项目各方案的投资回收期，并同时与标准投资回收期进行比较，从而进行决策的", "options": [{"label": "A", "text": "效益成本分析法"}, {"label": "B", "text": "盈亏平衡点法"}, {"label": "C", "text": "投资回收期法"}, {"label": "D", "text": "追加投资回收期法"}], "answer": "D", "analysis": "管理标准是指对企业重复出现的管理业务和工作责任，按有效利用时间.提高工作效率的要求，对工\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5\n作程序.工作方法.工作职责和制度所做的统一规定，包括生产组织标准.技术管理标准.经济管理标准等。\n \n24.通过计算和比较技术改造项目各方案的投资回收期，并同时与标准投资回收期进行比较，从而进行决策的\n方法是（）。\nA.效益成本分析法\nB.盈亏平衡点法\nC.投资回收期法\nD.追加投资回收期法"}, {"question": "管理幅度是指一个主管能够直接有效地指挥和监督下属的（）。", "options": [{"label": "A", "text": "数量"}, {"label": "B", "text": "能力"}, {"label": "C", "text": "层级"}, {"label": "D", "text": "职级"}], "answer": "C", "analysis": "投资回收期是指某技术改造方案的投资额用该方案实施后的净收益额来补偿的时间，通常以年为单\n位。许多国家都制定了不同部门和行业的标准投资回收期。当某一技术改造项目有多个实施方案时，要首先\n计算出每个方案的投资回收期，与标准投资回收期进行比较，淘汰超过标准投资回收期的方案。再比较其余\n的方案，选择投资回收期最短的方案作为优选方案。投资回收期法适用于对资金时间价值忽略的静态分析\n，而且各方案为互斥方案。\n \n25.管理幅度是指一个主管能够直接有效地指挥和监督下属的（）。\nA.数量\nB.能力\nC.层级\nD.职级"}, {"question": "某个流水线的节拍是8分钟，线上某道工序所需加工时间为16分钟，则该道工序所需设备数量是（）。", "options": [{"label": "A", "text": "1"}, {"label": "B", "text": "2"}, {"label": "C", "text": "3"}, {"label": "D", "text": "4"}], "answer": "A", "analysis": "管理幅度是指一个主管能够直接有效地指挥和监督下属的数量。\n \n26.某个流水线的节拍是8分钟，线上某道工序所需加工时间为16分钟，则该道工序所需设备数量是（）。\nA.1\nB.2\nC.3\nD.4"}, {"question": "机械制造企业进行的设备维修活动属于（）。", "options": [{"label": "A", "text": "生产技术准备过程"}, {"label": "B", "text": "基本生产过程"}, {"label": "C", "text": "辅助生产过程"}, {"label": "D", "text": "生产服务过程"}], "answer": "B", "analysis": "某道工序所需设备数量=该道工序所需加工时间÷该道工序所在流水线的平均节拍（分子分母同单位\n），依据题中数据可得答案为2。\n \n27.机械制造企业进行的设备维修活动属于（）。\nA.生产技术准备过程\nB.基本生产过程\nC.辅助生产过程\nD.生产服务过程"}, {"question": "下列关于全面市场调查的说法，错误的是（）。", "options": [{"label": "A", "text": "全面市场调查也称市场普查"}, {"label": "B", "text": "全面市场调查的调查时点应根据各地调查情况进行差异化选择"}, {"label": "C", "text": "全面市场调查应规定统一的调查项目和指标\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n6"}, {"label": "D", "text": "全面市场调查一般比抽样市场调查时间长.费用高"}], "answer": "C", "analysis": "一般企业的生产过程基本上是由生产技术准备过程.基本生产过程.辅助生产过程.生产服务过程等组\n成。辅助生产过程是指为保证基本生产过程的正常进行所必需的各种辅助性生产活动，如机械制造企业中的\n动力生产.工具制造.模具制造.设备维修等。\n \n28.下列关于全面市场调查的说法，错误的是（）。\nA.全面市场调查也称市场普查\nB.全面市场调查的调查时点应根据各地调查情况进行差异化选择\nC.全面市场调查应规定统一的调查项目和指标\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n6\nD.全面市场调查一般比抽样市场调查时间长.费用高"}, {"question": "下列资金中，不属于企业自留资本的是（）。", "options": [{"label": "A", "text": "未分配利润"}, {"label": "B", "text": "其他法人单位资金"}, {"label": "C", "text": "盈余公积金"}, {"label": "D", "text": "某些经常性的延期支付款项"}], "answer": "B", "analysis": "全面市场调查应规定统一的市场调查资料所属的标准时点（调查时点）以避免因为自然变动或者机\n械变动而产生调查资料的重复和遗漏，使全面市场调查获得的资料具有一致性和可比性。\n \n29.下列资金中，不属于企业自留资本的是（）。\nA.未分配利润\nB.其他法人单位资金\nC.盈余公积金\nD.某些经常性的延期支付款项"}, {"question": "某企业采用德尔菲法进行市场预测，选定8名专家对其研发新产品的市场需求量进行预测，最后一轮函询", "options": [{"label": "A", "text": "61"}, {"label": "B", "text": "62"}, {"label": "C", "text": "63"}, {"label": "D", "text": "64"}], "answer": "B", "analysis": "企业自留资本主要是提取盈余公积金和未分配利润形成的资金，也包括一些经常性的延期支付款项\n。\n \n30.某企业采用德尔菲法进行市场预测，选定8名专家对其研发新产品的市场需求量进行预测，最后一轮函询\n得到的数据见下表。若采用中位数法，该新产品市场需求量的预测值为（）万台。\n \n \n \nA.61\nB.62\nC.63\nD.64"}, {"question": "63的平均数62。", "options": [{"label": "A", "text": "晋升"}, {"label": "B", "text": "职位转换"}, {"label": "C", "text": "人才储备"}, {"label": "D", "text": "工作扩大"}], "answer": "B", "analysis": "中位数法指将总体当中的各变量值按照大小顺序排列，处于变量数列中间位置的变量值称为中位数\n。当专家人数为奇数时，处于中间位置的变量值即为中位数：当专家人数为偶数时，中间位置两个变量值的\n平均数即为中位数。题中专家有8位，故取中间位置的61.63的平均数62。\n \n31.当企业比较重要的职位出现空缺时，从与该职位同级别但相对较次要职位的人员中挑选适宜人员填补这一\n空缺职位的招聘方法是（）。\nA.晋升\nB.职位转换\nC.人才储备\nD.工作扩大"}, {"question": "甲公司2015年向银行借款380万元，该项财务活动属于（）。", "options": [{"label": "A", "text": "分配活动\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n7"}, {"label": "B", "text": "投资活动"}, {"label": "C", "text": "筹资活动"}, {"label": "D", "text": "营收活动"}], "answer": "B", "analysis": "企业员工内部招聘的形式主要有晋升和职位转换。晋升是指企业中高一级职位出现空缺时，从企业\n内部挑选较为适宜的人员补充职位空缺，挑选的人员一般是从一个较低职位晋升到一个较高职位。职位转换\n是指当企业中比较重要的职位出现空缺时，从与该职位同级别但相对较次要职位的人员中挑选适宜人员填补\n空缺职位的一种招聘方法。\n \n32.甲公司2015年向银行借款380万元，该项财务活动属于（）。\nA.分配活动\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n7\nB.投资活动\nC.筹资活动\nD.营收活动"}, {"question": "某产品的一项质量特性若超过规定的特性值要求，从而直接影响产品安全性或使该产品整体功能丧失。这", "options": [{"label": "A", "text": "关键质量特性"}, {"label": "B", "text": "重要质量特性"}, {"label": "C", "text": "广义质量特性"}, {"label": "D", "text": "次要质量特性"}], "answer": "C", "analysis": "企业组织商品生产，必须以占有或能够支配一定数额的资金为前提。企业筹集资金表现为企业资金\n的流入。企业偿还借款.支付利息.股利以及付出各种筹资费用等，则表现为企业资金的流出。这种因为资金\n筹集而产生的资金收支，便是由企业筹资而引起的财务活动。\n \n33.某产品的一项质量特性若超过规定的特性值要求，从而直接影响产品安全性或使该产品整体功能丧失。这\n一项质量特性属于（）。\nA.关键质量特性\nB.重要质量特性\nC.广义质量特性\nD.次要质量特性"}, {"question": "根据《中华人民共和国劳动争议调解仲裁法》，被诉人应当自收到申诉书副本之日起（）内提交答辩书和", "options": [{"label": "A", "text": "7日"}, {"label": "B", "text": "10日"}, {"label": "C", "text": "15日"}, {"label": "D", "text": "30日"}], "answer": "A", "analysis": "关键质量特性是指若超过规定的特性值要求。会直接影响产品安全性或使产品整体功能丧失的质量\n特性。\n \n34.根据《中华人民共和国劳动争议调解仲裁法》，被诉人应当自收到申诉书副本之日起（）内提交答辩书和\n有关证据。\nA.7日\nB.10日\nC.15日\nD.30日"}, {"question": "某巧克力公司为调查某品牌巧克力更换包装的销售效果。选取A超市作为实验组.B超市作为控制组，进行", "options": [{"label": "A", "text": "100"}, {"label": "B", "text": "200"}, {"label": "C", "text": "300"}, {"label": "D", "text": "500"}], "answer": "B", "analysis": "根据《中华人民共和国劳动争议调解仲裁法》，被诉人应当自收到申诉书副本之日起10日内提交答\n辩书和有关证据。\n \n35.某巧克力公司为调查某品牌巧克力更换包装的销售效果。选取A超市作为实验组.B超市作为控制组，进行\n有控制组的事前事后对比实验，更换包装前后的月销量见下表。该实验的实验变数效果为（）箱。\n \n \n \nA.100\nB.200\nC.300\nD.500"}, {"question": "某企业组织设计单对象流水线，计划日生产量为60件，每日工作16小时，时间有效利用系数为0.95，假定", "options": [{"label": "A", "text": "13.8"}, {"label": "B", "text": "15.1"}, {"label": "C", "text": "15.6"}, {"label": "D", "text": "16.2"}], "answer": "B", "analysis": "实验变数效果计算公式为：实验变数效果=（实验组的事后测量值一实验组的事前测量值）-（控制\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8\n组的事后测量值一控制组的事前测量值）。将题中数据代入公式可得结果为200。\n \n36.某企业组织设计单对象流水线，计划日生产量为60件，每日工作16小时，时间有效利用系数为0.95，假定\n废品率为1%，则该流水线的平均节拍约是（）分钟。\nA.13.8\nB.15.1\nC.15.6\nD.16.2"}, {"question": "048分钟，与选项B更接近。", "options": [{"label": "A", "text": "操作层信息"}, {"label": "B", "text": "管理层信息"}, {"label": "C", "text": "决策层信息"}, {"label": "D", "text": "业务层信息"}], "answer": "B", "analysis": "流水线的平均节拍=（工作时间有效利用系数X计划期流水线的制度工作时间）÷计划期的产品产量\n（包括计划产量和预计废品量），依据题中数据可得答案为15.048分钟，与选项B更接近。\n \n37.按照管理层次不同，企业信息分类不包括（）。\nA.操作层信息\nB.管理层信息\nC.决策层信息\nD.业务层信息"}, {"question": "关于市场预测误差的说法，正确的是（）。", "options": [{"label": "A", "text": "不能承认一点预测误差的存在"}, {"label": "B", "text": "相对误差越大表明绝对误差与真实值的比值越小"}, {"label": "C", "text": "相对误差越小表明预测的准确程度越低"}, {"label": "D", "text": "选择不同的预测方法，市场预测误差会发生变化"}], "answer": "D", "analysis": "按照管理层次不同，企业信息可以分为：操作层信息.管理层信息.决策层信息，一般与管理机构层\n次相对应。\n \n38.关于市场预测误差的说法，正确的是（）。\nA.不能承认一点预测误差的存在\nB.相对误差越大表明绝对误差与真实值的比值越小\nC.相对误差越小表明预测的准确程度越低\nD.选择不同的预测方法，市场预测误差会发生变化"}, {"question": "根据彼得.圣吉的观点，学习型组织的五项修炼是指（）。", "options": [{"label": "A", "text": "自我超越.改善心智模式.建立共同世界观.团队学习.系统思考"}, {"label": "B", "text": "自我反省.改善心智模式.建立共同愿景.团队学习.系统思考"}, {"label": "C", "text": "自我超越.改善心智模式.建立共同愿景.团队学习.线性思考"}, {"label": "D", "text": "自我超越.改善心智模式.建立共同愿景.团队学习.系统思考"}], "answer": "D", "analysis": "要承认一定程度的预测误差的存在；相对误差越大表明绝对误差与真实值的比值越大；相对误差越\n小表明预测的准确程度越高；选择不同的预测方法，市场预测误差会发生变化。\n \n39.根据彼得.圣吉的观点，学习型组织的五项修炼是指（）。\nA.自我超越.改善心智模式.建立共同世界观.团队学习.系统思考\nB.自我反省.改善心智模式.建立共同愿景.团队学习.系统思考\nC.自我超越.改善心智模式.建立共同愿景.团队学习.线性思考\nD.自我超越.改善心智模式.建立共同愿景.团队学习.系统思考"}, {"question": "某企业从销售员中选择一人担任销售部经理，该企业采用的招聘方法是（）。", "options": [{"label": "A", "text": "晋升"}, {"label": "B", "text": "职位转换"}, {"label": "C", "text": "职位轮换"}, {"label": "D", "text": "工作扩大"}], "answer": "D", "analysis": "学习型组织的形成需要企业进行艰苦的转型，为此，传统企业必须刻苦地修炼。1990年，彼得·圣\n吉在其著作《第五项修炼——学习型组织的艺术与实务》中，明确提出了传统企业进行修炼的五个关键性方\n面，包括自我超越.改善心智模式.建立共同愿景.团队学习和系统思考。\n \n40.某企业从销售员中选择一人担任销售部经理，该企业采用的招聘方法是（）。\nA.晋升\nB.职位转换\nC.职位轮换\nD.工作扩大"}, {"question": "与德尔菲法相比，交锋式会议法的特点是（）。", "options": [{"label": "A", "text": "花费时间长"}, {"label": "B", "text": "匿名预测"}, {"label": "C", "text": "受权威专家的影响较大"}, {"label": "D", "text": "没有预测误差"}], "answer": "A", "analysis": "晋升是指企业中高一级职位出现空缺时，从企业内部挑选较为适宜的人员补充职位空缺，挑选的人\n员一般是从一个较低的职位晋升到一个较高的职位。\n \n41.与德尔菲法相比，交锋式会议法的特点是（）。\nA.花费时间长\nB.匿名预测\nC.受权威专家的影响较大\nD.没有预测误差"}, {"question": "国内某中等规模的以承揽咨询项目为主的咨询公司，为了提升公司适应多变竞争环境的机动性和灵活性", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "矩阵制"}, {"label": "D", "text": "直线职能制"}], "answer": "C", "analysis": "交锋式会议法是与会专家围绕一个主题，各自发表意见，并进行充分争论。最后达成共识，取得比\n较一致的预测结论。它的局限性是容易出现“权威者”左右与会者意见。德尔菲法以匿名方式通过几轮函询\n征求专家的意见，预测组织小组对每一轮的意见进行汇总整理后作为参考再发送给各位专家，供他们分析判\n断，以提出新的论证，其缺点是预测过程比较复杂，花费时间较长。\n \n42.国内某中等规模的以承揽咨询项目为主的咨询公司，为了提升公司适应多变竞争环境的机动性和灵活性\n，宜采取的组织结构形式是（）。\nA.直线制\nB.职能制\nC.矩阵制\nD.直线职能制"}, {"question": "产权比率可反映企业财务结构稳健程度，其算式为（）。", "options": [{"label": "A", "text": "负债合计÷股东权益合计"}, {"label": "B", "text": "股东权益合计÷负债合计"}, {"label": "C", "text": "股东权益合计÷资产合计"}, {"label": "D", "text": "资产合计÷股东权益合计"}], "answer": "C", "analysis": "矩阵制打破了传统的人员只受一个部门领导的管理原则，从而加强了管理部门之间的纵向和横向联\n系，有利于各职能部门之间的配合。这种组织形式适用于生产经营复杂多变的企业，特别适用于创新性和开\n发性的工作项目。\n \n43.产权比率可反映企业财务结构稳健程度，其算式为（）。\nA.负债合计÷股东权益合计\nB.股东权益合计÷负债合计\nC.股东权益合计÷资产合计\nD.资产合计÷股东权益合计"}, {"question": "若产品的某项质量特性超出规定的特性值要求，会使产品整体功能丧失，则该质量特性是（）。", "options": [{"label": "A", "text": "关键质量特性"}, {"label": "B", "text": "重要质量特性"}, {"label": "C", "text": "次要质量特性"}, {"label": "D", "text": "一般质量特性"}], "answer": "A", "analysis": "产权比率是指负债总额与股东权益的比率。是企业财务结构稳健与否的重要标志；它反映企业股东\n权益对债权人权益的保障程度。\n \n44.若产品的某项质量特性超出规定的特性值要求，会使产品整体功能丧失，则该质量特性是（）。\nA.关键质量特性\nB.重要质量特性\nC.次要质量特性\nD.一般质量特性"}, {"question": "下列工作分析方法中，可以即时记录，避免遗漏，所获取的信息非常详尽，可靠性也较高的辅助方法是", "options": [{"label": "A", "text": "观察法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10"}, {"label": "B", "text": "访谈法"}, {"label": "C", "text": "工作日志法"}, {"label": "D", "text": "工作实践法"}], "answer": "A", "analysis": "关键质量特性是指若超过规定的特征值要求，会直接影响产品安全性或使产品整体功能丧失的质量\n特性。\n \n45.下列工作分析方法中，可以即时记录，避免遗漏，所获取的信息非常详尽，可靠性也较高的辅助方法是\n（）。\nA.观察法\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n10\nB.访谈法\nC.工作日志法\nD.工作实践法"}, {"question": "某企业进行工作分析时，请员工按时间顺序记录其在一个月内所从事的各项工作活动及所消耗的时间等各", "options": [{"label": "A", "text": "观察法"}, {"label": "B", "text": "面谈法"}, {"label": "C", "text": "问卷法"}, {"label": "D", "text": "工作日志法"}], "answer": "C", "analysis": "工作日志法的优点是逐日或在完成任务后即时记录，可以避免遗漏，所获取的信息非常详尽，可靠\n性也很高。但多与其他方法结合使用，以避免记录人员较浓的主观色彩。\n \n46.某企业进行工作分析时，请员工按时间顺序记录其在一个月内所从事的各项工作活动及所消耗的时间等各\n种细节。该企业采用的工作分析方法是（）。\nA.观察法\nB.面谈法\nC.问卷法\nD.工作日志法"}, {"question": "将质量检验划分为破坏性检验和非破坏性检验的依据是（）。", "options": [{"label": "A", "text": "检验实施的位置"}, {"label": "B", "text": "检验的目的"}, {"label": "C", "text": "检验对象检验后的状态"}, {"label": "D", "text": "检验的数量特征"}], "answer": "D", "analysis": "工作日志法就是由从事某项工作的员工按时间顺序记录在一段时期内所从事的各项工作活动或任务\n及所耗费的时间等各种细节。由此来了解员工实际工作的内容.责任.权力.人际关系及工作负荷。\n \n47.将质量检验划分为破坏性检验和非破坏性检验的依据是（）。\nA.检验实施的位置\nB.检验的目的\nC.检验对象检验后的状态\nD.检验的数量特征"}, {"question": "下列不属于市场预测主要内容的是（）。", "options": [{"label": "A", "text": "市场需求预测"}, {"label": "B", "text": "市场供给预测"}, {"label": "C", "text": "市场营销组合预测"}, {"label": "D", "text": "收入预测"}], "answer": "C", "analysis": "按检验对象检验后的状态特征划分，可将质量检验划分为破坏性检验和非破坏性检验。破坏性检验\n后，受检物的完整性受到破坏，不再具有原来的使用功能。\n \n48.下列不属于市场预测主要内容的是（）。\nA.市场需求预测\nB.市场供给预测\nC.市场营销组合预测\nD.收入预测"}, {"question": "对整个生产过程中的若干“片断”进行整合，这种安排属于（）。", "options": [{"label": "A", "text": "分工"}, {"label": "B", "text": "协作"}, {"label": "C", "text": "专业化"}, {"label": "D", "text": "授权"}], "answer": "D", "analysis": "市场预测的内容十分丰富，主要包括市场需求预测.市场供给预测.市场营销组合预测。\n \n49.对整个生产过程中的若干“片断”进行整合，这种安排属于（）。\nA.分工\nB.协作\nC.专业化\nD.授权"}, {"question": "在企业进行员工招聘时，可以帮助企业更准确.更全面地了解求职者潜能的心理测评方法是（）。", "options": [{"label": "A", "text": "成就测评"}, {"label": "B", "text": "倾向测评\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11"}, {"label": "C", "text": "人格测评"}, {"label": "D", "text": "能力测评"}], "answer": "B", "analysis": "现代企业是分工.专业化与协作发展的产物。分工是指让不同的劳动者分别从事不同的工作。专业化\n是指一个人或一个单位长期从事某种专项性的工作。协作是指对整个生产过程中的若干“片断”进行整合。\n \n50.在企业进行员工招聘时，可以帮助企业更准确.更全面地了解求职者潜能的心理测评方法是（）。\nA.成就测评\nB.倾向测评\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n11\nC.人格测评\nD.能力测评"}, {"question": "企业依法.照章缴纳税费，这反映政府与企业之间财务上的（）关系。", "options": [{"label": "A", "text": "资本收益分配"}, {"label": "B", "text": "内部分配"}, {"label": "C", "text": "债权债务"}, {"label": "D", "text": "强制性分配"}], "answer": "B", "analysis": "倾向测评的目的是测量一个人如果经过适当训练，能否成功掌握某项工作技能。该测评可以帮助企\n业更准确.更全面地了解求职者潜能。\n \n51.企业依法.照章缴纳税费，这反映政府与企业之间财务上的（）关系。\nA.资本收益分配\nB.内部分配\nC.债权债务\nD.强制性分配"}], "预测卷（51-100题）": [{"question": "在企业生产过程中，原材料和零部件的供应属于（）。", "options": [{"label": "A", "text": "生产服务过程"}, {"label": "B", "text": "辅助生产过程"}, {"label": "C", "text": "基本生产过程"}, {"label": "D", "text": "生产技术准备过程"}], "answer": "D", "analysis": "企业与政府之间的财务关系是强制性分配关系，表现为企业应该依法.照章缴纳税费给政府。\n \n52.在企业生产过程中，原材料和零部件的供应属于（）。\nA.生产服务过程\nB.辅助生产过程\nC.基本生产过程\nD.生产技术准备过程"}, {"question": "某服装公司召开市场预测会议，邀请专家围绕服装的流行趋势进行预测。会议要求各位专家各自发表意见", "options": [{"label": "A", "text": "集合意见法"}, {"label": "B", "text": "交锋式会议法"}, {"label": "C", "text": "德尔菲法"}, {"label": "D", "text": "主观概率法"}], "answer": "A", "analysis": "生产服务过程是指为基本生产和辅助生产服务的各种生产服务活动。如原材料和零部件的供应.运输\n.装卸.保管等。\n \n53.某服装公司召开市场预测会议，邀请专家围绕服装的流行趋势进行预测。会议要求各位专家各自发表意见\n，同时进行充分争论，最后达成共识，得到基本一致的预测结论。该公司采用的市场预测方法是（）。\nA.集合意见法\nB.交锋式会议法\nC.德尔菲法\nD.主观概率法"}, {"question": "下列控制图中，属于计数值控制图的是（）。", "options": [{"label": "A", "text": "缺陷数控制图"}, {"label": "B", "text": "中位数和极差控制图"}, {"label": "C", "text": "平均值和极差控制图"}, {"label": "D", "text": "单值控制图"}], "answer": "B", "analysis": "交锋式会议法是与会专家围绕一个主题，各自发表意见，并进行充分争论。最后取得比较一致的预\n测结论。由题意分析可知，该公司采用的市场预测方法是交锋式会议法。\n \n54.下列控制图中，属于计数值控制图的是（）。\nA.缺陷数控制图\nB.中位数和极差控制图\nC.平均值和极差控制图\nD.单值控制图"}, {"question": "企业工作分析的客体是（）。", "options": [{"label": "A", "text": "工作说明书"}, {"label": "B", "text": "工作分析报告\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n12"}, {"label": "C", "text": "企业内部的职位"}, {"label": "D", "text": "进行工作分析的人员"}], "answer": "A", "analysis": "控制图基本可以分为两大类，即计量值控制图和计数值控制图。计数值控制图是以计数值数据的质\n量特性值为控制对象的，属于这种情况的有不合格品率控制图和不合格品数控制图，还有缺陷数控制图和单\n位缺陷数控制图，这两类控制图也称为计点值控制图。\n \n55.企业工作分析的客体是（）。\nA.工作说明书\nB.工作分析报告\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n12\nC.企业内部的职位\nD.进行工作分析的人员"}, {"question": "下列企业中，更适合选择集权型组织结构形式的是（）。", "options": [{"label": "A", "text": "技术简单.工艺整体性要求不高的企业"}, {"label": "B", "text": "技术简单.工艺整体性要求高的企业"}, {"label": "C", "text": "技术复杂.工艺整体性要求高的企业"}, {"label": "D", "text": "技术复杂.工艺整体性要求不高的企业"}], "answer": "C", "analysis": "工作分析就是指管理者了解企业内的一种职位信息和任职条件信息，并以一种格式把与这种职位有\n关的信息描述出来，从而使其他人能了解这种职位和人员需求的过程。从这个意义上讲，工作分析也可以称\n为职位分析.岗位分析。工作分析的主体是进行工作分析的管理者和有关人员，客体是企业内部的各个职位\n，内容是与各个职位有关的情况信息，结果是工作说明书和工作分析报告。\n \n56.下列企业中，更适合选择集权型组织结构形式的是（）。\nA.技术简单.工艺整体性要求不高的企业\nB.技术简单.工艺整体性要求高的企业\nC.技术复杂.工艺整体性要求高的企业\nD.技术复杂.工艺整体性要求不高的企业"}, {"question": "企业在招聘员工时。根据不同的招聘要求选择适当的招聘方式，用尽可能低的成本吸引高素质的员工。这", "options": [{"label": "A", "text": "信息公开"}, {"label": "B", "text": "公平公正"}, {"label": "C", "text": "效率优先"}, {"label": "D", "text": "双向选择"}], "answer": "B", "analysis": "技术简单.工艺整体性要求高的企业，组织应该以集权型为主。\n \n57.企业在招聘员工时。根据不同的招聘要求选择适当的招聘方式，用尽可能低的成本吸引高素质的员工。这\n体现了员工招聘的（）原则。\nA.信息公开\nB.公平公正\nC.效率优先\nD.双向选择"}, {"question": "纵观企业发展的主要阶段，企业真正形成的标志是（）。", "options": [{"label": "A", "text": "现代企业制度的产生"}, {"label": "B", "text": "工厂制度的建立"}, {"label": "C", "text": "商品经济的发展"}, {"label": "D", "text": "国家的产生"}], "answer": "C", "analysis": "依据题中关键信息“尽可能低的成本”可知为效率优先原则。\n \n58.纵观企业发展的主要阶段，企业真正形成的标志是（）。\nA.现代企业制度的产生\nB.工厂制度的建立\nC.商品经济的发展\nD.国家的产生"}, {"question": "企业财务活动是指资金的筹集.投放.使用.收回和分配等一系列（）活动的总称。", "options": [{"label": "A", "text": "企业价值管理"}, {"label": "B", "text": "企业资金收支"}, {"label": "C", "text": "企业生产经营"}, {"label": "D", "text": "企业财务会计"}], "answer": "B", "analysis": "工厂生产时期工场手工业逐渐被工厂企业代替。工厂制度的建立是工场手工业发展的飞跃，标志着\n企业的真正形成。\n \n59.企业财务活动是指资金的筹集.投放.使用.收回和分配等一系列（）活动的总称。\nA.企业价值管理\nB.企业资金收支\nC.企业生产经营\nD.企业财务会计"}, {"question": "某企业年产某型号的汽车5万辆，为了降低成本.减少消耗，需耗资2亿元进行技术改造，改造完成后，每", "options": [{"label": "A", "text": "可行"}, {"label": "B", "text": "不可行\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n13"}, {"label": "C", "text": "都可以"}, {"label": "D", "text": "无法确定"}], "answer": "B", "analysis": "企业财务活动是指资金的筹集.投放.使用.收回和分配等一系列企业资金收支活动的总称。\n \n60.某企业年产某型号的汽车5万辆，为了降低成本.减少消耗，需耗资2亿元进行技术改造，改造完成后，每\n辆车的成本由原来的15万元降到14.5万元，则该方案（）。\nA.可行\nB.不可行\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n13\nC.都可以\nD.无法确定"}, {"question": "5亿元，大于技术改造成本2亿元，所以可", "options": [{"label": "A", "text": "数据采集"}, {"label": "B", "text": "数据准备"}, {"label": "C", "text": "数据输入"}, {"label": "D", "text": "数据输出\nE.辅助决策"}], "answer": "A", "analysis": "改造完成后，每辆车成本降低5000元，5万辆车成本降低2.5亿元，大于技术改造成本2亿元，所以可\n行。\n \n多项选择题\n61.数据处理功能贯穿于企业管理信息系统整个运行过程中，具体包括（）。\nA.数据采集\nB.数据准备\nC.数据输入\nD.数据输出\nE.辅助决策"}, {"question": "按照工艺专业化原则设置生产单位的缺点包括（）。", "options": [{"label": "A", "text": "产品加工路线长，厂内运输费用增加"}, {"label": "B", "text": "生产周期延长，资金占用增加"}, {"label": "C", "text": "管理工作复杂化"}, {"label": "D", "text": "对产品变化的适应性差\nE.不能充分利用生产设备和生产面积"}], "answer": "A", "analysis": "数据处理功能贯穿于企业管理信息系统整个运行过程中，具体包括数据采集.数据准备.数据输入.数\n据处理.数据输出。\n \n62.按照工艺专业化原则设置生产单位的缺点包括（）。\nA.产品加工路线长，厂内运输费用增加\nB.生产周期延长，资金占用增加\nC.管理工作复杂化\nD.对产品变化的适应性差\nE.不能充分利用生产设备和生产面积"}, {"question": "下列方法中，属于定性市场预测方法的有（）。", "options": [{"label": "A", "text": "集合意见法"}, {"label": "B", "text": "对比类推法"}, {"label": "C", "text": "移动平均法"}, {"label": "D", "text": "季节指数法\nE.德尔菲法"}], "answer": "A", "analysis": "按工艺专业化原则设置生产单位的优点是:①对产品品种的变化具有较强的适应性。②便于充分利用\n生产设备与生产面积，提高生产设备和生产面积的负荷系数。③便于进行工艺专业化管理，并有利于工人技\n术熟练程度的提高。缺点是:①产品加工路线长，运输工具.运输工人和中间仓库增多，使厂内运输费用增加\n。②生产周期延长，资金占用增加。③管理工作复杂化。\n \n63.下列方法中，属于定性市场预测方法的有（）。\nA.集合意见法\nB.对比类推法\nC.移动平均法\nD.季节指数法\nE.德尔菲法"}, {"question": "企业技术改造的原则有（）。", "options": [{"label": "A", "text": "以提高经济效益为中心，并把提高经济效益和社会效益结合起来"}, {"label": "B", "text": "以内涵为主扩大再生产"}, {"label": "C", "text": "以产品生产为主体，以资源投入为基础"}, {"label": "D", "text": "全面规划\nE.量力而行\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n14"}], "answer": "A", "analysis": "定性预测方法是预测者根据掌握的资料.结合自身的经验和专业水平，对预测对象的未来发展作出性\n质.方向和程度上的估计与推测的一种预测方法。主要包括：①专家会议法。②德尔菲法。③集合意见法。\n④主观概率法。⑤对比类推法。\n \n64.企业技术改造的原则有（）。\nA.以提高经济效益为中心，并把提高经济效益和社会效益结合起来\nB.以内涵为主扩大再生产\nC.以产品生产为主体，以资源投入为基础\nD.全面规划\nE.量力而行\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n14"}, {"question": "关于西格玛水平与企业产品质量关系的说法，错误的有（）。", "options": [{"label": "A", "text": "西格玛水平越高，缺陷率越低"}, {"label": "B", "text": "缺陷率与西格玛水平相等"}, {"label": "C", "text": "产品合格率与西格玛水平相等"}, {"label": "D", "text": "西格玛水平越高，产品质量控制水平越高\nE.西格玛水平越高，产品合格率越低"}], "answer": "A", "analysis": "企业技术改造的六项原则：以提高经济效益为中心，并把提高经济效益和社会效益结合起来；以内\n涵为主扩大再生产；全面规划，处理好当前和长远的关系；量力而行；以产品生产为主体，以工艺技术为基\n础，使各个方面工作协调配套；把技术先进性.生产使用性.经济合理性结合起来。\n \n65.关于西格玛水平与企业产品质量关系的说法，错误的有（）。\nA.西格玛水平越高，缺陷率越低\nB.缺陷率与西格玛水平相等\nC.产品合格率与西格玛水平相等\nD.西格玛水平越高，产品质量控制水平越高\nE.西格玛水平越高，产品合格率越低"}, {"question": "企业内部分工能提高企业生产效率，其主要表现有（）。", "options": [{"label": "A", "text": "分工可以使劳动者的劳动技巧获得提高"}, {"label": "B", "text": "分工能减少劳动转换时间"}, {"label": "C", "text": "分工促进了先进劳动工具.机器的发明和使用"}, {"label": "D", "text": "分工促进了全社会的资源得到高效率的使用，节约了社会资源\nE.分工便于对生产要素进行重组，从而使各要素充分发挥优势，并相互协调"}], "answer": "B", "analysis": "西格玛在统计学上表示在总体中的个体数据相对于平均值的偏离程度或者正态数据的离散程度(标准\n差)。测量出的西格玛表示诸如单位缺陷.百万缺陷或错误的概率性，西格玛值越大，缺陷或错误就越少。在\n质量管理领域，西格玛用来表示质量控制水平。西格玛水平越高，缺陷率越低，产品质量控制水平越高。\n \n66.企业内部分工能提高企业生产效率，其主要表现有（）。\nA.分工可以使劳动者的劳动技巧获得提高\nB.分工能减少劳动转换时间\nC.分工促进了先进劳动工具.机器的发明和使用\nD.分工促进了全社会的资源得到高效率的使用，节约了社会资源\nE.分工便于对生产要素进行重组，从而使各要素充分发挥优势，并相互协调"}, {"question": "安全生产的特点不包括（）。", "options": [{"label": "A", "text": "预防性"}, {"label": "B", "text": "长期性"}, {"label": "C", "text": "科学性"}, {"label": "D", "text": "准时性\nE.全面性"}], "answer": "A", "analysis": "分工是为了适应生产率提高的要求而产生的，而分工和专业化所产生的效率来源于各个劳动者有差\n异的劳动能力的充分发挥以及劳动者合作所产生的协调力。企业内部分工可以减少企业投入和增加产出，从\n而提高生产效率。①分工可以使劳动者的劳动技巧获得提高。②分工能减少劳动转换时间。③分工促进了先\n进劳动工具和机器的发明和使用。④分工便于对生产要素进行重组，从而使各要素充分发挥优势，并相互协\n调。\n \n67.安全生产的特点不包括（）。\nA.预防性\nB.长期性\nC.科学性\nD.准时性\nE.全面性"}, {"question": "企业进行市场调查，采用的方法有（）。", "options": [{"label": "A", "text": "经验判断法"}, {"label": "B", "text": "访问法"}, {"label": "C", "text": "观察法"}, {"label": "D", "text": "联测法\nE.实验调查法"}], "answer": "D", "analysis": "安全生产特点包括：预防性.长期性.科学性.群众性。\n \n68.企业进行市场调查，采用的方法有（）。\nA.经验判断法\nB.访问法\nC.观察法\nD.联测法\nE.实验调查法"}, {"question": "根据《中华人民共和国劳动合同法》，劳动合同终止的情形有（）。", "options": [{"label": "A", "text": "劳动合同期满的"}, {"label": "B", "text": "女职工在孕期.产期.哺乳期的"}, {"label": "C", "text": "劳动者死亡的"}, {"label": "D", "text": "企业申请破产的\nE.企业被吊销营业执照的"}], "answer": "B", "analysis": "市场调查的方法主要有访问法.观察法.实验调查法。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n15\n \n69.根据《中华人民共和国劳动合同法》，劳动合同终止的情形有（）。\nA.劳动合同期满的\nB.女职工在孕期.产期.哺乳期的\nC.劳动者死亡的\nD.企业申请破产的\nE.企业被吊销营业执照的"}, {"question": "生产过程空间组织的形式有（）。", "options": [{"label": "A", "text": "工艺专业化布置"}, {"label": "B", "text": "对象专业化布置"}, {"label": "C", "text": "混合式布置"}, {"label": "D", "text": "灵活式布置\nE.固定布置"}], "answer": "A", "analysis": "《中华人民共和国劳动合同法》第44条规定，有下列情形之一的，劳动合同终止：①劳动合同期满\n的。②劳动者开始依法享受基本养老保险待遇的。③劳动者死亡或者被人民法院宣告死亡或者宣告失踪的。\n④企业被依法宣告破产的。⑤企业被吊销营业执照.责令关闭.撤销或者用人单位决定提前解散的。⑥法律.行\n政法规规定的其他情形。\n \n70.生产过程空间组织的形式有（）。\nA.工艺专业化布置\nB.对象专业化布置\nC.混合式布置\nD.灵活式布置\nE.固定布置"}, {"question": "《中华人民共和国产品质量法》遵循的立法原则有（）。", "options": [{"label": "A", "text": "有限范围原则"}, {"label": "B", "text": "奖优罚劣原则"}, {"label": "C", "text": "行政区域统一管理.组织协调的属地化原则"}, {"label": "D", "text": "统一立法.统一管理原则\nE.区域公平原则"}], "answer": "A", "analysis": "生产过程空间组织形式包括四种：工艺专业化布置.对象专业化布置.混合式布置和固定布置。\n \n71.《中华人民共和国产品质量法》遵循的立法原则有（）。\nA.有限范围原则\nB.奖优罚劣原则\nC.行政区域统一管理.组织协调的属地化原则\nD.统一立法.统一管理原则\nE.区域公平原则"}, {"question": "关于企业制度的说法，正确的有（）。", "options": [{"label": "A", "text": "企业制度以产权制度为基础"}, {"label": "B", "text": "企业制度以组织制度为核心"}, {"label": "C", "text": "企业制度通过市场供求关系配置市场资源"}, {"label": "D", "text": "企业制度包括单个业主制.合伙制和公司制等基本法律形式\nE.企业制度包括企业的产权制度.组织制度和管理制度"}], "answer": "A", "analysis": "《中华人民共和国产品质量法》立法的基本原则主要有以下几个方面：①有限范围原则。②统一立\n法.区别管理的原则。③实行行政区域统一管理.组织协调的属地化原则。④奖优罚劣原则。\n \n72.关于企业制度的说法，正确的有（）。\nA.企业制度以产权制度为基础\nB.企业制度以组织制度为核心\nC.企业制度通过市场供求关系配置市场资源\nD.企业制度包括单个业主制.合伙制和公司制等基本法律形式\nE.企业制度包括企业的产权制度.组织制度和管理制度"}, {"question": "企业组织设计的基本任务不包括（）。", "options": [{"label": "A", "text": "开发设计产品"}, {"label": "B", "text": "提供组织结构系统图\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16"}, {"label": "C", "text": "编制工艺流程"}, {"label": "D", "text": "重组业务流程\nE.编制职务说明书"}], "answer": "A", "analysis": "企业制度以产权制度为基础和核心；从社会资源配置的方式来看，企业制度是相对于市场制度和政\n府直接管理制度而言的；企业制度包括单个业主制.合伙制和公司制等基本法律形式；企业制度包括企业的产\n权制度.组织制度和管理制度。\n \n73.企业组织设计的基本任务不包括（）。\nA.开发设计产品\nB.提供组织结构系统图\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n16\nC.编制工艺流程\nD.重组业务流程\nE.编制职务说明书"}, {"question": "构思新产品创意时，常用的评价筛选方法有（）。", "options": [{"label": "A", "text": "优缺点列举法"}, {"label": "B", "text": "价值工程法"}, {"label": "C", "text": "对比类推法"}, {"label": "D", "text": "综合评分法\nE.联测法"}], "answer": "A", "analysis": "企业组织设计的基本任务有：提供组织结构系统图.编制职务说明书。\n \n74.构思新产品创意时，常用的评价筛选方法有（）。\nA.优缺点列举法\nB.价值工程法\nC.对比类推法\nD.综合评分法\nE.联测法"}, {"question": "观察法的优点有（）。", "options": [{"label": "A", "text": "直观可靠"}, {"label": "B", "text": "适用于大范围的市场调查"}, {"label": "C", "text": "真实性较高"}, {"label": "D", "text": "独立取舍，不受调查对象的影响\nE.不受语言交流的影响"}], "answer": "A", "analysis": "新产品创意构思的筛选分为经验筛选和评价筛选两步。经验筛选就是挑选有经验.有见识的人员或新\n产品开发的主管人员凭自己的工作经验，对每个设想进行甄别。评价筛选就是借助专门的评价方法，对留下\n来的新产品创意构思进行筛选。常用的评价方法有优缺点列举法.价值工程法.综合评分法.经济比较分析法等\n。\n \n75.观察法的优点有（）。\nA.直观可靠\nB.适用于大范围的市场调查\nC.真实性较高\nD.独立取舍，不受调查对象的影响\nE.不受语言交流的影响"}, {"question": "下列劳动合同条款中，属于法定条款的有（）。", "options": [{"label": "A", "text": "保守商业秘密和竞争限制"}, {"label": "B", "text": "劳动报酬"}, {"label": "C", "text": "社会保险"}, {"label": "D", "text": "试用期\nE.培训"}], "answer": "A", "analysis": "观察法是指调查人员不与被调查对象正面接触，而是通过在旁边观察和记录来收集资料的一种市场\n调查方法。其优点是：直观可靠；真实性较高；不受语言交流的影响：独立取舍，不受调查对象的影响。但\n是其通常只适用于小范围的市场调查。\n \n76.下列劳动合同条款中，属于法定条款的有（）。\nA.保守商业秘密和竞争限制\nB.劳动报酬\nC.社会保险\nD.试用期\nE.培训"}, {"question": "与简单随机抽样相比，等距抽样的特点有（）。", "options": [{"label": "A", "text": "样本在调查总体中的分布比较均匀"}, {"label": "B", "text": "抽样误差小"}, {"label": "C", "text": "更符合随机原则\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17"}, {"label": "D", "text": "对调查总体资料的完整性要求较高\nE.样本具有较高的代表性"}], "answer": "B", "analysis": "劳动合同的内容是通过具体条款体现的。合同的条款分为法定条款和约定条款。约定条款如不违反\n法律和行政法规，具有与法定条款同样的约束力。法定条款有：①用人单位的名称.住所和法定代表人或者主\n要负责人。②劳动者的姓名.住址和居民身份证或者其他有效身份证件号码。③劳动合同期限。④工作内容和\n工作地点。⑤工作时间和休息休假。⑥劳动报酬。⑦社会保险。⑧劳动保护.劳动条件和职业危害防护。⑨法\n律.法规规定应当纳入劳动合同的其他事项。\n \n77.与简单随机抽样相比，等距抽样的特点有（）。\nA.样本在调查总体中的分布比较均匀\nB.抽样误差小\nC.更符合随机原则\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n17\nD.对调查总体资料的完整性要求较高\nE.样本具有较高的代表性"}, {"question": "某互联网公司采用虚拟企业组织模式进行运营。这种企业组织模式的主要优势有（）。", "options": [{"label": "A", "text": "能够对市场需求做出快速反应"}, {"label": "B", "text": "能够快速招募销售人员"}, {"label": "C", "text": "能够较好地分摊开发投资费用"}, {"label": "D", "text": "能够迅速垄断市场\nE.能够有效规避经营风险"}], "answer": "A", "analysis": "简单随机抽样是指完全排除任何有目的的选择，按照随机性原则，不对调查总体做任何加工整理\n，直接从调查总体中抽取调查样本的抽样调查方式。缺点是：简单随机抽样需要给调查总体中每个单位编号\n，如果调查总体庞大，这种编号几乎是不可能的，因此它适用于单位数量不多的调查对象；当调查总体的标\n志变异程度较大时，简单随机抽样所产生的样本的代表性会受到影响。等距抽样是指将调查总体各单位按照\n某一标志排序，通过选择一个随机的起点，然后按照某种确定的距离或间隔，从总体中抽取样本单位的随机\n抽样方式。等距抽样的优点是：简单易行，容易确定样本单位；样本在调查总体中的分布比较均匀，具有较\n高的代表性，抽样误差小于简单随机抽样；比简单随机抽样更为简单，花费时间少，成本也更低。缺点是\n：如果调查总体具有某一种周期性变化，则会影响调查的精度和代表性：对调查总体资料的完整性要求高\n；误差计算较为复杂。\n \n78.某互联网公司采用虚拟企业组织模式进行运营。这种企业组织模式的主要优势有（）。\nA.能够对市场需求做出快速反应\nB.能够快速招募销售人员\nC.能够较好地分摊开发投资费用\nD.能够迅速垄断市场\nE.能够有效规避经营风险"}, {"question": "下列市场预测活动中，属于市场营销组合预测的有（）。", "options": [{"label": "A", "text": "市场需求构成预测"}, {"label": "B", "text": "消费者购买行为预测"}, {"label": "C", "text": "销售渠道预测"}, {"label": "D", "text": "促销方式预测\nE.价格预测"}], "answer": "A", "analysis": "虚拟经营改变了传统的企业扩张途径和规模标准，企业规模的大小不再主要以资产和组织规模的大\n小作为衡量的尺度，而是主要以销售额.利润额的多少作为衡量的尺度。虚拟企业有以下几个方面的优势\n：①对市场需求的反应快速。②具备最优化的技术解决方案。③能够分摊开发投资费用。④能够有效规避经\n营风险。\n \n79.下列市场预测活动中，属于市场营销组合预测的有（）。\nA.市场需求构成预测\nB.消费者购买行为预测\nC.销售渠道预测\nD.促销方式预测\nE.价格预测"}, {"question": "在工作分析的准备阶段，主要进行的工作包括（）。", "options": [{"label": "A", "text": "确定工作分析目的"}, {"label": "B", "text": "制订工作分析计划"}, {"label": "C", "text": "组建工作分析小组"}, {"label": "D", "text": "审查工作信息\nE.分析工作信息"}], "answer": "C", "analysis": "市场营销组合是指企业针对目标市场的需要，综合考虑环境.能力.竞争状况，对自己可控制的各种\n营销因素进行优化组合和综合运用，使之协调配合，扬长避短，发挥优势，以取得更好的经济效益和社会效\n益。市场营销组合预测，是对企业的产品.价格.销售渠道.促销方式等营销因素所进行的预测。\n \n80.在工作分析的准备阶段，主要进行的工作包括（）。\nA.确定工作分析目的\nB.制订工作分析计划\nC.组建工作分析小组\nD.审查工作信息\nE.分析工作信息"}, {"question": "【多项选择题】该企业可以选择的非随机抽样方法是（）。", "options": [{"label": "A", "text": "任意抽样"}, {"label": "B", "text": "判断抽样"}, {"label": "C", "text": "等距抽样"}, {"label": "D", "text": "分层抽样"}], "answer": "A", "analysis": "工作分析的实施是一个完整的过程，一般应包括准备阶段.调查阶段.分析阶段.形成结果阶段和应用\n反馈阶段五个阶段。准备阶段主要包括以下工作：①确定工作分析目的。②制订工作分析计划。③组建工作\n分析小组。④建立有效的沟通体系。⑤确定调查和分析对象的样本。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n18\n \n共享题干题\n【题干】为了掌握市场信息，有效安排生产运营，某乳品生产企业进行了市场调查和市场预测活动。企业市\n场调查人员采用非随机抽样的方法，选取部分顾客进行问卷调查。在充分说明填写要求后，调查人员请被调\n查顾客自行填写调查问卷，一周后回收问卷。同时，企业还收集了内部和外部的历史资料和文献信息，对消\n费者的购买行为进行分析。该企业2013--2018年乳品销售额见下表。\n \n \n \n \n81.【多项选择题】该企业可以选择的非随机抽样方法是（）。\nA.任意抽样\nB.判断抽样\nC.等距抽样\nD.分层抽样"}, {"question": "【多项选择题】该企业采用的市场调查方法是（）。", "options": [{"label": "A", "text": "留置调查法"}, {"label": "B", "text": "文案调查法"}, {"label": "C", "text": "观察法"}, {"label": "D", "text": "拦截访问法"}], "answer": "A", "analysis": "非随机抽样又称为非概率抽样，是指调查人员根据自己的方便或主观判断抽取样本的方法。常见的\n非随机抽样的方法有以下几种：①任意抽样。②判断抽样。③配额抽样。④滚雪球抽样。\n \n \n82.【多项选择题】该企业采用的市场调查方法是（）。\nA.留置调查法\nB.文案调查法\nC.观察法\nD.拦截访问法"}, {"question": "【单项选择题】若采用简单移动平均法预测(选择移动跨越期n=5)，该企业2019年的乳品销售额预测值是", "options": [{"label": "A", "text": "2180"}, {"label": "B", "text": "2220"}, {"label": "C", "text": "2350"}, {"label": "D", "text": "2400"}], "answer": "A", "analysis": "留置调查法是指将事先设计好的调查问卷当面交给被调查者，说明填写要求并留下调查问卷，请被\n调查者自行填写，再由调查人员定期回收的一种获取市场信息资料的调查方法。文案调查法又称为资料分析\n法，是利用企业内部和外部现有的各种信息.资料和情报，对调查内容进行分析研究的一种市场调查方法。\n \n83.【单项选择题】若采用简单移动平均法预测(选择移动跨越期n=5)，该企业2019年的乳品销售额预测值是\n（）万元。\nA.2180\nB.2220\nC.2350\nD.2400"}, {"question": "【单项选择题】若采用简单移动平均法预测(选择移动跨越期n=3)，则2017年预测的相对误差是（）。", "options": [{"label": "A", "text": "6.52%"}, {"label": "B", "text": "7.97%"}, {"label": "C", "text": "-150"}, {"label": "D", "text": "150"}], "answer": "B", "analysis": "简单移动平均法是对时间序列的数据按一定跨越期进行移动，逐个计算其算术移动平均值，取最后\n一个移动平均值为预测值的方法。简单移动平均法的预测模型为：\n \n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n19\n \n故本题中，销售额预测值=(2350+2300+2300+1900+2250)÷5=2220(万元)。\n \n84.【单项选择题】若采用简单移动平均法预测(选择移动跨越期n=3)，则2017年预测的相对误差是（）。\nA.6.52%\nB.7.97%\nC.-150\nD.150"}, {"question": "52%。", "options": [{"label": "A", "text": "单件生产"}, {"label": "B", "text": "小批生产"}, {"label": "C", "text": "中批生产"}, {"label": "D", "text": "大量生产"}], "answer": "A", "analysis": "将数据代入简单移动平均法的预测模型，销售额预测值=(2300+1900+2250)÷3=2150(万元)。因此\n，本题中，2017年预测的相对误差=(2300-2150)÷2300×100%≈6.52%。\n \n【题干】某企业生产单一农机产品。该企业在综合分析企业的生产技术现状以及其他因素的基础上，决定采\n用流水线的生产组织方式进行产品装配。该流水线采用两班制的生产模式，产品日生产量为100台，每班工作\n时间为8小时，工作时间有效利用系数为0.9，假定废品率为0。在进行工序同期化后，该企业测算该流水线的\n第3道工序所需设备数为1.94，最终确定第3道工序实际设备数为2。\n \n85.【单项选择题】该流水线适合（）类型的产品。\nA.单件生产\nB.小批生产\nC.中批生产\nD.大量生产"}, {"question": "【单项选择题】该流水线的平均节拍是（）分钟。", "options": [{"label": "A", "text": "3.3"}, {"label": "B", "text": "4.6"}, {"label": "C", "text": "7.8"}, {"label": "D", "text": "8.6"}], "answer": "D", "analysis": "企业生产类型是影响生产过程组织的主要因素，也是设计企业生产系统首先应确定的重要问题。大\n量生产类型是指生产的产品产量大而品种少，经常重复生产一种或少数几种类似的产品的一种生产类型。其\n特点是：生产条件稳定，大多数工作地仅固定完成一或二道工序，专业化程度较高。\n \n86.【单项选择题】该流水线的平均节拍是（）分钟。\nA.3.3\nB.4.6\nC.7.8\nD.8.6"}, {"question": "9×8×60×2÷100≈8.6（分钟）。", "options": [{"label": "A", "text": "0.79"}, {"label": "B", "text": "0.90"}, {"label": "C", "text": "0.97"}, {"label": "D", "text": "1.05\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n20"}], "answer": "D", "analysis": "节拍是指流水线生产上连续生产两个相同制品的间隔时间。计算公式如下：r=\n \n \n式中，r为流水线的平均节拍；Te为计划期流水线的有效工作时间；Q为计划期的产品产量；β为工作时间有\n效利用系数；T0为计划期流水线的制度工作时间。故本题中，r=0.9×8×60×2÷100≈8.6（分钟）。\n \n87.【单项选择题】该流水线第3道工序的设备负荷系数为（）。\nA.0.79\nB.0.90\nC.0.97\nD.1.05\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n20"}, {"question": "94÷2=0.97。", "options": [{"label": "A", "text": "工艺专业化布置"}, {"label": "B", "text": "对象专业化布置"}, {"label": "C", "text": "固定布置"}, {"label": "D", "text": "混合类型布置"}], "answer": "C", "analysis": "一般来说，计算的设备数都不是整数，所取的设备数只能是整台数，这样设备负荷\n \n \n式中，Si为第i道工序所需设备的计算数；Sei为第i道工序安排的实际设备数。故本题中\n，Ki=1.94÷2=0.97。\n \n88.【单项选择题】该流水线的空间组织形式是（）。\nA.工艺专业化布置\nB.对象专业化布置\nC.固定布置\nD.混合类型布置"}, {"question": "【单项选择题】该企业此次抽样的样本单位数是（）。", "options": [{"label": "A", "text": "10"}, {"label": "B", "text": "50"}, {"label": "C", "text": "100"}, {"label": "D", "text": "1000"}], "answer": "B", "analysis": "企业根据具体情况确定生产过程空问组织的形式，通常包括以下几种：①工艺专业化布置。②对象\n专业化布置。对象专业化布置就是以产品（或零件.部件）为对象来设置生产单位。在对象专业化的生产单位\n中，集中了为生产某种产品所需要的各种设备和各工种工人，对同类产品进行不同的工艺加工。③混合式布\n置。④固定布置。\n \n【题干】为了掌握市场信息，有效安排生产运营，某羽绒服生产企业进行了市场调查和市场预测活动。企业\n市场调查人员选定1000家中间商作为调查总体，将每家中间商按照顺序标号，每20个号码抽取1个号码，抽取\n50家中间商作为抽样总体。而后，调查人员通过电子邮件向这50家中间商发放调查问卷，请其填写完成并邮\n回该企业。同时，调查人员还在购物中心的入口处随机选择顾客，在征得其同意后。进行访谈调查。该企业\n2015--2018年羽绒服销售额见下表。\n \n \n \n89.【单项选择题】该企业此次抽样的样本单位数是（）。\nA.10\nB.50\nC.100\nD.1000"}, {"question": "【多项选择题】该企业采用的市场调查方法有（）。", "options": [{"label": "A", "text": "入户访问法"}, {"label": "B", "text": "拦截访问法"}, {"label": "C", "text": "网络调查法"}, {"label": "D", "text": "焦点小组访谈法"}], "answer": "B", "analysis": "题中该企业采用的是随机抽样中的等距抽样调查方法，样本单位数为50。\n \n \n90.【多项选择题】该企业采用的市场调查方法有（）。\nA.入户访问法\nB.拦截访问法\nC.网络调查法\nD.焦点小组访谈法"}, {"question": "【单项选择题】该企业2018年第一季度产品销售额的预测值是310万元，则此次市场预测的绝对误差是", "options": [{"label": "A", "text": "-30"}, {"label": "B", "text": "30"}, {"label": "C", "text": "-40"}, {"label": "D", "text": "40"}], "answer": "B", "analysis": "题中该企业通过电子邮件向中间商发送调查问卷，属于网络调查法；调查人员在购物中心的入口处\n，随机选择顾客。征得其同意后，进行访谈调查属于拦截访问法。\n \n91.【单项选择题】该企业2018年第一季度产品销售额的预测值是310万元，则此次市场预测的绝对误差是\n（）万元。\nA.-30\nB.30\nC.-40\nD.40"}, {"question": "【单项选择题】若该企业2019年销售额的预测值为850万元，采用季节指数法计算，则该企业2019年第二", " swer": "C", "analysis": "2.生产过程中空间组织的最基本原则是（　）。\nA.有利于保证安全生产\nB.有利于企业内各项生产活动的正常进行\nC.有利于合理利用空间\nD.有利于减少运输空间"}], "预测卷（101-150题）": [{"question": "《中华人民共和国安全生产法》规定，安全生产的基本方针是（　）。", "options": [{"label": "A", "text": "安全第一、预防为主、综合治理"}, {"label": "B", "text": "生命第一、安全为主"}, {"label": "C", "text": "预防第一、安全为主"}, {"label": "D", "text": "安全第一、生命为主、综合治理"}], "answer": "B", "analysis": "在进行生产过程空间组织时应遵循一些总体原则，即有利于企业内各项生产活动的正常进行，提高\n经济效益。这是进行工厂总平面布置时应遵循的最基本的原则。\n \n3.《中华人民共和国安全生产法》规定，安全生产的基本方针是（　）。\nA.安全第一、预防为主、综合治理\nB.生命第一、安全为主\nC.预防第一、安全为主\nD.安全第一、生命为主、综合治理"}, {"question": "流水生产线组织设计的第一步为（　）。", "options": [{"label": "A", "text": "计算流水线节拍"}, {"label": "B", "text": "进行工序同期化"}, {"label": "C", "text": "确定各工序的工作地数"}, {"label": "D", "text": "计算流水线所需工人人数"}], "answer": "A", "analysis": "安全生产的基本方针是劳动过程中做好劳动安全卫生工作必须遵守的基本原则，《中华人民共和国\n安全生产法》规定的安全生产的基本方针是安全第一、预防为主、综合治理。\n \n4.流水生产线组织设计的第一步为（　）。\nA.计算流水线节拍\nB.进行工序同期化\nC.确定各工序的工作地数\nD.计算流水线所需工人人数"}, {"question": "某公司拟建一个加工厂，主要考虑运输成本进行厂址选择。分析人员在地图上设计了参照坐标，并确定了", "options": [{"label": "A", "text": "(550，500)"}, {"label": "B", "text": "(653，500)"}, {"label": "C", "text": "(655，550)"}, {"label": "D", "text": "(660，550)"}], "answer": "A", "analysis": "流水生产线组织设计的步骤如下：计算流水线的节拍；进行工序同期化；确定各工序的工作地数\n，计算设备的负荷率；计算流水线所需工人人数；确定运输方式，选择运输装置；流水生产线的平面布置。\n \n5.某公司拟建一个加工厂，主要考虑运输成本进行厂址选择。分析人员在地图上设计了参照坐标，并确定了\n相关地址的坐标（单位:公里）。分析表明：每年需要从A（300，500）地运来物资100吨，并向\nB（800，500）地运出物资240吨。假定各种物资每吨公里的运输费用相同，根据重心法，加工厂选址的最佳\n坐标应是（　）。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n1\nA.(550，500)\nB.(653，500)\nC.(655，550)\nD.(660，550)"}, {"question": "下面关于数据仓库的特点说法错误的是（　）。", "options": [{"label": "A", "text": "面向主题"}, {"label": "B", "text": "数据集成"}, {"label": "C", "text": "数据相对稳定"}, {"label": "D", "text": "数据不随时间变化"}], "answer": "B", "analysis": "重心法的基本思想是所选厂址可使主要原材料或货物总运量距离最小。重心法可以较快地从多个候\n选厂址方案中选择到满意的厂址。题中加工厂址的最佳坐标的计算如下：横坐标\n=（300*100+800*240）/（100+240）=653；纵坐标=（500*100+500*240）/（100+240）=500，所以最佳坐标\n为(653，500),\n \n6.下面关于数据仓库的特点说法错误的是（　）。\nA.面向主题\nB.数据集成\nC.数据相对稳定\nD.数据不随时间变化"}, {"question": "某企业在产品的检验阶段，无论是对最终产品还是对在制品，都及时反馈质量信息并认真处理，这体现了", "options": [{"label": "A", "text": "经济原则"}, {"label": "B", "text": "协作原则"}, {"label": "C", "text": "谨慎原则"}, {"label": "D", "text": "预防原则"}], "answer": "D", "analysis": "数据随时间变化。\n数据仓库中的数据通常包含历史信息，系统记录了企业从过去某时点到目前各个阶段的信息，通过这些信息\n，可以对企业的发展历程和未来趋势做出定量分析和预测，数据仓库随着时间的变化不断增加新的数据内容\n;随着时间的变化，数据以更高的层次被不断综合，以适应趋势分析的要求\n \n7.某企业在产品的检验阶段，无论是对最终产品还是对在制品，都及时反馈质量信息并认真处理，这体现了\n全面质量管理实施原则中的（　）。\nA.经济原则\nB.协作原则\nC.谨慎原则\nD.预防原则"}, {"question": "有关现代企业和传统企业之间的关系，下面说法正确的是（　）。", "options": [{"label": "A", "text": "传统企业面临的外部环境偏紧，现代企业面临的外部环境宽松"}, {"label": "B", "text": "传统企业是现代企业的基础，现代企业是传统企业的继承和发展"}, {"label": "C", "text": "传统企业和现代企业都是经济组织，所有权和经营权分离"}, {"label": "D", "text": "现代企业实行扁平式管理是对传统企业的继承"}], "answer": "D", "analysis": "预防原则是指在企业的质量管理工作中，认真贯彻预防原则，凡事防患于未然。例如，在产品制造\n阶段采用统计过程控制和统计过程诊断等科学方法对生产过程进行控制，尽量把不合格品消灭在发生之前\n；在产品检验阶段，无论是对最终产品还是对在制品，都要及时反馈质量信息并认真处理。\n \n8.有关现代企业和传统企业之间的关系，下面说法正确的是（　）。\nA.传统企业面临的外部环境偏紧，现代企业面临的外部环境宽松\nB.传统企业是现代企业的基础，现代企业是传统企业的继承和发展\nC.传统企业和现代企业都是经济组织，所有权和经营权分离\nD.现代企业实行扁平式管理是对传统企业的继承"}, {"question": "（　）是指由组织的最高管理者正式发布的该组织总的质量宗旨和质量方向，是企业经营总方针的组成部", "options": [{"label": "A", "text": "质量控制方法"}, {"label": "B", "text": "质量管理体系"}, {"label": "C", "text": "质量方针\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n2"}, {"label": "D", "text": "质量认证制度"}], "answer": "B", "analysis": "选项A，传统企业的外部环境严格；选项C，传统企业所有权和经营权不分离；选项D，传统企业实行\n垂直式直接管理。\n \n9.（　）是指由组织的最高管理者正式发布的该组织总的质量宗旨和质量方向，是企业经营总方针的组成部\n分，是企业管理者对质量的指导思想和承诺。\nA.质量控制方法\nB.质量管理体系\nC.质量方针\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n2\nD.质量认证制度"}, {"question": "当前学术界比较认可的企业管理理财目标是（　）。", "options": [{"label": "A", "text": "每股收益最大化"}, {"label": "B", "text": "利润最大化"}, {"label": "C", "text": "企业价值最大化"}, {"label": "D", "text": "股东财富最大化"}], "answer": "C", "analysis": "本题考查对质量方针的理解。\n \n10.当前学术界比较认可的企业管理理财目标是（　）。\nA.每股收益最大化\nB.利润最大化\nC.企业价值最大化\nD.股东财富最大化"}, {"question": "某企业为某零件的生产设计生产线，日产量为50件，每日工作8小时，时间利用系数为90%，废品率2%，则", "options": [{"label": "A", "text": "6.5"}, {"label": "B", "text": "7.5"}, {"label": "C", "text": "8.5"}, {"label": "D", "text": "9.5"}], "answer": "C", "analysis": "企业价值最大化的观点体现了对经济效益的深层次认识，更能体现企业主体的特征和利益相关者的\n利益。\n \n11.某企业为某零件的生产设计生产线，日产量为50件，每日工作8小时，时间利用系数为90%，废品率2%，则\n该流水线的节拍为（　）。\nA.6.5\nB.7.5\nC.8.5\nD.9.5"}, {"question": "9*8*60=432（分钟）", "options": [{"label": "A", "text": "综合处理工作信息"}, {"label": "B", "text": "完成撰写工作说明书"}, {"label": "C", "text": "全面获取工作信息"}, {"label": "D", "text": "明确编写提纲"}], "answer": "C", "analysis": "Te=BT0=0.9*8*60=432（分钟）\nQ=50/0.98=51.02（件）\nr=Te/Q=432/51.02=8.5（分钟/件）\n \n12.工作说明书编写的首要步骤是（　）。\nA.综合处理工作信息\nB.完成撰写工作说明书\nC.全面获取工作信息\nD.明确编写提纲"}, {"question": "企业不抢先研制开发新产品，而当市场上一出现新产品。就立即进行仿制或寻找新产品的缺点而加以改进", "options": [{"label": "A", "text": "进取战略"}, {"label": "B", "text": "紧随战略"}, {"label": "C", "text": "保持地位战略"}, {"label": "D", "text": "冒险战略"}], "answer": "C", "analysis": "工作说明书编写的步骤依次是全面获取工作信息，综合处理工作信息，完成撰写工作说明书。\n \n13.企业不抢先研制开发新产品，而当市场上一出现新产品。就立即进行仿制或寻找新产品的缺点而加以改进\n创新，以生产出功能、款式、包装等更好的产品，这样的新产品开发战略属于（　）。\nA.进取战略\nB.紧随战略\nC.保持地位战略\nD.冒险战略"}, {"question": "企业在进行员工培训的需求分析时，应该把（　）作为企业培训的目标。", "options": [{"label": "A", "text": "企业层面的培训需求"}, {"label": "B", "text": "工作层面的培训需求"}, {"label": "C", "text": "员工层面的培训需求"}, {"label": "D", "text": "企业、工作和员工层面三方的共同需求\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3"}], "answer": "B", "analysis": "题干所述为紧随战略的概念。\n \n14.企业在进行员工培训的需求分析时，应该把（　）作为企业培训的目标。\nA.企业层面的培训需求\nB.工作层面的培训需求\nC.员工层面的培训需求\nD.企业、工作和员工层面三方的共同需求\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n3"}, {"question": "下列属于访谈法的优点的是（　）。", "options": [{"label": "A", "text": "全面深入"}, {"label": "B", "text": "调查数据可直接由计算机处理"}, {"label": "C", "text": "可控性强"}, {"label": "D", "text": "避免遗漏"}], "answer": "D", "analysis": "企业、工作、员工三个层面的培训需求分析是一个有机的系统，缺少任何一个层面都不能进行有效\n的分析，企业在进行员工培训需求分析时，应取企业整体、工作及员工个人层面三方的共同需求区域，并以\n此作为企业员工培训的目标。\n \n15.下列属于访谈法的优点的是（　）。\nA.全面深入\nB.调查数据可直接由计算机处理\nC.可控性强\nD.避免遗漏"}, {"question": "某企业在进行售后维修人员培训时，请受训人员分别扮演售后维修组组长、售后维修员工、要求维修的顾", "options": [{"label": "A", "text": "行动学习法"}, {"label": "B", "text": "案例研究法"}, {"label": "C", "text": "情景模拟法"}, {"label": "D", "text": "行为示范法"}], "answer": "C", "analysis": "访谈法的优点是可以简单而又迅速地收集到工作分析的信息，可控性强，适用面广。\n \n16.某企业在进行售后维修人员培训时，请受训人员分别扮演售后维修组组长、售后维修员工、要求维修的顾\n客，并对存在各种故障的产品进行实际维修，以培养和提高售后维修人员的工作能力与水平。该企业采用的\n培训方法是（　）。\nA.行动学习法\nB.案例研究法\nC.情景模拟法\nD.行为示范法"}, {"question": "负债总额与资产总额的比率称为（　）。", "options": [{"label": "A", "text": "产权比率"}, {"label": "B", "text": "流动比率"}, {"label": "C", "text": "资产负债率"}, {"label": "D", "text": "速动比率"}], "answer": "C", "analysis": "情景模拟法是指通过把培训对象置于模拟的现实工作环境中，让其依据模拟现实中的情景作出及时\n的反应，分析实际工作中可能出现的各种问题，并解决问题，为进入实际工作岗位打下基础的一种培训方法\n。\n \n17.负债总额与资产总额的比率称为（　）。\nA.产权比率\nB.流动比率\nC.资产负债率\nD.速动比率"}, {"question": "关于质量认证制度，下列说法错误的是（　）。", "options": [{"label": "A", "text": "质量认证是指经权威机构确认，并通过合格证书或合格标志，证明某一产品符合相应标准或规范的活动"}, {"label": "B", "text": "质量认证的对象是产品或过程"}, {"label": "C", "text": "在质量认证活动中，第三方是一个公正的机构，它与第一方、第二方都没有任何行政上的隶属关系和经济\n上的利害关系"}, {"label": "D", "text": "质量认证是随着工业的发展作为一种外部质量保证的手段逐渐发展起来的，它经历了合格声明、第三方独\n立证实和合格评定三个阶段"}], "answer": "C", "analysis": "资产负债率的定义，资产负债率=（负债总额÷资产总额）×100%。\n \n18.关于质量认证制度，下列说法错误的是（　）。\nA.质量认证是指经权威机构确认，并通过合格证书或合格标志，证明某一产品符合相应标准或规范的活动\nB.质量认证的对象是产品或过程\nC.在质量认证活动中，第三方是一个公正的机构，它与第一方、第二方都没有任何行政上的隶属关系和经济\n上的利害关系\nD.质量认证是随着工业的发展作为一种外部质量保证的手段逐渐发展起来的，它经历了合格声明、第三方独\n立证实和合格评定三个阶段"}, {"question": "A公司入股B公司，有权确定B公司的财务和经营政策，并能从B公司的经营活动中获取利益，则A公司的投", "options": [{"label": "A", "text": "控制"}, {"label": "B", "text": "共同控制"}, {"label": "C", "text": "重大影响"}, {"label": "D", "text": "无重大影响"}], "answer": "D", "analysis": "质量认证是随着工业的发展作为一种外部质量保证的手段逐渐发展起来的，它经历了合格声明、第\n二方合格评定、第三方独立证实、风筝标志和合格评定五个阶段。\n \n19.A公司入股B公司，有权确定B公司的财务和经营政策，并能从B公司的经营活动中获取利益，则A公司的投\n资属于长期股权投资类别中的（　）。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n4\nA.控制\nB.共同控制\nC.重大影响\nD.无重大影响"}, {"question": "处于企业生命周期（　）的企业，往往会出现老化问题和官僚作风。", "options": [{"label": "A", "text": "创业阶段"}, {"label": "B", "text": "集体化阶段"}, {"label": "C", "text": "正规化阶段"}, {"label": "D", "text": "精细阶段"}], "answer": "A", "analysis": "题干所述内容表示A公司能够对B公司实施控制。\n \n20.处于企业生命周期（　）的企业，往往会出现老化问题和官僚作风。\nA.创业阶段\nB.集体化阶段\nC.正规化阶段\nD.精细阶段"}, {"question": "组织变革已经成为企业生存和发展的常态活动，企业组织变革的基本原因是（　）。", "options": [{"label": "A", "text": "管理信息化的需要"}, {"label": "B", "text": "企业领导超越自我的需要"}, {"label": "C", "text": "企业本身发展过程中的矛盾"}, {"label": "D", "text": "员工职业生涯发展的需要"}], "answer": "D", "analysis": "处于精细阶段的企业，往往出现老化问题，企业经营者逐渐丧失灵活性，组织内官僚作风兴起，沟\n通和决策速度减慢。\n \n21.组织变革已经成为企业生存和发展的常态活动，企业组织变革的基本原因是（　）。\nA.管理信息化的需要\nB.企业领导超越自我的需要\nC.企业本身发展过程中的矛盾\nD.员工职业生涯发展的需要"}, {"question": "企业管理者将企业生产经营活动的各要素、各部门、各环节、各方面在空间和时间的联系上，在劳动分工", "options": [{"label": "A", "text": "计划职能"}, {"label": "B", "text": "组织职能"}, {"label": "C", "text": "控制职能"}, {"label": "D", "text": "协调职能"}], "answer": "C", "analysis": "企业组织变革的基本原因是企业组织本身发展过程中的矛盾冲突。\n \n22.企业管理者将企业生产经营活动的各要素、各部门、各环节、各方面在空间和时间的联系上，在劳动分工\n与协作上，在上下左右的相互联系上，统一起来形成一个有机的整体，这体现了企业管理的（　）。\nA.计划职能\nB.组织职能\nC.控制职能\nD.协调职能"}, {"question": "某企业2020年产品销售量的预测值为5万台，实际销售量为6万台，该企业预测的相对误差是（　）。", "options": [{"label": "A", "text": "16.67％"}, {"label": "B", "text": "20.00％"}, {"label": "C", "text": "22.56％"}, {"label": "D", "text": "25.00％"}], "answer": "B", "analysis": "题干所述为组织职能的概念。\n \n23.某企业2020年产品销售量的预测值为5万台，实际销售量为6万台，该企业预测的相对误差是（　）。\nA.16.67％\nB.20.00％\nC.22.56％\nD.25.00％"}, {"question": "下列组织结构形式中,适合于产品单一、供销渠道稳定、工艺过程简单、规模较小企业的是（　）.", "options": [{"label": "A", "text": "直线制"}, {"label": "B", "text": "职能制"}, {"label": "C", "text": "事业部制"}, {"label": "D", "text": "矩阵制"}], "answer": "A", "analysis": "计算相对误差的公式为：\n式中，Er为相对误差；E为绝对误差；T为真实值；\n为预测值。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n5\n \n24.下列组织结构形式中,适合于产品单一、供销渠道稳定、工艺过程简单、规模较小企业的是（　）.\nA.直线制\nB.职能制\nC.事业部制\nD.矩阵制"}, {"question": "企业的利润总额包括营业利润和（　）。", "options": [{"label": "A", "text": "股利收入"}, {"label": "B", "text": "利息收入"}, {"label": "C", "text": "营业外收支净额"}, {"label": "D", "text": "其他业务利润"}], "answer": "A", "analysis": "直线制的织形式明显适合于那些产品单一、供销渠道稳定、工艺过程简单、规模较小的企业。\n \n25.企业的利润总额包括营业利润和（　）。\nA.股利收入\nB.利息收入\nC.营业外收支净额\nD.其他业务利润"}, {"question": "关于固定资产投资的特点，说法错误的是（　）。", "options": [{"label": "A", "text": "投资数额大"}, {"label": "B", "text": "回收时间长"}, {"label": "C", "text": "变现能力差"}, {"label": "D", "text": "发生次数多"}], "answer": "C", "analysis": "本题考查企业利润总额的定义。\n \n26.关于固定资产投资的特点，说法错误的是（　）。\nA.投资数额大\nB.回收时间长\nC.变现能力差\nD.发生次数多"}, {"question": "在任何情况下，产品是否可以接受最终由（　）决定。", "options": [{"label": "A", "text": "顾客"}, {"label": "B", "text": "供应商"}, {"label": "C", "text": "代理商"}, {"label": "D", "text": "分销商"}], "answer": "D", "analysis": "固定资产投资的特点：投资数额大，发生次数少；回收时间长；变现能力差。\n \n27.在任何情况下，产品是否可以接受最终由（　）决定。\nA.顾客\nB.供应商\nC.代理商\nD.分销商"}, {"question": "各层具有明显差异，各层内部具有较好一致性的市场调查总体适用于（　）市场调查方法。", "options": [{"label": "A", "text": "随机抽样"}, {"label": "B", "text": "等距抽样"}, {"label": "C", "text": "整群抽样"}, {"label": "D", "text": "分层抽样"}], "answer": "A", "analysis": "质量管理体系能够帮助组织增加顾客满意度，从而能给组织带来最大收益。顾客要求产品具有满足\n其需求和期望的特性，这些需求和期望在产品规范中表述，并集中归结为顾客要求。在任何情况下，产品是\n否可以接受最终由顾客决定。\n \n28.各层具有明显差异，各层内部具有较好一致性的市场调查总体适用于（　）市场调查方法。\nA.随机抽样\nB.等距抽样\nC.整群抽样\nD.分层抽样"}, {"question": "某企业技术改造面临三个备选方案，其投资额和年净收益额见下表，运用投资回收期法，应该选用（", "options": [{"label": "A", "text": "方案1"}, {"label": "B", "text": "方案2"}, {"label": "C", "text": "方案3"}, {"label": "D", "text": "方案2或方案3"}], "answer": "D", "analysis": "分层比例抽样适用于各层具有明显差异，各层内部具有较好一致性的市场调查总体的调查。实施分\n层比例抽样必须对调查总体各单位的情况有较多的了解，否则无法科学分类，抽样难度加大。\n \n29.某企业技术改造面临三个备选方案，其投资额和年净收益额见下表，运用投资回收期法，应该选用（　\n）。\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n6\n \nA.方案1\nB.方案2\nC.方案3\nD.方案2或方案3"}, {"question": "2、3的投资回收期分别为4年、5年、5年，所以选投资回收期最短的方案1。", "options": [{"label": "A", "text": "社会效益"}, {"label": "B", "text": "经济效益"}, {"label": "C", "text": "管理能力"}, {"label": "D", "text": "文化效益"}], "answer": "A", "analysis": "方案1、2、3的投资回收期分别为4年、5年、5年，所以选投资回收期最短的方案1。\n \n30.进行技术改造的可行性分析时，需要对技术改造方案的总投资额和（　）进行比较。\nA.社会效益\nB.经济效益\nC.管理能力\nD.文化效益"}, {"question": "按我国现行《统计上大中小微型企业划分办法》规定，企业划分为（　）种类型。", "options": [{"label": "A", "text": "三"}, {"label": "B", "text": "四"}, {"label": "C", "text": "五"}, {"label": "D", "text": "六"}], "answer": "B", "analysis": "进行技术改造的可行性分析时，需要对技术改造方案的总投资额和经济效益进行比较。\n \n31.按我国现行《统计上大中小微型企业划分办法》规定，企业划分为（　）种类型。\nA.三\nB.四\nC.五\nD.六"}, {"question": "全面质量管理阶段始于（　）。", "options": [{"label": "A", "text": "20世纪40年代"}, {"label": "B", "text": "20世纪50年代"}, {"label": "C", "text": "20世纪60年代"}, {"label": "D", "text": "20世纪70年代"}], "answer": "B", "analysis": "按我国现行《统计上大中小微型企业划分办法》规定，企业划分为四种类型，包括大型、中型、小\n型和微型企业。\n \n32.全面质量管理阶段始于（　）。\nA.20世纪40年代\nB.20世纪50年代\nC.20世纪60年代\nD.20世纪70年代"}, {"question": "企业集团结构的主要特点不包括（　）。", "options": [{"label": "A", "text": "企业集团有核心企业"}, {"label": "B", "text": "企业集团的联合是多层次的"}, {"label": "C", "text": "产权关系是最重要的纽带"}, {"label": "D", "text": "集团最高层对下属企业的控制力较强\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n7"}], "answer": "B", "analysis": "全面质量管理始于20世纪50年代，随着科技和工业生产的发展，对质量的要求越来越高，开始进入\n全面质量管理阶段。\n \n33.企业集团结构的主要特点不包括（　）。\nA.企业集团有核心企业\nB.企业集团的联合是多层次的\nC.产权关系是最重要的纽带\nD.集团最高层对下属企业的控制力较强\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n7"}, {"question": "下列属于计量值控制图的是（　）。", "options": [{"label": "A", "text": "多值控制图"}, {"label": "B", "text": "平均值和极差控制图"}, {"label": "C", "text": "方差和极差控制图"}, {"label": "D", "text": "计件值控制图"}], "answer": "D", "analysis": "本题考查企业集团的特点。企业集团的主要特点表现在：（1）企业集团有核心企业，这个核心由一\n个或者若干个大中型骨干企业、科研单位或具有投资能力的企业组成；（2）企业集团的联合是多层次的，由\n处于核心层、紧密层、半紧密层、协作层的众多企业组成，处于不同层次上的企业之间往往因产权关系等因\n素而具有很强的制约甚至控制关系；（3）产权关系是把众多的企业联合在一起形成企业集团的最重要的纽带\n。企业集团结构的缺点是：集团最高层对下属企业的控制力较弱；集团内部组织结构重叠，管理功能重复\n；由于规模巨大，企业往往对环境的反应不够灵敏。\n \n34.下列属于计量值控制图的是（　）。\nA.多值控制图\nB.平均值和极差控制图\nC.方差和极差控制图\nD.计件值控制图"}, {"question": "厂长经理负责制属于企业规章制度中的（　）。", "options": [{"label": "A", "text": "工作制度"}, {"label": "B", "text": "基本制度"}, {"label": "C", "text": "领导制度"}, {"label": "D", "text": "责任制度"}], "answer": "B", "analysis": "计量值控制图包括单值控制图、平均值和极差控制图及中位数和极差控制图。\n \n35.厂长经理负责制属于企业规章制度中的（　）。\nA.工作制度\nB.基本制度\nC.领导制度\nD.责任制度"}, {"question": "承担社会责任是（　）。", "options": [{"label": "A", "text": "企业管理的核心内容"}, {"label": "B", "text": "企业的经营目标"}, {"label": "C", "text": "企业协调外部关系的基础"}, {"label": "D", "text": "企业产生的根本原因"}], "answer": "B", "analysis": "基本制度主要是企业的领导体系，如“经理、厂长负责制”“法人管理制度”等。\n \n36.承担社会责任是（　）。\nA.企业管理的核心内容\nB.企业的经营目标\nC.企业协调外部关系的基础\nD.企业产生的根本原因"}, {"question": "安全生产的特点包括预防性、科学性、群众性和（　）。", "options": [{"label": "A", "text": "长期性"}, {"label": "B", "text": "重要性"}, {"label": "C", "text": "效益性"}, {"label": "D", "text": "固定性"}], "answer": "C", "analysis": "承担社会责任是企业协调外部关系的基础。\n \n37.安全生产的特点包括预防性、科学性、群众性和（　）。\nA.长期性\nB.重要性\nC.效益性\nD.固定性"}, {"question": "质量的相对性是指（　）。", "options": [{"label": "A", "text": "汇集了价值的表现，物美价廉实际上是反映人们的价值取向，物有所值"}, {"label": "B", "text": "在质量管理体系所涉及的范畴内，组织的相关方对组织的产品、过程或体系都可能提出要求"}, {"label": "C", "text": "组织的顾客和其他相关方对组织、产品、过程和体系的需求和期望是不断变化的"}, {"label": "D", "text": "组织的顾客和其他相关方可能对同一产品的功能提出不同的需求，也可能对同一产品的同一功能提出不同\n的需求\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8"}], "answer": "A", "analysis": "安全生产的特点包括预防性、科学性、群众性和长期性。\n \n38.质量的相对性是指（　）。\nA.汇集了价值的表现，物美价廉实际上是反映人们的价值取向，物有所值\nB.在质量管理体系所涉及的范畴内，组织的相关方对组织的产品、过程或体系都可能提出要求\nC.组织的顾客和其他相关方对组织、产品、过程和体系的需求和期望是不断变化的\nD.组织的顾客和其他相关方可能对同一产品的功能提出不同的需求，也可能对同一产品的同一功能提出不同\n的需求\n专业网校课程、题库软件、考试用书、资讯信息全方位一体化职业考试学习平台\n8"}, {"question": "猎头公司主要为企业招聘（　）。", "options": [{"label": "A", "text": "基层管理人员"}, {"label": "B", "text": "中层管理人员"}, {"label": "C", "text": "高级管理人员"}, {"label": "D", "text": "一般技术人员"}], "answer": "D", "analysis": "质量的相对性是指组织的顾客和其他相关方可能对同一产品的功能提出不同的需求，也可能对同一\n产品的同一功能提出不同的需求。需求不同，质量要求也就不同，只有满足需求的产品才会被认为是质量好\n的产品。\n \n39.猎头公司主要为企业招聘（　）。\nA.基层管理人员\nB.中层管理人员\nC.高级管理人员\nD.一般技术人员"}, {"question": "根据我国公司法，公司分配当年税后利润时，应提取净利润的（　）列入法定公积金。公司法定公积金累", "options": [{"label": "A", "text": "5%"}, {"label": "B", "text": "10%"}, {"label": "C", "text": "15%"}, {"label": "D", "text": "25%"}], "answer": "C", "analysis": "猎头公司专门为企业物色高级管理人员或高级技术人员。\n \n40.根据我国公司法，公司分配当年税后利润时，应提取净利润的（　）列入法定公积金。公司法定公积金累\n计额为注册资本的50%以上的，可以不再提取。\nA.5%\nB.10%\nC.15%\nD.25%"}, {"question": "确定设备最佳更新期采用的方法是（　）。", "options": [{"label": "A", "text": "追加投资回收期法"}, {"label": "B", "text": "投资回收期法"}, {"label": "C", "text": "效益成本分析法"}, {"label": "D", "text": "低劣化数值法"}], "answer": "B", "analysis": "公司取得利润后首先应按规定上交企业所得税，余额为税后利润。税后利润分配的顺序应执行《中\n华人民共和国公司法》的规定。公司分配当年税后利润时，首先应当按当年税后利润（假设年初不存在累计\n亏损)的10%
